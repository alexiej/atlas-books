bSQAq8hmH949OwzzXlH7Qesy3HiPT7S4hVliSUjBxuJG7n17D8Kwp0b0pS6M82nVWIxkILdav/gHkWrzfapVkScyksQx4ALYzkc/h19Kt+FrIvqUAlAG5AQGbAH0P5VTgQS3ZkRQm13XCjjg4rf8ADLG4163O1FUREbNgI61Mnd2Pp3pTsi7JbajDdPbiABPITcFXrnB6/U/rVu+iminj+1xEN5n7oAdxx/n6irRiM9zdqWClEjkBUfjjnoOKh1LTI2gjlaUks4KBuQmQT+NeXVUua3Rm1BxTWmq/4A6Z50uohHFHsfa3C4455/KiotULxX0aiZyNwXDNnjPb0orpw8WoGjUWf//Z","chapters":[{"id":"książę","number":1,"title":"Książę","blocks":[{"type":"verse","text":"PANU HRABIEMU\nKAZIMIERZOWI STADNICKIEMU\nautorowi\n„Synów Gedymina” ,\n„Braci Władysława Jagiełły”\ni innych dzieł,\nw dowód poważania i przyjaźni\npoświęca\nTŁUMACZ."},{"type":"paragraph","text":"To dzieło Machiavella przełożyłem z niemieckiego tłumaczenia Rehberga (Hanower 1810) jeszcze w roku 1851 1 ; lecz gdy ówczesna cenzura we Lwowie nie pozwoliła go drukować, odłożyłem na bok i wziąłem się do innych prac. Dopiero zeszłego roku, po kilkunastoletniej przerwie, zaglądnąłem do mego przekładu i przekonałem się, że aby go wydać, trzeba zupełnie na nowo, z oryginału włoskiego tłumaczyć. Com też uczynił, używszy do przekładu wydania drukowanego u księgarza Józefa Baer, w Frankfurcie nad Menem 1852 in 16 ."},{"type":"paragraph","text":"Zamiast biografii autora i krytyki dzieł jego, co w pierwszej lepszej encyklopedii znaleźć można i która nawet wyszła w osobnej broszurze w Krakowie 1850, umieściłem o nim zdania różnych znakomitych pisarzy, aby tym sposobem uprzedzenie o Machiavellim 2 , gdyby jeszcze do teraz znajdowało się w polskiej publiczności, neutralizować i równoważyć z ustaloną powagą powołanych świadectw."},{"type":"paragraph","text":"Kobło pod Samborem, w lutym 1868."},{"type":"paragraph","text":"A. S."}],"audio_pl":["machiavelli-traktat-o-ksieciu-ch0-part000.mp3","machiavelli-traktat-o-ksieciu-ch0-part001.mp3","machiavelli-traktat-o-ksieciu-ch0-part002.mp3","machiavelli-traktat-o-ksieciu-ch0-part003.mp3","machiavelli-traktat-o-ksieciu-ch0-part004.mp3","machiavelli-traktat-o-ksieciu-ch0-part005.mp3"]},{"id":"zdania-niektórych-autorów-o-mikołaju-machiavellim","number":2,"title":"Zdania niektórych autorów o Mikołaju Machiavellim","blocks":[{"type":"paragraph","text":"(ur. 3 maja 1469, um. 22 czerwca 1527)"},{"type":"paragraph","text":"Wespazjan Kochowski , dziejopis i poeta polski w XVII wieku, tak o nim pisze w swoich Epigramatach polskich :"},{"type":"verse","text":"Arpin uczy wymowy, a zasię Stagiery 3\nPełne filozoficznej mądrości papiery,\nJustynian z pożytkiem w prawie biegłych ćwiczy,\nGalen złoto od chorych za recepty liczy;\nProstakiem jednak, kto z tych dyscypułów 4 wiela,\nW szkole choć z raz nie będzie u Macchiawela."},{"type":"paragraph","text":"Potocki Stanisław , za Księstwa Warszawskiego dyrektor Izby Edukacyjnej, a po utworzeniu Królestwa Polskiego minister oświecenia i spraw duchownych, odzywa się w rocznikach Towarzystwa Przyjaciół Nauk na rok 1818: „Nazywamy Machiawelem ministra, co zręcznie sprawami państwa kieruje; nazywamy Machiawelem posła, co zręcznie interesa dworu swego za granicą prowadzi; nazywamy na koniec Machiawelem książęcia, którego polityka korzystnie na jego stronę przeważa i co potęgę swoją powiększa, pomniejszając innych”."},{"type":"paragraph","text":"Benedykt Spinoza , jeden z największych i najbardziej wpływowych filozofów (żył w XVII wieku), nazywa Machiawella w dziele Tractatus politicus : „ acutissimus Florentinus ” 5 ."},{"type":"paragraph","text":"Justus Lipsius , słynny filolog XVI wieku, który przede wszystkim tylko dawnych pisarzy cenił, jednak przyznaje w dziele Politicorum libros sex : „ nisi quod unius tamen Machiavelli ingenium non contemno: acre, subtile, igneum ” 6 ."},{"type":"paragraph","text":"Bako z Werulamu 7 , mąż stanu i uczony angielski w XVI wieku, mówi o naszym autorze w dziele De augmentis scientiarum , lib. VII, cap. 2: „ Est itaque quod gratias agamus Machiavello et hujusmodi scriptoribus, qui aperte et indissimulantes proferunt, quid homines facere soleant, non quid debeant ” 8 ."},{"type":"paragraph","text":"Jan Jakub Rousseau 9 , którego uczciwy i republikański charakter ogólnie jest znany, mówi w Contrat social , liv. III, cap. 6: „ Machiavell etoit un honnete homme et un bon citoyen ” 10 ."},{"type":"paragraph","text":"Zaszczytnym jest także dla Machiawella napis na grobowcu, który mu wystawiono we Florencji; napis ten brzmi: Tanti nomini nullum par elogium 11 ."},{"type":"paragraph","text":"Król pruski Fryderyk napisał wprawdzie dzieło pt. Anti-Machiavel , w którym zdania naszego pisarza zbijać i jako niewłaściwe okazać się stara; lecz kto świadom czynów tego monarchy, zwłaszcza sposobu, w jaki powiększał swoje państwo i bogacił swoje skarby, ten przyzna, że to jest bezczelność, a przynajmniej niewdzięczność z jego strony poniewierać tego autora, którego przepisy żywcem i co do joty wykonywał."}]},{"id":"dedykacja","number":3,"title":"[Dedykacja]","blocks":[{"type":"paragraph","text":"Wspaniałemu Wawrzyńcowi Medyceuszowi 12 , synowi Piotra"},{"type":"paragraph","text":"Zwykle się dzieje, że ci, którzy się starają o względy księcia, to mu stawiają przed oczy, co im jest najmilsze lub o czym myślą, że mu się najbardziej podobać może; dają mu więc konie, zbroje, złotogłowia, drogie kamienie i tym podobne ozdoby odpowiednie wielkości jego; ja zaś, gdy przed Tobą, o Panie, z dowodem poddańczej uniżoności stanąć pragnę, nic nie znajduję między mymi sprzętami takiego, co by mi droższe było albo co bym tyle cenił, jak wiadomość 13 o czynach wielkich ludzi, którą nabyłem długim doświadczeniem w zajściach nowszych czasów i ustawicznym dawnych autorów czytaniem. Badania moje w tej materii z wielką pilnością i przez długi czas robione i roztrząsane, w małą zebrawszy książkę, ofiaruję Tobie."},{"type":"paragraph","text":"Aczkolwiek sam poznaję, że dzieło nie odpowiada Twej dostojności, zważywszy jednak, że nie mogę Ci ofiarować większego podarunku nad udzielenie środków, byś w krótkim czasie to wszystko pojął, com się przez długie lata w niedostatku i z niebezpieczeństwem nauczył, ufam Twej ludzkości 14 , iż dobrze przyjęty będzie. Nie szedłem za wzorem innych pisarzy i nie upiększałem ani obciążyłem dzieła mego obszernymi wywodami lub szumnymi a okazałymi słowy, lub innym wdziękiem czyli 15 zewnętrzną ozdobą, życząc mu, aby samo przez się uzacnione zostało, a jedynie prawda treści i wykładu powaga książkę zalecały 16 . Toż nie można brać na karb zarozumiałości, jeśli człowiek z niskiego i podłego stanu odważa się rządy panujących oceniać i regulować. Bo jak malarze krajobrazów po nizinach stąpają, aby formację gór i pagórków wyśledzić, zaś na góry wychodzą, by oddać doliny, zarówno osoby panujące najlepiej lud znają, a dla poznania panujących trzeba być z ludu. Przyjm tedy, Dostojny Panie, mały ten upominek z tą myślą, z jaką Ci poświęcam, a przeczytawszy pilnie i z uwagą, poznasz moją gorącą żądzę, byś doszedł do owej wysokości, którą Ci obiecują szczęście i cnoty Twoje; jeśli zaś ze szczytu swej wspaniałości raczysz czasem rzucić okiem na niski nasz padół, przekonasz się, iż wielka a ciągła złośliwość losu niesprawiedliwie mnie gnębi."},{"type":"paragraph","text":"Mikołaj Machiavelli"}]},{"id":"rozdział-1-ile-jest-rodzajów-samowładztwa-i-drogi-doń-prowadzące","number":4,"title":"Rozdział 1. Ile jest rodzajów samowładztwa i drogi doń prowadzące","blocks":[{"type":"paragraph","text":"Wszystkie państwa i wszystkie rządy, które panowały i panują nad ludźmi, dzielą się na republiki i monarchie; monarchie znów na dziedziczne, jeśli rodzina księcia długo panuje, i na nowe. Ostatnie są albo zupełnie nowe, jak np. państwo Franciszka Sforzy 17 w Mediolanie, lub też takie, które dziedzicznemu państwu przyłączone zostały. W ten sposób należy królestwo neapolitańskie do króla Hiszpanii. Nowo nabyte państwa były dawniej albo pod panowaniem księcia, albo wolne; nabyć zaś takowe można obcym lub własnym szczęściem albo biegłością."}]},{"id":"rozdział-2-o-monarchiach-dziedzicznych","number":5,"title":"Rozdział 2. O monarchiach dziedzicznych","blocks":[{"type":"paragraph","text":"Nie będę mówił o republikach, bom to obszernie w osobnym uczynił dziele 18 ; wracam do samowładztwa i będę według oznaczonego porządku badał, jak samowładnie rządzić i jak przy tej władzy utrzymać się można. Twierdzę, że utrzymanie dziedzicznych państw przywykłych do swej dynastii o wiele jest łatwiejsze niż utrzymanie państw nowych, ponieważ wszystko od tego zależy, by nie naruszyć dawnego porządku, a odmiany ciągle zwlekać. Dziedziczny książę z pospolitą biegłością musi się utrzymać przy państwie, chyba że go zeń jaka nadzwyczajna i niezwykła siła strąci, a chociażby nawet stracił państwo, to go na powrót odzyska, skoro zaborcy noga się pośliźnie. Taki przykład mieliśmy we Włoszech na księciu z Ferrary 19 , który w r. 1484 Wenecjanom, a w r. 1510 papieżowi Juliuszowi II niczym innym, jak tylko tym opór stawił, że władzę miał zakorzenioną. Wszak książę dziedziczny niewiele ma powodów i mało konieczności do wyrządzenia obrazy, przez co więcej jest lubiany i swoi są mu życzliwi, wyjąwszy wypadek, jeśli przez nadzwyczajne wady ściągnie na siebie pogardę. Pod zastarzałą i długo trwającą władzą zapominamy o potrzebie zmian, gdy przeciwnie, jedna zaprowadzona zmiana staje się powodem do zaprowadzenia innych."}]},{"id":"rozdział-3-o-monarchiach-mieszanych","number":6,"title":"Rozdział 3. O monarchiach mieszanych","blocks":[{"type":"paragraph","text":"Nowe państwa podlegają trudnościom. W kraju mieszanym, czyli takim, gdzie do dawnego państwa nową przyłączono prowincję, powstają zaburzenia z tej przyrodzonej trudności, która wszystkim nowym władzom jest wspólna i stąd wynika, iż ludzie ochoczo swoich panów zmieniają w nadziei, że lepiej na tym wyjdą, co jest powodem buntów przeciw dawnemu rządowi, chociaż później, gdy dola ich pogorszy się, ludzie poznają swój błąd. Tu znów działa zwykle inna naturalna przyczyna, ponieważ nowy panujący już dlatego, że jego władza także jest nowa, zmuszony jest swoich nowych poddanych wojskiem i różnymi innymi zniewagami gnębić. Będzie miał wszystkich za nieprzyjaciół, których podbojem obraził, zaś tych, co mu do władzy pomogli, nie zatrzyma w przyjaźni, bo nie może wszystkich ich życzeń wypełnić, a zażyć 20 silnych przeciw nim środków nie dozwala wdzięczność, którą im winien. Wszak bez pomocy krajowców i z najpotężniejszą armią nie można opanować żadnego kraju. Z tych to powodów, jak prędko Mediolan podbił, tak też niebawem utracił Ludwik XII 21 , król francuski. Pierwszą razą 22 podołał mu sam wypędzony Ludwik Sforza 23 , ponieważ ludzie, którzy mu wrota do Italii otworzyli, omyleni w spodziewanych korzyściach, nie mogli wytrzymać wstrętu do nowego księcia. Trzeba przyznać, że zbuntowane kraje, gdy drugi raz zostaną podbite, nie tak łatwo stracić, albowiem zdobywca, korzystając z buntu, nie przebiera w środkach, aby ukarać winowajców, dochodzić spiskowych i wzmacniać słabe strony swego rządu. Kiedy do wypędzenia Francuzów z Mediolanu wystarczył pierwszą razą uczyniony rozruch na granicy przez jednego księcia Ludwika, przy powtórnym miasta opanowaniu musieli się wszyscy zjednoczyć, aby wojsko francuskie zniszczyć i z Włoch wypędzić. Powody tego zdarzenia wymieniłem powyżej, a tak pierwszą, jak i drugą razą odebraliśmy Francji Mediolan. Opowiedziawszy ogólne przyczyny pierwszego zajścia, pozostaje mi wyłożyć powody drugiego, jako też i środki, za pomocą których nabyte państwo zatrzymać i z takiego położenia, w jakim król francuski zostawał, korzystniej wyjść można. Twierdzę, że podbite i z metropolią złączone prowincje albo do niej z plemienia należą i wspólny mają język, albo też są odrębne. W pierwszym razie, zwłaszcza jeśli te prowincje nie były przyzwyczajone do wolności, nader je łatwo owładnąć; by zaś takowe zatrzymać, dość jest wytępić poprzednią dynastię, ponieważ lud będąc jednego szczepu i nie doznając uszczerbku w swych dawnych zwyczajach, zachowa się spokojnie, jak to widzimy na przykładzie Burgundii, Bretanii, Gaskonii i Normandii, które z Francją od dawna są złączone, a chociaż ich mowa i mowa reszty Francji nieco jest różna, zwyczaje są te same i dlatego żyją w zgodzie. Kto więc takie prowincje zdobył i zatrzymać pragnie, musi zauważać po pierwsze: aby rodzina poprzedzającego władcy wygasła, po wtóre: aby nie odmieniać dawnych praw i danin, a w bardzo krótkim czasie dawny kraj i nowa akwizycja 24 zleją się w jedno ciało. Lecz ujarzmienie kraju, który się różni mową, zwyczajami i ustawami, połączone jest z trudnościami i trzeba dużo szczęścia i wiele zręczności, by taki kraj utrzymać. Jeden z najdzielniejszych i najskuteczniejszych środków jest ten, aby zdobywca zamieszkał w podbitym kraju, ponieważ przez to zabezpiecza się i utrwala posiadanie. Tak uczynili Turcy z Grecją 25 , której mimo wszelkich starań nie byliby zdołali zatrzymać, gdyby w niej nie założono stolicy. Mieszkając w miejscu, widzi się każdy nieporządek w zarodzie i prędko można mu zaradzić; nie mieszkając w miejscu, dowiadujemy się o nim dopiero wtedy, kiedy się złe wzmogło i nie ma ratunku. Nadto osobisty pobyt księcia nie dozwala urzędnikom wycieńczać krajowców, a możność odwołania się w bliskiej drodze do panującego zaspokaja poddanych, tak że dobrzy będą go lubić, inni lękać go się muszą. Nawet dla obcych, którzy by się o państwo kusili, jest książęca rezydencja zawadą, bo jak długo w niej panujący mieszka, trudno pozbawić go państwa. Drugi wyborny środek jest kolonizacja. Kolonie bowiem są to istne klucze do kraju. Kto je zaniedba, musi przynajmniej dostarczającą siłę zbrojną w podbitym kraju utrzymywać. Kolonie niewiele kosztują; książę osadza je bez wielkich nakładów i zrywa jedynie z tymi krajowcami, którym odebrał ziemię i domy, aby dać nowym przybyszom, a ci zawżdy 26 są w mniejszości: obrażeni nie żyją razem i popadają w ubóstwo, przeto mało mogą szkodzić; resztę zaś krajowców, których nie zniszczono, łatwo uspokoić, ponieważ obawiają się, by przez powstanie tego samego losu, co z majątków wyzuci, nie doznali. Musimy pamiętać, że ludziom albo trzeba cackać, albo ich przytłumić, bo za małe uchybienia mszczą się, a na większe nie mają siły, zatem każda obraza musi być w ten sposób wyrządzona, aby się nie obawiać zemsty. Używając załogi zamiast kolonii, wycieńcza się wszystkie dochody nowo nabytej prowincji tak dalece, że podbicie kraju zamiast zysku przynosi stratę. Nadto załoga o wiele więcej lud oburza niż kolonie, ponieważ załoga dotyka całą prowincję, każdy mieszkaniec czuje ciężar kwaterunku i staje się nieprzyjacielem nowego rządu, któremu nawet szkodzić może, bo lubo 27 podbity, przecie swych siedlisk nie opuszcza. Pod każdym tedy względem widzimy załogi szkodliwe, kolonie pożyteczne."},{"type":"paragraph","text":"Zdobywca powinien być głową i protektorem słabszych sąsiadów i starać się o osłabienie możnych, tudzież przestrzegać, aby przypadkiem inny co do mocy jemu równy cudzoziemiec do kraju nie wkroczył. Duma lub bojaźń malkontentów sprowadza zdobywcę do kraju. Rzymianie weszli nie tylko do Grecji przez Etolów 28 , ale do każdej prowincji, którą podbijali jedynie przez krajowców. Dzieje się to w taki sposób: skoro obcy potentat 29 wtargnie do kraju, słabsza partia z zazdrości przeciw partii mocniejszej łączy się z nim. Przychylność słabszej partii łatwo można dla siebie zjednać, bo chętnie i bez namysłu stanie ona po stronie nowego rządu; na to jedynie trzeba uważać, aby zbytnio w siłę lub w znaczenie nie urosła, zaś własną potęgą, przy pomocy tej słabszej partii, snadno 30 przyjdzie księciu uskromić partię możnych i samemu władzę dzierżyć. Kto inaczej postępuje, ten mimo niezmiernej pracy i przykrości szybko może postradać swoją zdobycz."},{"type":"paragraph","text":"Tej samej polityki trzymali się Rzymianie w podbitych prowincjach; wysyłali do nich kolonie, wspierali słabych bez dozwolenia, aby zostali silnymi, upokarzali możnych i nie dali nabywać wziętości 31 znakomitym cudzoziemcom. Dla okazania tego ograniczę się do prowincji greckiej. Trzymając stronę Achajczyków 32 i Etolów, poniżali królów macedońskich i wypędzili Antiocha 33 . Lecz mimo wszelkich zasług Achajczyków i Etolów nie pozwolono im utworzyć jednego państwa; żadne perswazje Filipa 34 nie ulżyły ubliżających karbów, w których go jako przyjaciela trzymano, a silnemu Antiochowi nie dozwolono byle jakiego państewka w Grecji założyć. Tym trybem jak ongi Rzymianie powinien każdy mądry książę teraz postępować i rządzić się polityką przezorną, która nie tylko na teraźniejsze, ale i na przyszłe baczy zawady i zręcznie im zapobiega. Bo co się z daleka widzi, temu łatwo zaradzić, lecz jeśli dozwolimy złemu zakorzenić się, wtedy medycyna jest za późna i choroba nie do wyleczenia. Podobnie mówią lekarze o suchotach, że zrazu łatwo tę chorobę wyleczyć, ale trudno poznać; zapoznana 35 zaś i nieleczona w początkach, poznaje się później 36 z łatwością, ale trudno z niej wyleczyć. Nie inaczej dzieje się z państwem: z daleka przewidziane wady, co jednak tylko roztropności jest udziałem, prędko można wyleczyć, lecz gdy przez nieznajomość dozwolimy im do tyla 37 wzróść, że je każdy pozna, wtedy nie ma ratunku. Toż Rzymianie, przewidując naprzód kłopoty swego państwa, szukali na nie rady i nie dawali im się zbliżać, choćby nawet dla zażegnania wojny. Wiedzieli bowiem, że wojny nie można uniknąć, a z jej odkładania tylko nieprzyjaciel korzysta. Przeto postanowili z Filipem i z Antiochem bój toczyć w Grecji, aby nie wojować z nimi we Włoszech, chociaż obydwie wojny mogli odroczyć. Snać 38 nie podobało im się prawidło mędrców naszego wieku: „zyskać na czasie”, lecz spuszczali się 39 więcej na swoją waleczność i na mądrość, wiedząc, że czas wszystkie zdarzenia z równą łatwością sprowadza: dobre jak i złe, złe jak i dobre. Wróćmy do Francji i badajmy, czy jej polityka trzymała się choć jednej z wyłożonych tu zasad, lecz nie będziemy mówić o Karolu 40 , tylko o Ludwiku 41 , ponieważ ostatni dłużej posiadał Włochy i jego postępki dosadniej się kształtują. Poznamy, że w każdym względzie przeciwnych zażywał środków niżeli te, które do utrzymania prowincji w obcym kraju są potrzebne. Duma Wenecjan sprowadziła Ludwika do Włoch i Wenecjanie spodziewali się za to połowę Lombardii otrzymać. Nie ganię tej polityki króla, bo chcąc się w Italii usadowić, a nie mając w niej żadnych przyjaciół, owszem gdy dla 42 pamięci o czynach Karola cały kraj był mu niechętny, musiał zawierać pierwsze lepsze sojusze i wyprawa byłaby się udała, gdyby innego nie popełnił błędu. Zdobywszy Lombardię, odzyskał utraconą przez Karola sławę, wnet upadła Genua i Florentczycy stanęli po stronie króla. Margrabia mantuański, książę Ferrary, Bentivogliowie, księżniczka Forli, dalej książęta z Faenzy, z Pesaro, z Rimini, z Camerino, z Piombino, niemniej Lukka, Piza i Siena, wszyscy ubiegiwali 43 się o przyjaźń króla. Wówczas poznali Wenecjanie nierozmyślność, jaką popełnili, robiąc go panem dwóch trzecich części Włoch dlatego, aby odzyskać dwie ziemie w Lombardii. Król mógł z łatwością powagę swoją we Włoszech utrzymać, byle tylko do powyższych stosował się zasad i wszystkich swoich przyjaciół wziął w opiekę, którzy bądź dla swej mnogości, bądź dlatego, że jako słabi obawiali się Rzymu 44 i Wenecjan, musieli przy nim zostać, a za ich pomocą byłby sobie upewnił możnych. Lecz zaledwie podbił Mediolan, zaczął nierozsądnie postępować, bo pomagał papieżowi Aleksandrowi 45 do władzy nad Romanią 46 nie pomnąc, że tym sposobem sam się osłabiał i z przyjaciół oraz z tych ludzi ogołacał, którzy się na jego łaskę zdali, papieża zaś wywyższał, gdyż do duchownego blasku dodawał mu świeckiego znaczenia. Pierwszy ten błąd pociągnął za sobą inne tak dalece, że w końcu osobiście musiał ciągnąć do Włoch, aby zahamować pychę Aleksandra i przeszkodzić mu w podbiciu Toskanii 47 . Nie poprzestał na wywyższeniu Aleksandra i na wyzuciu się z przyjaciół, lecz popełnił nowy błąd i dla utrzymania Neapolu podzielił się nim z królem hiszpańskim 48 . Dotąd był samowładnym panem Italii, teraz przybrał sobie towarzysza, niejako aby ludzie ambitni i jemu przeciwni mieli się do kogo garnąć. Zamiast pozostawić w owym kraju króla od siebie zawisłego, usunął go i przywołał innego, który go mógł wypędzić. Żądza podbojów jest człowiekowi wrodzona i nie ganimy jej, owszem chwalimy pod warunkiem, jeśli to, co się przedsięweźmie, wykonane zostanie; ale błędem i nagany godnym jest, gdy podejmujemy takie dzieła, na które nam sił nie starczy. Czuła się Francja dość silną do opanowania Neapolu, niechby to była sama uczyniła, w przeciwnym razie nie trzeba było kraju dzielić. Jeśli więc podzielenie się z Wenecjanami Lombardią, z powodu otrzymanego wejścia do Włoch, na przebaczenie, podział ten drugi, żadną potrzebą nieumotywowany, zasługuje na naganę. Zliczywszy wszystko razem, popełnił Ludwik pięć błędów: zniszczył mniej możnych, powiększył siłę jednego włoskiego panującego, przywołał do kraju bardzo potężnego cudzoziemca, nie zamieszkał w kraju i żadnych nie założył kolonii. Za jego życia wszystkie te pięć błędów nie byłyby szkodliwe, gdyby nie popełnił szóstego błędu i nie odebrał państwa Wenecji. Bez wzmocnienia papieża i bez przywołania Hiszpanów do Italii upokorzenie Wenecji byłoby mądrym środkiem i koniecznym; lecz skoro inne kombinacje wykonane zostały, w żaden sposób nie trzeba było dopuścić upadku Wenecji, gdyż zamożna Wenecja zawżdy byłaby odparła czyjekolwiek napady na Lombardię i Wenecjanie byliby na te napady jedynie pod tym warunkiem zezwolili, gdyby im kraj obiecano, zaś inni nie byliby Lombardii na to od Francuzów odbierali, by ją oddać Wenecji, a zjednoczonych sił Francuzów i Wenecjan nikt by się nie odważył zaczepić. Jeśli mi kto zarzuci, że król Ludwik jedynie w zamiarze uniknienia 49 wojny ustąpił Romanię papieżowi Aleksandrowi, a Neapol Hiszpanom, temu odpowiem, iż z przyczyn wyżej przytoczonych nigdy nie trzeba dozwolić, aby dla uniknienia wojny nieporządki się mnożyły, bo wojny nie unikniesz i tylko z własną odkładasz stratą. Gdyby znów przyrzeczenie króla, które dał papieżowi, przeciwstawiono i twierdzono, że król za cenę rozwodu swego małżeństwa 50 oraz za kardynalski kapelusz dla arcybiskupa z Rouen 51 obiecał papieżowi przedsięwziąć wyprawę przeciw Romanii, wówczas odwołuję się na to 52 , co poniżej o słowności książąt, tudzież o tym, jak ją wykonywać, mówić będę."},{"type":"paragraph","text":"Jasną jest tedy rzeczą, że król Ludwik utracił Lombardię dlatego, bo nie trzymał się reguł, którymi inni kraje podbijali i dzierżyli. O tym zwykłym, łatwym do pojęcia i naturalnym wypadku mówiłem w Nantes z kardynałem roueńskim właśnie wtedy, kiedy książę Valentino, syn papieża Aleksandra, zwykle Cezarem Borgia 53 zwany, zdobył Romanię. Kardynał robił mi zarzut, że Włosi nie rozumieją się na prowadzeniu wojny, jam mu odpowiedział, że Francuzi nie rozumieją polityki, gdyż inaczej nie byliby dozwolili takiego wzmocnienia Kościoła 54 i doświadczenie sprawdziło moje zdanie, bo Francja, podnosząc w Italii znaczenie tak papieża, jak i Hiszpanów, podkopała własne w tym kraju panowanie, które też niebawem runęło. Stąd wypływa powszechne prawidło, nigdy albo przynajmniej bardzo rzadko zawodne, mianowicie: że kto drugiego podnosi, ten sam upada; wywyższenie bowiem następuje albo fortelami albo siłą, a obydwom tym środkom nowy władca nie powinien ufać."}]},{"id":"rozdział-4-dlaczego-kraje-dariusza-zdobyte-przez-aleksandra-wielkiego-nie-powstały-po-śmierci-aleksandra-przeciw-jego-następcom","number":7,"title":"Rozdział 4. Dlaczego kraje Dariusza, zdobyte przez Aleksandra Wielkiego, nie powstały po śmierci Aleksandra przeciw jego następcom","blocks":[{"type":"paragraph","text":"Zważywszy trudności w utrzymaniu państwa świeżo nabytego, można by się dziwować, skąd poszło, iż azjatyckie, przez Aleksandra Wielkiego w kilku latach podbite kraje, po których zwłaszcza dlatego, że śmierć Aleksandra po ukończonych zdobyczach rychło nastąpiła, trzeba się było spodziewać, że powstaną przeciw jego następcom, jednak bez żadnych, wyjąwszy własną niezgodą tychże następców wznieconych trudności, utrzymane były. Na to odpowiadam: wszystkie znane państwa podług dwóch rządzono systemów: albo przez księcia i jemu podwładnych, którzy jako ministry z jego łaski i za jego dozwoleniem pomagają mu rządzić, albo też przez księcia i przez baronów, którzy swoje posady nie łasce księcia, ale swemu starożytnemu zawdzięczają pochodzeniu. Barony, czyli magnaci, posiadają dobra i przychylnych sobie poddanych uważających ich za swoich panów. W państwach pierwszym sposobem rządzonych książę dzierży większą władzę, bo w całym kraju nie ma nikogo, co by go za pana nie uznawał, a jeśli lud także innym jest posłuszny, czyni to jedynie dlatego, że widzi w nich wyręczycieli rządowych, chociaż ku nim nie czuje osobistej przychylności. W naszych czasach widzimy zastosowanie dwóch tych systemów w Turcji i we Francji. Całym tureckim państwem włada monarcha, reszta urzędników są jego sługalce 55 , a sandżakami 56 , na które Turcja podzielona, zawiadują rządce zależne od sułtana, których on dowolnie zmienia i przenosi. Francuskiego zaś króla otacza mnóstwo starożytnej szlachty, uznanej i lubianej od swych poddanych, tudzież posiadającej takie przywileje, których król bez narażenia się odebrać nie może. Kto się zastanowi nad tymi dwoma państwami, ten się przekona o niemałych trudnościach podbicia Turcji; aliści 57 raz podbita, łatwo się da zatrzymać. Trudności w podboju tego państwa są następujące: z powodów wyżej przytoczonych zaborcy nie mogą książęta do tego kraju przywołać, ani też nie powinien on pomocy od buntowników oczekiwać. Bo gdy wszyscy są zobowiązanymi sułtana niewolnikami, nie fraszka ich przekupić, a choćby się nawet dało, mało by pomogło, gdyż, jakeśmy okazali, nie zdołają ludu do siebie przyciągnąć. Za tym idzie, iż ktokolwiek Turków zaczepi, niech będzie przygotowany, iż jedność u nich znajdzie i musi więcej polegać na swojej sile niż na niezgodzie przeciwnika. Ale po zwalczeniu nieprzyjaciela do tego punktu, że nie zdoła nowej armii wystawić, nie pozostaje żadna inna obawa, tylko od zdetronizowanej dynastii, po której wytępieniu nikt w narodzie nie będzie miał tyle wziętości, aby ze skutkiem powstać. Jak przed walką nie może zwycięzca na nikogo liczyć, tak po walce nie ma się kogo obawiać."},{"type":"paragraph","text":"Zupełnie przeciwnie dzieje się w krajach rządzonych na sposób francuski, do których wprawdzie łatwo wkroczyć, skoro jednego z arystokracji pozyskamy, ponieważ w takich krajach zawsze znajdą się malkontenci, również tacy, co nowości pragną. Ci odemkną wrota do kraju i ulżą 58 zwycięstwo. Lecz później napotyka się niezmierne trudności, tak z pomocnikami, jak i ze zwyciężonymi. Tu już nie wystarcza zgładzenie panującego domu, bo pozostałe magnaty stają na czele rozruchów, a gdy im nie można gęby zapchać, ani też ich zniszczyć, to przy lada sposobności wypędzą z kraju. Badając teraz stan krajów Dariuszowych 59 , znajdziemy w nich dużo podobieństwa do Turcji. Aleksander Wielki potrzebował tylko państwo Dariusza rozbić i bitwy wygrywać, aby podbite kraje po śmierci Dariusza z zupełną utrzymać pewnością; toż Aleksandrowe sukcesory byliby całe obszerne państwo w spokoju dzierżyli, gdyby między sobą nie byli się pokłócili; później także żadnych tam innych rozruchów nie było, prócz tych, które własną niezgodą wzniecili. Lecz krajów z ustawą państwa francuskiego nie można tak spokojnie posiadać. Wielka ilość domów książęcych spowodowała w Hiszpanii, we Francji i w Grecji ciągłe przeciw Rzymianom bunty 60 . Dopóki te domy pozostały w pamięci krajowców, rząd był niepewny; dopiero po jej zatarciu Rzymianie siłą i biegiem czasu w spokojnym utrzymali się posiadaniu. Później, gdy się Rzymianie sami między sobą powaśnili, każdy z nich mógł część prowincji, odpowiednią uzyskanemu zaufaniu, w swój interes wciągnąć, ponieważ ujarzmieni krajowcy, gdy im wygubiono starożytne ich domy, prócz rzymskiego, żadnego nie uznawali panowania. Wszystko to razem skombinowawszy, nikogo nie będzie zastanawiać, że Aleksander z taką łatwością zawojował Azję, zaś inni, np. Pyrrhus 61 , tyle ponosili trudów, aby się utrzymać w podbitym kraju. Nie większe lub mniejsze bohaterstwo zwycięzcy, ale rozmaitość podbojów jest tego przyczyną."}]},{"id":"rozdział-5-jak-rządzić-miastami-lub-krajami-które-przed-podbiciem-własne-miały-ustawy","number":8,"title":"Rozdział 5. Jak rządzić miastami lub krajami, które przed podbiciem własne miały ustawy","blocks":[{"type":"paragraph","text":"Jeśli podbite państwa do własnych ustaw i do wolności były przyzwyczajone, w trojaki sposób można nimi rządzić. Pierwszy prowadzi do ich zniszczenia, drugi jest ten, aby książę w nich zamieszkał, trzeci pozostawia dawne ustawy, zadawalnia 62 się rocznym podatkiem i oddaje rząd w ręce oligarchii, która kraj w posłuszeństwie utrzyma, a wiedząc, że się bez przychylności i potęgi swego twórcy nie ostoi, wszystkiego dokładać będzie, aby panowanie nowego księcia zabezpieczyć. Jeden z najłatwiejszych środków utrzymania posłuszeństwa w dawniej wolnych miastach jest ten, jeśli rząd powierzymy krajowcom, jak to widzimy na Spartanach i Rzymianach. Tamci w podbitych Atenach i Tebach oddali rząd małej liczbie obywateli i stracili swoją zdobycz, Rzymianie przeciwnie: zburzyli Kapuę, Kartaginę i Numancję i utrzymali się przy władzy, gdy zaś Spartę naśladowali i gdy próbowali ogłoszeniem wolności a narodowych ustaw zatrzymaniem Grecją rządzić 63 , nie udał się eksperyment i musiano tam wiele miast zburzyć, aby rzymską zwierzchność utrzymać. W samej istocie: zniszczenie jest najpewniejszym środkiem utrzymania się przy władzy. Kto podbije wolne miasto, a nie zniszczy w nim wolności, niech oczekuje, że ona jego panowanie zniszczy. Bo słowo „wolność” służy ludziom za hasło do powstania, a skład dawnego rządu nie będzie ani przez przeciąg czasu, ani dla nowych dobrodziejstw zapomniany. Jakiekolwiek przedsięwziętoby ostrożności, wolność i narodowe ustawy pozostaną tak długo w pamięci i mieszkańce przy każdej sposobności będą się starali takowe odzyskać, dopóki się ich nie podzieli lub nie rozproszy, czego doznała Piza po stuletniej niewoli florenckiej. Lecz jeśli w mieście lub kraju monarchicznym dynastia zostanie wytępiona, wówczas naród, z jednej strony nawykły do niewoli, z drugiej pozbawiony dawnego księcia, nie zgodzi się na obranie spośród siebie nowego pana, do wolności zaś nie może się przyzwyczaić i nieochoczo porywa za broń, tak dalece że obcy książę może go bez trudów owładnąć i w posłuszeństwie utrzymać. Ale w republikach więcej jest życia: one pałają większą nienawiścią i większą zemstą, przypomnienia dawnej wolności nie dają im spokoju i odzywają się ciągle, tak że najpewniejsze dla nowego panującego lekarstwo jest zniszczyć zdobytą republikę lub w niej mieszkać."}]},{"id":"rozdział-6-o-nowych-państwach-własnym-wojskiem-i-osobistą-dzielnością-podbitych","number":9,"title":"Rozdział 6. O nowych państwach własnym wojskiem i osobistą dzielnością podbitych","blocks":[{"type":"paragraph","text":"Nie trzeba się dziwować, jeśli w rozprawie o zupełnie nowych państwach, o monarchach i o rządach w ogóle, wielkie będę przytaczał wzory. Gdy bowiem ludzie zawżdy prawie ubitą chodzą drogą i w czynach swoich innych naśladują, człowiek rozsądny, z powodu, że nie zawsze można dokładnie żywot i czyny innych naśladować, winien wzniosłe wzory sobie zakładać, aby w razie niedorównania im, przynajmniej jakikolwiek został urok, niejako biegłe łuczniki, które poznawszy, że meta daleka, a łuki za słabe, wyżej celują, nie dla spotęgowania siły strzału, lecz jedynie dlatego, aby tym pewniej do celu trafili. Twierdzę przeto, że trudności, jakich nowy książę doznaje w utrzymaniu się na całkiem nowym państwie, zależą od jego większej lub mniejszej dzielności, a ponieważ waleczność zarówno jak i szczęście męża z ludu na tron wynieść mogą, zdaje się, że tymi samymi przymioty można także owe trudności w znacznej części uśmierzyć. Wszelako kto mniej polega na szczęściu, dłużej włada państwem. Sprawia także ułatwienie ta okoliczność, jeśli brak innych posiadłości zniewala księcia do zamieszkania w nowym terytorium. Lecz wracając do tych, których bardziej osobista dzielność niżeli szczęście na tron wyniosła, sądzę, że Mojżesz, Cyrus 64 , Romulus 65 , Tezeusz 66 i im podobni pierwsze miejsce między nimi zajmują. Chociaż o Mojżeszu nie ma co rozprawiać, gdyż tylko boskie wypełniał rozkazy, przecie dla tej łaski podziwienia godzien, która mu pozwoliła rozmawiać z Bogiem. Ale Cyrus i wszyscy inni nowych państw zdobywce lub fundatorowie są godni podziwu, a czyny ich i ustawy nie o wiele różnią się od czynów i ustaw Mojżesza, który miał tak wzniosłego nauczyciela. Życie i czyny tych mężów przekonują nas, że oni tylko o tyle swoje powodzenie zawdzięczali szczęściu, o ile szczęście nastręczyło im sposobność do wykonania powziętych zamysłów; bez tej sposobności byliby zmarnowali siły swego ducha, a w niedostatku tych sił nic by nie było ze sposobności. Mojżesz musiał zastać Żydów w egipskiej niewoli i od Egipcjan uciemiężonych, inaczej nie byłby ich z niewoli wyprowadził, ani też do posłuszeństwa nakłonił. By powziąć myśl założenia Rzymu i zostać królem, Romulus nie pozostał w Albie, ale zaraz po urodzeniu był podrzucony; niemniej Cyrus znalazł Persów niezadowolonych z rządu medyjskiego, a Medów miękkich i zniewieściałych przez długi pokój. Tezeusz nie byłby okazał swej dzielności, gdyby Ateńczyków nie zastał rozproszonych. Wspomnione 67 okoliczności były powodem szczęścia owych mężów, a osobista ich dzielność dała rozgłos tym okolicznościom i tym sposobem uszlachetnili i uszczęśliwili swoją ojczyznę. Kto drogami powyższych mężów dostąpił władzy państwowej, osiąga ją z trudnością, ale dzierży z łatwością. Trudności przy osiągnieniu 68 władzy pochodzą z reform, które muszą być dla zaprowadzenia i ustalenia nowego rządu przedsięwzięte; bo nie masz trudniejszego negocjowania ani wątpliwszego osiągnienia, ni też niebezpieczniejszego kierowania, jak stanąć na czele nowej ustawy 69 rządowej; ponieważ wszyscy, którym za dawnych czasów dobrze się działo, nie sprzyjają nowemu władcy, zaś ci, co się od nowych ustaw korzyści spodziewają, będą tylko oziębłymi jego poplecznikami, która to oziębłość powstaje częścią z bojaźni przed przeciwnikami nowych ustaw, częścią z właściwego ludziom niedowiarstwa, albowiem ludzie dopóty nie pokładają zaufania do nowego porządku, dopóki namacalne doświadczenie nie przemówi za nim. Stąd nieprzyjaciele nowego rządu, gdzie tylko mogą, godzą weń stronniczo, a zwolenniki z taką bronią oziębłością, że wraz z nimi rząd się chwieje. Aby o tej materii gruntowny sąd wydać, trzeba rozróżniać: czyli 70 się nowatorowie o własnych siłach utrzymują, czy też od innych zależą; innymi słowy: czy mogą oni swoje zamiary łagodnością osiągnąć, czyli też muszą przemocy użyć. W pierwszym razie zamysł ich nigdy się nie uda i niczego nie dopną; lecz jeśli o własnych siłach się utrzymują i droga przemocy otworem stoi, wówczas bardzo rzadko narażają się na niebezpieczeństwo. Dlatego to zwyciężali wszyscy zbrojni prorocy, a upadali nieuzbrojeni; albowiem do powyższych przyczyn idzie także zmienność umysłów ludzkich w rachubę, którym łatwo co wmówić, ale bardzo trudno ich przy tym utrzymać. Wypada tedy taki plan obmyślić, aby tam, gdzie zaufanie ustaje, przemoc działała. Mojżesz, Cyrus, Tezeusz i Romulus nie byliby zdołali utrwalić swych rządów, gdyby nie byli uzbrojeni; podobnie w naszych czasach upadł Fra Girolamo Savonarola 71 z całym swym systemem, skoro stracił zaufanie u ludu i żadnych nie miał środków, by zwolenników przy sobie utrzymać, a niedowierzających do wiary zmusić. Tacy ludzie wielkie mają do pokonania trudności, niebezpieczeństwa stają im na zawadzie, a tak jedne jak drugie muszą swoją dzielnością zwyciężyć; lecz skoro zwyciężą i sławy dostąpią, oraz tych, co im zazdrościli, z drogi usuną, zostaną silni, bezpieczni, poważani i szczęśliwi. Do tych wzniosłych przykładów dodam na zakończenie inny, chociaż mniejszy, jednak stosowny. Oto syrakuzański obywatel Hiero 72 został księciem Syrakuz 73 , do czego szczęście tylko tyle mu dopomogło, iż nastręczyło sposobność, albowiem uciemiężeni Syrakuzanie obrali swego ziomka za dowódcę i na tej posadzie dostąpił przez swe zasługi godności książęcej. Przymioty jego w życiu towarzyskim tak były szlachetne, że kto nie pisał, ten mówił, iż do królowania nic tylko królestwa mu nie dostaje. Hiero rozpuścił dawne, a uformował nowe wojsko, zerwał dawne, a zawierał nowe przyjaźnie, a ponieważ miał przyjaciół i własnych żołnierzy, więc za ich pomocą mógł każde dzieło przedsięwziąć. Widzimy więc, że i Hiero miał wiele pracy w dostąpieniu władzy, a mało trudów w jej utrzymaniu."}]},{"id":"rozdział-7-o-nowych-państwach-obcą-pomocą-i-szczęściem-nabytych","number":10,"title":"Rozdział 7. O nowych państwach obcą pomocą i szczęściem nabytych","blocks":[{"type":"paragraph","text":"Kogo jedynie szczęście z domowego zacisza na tron wyniosło, ten niewiele ponosi trudów w dostąpieniu władzy, ale tym więcej w utrzymaniu się przy niej, ponieważ szybkim pędem stając u celu, nie spotyka w drodze tych przeszkód, które dopiero wtedy spostrzega, gdy władzę osiągnie, jak tego doświadczyli wszyscy, co za pieniądze lub z obcej łaski zostali książętami. Dariusz dla własnej pewności i sławy kreował greckich książąt, tak w Jonii, jak w Hellesponcie 74 , toż wielu cesarzów rzymskich pochodziło ze stanu obywatelskiego i przekupstwo żołnierzy wyniosło ich na tron. Tacy panujący dependują 75 zupełnie od woli i losu tych, którym zawdzięczają wywyższenie swoje, a jedno i drugie należy do najzmienniejszych i nader niestałych rzeczy; sami zaś na tronie utrzymać się nie potrafią, bo nie posiadają ku temu ani zdolności, ani siły; zdolności: bo wyjąwszy genialnego i obrotnego człowieka, nie można rozumnie żądać, aby ten, co ciągle żył prywatnie, umiał rozkazywać; sił: bo nie mają ludzi, na których przyjaźń i wierność spuścić by się mogli. Jak wszystko w naturze, co raptem powstaje i szybko rośnie, zarówno z pośpiechem założone państwa nie mogą zapuścić proporcjonalnych korzeni i lada burza może je powalić, chyba że dorobkiewicz tyle posiada przebiegłości, iż nie tylko potrafi zatrzymać to, co dostał od losu, ale też zdoła fundamenta, które inni książęta przed rozpoczęciem panowania zakładają, później dobudować. Jako przykłady na obydwa powyższe rodzaje osiągnięcia władzy państwowej, obrotnością lub szczęściem, powołuję z dziejów tegoczesnych Franciszka Sforzę i Cezara Borgię. Użyciem stosownych środków i przy wielkiej roztropności Sforza ze zwykłego obywatela został księciem Mediolanu, a zostawszy nim, trzymał z łatwością to, co z tysiącznym nabył udręczeniem. Cezar zaś Borgia, zwykle księciem Valentino zwany, dostąpił tronu przez szczęście swego ojca; jednakże mimo wszelkich wysileń i zabiegów, jakich używa każdy mądry a odważny książę ku zabezpieczeniu państwa obcym orężem i szczęściem nabytego, Borgia z upadkiem ojca stracił państwo. Bo jakem powiedział, kto wcześnie nie założy fundamentu, temu wielkiej potrzeba obrotności, by to później uczynił, chociaż taka opóźniona robota połączona jest zawsze z subiekcją 76 architekta i z niebezpieczeństwem budowy. Bliższe badanie wszystkich Borgii czynów przekona nas, ile się on przyczynił do utrwalenia swej przyszłej potęgi, a sądzę, że dochodzenie to nie jest zbyteczne: albowiem żadnemu aspirantowi 77 do nowego panowania nie mogę dać lepszej rady nad tę, aby w działaniu naśladował Borgię, który gdy chybił celu, wina tego nie w nim, lecz w niezwykłym i nader zawistnym losie leżała. Aleksander VI, chcąc syna swego wywyższyć, znalazł wiele momentalnych i przyszłych trudności. Pierwszą była ta, że nie mógł mu do innych posiadłości dopomóc, jak tylko do kościelnych, chociaż się spodziewał, że na oderwanie jakiejkolwiek prowincji od Kościoła książę Mediolanu i Wenecjanie nie zezwolą, gdyż Faenza i Rimini już zostawały pod wenecką opieką. Nadto wiedział on, że dowódcy tego wojska włoskiego, którego mógł zażyć, obawiali się potęgi Kościoła, a ponieważ wszyscy sprzyjali Orsinim lub Colonnom 78 , lub ich stronnikom, więc żadnego nie wzniecali zaufania. Wypadało tedy pomieszać stosunki i zaburzyć całe Włochy, aby tym pewniej mógł niektóre państwa posiąść, co mu się też łatwo udało, albowiem wówczas Wenecjanie dla innych celów przywołali Francuzów do Italii, czemu znów Aleksander ani się nie sprzeciwiał, ale nawet to przywołanie udzieleniem rozwodu królowi Ludwikowi wspierał. Tak więc przy pomocy Wenecjan i z przyzwoleniem Aleksandra wkroczył król do Włoch, a zaledwie przyszedł do Mediolanu, wnet papież otrzymał od niego potrzebne wojsko na wyprawę przeciw Romanii, która dzięki sławie króla pomyślnie wypadła. Kiedy książę 79 podbił Romanię i zwyciężył Colonnów, okazały mu się tak do zabezpieczenia tej prowincji, jako też i w dalszym podboju dwie przeszkody: niewierność własnego wojska i wola Francji. Obawiał się bowiem zdrady wojska Orsinich, mianowicie, aby mu nie tylko w dalszych nie przeszkadzali podbojach, ale też nie pozbawili tego, co już podbił. O podobne zamysły posądzał także króla francuskiego. Orsini sami dali to po sobie poznać; bo gdy po zdobyciu Faenzy robił przygotowania do oblężenia Bolonii, leniwo go wspierali. Usposobienie zaś króla poznał wtedy, gdy po wzięciu księstwa Urbino 80 atakował Toskanię, a król odwiódł go od tej imprezy. Przeto postanowił nie zależeć dłużej ani od cudzego wojska, ani od czyjego losu. By to wykonać, zaczął najpierw w Rzymie partie Orsinich i Colonnów tym sposobem osłabiać, że zwolenników, których między szlachtą mieli, na swoją przyciągał stronę, a wymierzając im wysokie pensje, nadawał każdemu z nich stosownie do jego zdolności bądź cywilny, bądź wojskowy urząd. W kilka miesięcy znikła ich przychylność ku dawnym koryfeuszom 81 i skierowała się do księcia. Poskromiwszy Colonnów, wyglądał sposobności poskromienia Orsinich i to mu się jeszcze lepiej powiodło. Za późno bowiem spostrzegli Orsini, że potęga księcia i papieża do ich upadku dąży; więc spiesznie zrobili zjazd w Magione, wskutek którego powstały bunty w Urbino, rozruchy w Romanii i mnóstwo innych niebezpieczeństw dla księcia, co on jednakże wszystko za pomocą Francuzów zwalczył. Odzyskawszy swoje znaczenie, a przy tym nie dowierzając ani Francuzom, ani innym obcym wojskom, gdy ich nie mógł doświadczać, chciał ich podejść, do czego tak doskonale umiał się zamaskować, że za pośrednictwem pana Pawła 82 , nastąpiło pojednanie z Orsinimi. Niczego nie szczędził, by ich pozyskać, i tyle im rozdał pieniędzy, ubiorów i koni, że w Senigalii, przez swą nieroztropność, wpadli mu do łapki 83 . Wytraciwszy tym sposobem przywódców i pozyskawszy przyjaźń ich stronników, książę założył niezłe podwaliny dla swego państwa, bo zawładnął całą Romanią i księstwem Urbino, a przy tym zjednał sobie mieszkańców, którzy poczęli smakować w dobrym bycie pod jego rządem. Takie postępowanie zasługuje na rozpowszechnienie i naśladowanie, przeto obszerniej o nim pomówię."},{"type":"paragraph","text":"Po zdobyciu Romanii przekonał się, że ten kraj miał niedołężnych panów, którzy raczej rabowali poddanych niż nimi rządzili, więcej ich waśnili niż jednali, tak dalece że Romania była przepełniona rozbojami, fakcjami 84 i innym zuchwalstwem wszelkiego rodzaju, a gdy poznał, że jedynie dobry rząd mógł ją uspokoić i do posłuszeństwa przyprowadzić, zrobił Ramira d’Orco, człowieka okrutnego i zwinnego, gubernatorem, nadawszy mu najzupełniejszą władzę. D’Orco ustalił w krótkim czasie spokój i jedność w powierzonym sobie kraju, czym się wsławił bardzo. Później nie podobała się księciu ta nadzwyczajna władza namiestnika, a to z obawy, aby nie została znienawidzona. Przeto zaprowadził w środku Romanii trybunał cywilny pod naczelnictwem najdzielniejszego prezesa, gdzie każde miasto miało swego obrońcę. Gdy zaś spostrzegł, że z poprzedniej surowości wyrodziła się nienawiść, starał się swoją osobę oczyścić w oczach ludu i tym go sobie zjednać, że mu przekładał, iż jeśli jakie okrucieństwo popełniono, stało się to nie z jego, lecz z woli nieludzkiego namiestnika. Niedługo potem kazał go na dwie części rozpołowić i z kawałkiem drewna oraz ze skrwawionym nożem przy boku w Cesanie 85 na rynku wystawić. Zdumiony lud uspokoił się chwilowo okrucieństwem tego widowiska. Lecz wróćmy, gdzieśmy przestali. Książę czuł się dość silny i w części zabezpieczony przeciw niebezpieczeństwom, gdyż dostateczne miał wojsko, a przy tym zniszczył pobliską armię cudzoziemską, która mogła mu zagrażać. Przy tentowaniu 86 dalszych zaborów trzeba było mieć wzgląd na Francję, inaczej król, który za późno swój błąd poznał, nie byłby na nie zezwolił. Z tych powodów Borgia, oglądając się za nowymi przyjaciółmi, majaczył z Francją właśnie wtedy, gdy francuskie wojska postępowały w kierunku królestwa neapolitańskiego przeciw Hiszpanom, którzy Gaetę 87 w oblężeniu trzymali. Zabezpieczyć się przed nimi było jego zamiarem i za żywota Aleksandra byłby ten zamiar szybko osiągnął. Tyle miałem do powiedzenia o jego rządzie co do spraw bieżących. Lecz przyszłość przedstawiała mu różne obawy: najpierw aby nowy papież nie był mu nieprzyjazny i nie kusił się odebrać nadania Aleksandra. Przeciw temu chciał się w czworaki sposób zabezpieczyć; po pierwsze: wytępieniem rodzin zniszczonych przez siebie książąt, aby tym czynem odjąć papieżowi możność podburzania takowych; po drugie: zjednaniem sobie wszelkiej szlachty rzymskiej, aby przy jej pomocy trzymać w szachu papieża; po trzecie: przyciągnieniem kardynałów na swoją stronę; po czwarte: utworzeniem za życia papieża takiego państwa, na czele którego on sam jeden pierwszym zapędom mógł opór stawić. Z powyższych środków uskutecznił przy śmierci Aleksandra 88 trzy zupełnie, a czwarty niespełna. Bo gdzie tylko mógł dopaść zrabowane rodziny, wszystkich wymordował, tak że mało kto ocalał; szlachtę rzymską zjednał dla siebie, niemniej w zgromadzeniu kardynałów partia księcia była najsilniejsza. Co do nowych zaborów, będąc panem Perugii i Piombina, równie Pizę wziąwszy w opiekę, chciał podbić Toskanię i nie czując się do względów ku Francji 89 (co w istocie tak było, ponieważ Hiszpany już byli odebrali Francuzom Neapol i obie strony musiały się o jego przyjaźń starać), wkroczył do Pizy. Wnet poddała się Lukka i Siena, częścią z zawiści przeciw Florentczykom, częścią z bojaźni. Nie było więc ratunku dla Florencji i gdyby wyprawa przeciw temu miastu była się powiodła, tak jak rzeczywiście w roku śmierci Aleksandra nastąpiło, wówczas byłby taką moc i takie znaczenie nabył, że sam przez się, o własnych siłach i męstwie bez udziału szczęścia i obcej pomocy, mógłby się był utrzymać. Lecz w pięć lat od chwili, gdy książę pierwszy raz dobył oręża, Aleksander rozstał się z tym światem, zostawiając swego syna w takim położeniu: rząd jego był jedynie w Romanii ustalony, wszędzie indziej panowała niepewność największa, a sam książę, złożony śmiertelną chorobą, leżał pośród dwóch najpotężniejszych wojsk nieprzyjacielskich. Mimo to posiadał on taką odwagę oraz znał sztukę zniewalania sobie lub gubienia ludzi w tym stopniu i nadał swemu państwu w krótkim czasie tak silne podstawy, iż ze wszystkich trudności byłby wyszedł zwycięsko, gdyby nie miał za plecyma 90 owe armie i gdyby nie własna choroba. Że zaś podstawa jego rządu była silna, widzimy stąd, ponieważ Romania dalej miesiąca 91 na jego przybycie czekała i w Rzymie, chociaż na pół umarłemu, żadne nie groziło niebezpieczeństwo, a mimo to, że Boglioni, Vitelli i Orsini udali się do Rzymu, jednak nic przeciw niemu nie rozpoczęli. Nadto, jeśli papieżem nie zdołał uczynić jednego ze swoich partyzantów 92 , przecież mógł był każdego swego przeciwnika usunąć od wystąpienia na stolicę apostolską; a gdyby przy zgonie Aleksandra zdrowie mu służyło, z łatwością byłby wszystkiego dopiął. W dniu wyboru papieża Juliusza II 93 powiedział mi Borgia, że na wszystko, cokolwiek by się przy śmierci ojca wydarzyć mogło, obmyślił dostateczne środki, i że mu jedynie to na myśl nie przyszło, aby równocześnie sam był zgonu bliski."},{"type":"paragraph","text":"Zestawiwszy jego czyny, niepodobna ganić Borgię, przeciwnie, jakem wyżej powiedział, zda mi się, że zasłużył być tym wszystkim za wzór postawiony, którzy władzę państwa przez szczęście lub obcą pomocą osiągnęli. Przy sile swego ducha i pomny na wzniosły swój cel, nie mógł działać inaczej; jedynie krótkość życia Aleksandra i własna słabość zniszczyła jego zamiary."},{"type":"paragraph","text":"Powtarzam więc, że kto w nowym państwie uzna za potrzebne: ubezpieczyć się przeciw nieprzyjaciołom, zwyciężyć siłą lub szalbierstwem, zasłużyć na miłość lub bojaźń ludu, u wojska doznawać posłuszeństwa i być szanowanym, niemniej kto chce wytępić ludzi, co muszą lub mogą go obrazić, kto za pomocą nowych ustaw dawne konstytucje 94 odświeżyć pragnie, kto myśli postępować surowo i łaskawie, wielkodusznie i hojnie, dalej, komu potrzeba zagładzić niewierne, a zaciągać nowe wojska, zawierać przyjaźnie z królami i książętami, aby mu uprzejmie życzliwi byli lub przynajmniej z uszanowaniem go obrażali, kto, mówię, tego wszystkiego chce się nauczyć, ten nie może nad czyny Borgi czerstwiejszych 95 znaleźć przykładów. Szczególny jeden zarzut można mu zrobić, że niestosowny brał udział w wyborze Juliusza II; ponieważ, jakem wyżej powiedział, nie mogąc uczynić papieża wedle swej woli, mógł się elekcji każdego innego kandydata sprzeciwić i nie powinien był nigdy na takiego zezwolić, który go albo obraził, albo, otrzymawszy tiarę, obawiać go się musiał. Ludzie bowiem obrażają innych z bojaźni lub z nienawiści. Między tymi zaś, którzy Borgię obrazili, znajdowali się: San Pietro ad Vincula 96 , Colonna, San Giorgio 97 i Ascanio 98 . Wyjąwszy arcybiskupa Rouen dla jego potęgi, którą przez związek z francuskim królem osiągnął, i wyjąwszy kandydatów hiszpańskich dla pokrewieństwa i wdzięczności, każdy inny kardynał, zostawszy papieżem, musiał go się obawiać; przeto Borgia powinien był się przede wszystkim o elekcję Hiszpana starać, a w razie niemożności miał zezwolić na kardynała Rouen, nigdy zaś na San Pietro ad Vincula. Błędne jest mniemanie, jakoby nowe dobrodziejstwa zacierały między możnymi wspomnienia dawnych ubliżeń. W ten błąd popadł Borgia przy elekcji papieża, co było przyczyną jego upadku."}]},{"id":"rozdział-8-o-tych-którzy-nieuczciwością-i-zbrodniami-dostąpili-panowania","number":11,"title":"Rozdział 8. O tych, którzy nieuczciwością i zbrodniami dostąpili panowania","blocks":[{"type":"paragraph","text":"Są jeszcze dwa sposoby, jakimi prywatny człowiek bez udziału szczęścia i bez waleczności władzę książęcą osiągnąć może, a chociaż jeden z tych środków do rozprawy o republice należy, jednakże i na tym miejscu nie mogę o nich zamilczeć. Sposoby te są: gdy albo niegodziwymi i występnymi czyny dostępuje się władzy państwa lub też jeśli obywatel kraju przez względy swoich współobywateli zostanie księciem swej ojczyzny. Jako przykłady pierwszego sposobu przytoczę dwa zdarzenia, jedno dawnej, drugie świeżej daty, a ponieważ mam za to 99 , że w danym razie proste ich naśladowanie wystarczy, opuszczę wszelki komentarz nad nimi. Agatokles Sycylijski 100 został królem Syrakuz nie tylko z prywatnego, lecz też z niskiego i podłego stanu. Syn garncarza, żył występnie na wszystkich szczeblach swego szczęścia. Do popełnionych zbrodni łączył tyle dzielności ducha i ciała, że zaciągnąwszy się w szeregi wojskowe, dostąpił w Syrakuzach rangi pretora 101 . Na tej posadzie zaczął przemyśliwać, jakby zostać księciem i co robić, aby gwałtem oraz bez żadnej komukolwiek wdzięczności mógł to utrzymać, co mu ogół powierzy. W tym celu porozumiawszy się z kartagińskim Hamilkarem 102 , który wojował w Sycylii, zwołał jednego dnia lud i senat syrakuzański, udając, iż chce się naradzać o sprawach publicznych. Wtedy na dany znak kazał swoim żołnierzom wszystkich senatorów i najmajętniejszych z ludu pozabijać, a po ich śmierci objął i utrzymał władzę bez żadnych domowych rozruchów. Wprawdzie pobili go Kartagińczycy dwa razy i na ostatek wzięli w oblężenie, jednakże zdołał nie tylko swoje miasto obronić, ale zostawiwszy jedną część wojska ku odsieczy, z drugą częścią zaczepił Afrykę, zniósł 103 niebawem oblężenie Syrakuz i przyprowadził Kartagińczyków do tej ostateczności, iż się zgodzili poprzestać na Afryce, a jemu Sycylię ustąpić. Kto zważy czyny i dzielność Agatoklesa, ten przyzna, że jego powodzenie wcale nie lub mało co można szczęściu przypisać, albowiem jak wyżej powiedziałem, godności książęcej, na której się z odwagą i niebezpieczeństwem utrzymał, nie dostąpił przez czyjeś względy, ale zawdzięczał własnemu wojsku, które przy tysiącznym wysileniu i mnogich niebezpieczeństwach umiał sobie zjednać. Niepodobna też nazwać cnotliwym tego, kto morduje współobywateli, zdradza przyjaciół oraz bez czci i wiary przy tym wyzuty z religii jest, bo tymi sposoby można państwo, ale nie sławę osiągnąć. Badając zaś dzielność Agatoklesa co do podejmowania i wykonania czynów niebezpiecznych, tudzież wielkość jego ducha co do znoszenia i zwalczania przeciwności, trudno dopatrzeć powodu, dlaczego miałby w szeregu najznakomitszych mężów pośledniejsze zajmować miejsce. Wszelako dzikie okrucieństwo, nieludzkość i niezliczone zbrodnie, które popełnił, nie dozwalają go między wielkich ludzi zaliczyć, również i tego nie można brać za wynik szczęścia lub dzielności, co bez jednego i drugiego osiągnął. W naszych czasach, za panowania Aleksandra VI, wychowywał Jan Folgiani swego siostrzeńca Oliveretta z Fermo 104 , który do niedawna małego był znaczenia, i zaprawiał go z młodu do służby wojskowej pod Pawłem Vitellim 105 , aby wyuczywszy się żołnierki, mógł znakomitą rangę osiągnąć. Po śmierci Pawła służył Oliveretto pod Vitellozim, bratem Pawła, i dzięki bystrości umysłu, jako też krzepkości ciała i ducha, w bardzo krótkim czasie został jednym z najpierwszych swego pułku. Lecz gdy mu życie z towarzyszami służalczym się wydało, umyślił przy pomocy tych Fermianów, którzy niewolę nad wolność ojczyzny przekładali, i przy wsparciu Vitelloza miastem Fermo zawładnąć. Napisał tedy list do Jana Fogliani tej treści, że po tylu latach nieobecności pragnie wuja i miasto, a po części także swoją ojcowiznę odwiedzić; by zaś okazać współobywatelom swoim, iż nie bez skutku około nabycia sławy pracował, chce okazale wjechać do miasta, otoczony orszakiem konnym złożonym ze stu przyjaciół i sług; list zakończył prośbą, by Fogliani nakłonił Fermianów, aby go zacnie przyjęli, bo takie przyjęcie nie tylko jemu samemu, ale też jego nauczycielowi cześć przyniesie. Jan nie zaniedbał żadnego obowiązku naprzeciw siostrzeńcowi, a wyjednawszy u Fermianów świetne jego przejęcie, umieścił go w swoim domu, gdzie Oliveretto po kilku dniach, użytych na przygotowaniach do przyszłej zbrodni, wspaniałą ucztę wyprawił i wuja oraz wszystkich znaczniejszych obywateli Fermo na nią sprosił. Po spożyciu potraw i po innych przy podobnych ucztach używanych zabawach rozpoczął Oliveretto naumyślnie poważne rozmowy o potędze papieża Aleksandra i jego syna Cezara i o ich zamysłach, a skoro się do tej rozmowy Jan z innymi gośćmi przyłączył, zerwał się Oliveretto, twierdząc, że o takich rzeczach trzeba na ustronnych miejscach rozprawiać, i udał się do przyległej komnaty, a za nim poszli Jan i wszyscy inni goście. Zaledwie usiedli, aliści z ukrytych miejsc wypadli żołnierze i Jana z całym zgromadzeniem do nogi wyrznęli. Po tym zabójstwie Oliveretto, dosiadłszy konia, przeleciał miasto, zamknął na ratuszu najwyższych urzędników i groźbami zmusił ich do posłuszeństwa i do uformowania rządu, na czele którego sam stanął. Wytraciwszy wszystkich swoich przeciwników, umocował się cywilnymi i wojskowymi ustawami tak rześko, że po roku panowania nie tylko silny w Fermo, ale też groźny wszystkim sąsiadom był i pokonanie go, równie jak Agatoklesa, byłoby trudne, gdyby się nie był dał Cezarowi Borgii w Senigalii razem z Orsinimi i Vitellimi (o czym wyżej było) w sidła ułowić, gdzie w rok po dopełnionym ojcobójstwie został uduszony razem z Vitellozim, swym nauczycielem cnót i zbrodni."},{"type":"paragraph","text":"Tu by można zapytać, skąd pochodzi, że kiedy Agatokles i jemu podobni, popełniwszy niezliczone zdrady i okrucieństwa, przez długi czas bezpiecznie w swej ojczyźnie żyli, od zewnętrznych nieprzyjaciół się bronili, zaś wewnątrz swego państwa żadnych spisków nigdy nie doznawali, inni nie zdołali ani w pokoju, ani czasu wojny za pomocą okrucieństwa państwo utrzymać. Myślę, że to zależy od tego, czy źle lub dobrze zażywamy okrucieństwa. Okrucieństwo jest dobrze użyte (jeśli złe można dobrym nazwać), gdy się go tylko jeden raz dla własnej pewności wykona, a później zaniecha okrucieństwa i takowe zamienia na wszelkie możebne korzyści poddanych. Jeśli zaś okrucieństwo na początku małe, z czasem, zamiast się zmniejszać, wzrasta, takie okrucieństwo jest złe. Wykonawcy pierwszego sposobu mogą na wzór Agatoklesa, przy boskiej i ludzkiej pomocy, krytyczne położenie państwa zażegnać; zwolennicy sposobu drugiego muszą upaść. Dlatego przy zdobywaniu cudzego państwa powinien zaborca dobrze obliczyć, jakie urazy są niezbędnie potrzebne, aby później wszystkie jednym zamachem wykonać i co dzień takowych nie powtarzać, a tym samym, aby ludzi od dalszych uraz zabezpieczyć i łaskami ich sobie zjednać. Kto działa inaczej, czy to z bojaźni, czy ze złej rady, musi ciągle nóż w rękach trzymać i nigdy nie może się spuścić na swoich poddanych, bo ci, ustawicznymi nękani zniewagami, nie mogą mu dowierzać. Wszystkie obelgi trzeba od razu wykonać, aby ludzie w nich długo nie kosztowali, co by im tylko większe przykrości sprawiło; przeciwnie, wszystkie łaski trzeba z wolna wyświadczać, aby w nich dłużej smakowano. Przede wszystkim powinien książę tak ze swymi poddanymi postępować, aby żaden zły ani przyjazny wypadek nie mógł go z toru zbić; ponieważ w trudnych czasach nie można surowo panować, łagodne zaś panowanie nie popłaca, bo mówią, że nastąpiło poniewolnie 106 i za nic nie poczytują."}]},{"id":"rozdział-9-obywatelska-władza-państwa","number":12,"title":"Rozdział 9. Obywatelska władza państwa","blocks":[{"type":"paragraph","text":"Przystępuję do tego wypadku, kiedy krajowiec krwi książęcej ani zbrodnią, ani innymi nieznośnymi gwałty, lecz przez życzliwość współobywateli osiągnie koronę w swej ojczyźnie, czyli tak zwaną władzę obywatelską. Władza ta albo zupełnej cnoty, albo niezwykłego szczęścia, a najbardziej skutecznej wymaga przebiegłości, i można ją dostąpić z łaski ludu lub z łaski panów. W każdym bowiem państwie są dwa przeciwne prądy, które stąd pochodzą, że lud nie chce być przez panów rządzony i gnębiony, a panowie pragną ludem rządzić i tenże uciskać. Z tych dwóch przeciwnych skłonności wylęga się w państwie księstwo, wolność lub swawola. Lud albo panowie wznoszą księstwo stosownie do przewagi jednej lub drugiej partii. Bo gdy panowie poznają, że nie podołają ludowi, zgodzą się na jednego spośród siebie i zrobią go księciem, aby pod jego zasłoną mogli wyzionąć swoje chucie 107 . To samo lud, widząc, że się nie oprze panom, godzi się na jednego i dla własnej obrony robi go księciem. Książę z łaski panów ma większe trudności, aby się utrzymać, niż książę z łaski ludu, ponieważ tamtego wiele osób otacza, co mu równymi się być sądzą i którym nie może ani rozkazywać, ani też ich według upodobania zażywać 108 ; przeciwnie, książę przez lud wybrany stoi samowładnie, któremu wcale nikt, a przynajmniej rzadko kto posłuszeństwa odmawia. Nadto niepodobna panów bez obrazy ludu zadowolnić 109 , zaś lud łatwo zaspokoić bez obrazy panów, ponieważ cele jego o wiele szlachetniejsze niżeli cele panów, gdyż ci dążą do ujarzmienia, tamten do tego, aby nie być ujarzmionym. Także i o tym trzeba pamiętać, że w razie rozruchów łatwiej się zabezpieczyć od garstki panów niż przed mnóstwem ludu. W ostatecznym bowiem wypadku nic gorszego nie może księcia od rozhukanego ludu spotkać jak to, że go opuści; lecz nieprzychylność panów nie tylko go opuścić, ale zdoła także bunt przeciw niemu podnieść, ponieważ mając więcej poznania i więcej chytrości, zawczasu chcą się zabezpieczyć i nadskakują temu, o którym sądzą, że zwycięży. Lud zawsze jeden i ten sam księcia otacza, podczas gdy panów można zmienić i według upodobania każdej chwili wolno księciu jednych panów wynosić, drugich upokarzać, jednym dostojności nadawać, drugim takowe odejmować. Dla lepszego tej rzeczy wyjaśnienia twierdzę, że dwa są sposoby postępowania z panami: albo się do twego losu zupełnie przywiążą, albo nie. Pierwsi, jeśli nie są drapieżni, powinni być szanowani i lubieni; co się tyczy drugich, trzeba rozróżniać: małodusznych i nieodważnych powinieneś zażywać, zwłaszcza tych, którzy mają zdrowe zdanie, bo w szczęściu poważają cię, a w nieszczęściu nie masz ich się czego obawiać. Lecz jeśli z fortelów i dla dumy nie są ci przychylni, znak to oczywisty, że więcej o siebie niż o ciebie dbają. Takowych musi się książę wystrzegać i za potajemnych uważać nieprzyjaciół, ponieważ w nieszczęściu dopomagaliby do jego upadku. Idzie więc za tym, że książę z łaski ludu winien się starać o jego przychylność, co wcale nietrudno, bo lud tylko uwolnienia od ucisku pragnie. Lecz kto z łaski panów, wbrew woli ludu księciem został, ten jeszcze bardziej o przychylność ludu starać się powinien, co także z łatwością może osiągnąć, skoro ludem będzie się opiekował. A ponieważ ludzie, doznawszy dobrodziejstw od mniemanego nieprzyjaciela, tym więcej mu są przychylni, więc takiemu księciu lud skorzej się podda niżeli innemu, którego sam sobie za pana wybrał. Mnogie są sposoby do przyciągnienia 110 ludu na swoją stronę, lecz gdy w tej mierze żadnej stałej zasady nie ma i wszystko od okoliczności zależy, nie będę się nad nimi zatrzymywał. Zamknę jedynie moje badanie tą uwagą, że każdy książę powinien się starać o przyjaźń ludu, inaczej w razie potrzeby nie będzie miał ratunku. Nabis 111 , książę Sparty, zapewniwszy sobie przyjaźń niewielu osób, wytrzymał oblężenie tak od całej Grecji, jako też od walecznej armii rzymskiej, i tym obronił swoją ojczyznę i państwo; lecz to wszystko byłoby mu nie pomogło, gdyby lud był przeciw niemu. Niech mi nikt nie przeciwstawi oklepanego przysłowia: „Kto na ludzie buduje, ten pisze na piasku”, ponieważ to przysłowie tylko w tym wypadku można zastosować, jeśli prywatny obywatel przeciw obcym nieprzyjaciołom lub przeciw uciskowi urzędów lud o pomoc wzywa. Taki może się łatwo oszukać, jak to Grakchowie 112 w Rzymie i Jerzy Scali 113 we Florencji doznali. Lecz panujący musi się na ludzie opierać, a jeśli do tego posiada serce i umie rozkazywać, przeciwnościami nie da się zastraszyć, jeśli stosowne przedsięweźmie urządzenie i zdoła powszechny zapał dla swej sprawy utrzymać, wówczas nigdy go lud nie zawiedzie i taki książę założy trwały fundament dla swego państwa."},{"type":"paragraph","text":"Przejście z władzy ograniczonej do samodzierstwa naraża rząd państwa na niejakie niebezpieczeństwo; tego bowiem rodzaju panujący rządzą albo sami lub też przez urzędników. Państwo rządzone za pośrednictwem urzędników jest nader słabe i wątłe, ponieważ zupełnie dependuje od tych obywateli, co urzęda piastują, którzy w czasie zaburzeń oporem lub odmówieniem posłuszeństwa łatwo je zgubić mogą; gdy zaś obywatele i poddani, przyzwyczajeni do rozkazów urzędniczych, w krytycznej chwili słuchać księcia nie chcą, więc on, zostając w kłopotach, nie może myśleć o zrobieniu się samowładnym i zastęp jego powierników będzie nieliczny. Książę, o którym mówię, nie może na to liczyć w nieszczęściu, na czym się fundował w czasie pokoju; bo dopóki czasy spokojne, obywatele są za księciem, każdy go strzeże i każdy przyrzeka umrzeć za niego, kiedy niebezpieczeństwa nie widać; lecz skoro nastaną burzliwe czasy i państwo obywatelów zapotrzebuje, wtedy mniemane pomocniki w domu siedzą. A tym niebezpieczniejsze jest podobne doświadczenie, ile go tylko raz jeden dożyjemy. Z tych powodów powinien mądry książę takie obmyślić środki, aby zawżdy i w każdym razie obywatele czuli potrzebę egzystencji państwa i rządu, a pewnie 114 pozostaną mu wiernymi."}]},{"id":"rozdział-10-modła-115-do-ocenienia-potęgi-każdego-państwa","number":13,"title":"Rozdział 10. Modła 115 do ocenienia potęgi każdego państwa","blocks":[{"type":"paragraph","text":"W badaniu istoty państwa zachodzi pytanie, czy posiada książę tyle sił, aby w potrzebie sam się obronił, czy też wymaga do tego obcej pomocy? By to lepiej wyjaśnić, mówię, że ci, którzy mają dość ludzi lub pieniędzy, aby mogli stosowną wystawić armię i stoczyć bitwę z nieprzyjacielem, sami zdołają państwo utrzymać; lecz kto nie może przyjąć walki i tylko za murami schronienia szuka i takowych bronić musi, ten potrzebuje obcej pomocy. O pierwszym wypadku mówiło się wyżej, a poniżej ponownie będzie mowa. W drugim zaś razie nic innego nie można księciu radzić, jak to, aby oprowiantował i ufortyfikował swoje miasto, wcale nie zważając, co się stanie z prowincją. Gdy ludzie nie lubią podejmować trudnych przedsiębiorstw 116 oraz niełatwa zaczepka tego księcia, który swoje miasto obwarował, od ludu nie jest znienawidzony i stosunki z sąsiadami i poddanymi według podanych, a później uzupełnić się mających prawideł uregulował, przeto takiego księcia tylko z wielką ostrożnością można zaczepić. Niemieckie miasta przy małej przestrzeni za murami wielkie mają wolności, cesarza słuchają według upodobania i nie lękają się ani jego, ani potęgi własnych książąt, ponieważ tak są obwarowane, że każdy trzyma 117 ich oblężenie za rzecz żmudną i trudną, gdyż mają odpowiednie rowy, mury i dział dosyć, a po lochach chowają jadła, napojów i opału na cały rok. Nadto aby lud bez krzywdy ogółu wyżywić, pozwalają mu takim przez jeden rok oddawać się rzemiosłom, które są żywotne i właściwe dla miast tamtejszych, a przy tym stanowią zarobek ludu; żołnierka jest u nich w wielkim poważaniu i względem niej mają różne ustawy. Przeto książę posiadający silne miasto i miłość ludu nie może być oblężony, a gdyby się to przecie wydarzyło, ze wstydem odciągnąłby oblężca, bo przy zmienności spraw ludzkich jest prawie niepodobieństwem, aby kto z wojskiem cały rok nieczynnie obozem leżał. Na zarzut, że lud, widząc swoje zamiejskie realności 118 w płomieniach, straci cierpliwość i w długim oblężeniu, popychany egoizmem, zapomni o księciu, odpowiadam, iż silny i odważny książę potrafi wszystkie te trudności zwalczyć bądź rozsiewaniem nadziei, że zło nie potrwa długo, bądź poruszeniem trwogi przed okrucieństwem nieprzyjaciela, albo też zręcznym zagorzalców ujęciem. Zresztą gdy nieprzyjaciel zwykle na początku oblężenia i kiedy umysły oblężonych są roznamiętnione i do walki pochopne 119 , pożogę i zniszczenie szerzy, oblężony książę powinien tym mniej zaniedbywać odporu, gdyż po kilku dniach, skoro umysły ostygną, szkody już wyrządzono, krzywdy poniesiono i każdy środek jest spóźniony, lud zaś, doznawszy w obronie księcia pożaru siedlisk i zniszczenia pól swoich, będzie się z nim tym silniej łączył, ile że się od niego wdzięczności spodziewa. Wrodzona jest bowiem ludziom własność 120 zobowiązywać się tak samo uczynionymi, jak i doświadczonymi dobrodziejstwy. Zważywszy to wszystko, okazuje się, że mądremu księciu, któremu nie brakuje żywności i strzeliwa, utrzymanie ducha w ludzie oblężonym wcale nie jest trudne."}]},{"id":"rozdział-11-o-państwach-kościelnych","number":14,"title":"Rozdział 11. O państwach kościelnych","blocks":[{"type":"paragraph","text":"Pozostaje mi do mówienia o kościelnych państwach, względem których wszelkie trudności poprzedzają posiadanie. Takowe państwo można osiągnąć walecznością lub szczęściem, lecz aby je utrzymać obejdzie się bez tych przymiotów, bo dawne ustawy religijne, które im za podwaliny służą, mają tę moc i własność, iż przy bądź jakim postępowaniu i życiu książąt ciągle ich na tronie utrzymują. Oni to stanowią wyjątek między panującymi; albowiem posiadają państwo, ale go nie bronią, mają poddanych, ale nimi nie rządzą, a chociaż nie bronią państwa, przecie go nie tracą, również poddani tym się nie troszczą, że nikt nimi nie rządzi i nie myślą o reformie w rządzie, gdyż nie zdołają takowej zaprowadzić. Tylko tacy książęta są bezpieczni i szczęśliwi. Lecz to się dzieje za wyższym postanowieniem, dokąd nie sięga rozum ludzki, dlatego lepiej o tych sprawach zamilczeć, których opiekunem i stróżem jest Bóg i o których tylko zarozumiały śmiałek poważyłby się rozprawiać. Gdyby mnie przecie zapytano, skąd pochodzi, że świecka władza Kościoła, którą aż do Aleksandra papieża nie tylko wszyscy włoscy książęta, ale nawet każdy baron i rycerz mało sobie ważyli, teraz tyle spotężniała, iż przed nią król Francji truchleje i z Włoch ustępuje, a Wenecja do upadku przywiedziona, gdyby, mówię, mnie o to zapytano, nie trzymałbym 121 za zbyteczne następujące okoliczności, lubo dobrze znane, w pamięć przywołać. Przed wkroczeniem Karola francuskiego rządzili we Włoszech: papież, Wenecjanie, król Neapolu, mediolański książę i Florentczycy, a wszystkich staranie było ku temu skierowane, aby żaden cudzoziemiec nie wdarł się na czele armii do Italii i żeby żaden z włoskich panujących zbytnio nie urósł w potęgę. Najwięcej zależało na tym papieżowi i Wenecjanom. Do powstrzymania Wenecjan potrzebny był związek innych rządów, podobny temu, który obronił Ferrarę; by papiestwo na wodzach trzymać, użyto rzymskich baronów, którzy, podzieleni na dwie partie Orsinich i Colonnów, ustawiczne między sobą toczyli walki, a uzbroiwszy się pod bokiem papieża, zrobili go wątłym i słabym. Lubo czasem nastał jaki odważny papież, np. Sykstus 122 , jednakowo ani szczęście, ani nauka nie mogły go wybawić z tego kłopotu. Do tego przyczynił się niemało krótki ich żywot, bo w dziesięciu latach, owym przeciętnym czasie panowania każdego papieża, zaledwie było można poskromić jedną partię, a jeśli jeden papież utarł rogi Colonnom, to znów jego następca nie sprzyjał Orsinim i wywyższał Colonnów, których za poprzednika nie było czasu zupełnie poskromić. Stąd poszło, że świecka papieżów władza mało znaczyła we Włoszech. Z kolei nastał papież Aleksander VI, który wykonawszy za pośrednictwem księcia Valentina, wtedy gdy Francuzi do Włoch wkroczyli, wszystkie te sprawy, które w rozdziale o tym księciu przytoczyłem, okazał światu nad wszystkich swoich poprzedników, co znaczą w rękach papieża złoto i siła. Chciał on wprawdzie tylko księcia, a nie Kościół wzmocnić, lecz stało się przeciwnie i wszystkie jego czyny podniosły jedynie znaczenie Kościoła, który po śmierci papieża zgnębił księcia i odziedziczył jego prace. Papież Juliusz zastał Kościół silny, cała Romania podlegała jego władzy, znaczenie rzymskich baronów zgasło, również fakcje 123 dokuczaniem Aleksandra były zniszczone; ten papież wynalazł taki sposób pomnażania skarbu, którego Aleksander, jego poprzednik, nie używał. Wszystkie te dogodności Juliusz nie tylko zatrzymał, ale i zwiększył, zamyślał nawet o nabyciu Bolonii, o poskromieniu Wenecji i o wypędzeniu Francuzów, a każda rzecz udała mu się z tym większym zaszczytem, ile zawżdy nie z prywaty, lecz dla Kościoła działał. Orsinich i Colonnów utrzymał w takim stanie, w jakim ich zastał; byli wprawdzie między nimi śmiałki, lecz z dwóch przyczyn nie zrywali się: pierwsza przyczyna była trwoga przed wspaniałością Kościoła, druga zaś ta okoliczność, że żaden z nich nie był kardynałem, a tym samym nie było bodźca do rozruchów. Skoro bowiem który zostanie kardynałem, wnet wszczynają się niepokoje, albowiem kardynały zasilają partie tak w Rzymie, jak i na innych miejscach, a barony muszą bronić kardynałów i tym sposobem duma prałatów rodzi zwaśnienie i zatargi między baronami. W stanie najwyższej potęgi objął świątobliwy papież Leo 124 stolicę rzymską i tuszymy 125 , że kiedy jego poprzedniki zdołali ją orężem rozszerzyć, on dobrocią i innymi swymi cnoty wywyższy ją i uzacni."}]},{"id":"rozdział-12-o-różnych-gatunkach-milicji-i-wojska-najemnego","number":15,"title":"Rozdział 12. O różnych gatunkach milicji i wojska najemnego","blocks":[{"type":"paragraph","text":"Wyłożywszy szczegółowo wszystkie własności księstw, o którychem 126 mówić przedsięwziął, i gdym poniekąd zbadał przyczyny dobrego lub złego ich bytu oraz okazał sposoby, jakimi wielu się starało nabyć takowe i utrzymać, pozostaje mi ogólna rozprawa nad obroną i zaczepką, które się każdemu z wymienionych państw wydarzyć mogą. Jużeśmy wyżej powiedzieli, że każdemu księciu, jeżeli upaść nie chce, trwała rządu podstawa niezbędnie jest potrzebna. Dobre ustawodawstwo i armia waleczna oto najważniejsze podwaliny każdego państwa bądź nowego, dawnego, lub mieszanego, a ponieważ ustawodawstwo nie może być dobre, gdzie nie ma walecznej armii, zaś do istnienia dobrej armii potrzeba dobrych ustaw, więc pomijam ustawodawstwo i będę mówił o armii. Wojska do obrony państwa mogą być własne lub najemne, posiłkowe lub mieszane. Wojska najemne i posiłkowe są nieużyteczne i niebezpieczne, a państwo na nich polegające nigdy nie będzie silne ani bezpieczne, bo w tym wojsku nie ma jedności, ale jest pycha, niekarność, niewierność, zuchwałość między swoimi, tchórzostwo wobec nieprzyjaciela, brak bogobojności, wiarołomstwo i upadek państwa tylko na tak długo odwleczony, dopóki przeciwnik nie natrze. W czasie pokoju rabuje nas własne takie wojsko, w czasie wojny rabuje nieprzyjaciel. Przyczyna leży w tym, że ani z przywiązania, ani z innej pobudki, tylko jedynie dla żołdu idą do boju, a żołd bynajmniej nie wystarcza, aby śmierć za cudzą sprawę ponieśli. Jak długo nie ma wojny, zostają w służbie; skoro wojna wybuchnie, uciekają lub biorą dymisję. Nie będę miał wiele trudów okazać, dlaczego tak, a nie inaczej się dzieje; wszak upadek Italii nie z czego innego powstał, tylko z długoletniego używania wojsk najemnych, które się czasem dobrze sprawiły i między swoimi za dzielnych uchodziły, lecz gdy cudzoziemiec wkroczył, okazały swą naturę. Jedynie w tym składzie rzeczy mógł francuski król Karol jednym zamachem Włochy zagarnąć; i przypisać to naszym błędom zgadza się z prawdą, chociaż nie były to błędy zwykłe, ale te, o których wyżej mówiłem, słowem były to błędy książąt, za które pokutowali. Teraz chciałbym dokładniej okazać opłakane skutki wojsk najemnych. Ich hetmani albo są dobrymi lub złymi wojownikami. W pierwszym razie ubiegają się za własną sprawą i gnębią chlebodawcę swego lub jego zwolenników i dlatego nie można im zawierzać, zaś zły hetman sam przez się zgubi swego pana. Rzeczesz, że każdy wódz, najemny lub nienajemny, byle tylko władzę miał w ręku, to samo uczyni. Na to odpowiadam, że książę powinien sam wojskiem dowodzić, a republiki powinny na wodza wybierać obywatela i odwołać go, skoro niewaleczny, a jeśli waleczny, każdy wybryk prawami uniemożebnić 127 . Doświadczenie nas uczy, że książęta na czele wojsk i uzbrojone republiki olbrzymie wykonują dzieła, wojska zaś najemne tylko klęski sprawiają. Toż upokorzenie zbuntowanego obywatela łatwiejsze jest dla republiki utrzymującej własne wojsko niż dla tej, która polega na armii cudzoziemskiej. Wolność Rzymu i Sparty, jak długo te państwa były uzbrojone, trwała wieki. Szwajcarzy są bardzo uzbrojeni, a przy tym najwolniejsi. W starożytności Kartagina może służyć za przykład skutków wojsk najemnych. Została ona bowiem po pierwszej wojnie z Rzymem, pomimo tego, że właśni obywatele byli wodzami, przez to wojsko uciemiężona. Filip Macedończyk, obrany przez Teban za hetmana po śmierci Epaminonda 128 , zwyciężył wprawdzie, ale też i wolności ich pozbawił. Kiedy książę Filip 129 umarł, Mediolan zaciągnął na żołd przeciw Wenecjanom Franciszka Sforzę, ten zaś zwyciężywszy nieprzyjaciela pod Caravaggio, zniósł się 130 z nim, by własnych chlebodawców uciemiężyć. Ojciec jego, Sforza 131 , pozostając w służbie u Joanny 132 , królowej Neapolu, wypowiedział jej od razu wszelkie usługi i tym samym zmusił, że dla ratowania państwa rzuciła się na łono króla Aragonii. Gdyby kto zarzucił, iż wbrew memu twierdzeniu, Wenecjanie i Florentczycy takim wojskiem państwa swoje powiększyli, a wodzowie, nie narzucając się za książąt, ich bronili, temu odpowiem, że w tym zdarzeniu los sprzyjał Florencji, ponieważ z walecznych hetmanów, których się wcale miała czego obawiać, jedni zwycięstwa nie odnieśli, drudzy trafili na przeciwności, inni skierowali swoje zamiary ku czemu innemu. Do pierwszych należy Jan Acuto 133 , którego wierności nie można było doświadczyć, ponieważ nie zwyciężył; lecz bez wątpienia po pierwszym zwycięstwie byłby zawładnął Florencją. Franciszek Sforza miał ustawicznych przeciwników w partii Braccia 134 , gdyż wzajemnie nie ufali sobie. Duma Franciszka myślała o Lombardii, duma Braccia o Rzymie i o Neapolu. Przystępuję do nowszych czasów. Dzielnemu Pawłowi Vitelliemu, który jako obywatel wielką miał sławę, Florentczycy dali buławę. Nie można zaprzeczyć, że podbiwszy Pizę, według własnej woli mógł postąpić z Florencją; bo gdyby był przeszedł do nieprzyjaciela, znikąd nie miałaby ona pomocy, zaś gdyby przy niej był pozostał, musiałaby go była słuchać. Wenecjan widzimy tak długo zdeterminowanych i zwycięskich, dopóki własnych sił zażywali, na lądzie nie wojowali i rodzimą szlachtą tudzież własnym ludem się zastawiali; lecz skoro teatr wojny na ląd przenieśli, stracili waleczność i poszli w ślady innych państw włoskich. Na początku zwycięstw, kiedy weneckie państwo nie było rozległe, ale za to wielkie miało poważanie, nie mieli się czego wodzów obawiać, lecz rozszerzając się pod Carmagnuolą 135 , postrzegli, że są na złej drodze. Byli bowiem widzami wielkiej jego waleczności i dowodził nimi w podbiciu księcia Mediolanu, a widząc go nieubłaganym na wojnie, sądzili, iż pod nim dalej zwyciężać nie mogą, ani też chcieli, ani mogli go usunąć z obawy, aby tego nie postradać, co osiągnęli. Przeto dla własnego bezpieczeństwa musieli go zabić. Pod następnymi wodzami: Bartłomiejem z Bergamo, Robertem z San Severino, hrabią Pitigliano i innymi musieli się tylko klęsk, a żadnych zwycięstw spodziewać, zarówno jak się wydarzyło w bitwie pod Vaila, gdzie wszystko co przez osiemset lat mozolnie nabyli, w jednym dniu stracili. Widzimy, że ten system wojowania ciągnie za sobą powolne, opóźnione i małe korzyści, podczas gdy straty z niego są raptowne i zatrważające. A gdym się w przytoczeniu przykładów z włoskich krajów, gdzie od lat wielu używają wojsk najemniczych, tak daleko zapuścił, chciałbym rzecz głębiej zbadać, aby przez okazanie początku i rozkrzewienia złego, tym snadniej mu zaradzić. W miarę jak cesarska władza w Italii upadała, podnosiła się świecka władza papieża i to było powodem, że Włochy na różne państwa podzielono. Wiele znakomitych miast podniosło oręż przeciw swym władcom, którym cesarz w uciemiężeniu dopomagał, ludy zaś wspierało papiestwo dla zjednania sobie poważania świeckiego. W innych miastach obywatele zostali książętami. Tym sposobem rozdzielono Włochy między Kościół i kilka republik, a cudzoziemców zaczęto w żołd brać, bo ani ksiądz, ani obywatel nie umiał władać orężem. Pierwszym w rozsławieniu tego wojska był Alberigo da Como Romaniolio. Szkoła jego wydała między innymi Braccia i Sforzę, którzy w swoim czasie Włochami rządzili. Po nich nastąpili ci wszyscy, którzy aż do teraz armiom włoskim hetmanili; owoce ich waleczności w tym się zawarły, że Karol Włochy napadł, Ludwik zrabował, Ferdynand Aragończyk 136 uciemiężył, a Szwajcarzy zgwałcili. Oni to wzięli sobie za regułę najpierw piechotę osławić, aby tym sposobem siebie wywyższyć, a to dlatego, bo nie mieli kraju ani utrzymania; garstka piechoty nie wystarczała dla ich pychy, zaś wielkiej jej liczby nie mieli czym żywić. Przeto wbijali się w konnicę, ponieważ niewielką jej liczbą i swoje utrzymanie zapewnili, i sławę osiągnęli. To wszystko posunięto do tej ostateczności, że w dwudziestotysięcznej armii nie było dwu tysięcy piechoty. Nadto dokładali wszelkich starań, by swoje życie ocalić, a żołnierzy uwolnić od trudów i bojaźni. I tak: nie zabijali się w bitwach, lecz więzili się bez krwi rozlewu; w nocy nie przypuszczali szturmów do nieprzyjacielskich warowni, ani też nie robili wycieczek ze swoich warowni; naokoło namiot
