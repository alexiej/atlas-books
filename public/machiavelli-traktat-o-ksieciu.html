ów nie wbijali palisadów i nie kopali rowów; zimą nie obozowali w polu. Ich wojskowy porządek pozwalał na wszystko, aby tylko, jak się wyżej rzekło, trudy i niebezpieczeństwa oddalić. Przez takie postępowanie popadły Włochy w niewolę i w niesławę."}]},{"id":"rozdział-13-o-wojskach-pomocniczych-mieszanych-i-narodowych","number":16,"title":"Rozdział 13. O wojskach pomocniczych, mieszanych i narodowych","blocks":[{"type":"paragraph","text":"Drugi rodzaj niepożytecznego wojska są wojska pomocnicze, mianowicie jeśli zawezwiesz innego monarchę, by ze swoim wojskiem przyszedł cię ratować i bronić, jak temu niedawno uczynił papież Juliusz, który zrobiwszy pod Ferrarą smutne doświadczenie z najemnikami, udał się do Ferdynanda króla hiszpańskiego, aby mu ze swoim dopomógł wojskiem. Dla ratujących mogą te wojska użyteczne być i dobre, lecz są zawżdy szkodliwe dla poratowanych, ponieważ po przegranej jesteś zwyciężonym, po wygranej ujarzmionym. Chociaż dzieje starożytne przepełnione są 137 w podobne przykłady, pozostanę przy Juliuszu jako całkiem świeżym. Nie mógł on gorzej postąpić, jak się oddać w opiekę cudzoziemca dla odzyskania Ferrary. Na jego szczęście zaszło niespodziane zdarzenie, że nie uczuł skutków błędu swego; bo po klęsce sprzymierzonych pod Rawenną powstali Szwajcarzy i przeciw wszelkiemu oczekiwaniu wypędzili zwycięzców, zatem Juliusz nie popadł w ręce nieprzyjaciela, bo ten został pobity, ani też w ręce swoich aliantów, gdyż innym, a nie ich orężem odniósł zwycięstwo. Bezbronni Florentczycy przywołali dziesięć tysięcy Francuzów dla zdobycia Pizy, co im więcej niebezpieczeństwa sprawiło, niżeli kiedykolwiek indziej doświadczali. Aby bronić Grecji przeciw sąsiadom, posłał cesarz z Konstantynopola dziesięć tysięcy Turków, którzy po ukończonej wojnie nie chcieli ustąpić i to było początkiem opanowania Grecji przez niewiernych. Z tego widzimy, że tylko ten wojsk pomocniczych może zażywać, kto nie chce sam zwyciężyć. Są one bowiem o wiele niebezpieczniejsze niż najemne, upadek z nimi jest gotowy, bo są zjednoczone i komu innemu podwładne. Zaś wojsko najemne potrzebuje więcej czasu ku twemu prześladowaniu i więcej sposobności, ponieważ nie stanowi jednolitego ciała i od ciebie pozbierane i płatne jest, a jego naczelnik, któregoś sam mianował, nie może w krótkim czasie do tego znaczenia przyjść, aby cię skrzywdził. Krótko mówiąc, największym niebezpieczeństwem przy najętych wojskach jest gnuśność, przy pomocniczych waleczność. Przeto każdy trochę mądry książę unikał tego gatunku wojska, a używał swoich ludzi i przegraną z nimi przenosił nad wygraną z obcymi, będąc tego przekonania, że wygrana z cudzą pomocą nie jest żadną wygraną. Nie waham się bynajmniej przytoczyć tu Cezara Borgii i jego czynów. Na czele francuskich wojsk pomocniczych wtargnął do Romanii i zajął Imolę i Forli, a nie znajdując w tym wojsku dość pewności, sądził, że najemniki będą bezpieczniejsi; wziął przeto na żołd Orsinich i Vitellich. Lecz skoro ci w następnych potrzebach swoją dwuznaczność, niewierność i niepewność okazali, rozpuścił ich także i do własnych wrócił się ludzi. Różnicę między powyższymi wojskami łatwo pojąć, skoro się zauważy znaczenie, jakie wówczas książę miał, gdy utrzymywał Orsinich i Vitellich, a wtedy, gdy własne posiadał wojsko. Dopiero wtenczas zjednał sobie ogólny szacunek, kiedy powszechnie było wiadomo, że kompletnie panuje nad swoją armią. Niechętnie opuszczam dzieje włoskie, jednakże nie mogę pominąć Hierona z Syrakuz, o którym wyżej wspomniałem. Syrakuzanie, jak to już powiedziałem, wybrali go na hetmana, a gdy w krótkim czasie poznali, że wojsko zaciężne niezdatne, ponieważ ich dowódcy równali się kondotierom 138 włoskim, rozkazał ich, nie mogąc dłużej ani trzymać, ani rozpuścić, w kawałki posiekać, i wojnę o własnych siłach, bez cudzej pomocy, dalej prowadził. Przypomnę tu jeszcze jedno zdarzenie ze Starego Testamentu . Kiedy Dawid Saulowi ofiarował się zwyciężyć wyzywającego Goliata Filistyna, uzbroił go Saul własnym orężem, by mu dodać odwagi. Przywdziawszy go na siebie, Dawid wzbraniał się walki, mówiąc, że w tej zbroi nie może sobie dowierzać, i wolał swoją procą i puginałem z nieprzyjacielem się potykać. Streszczając, mówię tedy, że cudze wojska albo opuszczają, albo gnębią, albo też niszczą tego, który ich zawezwał. Poznał to Karol VII 139 , ojciec Ludwika XI, a uwolniwszy Francję od Anglików szczęściem i walecznością, zaprowadził konnicę i piechotę. Jego syn i następca, Ludwik, rozpuścił piechotę całkowicie, zamiast niej sprowadził najemnych Szwajcarów, a ten błąd w połączeniu z innymi, spowodował, jak to teraz widzimy, wielkie niebezpieczeństwo dla królestwa. Kiedy bowiem król przydał znaczenia Szwajcarom i rozwiązał piechotę, jego konnica nawykła walczyć w towarzystwie Szwajcarów tak dalece, że straciła ufność, by mogła bez nich zwyciężać. Stąd poszło, że Francuzi Szwajcarom nie podołają, a bez nich nic zdziałać nie potrafią. Przeto zreformowano francuskie wojsko na mieszane, czyli na takie, które po części najemne jest, po części własne, i to wojsko jest o wiele lepsze, niżeli czysto najemne lub czysto auxiliarne 140 , ale zawżdy o wiele gorsze od własnego. Dość na przytoczonym przykładzie, ponieważ Francja byłaby niezwyciężona, gdyby system Karola zatrzymany i dalej rozwinięty został. Tak to mędrkowatość ludzi rozpoczyna rzecz na pozór dobrą, lecz w gruncie jad chowającą, o czym już dawniej, przy suchotach mówiłem. Ten mąż stanu nie jest mądry, który wady państwa dopiero wtedy poznaje, gdy się już zakorzenią; lecz i to prawda, że dalekowidzenie jest nader rzadkim przymiotem statysty 141 . Pierwotną przyczyną upadku Rzymu było żołdowanie Gotów, bo odtąd wątlały siły państwowe, a męstwo, co Rzymianie tracili, przelewało się na Gotów. Twierdzę więc, że egzystencja każdego państwa tak długo jest niepewna, dopóki nie posiada narodowego wojska, i tylko na łasce szczęścia pozostaje, gdyż takie państwo nie ma sił, co by je w zaburzeniach ocalić mogły. Było zawżdy zdaniem i wyrocznią mądrych ludzi, że nie masz nic słabszego i mniej stałego nad sławę tego rządu, który się nie opiera na rodzimych siłach. Narodowym wojskiem nazywamy to, które się składa z poddanych, z mieszczan i tym podobnych ludzi, każde inne jest najemne lub pomocnicze. Łatwo znaleźć najlepszy sposób utworzenia własnego wojska, jeśli się zbada wyżej podane zasady oraz zauważy, jak w tym względzie Filip, ojciec Aleksandra Wielkiego, tudzież inne republiki i monarchie postępowały."}]},{"id":"rozdział-14-przepisy-dla-księcia-co-do-wojskowości","number":17,"title":"Rozdział 14. Przepisy dla księcia co do wojskowości","blocks":[{"type":"paragraph","text":"Cel, myśli i całą jaźń swoją powinien każdy książę poświęcać wojnie, jej prawidłom i karności, bo ta umiejętność jedynie temu przystoi, kto do władzy powołany, i nie tylko dawne dynastie utrzymuje, ale często prywatne osoby na tron wynosi. Przeciwnie, ci książęta, którzy więcej folgowali zniewieściałości niż pilnowali wojny, postradali swe państwa, w czym najwalniejszą przyczyną była wzgarda sztuki wojennej, tak samo jak jej pielęgnowanie pomaga we władaniu państwem. Gotowość do wojny wyniosła Franciszka Sforzę ze stanu prywatnego na księcia Mediolanu, zaś jego synowie, ponieważ unikali niewczasów 142 i trudów wojennych, z książąt zeszli do rzędu zwykłych obywateli. Brak bowiem uzbrojenia ściąga prócz innych złych skutków także pogardę na księcia, czyli ten rodzaj hańby, której, jak to niżej zobaczymy, każdy monarcha unikać powinien. Między uzbrojonym a nieuzbrojonym nie ma żadnego stosunku i nierozsądnie byłoby spodziewać się, aby uzbrojony chętnie powodował się 143 nieuzbrojonemu lub też aby nieuzbrojony pozostał bezpieczny pośród sług uzbrojonych. Gdzie wzgarda z jednej, a podejrzenie z drugiej strony, tam zgodliwe postępowanie nie jest możebne. Książę w sztuce wojennej niebiegły ma prócz innych także to nieszczęście, że nie może na szacunek i wierność swego wojska liczyć. Dlatego nigdy nie powinien marsowej sztuki 144 zaniedbywać, a w czasie pokoju jeszcze więcej w niej się ćwiczyć niż w czasie wojny, a to w dwojaki sposób: działaniem i rozmyślaniem. Co do pierwszego, ma w wojsku porządku i wprawy przestrzegać, sam ustawicznie polować, gdyż przez to przyzwyczai ciało do trudów i nadarza mu się sposobność dokładnego poznania kraju, składu gór, dolin i płaszczyzn, niemniej własności rzek i bagien. Te wiadomości przynoszą podwójny pożytek: najpierw poznaje się lepiej własny kraj i można go w danym razie skuteczniej bronić; po wtóre znajomość położenia jednego kraju podaje nam łatwość orientowania się w innej miejscowości, na czym wiele zależy, bo np. wzgórki, doliny, równiny, rzeki i bagna toskańskie są podobne pagórkom, dolinom itd. w innych krajach, więc topograficzna znajomość Toskanii ułatwia poznanie innego kraju. Nieposiadającemu tych wiadomości brakuje najkardynalniejszego przymiotu dobrego wodza, one bowiem nauczają nas, jak śledzić nieprzyjaciela, gdzie zająć stanowiska, którędy wojsko prowadzić, jak staczać bitwy i w którym miejscu obóz z korzyścią założyć. Do pochwał, którymi dziejopisarze Filopomena 145 , naczelnika Achajów, obsypują, należy i ta, że w czasie pokoju ustawicznie o wojnie myślał, a chodząc z przyjacioły swymi po polach, zatrzymywał się często i roztrząsał: kto by miał korzystniejsze stanowisko, gdyby nasze wojsko na tym miejscu było, a nieprzyjaciel tam na pagórku stał? Jakby go zaczepiać, aby to ze skutkiem i w szeregu uczynić? Gdybyśmy chcieli rejterować, którędy to uskutecznić? Jak ścigać nieprzyjaciela, gdyby on się cofał? W ten sposób wykładał im mimochodem wszystkie możliwe wypadki strategiczne, słuchał ich zdania, oznajmiał swoje i dowody na nie przywodził, tak dalece, że po tych ciągłych badaniach nic się wydarzyć nie mogło, na co by nie miał zaradczego środka. We względzie umysłowego wykształcenia powinien książę historyczne dzieła czytywać i rozmyślać nad czynami sławnych ludzi, powinien dochodzić, jak na wojnie działali, badać przyczyny, dla których jedni zwyciężyli, drudzy przegrywali, aby tamte naśladować, a te unikać, przede wszystkim powinien w działaniach swoich tego doskonałego męża naśladować, którego sobie za wzór obrał, jeśli kto przed nim był chwalony i wsławiony, a którego czyny mogą być do teraźniejszych czasów zastosowane. Powiadają, że Aleksander Wielki Achillesa, Cezar Aleksandra, a Scypio 146 Cyrusa naśladował. Znawca biografii Cyrusa, napisanej przez Ksenofonta 147 , łatwo pojmie, czytając później życiorys Scypiona, ile sławy Scypionowi naśladowanie Cyrusa przyczyniło i że on niczego nie szczędził, by tak być czystym, uprzejmym, ludzkim i hojnym, jak Ksenofontowy Cyrus. Na tych zatrudnieniach 148 powinien mądry książę życie trawić, w czasie pokoju nie próżnować, ale przemyślnie skarby gromadzić, których by mógł zażyć w nieszczęściu, aby przeciwności zastały go przygotowanego na wszystkie ciosy."}]},{"id":"rozdział-15-przyczyny-dla-których-ludzi-mianowicie-książąt-chwalimy-lub-ganimy","number":18,"title":"Rozdział 15. Przyczyny, dla których ludzi, mianowicie książąt, chwalimy lub ganimy","blocks":[{"type":"paragraph","text":"Mamy jeszcze roztrząsać metodę obcowania i rządu księcia, tak z poddanymi, jako też z przyjacioły, a ponieważ mi wiadomo, że wielu innych o tej samej materii pisało, obawiam się, bym nie był do zarozumiałych policzony, skoro się odważam także o niej i to w odmienny sposób traktować. Lecz postanowiwszy pisać potrzebne rzeczy dla ludzi myślących, sądzę, że jest lepiej rzeczywistą niżeli mniemaną przedstawić prawdę. Wymarzono sobie wiele republik i monarchii, jakich w całym świecie nie masz i nie widać, a różnica między tym, jak rzeczywiście żyjemy, a jak żyć jesteśmy obowiązani, tak jest wielka, że kto pierwsze zaniedbuje, a drugie wykonuje, prędzej się zniszczy niż utrzyma. Kto by zawżdy i wszędzie tylko dobrych uczynków był zwolennikiem, ten wśród mnóstwa złych ludzi musi upaść. Przeto dla własnego utrzymania przystoi każdemu księciu uczyć się być złym i z tej nauki korzystać lub nie korzystać, stosownie do potrzeby. Pomijam idealnego księcia, a zapatrując się na żywych, twierdzę, iż wszystkim ludziom, zwłaszcza monarchom, którzy nad innymi górują, właściwe są pewne przymioty, które im naganę lub pochwałę jednają. I tak: jeden uchodzi za hojnego, drugi za sknerę (skąpy w narzeczu toskańskim nazywa się ten, co zdzierstwem powiększa mienie swoje, sknera zaś nawet swego własnego nie używa), ten za dobrodzieja, ów za drapieżnika, jeden jest okrutny, drugi litościwy, jeden wiarołomny, drugi wierny, jeden zniewieściały i tchórz, drugi dziki i odważny; ten łagodny, ów hardy, ten lubieżny, tamten wstydliwy, ten szczery, ów chytry, jeden twardy, ów miękki, ten poważny, tamten płochy, jeden jest religijny, drugi niedowiarek i tym podobnie. Nie wątpię, iż każdy przyzna, że książę obdarzony dobrymi własnościami, zasłużyłby na największe pochwały; ale ponieważ natura ludzka nie dozwala, by wszystkie dobre przymioty razem mieć lub razem przestrzegać, przeto książę musi być tyle roztropny, aby potrafił uniknąć niesławy tych wad, bez których można państwo postradać, zaś innych wad, niemających takich skutków, musi się ile możności wystrzegać, w przeciwnym razie, gdyby to było niemożliwe, z mniejszym skrupułem im się oddać. Nadto nie trzeba nader troskliwie unikać złej opinii powstającej z owych ułomności, bez których ocalenie państwa jest trudne, bo zważywszy rzecz gruntownie, to są postępki, które nam się widzą cnotliwe, a wykonane sprawiają upadek; są też inne, które za wady uchodzą, a użyte przynoszą pewność i byt dobry."}]},{"id":"rozdział-16-o-hojności-i-skąpstwie","number":19,"title":"Rozdział 16. O hojności i skąpstwie","blocks":[{"type":"paragraph","text":"Rozpoczynając uwagi nad pierwszą z powyższych własności, twierdzę, że korzystnie jest uchodzić za hojnego. Wszelako hojność staje się szkodliwa, jeśli jej przesadnie używamy, użyta zaś z umiarkowaniem i jak przynależy, nie zostanie rozgłoszona i nie uchroni od hańby skąpstwa. Chcąc sobie zjednać u ludzi imię hojnego, książę nie powinien szczędzić żadnej wystawy 149 ; lecz z drugiej strony zmarnuje tym obyczajem wszystkie zasoby i w końcu będzie zniewolony, jeśli zechce zatrzymać przymiot hojnego, przeciążać poddanych, będzie wyłącznie tylko o finansach myślał i uczyni wszystko, aby dostać pieniędzy. Następnie zaczną go właśni poddani nienawidzić, zaś inni, widząc go zubożałego, będą nim pogardzać. Swoją hojnością gdy sobie wielu naraził, a mało kogo nagrodził, sam pierwszy uczuje niedostatek i wystawi się na wszelkie niebezpieczeństwo; gdy zaś pozna swoje położenie i zechce się cofnąć, wnet go dosięgnie niesława skąpstwa. Skoro więc książę nie może być bez własnej szkody tak hojny, aby każdego na siebie zwrócić oczy, roztropność nie każe się lękać, choćby go za skąpca poczytano. Później, gdy będzie wiadomo, że przy oszczędności zwyczajne dochody państwa wystarczają, gdy będzie wiadomo, że książę może nimi wojnę prowadzić i wyprawy przedsięwziąć bez nakładania nowych podatków, wówczas będzie on od tych wszystkich za hojnego uważany, których nie zdziera, a takich jest niezmierna liczba, za sknerę zaś od tych niewielu, co nic od niego nie pobierają. Patrzyliśmy w naszych czasach, że tylko rzekome skąpcy 150 wielkie czyny wykonywali, inni schodzili z widowni. Starając się o tiarę, papież Juliusz II udawał hojnego, lecz na wojnie z królem francuskim zapomniał o tej własności i tylko długo praktykowaną oszczędnością mógł pokryć zbyteczne wydatki i tyle wojen bez nałożenia nadzwyczajnych danin prowadzić. Gdyby teraźniejszy król Hiszpanii 151 na imię hojnego zasłużył, nie byłby tyle czynów przedsięwziął ani wykonał. Z tych to powodów książę nie powinien się frasować, jeśli go za skąpca dlatego uważają, iż dla własnej obrony łupił poddanych, byle tylko nie zbiedniał i nie został spodlony i byle nie był zmuszony stać się zachłannym, bo ta wada należy do rzędu tych, co go przy władzy utrzymują. Zarzuci kto, że hojnością Cezar dostąpił panowania i że wielu innych tym samym sposobem najwyższe urzęda osiągnęło. Odpowiadam: albo już jesteś księciem, albo chcesz nim być. W pierwszym razie hojność jest szkodliwa, w drugim potrzeba hojnego udawać, a właśnie Cezar należał do tych, co się starali o władzę Rzymu; lecz zadzierżywszy rząd państwa, gdyby się na nim długo był utrzymał i nie umiarkował w wydatkach, całe imperium byłoby zniszczone. A gdyby kto powiedział, że wielu nader hojnych książąt sławne dzieła wojskiem swoim wykonało, odparłbym, że pieniądze, które książę wydaje, są jego, jego poddanych lub obce. W pierwszym razie powinien być oszczędny, w drugim niczego nie żałować, by uchodził za hojnego, gdyż jego wojsko utrzymując się ze zdobyczy, z rabunku i z kontrybucji, nie słuchałoby go inaczej. Co nie jest twoje lub twoich poddanych, możesz za przykładem Cyrusa, Cezara i Aleksandra do woli trwonić. Bo marnowanie obcej własności bynajmniej nie ujmuje nam sławy, owszem powiększa ją; nasze jeśli tracimy, to nam szkodzi. Hojność nie jest namiętnością, która by się sama przez się zużyła lub która by w wykonaniu traciła swoją siłę, i przez nią nie zostaniesz ani biedny, ani podły, ani też, unikając ubóstwa, nie zostaniesz znienawidzonym zdziercą. Wzgardy i nienawiści powinien każdy książę co najbardziej unikać, a tak do jednej, jak do drugiej prowadzi hojność. Zatem mądrzej jest za skąpca uchodzić, z czego tylko hańba, lecz bez nienawiści powstaje, niż się za imieniem hojnego ubiegać, a tym samym zostać zdziercą, bo to i hańbi, i nienawiść za sobą niesie."}]},{"id":"rozdział-17-o-okrucieństwie-i-łagodności-tudzież-czego-lepiej-miłości-czy-bojaźni-w-narodzie-doznawać","number":20,"title":"Rozdział 17. O okrucieństwie i łagodności, tudzież czego lepiej: miłości czy bojaźni w narodzie doznawać","blocks":[{"type":"paragraph","text":"W dalszym przytoczonych przymiotów rozwoju mam przekonanie, że każdy książę winien się starać o imię miłosiernego, a nie okrutnika, lecz powinien także baczyć, aby miłosierdzia źle nie zażywał. Cezar Borgia był za okrutnego trzymany, jednak zdołał Romanię zrestaurować i zjednoczyć, a tym samym zrobić z niej spokojną i wierną prowincję. Zważywszy dobrze, Borgia okaże się nam litościwszy niż lud florencki, który, by go okrutnym nie nazwano, dał zniszczyć Pistoję. Aby więc utrzymać poddanych w wierności i w jedności, nie powinien się książę troszczyć o niesławę okrutnika. Jakoż ten jest łagodniejszy, kto rzadko kary nakłada, niżeli ci, co zbytnim pobłażaniem sprawiają nierząd 152 , a w następstwie zabójstwa lub rabunki; bo oni obrażają całe społeczeństwo, podczas gdy wyroki książęce tylko pojedynczych ludzi trafiają. Pomiędzy wszystkimi książętami nowemu księciu jest najtrudniej i prawie niepodobieństwem uniknąć nazwiska okrutnego, zwłaszcza dlatego, że nowe państwa ciągle się burzą. Przeto Dido 153 u Wirgilego tłumaczy surowy swego nowego państwa rząd tymi słowy:"},{"type":"verse","text":"Res dura et regni novitas me talia cogunt\nMoliri, et late fines custode tueri . 154"},{"type":"paragraph","text":"Wszelako książę nie powinien być łatwowierny ani zbyt pochopny i nie obawiać się lada czego, lecz z umiarkowaniem, roztropnie i po ludzku działać, aby przesadna łatwowierność nieprzezornym lub za daleko posunięte niedowiarstwo nieznośnym go nie robiły. Nasuwa się tu pytanie, co lepiej: czy być kochanym, czy też bojaźń wzniecać? Według mnie jedno i drugie jest dobre, lecz gdy ich połączenie trudnościom podlega, a jednego nie dostaje 155 , bezpieczniej jest lęk niż miłość sprawiać. Bo w ogóle można o ludziach powiedzieć, że są niewdzięczni, niestali, obłudni, tchórze w niebezpieczeństwie i zysku chciwi; jak długo im dobrodziejstwa świadczysz, oddają ci się całkowicie, a dopóki nie ma potrzeby, ofiarują dla twej sprawy krew swoją, majątek, życie i rodzinę; lecz skoro się potrzeba zbliży, wnet robią rewolucję 156 . Książę, co się całkiem na słowa ludzkie spuszcza i żadnych innych nie przedsięweźmie ubezpieczeń, jest zgubiony, ponieważ okupionej, a nie wielkością i szlachetnością duszy zjednanej przyjaźni, chociażeśmy na nią zasłużyli, jednak nie każdej chwili, kiedy potrzeba, możemy użyć. Mniej też robią ludzie ceremonii z obrazy człowieka, który się stara, aby był lubiany, niżeli z obrazy innego, który wznieca bojaźń. Miłość utrzymuje się węzłem wdzięczności, a niedobra natura człowieka targa ten węzeł natychmiast, gdziekolwiek zachodzi własny interes; bojaźń zaś polega na nieustannej obawie przed karą. Lecz bojaźń, którą mają przed nami, powinna być tego rodzaju, aby jeśli już nie miłość, to przynajmniej nienawiści na nas nie ściągnęła. Szerząc bojaźń, możemy uniknąć nienawiści w ten sposób, jeśli się wstrzymamy od wydzierania majątków i żon mieszczanom i poddanym. W koniecznym wypadku ukarania kogo śmiercią musimy ten krok oczywistą potrzebą uzasadnić i usprawiedliwić, a przede wszystkim musimy cudzą własność szanować, bo ludzie snadniej zapominają śmierć ojca niż utratę majątku. Zresztą nie brakuje nigdy przyczyn do konfiskaty majątków, a kto raz swoje panowanie zaprawi na rabunkach, ten znajdzie pozory do ciągłych grabieży. Zaś przyczyny rozlewu krwi są rzadsze i prędzej mogą się wyczerpać. Ale książę otoczony licznym wojskiem nie ma co dbać o niesławę okrutnika, bez czego nie da się żołnierz ani w karności utrzymać, ani należycie użyć. Do czynów Hannibala 157 godnych podziwienia liczą i ten, że wielkie i z najrozmaitszych narodowości złożone wojska, które prowadził w obce kraje, nigdy ani w szczęściu, ani w niedoli nie podniosły rokoszu przeciw niemu, ani też się nie buntowały między sobą. Było to wynikiem nieludzkiego okrucieństwa, co mu przy innych wspaniałych cnotach uszanowanie i bojaźń zjednało; gdyby zaś nie był okrutny, inne jego cnoty same przez się nie byłyby tego skutku wywarły. Nierozważni pisarze uwielbiają czyny Hannibala, ale ganią pobudki. Na dowód, że inne cnoty bez okrucieństwa nie mogły mu w żadnym razie starczyć, niech służy Scypio, ów rzadki wzór nie tylko ówczesnych, ale wszystkich czasów, którego wojsko zrewoltowało się w Hiszpanii, co niczemu innemu, tylko zbytnej wodza łagodności przypisać należy, gdyż udzielał armii więcej wolności, aniżeli dozwalała karność wojskowa, tak dalece, że Fabius Maximus robił mu wyrzuty w senacie i nazwał go skazicielem wojsk rzymskich. Dla tej samej pobłażliwości nie ukarał Scypio swego legata za to, że zniósł Lokryjczyków 158 , z czego znów starano się w senacie tym go tłumaczyć, że więcej jest ludzi, którzy sami nie błądzą, niżeli tych, co cudze błędy naprawiają. Usposobienie to byłoby wreszcie skaziło cześć i sławę Scypiona, gdyby był dłużej zatrzymał dowództwo; acz kiedy zostawał pod władzą senatu, nie tylko można było ten błąd pokryć, ale nadto przysporzył mu on sławy. Powracam do mego założenia i tak konkluduję: gdy miłość ludzi od ich skłonności, bojaźń zaś od postępowania księcia zależy, mądry książę powinien szukać punktu oparcia w tym, co jest jego własne, a nie w tym, co do drugich należy; i w każdym razie, jakem powiedział, starać się, aby uniknąć nienawiści."}]},{"id":"rozdział-18-jak-dalece-powinni-książęta-słowa-dochowywać","number":21,"title":"Rozdział 18. Jak dalece powinni książęta słowa dochowywać","blocks":[{"type":"paragraph","text":"Wiadomo, że chwalebnie jest, jeśli książę słowa nie łamie i uczciwie, a nie chytrością żyje. Mimo to uczy doświadczenie teraźniejszego czasu, że książęta niewiele o słowo dbający i którzy umieli chytrością umysły ludzkie oszukać, wielkim podołali przedsięwzięciom i w końcu uczciwych ludzi zwyciężyli. Trzeba wiedzieć, że dwa są wojowania sposoby: jeden ustawami, drugi siłą. Tamten służy ludziom, ten zwierzętom; ale ponieważ pierwszy często nie wystarczy, więc wypada się drugiego chwytać. Przeto książę powinien dobrze znać naturę zwierząt i ludzi. Już dawni pisarze udzielali tej samej nauki, chociaż pod pokrywką, piszą bowiem, że Achillesa i wielu innych starożytnych książąt centaur Chiron 159 piastował i wychowywał; atoli mieć za nauczyciela istotę, która na poły jest zwierzę, a na poły człowiek, nie oznacza nic innego, jeno to, że książę powinien obie natury, ludzką i zwierzęcą, należycie umieć zażyć, gdyż jedna bez drugiej nie jest trwała. Kiedy więc konieczność wymaga, aby książę potrafił zapatrywać się na zwierzęta, musi lisa i lwa naśladować; wszak lew nie obroni się przed sidłami, zarówno lis przed wilkami. Lisem trzeba być, aby się poznać na sidłach, lwem, aby przestraszyć wilków. Kto tylko lwa naśladuje, ten nie rozumie rzeczy. Roztropny książę nie może i nie powinien dotrzymać słowa, jeśliby to było ze szkodą dla niego i skoro ustały powody, które go do dania słowa skłoniły. Gdyby wszyscy ludzie byli uczciwi, rada ta nie byłaby na swoim miejscu, lecz gdy są przewrotni i na dane tobie słowo nie zważają, więc i ty nie powinieneś dotrzymać twego słowa, a nigdy nie zabraknie księciu dowodnych przyczyn ku ubarwieniu wiarołomstwa. Można by wiele nowych przykładów przytoczyć, aby okazać, ile traktatów, ile przyrzeczeń zniweczyła niewierność książąt, i że tym dalej zajdziemy, im lepiej lisa naśladujemy. Ale ten przymiot trzeba umieć doskonale zamaskować oraz być niepospolitym zmyślaczem i obłudnikiem; ludzie bowiem są do tyla dobroduszni, a chwilowa potrzeba tak dalece na nich wpływa, że zwodziciel zawżdy znajdzie tego, co się da oszukać. Powołam tu tylko jeden przykład. Papież Aleksander VI nic innego nie robił, tylko oszukiwał ludzi, nawet o czym innym nie myślał, przecie zawsze znalazł takich, którzy mu się podejść dali. Nikt też nad niego nie posiadał więcej wprawy w dawaniu przyrzeczeń i w umocnieniu tychże największymi zaklęciami, przy tym wszystkim zgoła nic nikomu nie dotrzymał; jednakowoż udawały mu się jego plany, bo dobrze znał tę stronę świata. Realnie wziąwszy, nie potrzebuje książę posiadać wszystkich powyższych przymiotów, lecz udawać, jakoby je posiadał. Śmiem nawet twierdzić, że te przymioty są nam szkodliwe, jeśli je posiadamy i wszędzie przestrzegamy, stają się zaś pożyteczne, jeśli tylko udajemy; musimy tedy umieć udawać bogobojnego, wiernego, ludzkiego, religijnego i uczciwego, a zarazem umieć być tym rzeczywiście, lecz przy tym posiadać takie ducha usposobienie, aby w razie jeśli nie trzeba być bogobojnym, wiernym etc., zdołać na wylot zmienić nasze postępowanie. Książę, mianowicie nowy, nie może zawsze tego wszystkiego przestrzegać, co inni za dobre uznają; owszem dla utrzymania państwa musi czasem działać wbrew przepisom wiary, miłosierdzia, ludzkości i religii; umysł jego musi się odmieniać stosownie do wietrznych 160 obrotów i zmian losu, wszakże tak, aby nie przy każdej sposobności zaraz zbaczał z drogi, lecz jeśli potrzeba, aby umiał manowcami chodzić. Dlatego musi się mieć na ostrożności, aby mu się nie wymknęło z ust takie słowo, które by się nie zgadzało z pomienionymi 161 pięcioma cnotami. Postawa jego i mowa muszą tchnąć samą pobożnością, samą rzetelnością, samą ludzkością, prawością i bogobojnością, i nic potrzebniejszego nad pozór tej ostatniej cnoty, ponieważ ludzie więcej z pozoru niż gruntownie sądzą, bo każdy ma oczy do widzenia, a mało kto umysł do zgłębiania; każdy widzi, kim się być wydajesz, lecz rzadki zauważa, kim istotnie jesteś, i nawet ten rzadki nie odważy się sprzeciwiać ogólnej opinii, która stanowi majestat państwa. W działaniach ludzi, osobliwie 162 książąt, którzy nad sobą żadnego nie uznają trybunału, cel ostateczny jest jedyną skazówką 163 . Książę powinien się tylko starać o zwycięstwo i o utrzymanie państwa: co do środków, te będą zawsze godziwe i każdy je pochwali; bo gmin idzie za pozorem i patrzy na koniec, a gminem świat przepełniony tak dalece, że mniejszość (rozsądniejsi) dopiero wtedy przychodzi do słowa, gdy większości zabraknie podpory. Niejeden z dzisiejszych książąt, którego lepiej, że nie wymienię, mówi ciągle o pokoju i wierności, a jednego i drugiego jest zaciętym nieprzyjacielem, i gdyby ich przestrzegał, już nieraz byłby sławę lub tron postradał."}]},{"id":"rozdział-19-pogardy-i-nienawiści-trzeba-unikać","number":22,"title":"Rozdział 19. Pogardy i nienawiści trzeba unikać","blocks":[{"type":"paragraph","text":"Gdy z wymienionych przymiotów o najważniejszych mówiło się obszernie, co do innych chcę być zwięzłym w wyłożeniu zasady już raz przytoczonej, że książę wszystkiego unikać powinien, co by mu nienawiść lub pogardę jednało, a ile razy o tym nie zapomni, dopnie swoich zamysłów i inne wady nie będą mu szkodzić. Powiedziałem, że zdzierstwo oraz zabór majątku i kobiet poddanych sprowadzają nienawiść na księcia, więc tego powinien się wystrzegać. Dopóki społeczeństwo ludzkie ma swoją własność i swój honor zabezpieczone, dopóty żyje w ukontentowaniu i tylko pycha niektórych zostaje do poskromienia, co wszakże wielorakimi sposoby łatwo zdziałać można. Podłym się staje, kto uchodzi za zmiennego, za lekkomyślnego; jak okręt skały, tak książę tych zdrożności powinien unikać i dołożyć starania, by ujrzano w jego czynach wielkość, odwagę, powagę i siłę; powinien nadto w stosunkach z poddanymi opinię sobie ustalić taką, że wyrok jego jest nieodwołany, aby się więc nikt nie spodziewał podejść go lub oszukać. Tym postępując trybem, książę będzie znakomity i przeciw niemu niełatwo podnieść rewolucję lub z wojskiem go napaść, ponieważ rozumieją 164 o nim, że posiada wyborne zdolności i poważanie w narodzie. Dwojaki rodzaj obawy może księcia dotknąć: wewnętrzna przed własnymi poddanymi, zewnętrzna od obcej potencji 165 . Dobrym wojskiem a prawdziwymi przyjacioły obroni się przeciw inwazji; jak długo trwa spokój zewnętrzny, spokojnie także wewnątrz, wyjąwszy, gdy rewolucja wybuchnie; zaczepi go kto z zagranicy, to wytrzyma każdy atak, jeśli żyje i działa według moich przepisów i rąk nie opuści, jakem o Spartaninie Nabisie mówił. Ale właśni poddani mogą nawet podczas zewnętrznego spokoju potajemnie spiskować, przeciwko czemu li tylko unikaniem wszystkiego, co by nienawiść lub pogardę ściągnąć mogło, i przez zadawalnianie życzeń narodu można się ubezpieczyć, jakem to już obszernie wyłożył. Unikanie powszechnego znienawidzenia lub pogardy jest jednym z najskuteczniejszych środków przeciw spiskom, bo każdy rewolucjonista myśli, że śmierć księcia zaspokoi lud; lecz gdy zmiarkuje, że tym aktem lud się obruszy, nie będzie się za nim uganiał, gdyż niezliczone są trudności dla partii rewolucyjnej. Albowiem doświadczenie uczy, że z wielu przygotowanych rewolucji mało się która udała, bo nie samemu, lecz w towarzystwie i to w towarzystwie malkontentów można podnieść sztandar przeciw rządowi; zwierzając się zaś jednemu z nich, podajesz mu sposobność przez zdradę wielką osiągnąć nagrodę; bo gdy w zdradzie widzi zysk pewny, a w zamysłach rewolucjonistów niepewność i wielkie niebezpieczeństwo, wtenczas tylko zostanie ci wiernym, jeśli jest twoim osobliwym 166 przyjacielem lub zagorzałym księcia nieprzyjacielem. Krótko mówiąc: knowaniom rewolucyjnym towarzyszy obawa, zazdrość i zatrważająca podejrzliwość przed karą, podczas gdy rząd ma za sobą majestat księcia, ustawy, obronę przyjaciół i państwa, a jeśli się do tego życzliwość ludu przyłączy, wtedy niepodobna, aby jaki zapaleniec rozpoczął rewolucję. Zwykle tylko przed udaniem się spisku zostają sprzysiężeni w obawie; lecz w razie, jeśli lud nie jest po ich stronie, trwa ta obawa nawet i po wybuchu, gdyż żadnego dla siebie nie widzą schronienia. Mógłbym tu przytoczyć liczne przykłady, ale ograniczę się tylko do jednego z dziejów ojczystych. Hannibal Bentivoglio 167 książę Bolonii, a dziad teraźniejszego księcia Hannibala, został w powstaniu przez partię Canneschich zamordowany, nikogo prócz księcia Jana, który jeszcze w pieluchach był, nie zostawiwszy. Wnet powstał lud i wymordował wszystkich Canneschich. Uczynił to z przywiązania do rodziny Bentivogliów, które podtenczas 168 w Bolonii do tego stopnia urosło, że gdy po śmierci Hannibala nikogo nie było, co by mógł ster państwa objąć, Bolończycy, słysząc, że jakiś potomek Bentivogliów we Florencji przebywa i tamże za syna kowala uchodzi, udali się do Florencji i poruczyli mu rząd państwa, którym tak długo kierował, dopóki książę Jan nie osiągnął przyzwoitego wieku. Powtarzam więc, że książę nie ma się czego spisków obawiać, jak długo mu lud sprzyja; lecz jeśli lud jest nieprzychylny i nienawidzi go, wówczas wszystkich i wszystkiego musi się lękać. Było też zawżdy pierwszym tak dobrze urządzonych państw, jak i przezornych książąt staraniem, aby z jednej strony nie przywieść do rozpaczy panów, z drugiej strony lud zaspokoić i zadowolnić, i to jest najważniejsze zadanie dla każdego księcia. Między państwa, które za naszych czasów są dobrze urządzone i administrowane, należy policzyć Francję. Posiada ona mnóstwo ustaw pożytecznych, od których dependuje wolność i pewność króla, przede wszystkim należy tu parlament i jego władza. Znał dokładnie ustawodawca francuski dumę i zuchwałość panów, poznał też niezbędną potrzebę, by ich okiełzać; po stronie ludu znał także jego nienawiść ku panom, wypływającą z bojaźni, i chciał ten lud, lecz nie wyłącznym króla staraniem, zabezpieczyć. By więc uniknąć złej chęci magnatów, jeśliby lud wspierał, lub ludowej nienawiści, gdyby trzymał stronę magnatów, ustawodawca postanowił trzeciego sędziego, który by mógł bez przyłączenia się tronu poskramiać jedną stronę, a bronić drugiej. Nic lepszego i mędrszego nie było można wymyślić ku zabezpieczeniu króla i państwa. Stąd wypływa ważna dla książąt nauka, aby surowość przez innych, łaskę zaś sami bezpośrednio wyrządzali. Dalej twierdzę, że książę powinien szanować panów, ale też starać się, aby u ludu nie był znienawidzony. Biografie cesarzów rzymskich, zwłaszcza tych, którzy pomimo wybornych rządów i niezwykłej ducha potęgi, w rewolucjach władzę, a czasem i życie postradali, zdają się zbijać wyłożone zasady. Temu zapobiegając, opiszę charakter niektórych cesarzów, wskażę przyczyny ich upadku, bynajmniej podanych wyżej przepisów nie wzruszające, i zbadam ważniejsze ustępy z ich dziejów. Szereg imperatorów od Marka Filozofa 169 do Maksymina 170 mieści w sobie Marka, syna jego Kommodusa, Pertynaksa, Juliana 171 , Sewera, Antonina, tegoż syna Karakallę, Makryna, dalej Heliogabala, Aleksandra 172 i Maksymina. Przede wszystkim wypada tu zrobić ogólną uwagę, że kiedy w innych państwach ściera się tylko duma panów z zuchwalstwem ludu, cesarze rzymscy mieli prócz tego jeszcze trzecią niepomniejszą trudność do zwalczenia, mianowicie: okrucieństwo i chciwość wojska, okoliczność tyle trudną, że niejednemu cesarzowi upadek zgotowała, ponieważ nie jest łatwo wojsko i lud razem zadowolnić; lud bowiem kocha księcia umiarkowanego, wojsko zaś marsowego, a przy tym naprzeciw ludu zuchwałego, okrutnego i drapieżnego, aby mogło podwójny żołd pobierać, nasycić swoją chciwość i zadowolnić okrucieństwo. Stąd pochodzi upadek każdego cesarza, który ani swoją naturą, ani fortelami nie zdołał wzniecić zaufania, że potrafi wszystko na wodzach utrzymać. Doświadczywszy trudności tych dwóch stronnictw politycznych, wielu cesarzy z prywatnego pochodzących stanu, starało się wojsko zadowolnić, nie dbając o znieważenie ludu. I nie mogli działać inaczej. Boć kiedy nienawiść jest nieuchronnym udziałem książąt, niechże przynajmniej zapobiegają, aby ta nienawiść nie była ogólna, a gdyby tego w żaden sposób nie można dopiąć, niech unikają nienawiści tej partii, która jest silniejsza. Cesarze nowo wybrani, a tym samym nadzwyczajnych potrzebujący względów, chętniej przestawali z wojskiem niż z ludem, co im jednak tylko wtedy pomogło, jeśli zdołali także między ludem partię sobie zjednać. Iż tedy Marek, Pertynaks i Aleksander byli cesarze łagodni, sprawiedliwi, nieokrutni, ludzcy i łaskawi, wszyscy prócz Marka smutnie skończyli. On jeden żył i umarł w największym poszanowaniu, albowiem nie z łaski wojska lub ludu, ale z prawa dziedzictwa na tron wstąpił; nadto posiadał wiele szacownych cnót, utrzymywał fakcje w przynależnych karbach i nigdy nie był znienawidzony ani pogardzony. Lecz Pertynaks, wyniesiony na tron przeciw woli wojska nawykłego za rządów Kommodusa do rozpusty, chciał w nim zaprowadzić porządek. To nie podobało się wojsku i stąd nienawiść, potem wzgarda na jego wiek podeszły, wreszcie upadek Pertynaksa, który zaledwie zaczął panować; nowy dowód, że tak dobrymi, jak złymi postępki można na siebie nienawiść ściągnąć, i że książę, jak to wyżej powiedziałem, jest często zmuszony dla utrzymania państwa zaniechać dobrych czynów, bo jeśli którakolwiek fakcja z rządem trzymająca, bądź lud, bądź wojsko, bądź arystokracja zepsuciu podpadnie, książę musi się jej przymilać i ją zadowalać, a wtedy dobre postępowanie tylko mu zaszkodzi. Aleksander zaś był tyle dobry, że między innymi jego czynami i ten wymieniają, iż przez ciąg czternastoletniego panowania nikogo bez wyroku nie kazał stracić. Mimo to ściągnął na siebie pogardę, bo go trzymano za niewieściucha, którym matka rządziła; wojsko zrobiło spisek i zamordowało tego cesarza. Przystępuję teraz do życiorysów Kommodusa, Sewera, Antonina, Karakalli i Maksymina. Byli to cesarze rabusie i okrutnicy, którzy aby tylko wojsku dogodzić, wszelkimi sposoby lud nękali i każdy z nich, prócz Sewera, smutny miał koniec. Sam tylko Sewer mógł przy swej waleczności, gdyby nie stracił przychylności wojska, szczęśliwie rządzić, chociaż nawet lud uciskał; albowiem jego cnoty zjednały mu tak wysokie poważanie w wojsku i u ludu, że tamto szacunkiem i zadowolnieniem, ten zdziwieniem i osłupieniem został napełniony. A ponieważ wszystkie czyny tego nowego księcia wielkością były nacechowane, wykażę pokrótce, jak misternie umiał naśladować lisa i lwa, czego właśnie, jakem powyżej mówił, każdemu księciu potrzeba. Poznawszy gnuśność cesarza Juliana, Sewer namówił wojsko, któremu w Sklawonii 173 przewodniczył, do marszu na Rzym, aby, jak mówił, pomścić śmierć Pertynaksa, zabitego przez pretorianów. Tym pozorem zamaskował żądzę panowania, ruszył z wojskiem, i nim się dowiedziano o jego pochodzie, stanął we Włoszech. Senat z bojaźni obwołał go cesarzem w Rzymie, Juliana zaś zamordowano. Po tych początkach pozostawały Sewerowi, by całe państwo owładnąć, dwie trudności: jedna w Azji, gdzie Niger, naczelnik wojsk tamecznych, cesarzem dał się ogłosić; druga na Zachodzie z Albinem, który się także o tron starał. W tych stosunkach uznał Sewer za rzecz niebezpieczną razem przeciw obydwom po nieprzyjacielsku wystąpić, postanowił więc uderzyć na Nigra, a oszukać Albina. Pisze tedy do Albina, jakoby go senat za cesarza wybrał i że tę godność z nim podzielać chce, nadaje mu tytuł cesarza i stosownie do uchwały senatu mieni się jego kolegą. Temu wszystkiemu uwierzył Albin. Tymczasem Sewer zwyciężył i stracił Nigra i tym samym uspokoił wschodnią część państwa. Powróciwszy do Rzymu, uskarżał się w senacie na Albina, że niepomny na doznane dobrodziejstwa, zdradziecko dybał na jego życie, przeto musi go, jako niewdzięcznika, ukarać. Rzeczywiście poszedł do Francji, gdzie go państwa i życia pozbawił. Po dokładnym zbadaniu czynów tego cesarza, trzeba przyznać, że był on najodważniejszym lwem, a przy tym najchytrzejszym lisem, którego lud się obawiał i szanował, a wojsko dość lubiło; toż nie będzie zastanawiać, że nowy ten władca utrzymał się na tak obszernym państwie, ponieważ niezmierna jego sława broniła go od nienawiści u ludu, którą przez zdzierstwo mógł na siebie ściągnąć. Syn jego, Antonin, posiadał także wyborne przymioty, dla których go lud podziwiał, a wojsko ceniło; był to bowiem żołnierz wytrwały na wszelkie niewczasy, nielubiący ani wykwintnego jadła, ani innych wygódek i z tej przyczyny od całego wojska lubiany; acz gdy dogadzając swej niesłychanej dzikości i srogości, niezliczonymi mordy wielką część ludu w Rzymie, a wszystkich w Aleksandrii zgładził, cały świat zaczął go nienawidzić, a otaczające cesarza osoby poczęły się obawiać tak dalece, że setnik zamordował go wśród wojska. Nasuwa się tu uwaga, iż gwałtownej śmierci, jaką rozmyślny i uparty człowiek przygotowuje, książęta wprawdzie nie mogą uniknąć, bo każdy może to wykonać, kto mało ceni własne życie; lecz także nie mają się bardzo czego lękać, gdyż tacy ludzie są wielką rzadkością. Niech się tylko nie dopuszczają zbytnej obelgi naprzeciw swoim doradcom i nie naśladują Antonina, który zamordowawszy sromotnie brata wspomnionego setnika, codziennie mu groził, a przecie z szeregów przybocznej gwardii nie oddalił. Zapamiętałe i zgubne postępowanie odniosło swoją zapłatę. Co do Kommodusa, temu jako synowi Marka utrzymanie odziedziczonego państwa byłoby z łatwością przyszło, gdyby postępował torem ojca i zadawalniał lud i wojsko; lecz z natury okrutny i zwierzęcy schlebiał tylko wojsku i zrobił je rozpustnym w zamiarze, aby mógł lud zdzierać; z drugiej strony nie umiał utrzymać powagi, gdyż często w teatrach stawał do walki z gladiatorami i innych dla cesarskiego majestatu zelżywych dopuszczał się czynów, czym się przed wojskiem tak spodlił, iż znienawidzony od jednych, a pogardzony od drugich, został zamordowany. Pozostaje mi opisać charakter Maksymina. Był to żołnierz duszą i ciałem, którego wojsko wtedy na tron wyniosło, gdy zbrzydziwszy sobie zniewieściałość Aleksandra, o którym powyżej była mowa, zamordowało go. Atoli Maksymin niedługo trzymał berło i z dwóch przyczyn został znienawidzony i pogardzony: raz dla niskiego pochodzenia, w Tracji bowiem owce pasał (co wszystkim było wiadome i wszystkich obrażało), po wtóre, że na początku panowania zwlekał pochód do Rzymu i odkładał objęcie najwyższej władzy, i że się okazał nader okrutny, wykonawszy przez swoich namiestników mnogie barbarzyństwa tak w Rzymie, jak po całym imperium. Pogarda dla niskiego rodu z jednej a nienawiść z powodu bojaźni przed dzikością z drugiej strony, poruszyły cały świat przeciw niemu w ten sposób, że najpierw Afryka, później senat i lud rzymski, wreszcie całe Włochy zaczęły spiskować. Przyłączyło się do tego własne jego wojsko, które doznawszy trudności przy oblężeniu i szturmowaniu Akwilei, nadto sprzykrzywszy sobie okrucieństwo monarchy, zamordowało go tym śmielej, iż widziało, że mnogich ma nieprzyjaciół. Nie będę mówił o Heliogabalu, ani o Makrynie, ani o Julianie, którzy dla swych podłości prędko się zużyli, ale w końcu niniejszego rozdziału robię uwagę, iż tegocześni książęta doznają mniejszych trudności w zadowalaniu wojsk swoich, bo chociaż ich żądze i teraz trzeba uwzględniać, można to jednak snadniej uskutecznić, ponieważ teraźniejsze armie są nowo utworzone i nie starzeją się w prowincjach, jak to właśnie w rzymskim państwie bywało. Jeśli polityka w starożytności wymagała, aby więcej wojsku niż ludom schlebiać, działo się to dlatego, bo w wojsku było wówczas więcej siły niż w ludzie; teraz zaś, gdy stan rzeczy się zmienił i lud więcej jak wojsko znaczy, wszyscy książęta, prócz Turcji i sułtanatu egipskiego, powinni bardziej lud niż wojsko mieć na pieczy. Utrzymując stałego wojska dwanaście tysięcy piechoty i piętnaście tysięcy jazdy, od czego pewność i potęga państwa zawisły, cesarz turecki musi z pominięciem wszelkich względów, naprzeciw swoim ludom, starać się o przyjaźń wojska. Podobnie rząd Egiptu, będąc państwem na wojsku opartym, nie może uwzględniać życzenia ludu, tylko musi się powodować wolą wojska. Egipt jest to państwo osobliwe i całkiem różne od innych państw; ma tylko podobieństwo z państwem papieża. Nie można go nazwać dziedzicznym, gdyż nie dziedziczą w nim i nie panują synowie zmarłego księcia, ale ci, których uprzywilejowana kasta na to wybierze; nie jest on także nowym państwem, bo ustawa rządowa jest starożytna i nie zachodzą w nim żadne trudności nowym właściwe państwom, bo chociaż nowych książąt obierają, forma rządu zostaje niezmienna, tak jak gdyby elekt z prawa dziedzictwa obejmował władzę."},{"type":"paragraph","text":"Z treści tego rozdziału łatwo się przekonać, iż nienawiść i pogarda spowodowały upadek wspomnionych cesarzów, tudzież, że ich działanie w ten lub w ów sposób jednym wychodziło na dobry, a drugim na zły koniec. Chęć naśladowania Marka, który odziedziczył cesarstwo, okazała się dla Pertynaksa równie niepożyteczna jak szkodliwa, bo obydwa byli nowymi książętami; tak samo naśladowanie Sewera byłoby zgubne dla Karakalli, Kommodusa i Maksymina, ponieważ mu w cnotach nie wyrównali. Za tym idzie, że nowy książę nie może naśladować czynów Marka ani też mu potrzeba wstępować w ślady Sewera, lecz od Sewera powinien przejąć, jak założyć fundamenta swemu państwu, a dzieje Marka niech mu wskażą stosowne i chlubne środki do utrzymania państwa, które już jest ustalone i niewzruszone."}]},{"id":"rozdział-20-czy-warownie-i-inne-przez-książąt-używane-bezpieczeństwa-środki-są-pożyteczne-czy-szkodliwe","number":23,"title":"Rozdział 20. Czy warownie i inne przez książąt używane bezpieczeństwa środki są pożyteczne, czy szkodliwe","blocks":[{"type":"paragraph","text":"Różnymi sposoby starali się książęta wzmocnić państwa swoje: jedni rozbrajali poddanych, drudzy wzniecali waśnie w podbitych krajach, inni umyślnie lud zniechęcali ku sobie, znów inni kaptowali niechętnych; jedni wznosili, drudzy burzyli i niszczyli warownie, a chociaż wszystkich tych środków nie można stanowczo osądzić bez uwzględnienia stosunków kraju, w którym mają być zaprowadzone, wszelako nieco obszerniej pomówię o tej materii. Nigdy nowy książę nie rozbraja swoich poddanych, owszem powinien ich uzbroić, jeśli przedtem broni nie mieli, ponieważ uzbrojenie ludu przymnaża sił księciu, z niechętnych robi wiernych, a poddanych przekształca na zwolenników; ale gdy wszystkiego ludu nie można uzbroić, dość na przychylności tych, którym się da oręż do ręki, bo resztę mieszkańców łatwo sobie ubezpieczyć, a skoro uzbrojeni poznają różnicę obchodzenia się z nimi, tym samym będą zobowiązani księciu, zaś nieuzbrojeni zaspokoją się tą uwagą, że czyje niebezpieczeństwo i obowiązki są większe, ten także na większe zasługuje poważanie. Każde odjęcie broni jest początkiem obrazy ludu i dowodem, że nie ufamy jego waleczności lub wierności, a gdy państwo w stanie bezbronnym pozostać nie może, trzeba się uciekać do wojska najemnego, o którym powyżej była mowa, i chociażby nawet takie wojsko było dobre, nigdy nie obroni księcia przed możnym nieprzyjacielem, ani przed niechętnymi poddanymi. Przeto powtarzam, że każdy nowy książę w nowym państwie zajmował się uzbrojeniem ludu, jak tego mnogie w dziejach mamy przykłady. Lecz jeśli książę nabędzie nowe prowincje i chce takowe do swego dawnego państwa przyłączyć, wówczas trzeba te prowincje rozbroić i tylko tym mieszkańcom broń pozostawić, którzy podczas okupacji byli jego zwolennikami, a nawet i tych trzeba z wolna i nieznacznie zdelikacić i zdenerwować, i tak wszystko urządzić, aby siła zbrojna koncentrowała się w weteranach dawnego państwa. Nasi przodkowie i ci, którzy za biegłych uchodzili polityków, zwykli byli mawiać, że Pistoję fakcjami, a Pizę fortecami można w ryzach utrzymać, i dla łatwiejszego panowania podniecali domowe kłótnie w Pistoi. Mogło to być dobre wtedy, gdy Italia była na równe części podzielona, ale wątpię, aby teraz dał się ten system zastosować, owszem jestem zdania, że kłótnie nigdy niczego dobrego nie sprawią i zwaśnione miasta upadają szybko, skoro nieprzyjaciel nadciągnie, bo wtedy słabsza strona połączy się z cudzoziemcem, a strona, czyli partia silniejsza nie potrafi sama jedna oporu stawić. Z tych powodów, zdaje mi się, utrzymywali Wenecjanie po swoich miastach partie gwelfów i gibelinów 174 , a chociaż rozlewu krwi między nimi nie dopuszczali, wszelako podniecali ich waśnie, w tym celu, aby te partie, zajęte domowymi kłótniami, nie przemyśliwały nad powstaniem przeciw Wenecjanom. Ale sztuka nie udała się, bo zaledwie pobito Wenecjan pod Vajlą, wnet jedna z owych partii zniszczyła ich państwo. Jeśli jaka władza forytuje 175 swary domowe między mieszkańcami, jest to dowodem słabości rządu i żaden silny książę nie zezwoli na takie postępowanie, gdyż tylko w czasie pokoju sprawia ono niejakie ułatwienie w zarządzie poddanymi, zaś w czasie wojny na nic się nie przyda i jest zawodne. Nie ulega wątpliwości, że zwyciężone trudy i zawody przysparzają sławy książętom i zwykle dzieje się, iż kiedy los chce wywyższyć jakiego nowego księcia, który więcej potrzebuje sławy niż książę dziedziczny, podburzy nieprzyjaciół przeciw niemu, aby mu dać sposobność zwyciężyć ich i wzbić się w potęgę. Stąd wyrodziło się zdanie, że mądry książę powinien gdzie tylko może, bodaj fortelami, nieprzyjaciół wynachodzić 176 , aby mieć komu rogi utrzeć i tym samym sławy sobie przyczynić, albowiem trwalszą wierność i więcej pożytku znachodzili 177 wszyscy, a szczególniej nowi książęta, u takich ludzi, którzy zrazu byli ich przeciwnikami lub przynajmniej zostawali w podejrzeniu, niżeli u innych, co natychmiast czołem przed nimi bili, czego także Pandolfo Petrucci 178 , książę Sieny doświadczał. Lecz o tym nie można ogólnikami rozprawiać, gdyż wszystko w tej mierze zależy od okoliczności; dokładam jedynie tę uwagę, że ludzi nowemu rządowi nieprzychylnych, ale do utrzymania się na swoim stanowisku jego pomocy potrzebujących, nader łatwo można przejednać, ponieważ ci, poznawszy, że im potrzeba naprawić złą o sobie opinię, sami się księciu z wiernością oświadczą i książę będzie z nich mieć więcej pożytku niż z innych, co z początku pieczołowici, później stają się niedbali. Dalsze badanie tego przedmiotu wymaga, abym przypomniał monarchom nowe prowincje za pomocą niektórych krajowców nabywającym, żeby dokładnie zważyli przyczyny, dla których ci krajowcy zostali ich zausznikami; a jeśli w tych przyczynach nie tyle przychylność ku nowemu księciu, co nieukontentowanie z dawnego rządu rolę odgrywa, wiele trzeba zachodu, aby ich sobie upewnić, gdyż niepodobna wszystkie ich żądania zadowolnić. Zlustrowawszy należące tu wypadki z dawnej i z nowszej historii, przekonamy się, że snadniej zjednać tych, którzy sprzyjając dawniejszemu rządowi, opierali się nowemu, niżeli malkontentów, co łącząc się z najezdnikiem, ułatwili zabór kraju. Jest zwyczajem książąt dla pewności państwa budować fortece, bądź aby wewnętrznego nieprzyjaciela na wodzach trzymać, bądź też aby mieć schronienie przed obcym najazdem. Zwyczaj ten pochwalam, bo jest starożytny; wszelako zdarzyło się za dni naszych, że Mikołaj Vitelli 179 dwie fortece zburzył, aby utrzymać Castello; toż Guido Ubaldo 180 , książę z Urbino, odzyskawszy swoje państwo, z którego Cezar Borgia go wyzuł, wszystkie warownie po całym kraju z ziemią zrównał w tym przekonaniu, że bez nich łatwiej się utrzyma. Nie inaczej uczyniła rodzina Bentivogliów za powrotem swoim do Bolonii 181 . Musimy przeto wnioskować, że fortece raz są pożyteczne, a drugi raz szkodliwe; w jednym miejscu ułatwiają, w drugim utrudniają obronę i ogólną w tej mierze zasadę sformowałbym tak: książę, który więcej się lęka swego narodu niż cudzoziemców, powinien stawiać fortece; przeciwnie, kto więcej cudzoziemców niż narodu się obawia, temu fortec nie potrzeba. Żadne zaburzenie nie sprawiło i nie sprawi tyle walk dla rodziny Sforzów, co zamek w Mediolanie zbudowany przez Franciszka Sforzę. Najpewniejszą fortecą jest ta okoliczność, aby nie być znienawidzonym, bo tego forteca nie obroni, kogo naród nienawidzi, a naród, chociaż mu się broń odbierze, zawsze znajdzie pomoc u cudzoziemców. Żadnemu księciu w tych czasach fortece pożytku nie przyniosły, tylko jednej hrabinie di Forli 182 , po śmierci hrabiego Girolamo, jej męża; gdyż schroniwszy się do nich przed rozjuszonym ludem, oczekiwała nadejścia posiłków z Mediolanu, by odzyskać władzę, a okoliczności były tego rodzaju, że cudzoziemiec nie mógł wesprzeć powstańców. Lecz później, skoro Cezar Borgia zaczął ją atakować, a wrogi naród z cudzoziemcami jedną rękę zrobił, okazało się, że i jej na nic się fortece nie przydały. Hrabina byłaby lepiej na tym wyszła, gdyby jej lud nie był nienawidził, niż na tym, że fortece miała. Wszystko tedy razem skombinowawszy, pochwalam zarówno tych, co warownie stawiają, jak i tych, co nie stawiają, lecz ganię każdego, kto ufając warowniom, nie troszczy się o nienawiść w narodzie."}]},{"id":"rozdział-21-jak-się-powinien-książę-zachować-aby-uzyskał-dobre-imię","number":24,"title":"Rozdział 21. Jak się powinien książę zachować, aby uzyskał dobre imię","blocks":[{"type":"paragraph","text":"Żadna rzecz nie jedna tyle szacunku dla księcia, co przedsięwzięcie wielkich czynów i dawanie z siebie rzadkich przykładów, jak to widzimy na Ferdynandzie z Aragonii, teraźniejszym królu hiszpańskim, którego można nazwać nowym księciem, albowiem ze słabego królika wyniósł się przez sławę i wziętość na pierwszego monarchę w chrześcijaństwie. Wszystkie dzieła jego są największego rozmiaru, a niektóre z nich nadzwyczajne. Panowanie swoje rozpoczął oblężeniem Granady i tym czynem swoje państwo ugruntował. Zrazu działał bez pośpiechu, nie obawiając się przeszkody, ponieważ baronowie kastylijscy byli wojną zajęci, przeto nie mogli myśleć o formach politycznych; tymczasem sława Ferdynanda i jego władza nad nimi wzrastały bez ich wiedzy. Funduszami Kościoła i ludu utrzymywał wojsko, które, zahartowane długą wojną, niemało się później do jego sławy przyczyniło; aby zaś coraz większe podejmować dzieła, zastawiał się zawsze celem religijnym, a wypędzając ze swego państwa Maurów 183 , których pierwej obdarł, dał cudny i rzadki przykład bogobojnego okrucieństwa. Pod tym samym płaszczykiem podjął wyprawy do Afryki, do Włoch, a w końcu do Francji, i wszystkie swoje dzieła w ten sposób przedsiębrał, że umysły swoich poddanych trzymał w ciągłym naprężeniu i oczekiwaniu, a jeden czyn po drugim tak raptownie następował, iż nie było czasu oporu mu stawić. Toż rzadkie przykłady wewnętrznej administracji państwa są niemałą zaletą dla księcia, jak to opowiadają o Bernabie z Mediolanu 184 . Ktokolwiek w prywatnym życiu dopuści się nadzwyczajnej cnoty lub występku, powinien być premiowany lub karany, gdyż ludzie radzi o tym rozmawiają; lecz przede wszystkim sam książę powinien się o to starać, aby każdy jego czyn okazywał męża wielkiego i wykończonego 185 . Jego powaga zyskuje także przez otwarte działanie, zwłaszcza jeżeli się deklaruje otwartym przyjacielem lub nieprzyjacielem i bezwarunkowo czyjąś stronę popiera. Taki zawsze lepiej na tym wyjdzie niż neutralista; bo jeśli dwóch jego sąsiadów rozpocznie między sobą walkę, dwojaki może zajść wypadek: albo ten z nich, który drugiego zwycięży, będzie neutraliście niebezpieczny, albo nie. Tak czy siak, zawżdy jest korzystniej połączyć się z jedną stroną i wziąć udział w wojnie. W pierwszym bowiem wypadku neutralista idzie na łup zwycięzcy, z czego także zwyciężony cieszy się i jest kontent, nie mając żadnego powodu ani względu, by neutraliście dopomógł albo go bronił. Zwycięzca nie cierpi dwuznacznych przyjaciół lub takich, którzy mu w potrzebie nie pomagają, a zwyciężony odpycha od siebie neutralistę jako tego, który nie chciał się uzbroić i losu jego podzielać. Kiedy Etolowie posłali Antiocha do Grecji, aby Rzymian wypędził, Antioch namawiał Achajów, zostających w przyjaźni z Rzymianami, do zachowania neutralności, Rzymianie zaś żądali od nich zbrojnej pomocy. Zwołano senat achajski do narady w tym przedmiocie, i gdy Antiocha poseł przemawiał za neutralnością, odparł mu w te słowa rzymski wysłaniec: „Zachowanie neutralności w teraźniejszej wojnie wskazano tu jako najlepszą i najkorzystniejszą politykę dla Achajów. Przeczę temu i twierdzę, że nic zgubniejszego nad takie zdanie, ponieważ nie wdając się do wojny, zostaniecie na łasce zwycięzcy i nie zasłużycie sobie ani na wdzięczność, ani na sławę”. Zwykle się dzieje, że nieprzyjaciel prosi nas o zachowanie neutralności, przyjaciel o zbrojną pomoc; jeżeli więc jaki książę nie posiada dość odwagi, i dla uniknienia bliskiego niebezpieczeństwa deklaruje się zostać neutralnym, ten książę może być pewnym swego upadku; przeciwnie, jeśli się śmiało i mężnie za jedną stroną oświadczymy, wówczas sprzymierzony z nami zwycięzca zachowa dla nas wdzięczność i miłość nawet i w takim razie, gdyby był silniejszy od nas i my na jego łasce pozostali, bo ludzie nie są do tyla nieuczciwi, aby swoim pomocnikom niewdzięcznością odpłacali, również zwycięstwa nigdy nie są zupełne i nie zwalniają zwycięzców od jakichkolwiek, a najmniej od względów sprawiedliwości. Przegra zaś twój sprzymierzeniec, to i w takim razie nie opuści cię, lecz, ile sił jego, będzie ci pomagał i zawsze masz w nim towarzysza losu, a los, skory do zmiany, łatwo może ci przyjazne oblicze pokazać. Ale nawet w drugim z pomienionych wypadków, mianowicie jeśli walczące potęgi są tego rodzaju, iż zwycięzcy nie mamy się czego obawiać, nawet, mówię, w takim wypadku, rozsądek polityczny żąda po nas czynnego udziału; albowiem stronę, którą przy naszej neutralności zwyciężono, możemy poratować, a ta strona, jeśli zwycięży, zostanie na naszej łasce; zwyciężyć zaś musi, skoro jej tylko pomoc damy. Na tym miejscu robię uwagę, że książęta, wyjąwszy wypadek koniecznej potrzeby, powinni się wystrzegać takich sojuszów, gdzie słabszy łączy się z silniejszym, bo jeśli silniejszy zwycięży, słabszy zostaje na jego łasce, a właśnie tego powinni książęta najmocniej unikać, aby nie być na cudzej łasce. Nie przestrzegając tych zasad, Wenecjany bez nagłej potrzeby zawarli sojusz z Francją przeciw księciu Mediolanu i tym sposobem upadek sobie zgotowali. Lecz jeśli podobnego związku w żaden sposób nie można uniknąć, jak to np. wydarzyło się Florentczykom, gdy papież z Hiszpanami najechał Lombardię, wówczas trzeba się łączyć i postępować według powyższych reguł. Żadne bowiem państwo nie jest pewne swej polityki, owszem musi na dwóch stołkach siedzieć, ponieważ leży to w naturze rzeczy, że czym więcej staramy się wybrnąć z jednej niedogodności, tym snadniej wpadamy w drugą, i cała mądrość na tym się zasadza, aby znać wszystkie niedogodności i wybrać z nich co najmniejszą. Książę powinien być także miłośnikiem cnoty i wszystkich poważać, co w bądź jakim zawodzie celują; dalej powinien obywateli kraju, czy to kupców, czy ziemianów, w ogóle wszystkie warstwy zachęcać do spokojnego pełnienia swoich zatrudnień, aby właściciel ziemski z bojaźni utraty majątku nie odciągał się od upiększenia swych posiadłości lub handlarz, lękając się podatku, nie odwlekał otwarcia sklepu; przeciwnie, powinien książę nagrody przyznawać celującym mieszkańcom i w ogóle każdemu, kto tym lub owym sposobem stanie się użyteczny dla miasta lub państwa. Nadto powinien książę w stosownych porach roku wyprawiać narodowe festyny i widowiska, a ponieważ zatrudnienia lub rodowód dzielą ludność na różne klasy, cała powszechność winna być na uwadze księcia, on zaś ma czasem odwiedzać zgromadzenia i dawać przykłady ludzkości i hojności, lecz przy tym wszystkim nie naruszać, ale przestrzegać majestatu swego dostojeństwa."}]},{"id":"rozdział-22-o-ministrach","number":25,"title":"Rozdział 22. O ministrach","blocks":[{"type":"paragraph","text":"Nader ważnym zatrudnieniem książąt jest wybór ministrów, którzy są dobrzy, jeśli książę mądry, źli, jeśli nim nie jest; i najpewniejszy domysł o rozumie stanu jakiego księcia możemy powziąć z tego, jakimi ludźmi otacza się. Książę, który około siebie trzyma ludzi zdolnych i uczciwych, może uchodzić za rozsądnego, ponieważ poznał się na nich i nie dopuścił, aby się z czasem zepsuli; lecz jeśli ci ludzie są złego usposobienia, o zdolnościach tego księcia nie możemy mieć dobrego mniemania, skoro popełnił błąd przy wyborze swoich powierników. Ktokolwiek znał Antoniego z Venafro 186 , ministra Pandolfa Petrucciego, księcia Sieny, musiał Petrucciemu nader wiele rozumu przypisać, kiedy tego męża wybrał na ministra. Trojakiego bowiem rodzaju są rozumy ludzkie: jedni pojmują o własnych siłach, drudzy, gdy im kto wyłoży, a trzeci rodzaj jest ten, co ani sam, ani przy cudzej pomocy nic nie pojmie. Pierwszy rodzaj nazywamy doskonałym rozumem, drugi dobrym, trzeci nic wartym, czyli złym. Pandolfo należał jeśli nie do pierwszego, to do drugiego rzędu rozumów ludzkich, bo każdy książę, chociaż nie jest genialny, ale który umie się poznać na słowach i czynach ludzi, pozna się także na dobrych i złych czynach swego ministra, tamte będzie wychwalał, te ganił, a minister, nie mając nadziei, aby go mógł oszukać, musi być dobry. Nieomylny sposób dla książąt poznawania swoich ministrów jest następujący: minister, który więcej o sobie niż o księciu pamięta i przy każdej sposobności własną korzyść ma na oku, nigdy nie będzie dobrym ministrem i nie można mu ufać; bo komu ster państwa oddano, ten powinien zapomnieć o sobie i tylko o księciu pamiętać, i nigdy mu takich rzeczy nie przypominać, które nie należą do niego. Wynagradzając znów ministra i chcąc mieć w nim zawsze dobrego sługę, powinien go monarcha obsypywać honorami, dostatkami, obowiązkami i wszelkim innym sposobem, aby go przekonał, że wszystko co tylko posiada, jemu zawdzięcza; zaś minister, opływając we wszystko, nie będzie żądał ani więcej honorów, ani więcej majątku, a ciężar obowiązków zrobi go nieczułym na wszelkie zmiany. Postępują książęta i ministry tym torem, to obopólnie mogą sobie zaufać; postępują inaczej, jedna lub druga strona zawsze szkoduje 187 ."}]},{"id":"rozdział-23-jak-mamy-unikać-pochlebców","number":26,"title":"Rozdział 23. Jak mamy unikać pochlebców","blocks":[{"type":"paragraph","text":"Nie mogę pominąć ważnej rozprawy ani zamilczeć błędu, którego monarchowie, jeśli nie są wytrawnego rozumu i nie znają się na ludziach, z trudnością unikają. Będziemy więc mówić o pochlebcach. Że dwory panujących są tą szarańczą przepełnione, pochodzi stąd, ponieważ zazwyczaj co do własnych interesów tak dalece jesteśmy uprzedzeni i zaślepieni, iż niemałego potrzeba natężenia, aby się obronić od pochlebców, zaś unikając ich zupełnie, można popaść w drugą ostateczność i być pogardzonym. Jedyny zaradczy środek w tej mierze jest ten, aby ludzie powzięli przekonanie, iż wypowiedzenie prawdy nie obraża księcia; lecz gdyby każdemu wolno było prawdę księciu powiedzieć, powaga jego poszłaby w poniewierkę. Przeto roztropność nakazuje iść drogą pośrednią, a wybrawszy mądrych doradców, dozwolić im całą wypowiedzieć prawdę, rozumie się nie w każdej materii, tylko w tej, w której tego żądamy. Żądanie to powinno się często powtarzać, aby słuchając cudzych zdań, mógł je książę z własną opinią porównać, zaś wolność mówienia w naradach niech będzie tak wielka, żeby cała rada i każdy doradca z osobna pewny był, iż czym swobodniej broni swego zdania, tym milszy staje się księciu. Prócz postanowionych doradców nie powinien książę niczyjej rady zasięgać, ani nad uchwałami powtórnie się naradzać, ni też odmieniać uchwał. Kto rządzi w inny sposób, tego albo pochlebcy zgubią, albo dla niestałości w zdaniu będzie lekceważony, na dowód czego powołam jeden nowoczesny przykład. Ksiądz Łukasz 188 , powiernik cesarza Maksymiliana 189 , mówił, że cesarz Jegomość ani z nikim się nie naradzał, ani też żadnej sprawy podług swego widzimisię nie kończył, a to dlatego, bo nie trzymał się powyższych reguł. Cesarz bowiem jest mężem skrytym, nikomu nie wyjawia swych planów i nie radzi się nikogo. Lecz chcąc te plany w czyn zamienić, musi je odsłonić i wtedy dopiero sprzeciwiają się dworzanie, zaś miękki cesarza charakter sprawia, iż co dziś postanowi, jutro odwoła, tak dalece, że nie można przeniknąć jego zamiarów, a tym mniej polegać na jego uchwałach. Przeto mądry monarcha powinien ustawicznie naradzać się i to wtedy, kiedy sam zażąda, a nie wtenczas, kiedy się jego doradcom podoba; wszakże nie dozwolić, aby kto bez jego pozwolenia rady mu dawał, lecz sam przez się ma ich wszechstronnie zasięgać i wypowiedzianej prawdy cierpliwie słuchać, nawet okazać gniew, skoro postrzeże, że który minister dla jakichś względów jej nie wyjawił. Mylne jest zdanie, jakoby książęta, którzy za roztropnych uchodzą, tę sławę nie swoim zdolnościom, lecz swoim doradcom zawdzięczali; albowiem reguła, iż nieroztropny książę nie może mieć rozumnych doradców, jest bez ekscepcji 190 , chyba że nim rządzi jeden nadzwyczajnych zdolności minister, w którym to razie sprawy księcia mogą być dobrze kierowane, ale też w krótkim czasie możnowładny minister nie omieszka pozbawić go państwa; kiedy zaś trzyma się kilku takich pierwszorzędnych ministrów, ani oni między sobą nie zgodzą się na jedno zdanie, ani książę nie potrafi ich pogodzić. Każdy z nich będzie tylko swoich patrzał zysków, a książę nie zdoła ich poprawić ani też ocenić ich wotów 191 . Inaczej być nawet nie może, gdyż ludzie zawżdy ciągną do złego, jeśli ich konieczność nie zmusza być dobrymi. Stąd wynika, że nie mądre rady są twórcami roztropności monarchy, ale przeciwnie, monarcha roztropny tworzy mądrych doradców."}]},{"id":"rozdział-24-z-jakich-przyczyn-potracili-włoscy-książęta-swoje-państwa","number":27,"title":"Rozdział 24. Z jakich przyczyn potracili włoscy książęta swoje państwa","blocks":[{"type":"paragraph","text":"Wyłożyłem system polityki i jestem przekonany, że rozważne jego zastosowanie nie tylko nowego księcia z monarchą dziedzicznym zrówna, ale co więcej, zrobi go w krótkim czasie bezpieczniejszym i trwalszym, aniżeliby zasiadł na dziedzicznym tronie. Baczniej bowiem śledzimy czyny nowego niż dziedzicznego księcia, a czyny te, jeśli są waleczne, pozyskują więcej przyjaciół i zwolenników niżeli równe czyny dziedzicznego monarchy; bo ludzi więcej zajmuje teraźniejszość niż przeszłość, którzy, gdy pierwsza im dogadza, są zadowoleni i nie szukają czego innego, owszem stają w obronie nowego księcia, zwłaszcza gdy i w innej mierze postępuje należycie. Jak z jednej strony założyciel nowego państwa, który go mądrymi ustawami, silnym wojskiem i pięknymi przykłady ozdobił i wzmocnił, na podwójną zasłużył sławę, tak znów podwójną hańbą okrywa się ten, kto przez swoją nieudolność dziedziczną monarchię zgubił. Spojrzyjmy teraz na włoskich książąt, co za dni naszych swe państwa potracili, na króla Neapolu, na księcia z Mediolanu i na innych, a znajdziemy, że błąd im wszystkim wspólny tyczył się wojska i właśnie tych rzeczy, o których w powyższych rozdziałach obszernie mówiłem; znajdziemy dalej, że jedni nie mieli ludu za sobą, drudzy, chociaż lud sobie zjednali, nie umieli panów skaptować 192 . Bez tych błędów niepodobna pojąć ruiny tych to państw, skoro mieli tyle sił, iż potrafili wojska utrzymywać. W porównaniu z kolosalną potęgą Rzymian i Greków państwo Filipa Macedończyka 193 , nie ojca Aleksandra Wielkiego, ale tego, którego Titus Kwinkcjusz 194 zwyciężył, było nieznaczne, wszelako ponieważ Filip znał się na sprawach wojennych, a przy tym umiał ludem rządzić i panów sobie jednać, wytrzymał kilkoletnią wojnę z przeważnym 195 nieprzyjacielem, i w końcu, chociaż stracił kilka miast, jednak nie zgubił całego państwa. Więc nie los, ale swoją gnuśność muszą ci włoscy książęta oskarżać, którzy po długoletnim panowaniu ze swych krajów wyzuci zostali; bo naśladując wadę zwykłych ludzi, co w szczęściu zapominają o przygodach, nie pamiętali, że spokojne czasy mogą się zmienić; poszło więc za tym, że gdy nastały przeciwności, więcej im była ucieczka niż obrona na sercu, albowiem spodziewali się, że lud zuchwałych zwycięzców sobie sprzykrzy i nazad ich przywoła. Dobry to ratunek w braku innego, ale nie godzi się dla niego innych zaniedbywać. Nie należy bowiem upadać w nadziei, aby nas kto podniósł, bo ta nadzieja bardzo jest omylna, a jeśli nie omyli, to nader niebezpieczna, gdyż taki ratunek pachnie nikczemnością 196 i nie zależy od nas, a jedynie ów ratunek jest dobry, pewny i trwały, który od osobistej naszej zdolności zależy."}]},{"id":"rozdział-25-wpływ-losu-na-sprawy-ludzkie-i-jakim-sposobem-można-mu-opór-stawić","number":28,"title":"Rozdział 25. Wpływ losu na sprawy ludzkie i jakim sposobem można mu opór stawić","blocks":[{"type":"paragraph","text":"Nic jest mi tajne dawne, a u wielu dotychczas trwające mniemanie, jakoby los i Bóg w ten sposób rządzili światem, że mądrość ludzka nic w tym odmienić nie potrafi, nawet środków do tego nie ma. Zdawałoby się więc, że zabiegi nasze są podaremne i że lepiej zdać się na los szczęścia. Zdanie to tym bardziej jest w naszych czasach upowszechnione, ponieważ nie ma dnia, aby wbrew wszelkim oczekiwaniom nie zaszły ważne zmiany w sprawach ludzkich. Myśląc czasami nad tym, i ja byłem po części tej opinii przychylny; wszelako nie mogąc wykluczyć wolnej woli ludzkiej, skłaniam się do tego zdania, że jak z jednej strony może być prawdą, iż los zarządza jedną połową spraw ludzkich, tak znów drugą ich połowę, albo nieco mniej, zostawia nam do wolnego zarządu. Porównuję bowiem los z bystrą rzeką, która wezbrawszy, zatapia płaszczyzny, wyrywa drzewa i budynki znosi, grunta na jednym brzegu łupie, na drugim namula tak dalece, że wszystko ucieka przed gwałtownym prądem i nic mu się oprzeć nie może. Lecz za nadejściem pogody można temu wszystkiemu zaradzić, czy to usypaniem wału, czy też postawieniem grobli, a rzeka, gdy powtórnie wzbierze, popłynie albo jednym korytem, albo też nurty jej nie będą daleko rozlewać ani tyle szkód robić. Tak samo dzieje się z losem, który wtedy okazuje moc swoją i siłę, jeśli jesteśmy za słabi opór mu stawić, i tam z natarczywością działa, gdzie nie widzi grobli lub tamy, które by go na uzdach trzymały. Wpatrując się w Italię, ową arenę rożnych zaburzeń i intryg, widzimy, że to kraj bez grobli i bez wałów, gdzie, gdyby na wzór Germanii, Hiszpanii lub Francji był urządzony, wstrząśnienia polityczne nie byłyby tak silne lub przynajmniej nie tyle szkodliwe. To miałem do powiedzenia o ogólnych środkach zabezpieczenia się przed losem. Rozbierając rzecz szczegółowo, widzimy, że niejeden książę, nie zmieniając ani charakteru, ani żadnego innego swego przymiotu, dziś jest szczęśliwy, a jutro w upadku. Najbliższe tego zdarzenia powody rozebrałem dokładnie w poprzednich rozdziałach, z których wypływa, że monarcha całkowicie na los się zdający za każdą jego zmianą upaść musi. Mniemam także, że się temu dobrze powodzi, kto postępowanie swoje stosuje do ducha czasu, niszczeje zaś, kto mu się sprzeciwia. Ludzie bowiem w dopięciu zwykłych celów, jakimi są sława i bogactwa, rozmaitych używają środków: jeden postępuje przezornie, drugi popędliwie, jeden używa gwałtu, drugi fortelu, ten powoduje się cierpliwością, drugi jest gorączką, i każdy z nich, chociaż różnymi sposoby, może cel swój osiągnąć. Zdarza się nawet, że między dwoma, którzy z jednakową postępują przezornością, tylko jeden staje u celu; czasami znów zamiary tak przezornego, jak i natarczywego pomyślnym zostają uwieńczone skutkiem, chociaż działania ich wbrew sobie były przeciwne, co wszystko stąd pochodzi, że jednemu duch czasu sprzyjał, a drugiemu nie sprzyjał. Więc, jakem powiedział, tak jak dwa przeciwne sposoby działania jeden i ten sam mogą mieć skutek, zarówno skutki dwóch pojedynczych działań mogą być wręcz przeciwne i jeden z nich osiągnie, a drugi nie osiągnie celu. W tym leży tajemnica szczęścia; bo jeśli człowiekowi, który przezornie i cierpliwie działa, równie czas jak i okoliczności sprzyjają, człowiek ten doznaje szczęścia, ale upada niechybnie, jeśli przy zmianie czasu i okoliczności swojego postępowania nie zmieni. Lecz niełatwo znaleźć męża tyle roztropnego, aby się do tych przepisów zastosował, raz, że nie może przeciw swoim przyrodzonym działać skłonnościom, po wtóre, że trudno zmienić tryb postępowania, który przez dłuższy czas skuteczny się okazał. Idzie więc za tym, że kiedy są czasy do działań gwałtownych, człowiek przezorny im nie podoła i upada. Szczęście nie opuszczałoby ludzi, gdyby potrafili zastosować naturę swoją do zmian czasu i stosunków. Było zwyczajem papieża Juliusza II w każdej sprawie natarczywie działać, czemu czas i okoliczności tyle sprzyjały, że ciągle doznawał powodzenia. Przypatrzmy się jego pierwszej wyprawie przeciw Bolonii, przedsięwziętej za życia Jana Bentivoglio 197 . Podczas gdy Wenecjanom nie przypadła ta wyprawa do smaku, a król Hiszpanii robił konszachty z Francją, aby ją sam przedsięwziął, papież z wrodzoną sobie śmiałością i natarczywością stanął osobiście na jej czele. To zastanowiło Hiszpanię oraz Wenecjan i zaczęto papieża podejrzewać: Wenecjanie z bojaźni, Hiszpania z żądzy odzyskania neapolitańskiego królestwa. Tymczasem król francuski, widząc gotowość papieża, a chcąc go mieć przyjacielem do poskromienia Wenecji, zerwał z Hiszpanią i nie mógł bez jawnego obrażenia papieża odmówić mu wojsk posiłkowych. Gwałtownym tym pochodem dokonał Juliusz tej rzeczy, której by żaden inny papież z całym przyborem 198 mądrości ludzkiej nie był w stanie uczynić; bo gdyby był za przykładem innych papieży wyruszenie z Rzymu aż do zupełnego ukończenia przygotowań i uporządkowania spraw odkładał, król francuski znalazłby tymczasem mnóstwo wymówek i inni byliby tysiączne wznowili bojaźnie. Mijam inne czyny u tego papieża, gdyż wszystkie były do siebie podobne i udały się; lecz tej nie mogę pominąć uwagi, że tylko krótkie jego życie ochroniło go od doznania zawodu; bo gdyby były nastały czasy, w których trzeba przezornie i ostrożnie postępować, nieochybnie byłby się potknął, albowiem nie byłby zmienił sposobu postępowania, do którego z natury był skłonny. Jak długo chimera 199 losu z usposobieniem ludzi się zgadza, ludzie są szczęśliwi; rozstrój tej zgody sprowadza nieszczęście. Lecz zdaniem moim lepiej i korzystniej jest działać rączo niż z wielkim namysłem: wszak szczęście to kobieta, którą jeśli chcemy przychylną sobie zrobić, trzeba bić i szturkać, bo wtedy więcej nam sprzyja, niż gdy ozięble z nią postępujemy. Naśladując istotę kobiety, szczęście sprzyja młodym ludziom, jako nie tyle rozważnym, co odważnym, co mu śmiało rozkazują."}]},{"id":"rozdział-26-wezwanie-do-uwolnienia-włoch-od-cudzoziemców","number":29,"title":"Rozdział 26. Wezwanie do uwolnienia Włoch od cudzoziemców","blocks":[{"type":"paragraph","text":"Zważywszy wszystko, com dotąd powiedział, i radząc się własnych myśli, ażali 200 w teraźniejszych czasach może powstać nowy książę, który uzbrojony w roztropność i odwagę, przy tym korzystając z położenia i ze stosunków kraju, zaprowadziłby w nim taką ustawę państwową, co by jemu sławę, a szczęście dla narodu zgotowała, zdaje mi się, że nad teraźniejszą nie może się wydarzyć sposobniejsza pora. Powiedziałem, że bez egipskiej niewoli Żydów nie ujrzałby świat potęgi Mojżesza; powiedziałem także, że wielkość Cyrusa tylko w ujarzmieniu Persów przez Medów mogła się objawić, i że do unieśmiertelnienia Tezeusza rozsypka Ateńczyków niezbędnie była potrzebna. Tak samo ma się rzecz z dzisiejszymi Włochami; aby utorować drogę dla włoskiego geniusza, musiała Italia popaść w taką nikczemność 201 , że niewola jej stała się gorszą od niewoli hebrajskiej, ujarzmienie większe niżeli ujarzmienie Persów, rozproszenie znaczniejsze niż rozsypka Ateńczyków; musiała, mówię, Italia aż do tego przyjść, że jest bez głowy, bez porządku, pobita, obdarta, rozszarpana, najechana i wszelkim sposobem zniszczona. Jeśli się czasem okazał mąż, o którym się można było spodziewać, że go Opatrzność na wyswobodziciela przeznaczyła, pognębił go los właśnie wtedy, gdy stanął u szczytu swych działań. Tak tedy Italia pozostaje zawsze niejako w zaumarłym stanie i oczekuje, kto by ją z doznanych ciosów wygoił, kto by Lombardię od najazdów i rabunków, rzymskie prowincje i Toskanię od łupiestwa i kontrybucji uwolnił; oczekuje tego, kto by ją w ogóle z tych wszystkich ran wyleczył, które z biegiem czasu w fistułę 202 się zamieniły. Widzimy Italię modlącą się do Boga, aby zesłał męża, co by ją od okrucieństwa i dumy barbarzyńskich cudzoziemców wyswobodził; widzimy jak chętnie i z poświęceniem kroczyłaby za chorągwią narodową, byle tylko znalazł się chorąży i dowódca. Atoli z niczyjego domu tak snadnie, jak z przesławnego domu Waszej książęcej Mości może powstać oczekiwany naczelnik, boć ten dom, równie zamożny w cnoty, jak w szczęście i doznający łaski Boga i Kościoła, powinien stać się głową zbawienia dla całej włoskiej krainy, co nawet nie pociągnie za sobą wielkich trudności, jeśli tylko zbadasz wyżej przytoczone wzory działań i żywotów ludzkich. Prawdą jest, że powołani bohaterowie nie są ludzie pospolici, owszem podziwienia godni; z tym wszystkim byli ludźmi i nie mieli tyle sprzyjających okoliczności, jak są teraźniejsze, ponieważ ich zamiary nie były ani sprawiedliwsze, ani lżejsze od tych, które oczekujemy od ciebie, i nie doznawali większej łaski Boga niż twoja familia. Wielka sprawiedliwość, a jeszcze większa sposobność wymownie za tym przemawiają: sprawiedliwość, bo potrzebna wojna jest też sprawiedliwa, a oręż wtedy zwycięża, gdy nikomu, tylko jemu ufamy; zaś sposobność w tych czasach tak jest wielka, iż większa być nie może, i wszelkie trudności zwalczysz, skoro powołane przeze mnie przykłady weźmiesz za wzór swego postępowania. Sam Bóg przemówił nadzwyczajnymi zjawiskami: morze rozstąpiło się, chmura wskazała drogę, z deszczem spadały kamienie i manna, słowem wszystko spiknęło się na twoje wywyższenie: lecz dokończenie dzieła do ciebie należy, bo to pewna, że Bóg nic nie działa takiego, przez co by nasza wola lub ta część sławy, która od nas dependuje, ograniczone były."},{"type":"paragraph","text":"Nie ma nic dziwnego, że żaden z wspomnionych Włochów tego nie mógł dokazać, czego się po twej dostojnej rodzinie spodziewamy; również i to zadziwiać nie powinno, że Italia po tylu rewolucjach i po tylu wojnach zdaje się, jakoby swoją waleczność straciła. Zużyły się dawne ustawy, a nowych jeszcze nie zaprowadzono, każdy zaś nowego porządku twórca przez nic innego nie nabywa tyle uroku i sławy, co przez wymyślenie nowych praw i nowych ustaw. Jeśli do tego reformy są namaszczone powagą i gruntownością niewątpliwie spotka reformatora cześć i uwielbienie, a we Włoszech dość jest przedmiotów do zreformowania. Waleczności nie będzie brakowało szeregowcom, jeżeli dowódcy będą waleczni. Pojedynki i zwykłe bijatyki przekonują nas, że Włoch jako człowiek jest silny, zręczny i zdolny. Skądże pochodzi, że żołnierze włoscy nie mają tych przymiotów? Stąd, bo nie mają dobrych dowódców; lepsze głowy są nieposłuszne, zarozumiałość ogólna, i nie mieliśmy dotychczas męża, który by cnotą i szczęściem generalne posłuszeństwo sobie zjednał. Oto istotne przyczyny, dlaczego czysto włoskie armie w długim czasie dwudziestoletnich wojen nic znacznego zdziałać nie mogły i tylko klęski poniosły pod Tarą, Aleksandrią, Kapuą, Genuą, Vailą, Bolonią, Mestrą. Jeśli tedy dostojna familia twoja pragnie iść w ślady tych wybranych mężów, którzy stali się Ojcami Ojczyzny, musi się przede wszystkim o własne postarać wojsko, ponieważ nie ma wierniejszego, nie ma bitniejszego ani lepszego żołnierza nad krajowca, i on jest kardynalnym filarem każdej wyprawy w tym stopniu, że nie tylko pojedynczo wzięci są wzorowi, ale nawet w kompaniach stają się jeszcze lepszymi żołnierzami, zwłaszcza pod wodzą księcia rodaka, umiejącego ich zażyć i do boju prowadzić. Wypada ci się tedy obejrzeć za takowym wojskiem, gdyż tylko włoska waleczność obroni cię od cudzoziemców. Mimo bojaźni, którą piechota szwajcarska i hiszpańska wzniecają, nie są one bez błędów tak, że inne wojska nie tylko im podołać, ale także ich zwyciężyć potrafią. Hiszpańska piechoty nie wytrzymuje ataku kawalerii, zaś Szwajcarzy umykają przed nacierającą piechotą, co niezawodnie doświadczenie sprawdzi i ujrzymy, że Hiszpany przed jazdą francuską pierzchną, a piechota hiszpańska Szwajcarów pobije. Wprawdzie nie mieliśmy jeszcze przykładu drugiego wypadku, ale wydarzyła się już jego próbka w bitwie pod Rawenną, gdy piechota hiszpańska, zwinna i w małe puklerze uzbrojona, uderzyła na niemieckie wojsko szwajcarskiego autoramentu i rozerwała szeregi Niemców, którzy obronić się nie mogli, owszem gdyby nie jazda, do nogi byliby wyginęli. Poznawszy wady obydwóch gatunków piechoty, można łatwo wystawić nową piechotę, co by się tak kawalerii, jak i piechocie oparła, do czego jednak nie wystarcza nowych ludzi zaciąganie, lecz zmiana musztry jest potrzebna. Te i tym podobne reformy zapewniają sławę i wielkość nowemu księciu."},{"type":"paragraph","text":"Aby po tak długim oczekiwaniu Włochy ujrzały swego odkupiciela, nie powinna teraźniejsza sposobność bezskutecznie przeminąć. Ja nie umiem opisać uczucia, z jakim by go powitały wszystkie prowincje, co tyle od zaborczych napadów ucierpiały, z jaką żądzą zemsty, z jaką wiernością niewzruszoną, pobożnością, łzami. Gdzie te wrota, które by przed nim zamknięto? Gdzie lud lub tylko jeden człowiek, który by mu posłuszeństwa odmówił? A ponieważ panowanie barbarzyńców wszystkim do sytu obmierzło, żadna zazdrość nie powstałaby przeciw niemu. Niechże dostojna rodzina twoja podejmie się naczelnictwa z tą odwagą i nadzieją, jakie towarzyszą sprawiedliwym przedsięwzięciom, aby pod twoim sztandarem Ojczyzna oswobodzona została i pod twoją opieką spełniły się słowa Petrarki 203 : „Cnota pochwyci za oręż przeciw rozpasanej dzikości i walka nie będzie długo trwała, albowiem starodawne męstwo jeszcze nie wygasło w piersiach włoskich”."}]}]};</script>
