w myśl przysłowia: „między przyjaciółmi wszystko wspólne”."},{"type":"paragraph","text":"5. Już obecnie w niektórych państwach istnieje taki porządek w zarysach, co dowodzi, iż nie jest on niemożliwy; zwłaszcza w dobrze urządzonych państwach pewne rzeczy zostały już zaprowadzone, inne zaś są przygotowywane do wprowadzenia. Każdy bowiem ma tam swoją osobistą własność, pozwala jednak korzystać z niej swym przyjaciołom, równocześnie zaś sam korzysta z innej jakby wspólnej własności; tak np. w Lacedemonie jeden posługuje się niewolnikami drugiego niemal jakby swymi własnymi, podobnie i końmi, i psami, a jeśli potrzebują posiłku w drodze, to korzystają z plonów na polach na wsi. Widać tedy, że lepiej jest, by własność była prywatna, a stawała się wspólną przez użytkowanie."},{"type":"paragraph","text":"By zaś obywateli do tego przysposobić, to jest istotnym zadaniem ustawodawcy."},{"type":"paragraph","text":"6. Nie jest też bez znaczenia ta niewypowiedziana rozkosz, gdy ktoś może uważać coś za swą [osobistą] własność. Nie darmo przecież żywi każdy miłość do samego siebie, lecz jest to uczucie wszczepione przez naturę, a tylko samolubstwo słusznie bywa potępiane; nie jest ono jednak miłością samego siebie, ale jej nadmiernym przerostem. Tak samo potępia się też i chciwość, choć ściśle biorąc wszyscy znajdują uciechę w posiadaniu tego czy owego. Z drugiej strony jest też niezmiernie miło świadczyć przysługi i spieszyć z pomocą czy przyjaciołom, czy gościom, czy towarzyszom."},{"type":"paragraph","text":"7. Jest to możliwe tylko wówczas, gdy istnieje osobista własność. Otóż ci, którzy dążą do nadmiernej jedności państwa, tracą to wszystko, a nadto w sposób, oczy wisty uniemożliwiają uprawianie dwóch cnót: powściągliwości w stosunku do kobiet (a przecież piękną jest rzeczą wyrzec się cudzej żony dla skromności) tudzież hojności w rozporządzaniu majątkiem. Nawet bowiem ujawnić się to nie będzie mogło, czy ktoś jest szczodrobliwy, ani też nie dojdzie do żadnego w ogóle aktu szczodrobliwoś-"},{"type":"paragraph","text":"ci, skoro uprawianie tej cnoty polega na [odpowiednim] użytkowaniu majątku."},{"type":"paragraph","text":"8. Zapewne, tak urządzone państwol4 może się wydać pięknym i opartym na umiłowaniu ludzkości; kto o nim słyszy, chętnie też daje się do niego przekonać 14 Jak to przedstawia Sokrates u Platona, a więc o wspólnej własności."},{"type":"paragraph","text":"28"},{"type":"paragraph","text":"w mniemaniu, że zapanuje w nim jakaś podziwu godna miłość wszystkich do wszystkich, zwłaszcza jeśli ktoś skarży się na istniejące obecnie w państwach ujemne zjawiska (mam zaś na myśli wzajemne skargi o niedotrzymanie umów, procesy o złożenie fałszywego świadectwa, pochlebstwa wobec bogatych) i przyczyny ich istnienia dopatruje się w tym, że nie ma wspólnej własności."},{"type":"paragraph","text":"9. Wszystko to zło nie jest jednak bynajmniej wynikiem braku wspólności mienia, lecz [ludzkiej] przewrotności, ponieważ widzimy, że ci właśnie, którzy mają wspólną posiadłość i wspólnie na niej gospodarują, o wiele więcej popadają w zatargi aniżeli ci, co mają własność prywatną. Sprawiedliwość nadto wymaga, by wspomnieć nie tylko o ujemnych zjawiskach, których się unika przy wspólności dóbr, ale też i o korzyściach, tych zaś jest tak wiele, że z ich utratą życie wydaje się w ogóle niemożliwe."},{"type":"paragraph","text":"Za przyczynę błędnego poglądu Sokratesa trzeba uważać fałszywe założenie"},{"type":"paragraph","text":"[, z którego wychodzi]. Niewątpliwie i rodzina, i państwo winny stanowić jedność, lecz przecież nie bezwzględną. Jeśli bowiem państwo pójdzie za daleko w kierunku jedności, to może przestać istnieć, albo też będzie wprawdzie istnieć, ale będąc blisko tego stanu, w którym przestaje być państwem, będzie gorszym państwem."},{"type":"paragraph","text":"Jest to tak, jakby ktoś symfonię przekształcił na monotonię, a rytm zamienił w takt pojedynczy."},{"type":"paragraph","text":"10. Właśnie przeciwnie, ponieważ państwo, jak to powyżej wykazałem, jest wielością, należy je przez wychowanie ukształtować jako wspólnotę i jedność."},{"type":"paragraph","text":"Osobliwą jest rzeczą, że człowiek, który chce wprowadzić pewien system wychowawczy i sądzi, że po zastosowaniu go państwo będzie doskonałe, wyobraża sobie, iż je podźwignie wzwyż przez takie urządzenie, a nie przez obyczaje, filozofię i prawa w rodzaju tych, jak w Lacedemonie i na Krecie, gdzie prawodawca przez przymus wspólnych posiłków przeprowadził pewną wspólność dóbr. Nie należy i o tym także zapominać, że powinno by się wziąć pod uwagę długi, wieloletni okresu czasu, w ciągu którego urządzenia takie byłyby swą wartość wykazały, gdyby ją istotnie posiadały; niemal wszystko bowiem zostało już wynalezione, a tylko częścią nie doczekało się odpowiedniego zestawienia, częścią, choć znane, nie znalazło zastosowania."},{"type":"paragraph","text":"11. Rzecz cała najwyraźniej by wystąpiła, gdyby się raz zobaczyło ustrój taki15"},{"type":"paragraph","text":"w rzeczywistości zaprowadzony. Okazałoby się bowiem, że nie da się państwa urządzić bez podziału i ugrupowań czy to na związki współbiesiadników (syssitie), czy na grupy rodowe (fratrie) i szczepy (fyle); w ten sposób z ustawodawstwa tego nic innego nie pozostanie jak postanowienie, że strażnicy państwa nie powinni uprawiać roli, co przecież już teraz zamierzają zaprowadzić u siebie Lacedemoń-"},{"type":"paragraph","text":"czycy. Jak się będzie jednak przedstawiało ukształtowanie całego życia państwowego przy zastosowaniu zasady wspólności dóbr, co do tego i Sokrates się nie wypowiedział i niełatwo przychodzi to powiedzieć. A przecież właśnie na masę ludności państwa składa się rzesza innych obywateli, których położenie nie jest 15 Jaki projektuje Sokrates w Państwie Platona."},{"type":"paragraph","text":"29"},{"type":"paragraph","text":"określone [, tak iż nie wiadomo], czy i u rolników winna być wspólna własność, czy też każdy ma posiadać osobną, a nadto czy kobiety i dzieci mają u nich być własne, czy też być wspólne."},{"type":"paragraph","text":"12. Jeśli bowiem w ten sposób wszystko ma być wspólną własnością wszystkich, to czymże będą się inni różnić od owych strażników państwa? Albo co za korzyść będą mieć z tego, że się ich władzy podporządkują? Albo co ma się im zrobić, by znosili ich władzę, jeśli się nie zastosuje do nich takiego zręcznego środka, jakiego chwycili się Kreteńczycy. Ci bowiem przyznali niewolnikom wszelkie inne prawa, a tylko zabronili im dostępu do gimnazjów i posiadania broni. Jeśli zaś te stosunki zostaną w owym państwie tak urządzone, jak to ma miejsce w innych państwach, to jakże się będzie przedstawiać ta wspólność? Przecież w jednym państwie z konieczności będą dwa państwa, i to wrogie sobie. Sokrates robi bowiem ze strażników państwa raczej załogę, a z rolników, rzemieślników i innych mieszkań-"},{"type":"paragraph","text":"ców — obywatelil6."},{"type":"paragraph","text":"13. Skargi jednak, procesy i wszelkie inne ujemne zjawiska w państwach, na które wskazuje, będą się wszystkie przejawiać i tutaj. Powiada wprawdzie Sokrates17, że obywatele dzięki odpowiedniemu wychowaniu nie będą potrzebowali wielu praw, jak np. dotyczących policji miejskiej, spraw targowych, czy czegoś podobnego, ale zapomina, że to wychowanie przyznał jedynie strażnikom państwa."},{"type":"paragraph","text":"Robi ponadto rolników panami własności, jeżeli złożą pewną daninę, a przecież prawdopodobnie będą oni o wiele bardziej trudni i butni aniżeli gdzie indziej heloci, penestowie 18 i niewolnicy."},{"type":"paragraph","text":"14. Nic jednak [Sokrates] nie mówi, czy te urządzenia są równie koniecznym następstwem [jego systemu], czy nie, tak jak się nie wypowiada w sprawach z tym związanych, a mianowicie, jaki ustrój winna mieć ta poślednia warstwa ludzi, jakie wychowanie i jakie prawa. Niełatwo przecież znaleźć odpowiedź na to pytanie, nie jest zaś bynajmniej obojętną rzeczą dla utrzymania wspólnoty strażników, jakie cechy wykazują ludzie z warstwy im podległej. Lecz jeśli prawodawca zaprowadzi u nich wspólność kobiet obok własności prywatnej, to któż ma prowadzić gospodarstwo domowe, tak jak ich mężowie swe prace na roli? Ta sama trudność wystąpi, jeśli się obok wspólności kobiet zaprowadzi również i wspólność majątków rolników."},{"type":"paragraph","text":"15. Dalej, niewłaściwą jest rzeczą robić porównanie ze zwierzętami19 (mówić, że kobiety winny spełniać te same czynności, co i mężczyźni), bo u zwierząt nie istnieje wcale gospodarstwo domowe. Wątpliwości budzi również pogląd Sokratesa na zagadnienie powoływania rządców, każe bowiem tym samym stale sprawować władzę. To zaś staje się powodem do buntów nawet u ludzi, którzy nie wykazują żadnych ambicji, a cóż dopiero u burzliwych i wojowniczych. Oczywistą jednak 16 Platon, Państwo, ks. III, rozdz. 22 (415 D i 416B)."},{"type":"paragraph","text":"17 Platon, tamże, ks. IV, rozdz. 3, i ks. V, rozdz. 12 (464 E)."},{"type":"paragraph","text":"18 Por. niżej, rozdz. 6, przyp. 50 do tej księgi."},{"type":"paragraph","text":"19 Zob. Platon, Państwo 451D."},{"type":"paragraph","text":"30"},{"type":"paragraph","text":"jest rzeczą, że musi on rządy tym samym powierzać, bo owo „złoto pochodzące od boga” nie zostało domieszane do duszy raz tym, drugi raz tamtym, ale stale tym samym. Według niego bowiem, bóg zaraz przy urodzeniu dodaje do duszy jednym złota, drugim srebra, a tym, którzy mają być rzemieślnikami i rolnikami, spiżu i żelaza20."},{"type":"paragraph","text":"16. Odbiera nadto strażnikom szczęście osobiste, a równocześnie twierdzi, że prawodawca powinien zapewnić szczęście całemu państwu. A przecież państwo jako całość nie może być szczęśliwe, gdy szczęścia nie będą odczuwać wszystkie jego części, czy też ich większość, albo i pewne tylko jego człony. Bo ze szczęściem to nie tak, jak z liczbą parzystą, która może nią być jako całość, mimo że żadna z jej części składowych nie jest parzysta; natomiast gdy chodzi o szczęście, jest to niemożliwe. Jeśli więc strażnicy państwa nie będą szczęśliwi, to któż inny? Przecież chyba nie rzemieślnicy i rzesza prostych robotników. Ustrój, o którym mówił Sokrates21, takie tedy budzi wątpliwości, a i inne jeszcze nie mniejszej wagi."},{"type":"paragraph","text":"3. Krytyka dzieła Platona: «Prawa»"},{"type":"paragraph","text":"1. Podobnie mniej więcej ma się rzecz i z później napisanymi księgami Praw, i dlatego wskazane jest poświęcić parę uwag również skreślonemu tam ustrojowi. Albowiem w platońskim Państwie roztrząsał Sokrates tylko bardzo niewiele zagadnień, mówiąc, jak należy urządzić wspólność kobiet i dzieci, sprawy własności tudzież podział obywateli na klasy. Dzieli mianowicie ogół"},{"type":"paragraph","text":"mieszkańców na dwie grupy: rolników i wojowników, z których wyłania się trzecia, stanowiąca organ obradujący i władający w państwie. Czy jednak rolnicy i rzemieślnicy mają jakiś udział w rządach, czy też wcale nie, czy i oni winni posiadać broń i ciągnąć na wojnę, czy nie, o tym nic Sokrates nie mówi, a tylko sądzi, że kobiety powinny brać udział w wojnie i przechodzić takie samo wychowanie, co i strażnicy państwa. Zresztą zaś wypełnił dzieło uwagami nie należącymi do rzeczy i rozważaniami na temat, jak wychowanie strażników państwa urządzić należy."},{"type":"paragraph","text":"2. W księgach Praw natomiast przeważna część traktuje właśnie o prawach, o ustroju zaś niewiele się tu mówi. A chociaż wywody na ten ostatni temat pragnie autor więcej dostosować do urządzeń istniejących w państwach, to przecież z wolna powraca znów do tamtego ustroju. Bo poza wspólnością kobiet i własności wszystkie inne urządzenia w jednym i drugim zarysie ustroju zostawia te same: tak samo mianowicie urządza wychowanie, tak samo postanawia, że członkowie warstwy kierowniczej mają być zwolnieni z prac służebnych i tak samo utrzymuje postanowienie co do wspólnych biesiad, z tym tylko wyjątkiem, że tu opowiada 20 Platon, tamże, ks. V, rozdz. 21 (415 A-C)."},{"type":"paragraph","text":"21 Platon, tamże, ks. IV, rozdz. l (420 B)."},{"type":"paragraph","text":"31"},{"type":"paragraph","text":"się za koniecznością wspólnych biesiad również dla kobiet22, jako też, że tam liczbę posiadających broń podawał na tysiąc23, a tu na pięć tysięcy24."},{"type":"paragraph","text":"3. Wszystkie wywody Sokratesa wykazują wspaniałość i ozdobność stylu, oryginalność i wnikliwość myśli, ale trudno chyba powiedzieć, że wszystko słusznie ujmują. Przecież i przy podanej ostatnio cyfrze trzeba sobie zdać sprawę z tego, że dla tak wielkiej ilości zbrojnych potrzebny byłby kraj wielkości Babilonii lub jakiś inny podobnie olbrzymich rozmiarów, z którego mogłoby się wyżywić pięć tysięcy niepracujących, a nadto liczniejsze jeszcze rzesze ich żon i służby. Można oczywiście wychodzić z dowolnych założeń, w żadnym jednak wypadku nie należy wysuwać absurdalnych niemożliwości."},{"type":"paragraph","text":"4. Powiada się dalej, że pracodawca winien stanowić prawa mając dwie rzeczy na względzie: kraj i ludzi. Byłoby jednak dobrze dodać ponadto i kraje sąsiednie, przede wszystkim wówczas, jeśli państwo ma prowadzić życie w społeczności państw, a nie w odosobnieniu. Musi on mianowicie rozporządzać taką siłą wojenną, która okaże się użyteczną nie tylko we własnym kraju, ale i na zewnątrz."},{"type":"paragraph","text":"Ale i wówczas, jeśli ktoś nie uznaje takiego [wojowniczego] życia, ani w odniesieniu do jednostki, ani w odniesieniu do państwa, to i tak trzeba być groźnym dla nieprzyjaciół, nie tylko gdy wtargną do kraju, ale i po ich odejściu."},{"type":"paragraph","text":"5. Co do rozmiarów posiadłości, należy rozważyć, czy nie można by jej określić wyraźniej, a tym samym i jakoś lepiej. Powiada bowiem [Sokrates], że winna ona być taka, aby można było żyć z niej umiarkowanie25, co tyle znaczy, jak gdyby ktoś powiedział, żeby można żyć wygodnie. Wyrażenie jego jest bardziej ogólnikowe, bo można żyć umiarkowanie, a jednak i nędznie. Ale lepsze jeszcze jest określenie „umiarkowanie, a przy tym i hojnie” [bo każda z tych cech oddzielnie będzie sąsiadować w drugim wypadku z rozrzutnością, w pierwszym zaś z ubóstwem]. W użytkowaniu majątku są to jedyne zalety, jako że w odniesieniu do majątku nie można mówić o łagodnym lub mężnym jego użytkowaniu, a tylko o umiarkowanym i hojnym, czyli że te właśnie cechy musi się złączyć z właściwym użytkowaniem majątku."},{"type":"paragraph","text":"6. Niewłaściwą rzeczą jest też, jeśli się przyjmuje równość posiadłości, a nie przewiduje się żadnych zarządzeń co do liczby obywateli i zostawia się swobodę płodzenia dzieci bez ograniczeń, jak gdyby rzecz się dostatecznie wyrównywała skutkiem wielu wypadków bezdzietności i liczba ludności mimo wielu urodzin utrzymywała się w tej samej wysokości, co też i obecnie zdaje się zachodzić w różnych państwach. Stosunki te nie musiałyby się jednak przedstawiać ściśle tak samo w państwach, według jego pomysłu [urządzonych], co w państwach, które istnieją obecnie. Obecnie bowiem nikt nie cierpi biedy, ponieważ majątek podlega 22 Platon Prawa, 780 E."},{"type":"paragraph","text":"23 Platon, Państwo 423 A; liczba 1000 podana jest tu jednak jako minimum."},{"type":"paragraph","text":"24 Prawa 737 E, 740 D, 745 B."},{"type":"paragraph","text":"25 Tamże, 737 C-D."},{"type":"paragraph","text":"32"},{"type":"paragraph","text":"podziałowi między dowolną liczbę dzieci, tak jednak przy niepodzielności majątków nadliczbowi, niezależnie od tego, czy mniej, czy więcej by ich było, z konieczności nic by nie posiadali."},{"type":"paragraph","text":"7. Można by zatem przyjąć, że zamiast ograniczeń co do majątku, należałoby zaprowadzić raczej ograniczenia co do rodzenia dzieci, tak żeby ich nie płodzić ponad pewną liczbę; liczbę tę należałoby określić, biorąc pod uwagę takie wypadki, jak ten, że niektóre dzieci umrą przedwcześnie, a niektóre małżeństwa okażą się bezdzietne. Jeśli zaś nie poczyni się żadnych ograniczeń urodzin, jak to się przeważnie dzieje w państwach, to z konieczności pociągnie to za sobą zubożenie obywateli, ubóstwo zaś wywołuje zaburzenia i zbrodnie. Toteż Fidon z Koryntu, jeden z najstarszych prawodawców26, uważał, że liczba rodzin i obywateli winna stale pozostawać ta sama, nawet gdyby od początku wszyscy mieli nierówne co do wielkości działki; natomiast w tych Prawach jest przeciwnie27."},{"type":"paragraph","text":"O tym jednakowoż, jak zdaniem moim lepiej by było [te stosunki urządzić], później trzeba będzie pomówić28."},{"type":"paragraph","text":"8. Brak też w owych Prawach wyjaśnienia co do tego, jak się będą odróżniać rządzący od rządzonych. Mówi tam29 [Sokrates], że jak z innej wełny robi się osnowę, a z innej wątek, tak też powinien się przedstawiać stosunek rządzących do rządzonych. Skoro zaś dopuszcza, żeby się cały majątek powiększał aż do pięciokrotnej wielkości30, do dlaczegóż nie miałoby to być dozwolone do pewnego stopnia i przy własności ziemskiej. Przecież i przy rozdziale gospodarstwa powinno by się uważać, aby gospodarki nie utrudniać; każdemu bowiem przydzielił dwa zupełnie odrębne gospodarstwa, a jednak trudno jest zamieszkiwać dwa domy31."},{"type":"paragraph","text":"9. Cała jego konstrukcja ustrojowa nie chce być ani demokracją, ani oligarchią, a tylko czymś pośrednim między nimi, czyli tzw. politeją, bo władza spoczywa tu w rękach ciężkozbrojnych. Jeśli więc wysuwa tę formę ustroju jako najodpowiedniejszą dla państw w porównaniu z innymi, to ma zapewne słuszność, w błędzie jest natomiast, jeśli ją podaje za najlepszą z kolei po pierwszym ustroju32; w takim razie bowiem można by z łatwością postawić wyżej ustrój Lakończyków albo i inny, jeszcze więcej arystokratyczny."},{"type":"paragraph","text":"26 Prawodawca Fidon (Pheidon) z Koryntu jest postacią skądinąd zupełnie nieznaną; z tego, co tu mówi Arystoteles, należałoby czas jego działalności odnieść do VIII w. p.n.e."},{"type":"paragraph","text":"27 Arytoteles nie jest tu zupełnie ścisły, bo według Platona (Prawa 740 D - E) miałoby być 5040 obywateli i tyleż obywatelek, którzy powinni by mieć po jednym synu i córce; nadliczbowe dzieci mieliby oddać do adopcji tym, którzy by się okazali bezdzietnymi."},{"type":"paragraph","text":"28 Por. niżej, ks. VII, rozdz. 14, gdzie autor zaleca spędzanie płodu jako środek przeciwko nadmiernemu zwiększaniu się liczby ludności."},{"type":"paragraph","text":"29 Prawa 734 E."},{"type":"paragraph","text":"30 Tamże, 744 E."},{"type":"paragraph","text":"31 Tamże, 745 E, 775 E. Jedno gospodarstwo miało się znajdować na pograniczu, a drugie pod miastem, przy czym pierwszym miał się zajmować syn-spadkobierca; por. niżej, ks. VII, rozdz. 9."},{"type":"paragraph","text":"32 Tj. ustroju przedstawionym w Państwie."},{"type":"paragraph","text":"33"},{"type":"paragraph","text":"10. Twierdzą niektórzy, że najlepszy jest ustrój mieszany z części wszystkich ustrojów i dlatego właśnie chwalą ustrój Lacedemończyków. Powiadają bowiem, że składa się on z oligarchii, monarchii i demokracji, przy czym królestwo nazywają monarchią, władzę członków rady (gerontów) oligarchią, a demokracji dopatrują się w urzędzie eforów, ponieważ ci są wybierani z ludu. Inni przeciwnie, uważają eforat za tyranię, a demokrację widzą we wspólnych biesiadach (syssitiach) i innych urządzeniach codziennego życia."},{"type":"paragraph","text":"11. W tych Prawach natomiast powiedziano, że najlepszy ustrój powinien się składać z demokracji i tyranii33, których albo w ogóle nie można uważać za ustroje, albo chyba za najgorsze ze wszystkich. Słusznie więc postępują ci, którzy opowiadają się za mieszaniną różnych ustrojów, bo ustrój złożony z liczniejszych części jest lepszy. Poza tym ustrój ów najwidoczniej nie zawiera wcale cech monarchicznych, a tylko oligarchiczne i demokratyczne, przy czym skłania się więcej ku oligarchii."},{"type":"paragraph","text":"Okazuje się to ze sposobu ustanowienia urzędników. To bowiem, że się ich losuje spośród wybranych w głosowaniu34, jest cechą wspólną demokracji i oligarchii, natomiast ciążący na zamożniejszych przymus uczestniczenia w zgromadzeniach ludowych, wybierania urzędników i pełnienia innych czynności państwowych, podczas gdy inni obywatele są od tego zwolnieni35, znamionuje oligarchię, podobnie jak dążenie do tego, aby większa część urzędników pochodziła z warstwy zamożnych, a najwyższe godności były obsadzane przez ludzi z najwyższych klas majątkowych."},{"type":"paragraph","text":"12. Również wybór rady opiera się na zasadach oligarchicznych36. Wszyscy bowiem muszą wybierać, ale wybierać muszą najpierw ludzi z pierwszej klasy majątkowej, następnie znów równą liczbę ludzi z drugiej i z kolei z trzeciej [i czwartej]37 klasy, tylko że w tym wypadku nie wszyscy ludzie z trzeciej i czwartej klasy musieli brać udział w wyborach; przy wyborach członków rady z czwartej klasy musieli brać udział tylko obywatele z pierwszej i drugiej klasy. Następnie"},{"type":"paragraph","text":"— powiada — należy spośród tychże powołać ostatecznie członków rady, i to równą liczbę z każdej klasy. W ten sposób wyborcy z najwyższych klas majątkowych, a więc i bardziej wartościowi, będą stanowić większość, ponieważ niektórzy z ludu wobec braku przymusu nie wezmą udziału w wyborach."},{"type":"paragraph","text":"13. Okazuje się więc z tego, że ustrój taki nie może się składać z demokracji i monarchii, a to samo okaże się i z późniejszych wywodów, gdy przyjdzie kolej na omawianie takiego ustroju. Również sposób wyboru urzędników przez wybie-ranie spośród wybranych ma swe niebezpieczne strony. Jeśli bowiem ludzie z pewnej grupy, choćby niewielkiej liczebnie, zechcą się porozumieć ze sobą, to wybory zawsze wypadną wedle ich woli."},{"type":"paragraph","text":"Tak więc przedstawiają się uwagi co do ustroju w Prawach."},{"type":"paragraph","text":"11 Prawa 710 E."},{"type":"paragraph","text":"14 Tamże, 756, 763, 765."},{"type":"paragraph","text":"35 Tamże, ks. VI, 764 A, 765 C, 756 B - E."},{"type":"paragraph","text":"16 Tamże, ks. VI 756 B."},{"type":"paragraph","text":"17 [i czwartej] jest uzupełnieniem Bornemanna, niezbędnym, jak z dalszego tekstu wynika."},{"type":"paragraph","text":"34"},{"type":"paragraph","text":"4. Krytyka ustroju Faleasa"},{"type":"paragraph","text":"1. Są jednak jeszcze i inne pomysły ustrojów, jedne pochodzące od zwykłych ludzi, inne od filozofów i mężów stanu, które przecież wszystkie bliższe są istniejących ustrojów regulujących obecnie życie państwowe aniżeli oba poprzednie."},{"type":"paragraph","text":"Nikt inny bowiem nie wprowadził owych nowości co do wspólnego posiadania dzieci i żon ani też co do wspólnych biesiad kobiet, lecz wszyscy raczej wychodzą od rzeczy koniecznych."},{"type":"paragraph","text":"Niektórzy mianowicie uważają za rzecz najważniejszą dobre urządzenie stosunków własności, bo o nią — powiadają — wybuchają wszelkie zamieszki."},{"type":"paragraph","text":"Dlatego Faleas z Chalcedonu38 pierwszy wystąpił z pomysłem, że posiadłości obywateli powinny być równe."},{"type":"paragraph","text":"2. Przeprowadzenie tego w miastach nowo zakładanych uważał za rzecz nietrudną; więcej kłopotu byłoby w miastach już istniejących, niemniej jednak wyrównanie byłoby według niego możliwe w bardzo szybkim czasie, jeśliby bogaci dawali córkom posag, ale by go nie brali, biedni zaś nie dawaliby, lecz brali. Platon natomiast, pisząc swoje Prawa uważał, że należy tu pozostawić do pewnego stopnia swobodę, z tym jednak, że nikomu z obywateli nie byłoby wolno posiadać więcej aniżeli pięciokrotność najmniejszej posiadłości, jak to już poprzednio wspomniałem39."},{"type":"paragraph","text":"3. Ci, którzy takie prawa stanowią, nie powinni by także i o tym zapominać, jak to dzieje się obecnie, że skoro się oznacza rozmiary majątku, to trzeba oznaczyć i liczbę dzieci. Bo jeżeli liczba dzieci jest za duża w stosunku do wielkości majątku, to wyłoni się konieczność zniesienia prawa, a niezależnie od tego zniesienia jest rzeczą niepożądaną, by z bogatych powstawało wielu biedaków; trudno bowiem przeszkodzić, by tacy ludzie nie byli siewcami niepokojów."},{"type":"paragraph","text":"4. Że zatem równość majątkowa ma pewne znaczenie dla wspólnoty państwowej, to rozumieli, jak się zdaje, także i niektórzy z dawnych prawodawców, jak np."},{"type":"paragraph","text":"Solon, który ustanowił prawo, istniejące i u innych, nie pozwalające nabywać ziemi w dowolnej ilości. Podobnie znów prawa zabraniają sprzedawać majątek; tak np. w Lokrach40 jest prawo zabraniające sprzedaży, jeśli się kto nie wykaże oczywistym nieszczęściem, jakie go spotkało, lub inne prawo nakazujące utrzymanie prastarych działek rolnych. (Zniesienie tego prawa w Leukas41 spowodowało przekształcenie ustroju w duchu nadmiernie demokratycznym; nie zdołano już bowiem utrzymać zasady dostępu do urzędów według określonego cenzusu majątkowego.)"},{"type":"paragraph","text":"38 Faleas z Chalcedonu jest skądinąd zupełnie nieznany. Z tego, co Arystoteles o nim mówi, zdaje się wynikać, że był starszy od Platona, a może i od Hippodamosa."},{"type":"paragraph","text":"39 Por. wyżej, 1265 b."},{"type":"paragraph","text":"40 Arystoteles ma zapewne na myśli Lokry Epizefiryjskie (Epizephyrii) w południowej Italii, a nie plemię Lokrów w środkowej Grecji."},{"type":"paragraph","text":"41 L e u k a s — wyspa i miasto u wybrzeży Akarnanii."},{"type":"paragraph","text":"35"},{"type":"paragraph","text":"5. Może nawet istnieć równość majątków, a jednak będą one albo za wielkie, tak że [właściciele] w gnuśność popadną, albo zbyt małe, tak że w nędzy żyć będą."},{"type":"paragraph","text":"Jasną zatem jest rzeczą, że prawodawca nie może poprzestać na ustanowieniu równości majątków, ale musi też wziąć pod uwagę średnią ich miarę. I w takim razie jednak, jeśliby ktoś wszystkim średni majątek wyznaczył, nic się nie osiągnie, należy bowiem raczej wyrównywać namiętności aniżeli majątki, a to nie jest możliwe, jeśli wychowanie obywateli przez prawa nie stanie na odpowiednio wysokim poziomie."},{"type":"paragraph","text":"6. Może jednak mógłby na to powiedzieć Faleas, że to właśnie i on sam mówi; co do dwóch rzeczy mianowicie winna, jego zdaniem, panować równość w państwach: co do majątku i co do wychowania. Trzeba jednak powiedzieć, jakie to będzie wychowanie, bo żaden z tego pożytek, jeśli się powie, że ma być ono jedno i to samo. Bo może być wychowanie i jedno, i to samo, a przecież tego rodzaju, że budzić będzie nadmierną żądzę czy to bogactw, czy zaszczytów, czy też razem jednych i drugich."},{"type":"paragraph","text":"7. A przy tym ludzie wszczynają zamieszki z powodu nie tylko nierówności majątku, ale i godności, przy czym jednak w jednym i drugim wypadku bieg rzeczy bywa wręcz przeciwny. Tłum bowiem burzy się z powodu nierówności majątku, a możni z powodu godności, jeśli są one równo dla wszystkich dostępne; stąd i tu skarga:"},{"type":"paragraph","text":"Równej czci zażywają, czy tchórz to, czy człowiek waleczny42."},{"type":"paragraph","text":"Ludzie popełniają jednak niegodziwości nie tylko z braku rzeczy koniecznych"},{"type":"paragraph","text":"— lekarstwo na to widzi [Faleas] w równości majątku, sądząc, że w takim razie nikt z powodu zimna czy głodu nie pójdzie kraść czy grabić — ale także i dlatego, aby używać życia i nie zamęczać się w pożądaniu. Bo jeśli ich pożądanie wychodzi poza rzeczy niezbędne, to dla zaspokojenia go popełniać będą niegodziwości, i to nie tylko dlatego, lecz także43, by zażywać beztroskich rozkoszy."},{"type":"paragraph","text":"8. Jakież są środki zaradcze w tych trzech wypadkach? Dla jednych będzie to niewielka posiadłość i pracowitość, dla drugich umiarkowanie, inni wreszcie, jeśli zechcą w swej duszy szukać radości, nie znajdą w niczym lepszego oparcia jak w filozofii; inne bowiem możliwości używania wymagają współdziałania ludzi."},{"type":"paragraph","text":"Największych przecież niegodziwości dopuszczają się ludzie z nadmiernej żądzy używania, a nie z braku rzeczy koniecznych. Tak np. nikt nie sięga po władzę tyrana dlatego, by nie marznąć; stąd i chwała wielka czeka nie tego, co zabija złodzieja, ale tego, co [usunie] tyrana. Toteż ta forma ustroju, jaką Faleas przedstawia, może zaradzić drobnym tylko niesprawiedliwościom."},{"type":"paragraph","text":"9. Ponadto przeważna część jego pomysłów ma na celu takie urządzenie stosunków, w których obywatele sami rządziliby się dobrze; a przecież trzeba 42 Iliada IX 319."},{"type":"paragraph","text":"43 Tekst tu niepewny. Bernays, za nim inni, proponował skreślenie słów αν έπιθυµοΐεν jako nie dających sensu, i tak też tłumaczę. Inni próbują różnie tekst poprawiać w sposób dość dowolny."},{"type":"paragraph","text":"36"},{"type":"paragraph","text":"uwzględnić również i stosunek do sąsiadów oraz wszystkich państw obcych. [Przy urządzaniu ustroju] trzeba więc koniecznie wziąć pod uwagę i wzgląd na siłę wojenną, co do której ów wcale się nie wypowiedział. To samo dotyczy sprawy własności. Muszą mianowicie istnieć odpowiednie środki nie tylko ze względu na potrzeby wewnętrznej polityki, ale i ze względu na niebezpieczeństwo zewnętrzne."},{"type":"paragraph","text":"Toteż nie powinno być tak wiele bogactwa, żeby budziło pożądliwość u silniejszych sąsiadów, przed których napaścią nie zdołaliby się obronić posiadający, ani też tak mało, żeby nie potrafili sprostać w wojnie nawet z równymi i podobnymi przeciwnikami."},{"type":"paragraph","text":"10. Otóż Faleas nie podał żadnych postanowień w tym względzie, a przecież nie powinno się o tym zapominać, że wielkość majątku nie jest dla państwa rzeczą obojętną. Najlepszą miarą w tym względzie byłaby może taka, przy której nie opłaciłoby się silniejszym sąsiadom podejmować wojny w oczekiwaniu zysków, gdyż tyle by tylko osiągnęli, ile by mieli i bez zdobycia takiej posiadłości. Tak było wówczas, kiedy to Eubulos Autofradatesowi, przystępującemu do oblężenia miasta Atarneus, radził rozważyć, ile czasu zabierze mu zdobycie tej miejscowości, i policzyć koszta za ten czas, oświadczając zarazem gotowość opróżnienia zaraz Atarneus za mniejszą sumę. Słowa te sprawiły, że Autofradates rozmyślił się i oblężenia zaniechał44."},{"type":"paragraph","text":"11. Fakt równości majątku u obywateli przedstawia niewątpliwie pewne korzyści przez to, że nie są oni tak skłonni do zamieszek wewnętrznych, ale, prawdę powiedziawszy, są one wcale niewielkie. Ludzie wybitniejsi mogą się bowiem oburzać, że równość taka jest poniżej ich godności, stąd też często, jak pokazuje doświadczenie, zrywają się do powstań i zaburzeń. Niezależnie od tego, ludzie w swej nikczemności są nie do nasycenia, toteż początkowo wystarczają im tylko dwuobolowe zasiłki45, a gdy te już wejdą w zwyczaj, coraz to więcej żądają, aż wreszcie miary nie znają. Brak miary jest bowiem cechą przyrodzoną żądzy, w której zaspokojeniu streszcza się życie wielu ludzi."},{"type":"paragraph","text":"12. Zamiast myśleć o zrównaniu własności, należałoby raczej zacząć zabezpieczenie spokoju od takiego urobienia ludzi, żeby szlachetni z natury nie chcieli górować nad innymi, a marni nie mogli; osiąga się to wówczas, jeśli ci ostatni są mniej liczni i nie dzieje się im krzywda. Ale nawet sprawy równości mienia nie ujął [Faleas] właściwie. Wprowadza bowiem tylko równość własności ziemskiej, a przecież bogactwo opiera się też na niewolnikach, bydle i pieniądzach, tudzież na wielkim zasobie tzw. ruchomości. Trzeba więc dążyć do tego, żeby albo 44 Eubulos, tyran miasta Atarneus w Myzji w pierwszej połowie IV w. p.n.e., wyłamał się spod zwierzchnictwa perskiego, wskutek czego znalazł się w konflikcie z satrapą Lydii, Autofradatesem, Następcą Eubulosa na stanowisku tyrana w Atarneus był Hermias, z którego krewną ożenił się Arystoteles w czasie kilkuletniego pobytu w Atarneus po 347 r. p.n.e."},{"type":"paragraph","text":"45 Dwuobolowe zasiłki, czyli tzw. diobelia, były zapomogą państwową, którą płacono ubogim obywatelom ateńskim w ostatnim okresie wojny peloponeskiej, kiedy ludność, po obsadzeniu Dekelei przez Spartan, musiała szukać schronienia w Atenach i często była pozbawiona środków do życia. Por."},{"type":"paragraph","text":"Ustrój polit. Aten, 28, § 3."},{"type":"paragraph","text":"37"},{"type":"paragraph","text":"wyrównać posiadanie także i wszystkich tych rzeczy, albo wprowadzić jakąś średnią miarę, albo też wszystkiego poniechać."},{"type":"paragraph","text":"13. Okazuje się też z jego prawodawstwa, że ma on na względzie urządzenie drobnego państwa, skoro rzemieślnicy nie mają stanowić jakiejś części składowej obywateli, lecz będą niewolnikami państwa. Jeśli jednak ci, którzy dla ogółu wykonują pracę rzemieślniczą, mogą być rzemieślnikami państwowymi, to należałoby to zrobić w ten sposób, jaki jest zastosowany w Epidamnos 46, lub też tak, jak to kiedyś chciał urządzić w Atenach Diofantos 47."},{"type":"paragraph","text":"Z uwag powyższych dostatecznie zatem można osądzić, o ile Faleas w swoim zarysie ustroju ujął rzecz trafnie albo też nietrafnie."},{"type":"paragraph","text":"5. Krytyka ustroju Hippodamosa"},{"type":"paragraph","text":"1. Syn Euryfonta z Miletu Hippodamos48, który wynalazł sztukę planowania miast i Pireus równymi ulicami poprzecinał, był człowiekiem, który w całym swym sposobie życia, próżnością powodowany, uprawiał przesadę tak dalece, że robił dość powszechnie wrażenie nadmiernie dbałego o swoją powierzchowność ze względu na bujne, zbytkownie trefione włosy, jak i przez to, że nie tylko w zimie, ale i letnią porą nosił prostą wprawdzie, lecz ciepłą szatę. Otóż człowiek ten, który chciał ponadto uchodzić za znawcę wszelkich tajemnic natury, był też pierwszym, który nie będąc czynnym mężem stanu, pokusił się o to, by coś powiedzieć o najlepszym ustroju."},{"type":"paragraph","text":"2. Przyjmował on dla swego państwa liczbę 10 000 obywateli, podzielonych na trzy grupy: jedną z nich mianowicie stanowili — według niego — rzemieślnicy, drugą rolnicy, trzecią uzbrojeni wojownicy. Na trzy części również podzielił kraj, tak że część jedna przeznaczona została na cele kultu, druga na cele państwowe, trzecia zaś na własność prywatną, przy czym z dochodów pierwszej, zwanej świętą, pokrywać należałoby zwykłe wydatki związane z kultem bogów, z drugiej"},{"type":"paragraph","text":"— stanowiącej wspólną własność — utrzymanie wojowników, trzecia zaś — na własność prywatną przeznaczona — przypadałaby rolnikom. Przyjmował także trzy tylko rodzaje praw [twierdząc, że są trzy] rodzaje spraw, o które toczą się procesy: obraza czci, poszkodowanie i zabójstwo."},{"type":"paragraph","text":"3. Ustanowił też jedyny sąd najwyższy, do którego powinno się kierować wszelkie sprawy uchodzące za niedobrze rozstrzygnięte: wchodzić miała do niego pewna ilość wybranych starców. Wyroki w sądach nie powinny, jego zdaniem, zapadać przez zwykłe oddanie głosów, lecz każdy z sędziów winien mieć 46 E p i d a m n o s — później Dyrrachium, kolonia koryncka na wybrzeżu Ilirii. O jakie stosunki tu chodzi, nie wiadomo."},{"type":"paragraph","text":"47 Znany jest Diofantos — archont ateński w 395 r. p.n.e. Czy wspomniany tu Diofantos jest z nim identyczny, nie wiadomo, tak samo nieznane jest skądinąd wspomniane tu prawo."},{"type":"paragraph","text":"48 Głośny architekt z czasów Peryklesa; por., o nim również ks. VII, rozdz. 10, § 4."},{"type":"paragraph","text":"38"},{"type":"paragraph","text":"tabliczkę, na której wypisywałby swe orzeczenie, jeśliby się opowiadał bezwzględnie za skazaniem, a którą zostawiałby pustą, jeśliby się stanowczo oświadczał za uwolnieniem; jeśliby zaś miał jakieś zastrzeżenie co do jednego lub drugiego"},{"type":"paragraph","text":"[orzeczenia], musiałby to dokładnie podać."},{"type":"paragraph","text":"Stosowane bowiem obecnie postępowanie uważał za niedobre, ponieważ zmusza ono sędziów do działania wbrew przysiędze, skoro mają wyrokować tylko"},{"type":"paragraph","text":"„tak” lub „nie”."},{"type":"paragraph","text":"4. Proponował dalej prawo, zgodnie z którym ci, którzy wynaleźli coś pożytecznego dla państwa, otrzymywaliby odznaczenie, a dzieci tych, którzy zginęli na wojnie, wychowywane by były na koszt państwa, jak gdyby prawa takiego jeszcze nigdzie nie było. A przecież prawo takie istnieje obecnie tak w Atenach, jak i w innych państwach."},{"type":"paragraph","text":"Urzędnicy mieliby być wybieram wszyscy przez lud, przy czym przez lud rozumiał owe trzy grupy obywateli. Wybrani mieliby powierzoną troskę o wszelkie sprawy publiczne, jako też sprawy cudzoziemców i sierot. Tak się tedy przedstawiają najważniejsze urządzenia, stanowiące przeważną część ustroju Hippodamosa."},{"type":"paragraph","text":"5. Można by tu jednak podnieść wątpliwości przede wszystkim co do podziału ogółu obywateli. Bo i rzemieślnicy, i rolnicy, i wojownicy wszyscy na równi mają pełnię praw obywatelskich, chociaż rolnicy nie posiadają broni, a rzemieślnicy nie mają ni ziemi, ni broni, tak że niemal schodzą do roli niewolników tych, co broń posiadają. Otóż niemożliwą jest rzeczą, aby mieli równy dostęp do wszystkich godności, skoro stanowiska wodzów i stróżów państwa, i w ogóle najważniejsze urzędy z konieczności przypadają wojownikom. Jeśli zaś inni nie będą mieli równego udziału w sprawach państwowych, to jakżeż będą mogli życzliwie odnosić się do istniejącego ustroju?"},{"type":"paragraph","text":"6. Ale grupa posiadających broń powinna by być również silniejsza od obu pozostałych, to zaś niełatwo osiągnąć, jeśli nie będzie ona liczna. Jeżeli zaś taka będzie, to po co mają inni brać udział w zarządzie państwa i posiadać uprawnienie do ustanawiania władz? A dalej, rolnicy! Na cóż [w ustroju, jaki Hippodamos projektuje] są oni państwu potrzebni? Bo rzemieślnicy być muszą (każde przecież państwo ich potrzebuje) i mogą się utrzymać ze swego rzemiosła, jak i w innych państwach; rolnicy natomiast zapewne słusznie stanowiliby pewną część państwa, gdyby zadaniem ich było dostarczać żywności wojownikom, w tym wypadku jednak posiadają oni ziemię na własność i uprawiają ją tylko na własny użytek."},{"type":"paragraph","text":"7. Jeżeli zaś wojownicy sami będą uprawiać ziemię państwową, przeznaczoną na ich utrzymanie, to nie będą się niczym różnić od grupy rolników, czego przecież domaga się prawodawca. Jeśli jednak uprawą mają się zająć inni ludzie aniżeli rolnicy, gospodarujący na swoim, i wojownicy, to będzie to czwarta grupa w państwie, nie mająca żadnych praw politycznych, a więc pozostająca właściwie poza państwem. Ale nawet jeśli przyjąć, że zleci się tym samym ludziom uprawę roli własnej i państwowej, to, po pierwsze, ilość plonów, z których każdy pracownik uprawiający rolę będzie utrzymywał dwa domy, okaże się niewystar-czająca, a po wtóre, wyłoni się pytanie, dlaczego nie przydzielić im od razu całej 39"},{"type":"paragraph","text":"ziemi i działek, by i sami mieli zapewnione utrzymanie, i dostarczali go wojownikom."},{"type":"paragraph","text":"8. Wszystko to powoduje tedy wiele trudności. Zastrzeżenie budzi jednak także prawo o wyrokach sądowych, domagające się, aby sędzia czynił pewne rozróżnienia, mimo że skarga jest jasno ujęta, i robił się rozjemcą z sędziego. Jest to wprawdzie dopuszczalne w sądzie rozjemczym nawet przy większej liczbie rozjemców (porozumiewają się bowiem między sobą co do rozstrzygnięcia), ale niemożliwe w trybunale sądowym; toteż wręcz przeciwnie, przeważna część prawodawców wydaje zarządzenia przeciwko temu, by się sędziowie ze sobą porozumiewali."},{"type":"paragraph","text":"9. A potem, czyż nie będzie zamieszania przy wyrokach, kiedy sędzia orzeknie, że ktoś jest dłużen, ale nie tyle, ile podaje oskarżyciel. Ten bowiem zażąda np. 20"},{"type":"paragraph","text":"min, a sędzia przysądzi mu min 10, lub też jeden więcej, drugi mniej, inny jeszcze 5, a ten 4, i oczywiście w ten sposób będą dalej dzielić; jedni przysądzą oskarżycielowi wszystko, drudzy nic. Jakżeż więc odbywać się będzie liczenie głosów? A nadto nikt nie zmusza do działania wbrew przysiędze sędziego, który w dobrej wierze odsądza lub przysądza pewną sumę sprawiedliwie, jeśli tylko skarga jasno jest ujęta. Jeśli bowiem sędzia odrzuca żądanie, to wyrok jego nie znaczy, że pozwany nic nie jest winien, a tylko, że nie winien 20 min. Natomiast wbrew przysiędze postępuje ten, kto by przysądził żądaną sumę, mimo iż nie podziela zdania, jakoby oskarżony był winien 20 min."},{"type":"paragraph","text":"10. Co się zaś tyczy odznaczeń, jakie należałoby przyznawać tym, którzy wynaleźli coś korzystnego dla państwa, to nie jest rzeczą bezpieczną wydawać osobne prawo w tym względzie, a tylko przyjemnie o tym słuchać; prawo prowadziłoby bowiem do oszczerstw, a w pewnych okolicznościach i wstrząśnień ustroju. Zbiega się jednak ta sprawa z innym zagadnieniem i dalszym rozważaniem; niektórzy mianowicie wyrażają wątpliwość, czy to szkodliwe, czy też pożyteczne dla państwa, zmieniać odziedziczone po ojcach prawa, jeśli się jakieś inne, lepsze nasunie. Dlatego niełatwo przychodzi zgodzić się bez zastrzeżeń ze wspomnianym wnioskiem [Hippodamosa], jeśli zmiana [praw] nie przynosi korzyści. A może się zdarzyć, że ktoś, niby w interesie dobra ogółu, zaproponuje zniesienie pewnych praw albo ustroju."},{"type":"paragraph","text":"11. Skoro zaś raz o tym wspomnieliśmy, to lepiej to jeszcze nieco bliżej roztrząsnąć. Sprawa budzi, jak powiedziałem, wątpliwości, i mogłoby się zdawać, że lepiej jest, jeśli się zmienia [prawa], W innych dziedzinach przynajmniej zmiany dały korzystny wynik, tak np. w sztuce lekarskiej, gdy wprowadzono nowości do tradycyjnych praktyk, i w gimnastyce, i we wszystkich w ogóle sztukach i umiejętnościach; że zaś za jedną z nich należy uznać politykę, więc oczywistą jest rzeczą, że i z nią musi być podobnie. Dowodem tego — mógłby ktoś powiedzieć"},{"type":"paragraph","text":"— są same fakty: stare prawa są bowiem zbyt prymitywne i barbarzyńskie, a nawet Hellenowie niegdyś chodzili stale uzbrojeni i kupowali żony jedni od drugich."},{"type":"paragraph","text":"12. Co się jeszcze gdzieś ze starych praw utrzymało, jest całkiem niedorzeczne; tak np. w Kyme istnieje prawo o zabójstwie, które powiada, że jeśli skarżący o zabójstwo przedstawi pewną ilość świadków spośród swoich krewnych, to 40"},{"type":"paragraph","text":"oskarżony ma uchodzić za winnego mordu. W ogóle zresztą wszyscy ludzie oglądają się nie za tym, co tradycją przekazane, ale co dobre. Prawdopodobnie też i pierwsi ludzie, czy z ziemi powstali, czy ocaleli z jakiegoś straszliwego zniszczenia, byli tacy jak dzisiejsi, zwyczajni i niezbyt rozumni — w tym znaczeniu właśnie mówi się o ludziach z ziemi zrodzonych — tak że niewłaściwą rzeczą byłoby trwać przy ich poglądach. Lepiej ponadto nie zostawiać bez zmiany nawet i praw pisanych. Bo jak w innych sztukach, tak i w ustroju państwowym niemożliwą jest rzeczą ściśle wyrazić wszystko w piśmie; spisywane zasady muszą być bowiem ujmowane ogólnie, natomiast praktyka życiowa wyraża się w jednostkowych zjawiskach. Okazuje się więc z tego, że pewne prawa w pewnych wypadkach winny ulegać zmianom."},{"type":"paragraph","text":"13. Jeśli się jednak spojrzy na rzecz z innej strony, to będzie tu —jak się zdaje"},{"type":"paragraph","text":"— wskazana wielka ostrożność. Jeśli bowiem osiągnięta przez zmianę poprawa będzie nieznaczna, to wobec szkody, jaką grozi przyzwyczajenie obywateli do lekkomyślnego znoszenia praw, powinno by się oczywiście pozostawić bez zmiany pewne uchybienia i prawodawców, i rządzących; bo ten, co zmianę przeprowadzi, nie przyniesie tyle korzyści, ile spowoduje szkody przez przyzwyczajenie obywateli do nieposłuszeństwa wobec władz."},{"type":"paragraph","text":"14. Błędne jest tu porównanie ze sztukami, bo zmiana w sztuce a [zmiana]"},{"type":"paragraph","text":"w prawie to wcale nie to samo. Prawo zdobywa sobie bowiem siłę, która stanowi o posłuchu dla niego, jedynie przez przyzwyczajenie, do tego zaś nie dochodzi się inaczej jak w dłuższym okresie czasu. Toteż jeśli istniejące prawa z łatwością wymienia się na inne, nowe, to osłabia się tylko moc prawa. A wreszcie, jeśli się już musi zmianę wprowadzić, [to się nasuwa pytanie,] czy ma ona objąć wszystkie prawa i w każdym ustroju, czy też nie; czy ma ją przeprowadzić ktokolwiek, czy też pewne wyznaczone osoby; bo to jest wielka różnica. Dlatego zaniechajmy obecnie tego rozważania, bo będzie ono na miejscu przy innej sposobności49."},{"type":"paragraph","text":"6. Ustrój Lacedemończyków"},{"type":"paragraph","text":"1. W ustroju Lacedemończyków i Kreteńczyków, a właściwie także i w innych, dwie rzeczy są do zbadania: po pierwsze, czy istniejące tam prawa są właściwie czy niewłaściwie ujęte ze względu na wymagania najlepszego ustroju, a po wtóre, czy w nich nie ma czegoś przeciwnego założeniu i formie istniejącego u nich ustroju."},{"type":"paragraph","text":"2. Jest uznaną prawdą, że w państwie, które ma mieć dobry ustrój, obywatele muszą być wolni od pracy dla zaspokojenia potrzeb koniecznych; w jaki to sposób osiągnąć, niełatwo jednak określić. Poddani bowiem Tesalów, tzw. penestowie50, często przeciw nim bunty podnosili, podobnie jak i przeciw Lakończykom heloci; przecież ci nieustannie czyhają niejako, aby wyzyskać nieszczęścia [swych panów]."},{"type":"paragraph","text":"49 W Polityce już jednak Arystoteles do tych zagadnień nie wraca."},{"type":"paragraph","text":"50 Była to warstwa poddanych chłopów, prawdopodobnie potomków pierwotnej ludności kraju, podbitego przez wkraczające tu plemię Tesalów — odpowiednik helotów w Lakonii."},{"type":"paragraph","text":"41"},{"type":"paragraph","text":"3. Natomiast u Kreteńczyków nigdy nic takiego się nie wydarzyło. Pochodzi to zapewne stąd, że żadne z miast sąsiadujących, mimo iż toczą ze sobą wojny, nie łączy się z powstańcami; byłoby to bowiem przeciwne ich interesom, ponieważ również mają poddanych. Natomiast wszyscy sąsiedzi Lakończyków, Argejczycy, Meseńczycy i Arkadyjczycy byli ich wrogami. Podobnie było i z Tesalami, przeciw którym powstawali początkowo ich poddani, korzystając z tego, że ci prowadzili jeszcze wojny z sąsiadami, Achajami, Perrajbami i Magnetami51."},{"type":"paragraph","text":"4. Jeśliby tu już o nic innego nie chodziło, to przecież zagadnienie traktowania tych ludzi i sposobu, w jaki by do nich odnosić się należało, wydaje się trudne [do rozwiązania]. Bo jeśli się im pofolguje, to stają się zuchwali i domagają się równych praw z panami, jeśli zaś skaże się ich na życie w ciężkim ucisku, knują zamachy i pałają nienawiścią. Jasną tedy jest rzeczą, że ci, którzy się spotykają z trudnościami ze strony helotów, nie znajdują najlepszego sposobu ich traktowania."},{"type":"paragraph","text":"5. Także i zostawienie nadmiernej swobody kobietom jest szkodliwe zarówno dla wybranego ustroju, jak i dla dobra państwa. Bo jak mąż i żona stanowią dwie części domu, tak i państwo rozpada się, jak oczywiście należy przyjąć, na dwie mniej więcej równe części: ludność męską i żeńską; jeśli więc w jakimś ustroju zagadnienie kobiet jest źle załatwione, to musi się uznać, że połowa państwa nie ma ustalonego porządku prawnego. Wypadek ten zachodzi właśnie [w Sparcie]. Prawodawca bowiem, który chciał zaprawić całe państwo do powściągliwości, przeprowadził to, jak się okazuje, w stosunku do mężczyzn, a o kobiety wcale się nie zatroszczył, gdyż prowadzą one pod każdym względem swawolny i rozwiązły tryb życia."},{"type":"paragraph","text":"6. Toteż przy takim ustroju bogactwo z konieczności rośnie w znaczenie, zwłaszcza gdy właśnie kobiety rządami owładną, jak to się stało u wielu walecznych i wojowniczych ludów, z wyjątkiem Celtów i może niektórych innych, u których otwarcie uznaje się stosunki miłosne między mężczyznami. Nie bez słuszności więc, jak się zdaje, połączył Aresa z Afrodytą [poeta], który pierwszy tę opowieść zmyślił, bo u wszystkich takich ludów występują [wybitne] skłonności do obcowania czy to z mężczyznami, czy z kobietami."},{"type":"paragraph","text":"7. Dlatego stało się to także u Lakończyków; w okresie ich panowania w Grecji kobiety wywierały wielki wpływ na rządy. A cóż to za różnica, czy kobiety rządzą, czy też rządzący władzy kobiet podlegają? Przecież to na jedno wychodzi. Zbytnia śmiałość kobiet w życiu codziennym wcale nie przynosi pożytku, a jeśli w ogóle może być pożyteczna, to tylko podczas wojny, choć i w tym wypadku kobiety lakońskie przyniosły więcej szkody niż pożytku, jak to się okazało w czasie napadu Tebańczyków. Do niczego bowiem nie można było ich użyć, podobnie jak i w innych miastach, a wywoływały gorsze zamieszanie niż nieprzyjaciele52."},{"type":"paragraph","text":"51 Achajowie w południowej części geograficznej krainy Tesalii, tzw. Achai Ftiockiej, Perrajbowie w północnej jej stronie (u podnóża Olimpu), a Magneci we wschodniej (nad Morzem Egejskim) byli sąsiadami Tesalów, którzy stale dążyli do narzucenia im swej supremacji politycznej."},{"type":"paragraph","text":"52 Było to w czasie najazdu Epaminondasa na Lakonię (w 370 r. p.n.e.), kiedy jazda tebańska zjawiła się pod Spartą (Ksenofont, Hellenika VI 5, 28; Plutarch, Agesilaos 31)."},{"type":"paragraph","text":"42"},{"type":"paragraph","text":"8. Początkowo ten swobodny tryb życia kobiet u Lacedemończyków miał, zdaje się, swe zrozumiałe przyczyny. Z powodu wypraw wojennych przebywali oni bowiem przez długi czas z dala od domu, tocząc wojny to z Argejczykami, to znów z Arkadyjczykarni i Meseńczykami; skoro zaś pokój nastał, okazało się, że są dobrze przygotowani do uległości wobec prawodawcy53 — przez żołnierski tryb życia, wykazujący wiele stron dodatnich. Podobno także i kobiety usiłował Likurg podporządkować swym prawom, ale zaniechał tego, kiedy mu opór stawiły."},{"type":"paragraph","text":"9. One zatem ponoszą winę za to, co się stało, a więc oczywiście i za te zjawiska ujemne. Nie to jednakowoż jest przedmiotem naszego badania, komu należy przebaczyć lub nie, ale właściwe czy niewłaściwe urządzenie stosunków."},{"type":"paragraph","text":"Wadliwe zaś ustawienie zagadnienia kobiet nie tylko zdaje się stanowić pewną skazę na ustroju samym dla siebie, jak to już poprzednio zauważyłem54, ale i przyczynia się w pewnym stopniu do spotęgowania żądzy pieniądza."},{"type":"paragraph","text":"10. Poza tym mianowicie, co teraz omówiłem, można by podnieść zarzuty z powodu niezdrowych stosunków w dziedzinie własności [u Spartan]. Jedni z nich bowiem doszli do posiadania nadmiernie wielkich majątków, inni zaś mają zupełnie nieznaczne, dlatego też własność ziemska przeszła w ręce niewielu. Ale i postanowienia prawne w tym względzie są błędne; sprzedaż bowiem lub kupno majątku ziemskiego obłożył prawodawca piętnem hańby i zrobił to słusznie, ale zostawił swobodę darowania go lub pozostawienia w spadku wedle woli, choć to musiało przecież dać ten sam wynik, co i w wypadku sprzedaży."},{"type":"paragraph","text":"11. Toteż prawie dwie piąte wszystkiej własności ziemskiej znajduje się w rękach kobiet, częścią dlatego, że jest wielka liczba córek dziedziczących, częścią dlatego, że daje się im wielkie posagi. A przecież byłoby lepiej nie pozwolić na żadne wiano albo na nieznaczne tylko czy wreszcie i średnie55. Obecnie zaś wolno każdemu wydać dziedziczkę swoją za kogo zechce, a jeśli kto umrze bez testamentu, to jego prawny spadkobierca, którego zostawi, daje ją, komu zechce56. Stąd też, choć kraj może wyżywić 1500 jeźdźców i 30 000 hoplitów, nie było ich w sumie ani tysiąca57."},{"type":"paragraph","text":"12. Jakoż samo doświadczenie wykazało, że było to błędne urządzenie, bo państwo nie wytrzymało nawet jednego ciosu58, ale upadło z braku ludzi. Podobno 53 Jak wynika z następnego zdania, Arystoteles ma tu na myśli Likurga, którego działalność datuje tym samym na okres czasu po I, czy nawet po II wojnie meseńskiej, czyli na koniec VIII lub połowę VII w. Zostaje to w sprzeczności z relacją, według której Likurg był opiekunem Charillosa, a więc miałby działać w IX w. p.n.e. (por. niżej, rozdz. 8, § 1)."},{"type":"paragraph","text":"54 Por. wyżej, § 5."},{"type":"paragraph","text":"55 Bucheler, za nim i inni wydawcy, przyjmują tu lukę w tekście."},{"type":"paragraph","text":"56 Zdanie niejasne, jeśli bowiem córka jest dziedziczką, to co znaczy „prawny spadkobierca, którego zostawi”? W. L. Newman w swoim wydaniu (The Politics of Aristotle, text, introd., essays and notes by…, vol. 1-4, Oxford 1887-1902, t. 2, s. 329) w uwagach do tego miejsca przypuszcza, że chodzi tu o najbliższego krewnego, który dziedziczy z prawa majątek niejako ze spadkobierczynią, by następnie wydać ją za mąż wedle uznania, oddając jej równocześnie spadek."},{"type":"paragraph","text":"57 Według świadectwa Plutarcha (Agis 5) liczba Spartan ok. połowy III w. p.n.e. spadła do 700, a własność ziemska skupiła się w rękach zaledwie 100 obywateli."},{"type":"paragraph","text":"58 Mowa niewątpliwie o bitwie pod Leuktrami (371 r. p.n.e.), która stała się grobem potęgi Sparty."},{"type":"paragraph","text":"43"},{"type":"paragraph","text":"za dawniejszych królów nadawano obcym prawo obywatelstwa, tak że mimo długoletnich wojen nie dawał się odczuć brak ludzi i kiedyś było, jak powiadają, nawet 10 000 Spartan. Czy to prawda, czy nie, lepiej przecież postarać się o zwiększanie ludności państwa przez zrównanie posiadłości."},{"type":"paragraph","text":"13. Temu środkowi poprawy stoi jednak na przeszkodzie prawo o płodzeniu dzieci. Prawodawca bowiem chcąc, aby jak najwięcej było Spartan, stara się nakłonić obywateli, by jak najwięcej dzieci płodzili; istnieje bowiem u nich prawo, ze ten, kto spłodzi trzech synów, otrzymuje zwolnienie od służby wojskowej, przy czterech zaś nawet i od wszelkich danin. A przecież jest jasną rzeczą, że przy wzroście ludności i postępującym skutkiem tego rozdrobnieniu własności ziemskiej, z konieczności mnoży się liczba ubogich."},{"type":"paragraph","text":"14. Źle jednak przedstawia się też urządzenie eforatu. Władza ta ma u nich moc rozstrzygania o najważniejszych sprawach, ale jest ona dostępna dla wszystkich z ludu, tak ze często dochodzili do tej godności bardzo biedni ludzie, którzy z powodu ubóstwa bywali przekupni. Okazało się to wielokrotnie zarówno dawniej, jak i teraz w sprawie Andryjczyków59; niektórzy bowiem z eforów, przekupieni pieniędzmi, byliby całe państwo zgubili, o ile by to od nich zależało. Że zaś władza ta jest zbyt wielka i równa władzy tyrana, więc i królowie byli zmuszeni o ich względy zabiegać, tak że cierpiał"},{"type":"paragraph","text":"na tym równocześnie i ustrój, bo z arystokratycznego przeradzał się w demokratyczny."},{"type":"paragraph","text":"15. Równocześnie jednak władza ta podtrzymuje ustrój, bo lud, mając zapewniony udział w najwyższej władzy, zachowuje się spokojnie, tak ze czy to dzięki prawodawcy, czy dzięki zrządzeniu losu, jest to korzystną okolicznością dla istniejących stosunków. Jeśli bowiem ustrój ma się utrzymać, to muszą wszystkie człony państwa dążyć do tego, aby być i zostać sobą. Królowie więc odpowiadają temu wymaganiu ze względu na cześć, jakiej zażywają, ludzie znakomici ze względu na przynależność do rady starców [geruzji], bo godność ta jest nagrodą za tę cnotę, a lud ze względu na eforat, bo na ten urząd wybiera się wszystkich bez różnicy."},{"type":"paragraph","text":"16. Chociaż do godności efora wszyscy powinni mieć dostęp, to jednak wybór nie był przeprowadzany w ten sposób, co obecnie (bo ten jest zbyt dziecinny)60."},{"type":"paragraph","text":"W rękach eforów spoczywa rozstrzyganie w wielkich sprawach61, mimo że bywają 59 O jaką sprawę chodzi, me wiadomo, niepewna jest też i sama lekcja Άνδρίοις"},{"type":"paragraph","text":"60 W jaki sposób były przeprowadzane wybory eforów, czy to w dawniejszych czasach, czy za czasów Arystotelesa, nie wiadomo. Wzmianka, ze sposób wyboru był dziecinny, którą powtarza Arystoteles mówiąc o wyborach członków rady (por niżej, § 18), pozwalałaby się domyślać, ze postępowanie było takie samo Z wyrażenia Platona ( Prawa 692 A), ze wybór eforów zbliżony był do losowania, wnoszą niektórzy, ze może lud wybierał większą ilość kandydatów, z których wyznaczano pięciu, może przez losowanie, może przez obserwowanie lotu ptaków wrózebnych."},{"type":"paragraph","text":"61 Należało do nich sądownictwo cywilne, nadzór nad obyczajami, kontrola królów i urzędników, zwoływanie rady starców i zgromadzeń ludowych oraz przedkładanie im wniosków, wreszcie władza wykonawcza i kierownictwo polityki zagranicznej"},{"type":"paragraph","text":"44"},{"type":"paragraph","text":"to ludzie pospolici. Dlatego byłoby lepiej, żeby rozstrzygali nie według swego mniemania, lecz według pisanego prawa. Również sposób życia eforów nie jest w zgodzie z wymaganiami państwa, zbyt bowiem jest swobodny, podczas gdy innych obowiązuje nadmierna surowość, tak że jej znieść nie mogą, lecz ukradkiem omijają prawo i oddają się rozkoszom zmysłowym."},{"type":"paragraph","text":"17. Jednak i instytucja rady starców wykazuje u nich pewne braki. Jeśli bowiem członkowie jej są przyzwoici i odpowiednio zaprawieni w cnotach cechujących dobrego obywatela, to bez wahania można by uznać ich użyteczność dla państwa, chociaż zastrzeżenia budzi to, że dożywotnio przysługuje im moc rozstrzygania spraw wielkiej wagi (tak bowiem rozum, jak i ciało podlegają prawom starości). Jeśli natomiast ich wyrobienie moralne jest tego rodzaju, że nawet sam prawodawca nie ma zaufania do nich jako ludzi niegodziwych, to rzecz nie jest bezpieczna."},{"type":"paragraph","text":"18. Okazuje się zaś, że członkowie tej rady są i przekupni, i przy załatwianiu spraw państwowych kierują się często względami osobistymi. Dlatego lepiej by było, żeby nie byli przed nikim odpowiedzialni, jak to jest obecnie. Można by tu co prawda zauważyć, że przecież nadzór eforów rozciąga się na wszystkie władze; ale to właśnie stanowi nadmierne uprawnienie eforatu, a przy tym, moim zdaniem, odbieranie sprawozdania od członków rady nie powinno by się odbywać w ten sposób. Ponadto i sposób, w jaki się przeprowadza wybór członków rady starców, jest dziecinny62, a nie jest też słuszna zasada, by ten, co ma być uznany za godnego tej władzy, sam się o nią ubiegał; kto bowiem na nią zasługuje, winien ją, chce czy nie chce, piastować."},{"type":"paragraph","text":"19. Okazuje się jednak, że prawodawca w tym wypadku postępuje tak samo, jak i w innych szczegółach ustroju: rozbudza mianowicie ambicję obywateli i zużytkowuje ją przy wyborze członków geruzji. Nikt bowiem nie będzie zabiegał o urząd, jeśli nie ma w tym kierunku ambicji. Zresztą i rozmyślnych przewinień ludzie dopuszczają się po największej części powodowani ambicjami i chciwością."},{"type":"paragraph","text":"20. Co się tyczy władzy królewskiej, to zagadnienie, czy jej istnienie jest korzystne dla państw czy nie, trzeba będzie później osobno omówić 63. W każdym razie jednak byłoby lepiej [dla Spartan], gdyby królów wybierano, a o wyborze każdego z nich, inaczej niż to jest obecnie, rozstrzygał jego tryb życia. Prawodawca sam oczywiście nie wierzy w to, żeby przy dziedziczności władzy królewskiej możliwe było powołanie na tę godność dobrych i szlachetnych ludzi, przynajmniej nie okazuje przekonania, jakoby królowie stali na dostatecznie wysokim poziomie 62 Według Plutarcha ( Likurg 26) wybory członków geruzji przeprowadzano w ten sposób, że kilku wybranych obywateli, zamkniętych w domu położonym opodal miejsca zgromadzenia ludowego, oceniało wolę wybierających według siły okrzyku, wznoszonego przez zgromadzonych przy prze-chodzeniu kandydatów."},{"type":"paragraph","text":"63 Por. ks. III, rozdz. 9-11."},{"type":"paragraph","text":"45"},{"type":"paragraph","text":"moralnym. Dlatego też, kiedy ich wysyłano w poselstwie, dodawano im ich wrogów za towarzyszy, a niezgodę między królami uważano za rzecz zbawienną dla państwa."},{"type":"paragraph","text":"21. Także i zarządzenia, wydane przy pierwszym wprowadzeniu wspólnych biesiad, tzw. syssitii czy fidytii, nie były bynajmniej trafne. Odpowiednie udziały winno się było pokrywać raczej ze skarbu państwowego, tak jak to jest na Krecie; tymczasem u Lakończyków każdy musi dostarczyć swój udział, a że niektórzy są bardzo biedni i nie mogą się zdobyć na pokrycie tego wydatku, więc wynik jest przeciwny zamiarom prawodawcy. Zaprowadzenie wspólnych biesiad, według jego zamierzeń, miało posiadać charakter demokratyczny, ale przy takim za-rządzeniu nie ma ono bynajmniej cech demokratycznych. Bo ci, co są zbyt biedni, z trudnością mogą brać w nich udział, że zaś korzystanie z pełni praw obywatelskich jest u nich od tego uzależnione, więc ten, kto tego udziału dostarczyć nie zdoła, traci swe prawa."},{"type":"paragraph","text":"22. Prawo dotyczące dowódców floty [nauarchów] spotkało się już z sądem potępiającym u innych, i to słusznie. Staje się bowiem przyczyną nieporozumień wewnętrznych. Obok królów mianowicie, którzy są dożywotnimi wodzami, staje dowództwo floty, niemal jakby druga władza królewska."},{"type":"paragraph","text":"Można by dalej podnieść zarzut przeciw samej podstawie prawodawstwa Likurga, jak to już czynił Platon w Prawach 64: cały system jego praw ma bowiem na względzie tylko jeden dział cnoty, a mianowicie zalety wojenne, bo te są użyteczne do panowania. Toteż trzymali się dobrze, dopóki prowadzili wojny, kiedy zaś doszli do panowania, zginęli, ponieważ nie umieli żyć w pokoju ani też uprawiać żadnej innej poważniejszej umiejętności prócz sztuki wojennej."},{"type":"paragraph","text":"23. I jeszcze jedna cecha, nie mniej od tamtej ujemna: uważają mianowicie, że dobra, o które ludzie walczą, zdobywa się raczej dzięki cnocie niż niedołęstwu, i w tym względzie mają oczywiście słuszność, ale błędem jest, że dobra te cenią wyżej od cnoty."},{"type":"paragraph","text":"Ale i sprawa finansów państwowych źle się przedstawia u Spartan. Kiedy są zmuszeni prowadzić wielkie wojny, w skarbie państwowym nic nie ma, dochody zaś słabo wpływają; ziemia jest bowiem po największej części własnością Spartan, a ci nie pilnują ściśle obowiązku płacenia podatków65. Wynikło z tego coś przeciwnego niż pożytek zamierzony przez prawodawcę, państwo zostawił bez pieniędzy, a u ludzi prywatnych rozbudził chciwość pieniądza."},{"type":"paragraph","text":"Tyle więc uwag o ustroju politycznym Lacedemończyków, bo to są te punkty, które w pierwszym rzędzie wywołują zarzuty."},{"type":"paragraph","text":"64 Prawa, 625 D, 631 nn."},{"type":"paragraph","text":"65 Obywatele spartańscy me płacili żadnych regularnych danin na rzecz państwa, bo te obciążały tylko periojków i helotów, jeśli zaś państwo w czasie wojny było zmuszone nałożyć nadzwyczajną daninę, obywatele starali się, jak tu stwierdza Arystoteles, uchylić od niej, a władze me wywierały na opieszałych dość silnego nacisku To samo mówi u Tukidydesa (I 80) król Archidamos: ani nie mamy pieniędzy w kasie, ani tez chętnie ich me wpłacamy z własnych zasobów."},{"type":"paragraph","text":"46"},{"type":"paragraph","text":"7. Ustrój kreteński"},{"type":"paragraph","text":"1. Ustrój kreteński jest bardzo zbliżony do Lacedemońskiego; w niektórych szczegółach nie przedstawia się gorzej od niego, przeważnie jednak jest mniej wygładzony. Odnosi się wrażenie, i tak tez mówi tradycja, że ustrój Lakończyków jest po największej części naśladownictwem kreteńskiego, starodawne zaś urządzenia są przeważnie gorzej rozwinięte od nowszych. Według podania mianowicie, kiedy Likurg wyjechał z kraju po złożeniu roli opiekuna króla Charillosa66, spędził"},{"type":"paragraph","text":"następne lata w największej części na Krecie ze względu na związki pobratymstwa; Liktyjczycy67 byli bowiem osadnikami z Lakonii. Przybywszy do kolonii, przejęli oni urządzenia prawne istniejące u ówczesnych mieszkańców; jakoż jeszcze obecnie ludność poddana [na Krecie] — periojkowie68 — posługuje się nimi po dawnemu, Minosowi przypisując pierwotne ustanowienie tego porządku prawnego."},{"type":"paragraph","text":"Wyspa wydaje się już przez naturę stworzona do władania nad Grecją, a jest doskonale położona, panuje bowiem nad wszystkimi morzami, nad którymi mieszkają niemal wszyscy Grecy. Z jednej strony nieznacznie jest oddalona od Peloponezu, z drugiej strony od Azji, od obszaru Triopion69 i Rodos. Toteż Minos dzierżył panowanie na morzu, zdobył jedne wyspy i skolonizował drugie, aż w końcu w czasie wyprawy na Sycylię stracił tam życie pod Kamikos ™."},{"type":"paragraph","text":"3. Otóż urządzenia kreteńskie przedstawiają się podobnie jak lakońskie. Ziemię u Lakończyków uprawiają heloci, u Kreteńczyków periojkowie. U jednych i drugich istnieją wspólne biesiady, które Lakończycy nazywali dawniej nie „fidytiami”, lecz"},{"type":"paragraph","text":"„andriami”, tak jak Kreteńczycy, z czego okazuje się, że stamtąd przyszły. Dołącza się do tego cały ustrój polityczny. Eforowie mają tę samą władzę, co tzw."},{"type":"paragraph","text":"„kosmowie”71 na Krecie, tylko że eforów jest pięciu, a kosmów dziesięciu."},{"type":"paragraph","text":"Członkowie geruzji w Sparcie odpowiadają zupełnie członkom rady zwanej u Kreteńczyków „bule”72. Władza królewska istniała przedtem i u Kreteńczyków 73, później jednak ją znieśli, a dowództwo w wojnie mają kosmowie."},{"type":"paragraph","text":"4. W zgromadzeniu ludowym biorą udział wszyscy, nie ma ono jednak żadnych uprawnień prócz głosowania nad tym, co postanowią członkowie rady i kosmowie."},{"type":"paragraph","text":"66 Arystoteles idzie tu za bezwartościową historycznie opowieścią, jakoby Likurg był bratem króla spartańskiego z rodu Eurypontydów, Eunomosa. Po śmierci brata opiekował się Likurg podobno jego małoletnim synem Charillosem, którego panowanie, według listy królów spartańskich, należałoby datować na okres ok. 880 r. p.n.e."},{"type":"paragraph","text":"67 Miasto Lyktos (lub Lyttos) leżało na północno-zachodnim wybrzeżu Krety."},{"type":"paragraph","text":"68 Periojkami nazywa Arystoteles ludność poddaną na Krecie, odpowiadającą lakońskim he-lotom"},{"type":"paragraph","text":"69 Triopion — przylądek w Kani (Azja Mniejsza), opodal miasta Knidos."},{"type":"paragraph","text":"70 Kamikos — miasto i rzeka w południowej Sycylii, na obszarze należącym do Akragas (Herodot, Dzieje ks. VII rozdz. 170)."},{"type":"paragraph","text":"71 Nazwa oznacza ludzi utrzymujących porządek."},{"type":"paragraph","text":"72 Na napisach kreteńskich występuje ta nazwa w brzmieniu doryckim „bola” (βωλά)."},{"type":"paragraph","text":"73 Arystoteles ma tu zapewne na myśli mitycznego władcę Krety Mmosa, bo z czasów historycznych nie jest znany żaden król na Krecie."},{"type":"paragraph","text":"47"},{"type":"paragraph","text":"Wspólne biesiady są u Kreteńczykow lepiej urządzone niż u Lakończyków."},{"type":"paragraph","text":"W Lacedemonie bowiem każdy składa udział wyznaczony na głowę, a jeśli nie może, to prawo odmawia mu, jak już poprzednio powiedziałem74, udziału w życiu politycznym, na Krecie zaś więcej są stosowane zasady wspólnoty. Ze wszystkich mianowicie plonów na ziemi państwowej zebranych, wypasanego bydła, jako też z danin złożonych przez periojków, przeznacza się część na rzecz kultu bogów i na wydatki państwowe, a część na wspólne biesiady, tak że wszyscy, i kobiety, i dzieci, i mężczyźni, żywieni są na koszt państwa."},{"type":"paragraph","text":"5. By krzewić umiarkowanie w jedzeniu, jako rzecz pożyteczną, prawodawca obmyślił wiele środków ku temu zmierzających, podobnie jak i dla odciągnięcia"},{"type":"paragraph","text":"[mężczyzn] od kobiet, aby zbyt wiele dzieci nie płodzili, zaprowadził stosunki między mężczyznami; do rozważenia zagadnienia, czy to źle lub nie, znajdzie się gdzie indziej sposobność75."},{"type":"paragraph","text":"Okazuje się zatem, że wspólne biesiady są lepiej urządzone u Kreteńczykow niż u Lakończyków, natomiast sprawa z kosmami przedstawia się jeszcze gorzej aniżeli z eforami. To bowiem, co jest ujemną okolicznością w odniesieniu do urzędu eforów, również co do nich się zaznacza: na ten urząd dostają się mianowicie z przypadku, a brak tu jeszcze tego, co tam przynosi korzyść sprawie publicznej. Tam bowiem przez to, że wyboru dokonuje się spośród wszystkich"},{"type":"paragraph","text":"[obywateli], lud jako uczestniczący w stanowieniu władzy najwyższej życzy sobie utrzymania ustroju, tutaj natomiast nie wybiera się kosmów spośród wszystkich"},{"type":"paragraph","text":"[obywateli], ale z pewnych rodów, a członków rady spośród byłych kosmów."},{"type":"paragraph","text":"6. O członkach tej rady można by to samo powiedzieć, co o wybieranych w Lacedemonie gerontach. To, że nie ponoszą odpowiedzialności i dożywotność ich stanowiska jest wyposażeniem ich ponad zasługę, a okoliczność, że wykonują władzę nie według praw pisanych, lecz według własnego uznania, jest wręcz niebezpieczna. Jeśli nawet lud nie mający dostępu do godności zachowuje się spokojnie, nie oznacza to bynajmniej, że urządzenia są dobre. Kosmowie bowiem, inaczej aniżeli eferowie, nie mają żadnej [sposobności do ciągnięcia osobistych]"},{"type":"paragraph","text":"korzyści, mieszkając na wyspie z dala od tych, co by ich mogli przekupić."},{"type":"paragraph","text":"Stosowny przeciw tym brakom środek zaradczy jest osobliwy i nie ma cech prawa publicznego, lecz jest wyrazem samowoli możnowładców."},{"type":"paragraph","text":"7. Często bowiem sprzysięgają się pewni ludzie, czy to spośród współtowarzyszy urzędu, czy to spośród ludzi prywatnych, i przepędzają kosmów; wolno też kosmom złożyć władzę i w toku urzędowania. Otóż lepiej byłoby, żeby to wszystko działo się według prawa, a nie z samowoli ludzi, bo to nie jest bezpieczną wytyczną postępowania. Najgorsze wszakże ze wszystkiego jest zawieszanie urzędu kosmów, jakiego dopuszczają się często możni, nie chcąc się poddać skazującym wyrokom. Okazuje się stąd, że istniejące tam urządzenia mają pewne 74 Por. wyżej, rozdz. 6, § 21."},{"type":"paragraph","text":"75 Do zagadnienia tego Arystoteles już jednak nie powrócił w żadnym z zachowanych pism."},{"type":"paragraph","text":"48"},{"type":"paragraph","text":"cechy ustroju, ale nie są właściwie prawnym ustrojem, tylko raczej samowolnymi rządami [wielmożów]. Pozyskując sobie zwolenników z ludu i przyjaciół ludzie ci zwykli szerzyć anarchię76, wszczynać zaburzenia i walki między sobą."},{"type":"paragraph","text":"8. A czy to nie znaczy po prostu tyle, że państwo takie przez pewien czas przestaje być państwem, a wspólnota państwowa ulega rozbiciu? Państwo przy takim stanie rzeczy naraża się na niebezpieczeństwo, że padnie ofiarą napadu ze strony takich, co zechcą i mogą to zrobić. W tym wypadku, jak wspomniano, położenie stanowi ochronę; oddalenie dało tu takie wyniki, co [gdzie indziej]"},{"type":"paragraph","text":"zamknięcie się przed obcymi. Dlatego nawet poddani chłopi są trwale wierni Kreteńczykom, natomiast heloci często się buntują. Nie mają też Kreteńczycy pod swym panowaniem żadnych zewnętrznych posiadłości i dopiero w ostatnich czasach idąca z zewnątrz wojna sięgnęła na ich wyspę77, przy czym ujawniła się słabość tamtejszych praw."},{"type":"paragraph","text":"Tyle więc naszych uwag o tym ustroju."},{"type":"paragraph","text":"8. Ustrój kartagiński"},{"type":"paragraph","text":"1. Także Kartagińczycy mają, według rozpowszechnionego mniemania, dobry ustrój, górujący w wielu szczegółach nad innymi, a w niektórych bardzo zbliżony do lakońskiego. Istotnie trzy te ustroje: kreteński, lakoński i trzeci z nich"},{"type":"paragraph","text":"— kartagiński — są do siebie zbliżone w pewnych punktach, a zarazem różnią się znacznie od innych. Jakoż wiele z urządzeń przedstawia się dobrze u Kartagiń-"},{"type":"paragraph","text":"czyków, oznaką zaś dobrej organizacji ich ustroju jest fakt, że lud chętnie trwa w poszanowaniu jego przepisów i nie było tam ani godnego wzmianki powstania, ani też próby tyranii."},{"type":"paragraph","text":"2. Ustrój ten wykazuje w następujących punktach podobieństwo do lakońskiego: wspólne biesiady związków odpowiadają fidytiom [lakońskim], a władza stu czterech — eforom, z tą różnicą na korzyść, że wybierają na ten urząd ludzi z najszlachetniejszych rodzin, podczas gdy eforami bywają pierwsi lepsi; królowie i rada mają odpowiednik u Lakończyków w królach i gerontach, znów z tą różnicą na korzyść, że królowie nie są tu ani z tego samego, ani też z byle jakiego rodu, a członków rady wybiera się raczej według majątku78 aniżeli wieku. Bo jeśli ci, co mają moc rozstrzygania w wielkich sprawach, są marnymi ludźmi, to wiele wyrządzają szkody, i istotnie przynieśli już szkodę państwu Lacedemończyków."},{"type":"paragraph","text":"76 Według poprawki Bernaysa άναρχίαν, zamiast przekazanej w rękopisach lekcji µοναρχίαν."},{"type":"paragraph","text":"77 Przypuszczalnie chodzi tu o wyprawę Falajkosa, syna Onomarcha, który po śmierci Faullosa był dowódcą Focyjczyków w II wojnie świętej. Po zakończeniu jej (346 r. p.n.e.) wyjechał ze swymi najemnikami na Kretę i tam zginął (342 r. p.n.e.) przy oblężeniu miasta Kydonii. Szczegóły nieznane."},{"type":"paragraph","text":"78 Tekst przekazany wyraźnie jest zepsuty. Zamiast przekazanej lekcji εϊ τε διαφέρον εκ"},{"type":"paragraph","text":"τούτων, co nie daje sensu, przyjmuje się poprawkę Brandisa i Buchelera έτι δε γέροντας κατά"},{"type":"paragraph","text":"πλουτον."},{"type":"paragraph","text":"49"},{"type":"paragraph","text":"3. Przeważną część tych [braków], które się wytyka jako niedomagania, wykazują właśnie wszystkie wspomniane ustroje na równi. Od tego jednak, co stanowi zasadę arystokracji i politei79, występują w Kartaginie odchylenia częściowo w stronę demokracji, częściowo w stronę oligarchii. Czy mianowicie przedłożyć pewne sprawy ludowi lub nie, władni są rozstrzygać królowie razem z członkami rady starców, jeśli wszyscy są zgodni — w przeciwnym razie i co do tego"},{"type":"paragraph","text":"[rozstrzyga] lud. Uchwały władz, jakie przedkładają ludowi, nie są jedynie podawane do wiadomości, ale lud ma prawo rozstrzygania, i każdemu, kto zechce, wolno przeciw przedłożeniu wystąpić, czego nie ma w innych ustrojach."},{"type":"paragraph","text":"4. To, że kolegia pięciu [pentarchie], którym przysługują liczne i wielkie uprawnienia, same się przez wybór uzupełniają i wybierają najwyższą władzę, radę stu, a nadto rządzą przez czas dłuższy niż inne władze (zajmują bowiem stanowiska urzędowe po ustąpieniu z kolegium i przed wstąpieniem do niego), to wszystko znamionuje oligarchię; to zaś, że pełnią czynności bezpłatnie i nie są losowani, trzeba uznać za przejaw arystokracji, podobnie jak inne tego rodzaju urządzenia, a więc i to, ze te same władze rozsądzają wszystkie sprawy. Inaczej jest w Lacedemonie, gdzie jedna władza sądzi te procesy, druga inne80."},{"type":"paragraph","text":"5. Najwięcej przecież odchyla się ustrój kartagiński od arystokracji ku oligarchii ze względu na pewną zasadę, która u wielu ludzi znajduje uznanie: uważają mianowicie, że należy wybierać władzę biorąc pod uwagę nie tylko zalety moralne, ale i bogactwo, bo niemożliwą jest rzeczą, aby biedny dobrze rządził i miał czas na to. Jeśli więc wybór przy uwzględnieniu bogactwa jest cechą oligarchiczną, przy uwzględnieniu zaś cnoty — arystokratyczną, to byłaby to trzecia forma, wedle której właśnie urządzony jest ustrój u Kartagińczyków: kieruje się bowiem tymi oboma względami przy wyborach, zwłaszcza najwyższych urzędników, królów i wodzów."},{"type":"paragraph","text":"6. To odstępstwo od zasad ustroju arystokratycznego należy jednak uważać za błąd prawodawcy. Do najpotrzebniejszych rzeczy należy bowiem zważanie od początku na to, aby najlepsi mogli mieć czas wolny, a nie trudzili się żadną poniżającą pracą, i to nie tylko jako urzędnicy, ale też jako ludzie prywatni. Jeśli jednak trzeba się oglądać i na bogactwo ze względu na potrzebę wolnego czasu, to przecież ma to tę ujemną stronę, że najwyższe urzędy, bo godność króla i wodza, są niejako do kupienia. To urządzenie prawne daje bogactwu przewagę nad cnotą i rozbudza u wszystkich obywateli żądzę pieniędzy."},{"type":"paragraph","text":"7. Za tym bowiem, co u zwierzchności uchodzi za cenione, idzie z konieczności opinia także innych obywateli. Gdzie jednak cnota nie jest w najwyższej cenie, tam ustrój arystokratyczny nie ma widoków trwałości. Zrozumiałą jednak jest rzeczą, że ci, co kupują urząd, przyzwyczajają się do ciągnięcia zeń zysków, by pokryć poczynione wydatki. Byłoby to przecież osobliwe, gdyby człowiek biedny a prawy chciał ciągnąć zyski ze swego urzędu, a nie chciał człowiek gorszy, mimo że 79 Tak nazywa Arystoteles ustrój umiarkowanie demokratyczny; por. niżej, ks III, rozdz. 5, § 2"},{"type":"paragraph","text":"80 Por niżej, ks III, rozdz 1, § 7"},{"type":"paragraph","text":"50"},{"type":"paragraph","text":"poniósł pewne wydatki. Dlatego powinni rządzić ci, co najlepiej rządzić potrafią."},{"type":"paragraph","text":"Jeśli zaś prawodawca zaniechał troski o dobrobyt ludzi prawych, to przecież lepiej by było zapewnić im beztroski byt, kiedy urząd piastują."},{"type":"paragraph","text":"8. Niewłaściwym musi się wydać, że jeden i ten sam człowiek piastuje więcej urzędów, co jednak u Kartagińczyków znajduje szczególne uznanie. Najlepiej przecież postępuje praca, gdy dla jednostki, która ją spełnia, stanowi ona jedyne zadanie. Musi zatem prawodawca uważać, aby się tak działo, i nie wymagać, by ten sam człowiek był fletnistą i szewcem. Toteż, gdzie państwo nie jest małe, lepiej to odpowiada interesowi państwa i demokracji, by więcej ludzi uczestniczyło we władzy; w takim razie bowiem załatwia się, jak powiedziałem81, każdą sprawę bardziej w interesie ogółu, lepiej i prędzej niż wówczas, gdy robią to ciągle ci sami. Okazuje się to w dziedzinie wojskowej i żeglugi morskiej, gdzie rozkaz i posłuch przechodzą, że tak powiem, wszystkie stopnie."},{"type":"paragraph","text":"9. Choć ustrój ich jest oligarchiczny, to przecież [Kartagińczycy] doskonale unikają towarzyszących mu niebezpieczeństw dzięki temu, że dają ludowi sposobność do bogacenia się, wysyłając raz po raz pewną część ludzi do miast poddanych. W ten sposób leczą braki ustroju i zapewniają mu trwałość. Jest to jednak dziełem przypadku, powinni by zaś być zabezpieczeni przed zaburzeniami przez prawodawcę. W istniejącym stanie rzeczy, jeśliby się zdarzyło jakieś nieszczęście i masy poddanych powstały, prawo nie daje żadnego środka do przywrócenia spokoju."},{"type":"paragraph","text":"Tak zatem przedstawiają się ustroje Lacedemończyków, Kreteńczyków i Kartagińczyków, które słusznie cieszą się dobrą sławą."},{"type":"paragraph","text":"9. Ustrój Solona."},{"type":"paragraph","text":"Ustroje innych państw greckich i ich twórcy"},{"type":"paragraph","text":"1. Z tych, którzy się wypowiedzieli w jakiś sposób w sprawie ustroju, niektórzy zupełnie nie brali czynnego udziału w życiu politycznym, lecz życie spędzili jako ludzie prywatni; poglądy ich wszystkich, jeśli coś godnego uwagi zawierały, mniej więcej podałem. Inni znów byli sami czynni politycznie i rozwinęli działalność jako prawodawcy, częściowo we własnych, częściowo w pewnych obcych państwach; jedni z nich byli twórcami tylko praw, drudzy zaś także i ustroju, tak właśnie i Likurg, i Solon, którzy i prawa, i ustroje nadali."},{"type":"paragraph","text":"2. O ustroju lacedemońskim była więc już mowa, co się zaś tyczy Solona, to niektórzy sądzą, że był dobrym prawodawcą. Usunął bowiem zbytnio zamkniętą w sobie oligarchię, położył kres niewoli ludu i przywrócił prastarą demokrację, zmieszawszy mądrze różne elementy ustroju: rada areopagu przedstawia mianowicie czynnik oligarchiczny, fakt zaś, że urzędnicy są wybierani, stanowi rys arystokratyczny, a sądy — demokratyczny. Zdaje się jednak, że rada i zasada wyboru 81 Por. wyżej, rozdz. 1, § 6."},{"type":"paragraph","text":"51"},{"type":"paragraph","text":"urzędników istniała już poprzednio i Solon to tylko pozostawił, ugruntował zaś demokrację przez zaprowadzenie sądów złożonych z obywateli wszystkich stanów82."},{"type":"paragraph","text":"3. Dlatego to niektórzy robią mu zarzut, że osłabił drugi czynnik ustroju przez przyznanie wszechwładnego stanowiska sądowi, tworzonemu przez losowanie."},{"type":"paragraph","text":"W miarę wzrostu jego znaczenia, zaczęto schlebiać ludowi jakby tyranowi i przetworzono ustrój w istniejącą obecnie demokrację. Radę areopagu pozbawili znaczenia Efial
