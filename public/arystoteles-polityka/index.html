ewną umiejętnością wielką to stanowi różnicę, czy się ktoś sam w niej zaprawia, jest bowiem rzeczą niemożliwą albo przynajmniej trudną wyrobić się na rzetelnego sędziego w rzeczach, których ktoś sam nie uprawiał. Zarazem i dzieci muszą mieć jakąś zabawkę, stąd za dobry pomysł trzeba uznać grzechotkę Archytasa11, którą dają dzieciom, by bawiąc się 10 Pauzon z Efezu i Polignot z Tasos, głośni malarze z okresu przed Arystotelesem. W Poetyce (1448 a) Arystoteles charakteryzuje ich twórczość mówiąc, że Polignot tworzy ideały, a Pauzon karykatury malowanych postaci."},{"type":"paragraph","text":"11 Archytas z Tarentu (z pierwszej połowy IV w. p.n.e.), zwolennik filozofii pitagorejskiej, astronom, geometra i matematyk, słynął też ze swych wynalazków w dziedzinie mechaniki."},{"type":"paragraph","text":"198"},{"type":"paragraph","text":"nią, nie niszczyły rzeczy w domu, bo dziecko nie potrafi spokojnie usiedzieć. Otóż jak ta grzechotka jest odpowiednia dla maleńkich dzieci, tak dla podrośniętych grzechotką jest nauka muzyki."},{"type":"paragraph","text":"Okazuje się więc z tego, że należy dzieci uczyć muzyki, i to w sposób połączony z ćwiczeniami praktycznymi."},{"type":"paragraph","text":"2. Co dla pewnego wieku odpowiednie lub nieodpowiednie, nietrudno określić; równie łatwo jest też odeprzeć twierdzenie, jakoby praktyczne uprawianie muzyki miało rzemieślniczy charakter. Bo po pierwsze, dla wyrobienia sobie sądu trzeba się szkolić praktycznie i dlatego powinno się to robić w młodocianym jeszcze wieku; w dojrzalszych zaś latach należy zaniechać uprawiania osobiście muzyki, a poprzestać na zdobytej przez naukę za młodu zdolności trafnego sądzenia piękna, jako też rozkoszowania się nim."},{"type":"paragraph","text":"3. Co się z kolei tyczy zarzutu, jaki niektórzy czynią muzyce, że zamienia uprawiających ją w rzemieślników, to nietrudno go odeprzeć. Trzeba tylko ustalić, jak dalece muszą się w niej szkolić praktycznie ci, którzy w swym wychowaniu mają na celu cnotę polityczną, jakich melodii i jakich rytmów mają się uczyć, i w końcu, na jakich instrumentach powinna być prowadzona nauka; bo i to oczywiście stanowi różnicę. Stwierdzenie tego rozstrzyga o odparciu zarzutu, bo nie można zaprzeczyć, że pewne rodzaje muzyki istotnie wywierają wspomniany wpływ ujemny."},{"type":"paragraph","text":"4. Nie ulega zatem wątpliwości, że nauka muzyki ani nie powinna stanowić przeszkody w późniejszej działalności zawodowej, ani powodować niedorozwoju fizycznego i niezdolności do służby wojskowej, czy działalności politycznej, a więc najpierw do ćwiczeń [efebów], a potem i do przyswojenia sobie potrzebnych umiejętności. Daje się to osiągnąć przy nauce [muzyki], jeśli uczniowie nie będą się zamęczać ćwiczeniami zmierzającymi do zawodów sprawności, ani też budzącymi podziw sztuczkami i osobliwościami wykonania, co dziś wkradło się do zawodów, a z nich do nauki. Przeciwnie, winni uprawiać ćwiczenia do tego stopnia sprawności, by mogli się rozkoszować pięknymi melodiami i rytmami, a nie tym pospolitym tylko powabem muzyki, dostępnym nawet dla niektórych zwierząt oraz ogółu niewolników i dzieci."},{"type":"paragraph","text":"5. Okazuje się z tego również, jakich instrumentów przy tym używać należy."},{"type":"paragraph","text":"Nie trzeba przy nauce dopuszczać fletów, ani też żadnego innego instrumentu przeznaczonego dla mistrza fachowego, jak kitara lub inne podobne, lecz stosować tylko takie, które by uczniów nimi się posługujących dobrze zaprawiały czy do wykształcenia muzycznego, czy też innego. Flet nie działa na uczucia kojąco, lecz raczej orgiastycznie, toteż należy go stosować w takich okolicznościach, w których chodzi raczej o wyzwolenie uczuć aniżeli pouczenie. Dodajmy do tego okoliczność nie sprzyjającą wychowawczemu działaniu fletu, że gra na flecie uniemożliwia równoczesne stosowanie słowa. Dlatego to przodkowie nasi słusznie usunęli ten instrument z koła młodzieży i ludzi wolnych, chociaż pierwotnie był u nich w użyciu."},{"type":"paragraph","text":"199"},{"type":"paragraph","text":"6. Kiedy mianowicie przy wzrastającym dobrobycie uzyskali więcej czasu na spoczynek i rozwinęli w duszy więcej pędu do cnoty, a poczucie dokonanych czynów już i przedtem, ale zwłaszcza po wojnach perskich, dumą napełniło ich duszę, rzucili się do wszelkich nauk, wcale nie przebierając, lecz [coraz to nowe]"},{"type":"paragraph","text":"wyszukując. Dlatego też w zakres nauczania wciągnęli i grę na flecie, W Lacedemonie bowiem pewien kierownik chóru sam wtórował chórowi na flecie, a w Atenach tak się flet zadomowił, że niemal wszyscy wolni obywatele umieli grać na nim. Okazuje się to z tablicy pamiątkowej, którą ufundował Trasippos, gdy wyszkolił chór Ekfantidesowi12."},{"type":"paragraph","text":"7. Później jednak na podstawie poczynionych doświadczeń flet został zarzucony, kiedy nauczono się lepiej sądzić, co sprzyja cnocie, a co nie. To samo stało się z wielu innymi starożytnymi instrumentami, jak pektydy i barbitony, oraz te, które są obliczone na wzbudzenie zmysłowej przyjemności ich słuchaczy, jak heptagony, trygony, sambyki13, jak i wszystkie wymagające wielkiej sprawności w palcach."},{"type":"paragraph","text":"8. Bardzo znamienna jest też opowieść, jaką dawni autorowie przekazali o flecie. Powiadają bowiem, że to Atena flet wynalazła, ale go odrzuciła, a uczyniła to bogini z tego powodu, jak mówią nie bez racji, ponieważ ją raziło, że flet twarz zniekształca. Niemniej przecież prawdopodobniej szą jest rzeczą, iż powód w tym leżał, że nauka gry na flecie w niczym się nie przyczynia do wykształcenia umysłu, a przecież Atenę uważamy za boginię nauki i sztuki."},{"type":"paragraph","text":"7. Różne rodzaje tonacji i taktów,"},{"type":"paragraph","text":"wartość ich dla celów wychowawczych"},{"type":"paragraph","text":"1. Odrzucamy zatem w wychowaniu kształcenie w grze na instrumentach, zmierzające do mistrzostwa, a mistrzostwo przenosimy do zawodów. Kto bowiem w nich występuje, ten czyni to nie dla uszlachetnienia swej duszy, lecz dla przyjemności słuchaczy, i to przyjemności pospolitej. Dlatego uważamy, że takie wykonywanie swej sztuki niegodne jest wolnego człowieka, a jest raczej rzemios-"},{"type":"paragraph","text":"łem. Jakoż doświadczenie pokazuje, że [tacy popisujący się zawodowo mistrze]"},{"type":"paragraph","text":"stają się rzemieślnikami, gdyż cel, jaki sobie wytknęli, jest marny. Pospolity bowiem słuchacz zwykle ujemnie oddziałuje na muzykę przez to, że artystów, którzy się w grze swojej względem na niego kierują, wedle siebie urabia duchowo i niszczy fizycznie przez pobudzanie do nadmiernych wysiłków, 2. Z kolei trzeba się zastanowić nad rodzajami tonacji i rodzajami taktów w ogóle, i w zastosowaniu do wychowania. [Chodzi mianowicie o to,] czy powinno 12 Ekfantides był jednym z najstarszych przedstawicieli starej komedii attyckiej w okresie po wojnach perskich. Trasippos był kierownikiem chóru, czyli choregiem, który swoim kosztem szkolił"},{"type":"paragraph","text":"chór, biorący udział w wystawionych przez Ekfantidesa komediach."},{"type":"paragraph","text":"13 Wszystko to instrumenty o różnych kształtach i różnej ilości strun; różnice miedzy nimi nie są dla nas dość jasne."},{"type":"paragraph","text":"200"},{"type":"paragraph","text":"się stosować wszystkie rodzaje tonacji i taktów, czy też powinny być w tym względzie różnice, a następnie, czy zastosujemy w praktyce wychowawczej to samo rozróżnienie, czy też trzeba tu zastosować inny jeszcze, trzeci punkt widzenia. Widzimy przecież, że muzyka składa się z melodii i rytmu, toteż musimy wiedzieć, jaki wpływ na wychowanie posiada [każdy z tych dwóch elementów]. Czy zatem pierwszeństwo należy dać raczej muzyce melodyjnej, czy rytmicznej?"},{"type":"paragraph","text":"3. Ponieważ jestem zdania, że niektórzy ze współczesnych muzyków, jak i z filozofów, którzy posiadają doświadczenie w nauczaniu muzyki, wypowiadają14"},{"type":"paragraph","text":"wiele trafnych zdań w tym względzie, więc tym, którzy tego pragną, radzimy u nich poszukać dokładnych wyjaśnień w szczegółach, ja zaś pragnę tu rozgraniczyć te zadania z krótkością prawodawcy i podać tylko ogólne ich zarysy."},{"type":"paragraph","text":"4. Przyjmuję zatem podział stosowany przez niektórych filozofów, którzy dzielą pieśni na etyczne, czyli działające na uczucia moralne, praktyczne, czyli pobudzające do czynu, i entuzjastyczne [, czyli wywołujące zachwyt] i odpowiednio do tego każdej tonacji przypisują właściwy jej charakter, zaliczając jedne do tej, drugie do tamtej grupy. Jestem tego zdania, że muzykę należy uprawiać nie dla jednego, ale dla wielu pożytecznych celów, bo i dla wykształcenia i dla duchowego oczyszczenia, czyli tzw. katharsis — co zaś nazywam katharsis, teraz ogólnie tylko zaznaczam, bo później, mianowicie w Poetyce, dokładniej to omówię15 — po trzecie zaś i dla wypełnienia czasu spoczynku, dla odprężenia i wytchnienia po pracy."},{"type":"paragraph","text":"5. Okazuje się z tego, że wprawdzie należy stosować wszystkie tonacje, ale w różny sposób, bo do celów kształcenia tonacje wybitnie działające na uczucia moralne (etyczne), do słuchania zaś gry obcej pobudzające do czynu (praktyczne) i wywołujące zachwyt (entuzjastyczne). Uczucie bowiem, które w duszach niektórych z wielką przejawia się siłą, odzywa się we wszystkich duszach, a tylko tu w większym, tam w niniejszym stopniu, tak np. uczucie litości i strachu, a także i zachwytu; bo i do tego uczucia są niektórzy skłonni. Widzimy przecież, że pod wpływem świętych pieśni ludzie tacy, którzy posłyszą melodie wprawiające duszę w stan zachwytu, uspokajają się, jakby zażyli jakiegoś lekarstwa i środka uśmierzającego."},{"type":"paragraph","text":"6. Takie samo wrażenie muszą odczuwać ci, którzy są skłonni do uczucia litości i strachu, i w ogóle ludzie wrażliwi, inni zaś, o ile kogoś któreś z tych uczuć poruszy; wszyscy jednak odczuwają w takim razie pewne oczyszczenie i ulgę połączoną z rozkoszą. Podobnie i śpiewy o takim oczyszczającym duszę charakterze sprawiają ludziom nieszkodliwą uciechę. Dlatego w takich tonacjach i w takich melodiach winni by się mierzyć w zawodach ci, którzy występują w teatrze z muzycznymi popisami."},{"type":"paragraph","text":"7. Że zaś są dwa rodzaje widzów teatralnych, jeden — ludzie wolni i wykształceni, drugi — tłum nieokrzesany, złożony z rzemieślników, wyrobników 14 Platon, Państwo (399 A)."},{"type":"paragraph","text":"15 Por. Poet. 1449 b."},{"type":"paragraph","text":"201"},{"type":"paragraph","text":"i innych tym podobnych, to i dla ludzi tego drugiego rodzaju należy urządzać muzyczne zawody i koncerty ku ich wytchnieniu. Jak dusze ich są wytrącone z przyrodzonej postawy, tak i w tonacjach oraz melodiach występują odchylenia o charakterze ostrym i przejaskrawionym. A że każdemu sprawia przyjemność to, co mu jest bliskie z natury, wiec artystom występującym w zawodach trzeba zostawić swobodę wykonywania takiego rodzaju muzyki, który takim słuchaczom odpowiada."},{"type":"paragraph","text":"8. Do celów wychowania należy jednak, jak powiedziano, posługiwać się działającymi na uczucia moralne melodiami i tegoż rodzaju tonacjami. Taka jest, jak już poprzednio zauważyłem, tonacja dorycka. Trzeba jednak dopuścić i inną, jeśli ją nam zalecają tacy, co uprawiają studia filozoficzne, a i w muzyce są wykształceni. Sokrates w Państwie niesłusznie obok tonacji doryckiej uznaje jedynie jeszcze frygijską, zwłaszcza że flet usuwa z instrumentów16. A przecież między tonacjami frygijską tonacja to samo wywołuje wrażenie, co flet między instrumentami: zarówno ona, jak i flet oddziałują w sposób oszałamiający i podniecający uczucia."},{"type":"paragraph","text":"9. Dowodzi tego również poezja. Każdy bowiem utwór bakchiczny, jak i każdy inny pokrewnego rodzaju, wymaga do wtóru z wszystkich instrumentów przede wszystkim fletów, a spomiędzy tonacji dobiera sobie melodię frygijską, jako odpowiednią dla siebie; jakoż dytyramb, wedle zgodnej opinii, zdaje się posiadać charakter frygijski. Znawcy muzyki podają wiele dowodów na to, między innymi i ten, że Filoksenos 17, który próbował skomponować dytyramb Mity według tonacji doryckiej, nie zdołał przeprowadzić zamierzenia, ale z samej natury rzeczy wpadł"},{"type":"paragraph","text":"znów w tonację frygijską, jako jedynie tu odpowiednią."},{"type":"paragraph","text":"10. Co do tonacji doryckiej, to wszyscy zgadzają się na to, że jest ona najspokojniejsza i ma najbardziej męski charakter. Skoro nadto chwalimy środek między skrajnościami i uważamy, że środkową trzeba postępować drogą, a tonacja dorycka ma ten właśnie pośredni charakter między innymi tonacjami, to jasną jest rzeczą, że doryckie melodie lepiej się nadają do nauczania młodzieży. Wchodzą przy tym w grę dwa punkty widzenia: to, co możliwe, i to, co odpowiednie, bo każdy powinien to właśnie uprawiać, co jest dla niego możliwe i co jest odpowiednie. Ale i w tym względzie wchodzi nadto w rachubę rozróżnienie wedle wieku, bo np. ludziom starszym nie przychodzi łatwo śpiewanie wymagających wysiłku melodii, lecz natura sama podsuwa ludziom w takim wieku spokojniejsze pieśni."},{"type":"paragraph","text":"11. Dlatego niektórzy ze znawców muzyki słusznie czynią Sokratesowi i ten zarzut, że odrzucał spokojne tonacje przy nauce, ponieważ uważał je za oszałamiające, nie tak jak oszałamia wino (bo pijaństwo działa raczej pobudzająco), ale 16 Państwo 399 A."},{"type":"paragraph","text":"17 Filoksenos z wyspy Cytery, czynny na dworze tyrana Dionizjosa, głośny był jako twórca utworów dytyrambicznych. Tytuł wspomnianego tu dytyrambu niepewny, Schneider proponował"},{"type":"paragraph","text":"poprawkę Mizowie."},{"type":"paragraph","text":"202"},{"type":"paragraph","text":"w znaczeniu znużenia. Dlatego i ze względu na przyszły okres wieku starszego trzeba się uczyć także takich tonacji oraz melodii, a jeśli jest jakaś taka tonacja, odpowiednia dla wieku chłopięcego z tego powodu, że może połączyć poprawność z wykształceniem — jest to cecha, którą zdaje się wykazywać przede wszystkim tonacja lidyjska — to oczywistą jest rzeczą, że te trzy wytyczne trzeba stosować przy wykształceniu muzycznym: właściwy środek, to, co możliwe, i to, co właściwe18."},{"type":"paragraph","text":"18 Na tym urywa się dzieło Arystotelesa. Czy autor go nie skończył, czy też część dalsza się nie dochowała, nie wiadomo."}]}],"attribution":{"epub_url":"arystoteles-polityka/arystoteles-polityka.epub","pdf_url":"arystoteles-polityka/arystoteles-polityka.pdf"}};</script>
