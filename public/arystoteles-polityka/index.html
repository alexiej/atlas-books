tes i Perykles83. Perykles nadto wprowadził zasadę opłacania sędziów i w ten sposób każdy z przywódców ludu [demagogów] posuwał się dalej w dążeniu do powiększenia znaczenia ludu, aż do obecnej demokracji."},{"type":"paragraph","text":"4. Rozwój taki nie leżał zapewne w zamiarach Solona, ale dokonał się wskutek zbiegu okoliczności. Bo lud, kiedy w wojnach perskich stworzył potęgę morską, nabrał buty i poszedł za marnymi demagogami, choć zacni obywatele temu się przeciwstawiali. Przecież Solon przydzielił ludowi właściwie tylko najkonieczniej-sze uprawnienia84; wybór urzędników i pociąganie ich do odpowiedzialności; gdyby bowiem lud nawet takiej władzy nie miał, byłby jakby w niewoli i wrogie by żywił uczucia. Urzędy natomiast wszystkie obsadził ludźmi spośród znakomitych i zamożnych, z klasy pentakosjomedimnów, zeugitów i trzeciego stanu, zwanego rycerskim; czwarta klasa, tetów, nie miała natomiast dostępu do żadnego urzędu85."},{"type":"paragraph","text":"5. Prawodawcami byli nadto Zaleukos86 w Lokrach Epizefiryjskich i Charon-das87 z Katany w swym mieście rodzinnym i w innych miastach chalkidyckich na wybrzeżach Italii i Sycylii. Niektórzy usiłują też dowieść, że pierwszym wybitnym prawodawcą był Onomakritos88, z pochodzenia Lokryjczyk, wykształcony jednak na Krecie, gdzie bawił dla zapoznania się ze sztuką wróżbiarską; jego towarzyszem miał być Tales89, uczniami zaś Talesa Likurg i Zaleukos, a uczniem Zaleukosa Charondas. Twierdzenia te wynikają jednak z niedostatecznego rozważenia chronologii."},{"type":"paragraph","text":"82 Reformy Solona omawia Arystoteles obszernie w Ustroju polit. Aten (rozdz. 6 -10)."},{"type":"paragraph","text":"81 Por. tamże, rozdz. 25."},{"type":"paragraph","text":"84 Tak tez określił swą działalność i sam Solon w urywku poematu zachowanym u Arystotelesa w Ustroju polit. Aten (rozdz. 12): „Taką wszak władzę ludowi przyznałem, na jaką zasłużył, anim nie ujął mu ran ani przydzielił nad stan” [przeł W. Steffen, w Antologia liryki greckiej, Wrocław 1995]"},{"type":"paragraph","text":"85 Por. Arystoteles, Ustrój polit. Aten, rozdz. 7, § 3 - 4."},{"type":"paragraph","text":"86 Według tradycji, najstarszy prawodawca grecki czynny w pierwszej połowie VII w. p.n.e w Lokrach południowo-italskich."},{"type":"paragraph","text":"87 Młodszy o generacje od Zaleukosa prawodawca czynny w Katanie na Sycylii. Z Katany prawa jego przejęte zostały przez inne kolonie chalkidyckie na Sycylii, w pdn. Italii, a także na półwyspie Chalkidike oraz w niektórych miastach na wyspach Morza Egejskiego."},{"type":"paragraph","text":"88 Wspomniany tu Onomakritos zdaje się być postacią legendarną 89 Postać tak samo legendarna, jak Onomakritos, nie ma tez nic wspólnego ze znanym filozofem Talesem."},{"type":"paragraph","text":"52"},{"type":"paragraph","text":"6. Prawodawcą był też Filolaos z Koryntu czynny w Tebach90. Pochodził"},{"type":"paragraph","text":"Filolaos z rodu Bakchiadów, a tak pokochał Dioklesa, zwycięzcę w igrzyskach olimpijskich, że kiedy ten opuścił miasto [ojczyste], uchodząc ze wstrętem przed miłością swej matki Alkiony, wyjechał razem z nim do Teb, gdzie obaj życie zakończyli. I tam teraz jeszcze pokazują ich groby, które są dobrze widoczne jeden z drugiego, podczas gdy w stronę ziemi korynckiej z jednego tylko widok się roztacza, a z drugiego nie."},{"type":"paragraph","text":"7. Według podania, sami bowiem w ten sposób zarządzili swe pogrzebanie, a mianowicie Diokles powodowany goryczą z powodu doznanej przykrości nie chciał, by z mogiły jego widoczna była ziemia koryncka, Filolaos natomiast właśnie sobie tego życzył. Z takiego to powodu mieszkali więc u Tebańczyków, a Filolaos czynny był u nich jako prawodawca i między innymi ustanowił też prawa dotyczące płodzenia dzieci, zwane u nich prawami adopcyjnymi; istotnym celem jego ustawodawstwa było dążenie do zachowania liczby działek rolnych."},{"type":"paragraph","text":"8. Prawodawstwo Charondasa nie wykazuje nic znamiennego prócz skarg o złożenie fałszywego świadectwa (on pierwszy bowiem wprowadził pozwy sądowe o to przestępstwo, ale w ścisłości ujęcia praw góruje on nawet nad obecnymi prawodawcami). Prawodawstwo Faleasa znamionuje zrównanie majątków, Platona zaś wspólność kobiet, dzieci i majątków, wspólne biesiady kobiet, a nadto prawo o pijaństwie, postanawiające, że przy biesiadach trzeźwi mają przewodniczyć, tudzież prawo o ćwiczeniach wojskowych, wymagające, by się ćwiczono we władaniu bronią jedną i drugą ręką, gdyż nie powinna być jedna ręka pożyteczna, a druga bezużyteczna91."},{"type":"paragraph","text":"9. Istnieją też prawa Drakona, rozwijał on jednak działalność ustawodawczą przy niezmienionym ustroju92. W prawach jego nie ma nic znamiennego, co by było godne wspomnienia, z wyjątkiem surowości przejawiającej się w wysokości kar."},{"type":"paragraph","text":"Także i Pittakos 93 był twórcą praw, ale nie ustroju. Znamienne jest jego prawo, że pijani, jeśliby kogo pobili, mają większą karę ponieść aniżeli trzeźwi; ponieważ ludzie więcej dopuszczają się czynów gwałtownych po pijanemu niż na trzeźwo, więc nie brał pod uwagę pobłażania głoszącego, że należy raczej przebaczyć pijanemu, ale wzgląd na korzyść społeczną."},{"type":"paragraph","text":"90 O Filolaosie nic poza tym nie wiadomo. Jeśli należał do rodziny królewskiej Bakchiadów, której panowanie w Koryncie obalone zostało przez tyrana Kypselosa (657 r. p.n.e.), to jego działalność w Tebach, o której tu mówi Arystoteles, a o której jednak nic więcej nie wiadomo, należałoby przenieść na okres wcześniejszy."},{"type":"paragraph","text":"91 Platon, Prawa, ks. I (637), ks. VII (794 nn.)."},{"type":"paragraph","text":"92 W sprzeczności z tym w Ustroju poilt. Aten (rozdz. 4) podaje Arystoteles rzekome reformy ustrojowe Drakona, które jednak z pewnością są niehistoryczne, jak to i z tego miejsca Polityki wyraźnie wynika."},{"type":"paragraph","text":"93 Pittakos (w Mitylenie na wyspie Lesbos) po dłuższym okresie walk wewnętrznych ok. 600 r."},{"type":"paragraph","text":"p.n.e. powołany został, jak współcześnie Solon w Atenach, do uporządkowania stosunków i spisania praw na okres 10 lat (z tytułem „ajsymnetes”)."},{"type":"paragraph","text":"53"},{"type":"paragraph","text":"Prawodawcą był też w końcu Androdamas z Region94, czynny u Chalkidyj-czyków w Tracji, który wydal m.in. prawo o rozlewie krwi i córkach dziedziczkach; nic wszelako szczególnego nie da się o nim powiedzieć."},{"type":"paragraph","text":"W ten sposób zatem niechaj będą omówione różne ustroje zarówno faktycznie istniejące, jak i teoretycznie przez niektórych rozwinięte."}],"audio_pl":["audio/ch02-part000.mp3","audio/ch02-part001.mp3","audio/ch02-part002.mp3","audio/ch02-part003.mp3","audio/ch02-part004.mp3","audio/ch02-part005.mp3","audio/ch02-part006.mp3","audio/ch02-part007.mp3","audio/ch02-part008.mp3","audio/ch02-part009.mp3","audio/ch02-part010.mp3"]},{"id":"księga-trzecia","number":4,"title":"Księga trzecia","blocks":[{"type":"paragraph","text":"I Definicja obywatela."},{"type":"paragraph","text":"Obywatelstwo przez urodzenie i przez nadanie."},{"type":"paragraph","text":"Państwo a zmiana ustroju."},{"type":"paragraph","text":"1. Kto podejmuje badania nad ustrojem państwowym i pragnie określić istotę i cechy każdego, musi właściwie zacząć rozważania najpierw od samego państwa i [ustalić], co to jest państwo. Bo dziś co do tego nie ma zgody: jedni powiadają, że pewną akcję przeprowadziło państwo, drudzy mówią, że [zrobiło to] nie państwo, lecz oligarchia lub tyran. Widzimy zaś, że cała działalność męża stanu i prawodawcy dotyczy państwa, a ustrój polityczny jest ujęciem tych, co mieszkają w państwie, w ramy pewnego porządku."},{"type":"paragraph","text":"2. Ponieważ jednak państwo jest całością złożoną, jak każda inna całość składająca się z wielu części, więc jest jasną rzeczą, że należy wpierw rozważyć pojęcie obywatela; bo państwo jest pewną wielością obywateli. Powinno się zatem zbadać, kogo należy nazywać obywatelem i kto jest obywatelem. Bo i pojęcie obywatela jest często sporne: nie wszyscy mianowicie nazywają zgodnie tego samego człowieka obywatelem i bywa nieraz, że ten, kto w ustroju demokratycznym jest obywatelem, nie jest nim w ustroju oligarchicznym."},{"type":"paragraph","text":"3. Tych, którzy przypadkiem jakimś otrzymali to miano, np. obdarzonych obywatelstwem, trzeba [przy tym] pominąć. Obywatel nie zostaje obywatelem przez to, że gdzieś zamieszkał, bo także metojkowie1 i niewolnicy mają wspólne z obywatelami miejsce zamieszkania. Nie są też jeszcze obywatelami ci, którzy biorą udział w wymiarze sprawiedliwości w ten sposób, że stają przed sądem czy to jako pozwani, czy jako pozywający, gdyż to przysługuje również obcym na podstawie zawartych układów (i takie bowiem zastrzeżenia w nich bywają), a w wielu miejscach nawet metojkowie prawa tego w pełni nie posiadają, lecz 94 Skądinąd nieznany"},{"type":"paragraph","text":"1 Tak nazywano w Grecji stale mieszkających w pewnym mieście przybyszów z innego miasta, którzy mieli w miejscu nowego osiedlenia prawo zarobkowania w rzemiośle i handlu, ale nie mogli nabywać ziemi, obciążeni zaś byli specjalnym podatkiem i często innymi jeszcze świadczeniami Praw politycznych me posiadali, nawet w sądzie często zastępował ich patron, pod którego opieką pozostawali"},{"type":"paragraph","text":"54"},{"type":"paragraph","text":"muszą postarać się o przydzielenie patrona, tak że udział ich w tej dziedzinie wspólnoty jest do pewnego stopnia ograniczony,"},{"type":"paragraph","text":"4. Jest jednak w tym wypadku jak z dziećmi, które ze względu na wiek nie zostały jeszcze zaciągnięte na listę obywateli, i ze starcami, którzy zwolnieni zostali [od pełnienia obowiązków obywatelskich], a których musi się nazwać w pewnej mierze obywatelami, tylko nie wprost bez zastrzeżeń, lecz z dodatkiem w pierwszym wypadku “jeszcze nieczynni”, w drugim „już nieczynni” lub coś podobnego (nie stanowi to przecież żadnej różnicy, bo to, co mówimy, jest jasne)."},{"type":"paragraph","text":"Szukamy bowiem czystego pojęcia obywatela, nie zawierającego żadnego takiego zastrzeżenia, które by wymagało prostującego uzupełnienia, skoro także i co do pozbawionych czci, i co do wygnańców można takie same wątpliwości podnosić i usuwać."},{"type":"paragraph","text":"Pojęcia obywatela w istotnej jego treści nic bezwzględnie trafniej nie określa niż prawo udziału w sądach i rządzie. Z urzędów państwowych jedne są ograniczone co do czasu, tak że niektórych ten sam człowiek w ogóle dwukrotnie piastować nie może, albo też dopiero po upływie pewnego okresu, inne natomiast, jak np. udział"},{"type":"paragraph","text":"w sądach i zgromadzeniach ludowych, nie mają takiego ograniczenia."},{"type":"paragraph","text":"5. Może więc ktoś powie na to, że ciała te nie są wcale władzą, że ktoś, kto bierze w nich udział, nie uczestniczy przez to w rządach; jednakowoż śmieszną byłoby rzeczą nie uznać za czynnik rządzący tych, którzy mają moc rozstrzygania spraw najważniejszych. Niech to jednak nie stanowi bynajmniej różnicy, bo chodzi tu tylko o nazwę. Na oznaczenie bowiem tego, co jest wspólną cechą członka sądu i zgromadzenia ludowego, brak nazwy, którą by należało obu ich objąć. Dla odróżnienia nazwijmy więc ich uprawnienia władzą nieokreśloną. Przyjmujemy tedy, że obywatelami są ci, którzy [mając dostęp do tych funkcji] uczestniczą w rządzeniu państwem. Taka byłaby najwięcej może odpowiednia definicja obywatela, obejmująca wszystkich, których mienimy obywatelami."},{"type":"paragraph","text":"6. Trzeba wszelako zauważyć, że w tych wypadkach, gdzie tą samą nazwą objęte przedmioty różnią się co do rodzaju, tak że jeden w pierwszym rzędzie zasługuje na swą nazwę, a drugi dopiero z kolei, tam albo w ogóle nie występuje wspólna cecha, która by je łączyła, albo też w drobnej tylko mierze. Tymczasem widzimy, że ustroje różnią się rodzajem, że jedne są niższe, inne wyższe, bo wadliwe i zwyrodniałe z konieczności ustępują miejsca tym, które nie wykazują błędów (co rozumiem przez zwyrodniałe, to się później okaże)2; wobec tego również i obywatel musi być odmienny w każdym ustroju."},{"type":"paragraph","text":"7. Podana definicja obywatela odpowiada głównie ustrojowi demokratycznemu, w innych natomiast ustrojach może ona wprawdzie być też odpowiednia, ale niekoniecznie. W niektórych bowiem lud nie gra żadnej roli, nie znają nawet zgromadzeń ludowych, lecz zebrania rady, a sprawy sądzą zależnie od przedmiotu różne władze. Tak np. w Lacedemonie sprawy sporne sądzą eforowie, i to każdy inne, procesy o rozlew krwi członkowie rady starców, a jeszcze inne sprawy może 2 Por. niżej, rozdz. 4, § 7, rozdz. 5, § 4."},{"type":"paragraph","text":"55"},{"type":"paragraph","text":"jakaś inna władza. Tak samo jest w Kartaginie, bo tam wszystkie sprawy sądzą odpowiednie władze3."},{"type":"paragraph","text":"8. Powyższą definicję obywatela można co prawda nieco sprostować. W innych ustrojach mianowicie zadania zgromadzenia i sądu ludowego spełnia nie przedstawiciel nieokreślonej władzy, ale osoby z określonymi uprawnieniami, przy czym wszystkim albo niektórym z nich powierza się zasiadanie w zgromadzeniach i trybunałach, decydujących o wszystkich albo o niektórych sprawach. Okazuje się więc z tego, co to jest obywatel. Kto mianowicie w pewnym państwie ma prawo uczestniczenia w zgromadzeniach i trybunałach, tego nazywamy już obywatelem tego państwa, państwem zaś — krótko mówiąc — zwiemy ogół takich ludzi, odpowiednio wielki, by w wystarczającej mierze zapewnić sobie wszystko, co do życia potrzebne."},{"type":"paragraph","text":"9. W praktyce jednak mianem obywatela określa się tego, który zarówno w linii ojca, jak i matki pochodzi z rodziny obywatelskiej, a nie z jednej tylko strony, a więc z ojca jedynie lub matki. Niektórzy idą w tym względzie jeszcze dalej, domagając się dwóch czy trzech, albo i więcej dziadków-obywateli. Przy takim praktycznym a powierzchownym ujęciu rzeczy pytają się niektórzy z zakłopotaniem, w jaki sposób stwierdzi się, czy ów trzeci lub czwarty przodek był obywatelem. Toteż Gorgiasz z Leontinoj4 częściowo może zakłopotany, a częściowo ironicznie dał na to odpowiedź, że jak kotłami są wyroby sporządzone przez kotlarzy, tak i Larysyjczykami są ci, którzy przez ich twórców stworzeni zostali, bo niektórzy z nich są wytwórcami larys5. Rzecz jest jednak prosta, bo jeśli przodkowie według definicji mieli udział"},{"type":"paragraph","text":"w zarządzie państwa, to byli obywatelami, ale zastrzeżenia, że ojciec i matka winni być obywatelami, nie można przecież stosować do pierwszych osadników i założycieli."},{"type":"paragraph","text":"10. Może jednak większa trudność jest z tymi, którzy otrzymali obywatelstwo wskutek dokonanego przewrotu, jak np. w Atenach, gdzie przeprowadził to Klejstenes po wypędzeniu tyranów6; wielu bowiem metojków, cudzoziemców i wyzwolonych niewolników7 wprowadził do fyl. Wątpliwość w stosunku do nich 3 Por. ks. II, rozdz. 8, § 4."},{"type":"paragraph","text":"4 Sofista Gorgiasz, który w roku 427 p.n.e. bawił w Atenach jako poseł swego rodzinnego miasta Leontinoj, przebywał czas jakiś również w Tesalii, m.in. w Larysie."},{"type":"paragraph","text":"5 Gra słów trudna do oddania w języku polskim, polegająca na tym, że nazwa miasta Larysa oznacza po grecku również kocioł. Gorgiasz chciał oczywiście powiedzieć, że jak są kotły, bo je sporządzili kotlarze, tak są i Larysyjczycy, bo się z Larysyjczyków urodzili."},{"type":"paragraph","text":"6 O reformie Klejstenesa w Atenach (508/507 p.n.e.) mówi obszernie Arystoteles w Ustroju polit."},{"type":"paragraph","text":"Aten, rozdz. 21 n.)."},{"type":"paragraph","text":"7 W tekście przekazanym: ξένους και δούλους µετοίκους, co nastręcza trudności w interpretacji, wiele też wywołało dyskusji. Przyjmuję ξένους και δούλους za dopowiedzenie do µετοίκους, bo że chodzi tu o wprowadzenie w szeregi obywateli obcych ludzi, mieszkających w Atenach, czyli metojków, to rzecz niewątpliwa; ξένους και δούλους wskazuje z kolei, jakie elementy złożyły się na tę grupę; δούλους tłumaczę: „wyzwolonych niewolników”, co wynika z natury rzeczy. Por. m.in."},{"type":"paragraph","text":"Newman, op. cit., t.1, s. 231, przyp. 1. Inne próby wyjścia z trudności przez zmianę tekstu są dowolne i niepotrzebne. I tak jedni proponują przestawić „metojków” przed „i” między niewolników”"},{"type":"paragraph","text":"a „metojków”, i stwarzają w ten sposób trzy rodzaje obdarzonych obywatelstwem: „cudzoziemców, niewolników i metojków”."},{"type":"paragraph","text":"56"},{"type":"paragraph","text":"dotyczy nie pytania, kto jest obywatelem, ale czy jest nim nieprawnie, czy prawnie."},{"type":"paragraph","text":"Można by tu wszelako podnieść dalszą wątpliwość, czy ktoś jest obywatelem, jeśli został nim w sposób nieprawny, jako że „nieprawny” i „fałszywy” znaczy to samo."},{"type":"paragraph","text":"Ponieważ jednak widzimy, że niektórzy zostali nieprawnie urzędnikami, a mimo to mówimy o nich, że sprawują władzę, chociaż i nieprawnie, pojęcie zaś obywatela określa się według pewnej władzy (gdyż obywatelem jest, jak powiedzieliśmy 8, ten, co ma dostęp do takiej a takiej władzy rządzącej), więc jasną jest rzeczą, że i tych trzeba nazwać obywatelami, pytanie natomiast, czy prawnie, czy nieprawnie, łączy się ze wspomnianą poprzednio wątpliwością."},{"type":"paragraph","text":"Niektórzy mianowicie pytają, kiedy coś uchodzi za akt państwowy, a kiedy nie, tak np. [w wypadku], gdy z oligarchii lub tyranii wyłoni się demokracja. W takim bowiem razie niektórzy ani nie chcą spłacać pożyczek, powiadając, że je nie państwo zaciągnęło, lecz tyran, ani też nie chcą uznać wielu innych tego rodzaju zobowiązań, utrzymując, że pewne formy ustrojów opierają się na przemocy, a nie służą dobru społecznemu."},{"type":"paragraph","text":"11. Jeśli więc według tego wzoru zaprowadzony został w pewnych państwach ustrój demokratyczny, to akty dokonywane przy tym ustroju należy uznać za państwowe, podobnie jak przy ustroju oligarchicznym i tyranii. Właściwe ujęcie tej trudności zdaje się leżeć w pytaniu, kiedy winno się powiedzieć, że jest to jeszcze to samo państwo, a kiedy, że to nie jest to samo, lecz inne państwo."},{"type":"paragraph","text":"Najbardziej powierzchowne rozważanie tego zagadnienia dotyczy więc miejsca i mieszkańców; można bowiem oddzielić mieszkańców od miejsca i jedni z nich mogą się osiedlić w tym, drudzy w innym miejscu. Trudność tę trzeba więc uznać za niezbyt wielką, bo wobec różnorodnego znaczenia słowa „polis” [państwo, miasto] badanie takie jest poniekąd ułatwione9."},{"type":"paragraph","text":"12. Podobnie jednak jest w wypadkach, gdy ludzie mieszkają w jednym i tym samym miejscu, a nasuwa się pytanie, kiedy winno się ich uważać za jedno państwo; mury nie grają tu roli, bo można by nawet Peloponez otoczyć jednym murem. Miastem tego rodzaju jest może Babilon i każde [miasto], które ma rozmiary raczej narodu niż miasta; opowiadają przecież, że w trzy dni po zdobyciu Babilonu pewna część miasta nic o tym jeszcze nie wiedziała."},{"type":"paragraph","text":"O tym jednak zagadnieniu warto pomówić przy innej sposobności, mąż stanu musi bowiem brać pod uwagę wielkość państwa, ilość jego mieszkańców, jak i mieć wzgląd na to, czy jest korzystniej, gdy ono obejmuje jeden, czy też gdy więcej ludów."},{"type":"paragraph","text":"13. Ale czy w takim razie, gdy ci sami ludzie mieszkają na tym samym miejscu, winno się to uznawać za to samo państwo, dopóki utrzymuje się ten sam szczep mieszkańców, chociaż nieustannie jedni umierają, a drudzy się rodzą 8 Por. wyżej, rozdz. 1, § 4."},{"type":"paragraph","text":"9 Autor chce najwyraźniej powiedzieć, że skoro „polis” oznacza ludzi i miejsce, więc gdy się to słowo bierze z myślą o ludziach, to oczywiście po ich usunięciu miasto już nie jest to samo, jeśli zaś myśli się o miejscu, to miasto zostaje, choć ludzie się usunęli."},{"type":"paragraph","text":"57"},{"type":"paragraph","text":"— podobnie jak zwykliśmy mówić, że są to te same rzeki i źródła, mimo że nieustannie pewna ilość wody przypływa, a pewna odpływa — czy też z takiego właśnie powodu należałoby powiedzieć, że ludzie są wprawdzie ci sami, ale państwo jest inne. [Odpowiedź na to:] Jeśli państwo jest pewną wspólnotą, a mianowicie wspólnotą obywateli w ramach ustroju, to jeśli ustrój się zmieni co do rodzaju i różnić się będzie od poprzedniego, również i państwo z konieczności nie będzie, jak się zdaje, tym samym; podobnie przecież mówimy raz o chórze komicznym, drugi raz o tragicznym, choć są to często ci sami ludzie."},{"type":"paragraph","text":"14. Podobnie każdy inny zespół i połączenie określamy innym mianem, jeśli się zmienia rodzaj połączenia, tak np. i zestawienie [harmonię] tych samych tonów różnie nazywamy, zależnie od tego, czy jest to skala dorycka czy frygijska. Jeśli tak mają się rzeczy, to oczywiście winno się mówić przede wszystkim o tożsamości państwa biorąc pod uwagę ustrój. Nazwę mu można zmienić albo i zachować bez względu na to, czy ci sami ludzie je zamieszkują, czy też całkiem inni. Czy zaś sprawiedliwą jest rzeczą zrywać lub nie zrywać zawartych uprzednio umów, jeśli państwo zmieni ustrój, to już inne pytanie."},{"type":"paragraph","text":"2. Cnota dzielnego obywatela a cnota dobrego człowieka 1. Z omówionymi co dopiero zagadnieniami łączy się rozważanie, czy cnotę dobrego człowieka należy uważać za to samo, co cnotę dzielnego obywatela, czy też nie. Jeśli jednak mamy to zbadać należycie, to trzeba najpierw określić w pewnych zarysach cnotę obywatela. Otóż o obywatelu mówimy w tym znaczeniu, co np. o żeglarzu stanowiącym pewien człon zespołu. Choć między żeglarzami zachodzą różnice według tego, jakie zadania kto spełniać potrafi"},{"type":"paragraph","text":"— jeden bowiem jest wioślarzem, drugi sternikiem, trzeci podsternikiem, a inny może nosi jeszcze inne jakieś takie miano — to jednak jasną jest rzeczą, że przy najściślejszym ujęciu sprawności, właściwej każdemu z nich, można znaleźć pewną wspólną cechę, do wszystkich zarówno się stosującą. Zadaniem ich wszystkich jest mianowicie bezpieczne prowadzenie płynącego okrętu, bo przecież do tego zmierza każdy z żeglarzy."},{"type":"paragraph","text":"2. Otóż tak samo jest i z obywatelami: chociaż są między nimi różnice, zadaniem ich wszystkich jest dobro wspólnoty, ta zaś opiera się na pewnym ustroju państwowym. Dlatego cnota obywatela musi mieć związek z ustrojem."},{"type":"paragraph","text":"Jeśli więc jest więcej rodzajów ustroju, to oczywiście niepodobna, aby istniała jedna tylko cnota dzielnego obywatela w całej swojej pełni; dobrym zaś zwiemy człowieka ze względu na jedną cnotę w całej jej doskonałości. Okazuje się zatem, że można być dzielnym obywatelem, a nie posiadać cnoty, która stanowi o dzielności człowieka."},{"type":"paragraph","text":"3. Do tego samego zdania można wszelako dojść też na innej drodze, a mianowicie wychodząc od rozważania najlepszego ustroju. Jeśli bowiem jest rzeczą niemożliwą, aby państwo składało się z samych tylko dzielnych obywateli, 58"},{"type":"paragraph","text":"każdy zaś musi dobrze spełniać ciążące na nim zadanie, a to ze względu na cnotę, to cnota obywatela i cnota człowieka dobrego nie może być jednym i tym samym, gdyż niemożliwą jest rzeczą, by wszyscy obywatele byli sobie równi. Bo cnotę dzielnego obywatela muszą wszyscy posiadać (jest to przecież konieczne do istnienia najlepszego państwa), niemożliwą natomiast jest rzeczą, by wszyscy posiadali cnotę dobrego człowieka, chyba że [przyjmiemy, iż] do istoty doskonałego państwa powinno by należeć, by wszyscy jego obywatele byli również ludźmi dobrymi."},{"type":"paragraph","text":"4. Państwo ponadto składa się z nierównych części, tak jak istota żyjąca składa się przede wszystkim z duszy i ciała, dusza z rozumu i woli, rodzina z męża i żony, posiadłość z pana i niewolnika; wszystkie te części różnorodne, i inne jeszcze prócz tego, obejmuje i państwo, toteż z konieczności cnota wszystkich jego obywateli nie może być jedna, tak jak w chórze odmienna jest rola kierownika, odmienna statysty."},{"type":"paragraph","text":"5. Okazuje się więc z tego, że cnota ta nie jest wręcz ta sama. Może jednak tą samą będzie cnota pewnego dzielnego obywatela i dzielnego męża? Mówimy przecież, że dzielny władca jest dobry i rozumny, a obywatel niekoniecznie musi być rozumny. Także już i wychowanie władcy, zdaniem niektórych, jest inne; jakoż okazuje się, że synowie królów otrzymują wykształcenie w jeździe konnej i sztuce wojennej, a Eurypides, wskazując, że jest osobne wychowanie władcy, powiada [w pewnym miejscu]10:"},{"type":"paragraph","text":"Nie błyskotki dla mnie, lecz czego państwu potrzeba."},{"type":"paragraph","text":"6. Jeśli zaś cnota dobrego władcy i dobrego męża jest ta sama, a obywatelem jest i człowiek podlegający władzy, więc nie jest chyba wręcz tą samą cnotą obywatela i męża, a tylko cnota pewnego obywatela; bo nie jest tą samą cnotą władcy i obywatela. Dlatego też zapewne wyraził się Jazon 11, że cierpiałby głód, gdyby nie był tyranem, [dając do poznania,] że nie umiałby być człowiekiem prywatnym."},{"type":"paragraph","text":"7. Spotyka się to wszakże z uznaniem, gdy ktoś zdoła zarówno rządzić, jak słuchać, toteż za cnotę obywatela uchodzi, gdy potrafi i rządzić, i słuchać dobrze."},{"type":"paragraph","text":"Jeśli więc cnotę dobrego męża ujmiemy jako cnotę władcy, a cnotę obywatela jako jedno i drugie12, to obie te cnoty może nie zasługują na równe uznanie. Jeśli więc rządzący i podwładny powinni by — jak się zdaje — uczyć się różnych rzeczy, a nie tego samego, to obywatel powinien by jednakże umieć jedno i drugie oraz w jednym i drugim uczestniczyć13. Można by to wyjaśnić w sposób następujący."},{"type":"paragraph","text":"10 Urywek z zaginionej tragedii pt. Eol (frg. 18, Nauck2)."},{"type":"paragraph","text":"11 Tyran miasta Feraj w Tesalii, który uzyskał przewodnie stanowisko w całym kraju i dążył"},{"type":"paragraph","text":"z kolei do hegemonii w Grecji; zamordowany w 370 r. p.n.e."},{"type":"paragraph","text":"12 Tj. cnotę władcy i podwładnego."},{"type":"paragraph","text":"13 Tekst prawdopodobnie zepsuty. Wydawcy przyjmują lukę w tym miejscu."},{"type":"paragraph","text":"59"},{"type":"paragraph","text":"8. Jest mianowicie władza despotyczna, a rozumiemy przez nią władzę odnoszącą się do usług koniecznych, które niekoniecznie musi umieć spełniać rządzący, lecz raczej ich się domagać, w przeciwnym razie nabrałby znamion niewolnika (mówiąc „w przeciwnym razie” rozumiem tu umiejętność spełniania czynności służebnych). Mówimy zaś o wielu rodzajach niewolników, bo i posług jest wiele rodzajów. Jeden z nich stanowią rękodzielnicy, a należą do nich, jak już ich nazwa wskazuje, żyjący z pracy rąk, a więc i pospolici robotnicy. Dlatego dawniej w niektórych państwach, zanim się rozwinęła skrajna demokracja, rzemieślnicy nie mieli dostępu do piastowania urzędów."},{"type":"paragraph","text":"9. Czynności, spełnianych przez ludzi w tym znaczeniu podwładnych, nie musi się uczyć ani dobry człowiek, ani mąż stanu, ani dobry obywatel, chyba że czasem musi dla własnego, osobistego pożytku, inaczej bowiem już nie byłoby różnicy między panem a niewolnikiem."},{"type":"paragraph","text":"Jest jednak pewna władza, którą się wykonuje nad równymi sobie pochodzeniem i wolnymi. Władzę tę nazywamy władzą polityczną, a wykonujący ją musi się jej uczyć przez to, że jej podlegał, tak jak dowódca jazdy, który wcześniej służył pod inną komendą, lub wódz naczelny, który służył pod rozkazami innego, był też dowódcą oddziału liczącego 128 ludzi i mniejszego. Stąd to trafne powiedzenie, że nie może dobrze rządzić, kto się wpierw nie nauczył słuchać."},{"type":"paragraph","text":"10. Cnota jednych i drugich jest więc rozmaita, niemniej dobry obywatel powinien posiadać umiejętność tudzież zdolność zarówno słuchania jak rządzenia."},{"type":"paragraph","text":"Na tym polega właśnie cnota obywatela, by wykazać umiejętność rządzenia wolnymi a zarazem słuchania. Także i cnota dobrego człowieka obejmuje jedno i drugie, chociaż umiarkowanie i sprawiedliwość władcy innego są rodzaju. Bo cnota podwładnego albo wolnego dobrego człowieka, np. sprawiedliwość, nie może być oczywiście jednaka, ale w różnych wystąpi postaciach (według tego też jeden władać będzie, drugi słuchać), tak jak różne jest umiarkowanie i dzielność mężczyzny i kobiety. Tchórzem przecież wydałby się mąż, gdyby był tylko w tym stopniu dzielny, co dzielna kobieta; a kobieta, gdyby tylko tak była powściągliwa, jak dzielny mężczyzna, [wydałaby się] niepohamowana w języku; toż i w dziedzinie gospodarstwa na czym innym polega cnota mężczyzny i kobiety: jego zadaniem jest zdobywać, jej zaś zachowywać."},{"type":"paragraph","text":"11. Roztropność jest jednak cnotą właściwą jedynie rządzącemu. Inne bowiem cnoty winny być, jak się zdaje, wspólne zarówno podwładnym, jak i rządzącym, natomiast cnotą właściwą podwładnym jest nie roztropność, lecz słuszne mniemanie."},{"type":"paragraph","text":"Bo podwładny jest jakby wytwórcą fletów, rządzący zaś jakby fletnistą, który fletu używa."},{"type":"paragraph","text":"Z wywodów tych okazuje się więc 14, czy cnota dobrego człowieka i dzielnego obywatela jest ta sama czy różna, jako też, w jakiej mierze jest tą samą, w jakiej zaś różną."},{"type":"paragraph","text":"14 Wywody powyższe są tak niejasne, że trudno nadążyć za tokiem myśli autora. Stąd niektórzy wydawcy i komentatorowie przypisują tu możliwość opuszczeń, przesunięć czy zepsucia tekstu."},{"type":"paragraph","text":"60"},{"type":"paragraph","text":"3. Różne rodzaje obywateli w różnych ustrojach"},{"type":"paragraph","text":"1. Jeśli chodzi o obywatela, to pozostaje jednak jeszcze pewna trudność: czy istotnie tylko ten jest obywatelem, komu wolno brać udział w rządach, czy też należałoby uważać za obywateli również i rzemieślników. Jeśli zaś i ci powinni by za nich uchodzić, którzy nie uczestniczą w rządach, to ta omówiona cnota nie może być właściwością każdego obywatela (boć taki"},{"type":"paragraph","text":"[rzemieślnik] byłby [przecież] obywatelem). Jeśli zaś nikt z nich nie jest obywatelem, to do jakiej klasy należy każdego zaliczyć? Bo przecież nie jest to ani metojkos, ani cudzoziemiec. Czy też powiemy, że z tego powodu nie wynika żadna niedorzeczność, bo przecież nie są nimi także ani niewolnicy, ani wyzwoleńcy."},{"type":"paragraph","text":"2. Prawdą jest to bowiem, że nie wszystkich, bez których państwo nie mogłoby istnieć, należy uważać za obywateli, skoro i dzieci nie są w tym samym stopniu obywatelami co dorośli mężowie, lecz ci ostatni są nimi bezwzględnie, a pierwsze tylko względnie: są mianowicie obywatelami, lecz jeszcze nie-czynnymi."},{"type":"paragraph","text":"Za dawnych czasów w niektórych państwach rzemieślnicy byli niewolnikami albo cudzoziemcami, toteż są nimi przeważnie jeszcze i obecnie. Państwo o najlepszym ustroju nie zrobi jednak rzemieślnika obywatelem. Jeśliby i ten miał"},{"type":"paragraph","text":"być obywatelem, to trzeba by powiedzieć, że cnota obywatela, o której mówiliśmy, nie znamionuje każdego, ani też wolnego, lecz tych, którzy są wolni od pracy dla koniecznego utrzymania."},{"type":"paragraph","text":"3. Z tych, którzy takie prace koniecznie spełniają, jedni czynią to na usługach jednostki, i ci są niewolnikami, inni w służbie ogółu, i ci są rzemieślnikami i wyrobnikami. Jak się sprawa tych ludzi przedstawia, jasne jest po krótkim namyśle; następujące rozważanie w sposób oczywisty wyjaśnia, co powiedziano. Ponieważ jest więcej ustrojów państwowych, musi też być więcej rodzajów obywateli, zwłaszcza obywateli podległych, tak że przy pewnym ustroju nawet rzemieślnik i wyrobnik muszą być obywatelami, co jednak w niektórych ustrojach jest niemożliwe; np. jeśli to jest ustrój zwany arystokratycznym, w którym rozdaje się godności według cnoty i zasługi. Kto bowiem życie rzemieślnika lub wyrobnika prowadzi, nie może uprawiać dzieł z cnotą związanych."},{"type":"paragraph","text":"4. Natomiast w państwach o ustroju oligarchicznym wyrobnik nie może być obywatelem (dostęp do urzędów jest tam bowiem uzależniony od wysokiego cenzusu majątkowego), co jednak jest możliwe dla rzemieślników, wobec tego, że przeważna ich część opływa w bogactwa. W Tebach istniało prawo, że kto przez lat 10 nie trzymał się z dala od interesów handlowych, ten nie miał dostępu do"},{"type":"paragraph","text":"[żadnego] urzędu. W wielu zaś ustrojach prawo dopuszcza nawet obcych [do obywatelstwa], bo w niektórych państwach demokratycznych obywatelem jest i ten, którego tylko matka była obywatelką."},{"type":"paragraph","text":"5. Tak samo w wielu wypadkach bywa i z dziećmi urodzonymi z nieprawego 61"},{"type":"paragraph","text":"związku. Ponieważ robią takich obywatelami w braku prawdziwych obywateli (bo tylko ze względu na brak ludzi takich praw sięgają), więc przy zwiększeniu się liczby ludności zaczynają stopniowo odmawiać praw obywatelskich najpierw tym, których ojciec był niewolnikiem lub matka niewolnicą, następnie tym, których matka tylko była obywatelką, a w końcu uznają za obywateli tych jedynie, których oboje rodzice byli obywatelami."},{"type":"paragraph","text":"6. Okazuje się więc z tego, że jest więcej rodzajów obywateli i że w pierwszym rzędzie ten się zwie obywatelem, kto ma dostęp do godności, jak to już i Homer zaznaczył15, mówiąc: „jakby jakiego przybłędę bez czci”. Bo ten, co nie ma do godności dostępu, jest jakby cudzoziemcem osiadłym [metojkiem]. Gdzie jednak stosunki takie są przysłonięte, czyni się to dla łudzenia współmieszkańców."},{"type":"paragraph","text":"[Jeśli się zatem wysunie zagadnienie], czy cnotę, która stanowi o tym, że ktoś jest dobrym człowiekiem, tudzież [cnotę, która rozstrzyga o tym, że ktoś jest]"},{"type":"paragraph","text":"dzielnym obywatelem, należy uważać za coś różnego, czy też za to samo, to z tego, co powiedziano, okazuje się, że w jednym państwie jest to to samo, a w innym coś różnego, i że nawet tam nie każdy obywatel obie te cnoty jednoczy, lecz tylko mąż stanu i ten, co władny jest lub mógłby być władnym, by sprawami publicznymi czy sam, czy też z innymi kierować."},{"type":"paragraph","text":"4. Różne rodzaje ustrojów: właściwe i zwyrodniałe 1. Po stwierdzeniu tego należy z kolei rozważyć, czy trzeba przyjąć jeden ustrój, czy więcej, a jeśli więcej, to jakie i ile, tudzież jakie są między nimi różnice."},{"type":"paragraph","text":"Ustrój państwowy jest to ujęcie w pewien porządek władz w ogóle, a przede wszystkim nadrzędnej nad nimi wszystkimi. Tą władzą nadrzędną jest wszędzie rząd państwa, toteż w rządzie wyraża się ustrój państwowy. Myślę tu o tym, że np. w państwach demokratycznych lud dzierży najwyższą władzę, w oligarchicznych zaś przeciwnie, niewielka liczba osób. Mówimy tedy, że w tych wypadkach ustroje są różne, a według takiej samej właśnie zasady sądzić będziemy i inne ustroje."},{"type":"paragraph","text":"2. [Jako podstawę rozważań] musimy podać przede wszystkim, w jakim celu państwo się tworzy i ile jest rodzajów rządów, które kierują człowiekiem i życiem społecznym. Otóż już w pierwszych wywodach, w których określono gospodarstwo domowe i stanowisko pana, powiedzieliśmy16, że człowiek jest z natury istotą stworzoną do życia w państwie (ζωον πολιτικόν) i dlatego też ludzie, nawet jeżeli nie potrzebują wzajemnej pomocy, dążą do życia w społeczności."},{"type":"paragraph","text":"3. Niemniej przecież także wspólna korzyść łączy ludzi, jako że każdy w ten sposób zyskuje na udoskonaleniu życia. To właśnie jest przede wszystkim celem 15 Iliada IX 648 — słowa Achillesa, który wyrzuca Agamemnonowi, ze go traktuje „jakby jakiego przybłędę bez czci”."},{"type":"paragraph","text":"16 Por. ks. I, rozdz. 1, §9."},{"type":"paragraph","text":"62"},{"type":"paragraph","text":"zarówno dla całej społeczności, jak i dla każdej jednostki z osobna. Skupiają się też ludzie i dla życia samego, i podtrzymują wspólnotę państwową, bo życie samo przez się przedstawia niewątpliwie pewne dobre strony, jeśli w nim nie górują nazbyt przeciwności. Okazuje się przecież, że wielka część ludzi znosi wiele udręczeń ze względu na przywiązanie do życia, które kryje w sobie pewien powab i naturalną słodycz."},{"type":"paragraph","text":"4. Co się tyczy podawanych zwyczajnie rodzajów władzy, to łatwo ich różnicę określić, bo i w pismach popularnych wielokrotnie nad nimi się rozwodzimy."},{"type":"paragraph","text":"Władza pana nad niewolnikiem (δεσποτεία), choć, ściśle biorąc, niewolnik z natury i pan z natury mają ten sam interes, wychodzi przecież na korzyść pana, lub tylko na korzyść niewolnika, [o tyle mianowicie, że] nie jest bowiem do utrzymania władza pana, gdy ginie niewolnik."},{"type":"paragraph","text":"5. Władza nad dziećmi, żoną i domem całym, którą nazywamy domową, ma na względzie albo korzyść tych, którzy jej podlegają, albo jakiś wspólny interes obu stron17; sama w sobie jednak troszczy się o podlegających jej, choć pośrednio korzystają przy tym i ci, którzy ją wykonują, podobnie jak to widzimy i w innych zajęciach, np. w sztuce lekarskiej i gimnastyce. Nic bowiem nie stoi na przeszkodzie temu, by także nauczyciel gimnastyki znalazł się czasem sam między ćwiczącymi, tak jak sternik jest zawsze jednym z członków załogi okrętowej. Otóż nauczyciel gimnastyki czy sternik ma na uwadze dobro podwładnych, a skoro i sam stanie się jednym z nich, to ich korzyść staje się pośrednio i jego udziałem."},{"type":"paragraph","text":"Bo jeden jest żeglarzem, a drugi zostaje jednym z ćwiczących, chociaż jest nauczycielem."},{"type":"paragraph","text":"6. Stąd też, gdy chodzi o urzędy w państwie, to jeśli w nim obowiązuje zasada zupełnej równości [praw] obywateli, wysuwa się żądanie, by się przedstawiciele władzy wymieniali. Pierwotnie z natury rzeczy odgrywało przy tym rolę żądanie, by się wymieniano przy dźwiganiu ciężarów państwowych, by znów ktoś drugi troszczył się o dobro pewnego człowieka, tak jak ten poprzednio w czasie swego urzędowania troszczył się o korzyść innych. Teraz jednak ze względu na korzyści, płynące z zajmowania się sprawami państwowymi i z piastowania urzędu, pragną nieustannie władzę piastować, jak gdyby ta ludziom władzę sprawującym a choro-witym na zawsze zdrowie zapewniała. Bo chyba w takim razie tylko z równym zapałem uganialiby za godnościami."},{"type":"paragraph","text":"7. Okazuje się zatem, że te ustroje, które mają na celu dobro ogólne, są według zasady bezwzględnej sprawiedliwości właściwe, te zaś, które mają na celu jedynie dobro rządzących, są błędne i przedstawiają wszystkie zwyrodnienia właściwych; są bowiem despotyczne, a przecież państwo jest społecznością ludzi wolnych."},{"type":"paragraph","text":"Po tych uwagach nasuwa się z kolei zadanie omówienia poszczególnych ustrojów, ich liczby i jakości, a przede wszystkim tych z nich, które są właściwe, bo po ich określeniu wystąpią jasno i zwyrodnienia."},{"type":"paragraph","text":"17 Tj. pana i członków jego domu."},{"type":"paragraph","text":"63"},{"type":"paragraph","text":"5. Trzy ustroje właściwe (monarchia, arystokracja, politeja) i trzy zwyrodniałe (tyrania, oligarchia, demokracja)."},{"type":"paragraph","text":"Trudność ustalenia ich istoty"},{"type":"paragraph","text":"wynika z różnego ujmowania celu państwa,"},{"type":"paragraph","text":"a celem tym jest życie szczęśliwe"},{"type":"paragraph","text":"1. Ustrój i rząd oznaczają właściwie to samo. Rząd jest czynnikiem władającym w państwach, a jako taki z konieczności znajduje się w rękach albo jednostki, albo niewielkiej czy też i wielkiej liczby ludzi. Otóż kiedy ta jednostka lub też niewielka grupa ludzi, czy w końcu i wielka ich liczba władają ku ogólnemu pożytkowi, to takie ustroje są z konieczności właściwe; jeśli natomiast mają na względzie tylko własną korzyść czy to jednostki, czy niewielkiej grupy, czy masy, to są to zwyrodnienia. Bo albo nie powinno się członków takiego państwa nazywać obywatelami, albo winni oni uczestniczyć w korzyściach [jakie państwo zapewnia]."},{"type":"paragraph","text":"2. Tę postać jedynowładztwa, czyli monarchii, która ma na uwadze dobro ogólne, zwykliśmy nazywać królestwem, panowanie niewielu, a więc więcej niż jednego, zwiemy arystokracją, czy to dlatego, że najlepsi władają, czy też ponieważ rządzą ku najlepszemu pożytkowi państwa i jego członków; kiedy zaś lud rządzi ku ogólnemu pożytkowi, używamy nazwy, którą w szerszym znaczeniu określamy wszystkie ustroje — politeja [rządy obywateli]."},{"type":"paragraph","text":"3. A ma to swe dobre uzasadnienie; jeden człowiek bowiem czy niewielu może się wyróżnić swą cnotą, ale przy większej liczbie trudno już oczekiwać, by odpowiadali ściśle wymaganiom każdej cnoty. Najwięcej jest to jeszcze możliwe, gdy chodzi o męstwo wojenne, bo ono jest cnotą masy, dlatego też przy takim ustroju władza pozostaje głównie w rękach zbrojnych i dostęp mają do niej ci, którzy bronią władają."},{"type":"paragraph","text":"4. Zwyrodnieniami wspomnianych ustrojów są: w stosunku do królestwa tyrania, w stosunku do arystokracji oligarchia, a w stosunku do politei demokracja."},{"type":"paragraph","text":"Tyrania bowiem jest jedynowładztwem dla korzyści panującej jednostki, oligarchia"},{"type":"paragraph","text":"[rządzi] dla korzyści bogaczy, a demokracja dla korzyści ubogich; żadna z nich nie ma jednak na względzie dobra ogółu."},{"type":"paragraph","text":"Trzeba jednak nieco obszerniej omówić istotę każdego z tych ustrojów, bo rzecz nastręcza pewne trudności. Kto zaś chce roztrząsać w sposób naukowy jakiekolwiek zagadnienie, a nie ogląda się tylko na względy praktyczne, tego zadaniem jest, by niczego nie przeoczyć ani też niczego nie pominąć, lecz prawdę w każdym szczególe wykryć."},{"type":"paragraph","text":"5. Otóż tyrania jest, jak powiedziałem, despotycznym jedynowładztwem nad wspólnotą państwową, oligarchia [występuje], gdy władza w państwie znajduje się w rękach posiadających majątki, demokracja przeciwnie, gdy władzę dzierżą nie ci, którzy zdobyli wielkie majątki, lecz ubodzy. Pierwsza trudność dotyczy tego właśnie rozgraniczenia. Bo może być tak, że bogaci, władający w państwie, będą stanowili większość, a w takim razie byłaby to demokracja, bo ta jest wówczas, gdy panem jest masa; podobnie znów może się gdzieś zdarzyć, że ubodzy 64"},{"type":"paragraph","text":"przedstawialiby mniejszość w stosunku do bogatych, a jednak mieliby dość siły, by utrzymać władzę, czyli byłaby to oligarchia, bo o niej mówimy, gdy władzę dzierży nieliczna grupa. Wobec tego mogłoby się wydać, że podstawa rozgraniczenia ustrojów nie została trafnie ujęta."},{"type":"paragraph","text":"6. Jeśliby się jednak chciało połączyć z bogactwem niewielką liczbę, z ubóstwem zaś wielką i określić ustroje w ten sposób, że oligarchia jest tam, gdzie władzę dzierżą bogaci, niewielką przedstawiający liczbę, a demokracja, gdzie władają ubodzy, występujący w wielkiej masie, to nasunęłaby się inna trudność. Bo jakimże mianem określimy wspomniane co dopiero ustroje, w których władają bogaci będący większością, bądź ubodzy znajdujący się w mniejszości, jeśli prócz wymienionych ustrojów nie ma już żadnego innego?"},{"type":"paragraph","text":"7. Wywody powyższe wyraźnie więc zdają się wskazywać, że zarówno przy ustroju oligarchicznym, jak i demokratycznym uboczną jest rzeczą, czy jest niewielu lub wielu tych, którzy władzę dzierżą, ponieważ bogaci są wszędzie w mniejszości; dlatego też nie zdarza się, by ze wspomnianych powodów powstawały nowe odmiany ustrojów. Istotną cechą, co do której różnią się od siebie demokracja i oligarchia, jest ubóstwo i bogactwo, toteż gdzie władzę dzierżą bogaci, tam jest z konieczności oligarchia, bez względu na to, czy są oni w mniejszości, czy w większości, tam zaś, gdzie ubodzy — demokracja. Uboczną natomiast jest rzeczą, jak powiedziałem, że pierwszych jest niewielu, a drugich mnóstwo. Bogactwa posiada bowiem niewielu, ale wolni są wszyscy; i to są powody, że jedni i drudzy spierają się o władzę w państwie."},{"type":"paragraph","text":"8. Aby ten spór rozstrzygnąć, trzeba się najpierw zastanowić, jak oni określają oligarchię i demokrację, i co jest sprawiedliwe w oligarchii a co w demokracji."},{"type":"paragraph","text":"Wszyscy bowiem jakoś dotykają tego, co sprawiedliwe, ale dochodzą tylko do pewnego punktu i nie ujmują w pełni zagadnienia, co to jest sprawiedliwość. Tak np. równość uchodzi za rzecz sprawiedliwą i jest nią istotnie, ale nie dla wszystkich, tylko dla równych; także nierówność uchodzi za sprawiedliwą, bo też jest nią rzeczywiście, lecz znów nie dla wszystkich, tylko dla nierównych."},{"type":"paragraph","text":"Pomijają przy tym wzgląd na to, dla kogo coś ma być sprawiedliwe, toteż sądzą fałszywie. Przyczyna leży w tym, że sąd dotyczy ich samych, a niemal wszyscy ludzie w swojej własnej sprawie są złymi sędziami."},{"type":"paragraph","text":"9. Skoro tedy sprawiedliwość jest tylko dla pewnych osób, a ta sama różnica, co w stosunku do osób, istnieje też i, w stosunku do rzeczy, jak to poprzednio wykazałem w Etyce 18, więc obie strony zgadzają się wprawdzie co do równości rzeczy, ale spierają się co do tego, na czym równość osób polega, przede wszystkim z podanego co dopiero powodu, ponieważ fałszywie sądzą w swej własnej sprawie, a następnie i dlatego, ponieważ jedni i drudzy mając pewną słuszność myślą, że w ogóle mają słuszność. Jedni bowiem mniemają, że jeśli są ludzie nierówni pod pewnym względem, np. co do majątku, to są oni w ogóle 18 Et. nik., ks. V, rozdz. 6 (1131 a)."},{"type":"paragraph","text":"65"},{"type":"paragraph","text":"nierówni, a drudzy ponieważ uważają, że jeśli są ludzie równi innym pod pewnym względem, np. co do wolnego urodzenia, to są im w ogóle równi."},{"type":"paragraph","text":"10. Jedni i drudzy jednak nie uwzględniają rzeczy najistotniejszej. Gdyby ludzie skupiali się we wspólnotę i łączyli dla majątku, to mieliby udział w państwie odpowiedni do swego majątku, a w takim razie zdanie zwolenników oligarchii mogłoby się wydać uzasadnione. Bo nie byłoby rzeczą słuszną [ — powiadają — ], żeby przy stu minach, ten, który wniósł jedną minę, miał udział czy w kapitale, czy w płynących od niego odsetkach na równi z tym, który dał całą pozostałą resztę. A cóż powiemy, jeśli się połączyli nie tylko dlatego, by życie utrzymać, ale raczej, aby je dobrze urządzić? Inaczej bowiem mogłoby też istnieć państwo niewolników i innych istot żyjących, co jest przecież teraz niemożliwe, ponieważ nie jest dla nich dostępne ani szczęście prawdziwe, ani też życie według własnych zamierzeń. Nie wchodzi też w rachubę przy tworzeniu społeczności wzgląd na zawierane przymierza, aby się uchronić przed krzywdą z czyjejś strony, ani też wzgląd na stosunki handlowe i wzajemną wymianę korzyści, bo w takim razie i Etruskowie, i Kartagińczycy, i wszyscy, których łączą wzajemne układy handlowe, byliby niejako obywatelami jednego państwa."},{"type":"paragraph","text":"11. Istnieją wprawdzie między nimi umowy co do przywozu towarów, układy dla uchronienia się przed wzajemnymi szkodami, traktaty na piśmie co do przymierza, ale ani nie ma dlatego wspólnych dla wszystkich władz — przeciwnie, obie układające się strony mają władze odrębne — ani też jedna strona nie troszczy się o to, jaką powinna by być strona druga, czy też o to, aby ktoś z tych, których układ wiąże, nie był niesprawiedliwy lub nie popadł w jakąś przewrotność, a tylko chodzi im o to, by sobie nawzajem nie czynić krzywdy. Toteż i ci, którzy obmyślają doskonałe prawodawstwo, mają na względzie cnotliwość czy przewrotność obywateli. Widoczne więc z tego, że państwo, które naprawdę zasługuje na tę nazwę, a nie jest nim tylko z imienia, musi się troszczyć o cnotę. Inaczej bowiem wspólnota państwowa staje się układem sprzymierzeńców, który od innych układów, zawieranych z odległymi sprzymierzeńcami, różni się jedynie co do miejsca, a prawo staje się umową oraz — jak się wyraził sofista — Lykofron19"},{"type":"paragraph","text":"rękojmią wzajemnej sprawiedliwości, bez możności natomiast urabiania dobrych i sprawiedliwych obywateli."},{"type":"paragraph","text":"12. Że tak jest istotnie, to rzecz oczywista. Gdyby bowiem ktoś skupił oddalone miejscowości, tak że miasta Megarejczyków i Koryntyjczyków stykałyby się murami, to i tak nie byłoby to jedno państwo, nawet wówczas, jeśliby zawarli układ o wzajemnym uznawaniu małżeństw swych obywateli, mimo że jest to jedna ze znamiennych cech łączności państwowej. Podobnie jeśliby pewni ludzie mieszkali oddzieleni od siebie — co prawda nie tak daleko, żeby nie mogli porozumiewać się ze sobą — a zobowiązali się prawami, że się wzajemnie krzywdzić nie będą przy wymianie towarów, a więc np. jeśliby jeden był cieślą, drugi rolnikiem, trzeci szewcem, inny wreszcie czymś podobnym, to choćby ich 19 Prawdopodobnie uczeń sofisty Gorgiasza z Leontinoj."},{"type":"paragraph","text":"66"},{"type":"paragraph","text":"było i dziesięć tysięcy, a nie byliby zespoleni ze sobą żadnym innym węzłem jak tylko wspomnianymi, a więc wymianą towarów i przymierzem zaczepno-odpornym, to i tak nie byliby jeszcze państwem."},{"type":"paragraph","text":"13. A dlaczego nie? Z pewnością nie dlatego, że nie dość blisko mieszkają, by tworzyć wspólnotę. Bo gdyby nawet przy tych tylko czynnikach łączności skupili się na pewnym miejscu (przy czym każdy uważałby swój własny dom niejako za osobne państwo) i łączył ich układ co do wzajemnej pomocy tylko przeciw tym, którzy by im krzywdę czynili, to i tak, ściśle rzeczy biorąc, nie mogłoby to uchodzić za państwo, skoro po skupieniu na jednym miejscu wzajemne ich stosunki byłyby podobne jak wówczas, gdy byli rozdzieleni."},{"type":"paragraph","text":"Okazuje się więc z tego, że państwo nie jest zespoleniem ludzi na pewnym miejscu dla zabezpieczenia się przed wzajemnymi krzywdami i dla ułatwienia wymiany towarów. Wszystko to co prawda być musi, jeśli państwo ma istnieć, jednakowoż jeśli nawet to wszystko jest, to i tak nie jest to jeszcze państwo, bo jest ono wspólnotą szczęśliwego życia, obejmującą rodziny i rody, dla celów doskonałego i samowystarczalnego bytowania."},{"type":"paragraph","text":"14. Nie da się tego oczywiście osiągnąć, jeśli ludzie nie mieszkają na jednym i tym samym miejscu i nie zawiązują małżeństw. Stąd właśnie powstały w państwach i powinowactwa, i bractwa [fratrie], i związki ofiarnicze, i zrzeszenia towarzyskie. Są one tworem przyjaźni, bo przyjaźń jest wówczas, gdy się zamierza współżyć ze sobą."},{"type":"paragraph","text":"Celem państwa jest zatem szczęśliwe życie, a reszta to środki do tego celu wiodące. Państwo zaś jest wspólnotą rodów i miejscowości dla doskonałego i samowystarczalnego bytowania. To znów polega, jak powiedziałem, na życiu szczęśliwym i pięknym. Trzeba tedy przyjąć, że wspólnota państwowa ma na celu nie współżycie, lecz piękne uczynki."},{"type":"paragraph","text":"15. Dlatego ci, którzy najwięcej się przyczyniają do takiej wspólnoty, mają większy udział w państwie aniżeli tacy, którzy są im równi co do wolnego i szlachetnego pochodzenia albo i górują nad nimi, ale nie dorównują im co do cnoty obywatelskiej, czy też tacy, którzy górują bogactwem, ale ustępują im co do cnoty."},{"type":"paragraph","text":"Okazuje się więc z tego, cośmy powiedzieli, że wszyscy, którzy tak rozbieżne zdania wypowiadają o ustrojach, tylko w pewnej części mają słuszność."},{"type":"paragraph","text":"6. Kto w państwie winien być decydującym czynnikiem?"},{"type":"paragraph","text":"(ogół? bogaci? cnotliwi? jednostka najlepsza? tyran?)."},{"type":"paragraph","text":"Najlepiej prawa właściwie ujęte"},{"type":"paragraph","text":"1. Trudno również odpowiedzieć na pytanie, kto w państwie winien być decydującym czynnikiem, czy ogół, czy bogaci, czy cnotliwi, czy jednostka najlepsza ze wszystkich, czy tyran. Wszystkie te możliwości zdają się jednak posiadać pewne słabe strony. Bo jakżeż? Jeśli ubodzy, dlatego że są w większości, 67"},{"type":"paragraph","text":"podzielą się majątkiem bogatych, to czyż nie jest to niesprawiedliwość? Ależ na Zeusa, powie ktoś, tak postanowił w sposób prawny czynnik decydujący. A cóż w takim razie nazwać najwyższą niesprawiedliwością? Przecież, jeśli po roz-grabieniu wszystkiego większość znów zechce dzielić się własnością mniejszości, to jasną jest rzeczą, że zniszczą państwo. Ależ chyba cnota nie gubi tego, który ją posiada, ani też sprawiedliwość nie jest czynnikiem rujnującym państwo. Okazuje się zatem, że i to prawo nie może być sprawiedliwe."},{"type":"paragraph","text":"2. Podobnie także i czyny, jakich by się tyran dopuścił, musiałyby być wszystkie sprawiedliwe, bo gwałty, jakie popełnia, są wynikiem takiej samej przewagi władzy, co przemoc pospólstwa w stosunku do bogatych."},{"type":"paragraph","text":"Czy atoli sprawiedliwą byłoby rzeczą, by władała mniejszość i bogaci?"},{"type":"paragraph","text":"A jeśliby oni to samo czynili, uprawiali grabież i wydzierali majątki ludowi, to czyż byłoby to sprawiedliwe? [Jeśli tak, to trzeba by to powiedzieć] i o pierwszym wypadku. Wynika więc z tego w sposób oczywisty, że wszystko to jest złe i niesprawiedliwe."},{"type":"paragraph","text":"3. Ale może cnotliwi powinni rządzić i być panami nad wszystkim? W takim razie wszyscy inni musieliby być ludźmi bez czci, jako uznani za niegodnych zaszczytów państwowych. Bo urzędy są, zdaniem moim, zaszczytami, a jeśliby je ci sami zawsze piastować mieli, to inni byliby z konieczności od czci odsądzeni."},{"type":"paragraph","text":"A może lepiej, by władał jeden szczególnie dzielny człowiek? Byłoby to jednak jeszcze bardziej w duchu oligarchicznym, bo odsądzonych od czci byłoby jeszcze więcej."},{"type":"paragraph","text":"Ale powie ktoś może, że to jest w ogólne niewłaściwe, by władało nie prawo, lecz człowiek, który podlega namiętnościom wstrząsającym duszą. Lecz jeśli będzie to prawo oligarchiczne lub demokratyczne, to cóż za różnica wobec podniesionych trudności? Wspomniane przedtem niesprawiedliwości zarówno przecież wystąpią."},{"type":"paragraph","text":"4. O innych szczegółach gdzie indziej jeszcze będzie mowa20. [Pogląd jednak], że raczej masa ludu powinna dzierżyć zwierzchnią władzę aniżeli najlepsi, w niewielkiej wszelako liczbie występujący, rozwiązuje, jak się zdaje, trudności, pozwala się bronić w pewnej mierze i zapewne mieści w sobie prawdę."},{"type":"paragraph","text":"Wielu mianowicie ludzi zjednoczonych, z których każdy z osobna niczym szczególnym się nie wyróżnia, może mimo to być lepszymi od tamtych, nie jako jednostki, ale jako ogół, tak jak lepsza może być uczta składkowa niż wydana kosztem jednego; bo gdzie jest wielka liczba, tam każdy może posiadać pewną cząstkę cnoty i rozumu, a jeśli się razem złączą, to masa występuje jakby jeden człowiek o wielu nogach i rękach, ale i wielu zmysłach, a tym samym i o wzmożonych możliwościach w zakresie obyczajów i rozumu. Dlatego też masa lepiej sądzi dzieła muzyczne i poetyckie, a mianowicie jeden ocenia trafnie ten szczegół, drugi inny, a wszyscy razem — całość."},{"type":"paragraph","text":"5. Ludzie dzielni odróżniają się jednak od poszczególnych jednostek z tłumu tym samym, co i — jak powiadają — piękni od niepięknych, a twory sztuki 20 Por. niżej, rozdz. 7, § 10 n."},{"type":"paragraph","text":"68"},{"type":"paragraph","text":"malarskiej od rzeczywistości, a mianowicie, że cechy, rozproszone tam na oddzielne osoby, są u nich złączone w jedno; w poszczególnych wypadkach może bowiem jeden mieć piękniejsze oko, drugi jakąś inną część, aniżeli ten, którego na obrazie odtworzono. Czy jednak ta różnica pomiędzy wielką liczbą a niewielu dzielnymi może występować u każdego ludu i w każdym tłumie, niepewną jest rzeczą, a może, na Zeusa, pewne jest, że u niektórych jest to niemożliwe. Ta sama mianowicie zasada miałaby chyba zastosowanie i do zwierząt, bo po prawdzie czymże się niektórzy różnią od zwierząt? W stosunku do pewnego tłumu nic jednak nie przeszkadza uznać to zdanie za prawdziwe."},{"type":"paragraph","text":"6. W ten sposób daje się rozwiązać i poprzednio omówioną trudność, i drugą z nią się łączącą, a mianowicie, nad kim ma posiadać władzę masa wolnych obywateli, a więc ci, co ani nie są bogaci, ani też nie odznaczają się jakakolwiek cnotą. Dać im dostęp do najwyższych urzędów nie jest rzeczą bezpieczną (gdyż wskutek braku poczucia sprawiedliwości i braku umiaru, w pewnych wypadkach czyniliby krzywdy, w innych popełnialiby błędy). Nie dać zaś im dostępu i wyłączyć ich, budzi obawy; bo skoro znajdzie się ich wielu pozbawionych dostępu do godności i bez mienia, to państwo z konieczności pełne będzie nieprzyjaciół. Nie pozostaje więc nic innego, jak przyznać im udział w radzie i w sądach."},{"type":"paragraph","text":"7. Dlatego i Solon, i niektórzy inni prawodawcy powierzają im wybory urzędników i przyjmowanie ich sprawozdań, ale nie pozwalają piastować urzędów jednoosobowych. Wszyscy łącznie posiadają bowiem dostateczną zdolność roze-znania i zmieszani z lepszymi korzyść państwu przynoszą (podobnie jak niezbyt pożywna potrawa z połączeniu z pożywną daje większy pożytek niż niewielka ilość pożywnej), natomiast każdy z osobna niezdolny jest do wyrokowania."},{"type":"paragraph","text":"8. Takie ukształtowanie ustroju nastręcza przede wszystkim tę trudność."},{"type":"paragraph","text":"Odpowiedź na pytanie, kto właściwie leczył, zdaje się należeć do tego samego, który i leczył, i przywrócił do zdrowia złożonego daną chorobą, a tym jest lekarz."},{"type":"paragraph","text":"Podobnie jest też z innymi umiejętnościami i sztukami. Jak tedy lekarz winien składać sprawozdanie przed lekarzami, tak i inni przed podobnymi sobie. Ale lekarzem jest i ten, który w ograniczonym zakresie praktykuje21, i ten, co całość nauki ogarnia22, jak i ten, po trzecie, który jest tylko obznajomiony z tą sztuką."},{"type":"paragraph","text":"Bo pewni ludzie tego rodzaju trafiają się we wszystkich, żeby tak rzec, w ogóle sztukach i znawcom takim przyznajemy prawo wydawania sądu na równi z fachowcami."},{"type":"paragraph","text":"9. Wobec tego można by sądzić, że tak samo jest i z wyborem. Właściwy wybór jest bowiem rzeczą znawców, a więc wybór geometry rzeczą zajmujących się tą umiejętnością, a wybór sternika rzeczą znających się na sterowaniu. Bo jeśli nawet niektórzy z niefachowców wyznają się w pewnych pracach i sztukach, to 21 Chodzi o specjalizację w leczeniu, która według świadectwa Platona (Laches 8) była w Grecji daleko posunięta."},{"type":"paragraph","text":"22 Arystoteles nazywa tu takiego „architektonikiem”, ponieważ ogarnia całość, tak jak architekt."},{"type":"paragraph","text":"69"},{"type":"paragraph","text":"przecież nie lepiej od ludzi znających się na rzeczy. Toteż, idąc za tym rozumowaniem, nie należałoby powierzać ludowi nieograniczonej władzy ani co do wyboru urzędników, ani co do ich kontroli."},{"type":"paragraph","text":"10. Może jednak nie wszystkie te zastrzeżenia są słuszne, najpierw z podanego poprzednio powodu, przyjąwszy, że nie ma się do czynienia ze zbyt służalczą masą"},{"type":"paragraph","text":"— bo poszczególny człowiek nie będzie wprawdzie gorszym sędzią od znawców, ale wszyscy razem zebrani albo będą lepsi, albo przecież nie gorsi — następnie też i dlatego, że w niektórych rzeczach wykonawca nie jest ani jedynym, ani najlepszym sędzią, jak w tych wypadkach, gdzie na wykonanej pracy wyznają się i niefachowcy. A więc np. ocena domu nie należy jedynie do tego, który go budował, lecz lepiej nawet osądzi go ten, który z niego korzysta (a tym jest pan domu); podobnie ster lepiej oceni sternik niż cieśla okrętowy, ucztę zaś biesiadnik, a nie kucharz. W ten sposób zatem trudność ta dałaby się może wystarczająco rozwiązać; łączy się z nią jednak jeszcze inna."},{"type":"paragraph","text":"11. Niedorzeczną bowiem wydaje się rzeczą, żeby marni ludzi mieli moc rozstrzygania w sprawach ważniejszych aniżeli ludzie znamienici, a przecież wybory urzędników i ich kontrola są rzeczą największej wagi. W niektórych ustrojach powierza się to — jak powiedziano23 — ludowi, bo zgromadzenie ludowe decyduje we wszystkich takich sprawach. Tymczasem udział w zgromadzeniach ludowych biorą, ludzie o niewielkim cenzusie majątkowym i jakiegokol-wiek wieku, to oni też są członkami rady i trybunałów, a natomiast stanowiska skarbników, wodzów, jak i najwyższe godności sprawują ludzie o cenzusie wysokim."},{"type":"paragraph","text":"12. Otóż trudność tę można zapewne wyjaśnić w podobny sposób co i poprzednią, bo może ten stan rzeczy jest słuszny. Nie sędzia mianowicie, ani nie członek rady czy zgromadzenia ludowego jest władzą, ale sąd, rada i lud, każdy zaś z wymienionych jest pewną częścią tychże, a więc: jest taką częścią i zasiadający w radzie, i uczestnik zgromadzenia ludowego, i członek trybunału sądowego."},{"type":"paragraph","text":"Słusznie zatem masa rozstrzyga o większych sprawach, skoro i lud, i rada, i sąd z wielu członków się składa. Także i cenzus ich wszystkich jest w sumie większy niż cenzus tych, którzy pojedynczo lub w niewielu piastują wysokie godności."},{"type":"paragraph","text":"13. W ten sposób zatem i ta trudność byłaby rozwiązana. Z omówionej poprzednio24 wątpliwości wynika jasno przede wszystkim to, że powinny rządzić prawa, i to prawa właściwie ujęte, władca zaś, czy to będzie jeden, czy więcej ludzi, winien rozstrzygać w tych sprawach, których prawa określić nie zdołają dokładnie ze względu na to, że niełatwą jest rzeczą, w ogólnym ujęciu wyczerpać wszystkie poszczególne wypadki. Jakie to winny być te „właściwie ujęte prawa”, bynajmniej nie jest jasne, przeciwnie, pozostaje jeszcze ciągle wskazana wcześ-"},{"type":"paragraph","text":"niej25 trudność. Równocześnie bowiem z ustrojami i podobnie jak one, także i prawa są z konieczności złe i dobre, sprawiedliwe lub niesprawiedliwe. Tyle 23 Por. wyżej, rozdz. 6 - 7 tej księgi,"},{"type":"paragraph","text":"24 Por. tamże, § 1 - 3."},{"type":"paragraph","text":"25 Tamże, § 3."},{"type":"paragraph","text":"70"},{"type":"paragraph","text":"tylko jest jasne, że prawa winny być dostosowane do ustroju. Jeśli zaś tak, to oczywistą jest rzeczą, że prawa dostosowane do właściwego ustroju będą z konieczności sprawiedliwe, a przystosowane do zwyrodniałego ustroju niesprawiedliwe."},{"type":"paragraph","text":"7. Podstawą wymiaru praw politycznych"},{"type":"paragraph","text":"powinno by być w pewnej mierze wolne urodzenie, przynależność do znakomitego rodu, majątek i cnota 1. We wszystkich umiejętnościach i sztukach celem jest dobro. Tak jest przede wszystkim i w najwyższym stopniu w najważniejszej ze wszystkich, jaką jest umiejętność sprawowania władzy w państwie. Dobrem w państwie jest sprawiedliwość, sprawiedliwością zaś jest to, co dla ogółu pożyteczne. Według powszechnego mniemania, sprawiedliwość wydaje się pewnego rodzaju równością, co do pewnego stopnia zgadza się z zasadami filozoficznymi rozwiniętymi w księgach o etyce26."},{"type":"paragraph","text":"Powiada się bowiem, że sprawiedliwość obejmuje przydział pewnych rzeczy pewnym osobom i że równi winni by mieć równy udział. Nie wolno jednak ukrywać, na czym polega równość osób, a na czym nierówność, bo w tym leży trudność i powód do rozważań polityczno-filozoficznych."},{"type":"paragraph","text":"2. Bo może ktoś powie, że urzędy powinny być rozdzielane nierówno według tego, jak kto góruje pewną zaletą, jeśliby pod każdym innym względem nie było żadnej różnicy, lecz przypadkiem panowała równość; dla tych bowiem, którzy się różnią [zaletami], jest też różna miara sprawiedliwości i słuszności. Jeśli to jednak jest prawdą, to i tym, którzy górują czy barwą skóry, czy wysokością, czy jakąkolwiek inną zaletą, trzeba będzie przyznać pewien większy wymiar praw politycznych. Czy nie jest to jednak fałsz oczywisty? Okazuje się to na przykładzie innych umiejętności i kunsztów. Jeśli są mianowicie równie dobrze wyszkoleni fletniści, to nie powinno się dawać najlepszych fletów tym, którzy są szlachetniejszego rodu, bo ci bynajmniej nie będą grać lepiej, lecz lepszy instrument winno się przyznać przede wszystkim temu, który nad innymi sprawnością góruje."},{"type":"paragraph","text":"3. Jeśli zaś zdanie moje nie jest jeszcze dość jasne, to dalsze wywody uczynią je bardziej zrozumiałym. Bo jeśli będzie ktoś górujący nad innymi w grze na flecie, a ustępujący im znacznie co do szlachetności pochodzenia i urody, to przecież takiemu należałoby przyznać najlepsze flety, chociaż każda z owych zalet — mówię o szlachetności pochodzenia i urodzie — cenniejsza jest niż sprawność w grze na flecie i górują one nad kunsztem fletnisty w wyższym stopniu niźli mistrz ów nad innymi fletnistami. Przewaga bogactwa i szlachetności rodu powinna by bowiem przyczyniać się do podniesienia kunsztu, a tymczasem żadnego nie ma na to wpływu."},{"type":"paragraph","text":"26 Et. nik. 1131 a."},{"type":"paragraph","text":"71"},{"type":"paragraph","text":"4. Ponadto, według tego zdania, każda zaleta nadawałaby się do porównania z każdą inną. Bo jeśliby wysokość [wzrostu] dawała w pewnym względzie przewagę i nadawała się do zestawienia z bogactwem czy wolnym urodzeniem, to musiałaby się mierzyć z obu tymi dobrami. W ten sposób, jeśliby jeden bardziej górował wzrostem aniżeli drugi cnotą, to choć cnota w ogóle o wiele przewyższa wzrost, wszystkie te cechy byłyby porównywalne. Jeśli bowiem taka a taka ilość pewnej rzeczy jest więcej warta niż określona ilość drugiej, to jasną jest rzeczą, że jest i taka ilość [pierwszej], która jest warta tyleż co ta druga."},{"type":"paragraph","text":"5. Skoro jednak takie zestawienia są niemożliwe, to oczywiście i w życiu politycznym zupełnie słusznie nie każda nierówność posiada znaczenie przy ubieganiu się o godności. Jeśli mianowicie jedni są powolni, a drudzy szybcy, to z tego tytułu nie mogą przecież jedni mieć większych praw, drudzy mniejszych; natomiast różnica w tym względzie posiada swe znaczenie przy zawodach gimnastycznych. Trzeba zatem wziąć pod uwagę współzawodnictwo tych czynników, które się składają na państwo. Dlatego słusznie współzawodniczą o godności ludzie i szlachetnego rodu, i wolni, i bogaci. Muszą bowiem być w państwie i ludzie wolni, i płacący podatki, gdyż państwo nie może się składać z samych tylko biedaków, jak i z samych tylko niewolników."},{"type":"paragraph","text":"6. A jeśli są oni potrzebni, to oczywiście jest również potrzebna i sprawiedliwość, i cnota wojenna, bo bez tego nie można państwem rządzić. [W tym] tylko"},{"type":"paragraph","text":"[jest różnica], że bez pierwszych państwo w ogóle istnieć nie może, a bez tych ostatnich nie można nim dobrze kierować."},{"type":"paragraph","text":"Kiedy więc chodzi o istnienie państwa, to wszystkie te czynniki lub niektóre z nich mogą słusznie, jak się zdaje, współzawodniczyć ze sobą o pierwszeństwo, na to jednak, by życie się kształtowało w sposób doskonały, najzupełniej słusznie pierwszeństwo we współzawodnictwie posiadać będzie wykształcenie i cnota, jak to już poprzednio powiedziałem2?."},{"type":"paragraph","text":"7. Ponieważ zaś ci, którzy są równi innym pod jednym tylko względem, bynajmniej nie muszą mieć wszystkich praw równych z nimi, ani też ci, którzy w jednym punkcie są nierówni, nie muszą dlatego mieć praw nierównych, więc wszystkie takie ustroje [, gdzie to się dzieje] są oczywiście zwyrodnieniami."},{"type":"paragraph","text":"Zauważyłem już poprzednio, że wszyscy poniekąd słusznie podnoszą roszczenia"},{"type":"paragraph","text":"[do godności], bezwzględnie jednak rzecz biorąc, nie wszyscy słusznie to czynią."},{"type":"paragraph","text":"Bogaci mogą się na to powołać, że posiadają przeważną część ziemi, a ziemia jest dobrem wspólnym, a nadto są po największej części rzetelniejsi przy wypełnianiu zobowiązań. Wolni znów i szlachetnie urodzeni spierają się ze sobą, jako że są sobie bliscy. Pochodzący ze szlachetniejszego rodu są bowiem w wyższym stopniu obywatelami [niż ludzie z gminu], a i szlachectwo cieszy się zawsze poszanowaniem u siebie. Naturalną poza tym jest rzeczą, że z lepszych rodziców lepsi pochodzą"},{"type":"paragraph","text":"[synowie], bo przecież szlachectwo jest cnotą dziedziczną w rodzie."},{"type":"paragraph","text":"27 Por. wyżej, rozdz. 5, § 14."},{"type":"paragraph","text":"72"},{"type":"paragraph","text":"8. Podobnie przyznamy, że i cnota słusznie rości sobie prawa do pierwszeństwa, bo, zdaniem naszym, sprawiedliwość jest podstawową cnotą życia społecznego, za którą muszą iść wszystkie inne. Z drugiej strony, również większość może podnieść roszczenia wobec mniejszości, bo ci, którzy się na nią składają, razem wzięci są, w porównaniu z mniejszością, i silniejsi, i bogatsi, i lepsi. Jeśliby tedy wszyscy znaleźli się w jednym państwie (a mówię o ludziach wysokiej wartości moralnej, o bogatych i o ludziach szlachetnego rodu), a poza tym jeszcze i masa innych obywateli, to czy wyłoni się spór, kto winien panować, czy też będzie to bezsporne?"},{"type":"paragraph","text":"9. Co do każdego ze wspomnianych ustrojów, rozstrzygnięcie pytania, kto powinien panować, żadnej nie może podlegać wątpliwości. Różnią się one bowiem od siebie formą rządu, który w jednym wypadku spoczywa w rękach bogatych, w drugim w rękach [osobiście] dzielnych ludzi, i tak samo w każdym innym wypadku. Niemniej przecież nie uwalnia nas to od rozważenia, jak powinno wypaść rozstrzygnięcie w takim razie, gdy wszystkie te czynniki równocześnie w państwie występują."},{"type":"paragraph","text":"10. Jeśli ludzi wykazujących cnotę będzie niewielu, to jak winno się rzecz wówczas rozstrzygnąć? Czy słowo „niewielu” ma się brać w stosunku do ich zadania, a więc czy zdołają rządzić państwem, czy też liczba ich powinna być taka, żeby sami mogli stworzyć państwo. Wyłania się tu jednak pewna trudność w odniesieniu do wszystkich, którzy współzawodniczą ze sobą o godności państwowe. Nic słusznego nie będą tu mieli — jak się zdaje — do powiedzenia ci, którzy podnoszą roszczenia o władzę z tytułu bogactwa, podobnie zresztą jak i z tytułu szlachetnego rodu. Jasną bowiem jest rzeczą, że jeśliby znów znalazł się jeden bogatszy od wszystkich innych, to — w myśl tej samej słusznej zasady"},{"type":"paragraph","text":"— ten jeden powinien by nad wszystkimi panować, a podobnie wyróżniający się szlachetnością rodu winien by panować nad współzawodnikami, powołującymi się na wolne urodzenie."},{"type":"paragraph","text":"11. To samo okaże się chyba, gdy chodzi o cnotę, również i w odniesieniu do arystokracji; jeśli bowiem pomiędzy dzielnymi mężami dzierżącymi rządy w ręku znajdzie się jeden mąż lepszy od innych, to według tej samej słusznej zasady on powinien by być panem. Podobnie, jeśli [uznać, że] masa winna być panem, ponieważ przedstawia siłę większą niż niewielu [, okaże się], że czy to jednostka, czy też pewna grupa ludzi, nie stanowiąca jednak większości, jest silniejsza od innych, to oni raczej powinni by władać niż masa."},{"type":"paragraph","text":"12. Wszystko to zdaje się dowodzić, że żadna z tych zasad, na które powołują się dążący do ugruntowania panowania własnego i podporządkowania sobie wszystkich innych, nie jest słuszna. Bo nawet przeciw tym, którzy uważają, że władać powinni w państwie ze względu na cnotę, podobnie jak i przeciw tym, którzy się tegoż domagają ze względu na bogactwo, mogłaby masa podnieść usprawiedliwiony sprzeciw; jest to bowiem zupełnie możliwe, by [w pewnych okolicznościach] tłum był i lepszy od niewielu, i bogatszy, oczywiście nie każdy z osobna, ale jako zbiorowość."},{"type":"paragraph","text":"73"},{"type":"paragraph","text":"13. Dlatego można w ten sposób odpowiedzieć i na pytanie, jakie wysuwają niektórzy, doszukując się tu trudności. Niektórzy mianowicie mają wątpliwości, jak ma postępować prawodawca, który pragnie ustanowić najwłaściwsze prawa; czy ma mieć przy tym na uwadze korzyść lepszych, czy też większości, jeśli zajdzie wspomniany poprzednio wypadek. Wyrażenie „właściwy” należy tu ująć w znaczeniu „równomiernie właściwy”. Równomiernie właściwe jest to, co jest korzystne dla całego państwa i ogółu obywateli. Obywatelem zaś jest na ogół ten, kto bierze udział w rządach, ale zarazem i słucha; istotę jego każdy ustrój odmiennie określa, według najlepszego ustroju jednak obywatelem jest ten, co zdoła i pragnie słuchać i rządzić dla urzeczywistnienia życia cnotliwego."},{"type":"paragraph","text":"8. Górujący bezwzględnie cnotą"},{"type":"paragraph","text":"winni zajmować przemożne stanowisko w państwie; nie uznające tej zasady demokracje"},{"type":"paragraph","text":"usuwają takie jednostki w drodze ostracyzmu"},{"type":"paragraph","text":"1. Jeśli jest jednak jeden jakiś człowiek czy też i więcej niż jeden, w takiej wszakże liczbie, że państwa by wypełnić nie zdołali, a tak dalece wyróżniają się cnotą, że cnota wszystkich innych i ich uzdolnienie polityczne nie dają się nawet porównać z zaletami owych, jeśli ich jest więcej, czy też owego tylko, jeśli to jest jeden, to ludzi takich nie należy za część państwa uważać. Bo skoro tak bardzo są nierówni i co do cnoty, i politycznego uzdolnienia, to będą skrzywdzeni, jeśli im się przyzna prawa na równi z innymi. [Naturalną] bowiem [jest rzeczą, że]"},{"type":"paragraph","text":"człowiek taki jest jakby bogiem pośród ludzi28."},{"type":"paragraph","text":"2. Okazuje się stąd, że i przy nadawaniu praw trzeba by mieć na względzie ludzi równych pochodzeniem i uzdolnieniem, natomiast dla ludzi owego pokroju nie ma prawa, bo oni sami dla siebie są prawem. I śmieszny byłby, kto by prawa dla nich stanowić próbował. Bo może by mu powiedzieli, co według Antystenesa29"},{"type":"paragraph","text":"powiedziały lwy, gdy na zgromadzeniu zwierząt zające domagały się równych praw dla wszystkich. Toteż państwa o ustroju demokratycznym zaprowadziły urządzenie sądu skorupkowego [ostracyzm] właśnie z tego powodu; przestrzegają one bowiem zasady równości najwięcej ze wszystkich, tak dalece, że tych, co się wydają górować potęgą dzięki bogactwu lub popularności, czy też dzięki jakiemuś innemu czynnikowi stanowiącemu o sile politycznej, poddawali pod sąd skorupkowy i usuwali z państwa na pewien czas."},{"type":"paragraph","text":"28 Jest to ideologia, którą wcielił w życie uczeń Arystotelesa, Aleksander Wielki, kiedy od państw greckich zażądał uznania za boga; por. L. Piotrowicz, Kult panującego w starożytności, Poznań 1922, s. 15 n."},{"type":"paragraph","text":"29 Uczeń Sokratesa, założyciel szkoły cyników. Jaką odpowiedź przypisał Antystenes lwom, nie wiadomo; w bajce Ezopa lwy odpowiedziały, że żądanie byłoby na miejscu, gdyby mogło być poparte przez takie pazury i kły, jakie posiadają lwy."},{"type":"paragraph","text":"74"},{"type":"paragraph","text":"3. Według podania także i Argonauci z takiego właśnie powodu pozostawili po drodze Heraklesa30; statek ich Argo nie chciał go zabrać wraz z innymi, ponieważ znacznie przewyższał [ciężarem] towarzyszy żeglugi. Dlatego też należy przyjąć, że wręcz niesłusznie postępują ci, którzy ganią tyranię i radę, jakiej Periander udzielił Trazybulosowi31. Opowiadają mianowicie, że Periander wcale się nie odezwał do posłańca skierowanego doń po radę, a tylko do równa ścinał na polu wystające kłosy; stąd, choć posłaniec nie zdawał sobie sprawy z przyczyny tego zachowania, a tylko doniósł, co zaszło, Trazybulos zrozumiał, że trzeba usunąć wybitnych mężów."},{"type":"paragraph","text":"4. Bo jest to korzystne nie tylko dla tyranii i nie tylko tyrani to robią, ale podobnie ma się rzecz również w oligarchiach i demokracjach; ostracyzm bowiem ma tu wszędzie to samo do pewnego stopnia znaczenie przez to, że łamie przemożne stanowisko ludzi wybitnych i usuwa ich na wygnanie. To samo zresztą robią ci, co siłą rozporządzają, nawet w stosunku do państw i ludów; tak np. postąpili Ateńczycy z Samijczykami, Chiijczykami i Lesbijczykami (bo skoro tylko umocnili [swe]"},{"type":"paragraph","text":"panowanie, przymusili ich do uległości wbrew zawartym układom)32. Tak samo król Persów poskromił wielokrotnie Medów, Babilończyków i inne ludy, które hardo podnosiły głowę, wspominając czasy minionej świetności swego panowania."},{"type":"paragraph","text":"5. Jest to zagadnienie dotyczące wszystkich form ustroju, nawet i właściwych."},{"type":"paragraph","text":"Zwyrodniałe stosują takie środki, mając na uwadze korzyść wyłącznie warstwy panującej, niemniej jednak i tam, gdzie się ma na względzie dobro ogółu, postępuje się w ten sam sposób. Widać to na przykładzie również innych sztuk i umiejętności."},{"type":"paragraph","text":"Żaden mianowicie malarz nie zgodziłby się na to, by jakaś postać na obrazie miała nogę nieproporcjonalnie dużą, choćby ta wyróżniała się pięknością, ani też budowniczy okrętu nie pozwoliłby na to, by rufa czy też jakaś inna część okrętu była nieproporcjonalna; podobnie i kierownik chóru nie dopuści do zespołu śpiewaka o głosie silnym i piękniejszym od całego chóru."},{"type":"paragraph","text":"6. Dlatego nic też nie stoi na przeszkodzie, by postępowanie jedynowładców"},{"type":"paragraph","text":"[monarchów] było zgodne z postępowaniem państw wolnych, jeśli czynić to będą wówczas, gdy utrzymanie ich panowania jest pożyteczne dla państwa. Pomysł"},{"type":"paragraph","text":"ostracyzmu jako środka przeciw temu, co zgodnie uznane zostało za nazbyt się wyróżniające, ma zatem pewne polityczne uzasadnienie. Oczywiście lepiej jest, by 30 Tekst grecki jest w tym miejscu dwuznaczny, tak że gramatycznie można równie dobrze przyjąć, że Herakles nie chciał jechać z innymi, jak i przeciwnie, że personifikowany okręt Argo nie chciał go zabrać. Za drugą wersją przemawia wątek myśli autora zmierzającego do wykazania, że ludzi górujących pozbywano się czy to przez ostracyzm, czy przez ich stracenie, a równocześnie i świadectwa starożytnych mitografów (por. Apollodor, Bibl. 119, 9), które mówią, że Argonauci zostawili Heraklesa, ponieważ statek skarżył się na jego nadmierny ciężar."},{"type":"paragraph","text":"31 Periander, głośny tyran Koryntu, miał żyć w latach 627 - 585 p.n.e. Trazybulos był współcześnie z nim tyranem Miletu. U Herodota (V 92, § 6) role są odwrócone, bo Periander zwraca się o radę do Trazybulosa."},{"type":"paragraph","text":"32 Wyspy Samos, Chios i Lesbos należały do ateńskiego Związku Morskiego, z którego usiłowały się wyłamać (Samos w 441/440 p.n.e., Chios w 424, Lesbos w 428)."},{"type":"paragraph","text":"75"},{"type":"paragraph","text":"prawodawca od razu w taki sposób urządził ustrój, żeby nie było potrzeba takiego lekarstwa, a druga to rzecz dopiero, jeśli się już tak zdarzy, próbować pomocy takiego środka zaradczego. Tak się jednak w państwach nie działo; nie oglądano się bowiem przy ostracyzmie na korzyść własnego ustroju, ale używano go jako środka w rozgrywkach między stronnictwami."},{"type":"paragraph","text":"Jasną tedy jest rzeczą, że w zwyrodniałych ustrojach, ze względu na ich właściwości ostracyzm jest korzystny i sprawiedliwy, ale równie jasne jest, że nie jest on sprawiedliwy bezwzględnie."},{"type":"paragraph","text":"7. Jednakże w najlepszym ustroju państwowym dużą trudność przedstawia zagadnienie, co czynić należy, jeśli się okaże, że ktoś wyróżnia się nie zewnętrznymi zaletami, jak wpływ potężny, bogactwo i popularność, lecz cnotą. Przecież chyba nie powie się, że takiego człowieka należy wypędzić i usunąć z państwa? Ale też i niepodobna panować nad takim, bo to byłoby tak, jak gdyby ktoś chciał przy podziale władzy nad Zeusem panować. Nie pozostaje zatem nic innego, jak to, co zdaje się leżeć w naturze rzeczy, by wszyscy chętnie takiego słuchali, tak iż ludzie tacy byliby dożywotnymi królami w swych państwach."},{"type":"paragraph","text":"9. Cztery różne rodzaje królestwa:"},{"type":"paragraph","text":"1) w Sparcie, 2) u ludów barbarzyńskich, 3) dawniej u Greków z wyboru, 4) królestwo za czasów bohaterskich"},{"type":"paragraph","text":"1. Po powyższych uwagach wskazane jest zapewne przejść do rozważania królestwa, bo uznaliśmy je za jedną z właściwych form ustrojowych. Trzeba się tu zastanowić, czy królewska forma rządu jest korzystna dla miasta i kraju, który pragnie mieć dobre rządy, czy też nie, bo może jakaś inna forma ustroju byłaby odpowiedniejsza, czy też wreszcie królestwo jest dla pewnych państw pożyt
