w każdym działaniu powodują się tym, co im się dobrem wydaje), to jasną jest rzeczą, że wprawdzie wszystkie [wspólnoty] dążą do pewnego dobra, lecz przede wszystkim czyni to najprzedniejsza ze wszystkich, która ma najważniejsze ze wszystkich zadanie i wszystkie inne obejmuje. Jest nią tzw. państwo i wspólnota państwowa."},{"type":"paragraph","text":"2. Ci więc, którzy mniemają, że nie ma istotnej różnicy między kierującym mężem stanu, królem, głową domu i panem, są w błędzie. Sądzą bowiem, że różnią się oni co do większej lub mniejszej liczby poddanych ich władzy, a nie co do ich rodzaju, a więc, jeśli kto ma ich niewielu, jest panem, jeśli ma więcej, jest głową domu, jeśli zaś jeszcze więcej, kierującym mężem stanu lub królem; nie ma bowiem żadnej rzekomo różnicy między wielkim domem a małym państwem; co się zaś tyczy męża stanu i króla, to mówimy o królu, gdy ktoś według swego uznania wykonuje władzę naczelną, o mężu stanu natomiast, gdy według odpowiednich zasad prawnych i włada po części, i słucha1. Nie jest to jednak prawda."},{"type":"paragraph","text":"3. Jasne okaże się to, gdy rzecz we właściwy sposób rozpatrzymy. Jak bowiem w innych wypadkach rzecz złożoną trzeba rozłożyć aż do jej części niepodzielnych (bo są to najmniejsze cząstki całości), tak jest i z państwem; jeśli rozważymy, jakie są jego części składowe, zobaczymy wyraźniej, w czym się one różnią od siebie i czy się coś naukowo daje w odniesieniu do każdej z nich ustalić."},{"type":"paragraph","text":"Najlepszym przy tym sposobem badania jest, jak w innych wypadkach tak i w tym, śledzenie powstawania pewnych stosunków od samego początku."},{"type":"paragraph","text":"4. Najpierw tedy konieczną jest rzeczą, aby się łączyły ze sobą istoty, które bez siebie istnieć nie mogą, a więc żeńska i męska w celu płodzenia; dzieje się to nie z wolnego wyboru, lecz jak i u wszystkich zwierząt i roślin pod wpływem naturalnego popędu do pozostawienia po sobie dalszej tegoż rodzaju istoty. Tak samo zdani są na siebie dla swego zachowania ten, kto włada z natury, i ten, kto mu jest poddany. Ta bowiem istota, która dzięki rozumowi zdoła przewidywać, rządzi z natury i rozkazuje z natury, ta zaś, co potrafi tylko zlecenia te wykonywać 1 Polemika z Platonem, który w dialogu Polityk (259 B) taki właśnie pogląd wypowiada."},{"type":"paragraph","text":"4"},{"type":"paragraph","text":"za pomocą sił cielesnych, jest poddana i z natury niewolna; toteż interesy pana i niewolnika są zbieżne."},{"type":"paragraph","text":"5. Z natury więc inne jest przeznaczenie kobiety i niewolnika. (Przyroda bowiem nie robi nic takiego jak ci kowale, wyrabiający miecze delfickie2 w sposób oszczędny, lecz każdy jej twór ma tylko jeden cel; każde przecież narzędzie osiąga najlepsze wykończenie wówczas, jeśli służy do jednego celu, a nie do wielu.) U barbarzyńców natomiast kobieta i niewolnik zajmują tę samą pozycję. Pochodzi to stąd, że brak im czynnika z natury powołanego do władania, związki zaś kojarzą się u nich między niewolnicą a niewolnikiem. Dlatego to powiadają poeci: słuszną jest rzeczą, by Hellenowie nad barbarzyńcami panowali3, jako że barbarzyńca a niewolnik to z natury jedno i to samo."},{"type":"paragraph","text":"6. Z obu tych wspólnot4 powstaje tedy najpierw dom, czyli rodzina. Słusznie też powiedział w swym poemacie Hezjod5:"},{"type":"paragraph","text":"dom przede wszystkim i żonę, i wołu pług ciągnącego, bo u ludzi ubogich wół zastępuje niewolnika. Domem, czyli rodziną jest zatem z natury istniejąca wspólnota, utrzymująca się trwale dla codziennego współżycia; członków jej Charondas6 zowie „towarzyszami stołu”, zaś Epimenides7 z Krety"},{"type":"paragraph","text":"„towarzyszami ogniska”8."},{"type":"paragraph","text":"7. Pierwsza wspólnota większej ilości rodzin dla zaspokojenia potrzeb, wychodzących poza dzień bieżący, stanowi gminę wiejską. Jest ona z natury po największej części jakby kolonią rodziny, stąd członków jej nazywają niektórzy braćmi mlecznymi, dziećmi tudzież dziećmi dzieci. Dlatego to pierwotnie państwa miały królów na czele, jak jeszcze i dzisiaj obce ludy; powstały bowiem przez skupienie poddanych władzy królewskiej. W każdej mianowicie rodzinie króluje najstarszy i na tej samej zasadzie oparte są też rządy w zespołach rodzin, jakimi są kolonie. To właśnie ma na myśli Homer9, kiedy mówi [o Cyklopach]: 2 Miecz delficki — objaśnia leksykograf Hezychios jako miecz czy nóż mający z przodu część żelazną, co jednak niewiele mówi; z toku myśli wynika, ze był on do różnych celów używany. Goettling ( Commentatio de machaera Delphica, Jena 1856) przypuszcza, ze było to połączenie noza z łyżką ofiarną (F. Susemihl, Aristoteles, Politica, griechisch und deutsch hrsg. von…, Leipzig 1879, przyp. 8, dalej cyt. Susemihl)."},{"type":"paragraph","text":"3 Cytat zapewne z Eurypidesa (Ifigenia w Aulidzie, 1400 n.); w pełnym brzmieniu: „Grecy mają barbarzyńcom rozkazywać a zasię barbarzyńcy ludom greckim’ Ludem wolnym są Grekowie. Zaś sługami barbarzyńcy” (przeł. J. Kasprowicz)."},{"type":"paragraph","text":"4 Tj. męża i żony oraz pana i niewolnika."},{"type":"paragraph","text":"5 Prace ι dnie 405."},{"type":"paragraph","text":"6 Charondas z Katany, znany jako prawodawca tegoż miasta (w VII w. p.n.e.); por. mzej, ks. II, rozdz. 9, § 5."},{"type":"paragraph","text":"7 Epimenides z Krety, ustawodawca, kapłan, cudotwórca i poeta orficki, czynny podobno także i w Atenach pod koniec VII w. p n.e Historyczność jego sporna."},{"type":"paragraph","text":"8 Wbrew Immischowi, który tu czyta όµοκάπους (towarzyszy żłobu) przyjmuję lekcję όµοκάπνους"},{"type":"paragraph","text":"9 Odyseja IX 114nn."},{"type":"paragraph","text":"5"},{"type":"paragraph","text":"Każdy włada nad dziećmi swoimi i żonami,"},{"type":"paragraph","text":"mieszkali bowiem w rozproszeniu, jak [w ogóle wszyscy ludzie] w odległych czasach. Powszechne jest też wyobrażenie, że i bogowie podlegają władzy królewskiej, dlatego że ludzie, jedni jeszcze i teraz, drudzy dawniej, mieli królów na czele, tak zaś, jak sobie urabiają obraz bogów na swoje podobieństwo, kształtują też swe wyobrażenia o ich życiu."},{"type":"paragraph","text":"8. Pełna w końcu wspólnota, stworzona z większej ilości gmin wiejskich, która niejako już osiągnęła kres wszechstronnej samowystarczalności, jest państwem; powstaje ono dla umożliwienia życia, a istnieje, aby życie było dobre. Każde państwo powstaje zatem na drodze naturalnego rozwoju, podobnie jak i pierwsze wspólnoty. Jest bowiem celem, do którego one zmierzają, natura zaś jest właśnie osiągnięciem celu. Właściwość bowiem, jaką każdy twór osiąga u kresu procesu swego powstawania, nazywamy jego naturą; tak jest w odniesieniu i do człowieka, i do konia, i do rodziny. Osiągnięcie celu [do którego się dąży], jest zdobyciem pełnej doskonałości, samowystarczalność zaś jest osiągnięciem i celu, i pełnej doskonałości."},{"type":"paragraph","text":"9. Okazuje się z tego, że państwo należy do tworów natury, że człowiek jest z natury stworzony do życia w państwie10, taki zaś, który z natury, a nie przez przypadek żyje poza państwem, jest albo nędznikiem, albo nadludzką istotą, jak ten, którego piętnuje Homer 11, jako"},{"type":"paragraph","text":"człowieka bez rodu, bez prawa, bez [własnego] ogniska."},{"type":"paragraph","text":"Kto bowiem z natury swojej jest taki, równocześnie i wojny namiętnie pożąda, będąc odosobniony, jak ten kamień wyłączony w grze w kości."},{"type":"paragraph","text":"10. Że człowiek jest istotą stworzoną do życia w państwie12 więcej niż pszczoła lub jakiekolwiek zwierzę żyjące w stadzie, to jasną jest rzeczą. Natura bowiem, jak powiadamy, nic nie czyni bez celu. Otóż człowiek jedyny z istot żyjących obdarzony jest mową. Głos jest oznaką radości i bólu, dlatego posiadają go i inne istoty (rozwój ich posunął się bowiem tak daleko, że mają zdolność odczuwania bólu i radości, tudzież wyrażania tego między sobą). Ale mowa służy do określania tego, co pożyteczne czy szkodliwe, jak również i tego, co sprawiedliwe czy też niesprawiedliwe."},{"type":"paragraph","text":"11. To bowiem jest właściwością człowieka, odróżniającą go od innych stworzeń żyjących, że on jedyny ma zdolność rozróżniania dobra i zła, sprawiedliwości i niesprawiedliwości i tym podobnych; wspólnota zaś takich istot staje się podstawą rodziny i państwa."},{"type":"paragraph","text":"Z natury swojej państwo jest pierwej 13 aniżeli rodzina i każdy z nas, całość 10 W tekście: πολιτικόν ζωον, dosłownie: „człowiek jest istotą państwową”"},{"type":"paragraph","text":"11 Iliada IX 63 n. Tak nazywa tu Nestor człowieka, który znajduje upodobanie w wojnie domowej."},{"type":"paragraph","text":"Arystoteles stawia na równi z nim człowieka bez państwa."},{"type":"paragraph","text":"12 Por. przyp. 10"},{"type":"paragraph","text":"13 Pierwej oczywiście nie co do czasu powstania, ale jako pojecie, nie można bowiem mówić o członach państwa, jak długo państwa nie ma."},{"type":"paragraph","text":"6"},{"type":"paragraph","text":"bowiem musi być pierwej od części; po rozprzęgnięciu się całości nie będzie nogi ni ręki, a tylko nazwa, jak wówczas, gdy ktoś ręką nazwał rękę z kamienia, bo martwa ręka będzie takiej samej natury. Istota każdej rzeczy leży przecież w jej zadaniu praktycznym i zdolności jego wykonania, jeśli więc nie ma już tych cech, to nie można powiedzieć, że to ta sama rzecz, lecz tylko coś, co tę samą nazwę nosi, 12. Okazuje się tedy, że państwo jest tworem natury i że jest pierwej od jednostki, bo jeśli każdy z osobna nie jest samowystarczalny, to znajdzie się w tym samym stosunku [do państwa], co i inne części do jakiejś całości. Kto zaś nie potrafi żyć we wspólnocie albo jej wcale nie potrzebuje, będąc samowystarczalnym, bynajmniej nie jest członem państwa, a zatem jest albo zwierzęciem, albo bogiem."},{"type":"paragraph","text":"Wszystkim ludziom właściwy jest z natury pęd do życia we wspólnocie, a ten, kto ją pierwszy zestroił, jest twórcą największych dóbr. Jak bowiem człowiek doskonale rozwinięty jest najprzedniejszym ze stworzeń, tak jest i najgorszym ze wszystkich, jeśli się wyłamie z prawa i sprawiedliwości. Najgorsza jest bowiem nieprawość uzbrojona, człowiek zaś rodzi się wyposażony w broń, jaką są jego zdolności umysłowe i moralne, które, jak żadne inne, mogą być niewłaściwie nadużywane."},{"type":"paragraph","text":"Dlatego człowiek bez poczucia moralnego jest najniegodziwszym i najdzikszym stworzeniem, najpodlejszym w pożądliwości zmysłowej i żarłoczności. Sprawiedliwość zaś jest znamieniem państwa, wymiar jej jest bowiem podstawą porządku istniejącego we wspólnocie państwowej, polega zaś na ustaleniu tego, co jest sprawiedliwe."},{"type":"paragraph","text":"2. Dom, czyli rodzina najmniejszą częścią składową państwa."},{"type":"paragraph","text":"Niewolnik jako część własności domowej."},{"type":"paragraph","text":"Jego definicja. Niewolnicy z natury i wbrew niej."},{"type":"paragraph","text":"Stosunek pana do niewolnika"},{"type":"paragraph","text":"1. Skoro się więc okazało, z jakich części składa się państwo, trzeba naprzód pomówić o urządzeniu domu [czyli rodziny]; każde bowiem państwo składa się z rodzin, członkowie zaś rodziny są znów jej częściami składowymi. Otóż pełna rodzina składa się z niewolników i wolnych. Ponieważ zaś badanie każdej rzeczy musi się zacząć najpierw od najdrobniejszych części, a pierwszymi i najdrobniejszymi częściami rodziny są pan i niewolnik, mąż i żona, ojciec i dzieci, należy wziąć pod rozwagę te trzy stosunki i zbadać, czym jest w istocie każdy z hich i jak się powinien przedstawiać."},{"type":"paragraph","text":"2. Wynika z tego nauka o prawie władania, o prawie małżeńskim nie mamy bowiem ([w greckim języku] odpowiedniej nazwy na określenie związku między kobietą i mężczyzną) i, po trzecie, o prawie ojcowskim (i tutaj brak na określenie właściwej nazwy). Jednakowoż prócz tych trzech wymienionych działów jest nadto jeszcze jeden, który — zdaniem jednych — stanowi istotę gospodarstwa domowego, według drugich, jest najważniejszą jego częścią. Trzeba zatem rozważyć, jak się i on przedstawia, mam zaś na myśli tzw. sztukę zarobkowania. Najpierw jednak pragnę pomówić o panu i niewolniku, aby stwierdzić to, co w tym względzie 7"},{"type":"paragraph","text":"koniecznie potrzebne, a zarazem i zobaczyć, czy w porównaniu z dotychczasowymi poglądami nie dałoby się lepiej jakoś ująć tego, co się sądzi w tym przedmiocie."},{"type":"paragraph","text":"3. Jedni mianowicie sądzą, że władza pana nad niewolnikami jest pewną umiejętnością i że nie ma żadnej różnicy między władzą głowy domu a władzą pana nad niewolnikami, czy władzą kierującego męża stanu lub króla, jak to na początku zauważyłem14. Inni natomiast uważają, że władza pana nad niewolnikami jest przeciwna naturze, bo tylko na zasadzie prawa ustanowionego jeden jest niewolnikiem, a inny wolnym, z natury zaś nie ma między nimi żadnej różnicy."},{"type":"paragraph","text":"Dlatego [taki stan rzeczy] nie jest też sprawiedliwy, bo na gwałcie oparty."},{"type":"paragraph","text":"Własność jest tedy częścią domu, a nauka o zdobywaniu własności częścią nauki o gospodarstwie domowym (bez rzeczy koniecznych nie można żyć, a tym samym i żyć wygodnie)."},{"type":"paragraph","text":"4. Jak do określonych kunsztów niezbędnie są potrzebne właściwe narzędzia, jeśli dzieło ma być odpowiednio wykończone, tak i do gospodarstwa domowego."},{"type":"paragraph","text":"Z narzędzi jedne są martwe, drugie żywe, tak np. dla sternika ster jest narzędziem martwym, jego zaś zastępca narzędziem żywym; pomocnik bowiem stanowi rodzaj narzędzia przy wykonywaniu pracy. Odpowiednio do tego także i w gospodarstwie domowym rzeczy, jakie się posiada, są narzędziem do życia, mienie jest sumą takich narzędzi, a niewolnik żywą własnością."},{"type":"paragraph","text":"5. Jest zaś narzędziem ponad narzędzia każdy sługa. Gdyby bowiem każde narzędzie mogło spełniać swoje zadania według rozkazu albo i uprzedzając go, jak to podobno robiły posągi Dedala15 lub trójnogi Hefajstosa, które, jak mówi poeta16, same się zjawiają na zebranie bogów, gdyby tak czółenka tkackie same tkały, a pałeczki od gitary same grały, to ani budowniczowie nie potrzebowaliby pomocników, ani panowie niewolników. To, co się nazywa narzędziem, stanowi środek do wytwarzania nowych rzeczy, zaś przedmioty własności służą tylko do użytkowania. Czółenka tkackiego bowiem nie tylko się używa, lecz z jego pomocą wytwarza się coś nowego, natomiast suknia i łoże służą tylko do użytkowania."},{"type":"paragraph","text":"6. Ponieważ, dalej, stwarzanie i działanie różnią się co do rodzaju, a jedno i drugie potrzebuje narzędzi, więc także i te ostatnie muszą być odpowiednio różne. Otóż życie jest działaniem, a nie stwarzaniem, dlatego i niewolnik jest pomocnikiem w dziedzinie działania. O przedmiotach własności mówi się tak jak o częściach, bo część jest nie tylko częścią czegoś innego, ale w ogóle należy do czegoś innego, podobnie zaś jest i z przedmiotem własności. Dlatego pan jest tylko panem niewolnika, ale do niego nie należy, a niewolnik jest nie tylko niewolnikiem swego pana, ale w ogóle do niego należy."},{"type":"paragraph","text":"14 Por, wyżej, 1252 a 7."},{"type":"paragraph","text":"15 Mityczny Dedal sławiony był za to, że w przeciwieństwie do dawniejszych, sztywnością nacechowanych rzeźb, tworzył posągi ożywione przez rozstawienie nóg i oddalenie rąk od ciała, a nawet zdołał jakoby tchnąć w nie samodzielne życie (Diodor Sycylijski, Bibliotheca IV 76, 2 -"},{"type":"paragraph","text":"3; por. Eurypides, Hekuba 838)."},{"type":"paragraph","text":"16 Homer, Iliada XVIII 373 - 376."},{"type":"paragraph","text":"8"},{"type":"paragraph","text":"7. Z wywodów tych okazuje się zatem, jaka jest istota i znaczenie niewolnika."},{"type":"paragraph","text":"Człowiek, który z natury nie należy do siebie, lecz do drugiego, jest z natury niewolnikiem. Należy zaś do drugiego taki człowiek, który jest czyjąś własnością, mimo iż jest człowiekiem. Przedmiot własności jest zaś narzędziem działania odrębnym od właściciela."},{"type":"paragraph","text":"Z kolei należy rozważyć, czy ktoś jest istotnie z natury takim [niewolnikiem]"},{"type":"paragraph","text":"lub nie, czy jest to rzeczą sprawiedliwą, a nawet i lepszą dla kogoś, być niewolnikiem, czy też nie, czy przeciwnie, wszelka niewola sprzeczna jest z prawem przyrodzonym."},{"type":"paragraph","text":"8. Na to pytanie nietrudno dać właściwą odpowiedź, kierując się zarówno rozumowaniem, jak i doświadczeniem praktycznym. Władanie i podleganie władzy należy bowiem do rzeczy nie tylko koniecznych, ale i pożytecznych. U niektórych istot zaraz od urodzenia dokonuje się rozgraniczenie z przeznaczeniem jednych do władania, drugich do podlegania władzy. Liczne są też rodzaje rządzących i rządzonych, ale zawsze lepsze jest panowanie nad lepszymi podwładnymi; tak np. lepsze jest panowanie nad człowiekiem aniżeli nad zwierzęciem. Dzieło bowiem, wykonane przez doskonalsze istoty, jest doskonalsze, gdzie zaś jedna włada, a druga słucha, dzieło jest w pewnej części tworem jednej i drugiej."},{"type":"paragraph","text":"9. Czynnik władający i słuchający występuje wszędzie, gdzie coś składa się z wielu części, a tworzy pewną wspólną jedność bez względu na to, czy części są ze sobą złączone, czy też rozdzielone. Jest to ogólne prawo natury, choć przejawiające się w pierwszym rzędzie u istot żyjących, bo i u tworów nie żyjących istnieje pewien rodzaj nadrzędności, jak np. w harmonii. Rozważanie na ten temat może jednak tu nie należy."},{"type":"paragraph","text":"10. Istota żyjąca składa się najpierw z duszy i ciała, przy czym z natury pierwsza włada, to drugie zaś słucha. Należy jednak, gdy chodzi o ustalenie zgodności z naturą, brać pod uwagę stan normalny, a nie wykolejenia. Dlatego przedmiotem rozważania winien być człowiek najzupełniej zdrów na ciele i duszy, u którego ten stosunek [duszy do ciała] jasno się uwidacznia; bo u ludzi występnych lub skłonnych do występków ciało często zdaje się panować nad duszą skutkiem tego, iż postępują źle i niezgodnie z naturą."},{"type":"paragraph","text":"11. Najpierw więc, jak powiadam, u istoty żyjącej można zauważyć oba rodzaje władzy [które odpowiadają władzy nad niewolnikiem, czyli] despotycznej i [władzy nad wolnym obywatelem, czyli] politycznej; dusza bowiem sprawuje władzę despotyczną nad ciałem, a rozum włada nad pożądaniami w sposób odpowiadający władzy męża stanu i króla. Okazuje się przy tym, że dla ciała jest to zgodne z naturą i pożyteczne podlegać rządom duszy, tak samo jak i dla władz uczuciowych duszy podlegać rozumowi i tej części duszy, która o rozsądku stanowi, natomiast równorzędny albo i odwrotny ich stosunek byłby dla wszystkich szkodliwy."},{"type":"paragraph","text":"12. Tak samo znów przedstawia się ten stosunek u człowieka i innych istot żyjących. Oswojone zwierzęta są bowiem z natury lepsze od dzikich, a dla nich wszystkich korzystniejszą rzeczą jest służyć człowiekowi, bo w ten sposób chronią 9"},{"type":"paragraph","text":"się przed zniszczeniem. Tak jest również z rodzajem męskim i żeńskim, z których pierwszy jest z natury silniejszy, drugi słabszy; toteż ten panuje, a tamten mu podlega."},{"type":"paragraph","text":"W taki sam sposób muszą się też układać wzajemne stosunki u wszystkich ludzi w ogóle."},{"type":"paragraph","text":"13. Ci, którzy w takim stopniu stoją poniżej drugich, w jakim dusza góruje nad ciałem, a człowiek nad zwierzęciem (w położeniu tym znajdują się ci, których działalność polega na używaniu sił fizycznych i którzy najwyżej to tylko mogą dać z siebie), ci tedy są z natury niewolnikami, dla których, podobnie jak i dla wyżej wymienionych, lepiej jest znajdować się w takiej zależności. Z natury bowiem jest niewolnikiem ten, kto może być własnością drugiego (dlatego też i należy do drugiego) i kto o tyle tylko ma związek z rozumem, że go spostrzega u innych, ale sam go nie posiada. Także inne istoty żyjące niczego przecież nie obejmują rozumem, ale kierują się tylko wrażeniami zmysłowymi."},{"type":"paragraph","text":"14. Niewielka jest też różnica w użyteczności, bo obie grupy, zarówno niewolnicy, jak zwierzęta domowe, pomagają fizycznie do zaspokojenia niezbędnych potrzeb. Stosownie do tego istnieje w przyrodzie dążność do odmiennego kształtowania ciała ludzi wolnych i niewolników, w ten sposób mianowicie, że ci ostatni są silni ze względu na konieczne usługi, pierwsi zaś smukli, ale niezdolni do takich prac, zdatni natomiast do działalności politycznej, która ma dwa odrębne zadania: wojenne i pokojowe; zdarza się jednak często i przeciwnie, że jedni mają ciała wolnych, drudzy zaś duszę."},{"type":"paragraph","text":"15. Tyle jest jasne; jeśliby ta fizyczna różnica była tylko tak wielka, jak między wizerunkami bogów a postacią ludzką, to wszyscy by przyznali, że ci, którzy o tyle stoją niżej od innych, zasługują na to, aby być ich niewolnikami. Jeżeli zaś trafne jest to w odniesieniu do ciała, to o wiele sprawiedliwszą jest rzeczą zasadę tę zastosować do duszy, tylko że nie jest równie łatwo stwierdzić piękno duszy, jak ciała."},{"type":"paragraph","text":"Wynika z tego w sposób oczywisty, iż pewni ludzie są z natury wolnymi, inni zaś niewolnikami, przy czym stan niewoli jest dla tych drugich zarówno pożyteczny, jak i sprawiedliwy."},{"type":"paragraph","text":"16. Że jednak i zwolennicy przeciwnego poglądu poniekąd mają słuszność, to nietrudno zauważyć. W podwójnym mianowicie znaczeniu mówi się o niewoli i niewolnikach, niektórzy bowiem są niewolnikami i służą na zasadzie prawa."},{"type":"paragraph","text":"Prawo to jest rodzajem umowy, na podstawie której zwyciężeni w wojnie stają się własnością zwycięzców. Wielu prawników podnosi przeciwko niemu zarzut wytaczany często przeciwko mówcom, o sprzeczność z prawem17, ponieważ straszną byłoby to rzeczą, gdyby ten, kto uległ [przeważającej] sile, miał być niewolnikiem i sługą tego, który potrafi gwałt zadać i góruje siłą. Także i między filozofami jedni opowiadają się za tym, drudzy za innym poglądem."},{"type":"paragraph","text":"17 W Atenach każdy obywatel mógł wytoczyć skargę mówcy, który na zgromadzeniu wystąpił"},{"type":"paragraph","text":"z wnioskiem niezgodnym, zdaniem oskarżyciela, z obowiązującym prawem."},{"type":"paragraph","text":"10"},{"type":"paragraph","text":"17. Przyczyna tego sporu i tej rozbieżności zdań leży w tym, że cnota, jeśli ma do rozporządzenia odpowiednie środki, również potrafi znakomicie gwałt zadać, biorący zaś górę zawsze wykazuje przewagę jakiejś zalety. Skutkiem tego wydaje się, że i siła nie jest pozbawiona pewnej cnoty, a spór dotyczy tylko strony prawnej. Dlatego jedni uważają za rzecz sprawiedliwą łaskawość [dla zwyciężonych], inni właśnie przeciwnie, panowanie silniejszego; bo jeśli się rozłączy te dwa pojęcia [prawa i siły], to nie ma żadnego oparcia i mocy przekonywającej pogląd,"},{"type":"paragraph","text":"[z którego by wynikało,] iż górujący cnotą nie powinien władać i panować."},{"type":"paragraph","text":"18. Inni wreszcie powołując się na zasadę, która im się wydaje sprawiedliwą (prawo bowiem jest czymś sprawiedliwym), utrzymują, że niewola według prawa wojennego jest rzeczą sprawiedliwą, równocześnie jednak popadają w sprzeczność."},{"type":"paragraph","text":"Przyczyna wojny może być bowiem niesprawiedliwa, tego zaś, kto nie zasługuje na to, aby być niewolnikiem, nikt żadną miarą nie może nazwać niewolnikiem; w przeciwnym bowiem razie zdarzałoby się, że ludzie najszlachetniejszego pochodzenia byliby niewolnikami i niewolników synami, gdyby się przypadkiem dostali do niewoli i zostali sprzedani. Dlatego też takich nie chcą nazywać niewolnikami, lecz tylko barbarzyńców. Jeśli jednak tak mówią, to w istocie rzeczy mają na myśli tylko niewolnika z natury, podobnie jak to na początku ująłem18. Muszę bowiem przyznać, że są ludzie, z których jedni wszędzie są niewolnikami, a drudzy nigdzie."},{"type":"paragraph","text":"19. Tak samo jest i ze szlachectwem; szlachta bowiem uważa się za szlachtę nie tylko u siebie w domu, ale i wszędzie, podczas gdy w ich mniemaniu szlachta barbarzyńców jest nią tylko u siebie. Wychodzą przy tym z założenia, że istnieje szlachectwo i wolność w bezwzględnym i względnym tego słowa znaczeniu, jak to powiada również i Helena u Teodektesa19."},{"type":"paragraph","text":"Po ojcu i matce z bogów jestem pokolenia,"},{"type":"paragraph","text":"Któż to śmiałby tedy mieniąc mię służącą."},{"type":"paragraph","text":"Wyrażając się w ten sposób, odróżniają niewolnika i wolnego, szlachtę i gmin jedynie i wyłącznie według cnoty i nieprawości. Uważają bowiem, że jak z człowieka rodzi się człowiek, a ze zwierzęcia zwierzę, tak i ze szlachetnych szlachetny. Natura wprawdzie często do tego dąży, ale nie może tego osiągnąć."},{"type":"paragraph","text":"20. Okazuje się stąd, że spór ma pewne uzasadnienie i że nie wszyscy ludzie, którzy są niewolnikami czy wolnymi, są nimi z natury; a ponadto jest jasną rzeczą, że u pewnych ludzi występuje taka cecha charakterystyczna, która stanowi o tym, iż dla jednych jest rzeczą korzystną i sprawiedliwą być niewolnikami, dla drugich, przeciwnie, być panami; że wreszcie jedni muszą podlegać władzy, drudzy zaś wykonywać władzę, zależnie od tego, na co ich natura skazała, że więc istnieć musi również władza pana nad niewolnikiem, a nadużycie jej jest dla obu stron 18 Por. wyżej, rozdz. 2, § 7 (1254 a 17),"},{"type":"paragraph","text":"19 Teodektes z Faselis w Lycji, uczeń Platona i Isokratesa, przyjaciel Arystotelesa, znany jako autor zaginionych 50 tragedii, między nimi pt. Helena, z której właśnie pochodzą przytoczone wiersze."},{"type":"paragraph","text":"Był też autorem dzieła poświęconego sztuce wymowy, które cytuje Arystoteles w swojej Retoryce."},{"type":"paragraph","text":"11"},{"type":"paragraph","text":"szkodliwe. Co bowiem jest korzystne dla części, jest korzystne i dla całości, co dla ciała, również i dla duszy; niewolnik jest zaś pewną częścią pana, niejako ożywioną, ale oddzielną częścią jego ciała."},{"type":"paragraph","text":"21. Dlatego też pana i niewolnika, których natura na taki los skazała, łączy wzajemne przywiązanie i jest to dla nich korzystne, przeciwnie zaś bywa, jeśli stanowisko ich nie jest zgodne z naturą, ale opiera się na prawie i gwałcie."},{"type":"paragraph","text":"Z dotychczasowych wywodów okazuje się jednak również, że władza pana nad niewolnikiem i władza w państwie to nie to samo, tudzież że nie wszystkie rodzaje władzy są sobie równe, jak to utrzymują niektórzy. Jedna bowiem rozciąga się nad wolnymi z natury, druga nad niewolnikami, władza głowy domu jest monarchiczna, gdyż każdy dom podlega rządom jednego, a władza męża stanu jest panowaniem nad wolnymi i równymi."},{"type":"paragraph","text":"22. Nazwa pana nie jest określeniem pewnej umiejętności, ale istniejącego stanu rzeczy, podobnie jak i nazwa niewolnika czy wolnego. Istnieje jednak umiejętność złączona ze stanowiskiem pana domu, jak i ze stanowiskiem niewolnika; jakoż umiejętności potrzebnych niewolnikom uczył pewien człowiek w Syrakuzach, [który] tam za pieniądze kształcił niewolników w pełnieniu zwyczajnych usług. Nauka taka może nawet objąć szersze kręgi, jak np. sztukę kucharską i inne tego rodzaju usługi. Różne są bowiem czynności domowe, jedne ważniejsze, inne konieczniejsze niż drugie, a według przysłowia także „niewolnik a niewolnik i pan a pan to dwie różne rzeczy”."},{"type":"paragraph","text":"23. Znajomość wszystkich takich rzeczy stanowi tedy wiedzę niewolnika, natomiast wiedza pana polega na umiejętnym zużytkowaniu niewolników. Bo pan okazuje się nie w tym, że nabywa, ale że właściwie używa niewolników. Umiejętność ta nie wykazuje nic wielkiego ani szacownego; bo co niewolnik musi umieć wykonać, to pan musi umieć nakazać. Dlatego kto tym nie potrzebuje się sam trudzić, przekazuje ten zaszczyt rządcy, a sam oddaje się sprawom publicznym lub filozofii. Nauka natomiast o nabywaniu własności, mianowicie o sprawiedliwym nabywaniu, jest różna od obu tych umiejętności i należy do nauki o sztuce wojennej i sztuce myśliwskiej20."},{"type":"paragraph","text":"Tyle zatem uwag o niewolniku i o panu."},{"type":"paragraph","text":"3. Nauka o gospodarstwie domowym."},{"type":"paragraph","text":"Sztuka zdobywania własności."},{"type":"paragraph","text":"Rola pieniądza"},{"type":"paragraph","text":"1. Z kolei stosownie do podanego wyżej planu21 rozważmy całe w ogóle zagadnienie posiadania i zarobkowania, bo i niewolnik okazał się pewną częścią własności. Przede wszystkim więc może się tu nasunąć wątpliwość, czy sztuka zarobkowania jest identyczna ze sztuką gospodarstwa domowego, czy też z jakąś 20 Por. niżej, rozdz. 3, § 8 (1256 b)."},{"type":"paragraph","text":"21 Por. wyżej, rozdz. 2, § l - 2 (1253 b)."},{"type":"paragraph","text":"12"},{"type":"paragraph","text":"jej częścią lub też z jej sztuką pomocniczą, a jeżeli ze sztuką pomocniczą, to czy zachodzi tu taki stosunek jak między sztuką wytwarzania czółenek tkackich a sztuką tkacką, czy też jak między sztuką sporządzania brązu a odlewnictwem posągów. Te pierwsze bowiem nie w tym samym znaczeniu mają pomocniczy charakter, lecz jedna dostarcza narzędzi, druga natomiast materiału. Nazywam zaś materiałem coś22, z czego się wykonuje rzecz pewną, a więc dla tkacza jest to wełna, a dla rzeźbiarza brąz."},{"type":"paragraph","text":"2. Jasną więc jest rzeczą, że nauka o gospodarstwie domowym nie jest identyczna z nauką o zdobywaniu własności. Jedna bowiem ma do czynienia z dostarczaniem środków, druga z ich używaniem; a któraż nauka zajmuje się używaniem mienia domowego, jeśli nie nauka o gospodarstwie domowym? Sporną natomiast jest rzeczą, czy nauka o zdobywaniu własności jest jej częścią, czy też stanowi zupełnie odrębny rodzaj. Jeśli bowiem ten, kto się zajmuje sprawą zdobywania własności, musi rozważyć, skąd majątek i własność pochodzi, a własność i bogactwo obejmuje wiele części, to [nasuwa się] najpierw pytanie, czy rolnictwo i w ogóle troska o pożywienie i jego nabycie jest pewną częścią nauki o gospodarstwie domowym, czy też jakimś odrębnym rodzajem."},{"type":"paragraph","text":"3. Są wszakże liczne rodzaje pożywienia, stąd i rozliczne sposoby życia zarówno u zwierząt, jak i ludzi; bez pożywienia żyć niepodobna, w następstwie jednak różnicy pożywienia wytworzyły się różnice w sposobie życia istot żyjących."},{"type":"paragraph","text":"Jedne spośród zwierząt żyją w stadach, inne pojedynczo, zależnie od tego, co jest rzeczą więcej sprzyjającą dla ich wyżywienia; jedne bowiem żywią się mięsem, drugie płodami ziemi, inne wreszcie są wszystkożerne. Toteż natura, aby ułatwić im zdobycie odpowiedniego pożywienia, rozmaicie ukształtowała ich sposób życia. Ponieważ z natury nie to samo każdemu odpowiada, lecz jednym to, innym owo, więc też i wśród samych zwierząt tak mięsożernych, jak i roślinożernych istnieją różnice w sposobie życia."},{"type":"paragraph","text":"4. Podobnie jest i u ludzi. Istnieją bowiem znaczne różnice w ich sposobie życia. Najbardziej leniwi są koczownikami (pożywienie bowiem, jakiego im dostarczają oswojone zwierzęta, przychodzi im bez trudu i pracy, że zaś stada ich ze względu na pastwiska z konieczności zmieniają miejsce, więc i oni zmuszeni są ciągnąć za nimi, uprawiając w ten sposób niejako żyjącą rolę). Inni zaś żyją z myślistwa takiego czy owakiego rodzaju, a więc jedni z rozboju, drudzy, co mieszkają nad jeziorami, moczarami, rzekami lub odpowiednim morzeni, z rybo-"},{"type":"paragraph","text":"łówstwa, jeszcze inni z polowania na ptaki lub dzikie zwierzęta. Największa jednak część ludzi żyje z [uprawy] ziemi i jej przyswojonych płodów."},{"type":"paragraph","text":"5. Tyle mniej więcej jest zatem sposobów życia, przy których ma się do spełnienia pewne z natury związane z nimi prace, a nie zdobywa się utrzymania przez wymianę czy handel, a więc: koczowniczy, rolniczy, rozbójniczy, rybacki i myśliwski. Niektórzy łączą razem pewne z tych sposobów życia i dzięki temu żyją wygodnie, uzupełniając braki jednego trybu życia, o ile ten nie jest w pełni 22 W tekście greckim το ύποκείµενον."},{"type":"paragraph","text":"13"},{"type":"paragraph","text":"samowystarczalny; a więc np. jedni prowadzą sposób życia koczowniczy a zarazem i rozbójniczy, drudzy rolniczy i myśliwski. Podobnie jest z innymi sposobami życia, które ludzie prowadzą łącząc je, jak ich do tego zmusza potrzeba."},{"type":"paragraph","text":"6. Omawiany dotąd rodzaj własności dany jest, jak się okazuje, wszystkim istotom żyjącym przez samą naturę, i to zarówno już od pierwszej chwili urodzenia, jak i po osiągnięciu pełni rozwoju. Niektóre bowiem już z początku, przy urodzeniu przynoszą ze sobą tyle pożywienia, że starczy go aż do czasu, kiedy noworodek zdoła je sam sobie zdobyć; a zachodzi to u istot rodzących robaki lub znoszących jaja. Te zaś, które rodzą żywe potomstwo, aż do pewnego czasu mają dla swych młodych pokarm w sobie w postaci [naturalnego produktu] mleka."},{"type":"paragraph","text":"7. Widać więc z tego, że i co do dorosłych istot trzeba wysunąć podobny wniosek, że zatem rośliny istnieją dla zwierząt, zwierzęta zaś dla człowieka, a mianowicie oswojone ze względu na usługi i pożywienie, spośród dzikich zaś, jeśli nie wszystkie, to przecież największa część, ze względu na pożywienie i pewną pomoc, by można z nich mieć i odzież, i inne rzeczy użyteczne. Jeśli więc natura nic nie stwarza bezcelowo i bezużytecznie, to musiała wszystko to stworzyć dla ludzi."},{"type":"paragraph","text":"8. Dlatego i sztuka wojenna z natury będzie poniekąd sztuką zdobywania własności (część jej stanowi też sztuka myśliwska). Musi się ją mianowicie stosować przeciwko zwierzętom, jak i przeciw tym ludziom, którzy, choć z natury do służby stworzeni, nie chcą się do niej nagiąć, tak że wojna taka zgodna jest z prawem natury. Jedna dziedzina nauki o zdobywaniu własności jest więc z natury częścią nauki o gospodarstwie domowym; odpowiednio do tego powinni ją posiadać lub też starać się o jej zdobycie ci, których zadaniem jest gromadzenie zapasów koniecznych do życia i użytecznych dla społeczeństwa w państwie czy w domu."},{"type":"paragraph","text":"9. Otóż prawdziwe bogactwo zdaje się na tych rzeczach polegać. To bowiem"},{"type":"paragraph","text":"[czego się wymaga od takiej własności, a mianowicie], by do wygodnego życia starczyła, nie jest bez granic, jak to stwierdza Solon w wierszu: ścisłej granicy w bogactwie bynajmniej ludzie nie znają."},{"type":"paragraph","text":"Istnieje tu przecież granica, podobnie jak i w innych sztukach, bo żadna sztuka nie posiada środków nieograniczonych ani co do ilości, ani co do wielkości, bogactwo zaś jest obfitością środków potrzebnych dla domu i państwa. Widoczną tedy jest rzeczą, że istnieje z natury pewna sztuka zdobywania dóbr, właściwa zarządcom domu i mężom stanu, i z jakiego powodu."},{"type":"paragraph","text":"10. Jest jednak inny jeszcze rodzaj sztuki zdobywania własności, który pospolicie, i to słusznie, nazywają sztuką zdobywania pieniędzy, a który sprawia, iż zdaje się nie istnieć granica bogactwa i posiadania. Ze względu na pokrewieństwo tej sztuki z omówioną, wielu uważa ją za jedno i to samo; nie jest ona jednak ta sama, co omówiona, ani daleka od tamtej, lecz jest do niej zbliżona. Pierwsza z nich jest tworem natury, druga zaś nie, a jest raczej produktem pewnego doświadczenia i umiejętności."},{"type":"paragraph","text":"14"},{"type":"paragraph","text":"11. Zacznijmy rozważania nasze o niej z następującego punktu widzenia."},{"type":"paragraph","text":"Każda rzecz posiadana może być dwojako użyta, w obu wypadkach używa się tej samej rzeczy, ale nie w ten sam sposób. W jednym wypadku użycie związane jest z właściwością danej rzeczy, w drugim zaś nie; a więc np. obuwie służy do obucia, ale może stanowić również i przedmiot wymiany. W jednym i drugim wypadku obuwie jest przedmiotem pewnego użytkowania. Nawet gdy kto potrzebującemu obuwia daje je w zamian za pieniądze lub żywność, używa obuwia jako obuwia, tylko że nie we właściwy mu sposób, bo nie zostało ono sporządzone na wymianę."},{"type":"paragraph","text":"Tak samo jest i z innymi przedmiotami własności. Wszystkie one mogą być przedmiotem wymiany, której pierwszy początek zgodny jest z naturą, gdyż jest następstwem faktu, iż jedni ludzie posiadają zbyt dużo, inni za mało rzeczy potrzebnych."},{"type":"paragraph","text":"12. Okazuje się też z tego, że drobny handel nie jest z natury złączony ze sztuką zdobywania pieniędzy, wymiana bowiem musiała się dokonywać w granicach wystarczających do zaspokojenia potrzeb koniecznych. W pierwszej zatem wspólnocie (jaką, jest rodzina) [handel wymienny] nie grał oczywiście żadnej roli, lecz dopiero gdy się wspólnota rozrosła. W pierwszym wypadku członkowie jej wszystko, co posiadali, mieli we wspólnym użytkowaniu, w drugim znów, w następstwie dokonanego rozdziału, jedni posiadali te rzeczy, inni inne, toteż musieli je zależnie od potrzeby nabywać w drodze wymiany, podobnie jak to jeszcze i teraz czyni wiele ludów barbarzyńskich."},{"type":"paragraph","text":"Te bowiem ograniczają się do tego jedynie, że rzeczy użyteczne wymieniają na takież, dając i przyjmując, np. wino za zboże i tak samo inne tego rodzaju artykuły."},{"type":"paragraph","text":"13. Taki tedy handel zamienny ani nie jest przeciwny naturze, ani nie przedstawia żadnej postaci sztuki zdobywania pieniędzy, służy bowiem do uzupełnienia samowystarczalności, zgodnie z naturą. Z kolei jednak z niego rozwinęła się owa [sztuka gromadzenia pieniędzy]. Kiedy bowiem pomoc niesiona przez przywóz rzeczy brakujących, a wywóz zbędnych, sięgać zaczęła do coraz dalszych krajów, z konieczności musiały wejść w użycie pieniądze; nie wszystkie bowiem rzeczy, z natury potrzebne, są łatwe do przewożenia."},{"type":"paragraph","text":"14. Zgodzono się zatem, aby przy wymianie dawać i przyjmować jakąś taką rzecz, która sama przez się liczyła się do rzeczy użytecznych, a równocześnie przedstawiała tę korzyść, że się z łatwością dawała przewozić, jak np: żelazo, srebro itp. Początkowo ustalano ich wartość po prostu według wielkości i wagi, w końcu jednak zaczęto wyciskać na nich znak, aby sobie oszczędzić mierzenia czy ważenia, wyciśnięty znak podawał bowiem określoną ilość."},{"type":"paragraph","text":"15. Kiedy potrzeba handlu wymiennego doprowadziła już do wynalezienia pieniądza, wyłoniła się inna postać sztuki zdobywania pieniędzy, a mianowicie drobny handel, który początkowo przedstawiał się zapewne prymitywnie, później jednak, w wyniku doświadczeń, kształtował się już kunsztowniej pod wpływem troski, skąd sprowadzać towary i jak je zbywać, aby jak największy zysk osiągnąć."},{"type":"paragraph","text":"Dlatego sztuka zdobywania majątku zdaje się być związana w pierwszym rzędzie 15"},{"type":"paragraph","text":"z pieniądzem, a głównym jej zadaniem umiejętna spekulacja, skąd zdobyć jak najwięcej pieniędzy: uchodzą bowiem one za źródło bogactwa i majątku."},{"type":"paragraph","text":"16. Także bogactwo bowiem opierają ludzie często na wielkiej ilości pieniędzy, dlatego że sztuka zarobkowania, a w szczególności handel, koło nich się jakoby obraca. Niekiedy znów spotyka się mniemanie, że pieniądz to czcze słowo, że wartość jego jest tylko na postanowieniu prawnym oparta, z natury zaś jest żadna, bo jeśli go zmienią ci, co go używają, to traci wszelką wartość i nie można go użyć do zaspokojenia jakichkolwiek potrzeb, a człowiek bogato zaopatrzony w pieniądze będzie często odczuwał brak koniecznego pożywienia. Niedorzeczną rzeczą byłoby zatem uważać za bogactwo coś takiego, czego posiadanie w obfitości nie zabezpiecza przed śmiercią głodową; przykładem ów Midas mityczny, któremu na własne jego życzenie, podyktowane niepohamowaną chciwością, zamieniało się w złoto wszystko, co mu podano23."},{"type":"paragraph","text":"17. Dlatego też [zwolennicy tego poglądu] w czym innym dopatrują się [istoty]"},{"type":"paragraph","text":"bogactwa i sztuki zdobywania pieniędzy, a czynią to słusznie. Co innego bowiem zdobywanie pieniędzy, a [co innego] bogactwo z natury. To drugie należy do gospodarstwa domowego, pierwsze zaś polega na handlu i przysparzaniu majątku wyłącznie tylko przez wymianę dóbr. Ta znów zdaje się obracać około pieniądza, pieniądz bowiem jest początkiem i kresem wymiany. Otóż takie bogactwo, płynące z takiego zdobywania pieniędzy, nie ma granic. Bo jak sztuka lekarska wytyka sobie nieosiągalny cel powszechnego ugruntowania zdrowia (a tak samo każda sztuka zmierza do jakiegoś celu bez kresu i pragnie go, o ile możności, osiągnąć, nie przyjmuje zaś za kres swój zdobycia środków do celu wiodących, we wszystkich bowiem kresem jest cel wytknięty), tak i przy zdobywaniu pieniędzy cel jest bezkresny, a jest nim takie właśnie bogactwo i posiadanie pieniędzy."},{"type":"paragraph","text":"18. W przeciwieństwie do tego sztuka gospodarstwa domowego ma swój kres, którego nie zna sztuka gromadzenia pieniędzy; inne ma ona bowiem zadanie."},{"type":"paragraph","text":"Toteż z punktu widzenia gospodarstwa domowego wydaje się, że wszelkie bogactwo winno mieć swoje granice, z doświadczenia tymczasem widzimy, że dzieje się przeciwnie. Wszyscy bowiem, którzy robią interesy pieniężne, dążą do pomnożenia pieniędzy w nieskończoność. Przyczyną tego jest pokrewieństwo sztuki gospodarstwa domowego ze sztuką gromadzenia pieniędzy. Ponieważ działają w tej samej dziedzinie, w praktyce przechodzi jedna w drugą. W jednym i drugim wypadku wchodzi w grę ta sama własność, tylko z innego punktu widzenia, jedna ma cel odmienny, drugiej celem jest powiększenie [majątku]."},{"type":"paragraph","text":"Dlatego też niektórzy uważają, że to jest właśnie rzeczą gospodarstwa domowego i upierają się przy mniemaniu, że powinno się majątek pieniężny albo utrzymać, albo pomnażać w nieskończoność."},{"type":"paragraph","text":"19. Przyczyna takiego myślenia leży w trosce jedynie o to, aby żyć, a nie o to, żeby żyć pięknie; ponieważ zaś pragnienie owo nie znajduje granic, więc ludzie 23 Arystoteles zdaje się tu iść za inną wersją znanej z Owidiusza (Metamorfozy XI 90 nn.) opowieści, według której Midas zginał jednak śmiercią głodową."},{"type":"paragraph","text":"16"},{"type":"paragraph","text":"wypadku] osiąga się zysk z samego pieniądza, który mija się tu ze swym przeznaczeniem. Stworzony bowiem został dla celów wymiany, a tymczasem przez pobieranie procentów sam się pomnaża. Stąd też pochodzi nazwa grecka procentu τόκος, tj. rodzenie. To bowiem, co się rodzi, podobne jest do rodzicieli, a procent jest pieniądzem uzyskanym z pieniądza. Toteż ten sposób zarobkowania jest w największym stopniu przeciwny naturze."},{"type":"paragraph","text":"4. Praktyczne wskazania do sztuki zarobkowania"},{"type":"paragraph","text":"1. Skorośmy rzecz dostatecznie określili od strony teoretycznej, trzeba przejść"},{"type":"paragraph","text":"[z kolei] do wskazań praktycznych. We wszystkich kwestiach tego rodzaju teoria jest przecież rzeczą swobodnego badania, natomiast praktyka uzależniona jest od warunków koniecznych. Do takich praktycznych działów sztuki zarobkowania należy odpowiednie doświadczenie co do przedmiotów własności [, pozwalające wyznać się na tym], jakie z nich największy zysk przynoszą, gdzie i jak [można go osiągnąć]; a [więc] na przykład, jak się najlepiej nabywa i sprzedaje konie, krowy czy owce, podobnie zresztą jak i inne zwierzęta (trzeba bowiem wyznawać się na tym, które z nich w porównaniu z innymi najwięcej zysku przynoszą, i to jakie w jakich miejscowościach, gdyż w jednych krajach udają się pewne gatunki, a w drugich inne). Podobnie jest z uprawą roli, i to zarówno gdy chodzi o ziemię orną, jak i o grunt pod sad; to samo dotyczy hodowli pszczół tudzież innych zwierząt, ryb czy ptaków, z których zysk można osiągnąć."},{"type":"paragraph","text":"2. Takie tedy są główne działy najbardziej właściwej sztuki zarobkowania; natomiast z form zarobkowania, opierających się na wymianie, najważniejszy jest handel. Istnieją trzy jego rodzaje: morski, śródlądowy i drobny handel, które tym różnią się od siebie, że jeden jest bezpieczniejszy od innych lub też że więcej zysku przynosi [niż drugi]. Na drugim miejscu stoi pożyczanie pieniędzy na procent, na trzecim praca najemna, występująca jako uprawianie jakiegoś kunsztu rzemieślniczego albo oddająca usługi bez znajomości tegoż, jako czysta praca fizyczna."},{"type":"paragraph","text":"Trzeci rodzaj sztuki zarobkowania stoi pomiędzy tym ostatnim a pierwszym, wykazuje bowiem pewne cechy sztuki zarobkowania opartej na naturze [jako też]"},{"type":"paragraph","text":"i [tej, która zysk czerpie] z wymiany. Należy tu wszystko, co ziemia z siebie wydaje lub co z ziemi się rodzi, a co nie będąc właściwie plonem, przecież pewien zysk przynosi, jak trzebienie lasów lub wszelkie górnictwo. To ostatnie obejmuje znów wiele rodzajów, wydobywane bowiem z ziemi materiały są wielce różnorodne."},{"type":"paragraph","text":"3. O każdym z tych sposobów zarobkowania wypowiedziałem się tu ogólnie; szczegółowe i dokładne ich omówienie byłoby wprawdzie rzeczą użyteczną przy praktycznym ich stosowaniu, ale zatrzymywać się tu dłużej nad nimi byłoby uciążliwe. Najkunsztowniejsze z zajęć są te, przy których przypadek najmniejszą gra rolę, najwięcej rzemieślnicze te, które powodują największe znużenie fizyczne, najbardziej niewolnicze zaś te, w których najwięcej stosuje się siłę fizyczną, a najpodlejsze, gdzie najmniej potrzeba cnoty."},{"type":"paragraph","text":"17"},{"type":"paragraph","text":"4. Ponieważ o tych sprawach pisali niektórzy, np. Chares z Paros i Apollodor z Lemnos24 o rolnictwie i sadownictwie, a podobnie inni o innych rzeczach, więc kto się tymi zagadnieniami interesuje, niech do nich się zwróci. Ponadto należałoby też zbierać rozproszone wiadomości o tym, w jaki sposób pewni ludzie zdołali dojść do majątku. Wszystko to bowiem jest użyteczne dla wyznawców sztuki gromadzenia pieniędzy."},{"type":"paragraph","text":"5. Przytoczę tu dla przykładu opowieść o Talesie z Miletu25. Chodzi w niej bowiem o pewną spekulację zarobkową, którą mu przypisują ze względu na jego mądrość, w której jednak wyraża się pewna ogólna reguła. Kiedy bowiem, wskazując na jego ubóstwo, robiono mu zarzut, że filozofia żadnego nie przynosi pożytku, Tales podobno, przewidując na podstawie swych wiadomości astrologicz-nych, że zbiór oliwek będzie obfity, z niewielkich pieniędzy, jakimi rozporządzał, dał zadatek jeszcze w zimie na wszystkie prasy do oliwek w Milecie i na Chios, a ponieważ nikt nie dawał więcej, za niską cenę je wynajął. Kiedy zaś nadeszła właściwa pora i nagle wielu ludzi naraz poczęło ich poszukiwać, wynajmował je za cenę, jaką zechciał, a zebrawszy w ten sposób wielkie pieniądze, wykazał, ze dla filozofów łatwą jest rzeczą zgromadzenie bogactwa, jeśli tylko zechcą, tylko że nie to jest celem, do którego ich wysiłki zdążają."},{"type":"paragraph","text":"6. W taki to sposób miał Tales dać próbę swej mądrości. Jest to jednak, jak powiedziałem, jeden z pospolitych sposobów robienia majątku, że ktoś zdoła sobie zapewnić na coś wyłączność. Dlatego i niektóre z państw, gdy im zabraknie pieniędzy, sięgają do tego źródła dochodów, wprowadzają bowiem monopol na sprzedaż pewnych towarów."},{"type":"paragraph","text":"7. Tak i na Sycylii raz pewien człowiek za złożone u niego pieniądze wykupił"},{"type":"paragraph","text":"w hutach żelaznych wszelkie zapasy żelaza, a następnie, kiedy z różnych miast handlowych zjawili się kupcy, sam jeden je sprzedawał z niewielką nawet podwyżką ceny; mimo to przecież na pięćdziesięciu talentach zarobił aż sto."},{"type":"paragraph","text":"8. Gdy się o tym dowiedział Dionizjos26, pozwolił mu wprawdzie wywieźć z Syrakuz pieniądze, ale zabronił dalszego pobytu, zarzucając mu, iż otwiera sobie źródła dochodu, które się z jego interesami nie godzą. Pomysł Talesa, jak i tego drugiego, jest zupełnie tego samego rodzaju, obaj bowiem przez swą przemyślność stworzyli sobie monopol. Wyznawać się na tych sprawach jest i dla polityków rzeczą użyteczną. Wiele bowiem państw potrzebuje spekulacji pieniężnych i tego rodzaju źródeł dochodu, podobnie zresztą jak i dom, tylko w wyższym jeszcze stopniu. Dlatego tez działalność niektórych polityków idzie w tym jedynie kierunku."},{"type":"paragraph","text":"24 Chares z Paros, skądinąd nieznany. F. Susemihl łącząc następującą partykułę δη z Χάρητι"},{"type":"paragraph","text":"proponował tu lekcję Χαρητίδη, a więc imię Charetides Apollodora z Lemnos cytuje jako swe źródło Warron (De re rustica I 1, 8) i wielokrotnie Pliniusz Starszy (Nat. hist. I 8, 10, 14, 15, 17, 18), ale ani o dziele jego, am o nim samym nic me wiadomo 25 Pierwszy filozof grecki z VI w p.n e , mąż stanu, matematyk i astronom, który przepowiedział"},{"type":"paragraph","text":"zaćmienie słońca 28 maja 585 r. p.n.e."},{"type":"paragraph","text":"26 Tyran syrakuzański (405 - 367 p.n.e)."},{"type":"paragraph","text":"18"},{"type":"paragraph","text":"5. Działem nauki o gospodarstwie domowym"},{"type":"paragraph","text":"jest stosunek męża do żony i ojca do dzieci."},{"type":"paragraph","text":"Troska o doskonalenie członków rodziny"},{"type":"paragraph","text":"obowiązkiem głowy domu"},{"type":"paragraph","text":"1. W nauce o gospodarstwie domowym są trzy działy: jeden dotyczy stosunku pana do niewolników, o których była mowa poprzednio, drugi — stosunku ojca do rodziny, a trzeci — męża do żony. Władza nad żoną i dziećmi dotyczy w obu wypadkach osób wolnych, a jednak nie jest to ten sam rodzaj władzy, bo w stosunku do żony ma ona charakter władzy kierownika wolnego państwa, w stosunku do dzieci charakter władzy królewskiej."},{"type":"paragraph","text":"2. Mężczyzna bowiem z natury jest więcej uzdolniony do władania aniżeli kobieta, o ile wbrew naturze nie zajdzie wyjątek w tym względzie, podobnie jak więcej jest do tego uzdolniony człowiek starszy i dojrzalszy niż młody i niedojrzały."},{"type":"paragraph","text":"W największej części państw [wolnych] dokonuje się co prawda wymiana między warstwą rządzącą a rządzoną, będąca wyrazem naturalnej dążności do wyrównania i zatarcia wszelkich różnic, mimo to jednak, jak długo jedni rządzą, a drudzy są rządzeni, starają się o zaznaczenie różnicy przez zewnętrzne odznaki, tytuły i honory (to właśnie też [miał na myśli] Amasis mówiąc o miednicy do mycia nóg]27. Natomiast stosunek mężczyzny do kobiety jest zawsze taki sam."},{"type":"paragraph","text":"Władza nad dziećmi ma znów charakter władzy królewskiej. Rodziciel bowiem włada na zasadzie miłości jako też starszeństwa, co właśnie jest znamieniem władzy królewskiej. Dlatego to i Homer, nazywając Zeusa „ojcem ludzi i bogów”"},{"type":"paragraph","text":"słusznie mieni go królem ich wszystkich. Król bowiem musi z natury wyróżniać się, choć jest tego samego rodu [co poddani], a tak samo przedstawia się stosunek starszego do młodszego, tudzież rodziciela do dziecka."},{"type":"paragraph","text":"3. Jasną jest tedy rzeczą, że głowa domu więcej się troszczy o ludzi niż o posiadanie rzeczy martwych, więcej o doskonalenie pierwszych aniżeli o obfitość drugich, którą zwiemy bogactwem, i to raczej o doskonalenie wolnych niż niewolników. Co się tyczy niewolników, to przede wszystkim może się nasuwać wątpliwość, czy ci, prócz swej użyteczności jako narzędzie i posługa, posiadają ponadto cenniejsze od tego cnoty, jako to: umiarkowanie, męstwo, sprawiedliwość i inne tym podobne zalety, czy też prócz sprawności w fizycznych usługach nie posiadają żadnej cechy dodatniej. Czy tak, czy inaczej na to pytanie odpowiemy, trudności nie znikną. Bo jeśli [przyznamy, że] posiadają inne cnoty, to czymże różnić się będą od wolnych, a jeśli damy przeczącą odpowiedź, to będzie ona 27 Według Herodota ( Dzieje II 172) król egipski Amasis (568 -525), który zasiadł na tronie po obaleniu swego poprzednika Apriesa, lekceważony przez poddanych z powodu swego skromnego pochodzenia, kazał sporządzić ze złotej miednicy, służącej do mycia nóg, wizerunek boga, któremu Egipcjanie cześć zaczęli oddawać. Wówczas Amasis miał się odezwać: „Oddajecie cześć boską temu posągowi, choć był do niedawna miednicą, w której się nogi myło. Ja też wyszedłem z ludu, a skoro teraz jestem królem, żądam, aby mi cześć odpowiednią oddawano”."},{"type":"paragraph","text":"19"},{"type":"paragraph","text":"niedorzeczna wobec faktu, że jednak niewolnicy są ludźmi i na równi z nimi posiadają rozum."},{"type":"paragraph","text":"4. Ta sama niemal wątpliwość dotyczy również kobiety i dziecka: czy też posiadają takie cnoty, a więc czy żona musi być mądra, dzielna, sprawiedliwa, czy dziecko bywa i swawolne, i roztropne, czy też nie? Krótko mówiąc, trzeba w ogóle zbadać, czy ten, co jest podległy z natury, posiada tę samą cnotę, co i władający z natury, czy też inną. Jeśli bowiem jeden i drugi ma wykazywać cechy piękne i dobre, to dlaczegoż by jeden miał raz na zawsze władać, drugi zaś podlegać?"},{"type":"paragraph","text":"Różnica między nimi nie sprowadza się do pytania „mniej czy więcej”, bo poddaństwo i władztwo różnią się co do swej istoty, wzgląd zaś natury ilościowej nie gra tu żadnej roli."},{"type":"paragraph","text":"5. Jeśliby zaś jeden musiał posiadać owe cechy, a drugi nie, to byłoby to rzeczą dziwną. Bo albo władający nie będzie umiarkowany i sprawiedliwy, a w takim razie jakżeż będzie dobrze panował? Albo nie będzie nim poddany, a w takim razie jakżeż będzie spełniał dobrze swe obowiązki podwładnego? Jeśli bowiem będzie swawolny i gnuśny, to nic nie zrobi z tego, co do niego należy. Okazuje się tedy, że jeden i drugi koniecznie winien wykazywać pewną doskonałość względnie cnotę, a taka jest różnica między tymi cnotami, jaka istnieje między poddanymi z natury a władającymi. Jako przykład tego nasuwa się tu bezpośrednio dusza."},{"type":"paragraph","text":"Mieści się w niej bowiem czynnik i panujący z natury, i podległy, którym różną przypisujemy cnotę, gdyż jeden posiada rozum, a drugi jest nierozumny."},{"type":"paragraph","text":"6. Jasne jest więc, że tak samo ma się rzecz i w innych wypadkach, tak iż z natury są różne rodzaje władających i podległych. Inaczej bowiem przedstawia się władza wolnego nad niewolnikiem, a inaczej mężczyzny nad kobietą, czy ojca nad synem. U nich wszystkich występuje składnik psychiczny, jednakowoż z pewnymi różnicami. Niewolnik bowiem nie posiada w ogóle zdolności do rozważania, kobieta posiada ją wprawdzie, ale niezbyt kompetentną, dziecko posiada ją również, ale nierozwiniętą w pełni."},{"type":"paragraph","text":"7. Należy więc przyjąć, że tak sarno ma się rzecz z cnotami etycznymi, że zatem wszyscy muszą je posiadać, ale z pewnymi różnicami zależnymi od zadania, jakie każdemu przypada do spełnienia. Dlatego władający powinien posiadać pełnię doskonałości etycznej (zadanie jego jest bowiem po prostu zadaniem budowniczego, a budowniczym jest rozum), natomiast wszyscy inni o tyle tylko, o ile tego ich zadanie wymaga."},{"type":"paragraph","text":"8. Oczywiste więc jest, że wszystkie wymienione tu osoby posiadają cnotę etyczną, że jednak umiarkowanie czy też dzielność i sprawiedliwość kobiety i mężczyzny nie jest taka sama, jak to mniemał Sokrates28, lecz istnieje dzielność władającego i dzielność służącego, a podobnie ma się rzecz i z innymi cnotami."},{"type":"paragraph","text":"Okazuje się to także przy bardziej szczegółowym rozważaniu. Samych siebie bowiem łudzą ci, którzy, ogólnie rzecz ujmując, utrzymują, że cnota jest to dobry stan duszy lub też właściwe działanie, czy coś podobnego; o wiele lepiej od tych, 28 W dialogu Platona Menon (73 B)."},{"type":"paragraph","text":"20"},{"type":"paragraph","text":"którzy taką definicję podają, postępują ci, którzy jak Gorgiasz29 rozpatrują każdą cnotę z osobna. Dlatego, jeśli poeta30 sławi pewną cnotę jako właściwą kobiecie, mówiąc, że „milczenie stanowi ozdobę kobiety”, to należy przyjąć, że [wszyscy inni również posiadają właściwe sobie cnoty, bo milczenie będące ozdobą kobiety]"},{"type":"paragraph","text":"przestaje nią być u mężczyzny."},{"type":"paragraph","text":"9. Także i niedojrzałe dziecko nie posiada oczywiście samodzielnego charakteru, ale dzielność jego polega na odpowiednim ustosunkowaniu się przez niego do celu wychowania i osoby kierownika, podobnie jak cnota niewolnika na właściwym zachowaniu się wobec pana. Wykazaliśmy poprzednio, że niewolnik jest użyteczny tylko do robót koniecznych, toteż jasną jest rzeczą, że potrzeba mu tylko nieznacznej cnoty, i to o tyle tylko, aby nie zaniedbywał swych zadań przez swawolę czy lenistwo."},{"type":"paragraph","text":"10. Jeżeli to, co teraz powiedziałem, jest prawdziwe, to mógłby ktoś zapytać, czy i zwykli rzemieślnicy nie powinni by cnoty posiadać, często bowiem przez swawolę zaniedbują swą pracę. Jest tu jednak wielka różnica. Niewolnik bowiem żyje razem ze swym panem, rzemieślnik zaś stoi dalej od niego i wykazuje w stosunku do niego tylko tyle znamion cnoty, co i niewolnictwa. Pośledni rzemieślnik żyje mianowicie w pewnej ograniczonej niewoli, a nadto niewolnik należy do tych, którzy z natury są tym, czym są, czego nie można jednak powiedzieć o żadnym szewcu czy jakimkolwiek innym rzemieślniku."},{"type":"paragraph","text":"11. Okazuje się więc z tego, że niewolnikowi powinien wpajać właściwą cnotę pan, a nie ten, kto mając władzę pana poucza go o spełnianiu właściwych obowiązków. Dlatego w błędzie są ci, którzy mówią, że nie należy niewolników poprawiać przez rozumne zwrócenie uwagi, a tylko im rozkazywać, niewolnikom bowiem powinno się więcej przemawiać do rozumu aniżeli dzieciom."},{"type":"paragraph","text":"Ale dosyć na tym! O mężczyźnie zaś i kobiecie, o dzieciach i ojcu, o właściwej każdemu z nich cnocie i o stosunku wzajemnym między nimi, a mianowicie, co w nim jest pięknego, a co niepięknego, jak i o tym, jak się dążyć powinno do osiągnięcia dobrego, a unikania złego, trzeba będzie pomówić jeszcze w wywodach o ustrojach państwowych31."},{"type":"paragraph","text":"12. Skoro bowiem każda rodzina jest częścią państwa, a wspomniane osoby są częścią rodziny, cnotę zaś członów należy rozpatrywać w stosunku do cnoty całości, więc dzieci i kobiety trzeba koniecznie wychowywać, mając na oku istniejący ustrój, jeżeli stanowi to jakąś różnicę dla sprawności państwa, czy dzieci i kobiety są dzielne, czy nie. Że tak, to Oczywistą jest rzeczą: kobiety przedstawiają 29 Na Gorgiasza powołuje się Sokrates w dialogu Platona Menon (73 C), zwracając się do Menona ze słowami: „Ponieważ cnota wszystkich jest taka sama, spróbuj powiedzieć i przypomnieć sobie, co mówi o jej istocie Gorgiasz, a ty razem z nim”. [Por. “Ponieważ wiec wszyscy posiadają tę samą cnotę, postaraj się przypomnieć sobie i powiedzieć, czym ona jest zdaniem Gorgiasza i twoim wraz z nim”"},{"type":"paragraph","text":"(przeł. P. Siwek, Gorgias. Menon , Warszawa 1991)]."},{"type":"paragraph","text":"30 Sofokles w tragedii Ajas (293)."},{"type":"paragraph","text":"31 Ani w Polityce, ani w żadnym innym zachowanym dziele Arystoteles zagadnień tych jednak nie roztrząsa."},{"type":"paragraph","text":"21"},{"type":"paragraph","text":"przecież połowę wolnej ludności, a z chłopców wyrastają mężowie, którzy mają brać udział w zarządzie państwa."},{"type":"paragraph","text":"Skoro o jednych rzeczach już się tu dostatecznie wypowiedziałem, a o innych trzeba będzie mówić w innym związku, więc zakończywszy obecne wywody, przejdźmy do innych rozważań i przede wszystkim weźmy pod uwagę poglądy tych, którzy pisali o najlepszym ustroju państwa."}],"audio_pl":["audio/ch01-part000.mp3","audio/ch01-part001.mp3","audio/ch01-part002.mp3","audio/ch01-part003.mp3","audio/ch01-part004.mp3","audio/ch01-part005.mp3"]},{"id":"księga-druga","number":3,"title":"Księga druga","blocks":[{"type":"paragraph","text":"1. Krytyka teorii wyłożonych w «Państwie» Platona co do wspólności kobiet i dzieci"},{"type":"paragraph","text":"1. Ponieważ wziąłem sobie za zadanie rozważyć, która z wszelkich wspólnot państwowych jest najlepsza dla ludzi, mogących sobie życie urządzić w sposób jak najbardziej odpowiadający ich życzeniu, więc musimy przypatrzyć się innym ustrojom, które albo istnieją rzeczywiście w niektórych państwach, uchodzących za dobrze się rządzące, albo też opracowane zostały przez pewnych teoretyków, a spotkały się z uznaniem. [Chodzi mi przy tym o to,] aby wykazać, co w nich jest słuszne i użyteczne, a zarazem nie stwarzać wrażenia, jakobym przez poszukiwanie czegoś odmiennego od nich pragnął się popisać swoją mądrością. Przeciwnie, chciałbym, aby się okazało, że dlatego podjąłem to badanie, ponieważ te istniejące obecnie ustroje nie przedstawiają się zadowalająco."},{"type":"paragraph","text":"2. Musimy najpierw zacząć od tego, co z natury rzeczy stanowi punkt wyjścia tego badania. Trzeba mianowicie przyjąć trzy ewentualności, a więc: albo wszystko jest wspólne dla wszystkich obywateli, albo nic, albo też tytko pewne rzeczy są wspólne, pewne zaś nie. Żeby nie było między nimi nic wspólnego, to oczywiście jest rzeczą niemożliwą. Państwo bowiem jest pewną wspólnotą, do której istoty należy z konieczności przede wszystkim wspólność miejsca; pewna jednostka terytorialna jest bowiem warunkiem jednostki państwowej, a obywatele są członkami wspólnoty jednego [i tego samego] państwa."},{"type":"paragraph","text":"Wyłania się natomiast pytanie, czy dla państwa, które ma być dobrze urządzone, lepiej jest, aby w nim wszystko było wspólne, czy też lepiej, by pewne rzeczy były wspólne, a pewnie nie. Obywatele przecież mogą mieć wspólne i dzieci, i żony, i posiadłości, jak to jest w Państwie Platona. Mówi tam bowiem Sokrates, że dzieci, kobiety i majątki powinny wspólną stanowić własność1. Cóż tedy jest lepsze, czy stan istniejący obecnie, czy też nakreślony w Państwie porządek prawny?"},{"type":"paragraph","text":"3. Powszechna wspólność kobiet ma w ogóle wiele stron przykrych, a i powód, dla którego Sokrates uznaje takie urządzenie za konieczne do zaprowadzenia, nie 1 Por Platon, Państwo, ks. V, rozdz.7."},{"type":"paragraph","text":"22"},{"type":"paragraph","text":"wynika jasno z jego wywodów. Jest ona ponadto, w takim ujęciu, niemożliwa do pogodzenia z celem, który według niego państwo winno urzeczywistniać; jakie zaś rozróżnienie byłoby tu potrzebne, o tym nic nie powiedziano. Mam tu na myśli pogląd, który wypowiada Sokrates2, że najwyższym dobrem jest jedność państwa jak najbardziej zupełna."},{"type":"paragraph","text":"4. Jasną przecież jest rzeczą, że państwo postępujące i rozwijające się ku coraz ściślejszej jedności, przestanie w ogólne być państwem. Państwo bowiem z natury jest pewną wielością, jeśli więc rozwijać się będzie ku coraz większej jedności, to z państwa powstanie rodzina, z rodziny zaś jednostka. Rodzina bowiem, jak każdy uzna, przedstawia ściślejszą jedność aniżeli państwo, a jednostka ściślejszą niż rodzina. Toteż gdyby nawet ktoś potrafił to uskutecznić, to nie powinien tego czynić, zniweczy bowiem państwo."},{"type":"paragraph","text":"Państwo składa się jednak nie tylko z większej liczby osób, ale i z osób różnorodnych; bo z osób zupełnie jednakich państwo powstać nie może. Państwo to co innego niż związek sprzymierzeńców dla celów wojennych, którego użyteczność polega na mnogości członków, choćby ci byli tego samego rodzaju (związek taki powstaje bowiem z natury dla celów wzajemnej pomocy); jest to podobnie jak z ciężarkiem, który im większy, tym silniej wagę przechyli."},{"type":"paragraph","text":"5. Taka sama różnica będzie między państwem a ludem, gdy ludność cała nie żyje rozproszona po wsiach, ale tak jak Arkadyjczycy3. Części składowe, z których ma powstać całość, muszą być różnego rodzaju, a równość polega na wzajemności świadczeń oraz odpłat i dlatego utrzymuje państwa, jak to wyłożyłem poprzednio w dziele o etyce4. Nawet między wolnymi i równymi musi istnieć ta wzajemność czy kolejność świadczeń, bo nie mogą wszyscy równocześnie władać, lecz musi się dokonywać wymiana czy to corocznie, czy też według jakiegoś innego porządku lub czasu. W ten sposób osiąga się to, że wszyscy dochodzą do władzy, czyli jest tak, jak gdyby szewcy i cieśle wymieniali swe zajęcia i ci sami ludzie nie byli stale szewcami czy cieślami."},{"type":"paragraph","text":"6. Ponieważ jednak [faktycznie pracę cieśli pełni stale cieśla, a szewc pracę szewca i lepsze się w ten sposób osiąga skutki, więc]5 lepiej, żeby tak było i we wspólnocie państwowej, bo jasną jest rzeczą, że zawsze lepiej rządzą ci sami ludzie, jeśli to tylko możliwe. Gdzie to jednak jest niemożliwe ze względu na to, że wszyscy z natury są równi, a więc że sprawiedliwą rzeczą jest również, by wszyscy brali udział w rządach niezależnie od tego, czy one są złe, czy dobre, tam 2 Tamże, ks. V, rozdz. 10."},{"type":"paragraph","text":"3 Arkadyjczycy zachowali organizację plemienną, ale wchodzące w jej skład gminy miejskie posiadały niemal zupełną samodzielność polityczną, tak ze niewiele różniła się ona od związku państw sprzymierzonych celem wspólnej obrony. Toteż Arystoteles słusznie odróżnia od nich „lud”, czyli te szczepy greckie, które w pełni zachowały organizacje plemienną bez ośrodka miejskiego, z ludnością rozproszoną po wsiach, nie posiadających politycznej samodzielności 4 Et. nik., ks. V, rozdz. 8 (1132 b)"},{"type":"paragraph","text":"5 W tekście przekazanym jest tu oczywista luka, w której zatraciło się zdanie łączące myśl poprzedniego zdania z następnym, dająca się przypuszczalnie uzupełnić tak, jak podano w nawiasach."},{"type":"paragraph","text":"23"},{"type":"paragraph","text":"stosuje się takie urządzenia, że równi ustępują kolejno i zrównują się z innymi po złożeniu władzy. Jedni bowiem władają, a drudzy podlegają władzy na przemian, jak gdyby innymi się stali. W taki sam sposób występuje też różnica między władającymi, ponieważ jedni tę, a drudzy inną wykonują władzę."},{"type":"paragraph","text":"7. Widoczne jest więc z tego, że państwo bynajmniej nie przedstawia z natury takiej jedności, jak to twierdzą niektórzy, i że to, co się podaje jako najwyższe dobro w państwach, właściwie je niweczy. A przecież to, co w jakiejś rzeczy jest dobre, winno ją podtrzymywać. Także i z innych jednak względów okazuje się, że dążenie do nadmiernej jednolitości państwa nie jest rzeczą lepszą. Rodzina bowiem jest w wyższym stopniu samowystarczalna niż jednostka, a państwo więcej niż rodzina; jakoż państwo wówczas dopiero będzie państwem, gdy wspólnota jego ludności dojdzie do stanu samowystarczalności. Jeśli więc wyższy stopień samowystarczalności więcej jest pożądany, to i mniej ścisła jedność jest więcej pożądana niż bardziej zwarta."},{"type":"paragraph","text":"8. Gdyby jednak nawet przyjąć, że jest istotnie najlepiej, by społeczność była jak najbardziej jednolita, to przecież okaże się, że jedność ta bynajmniej nie przejawia się w powiedzeniu, które by wszyscy powtarzali, mówiąc: „to moje”, a „to nie moje”; to bowiem uważa Sokrates za oznakę zupełnej jedności państwa6."},{"type":"paragraph","text":"Słowo „wszyscy” posiada mianowicie podwójne znaczenie. Jeśliby je ująć w znaczeniu „każdy z osobna”, to raczej wynikłoby może z niego to, czego chce Sokrates, bo każdy powie o swym synu „to jest mój syn”, i o żonie „to jest moja żona”, a tak samo powie o swoim majątku i wszystkich rzeczach, które z nim mają związek."},{"type":"paragraph","text":"9. Jednakowoż ci, którzy mają wspólne żony i dzieci, tak się nie wyrażą o nich, lecz wszyscy wprawdzie tak powiedzą: „one należą do nas”, natomiast nikt z nich z osobna tak nie powie: „one należą do mnie”. Podobnie powiedzą wszyscy o majątku, [że jest ich własnością,] ale nikt z nich z osobna nie będzie twierdził [, że on należy do niego]. Oczywistą zatem jest rzeczą, że w słowie „wszyscy” mieści się pewna dwuznaczność wiodąca do fałszywych wniosków, wyrażenia bowiem takie jak „wszyscy”, „obaj”, „nieparzysty” i „parzysty”, przez swe podwójne znaczenie stwarzają w rozumowaniu podstawę do fałszywych wniosków. Dlatego [i w tym wypadku], jeśli przyjmiemy, że „wszyscy” [w pierwszym znaczeniu]"},{"type":"paragraph","text":"określają tę samą rzecz [jako swoją własność], będzie to pięknie, ale jest niemożliwe, [jeśli] zaś [powiemy „wszyscy”] w drugim znaczeniu, nie będzie to bynajmniej stanowić dowodu jednomyślności."},{"type":"paragraph","text":"10. Prócz tego wspomniany porządek ma jeszcze inną stronę ujemną. To, co jest wspólną własnością bardzo wielu, jest najmniej otoczone staraniem. Ludzie bowiem zwykli troszczyć się przede wszystkim o swoją własność, mniej zaś o wspólną lub też o tyle tylko, o ile dotyczy ona któregoś z nich. Prócz innych względów gra tu rolę i ta okoliczność, iż zaniedbanie przychodzi im łatwiej, gdy 6 Platon, Państwo, ks. V, rozdz. 10 (462C)."},{"type":"paragraph","text":"24"},{"type":"paragraph","text":"mogą przypuścić, że inni o daną rzecz się troszczą, podobnie jak nieraz przy posługach domowych liczniejsza służba gorzej obsługuje niż mniej liczna."},{"type":"paragraph","text":"11. Każdy z obywateli ma tedy z tysiąc synów, ci jednak nie są z żadnym z nich związani, lecz ten czy ów jest zarówno synem tego lub innego obywatela; toteż wszyscy jednakowo niewiele o nich dbać będą."},{"type":"paragraph","text":"Każdy przecież, który mówi „mój” o młodym obywatelu bez względu na to, czy mu się powodzi dobrze czy źle, czyni to z takim zainteresowaniem, jakie jest odpowiednikiem stosunku mówiącego do ogólnej liczby ojców; bo jeśli mówi o kimś: „mój syn” czy „syn tamtego”, to w taki sposób mówi o każdym z tysiąca obywateli, czy ilu ich tam liczy państwo, a i to z niepewnością, skoro nie wiadomo, któremu z nich właśnie urodziło się dziecko i czyje dziecko po urodzeniu pozostało przy życiu.7"},{"type":"paragraph","text":"12. Czy to wszakże lepiej, żeby każdy mówił „mój”, odzywając się w ten sposób do dwóch lub dziesięciu tysięcy, czy też może lepiej tak raczej stosować odezwanie „mój”, jak to się obecnie czyni w państwach. Jeden bowiem zwraca się do syna swego, drugi do brata swego z takim właśnie mianem, inny jeszcze do brata stryjecznego czy ciotecznego lub jakiegoś innego krewnego, a czyni się to i ze względu na pokrewieństwo, i przyjaźń, i powinowactwo łączące z kimś samego przemawiającego w pierwszym rzędzie lub też kogoś z jego bliskich; tak też w końcu ktoś inny odzywa się do swego towarzysza we fratrii i fyli. I lepiej chyba być rzeczywistym bratankiem aniżeli synem tamtego rodzaju."},{"type":"paragraph","text":"13. Nawet jednak w warunkach takiej wspólności nie da się tego uniknąć, żeby się niektórzy nie domyślali swoich braci, dzieci, ojców i matek, podobieństwo bowiem, które występuje między dziećmi a rodzicami, dostarczy z konieczności dowodów wzajemnego stosunku. Jakoż niektórzy z autorów, którzy dali opisy dalekich ludów i krajów, opowiadają, że to się istotnie zdarza; u niektórych ludów górnej Libii8 istnieje mianowicie wspólność kobiet, a jednak dzieci, które się rodzą, rozdziela się według podobieństwa. Są przecież i między zwierzętami niektóre samice, jak np. klacze i krowy, które cechuje wyraźnie ta właściwość, że płodzą młode podobne do ojców. Taką była też ta klacz w Farsalos, którą zwano Dikaia9."},{"type":"paragraph","text":"7 Według Platona (Państwo 457 C - 464 B), z którym tu Arystoteles polemizuje, wszystkie dzieci członków przewodniej warstwy, tzw. strażników pomyślanego przezeń państwa, mają być odbierane po urodzeniu matkom i o ile ze względu na ułomność nie zostaną wyrzucone, mają być wychowywane w publicznych zakładach, nie znając rzeczywistych rodziców. W następstwie tego, zależnie od ugrupowania wedle wieku, jedni stanowić by mieli grupę rodziców czy dziadków, drudzy dzieci czy wnuków, lub w stosunku do członków tej samej grupy — rodzeństwo."},{"type":"paragraph","text":"8 Arystoteles ma tu może na myśli plemię Auschisów, mieszkające nad jeziorem Trytonis w Libii, o którym pisze Herodot (Dzieje IV 180), albo plemię Garamantów na południe od Trypolitanii, gdzie według Pomponiusza Meli (De chorographia I 8) również istniała wspólność kobiet."},{"type":"paragraph","text":"9 O klaczy z Farsalos mówi też Arystoteles w Zoologii (ks. VII, rozdz 6). niektóre zwierzęta wydają na świat młode, które są do nich podobne, inne zaś rodzą młode, które są podobne do ojca, jak np klacz z Farsalos, którą zwano Dikaia (Sprawiedliwa)."},{"type":"paragraph","text":"25"},{"type":"paragraph","text":"14. A dalej, tym, którzy wspólność taką wprowadzają, niełatwo jest zabezpieczyć się przed takimi zjawiskami ujemnymi, jak zranienia i zabójstwa (tak mimowolne, jak i zamierzone), bijatyki i zelżenia, wszystko czyny, które są wysoce niegodziwe w stosunku do ojców, matek i krewnych, zarówno bliskich, jak i dalekich."},{"type":"paragraph","text":"A przecież wypadki takie muszą się częściej powtarzać między ludźmi sobie nie znanymi aniżeli pomiędzy znanymi, a jeśli się i wydarzą, to gdy chodzi o ludzi sobie znanych, można zastosować odpowiednie zadośćuczynienie, w innym wypadku zaś nie."},{"type":"paragraph","text":"15. Niedorzecznością jest też, jeśli się zaprowadza wspólność synów i zabrania się kochającym przestawać ze sobą, a nie zabrania się stosunków miłosnych i innych czułości, które, jak już samo tylko pożądanie, w najwyższym stopniu są niewłaściwe między ojcem a synem i bratem a bratem10. Niedorzecznością jest również nie pozwalać na obcowanie cielesne z tej tylko przyczyny, że rozkosz nadmiernie się potęguje11, a uważać za rzecz zupełnie obojętną, że chodzi o stosunek między ojcem a synem lub pomiędzy braćmi."},{"type":"paragraph","text":"Wspólność kobiet i dzieci mogłaby zresztą przynieść państwu pożytek, gdyby istniała raczej u rolników niż u strażników państwa; gdzie bowiem dzieci i kobiety będą wspólne, tam nie tak łatwo się nawiążą stosunki przyjazne, a wskazaną jest rzeczą, by poddani nie byli zbyt zgodni, bo wtedy są potulni i nie myślą o buntach."},{"type":"paragraph","text":"16. W ogóle przez takie prawo osiąga się z konieczności coś przeciwnego, niż to dać winny dobrze ujęte prawa, a i to z tego powodu, dla którego Sokrates uważa za konieczne takie urządzenie stosunków dzieci i kobiet. Wzajemną miłość uważamy mianowicie za największe z dóbr w państwach (bo gdzie ona panuje, tam najmniej się przejawiają rozruchy), a właśnie jedność w państwie wysławia Sokrates najwięcej, podnosząc, zgodnie z mniemaniem i innych, iż jest ona dziełem miłości. Znane jest przecież powiedzenie Arystofanesa w rozmowach o miłościl2, ze kochający się, pociągnięci potęgą swego uczucia, pragną się zrosnąć i z dwóch istot zespolić się oboje w jedną."},{"type":"paragraph","text":"17. W ten sposób muszą tedy zginąć oboje albo przynajmniej jedno z nich; natomiast w państwie, wobec takiej wspólności, miłość stanie się z konieczności jakby rozwodniona i niemal jest niemożliwe, by ojciec powiedział „mój” o synu albo syn o ojcu. Bo tak jak nieznaczna ilość słodyczy domieszana do wielkiej ilości wody staje się niedostrzegalna w mieszaninie, tak też i z uczucia wzajemnego 10 Polemika z Państwem Platona (ks III, rozdz 12, 403 B), gdzie powiedziano w mieście, które zakładamy, wolno kochać i obcować z kochankiem i dotykać go jak syna, bo tak czasem pięknie, jeśli on nie ma nic przeciw temu A poza tym, jeżeli się ktoś kimś interesuje, tak powinien z nim obcować, aby to nigdy me wyglądało na zbliżenie dalej idące 11 Tak u Platona (Państwo 403 A), gdzie Sokrates zapytuje „A umiesz wymienić rozkosz większą i ostrzejszą niźli rozkosz płciowa?” [przeł W Witwicki, Warszawa 1953, t I, s 163]"},{"type":"paragraph","text":"12 Zob Platon, Uczta 192 C nn W usta Arystofanesa wkłada tu Platon opowieść, ze pierwotnie prócz mężczyzn i kobiet istnieli tzw androgyni, czyli istoty łączące cechy męskie i kobiece, z czterema rękami i czterema nogami, szybko się poruszające, a obdarzone taką siłą, ze uważali się za równych bogom Toteż Zeus przeciął je i od tego czasu podzielone części szukają się, by się znów zjednoczyć"},{"type":"paragraph","text":"26"},{"type":"paragraph","text":"przywiązania, złączonego z tymi mianami ojca i syna, niewiele się da zauważyć w takim państwie, ponieważ jest rzeczą nieuniknioną, że ani ojciec nie będzie się tu bynajmniej troszczył o synów, ani syn o ojca, ani też bracia o siebie wzajemnie."},{"type":"paragraph","text":"Dwie mianowicie są rzeczy, które przede wszystkim budzą u ludzi uczucie troski i miłości: osobista własność i ukochana istota; tymczasem w państwie o takim ustroju nie może być miejsca ani dla jednego, ani dla drugiego."},{"type":"paragraph","text":"18. Jednakowoż także i zagadnienie przenoszenia rodzących się dzieci jednych ze stanu rolników i rzemieślników do stanu strażników lub odwrotnie, z tego ostatniego stanu do tamtych 13, nastręcza wiele trudności co do sposobu [przeprowadzenia]; przecież ci, co dzieci oddają i zamieniają, muszą wiedzieć, komu kogo przekazują. W takich razach muszą ponadto występować częściej wspomniane wyżej zjawiska, jak katowanie, rozpusta i mordy, bo przecież ci, którzy oddani zostali do innej grupy obywateli z klasy strażników, nie nazywają już tych ostatnich braćmi, dziećmi, ojcami czy matkami i tak samo umieszczone w grupie strażników [dzieci] innych obywateli, skutkiem czego wzgląd na pokrewieństwo nie stanowi już zapory dla takich czynów."},{"type":"paragraph","text":"Tyle zatem o wspólności dzieci i kobiet."},{"type":"paragraph","text":"2. Krytyka wspólności dóbr"},{"type":"paragraph","text":"1. W związku z tym trzeba by z kolei zbadać, jak w państwach, które pragną posiadać najlepszy ustrój, powinna być urządzona sprawa własności, a mianowicie: czy własność ma być wspólna, czy nie. Można ten przedmiot roztrząsać również i niezależnie od prawodawstwa, określającego stosunek do dzieci i kobiet. Jeśli więc zostawimy kwestię wspólności kobiet i dzieci na boku, uznając za słuszny sposób, w jaki ona obecnie wszędzie jest załatwiona, to nasuwa się pytanie co do własności, a mianowicie, czy lepiej jest, żeby własność i użytkowanie były wspólne. Nasuwają się przy tym możliwości, że albo grunta są prywatną własnością, a plony zbiera się i zużywa jako wspólne dobro, jak to robią niektóre ludy, albo przeciwnie, ziemia jest wspólna i wspólnie się ją uprawia, plony zaś rozdziela się do indywidualnego użytku (podobno i ten rodzaj wspólności istnieje u niektórych ludów barbarzyńskich), albo wreszcie i role, i plony wspólne."},{"type":"paragraph","text":"2. Jeśliby pracujący na roli nie byli obywatelami, to sprawa przedstawi się inaczej i łatwiej; jeżeli jednak obywatele sami dla siebie pracują, to zagadnienie własności nastręczy więcej trudności. Ponieważ przy przydziale plonów i pracy nie przestrzega się bezwzględnej równości, więc przeciw tym, którzy spożywają czy biorą wiele, a mało pracują, muszą wyłaniać się skargi ze strony tych, którzy mniej dostają, a więcej pracują."},{"type":"paragraph","text":"13 Polemika z Platonem (Państwo 415 B i 423 C), który uważał, że dzieci grupy strażników, jeśli się okażą niezbyt udane, mają być przeniesione do stanu rolników i rzemieślników, a przeciwnie, dzieci tychże, wykazujące wybitne zdolności, do stanu strażników."},{"type":"paragraph","text":"27"},{"type":"paragraph","text":"3. W ogóle współżycie przy wspólności wszelkich dóbr ludzkich jest trudne, a już najwięcej, gdy ta wspólność takich rzeczy dotyczy. Okazuje się to na przykładzie uczestników wspólnych podróży, którzy niemal wszyscy popadają w zatargi i starcia między sobą z powodu drobiazgów, jakie wejdą im w drogę. Przecież najwięcej zgryzot mamy z tymi spośród naszej służby, których najwięcej do codziennych posług używamy. Takie to i inne tym podobne przykrości pociąga za sobą wspólna własność."},{"type":"paragraph","text":"4. Natomiast istniejący obecnie porządek, gdyby go tak ulepszyć jeszcze przez dobre obyczaje i mądre przepisy prawa, wykazywałby niemałe zalety. Posiadałby bowiem dobre strony obu systemów, a więc i wspólnej, i prywatnej własności. Do pewnego stopnia mianowicie powinna własność być wspólna, zasadniczo jednak musi pozostać prywatną. Bo jeśli każdy troszczy się o swoje, nie będą sobie robić wzajemnie zarzutów i więcej też wytworzą, gdy każdy dla własnej korzyści pracuje, a przy spożywaniu plonów kierować się będą szlachetnością
