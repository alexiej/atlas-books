eczne, dla pewnych zaś nie. Wpierw jednak musimy rozważyć, czy występuje ono w jednej jakiejś postaci, czy też wykazuje więcej odmian."},{"type":"paragraph","text":"2. Otóż z łatwością daje się zauważyć, że obejmuje ono więcej rodzajów i że postać tych rządów nie wszędzie jest taka sama. W ustroju lakońskim bowiem, gdzie królestwo, jak się wydaje, najwięcej ze wszytkich oparte jest na prawnej podstawie, król nie posiada władzy nad wszystkim, lecz tylko ma naczelne dowództwo na wojnie, gdy poza kraj wyrusza; poza tym królowi jeszcze powierza się czynności związane z kultem bogów. To królestwo jest zatem jakby jakąś samowładną i dożywotnią godnością wodza. Bo król nie ma tu prawa karać śmiercią, chyba tylko w czasie jakiejś wyprawy33; podobnie było za dawnych czasów, kiedy to podczas wojennych przedsięwzięć król miał prawo sądu doraźnego."},{"type":"paragraph","text":"Poświadcza to i Homer: [według niego] bowiem Agamemnon znosił obelgi na 13 Tekst przekazany niepewny. Przyjmuje poprawkę Immischa: µη ev τινι έλάσει zamiast przekazywanej w rękopisach lekcji: µη ev τινι βασιλεία (jak tylko w pewnej formie królestwa). Inni proponują skreślenie βασιλεία, a więc tłumaczą: jak tylko w pewnym wypadku."},{"type":"paragraph","text":"76"},{"type":"paragraph","text":"zgromadzeniach, lecz kiedy w pole ruszyli, władny był i śmiercią karać. Tak mówi przynajmniej poeta34:"},{"type":"paragraph","text":"lecz kogo jak z dala od walki zobaczę,"},{"type":"paragraph","text":"nie na wiele zda mu się ucieczka przed psami i ptaki; jam bowiem śmierci i życia jest panem."},{"type":"paragraph","text":"3. Dowództwo dożywotnie — to zatem jeden rodzaj królestwa, a bywa ono w pewnych wypadkach dziedziczne, w innych wybieralne. Obok niego jest jednak inna postać jedynowładztwa [monarchii], jaką przedstawiają królestwa ludów barbarzyńskich. Wszystkie one mają władzę podobną do tyranii, ale opartą na prawie i tradycji. Ponieważ barbarzyńcy są z natury swojej więcej niewolniczego usposobienia niż Grecy, a znów mieszkańcy Azji więcej od Europejczyków, więc znoszą władzę despotyczną, nie objawiając wcale niezadowolenia. Z takiego zatem powodu mają te królestwa charakter tyranii, wykazują jednak trwałość, ponieważ oparte są na tradycji i prawie."},{"type":"paragraph","text":"4. Toteż i straż przyboczna z tego samego powodu ma tam cechy właściwe straży królewskiej, a nie tyrańskiej. Królów mianowicie strzegą z bronią obywatele, tyranów zaś obcy najemnicy; pierwsi bowiem panują według praw i za zgodą poddanych, a drudzy wbrew ich woli. Skutkiem tego właśnie jedni otrzymują straż od obywateli, drudzy zaś trzymają ją przeciw obywatelom."},{"type":"paragraph","text":"5. To byłyby zatem dwa rodzaje monarchii, trzeci z kolei jest ten, który istniał"},{"type":"paragraph","text":"u dawnych Greków, a występował pod nazwą „ajsymnetów”. Jest to, krótko mówiąc, tyrania [pochodząca] z wyboru, która różni się od królestwa u barbarzyń-"},{"type":"paragraph","text":"ców nie brakiem prawnej podstawy, lecz tylko brakiem oparcia w tradycji."},{"type":"paragraph","text":"Piastowali tę władzę jedni dożywotnio, drudzy do pewnego określonego czasu lub dla załatwienia pewnych określonych zadań. Tak np. obywatele Mityleny wybrali niegdyś Pittakosa35 dla obrony przed wygnańcami, którymi dowodzili Antymenides i poeta Alkajos."},{"type":"paragraph","text":"6. Że Pittakosa tyranem obrali, dowodzi sam Alkajos w jednej z pieśni biesiadnych, gdzie zarzuca obywatelom, że"},{"type":"paragraph","text":"niszczyciela ojczyzny Pittakosa w spokojnym a ciężko dotkniętym mieście ustanowili tyranem z wielkim zapałem ogółu."},{"type":"paragraph","text":"Ta władza zatem ma i miała cechy tyranii ze względu na swój despotyczny charakter, ze względu zaś na wybór ź wolnej woli ma cechy królestwa."},{"type":"paragraph","text":"7. Czwarty rodzaj jedynowładztwa królewskiego stanowi królestwo czasów bohaterskich, opierające się na zgodzie rządzonych i prawnej podstawie dziedzictwa."},{"type":"paragraph","text":"Ponieważ mianowicie władcy ci byli pierwszymi dobrodziejami ludu w dziełach pokoju czy w wojnie, lub też dlatego, że zgromadzili mieszkańców, czy też, że ziemię im nadali, zostali królami za ich zgodą i godność tę zostawili w spadku następcom. Ich władza zaś obejmowała dowództwo na wojnie i [składanie] ofiary, 34 Iliada, II 391 nn."},{"type":"paragraph","text":"35 Por. wyżej, ks. II, rozdz. 9, § 9."},{"type":"paragraph","text":"77"},{"type":"paragraph","text":"o ile te nie należały do kapłanów, a nadto sądzili spory. Tę ostatnią czynność jedni pełnili po złożeniu przysięgi, a drudzy bez tego; przysięga zaś polegała na podniesieniu berła."},{"type":"paragraph","text":"8. Otóż ci królowie pradawnych czasów kierowali trwale sprawami miasta, zarówno wewnętrznymi jak i zewnętrznymi; później, kiedy królowie sami zrezygnowali z pewnych czynności, inne odjęły im znów masy ludowe, [tak że najczęściej] zostały królom w innych państwach tylko ofiary. Gdzie jednak utrzymało się królestwo godne tej nazwy, tam ze spraw zewnętrznych zachowali jedynie dowództwo na wojnie."},{"type":"paragraph","text":"10. Piąty rodzaj: pełne królestwo."},{"type":"paragraph","text":"Różnica między królestwem a arystokracją"},{"type":"paragraph","text":"1. Takie więc są cztery rodzaje królestwa. Jeden z nich to królestwo z czasów bohaterskich, opierające się na woli ludu, ograniczone do pewnych określonych czynności (król był bowiem wodzem, sędzią i kierował kultem bogów), drugi to królestwo u barbarzyńców (a jest to oparta na prawie władza despotyczna, dziedziczna w rodzie), trzeci stanowiła tzw. „ajsymneteja” (tj. oparta na wyborze tyrania), a czwarty z nich to królestwo lakońskie, tj. krótko mówiąc dziedziczna w rodzie, dożywotnia godność wodza. W ten sposób zatem różnią się od siebie te rodzaje królestwa."},{"type":"paragraph","text":"2. Jest jeszcze piąty rodzaj królestwa, który występuje, gdy jeden człowiek włada wszystkim tak, jak to czyni lud każdy i każde miasto, gdy kieruje wspólnymi sprawami. Jest ono zorganizowane na kształt gospodarstwa domowego, bo jak gospodarstwo domowe jest pewnego rodzaju królestwem domowym, tak i to królestwo państwowe jest niejako władaniem pana domu nad jednym miastem lub ludem, czy też i większą ich liczbą."},{"type":"paragraph","text":"Właściwie są zatem dwa zaledwie rodzaje królestwa, nad którymi musimy się zastanowić, ten ostatni i lakoński, bo inne mieszczą się przeważnie pośrodku między tymi. Mają mianowicie niniejszą władzę niż pełne królestwo, a większą niż królestwo lakońskie. Toteż badanie dotyczy właściwie dwóch następujących zagadnień: po pierwsze, czy jest to korzystne dla państw [, czy też nie] mieć dożywotniego wodza, i to czy z urodzenia, czy z wyboru36, a po wtóre, czy to dobrze, żeby jeden człowiek miał pełnię władzy nad wszystkim, czy też nie."},{"type":"paragraph","text":"3. Rozważanie nad tego rodzaju dowództwem należy raczej do dziedziny prawa niż ustroju, bo dowództwo takie może istnieć we wszelkich ustrojach, dlatego też pozostawmy je na razie. Natomiast pozostały rodzaj królestwa jest formą ustroju, toteż trzeba się nad nim zastanowić i omówić pokrótce łączące się z nim trudności. Zaczynamy zaś badanie od zagadnienia, czy korzystniej jest podlegać władzy najlepszego człowieka, czy też najlepszych praw."},{"type":"paragraph","text":"36 W myśl rozdziału 9, § 3 przyjmuję lekcję αΐρεσνν zamiast: µέρος."},{"type":"paragraph","text":"78"},{"type":"paragraph","text":"4. Zwolennicy władzy królewskiej podnoszą, że prawa wypowiadają się tylko ogólnie, a nie dają zleceń określonych w poszczególnych wypadkach, toteż byłoby rzeczą nierozumną, jak w każdej innej sztuce, wydawać zarządzenia według martwej litery. Przecież nawet w Egipcie wolno lekarzom po czterech dniach odstąpić od przepisanej recepty, a nawet i wcześniej, w takim razie co prawda jednak na własne ryzyko. Jest oczywiste, że z tego samego powodu — ustrój, który trzyma się jedynie litery prawa, nie jest najlepszy."},{"type":"paragraph","text":"Z drugiej strony powinny jednak istnieć owe ogólne postanowienia dla władających. Wyżej przecież stoi to, co nie wykazuje pierwiastka uczuciowego, od tego, co z nim jest ściśle złączone. Otóż prawo go nie posiada, a natomiast każda dusza ludzka jest z nim z konieczności zespolona."},{"type":"paragraph","text":"5. Ale może ktoś powie, że za to [monarcha] lepiej rozważy poszczególne wypadki. Jasną jest rzeczą, że władca musi być prawodawcą i prawa istnieć muszą, tylko nie mogą mieć mocy wiążącej, gdzie stoją w sprzeczności ze słusznością, podczas gdy w innych wypadkach muszą bezwzględnie obowiązywać. Czy jednak wówczas, gdy prawo w ogóle nie jest zdolne dać rozstrzygnięcia albo też rozstrzygnięcia trafnego, powinna rozstrzygać jednostka najlepsza, czy też ogół?"},{"type":"paragraph","text":"Bo przecież i teraz schodzą się obywatele i sądzą, i obradują, i rozstrzygają, a te rozstrzygnięcia odnoszą się wszystkie do poszczególnych wypadków. Każda jednostka z osobna w porównaniu z ogółem jest pośledniejsza, państwo składa się jednak z wielu [jednostek], podobnie jak lepsza jest uczta składkowa niż wydana przez jednego. Dlatego też i masa wiele rzeczy lepiej sądzi aniżeli jakakolwiek jednostka."},{"type":"paragraph","text":"6. Większy zespół ludzi mniej jest nadto narażony na błąd. Jak woda w większej ilości mniej jest narażona na zakażenie, tak i wielka grupa osób jest w tym względzie odporniejsza od nielicznej. Jeśli jednostką owładnie gniew lub jakaś inna namiętność, to zdanie jej będzie z konieczności spaczone, natomiast w tamtym wypadku wszyscy jednako musieliby w gniew popaść i błędne wydać orzeczenie. Przyjmujemy przy tym, że masa składa się z wolnych, którzy nic wbrew prawu nie czynią, a tylko tam z konieczności wkraczają, gdzie ono zawodzi."},{"type":"paragraph","text":"Nie zdarza się to łatwo przy wielkiej liczbie, gdyby jednak znalazło się więcej tak dzielnych, zarówno ludzi, jak obywateli, to nasunie się pytanie, czy jednostka jako władza mniej jest narażona na niebezpieczeństwo zboczenia z właściwej drogi, czy też raczej ci w większej liczbie występujący, a wszyscy dzielni? Czy nie jest oczywiste, że ci ostatni? [Można by tu zauważyć, że] wśród nich występują rozłamy, co u jednostki jest niemożliwe. Ale na to należałoby może odpowiedzieć, że przyjmujemy u nich taką samą szlachetność duszy, co u owej jednostki."},{"type":"paragraph","text":"7. Jeśli panowanie większej liczby mężów, wszystkich przy tym zarówno dobrych, należałoby określić jako arystokrację, panowanie jednego jako królestwo, to więcej pożądana będzie dla państw arystokracja aniżeli królestwo, bez względu na to, czy władza będzie rozporządzała siłą wykonawczą, czy nie, byle tylko znalazła się większa liczba równie dzielnych. I dlatego może w dawniejszych czasach stosowano ustrój królewski, ponieważ rzadko można było znaleźć mężów 79"},{"type":"paragraph","text":"wybitnie wyróżniających się cnotą, zwłaszcza że wówczas ludzie żyli w niewielkich państwach. A poza tym przy powoływaniu królów kierowano się wyświadczonymi przez nich dobrodziejstwami, jako że dobrodziejstwa dowodzą szlachetności."},{"type":"paragraph","text":"Skoro zaś tak się złożyło, że się pojawiło wielu równie wyróżniających się cnotą, nie chcieli już znosić królestwa, lecz dążyli do wspólnych rządów i stworzyli ustrój republikański."},{"type":"paragraph","text":"8. Kiedy zaś z postępującym zepsuciem poczęli się bogacić kosztem ogółu, musiała się naturalnie wyłonić z tego oligarchia, bo z bogactwa zrobili podstawę do wymiaru zaszczytów. Z tej [formy ustrojowej] przeszli najpierw do tyranii, a z tyranii do demokracji. Bo możnowładcy, w haniebnej żądzy zysku ścieśniając ustawicznie swą liczbę, wzmocnili masy ludowe, tak że się przeciwko nim podniosły i powstała demokracja. A że [z biegiem czasu] państwa się rozrosły, więc może i niełatwo już dałoby się zaprowadzić inny ustrój jak demokrację."},{"type":"paragraph","text":"9. Jeśli jednak ktoś za najlepsze dla państwa będzie uważał rządy królewskie, to jakże będzie z dziećmi? Czy władza królewska ma zostać w rodzie? Ależ to byłoby szkodliwe, jeśliby potomstwo było takie, jak się to nieraz zdarzało. A może król, mając pełnię władzy w ręku, nie przekaże jej takim dzieciom? Niełatwo w to jednak uwierzyć, bo trudną byłoby to rzeczą i zbyt wielkiej wymagałoby cnoty jak na ludzką naturę."},{"type":"paragraph","text":"10. Trudność nastręcza też sprawa władzy wykonawczej, a mianowicie, czy król powołany na tron powinien mieć przy sobie pewną siłę zbrojną, która mu pozwoli zmusić do posłuszeństwa opornych, albo też jakie będzie miał środki umożliwiające mu wykonywanie władzy. Bo nawet jeśliby władał wedle prawa i nic samowolnie wbrew prawu nie czynił, powinien by mimo to mieć do rozporządzenia siłę zbrojną, przy pomocy której stać będzie na straży praw. Może jednak, co do takiego króla, nie jest trudno tę wątpliwość szybko rozstrzygnąć."},{"type":"paragraph","text":"Powinien mianowicie mieć siłę zbrojną, a ta musiałaby być tak wielka, żeby miała przewagę nad siłami każdego z osobna, czy też większej liczby osób łącznie, ale słabsza od ludu. Tak to bywało w dawnych czasach przy przyznawaniu straży przybocznej, gdy stawiano na czele państwa czy to tzw. „ajsymnetę”, czy tyrana, i tak też radził ktoś Syrakuzańczykom, gdy Dionizjos domagał się straży przybocznej, by dać mu ją w takiej właśnie sile."},{"type":"paragraph","text":"11. Strony dodatnie i ujemne pełnego królestwa."},{"type":"paragraph","text":"Kiedy ma ono uzasadnienie"},{"type":"paragraph","text":"1. Wywody nasze doprowadziły nas obecnie do zagadnienia króla, który wszystko wykonuje wedle swojej woli, trzeba się więc i nad tym zastanowić. Król bowiem, zgodnie z prawem powołany, nie przedstawia, jak powiedziałem, odrębnego rodzaju ustroju. Przecież we wszystkich ustrojach, jak np. w demokracji i arystokracji, może istnieć dożywotnia godność wodza, w wielu wypadkach powierza się też jednemu człowiekowi wewnętrzny zarząd państwa; urząd taki 80"},{"type":"paragraph","text":"istnieje mianowicie w Epidamnos, a także i w Opus, tylko nieco bardziej ograniczony."},{"type":"paragraph","text":"2. Co się zaś tyczy, tzw. pełnego królestwa, to cechą jego jest to, iż król rządzi wszystkim wedle swojej woli. Niektórzy są zdania, że to nawet jest przeciw naturze, by tam, gdzie państwo składa się z równych, jeden człowiek był panem wszystkich obywateli. Bo ludzie, którzy z natury są równi, powinni by z natury mieć te same prawa i ten sam tytuł do podnoszenia roszczeń, a jak szkodliwe jest dla ciała, gdy nierówni otrzymują równe pożywienie i szaty, tak jest i z godnościami."},{"type":"paragraph","text":"Podobnie jest też oczywiście, gdy równi nierówno są traktowani."},{"type":"paragraph","text":"3. Dlatego sprawiedliwą jest rzeczą, by każdy tyleż władał, co i słuchał, a to na przemian. Tym samym doszliśmy już do prawa, bo ustalony porządek jest właśnie prawem. Jest zaś więcej pożądane, by prawo władało, aniżeli jeden jakiś spośród obywateli. Z tego samego właśnie powodu, jeśli nawet jest lepiej, by więcej ludzi władzę dzierżyło, należy ich ustanowić stróżami i sługami praw."},{"type":"paragraph","text":"Istnienie pewnych urzędów jest rzeczą konieczną, ale nie byłoby to sprawiedliwe, jak powiadają, by jeden tylko człowiek skupiał je w swym ręku, skoro wszyscy są równi."},{"type":"paragraph","text":"4. Jeśli wszakże ktoś zauważy37, że prawo nie zawsze jest w stanie dać ścisłe postanowienie, to odpowiemy, że w takich razach i człowiek rozeznać się nie zdoła. Prawo daje jednak potrzebne wyszkolenie i pozwala rządzącym rozstrzygać wedle najlepszej wiedzy i odpowiednie czynić zarządzenia. Pozwala nadto na poprawki, gdziekolwiek na podstawie doświadczenia inne jakieś postanowienie wyda się lepsze od istniejących. Kto więc domaga się, by prawo władało, zdaje się domagać, by władał tylko bóg i rozum, kto zaś człowiekowi rządy przyznaje, przydaje tu nadto i zwierzę, bo pożądliwość ma coś zwierzęcego; namiętność zaś nawet ludzi najlepszych między rządzącymi sprowadza z właściwej drogi. Toteż prawo jest czystym, wyzbytym żądzy rozumem."},{"type":"paragraph","text":"5. Przykład wzięty z dziedziny sztuk, wskazujący, że błędną jest rzeczą prowadzić leczenie według litery przepisu, że raczej należy się kierować zdaniem doświadczonych znawców tej sztuki, wydaje się jednak chybiony. Bo lekarze nie robią nic wbrew rozumowi, powodowani stronniczością, lecz otrzymują zapłatę za wyleczenie chorych, natomiast stojący u steru państwa zwykli często działać kierując się niechęcią i życzliwością. Przecież, gdyby ludzie podejrzewali, że lekarze, przekupieni przez nieprzyjaciół, chcą zgubić kogoś z rządzy zysku, to uciekliby się raczej do leczenia według litery przepisu."},{"type":"paragraph","text":"6. Przecież nawet lekarze, gdy zachorują, wzywają do siebie innych lekarzy, a nauczyciele gimnastyki, kiedy chcą ćwiczyć, proszą innych nauczycieli, w poczuciu, że nie potrafią wydać sądu trafnego, ponieważ we własnej sprawie sądzą i pozostają pod wpływem afektu. Widać tedy, że ci, co szukają sprawiedliwości, szukają bezstronności, a prawo jest właśnie bezstronne."},{"type":"paragraph","text":"37 Arystoteles ma na myśli zwolenników władzy absolutnej jednostki."},{"type":"paragraph","text":"81"},{"type":"paragraph","text":"Od praw pisanych ważniejsze są nadto i ważniejszych dotyczą rzeczy prawa zwyczajowe, toteż jeśli nawet na człowieka jako władcę bezpieczniej zdać by się można niż na prawo pisane, to jednak inaczej rzecz się przedstawia, gdy chodzi o prawa zwyczajowe."},{"type":"paragraph","text":"7. Ale [weźmy też pod uwagę, że] jednemu człowiekowi niełatwo przychodzi doglądać wielu rzeczy. Trzeba będzie większej ilości podwładnych mu urzędników, a w takim razie cóż to za różnica, czy się ich wprowadzi zaraz na początku, czy też jeden urządzi to w ten sposób?"},{"type":"paragraph","text":"Jeśli ponadto, jak to już poprzednio zauważyłem, dzielny człowiek jako lepszy słusznie powinien panować, to dwaj dobrzy będą jeszcze lepsi od jednego. To właśnie wyrażają słowa38:"},{"type":"paragraph","text":"idzie dwóch ze sobą złączonych"},{"type":"paragraph","text":"i życzenie Agamemnona39:"},{"type":"paragraph","text":"gdybym to dziesięciu miał takich doradców."},{"type":"paragraph","text":"Jeszcze i obecnie władze, jak np. sędziowie, mają głos bezwzględnie rozstrzygający w niektórych sprawach, których prawo nie jest w stanie rozstrzygnąć, bo nie ma żadnej wątpliwości, że nawet tam, gdzie to jest możliwe, prawo bynajmniej nie daje najlepszych zarządzeń i rozstrzygnięć."},{"type":"paragraph","text":"8. Ale właśnie ta okoliczność, że jedno da się określić prawami, a w innym wypadku okazuje się to niemożliwe, sprawia, że budzą się wątpliwości i nasuwa się pytanie, czy więcej jest pożądane, by władało prawo najlepsze, czy też najlepszy człowiek. Niemożliwą jest bowiem rzeczą prawem rozstrzygać sprawy, nad którymi zwykło się obradować. Toteż sprzeciwy podnoszą się nie przeciw temu, by człowiek koniecznie w takich wypadkach rozstrzygał, lecz przeciwko temu, żeby to czynił jeden tylko zamiast wielu. Bo każdy piastujący władzę, gdy przez prawo zostanie wyszkolony, wydaje trafne rozstrzygnięcia."},{"type":"paragraph","text":"9. Dziwnym też chyba mogłoby się wydać, gdyby ktoś lepiej widział"},{"type":"paragraph","text":"dwojgiem oczu, lepiej słyszał dwojgiem uszu oraz lepsze osiągał wyniki pracy przy pomocy dwóch nóg i rąk, aniżeli wielka ilość osób przy [odpowiednio]"},{"type":"paragraph","text":"wielkiej liczbie narządów i członków. Jakoż nawet obecnie jedynowładcy starają się zaopatrzyć w wielką ilość oczu i uszu, rąk i nóg, powołując do współrządów oddanych im i ich rządowi przyjaciół. Jeśli to nie będą ludzie przyjaźnie usposobieni, to nie będą działać według zamierzeń monarchy. Jeśli zaś będą przyjaciółmi i jego, i jego rządów, to jak przyjaciel w stosunku do przyjaciela będą mu równi i do niego podobni. Jeśli więc [władca] sądzi, że oni rządzić powinni, to mniema, że jako równi i podobni powinni w podobny jak i on sposób władać."},{"type":"paragraph","text":"38 Iliada X 224."},{"type":"paragraph","text":"39 Iliada II 372n."},{"type":"paragraph","text":"82"},{"type":"paragraph","text":"To więc byłoby mniej więcej, co podnoszą w sporze o władzę królewską jej przeciwnicy."},{"type":"paragraph","text":"10. Zarzuty te może z pewnych względów mają swe uzasadnienie, z pewnych znowu nie. Z natury bowiem jedni ludzie nastawieni są na rządy despotyczne, drudzy na rządy królewskie, a inni na rządy w ramach ustroju zwanego politeją, i każda z tych form ustrojowych jest dla nich sprawiedliwa i korzystna. Tylko tyrania nie jest zgodna z naturą, tak samo jak inne formy ustrojowe, które przedstawiają zwyrodnienia, ponieważ powstają wbrew naturze."},{"type":"paragraph","text":"Z tego, cośmy powiedzieli, okazuje się jednak, że dla podobnych i równych nie jest to ani korzystne, ani sprawiedliwe, by jeden człowiek był panem wszystkiego, bez względu na to, czy praw nie ma, a on sam jest prawem, czy też prawa są, jak i bez względu na to, czy i on, i poddani są dobrzy, czy też są niedobrzy, bez względu wreszcie na to, czy on góruje cnotą nad innymi, choćby tylko w pewnej mierze. W jakiej mierze, należy wyjaśnić, choć poniekąd była o tym mowa już i poprzednio40."},{"type":"paragraph","text":"11. Przede wszystkim trzeba określić, jaki to rodzaj ludzi nastawiony jest na rządy królewskie, jaki na rządy arystokratyczne, a jaki na rządy [wolnościowe w ramach ustroju] zwanego politeją. Otóż do słuchania rządów królewskich nadaje się taki lud, który z natury swej znosi ród górujący sprawnością w kierowaniu państwem, do słuchania rządów arystokratycznych lud, który potrafi poddać się władzy przywódców powołanych dzięki swym zaletom do rządów w państwie, do rządów zaś wolnościowych lud wojowniczy, zdolny do posłuchu i rządzenia według prawa rozdzielającego zamożnym godności odpowiednio do zasługi41."},{"type":"paragraph","text":"12. Kiedy się więc tak zdarzy, że się z masy wyłoni czy to ród cały, czy też pewna jednostka, tak dalece wyróżniająca się cnotą, że ta górować będzie nad cnotą wszystkich innych, to słuszną będzie rzeczą, aby ród ten objął władzę królewską i panował nad wszystkimi, a owa jednostka była królem. Bo jak powiedziano poprzednio42, odpowiada to nie tylko tej sprawiedliwości, na jaką zwykli się powoływać twórcy ustrojów zarówno arystokratycznych, jak oligarchicznych, jak i demokratycznych — bo wszyscy oni domagają się władzy z tytułu pewnej, choć nie tej samej przewagi — ale odpowiada [i zasadzie słuszności tak pojętej], jak to poprzednio wyłożyłem43."},{"type":"paragraph","text":"13. Bo przecież nie godzi się zabijać takiego człowieka, ani na wygnanie skazywać, ani usuwać wyrokiem sądu skorupkowego, ani też wymagać, aby częściowo [władał, to znów] był podwładnym. Część bowiem z natury rzeczy nie może przewyższać całości, a tak by tu właśnie było, gdyby [się wspomniane wymaganie zastosowało do człowieka, który by] tak wielką przewagę posiadał. Nie 40 Por. rozdz. 8, § 1."},{"type":"paragraph","text":"41 Tekst tu silnie skażony; tłumaczenie idzie za wydaniem Immischa z opuszczeniem słów ujętych u niego w nawiasy jako wtręty."},{"type":"paragraph","text":"42 Por. wyżej, rozdz. 7, § 11; rozdz. 8, § 1-2,7."},{"type":"paragraph","text":"43 Por. rozdz. 8, § 7."},{"type":"paragraph","text":"83"},{"type":"paragraph","text":"pozostaje zatem nic innego, jak słuchać takiego i uznać go za pana nie w pewnej mierze, ale w ogóle."},{"type":"paragraph","text":"W ten sposób zatem niechaj będą określone różnice, jakie wykazuje królestwo, czy jest ono pożyteczne dla państw czy nie, [a jeśli tak, to] dla których i w jaki sposób."},{"type":"paragraph","text":"12. Najlepszy ustrój jest ten, przy którym rządzą najlepsi 1. Skoro przyjmujemy trzy właściwie ustroje, to najlepszy z nich musi być ten, przy którym najlepsi włodarzą. Bywa to tam, gdzie się znajdzie pewna jednostka górująca nad wszystkimi albo ród cały, albo i ogół, wybitnie wyróżniający się cnotą, tak że potrafią dla najlepszego urządzenia sobie życia jedni słuchać, drudzy zaś rządzić. W początkowych wywodach wykazałem44, że cnota człowieka i obywatela w najlepszym państwie musi być ta sama. Jasne więc jest, że w taki sam sposób i za pomocą tych samych środków, które wpływają na ukształtowanie dzielnego człowieka, można również urządzić państwo o ustroju arystokratycznym lub królewskim."},{"type":"paragraph","text":"2. To samo więc wychowanie i te same mniej więcej obyczaje będą kształtować dzielnego człowieka i męża stanu, i króla."},{"type":"paragraph","text":"Po tych rozważaniach trzeba z kolei podjąć próbę omówienia najlepszego ustroju, w jaki sposób z natury powstaje i jak się kształtuje. A trzeba to zrobić, jeśli się chce należycie przeprowadzić badania w tym kierunku."}],"audio_pl":["audio/ch03-part000.mp3","audio/ch03-part001.mp3","audio/ch03-part002.mp3","audio/ch03-part003.mp3","audio/ch03-part004.mp3","audio/ch03-part005.mp3","audio/ch03-part006.mp3","audio/ch03-part007.mp3","audio/ch03-part008.mp3","audio/ch03-part009.mp3"]},{"id":"księga-czwarta","number":5,"title":"Księga czwarta","blocks":[{"type":"paragraph","text":"1. Ustrój bezwzględnie i względnie najlepszy"},{"type":"paragraph","text":"1. We wszystkich sztukach i umiejętnościach, które nie ograniczają się do części, lecz w całości jakiś jeden przedmiot obejmują, jest rzeczą jednej i tej samej sztuki czy umiejętności zbadać go we wszystkich jego rodzajach. Więc np."},{"type":"paragraph","text":"gimnastyka ustali, jaki rodzaj ćwiczeń dla pewnego ciała jest korzystny i jaki najlepszy — oczywistą przy tym jest rzeczą, że dla najlepiej przez naturę uposażonego, a zarazem i najlepiej pielęgnowanego ciała odpowiednie muszą być ćwiczenia najlepsze — ustali równie? (bo i to jest rzeczą gimnastyki), jaki rodzaj ćwiczeń jest dla największej liczby osób najlepszy (mam na myśli jeden dla całej grupy). Nawet jeśli ktoś nie pragnie osiągnąć tego stopnia zręczności i umiejętno-"},{"type":"paragraph","text":"ści, jaki wchodzi w rachubę przy zawodach, to niemniej pozostaje zadaniem 44 Por. wyżej, rozdz. 2 1 3 ."},{"type":"paragraph","text":"84"},{"type":"paragraph","text":"nauczyciela ćwiczeń i zapasów cielesnych dać mu przynajmniej wprowadzenie do tego kunsztu."},{"type":"paragraph","text":"2. Podobnie bywa, jak to widzimy, i w sztuce lekarskiej, i przy budowie okrętów, i przy sporządzaniu szat, i w każdym innym kunszcie. Okazuje się zatem, że jest zadaniem jednej i tej samej umiejętności zbadanie, jaki jest najlepszy ustrój, jak się powinien przedstawiać, by jak najwięcej czynił zadość życzeniom, jeśli nie stoją na przeszkodzie żadne zewnętrzne okoliczności, tudzież, jaki ustrój tym lub innym ludziom odpowiada. Dla wielu bowiem jest może niemożliwością dojść do najlepszego ustroju. Toteż dobry prawodawca i prawdziwy mąż stanu powinien znać zarówno najlepszy ustrój, jak i możliwie najlepszy w istniejących okolicznoś-"},{"type":"paragraph","text":"ciach. Po trzecie, powinien by posiadać umiejętność zalecenia najlepszego ustroju wedle dowolnych założeń. Trzeba bowiem, by umiał osądzić i pewien dany ustrój, jak by go można od początku urządzić, a gdy już stworzony został, w jaki sposób można by mu zapewnić najdłuższe istnienie; mam tu na myśli taki np. wypadek, że pewne miasto ani nie ma najlepszego ustroju, ani nie wykazuje potrzebnych do tego warunków, ani też nie posiada ustroju możliwie dobrego w istniejących okolicznościach, ale jakiś gorszy."},{"type":"paragraph","text":"3. Poza tym wszystkim jednak powinien by poznać, jaki ustrój najlepiej odpowiada wszystkim państwom. Bo ci, co pisali o ustroju państwowym, choć i wiele słusznych zresztą rzeczy mówią, po największej części błądzą w ujęciu tego, co praktycznie użyteczne. Trzeba się bowiem zastanowić nie tylko, jaki ustrój jest najlepszy, ale i nad tym, jaki jest możliwy, i podobnie, który ustrój daje się łatwiej wszędzie wprowadzić i ogólniej zastosować. A tymczasem jedni szukają tylko najszczytniejszego ustroju, który wymaga wielu korzystnych warunków zewnętrznych, drudzy zaś opowiadają się raczej za jakimś ustrojem, dającym się powszechnie urzeczywistnić i sławią lakoński czy też jakiś inny, z wyłączeniem reszty istniejących."},{"type":"paragraph","text":"4. Trzeba jednak taki porządek wprowadzić, do którego — z istniejących stosunków wychodząc — z łatwością daliby się ludzie przekonać, tak że bez trudności przejść by do niego zdołali, bo nie mniejszej pracy wymaga naprawienie ustroju niż jego tworzenie od podstaw, podobnie jak nie mniej trudne jest przeszkalanie aniżeli uczenie od początków. Dlatego mąż stanu prócz wspomnianych już wymogów powinien by posiadać, jak to już poprzednio powiedziano1, umiejętność naprawiania istniejących ustrojów. Jest to jednakowoż niemożliwe, jeśli się nie wie, ile jest rodzajów ustrojów. Tymczasem niektórzy sądzą, że jest jedna tylko demokracja i tylko jedna oligarchia, co jednak wcale nie jest prawdą."},{"type":"paragraph","text":"5. Toteż [mąż stanu] musi sobie zdawać sprawę z różnic zachodzących między ustrojami oraz z ich ilości, tudzież i z tego, jak różnorodne są ich składniki. Taką samą wnikliwość należy wykazać, gdy chodzi o poznanie, jakie prawa są najlepsze i odpowiadają każdemu z ustrojów. Bo prawa winny się dostosować do ustrojów i wszystkie są istotnie do nich dostosowane, a nie ustroje do praw. Ustrój bowiem 1 Por. § 2 tego rozdz."},{"type":"paragraph","text":"85"},{"type":"paragraph","text":"określa porządek władz w państwie i sposób ich podziału, stwierdza, co jest czynnikiem decydującym w państwie i jaki jest cel każdej wspólnoty2; prawa natomiast, niezależnie od tych postanowień decydujących o charakterze ustroju, podają normy, według których powinni władać rządzący i trzymać na wodzy tych, którzy by je przekraczali."},{"type":"paragraph","text":"6. Okazuje się tedy, że także i ze względu na prawodawstwo trzeba mieć na oku różne rodzaje każdego ustroju tudzież ich liczbę. Niemożliwą jest bowiem rzeczą, aby te same prawa były korzystne dla wszystkich oligarchii czy demokracji, skoro istnieje więcej ich rodzajów, a nie jedna tylko demokracja czy oligarchia."},{"type":"paragraph","text":"2. Plan dalszych wywodów o innych formach ustroju 1. Rozróżniliśmy na początku wywodów o ustrojach trzy właściwe ustroje: królestwo, arystokrację i politeję, a trzy ich zwyrodnienia: tyranię w stosunku do królestwa, oligarchię w stosunku do arystokracji i demokrację w stosunku do politei3. O arystokracji i królestwie była już mowa4 (bo wziąć najlepszy ustrój za przedmiot rozważań znaczy tyle, co omawiać te właśnie formy, jako że jedna i druga chce się opierać na cnocie wyposażonej w środki zewnętrzne). Uwydatniono również poprzednio różnicę zachodzącą między arystokracją a królestwem i podano, kiedy królestwu należałoby przyznać pierwszeństwo; pozostaje zatem pomówić jeszcze o tej formie ustroju, która nosi ogólną nazwę politei, a następnie o innych ustrojach: oligarchii, demokracji i tyranii."},{"type":"paragraph","text":"2. Jasną jest też rzeczą, która z tych form zwyrodniałych jest najgorsza, a która drugie z kolei zajmuje miejsce. Najgorsze mianowicie musi być zwyrodnienie pierwszego, najbardziej boskiego ustroju. Królestwo, jeśli nie ma być tylko czczą nazwą bez treści istotnej, musi się opierać na wybitnych zaletach piastującego władzę królewską. Najgorszą więc formę ustroju, najwięcej odbiegającą od tego pojęcia, przedstawia niewątpliwie tyrania, drugie miejsce zajmuje oligarchia"},{"type":"paragraph","text":"— arystokracja jest bowiem bardzo odległa od tego ustroju — najbardziej umiarkowana będzie tu demokracja."},{"type":"paragraph","text":"3. W ten sposób wypowiedział się już jeden z moich poprzedników5, choć wyszedł z innego punktu widzenia aniżeli my. Uważał on mianowicie, że ze wszystkich dobrych ustrojów, jak rzetelna oligarchia czy inny, najgorsza jest demokracja, ale spośród złych jest ona najlepsza."},{"type":"paragraph","text":"2 Por. Arystoteles, Retoryka, ks. I, rozdz. 8, gdzie myśl tę autor w ten sposób ujmuje: „Należy poza tym dobrze poznać cel, jaki stawia sobie każda forma ustroju, ponieważ wybieramy te rzeczy, które zgodne są z tym celem. Demokracja stawia sobie za cel wolność, oligarchia — bogactwo, arystokracja — sprawy wychowania i praworządności, tyrania — bezpieczeństwo tyrana” (przeł."},{"type":"paragraph","text":"H. Podbielski, por. nin. wyd., s. 333)."},{"type":"paragraph","text":"3 Por. wyżej, ks. III, rozdz. 5, § 4."},{"type":"paragraph","text":"4 Por. tamże, rozdz. 11 nn."},{"type":"paragraph","text":"5 Platon, Polityk 303 A."},{"type":"paragraph","text":"86"},{"type":"paragraph","text":"4. My natomiast jesteśmy zdania, że w ogóle i oligarchia, i demokracja są zwyrodniałymi [formami ustroju], toteż niesłusznie mówi się, iż ta oligarchia jest lepsza od tamtej, zamiast powiedzieć, że jest mniej zła. Na razie jednak zostawmy ten pogląd, a zabierzmy się najpierw do ustalenia, ile jest rozmaitych ustrojów, skoro istnieje więcej rodzajów demokracji i oligarchii, a następnie, jaki ustrój jest najpospolitszy i najwięcej wzięty po najlepszym; jeśli zaś trafił się jakiś inny ustrój arystokratyczny, a dobrze urządzony, dla wielkiej liczby państw jednak"},{"type":"paragraph","text":"[nie]odpowiedni6, to jaki to jest."},{"type":"paragraph","text":"5. A dalej, jaki ustrój spośród innych jest tu lub gdzie indziej pożądany, bo może u jednych wskazana jest więcej demokracja niż oligarchia, u innych znów przeciwnie, raczej ta niż tamta. Następnie, jak winien postępować ten, kto chce te ustroje urządzić, a mam tu na myśli zarówno demokrację, jak oligarchię wszelkiego rodzaju. I wreszcie, gdy pokrótce na wszystkie te pytania odpowiemy, trzeba będzie podjąć próbę wykazania, jakie są czynniki rozstroju, a jakie warunki trwałości ustrojów, i w ogóle, i w poszczególnych wypadkach, tudzież z jakiego głównie powodu zjawiska te występują."},{"type":"paragraph","text":"3. Przyczyny wielości ustrojów"},{"type":"paragraph","text":"1. Przyczyną wielości ustrojów jest fakt, że każde państwo obejmuje większą liczbę części składowych. Widzimy mianowicie, że wszystkie państwa składają się przede wszystkim z rodzin, następnie, że z rzeszy tej z konieczności znów jedni są bogaci, a drudzy ubodzy, że inni wreszcie stanowią stan średni; zarówno z bogatych, jak i z ubogich część tworzy ciężkozbrojną piechotę, drudzy natomiast są wolni od służby wojskowej. Wśród masy ludowej jedni są, jak widzimy, rolnikami, drudzy kupcami, inni jeszcze rzemieślnikami. Nawet wśród ludzi znacznych występują różnice co do bogactwa i wielkości majątku, zaznaczające się np. w trzymaniu konia, bo to niełatwo przychodzi komuś, kto nie jest dość bogaty."},{"type":"paragraph","text":"2. Dlatego też za dawnych czasów we wszystkich tych państwach, których siła opierała się na konnicy, bywały ustroje oligarchiczne. Posługiwano się zaś jazdą w wojnach z sąsiadami, jak to słyszymy o Eretryjczykach, Chalcydyjczykach, Magnetach znad Meandra i wielu innych mieszkańcach Azji. Do różnic wynikają-"},{"type":"paragraph","text":"cych z majątku dołączają się dalsze, które są wynikiem urodzenia czy poziomu cnoty, tudzież inne czynniki tego rodzaju, które w wywodach o arystokracji7"},{"type":"paragraph","text":"uznaliśmy za część składową państwa. Podaliśmy tam, z ilu koniecznych części składa się każde państwo; z części tych bowiem czasem wszystkie uczestniczą w zarządzie państwa, czasem mniejszość, a niekiedy większość."},{"type":"paragraph","text":"6 W przekazanym tekście jest „odpowiedni”, poprawkę „[nie]odpowiedni” wniósł Coraes ze względu na tok myśli. Susemihl proponował tu: „mniej odpowiedni”, 7 Por. ks. III, rozdz 10 § 7 i rozdz. 11, §11."},{"type":"paragraph","text":"87"},{"type":"paragraph","text":"3. Okazuje się tedy, że musi być więcej ustrojów różniących się od siebie rodzajem, ponieważ również i te części różnią się co do rodzaju. Ustrój bowiem jest uszeregowaniem władz rządzących, a to przeprowadza się wszędzie albo według znaczenia uczestników, albo na zasadzie równości według pewnej wspólnej im cechy, to znaczy np. według tego, czy ktoś jest ubogi czy bogaty, albo według tego, co jednym i drugim jest wspólne. Musi być zatem tyle ustrojów, ile jest uszeregowań według cech wyróżniających ludzi i według różnic między częściami składowymi."},{"type":"paragraph","text":"4. Głównie jednak przyjmuje się dwa ustroje, podobnie jak się mówi o dwóch głównych wiatrach: północnym i południowym, a inne uważa się za ich odmiany."},{"type":"paragraph","text":"Tak zatem i dwa ustroje uchodzą za główne: demokracja i oligarchia. Bo arystokrację uważają za odmianę oligarchii, jako że jest do niej zbliżona, a tzw."},{"type":"paragraph","text":"politeję za demokrację, tak jak to jest z wiatrami, gdy się wiatr zachodni podaje za odmianę północnego, a wschodni za odmianę południowego. Podobnie ma się rzecz, jak twierdzą niektórzy, i z tonacjami, bo i tam przyjmuje się dwa ich rodzaje: dorycką i frygijską, inne zaś układy mieni się zbliżonymi do tonacji doryckiej lub frygijskiej."},{"type":"paragraph","text":"5. Takie to poglądy zwykli ludzie najczęściej wypowiadać w przedmiocie ustroju. Prawdziwy jednak i lepszy jest podział, jaki my przyjęliśmy: jak pięknie zestrojonej tonacji, tak i najlepszego ustroju są dwie formy, albo i jedna dobrze zestrojona, inne zaś są zwyrodnieniami, przy czym formy o charakterze więcej zwartym i despotycznym zbliżają się do oligarchii, a rozprzęgnięte i słabe do demokracji."},{"type":"paragraph","text":"6. Nie należy przyjmować, jak to teraz zwykli czynić niektórzy, że demokracja jest po prostu tam, gdzie masa jest panem (bo i w oligarchii, i wszędzie indziej zdarza się, że większość dzierży władzę), ani też nie należy sądzić, że tam jest oligarchia, gdzie niewielu wszechwładnie rządzi państwem. Bo jeśliby było wszystkich tysiąc trzystu obywateli, a z tych tysiąc było bogatych, którzy nie dawaliby dostępu do władzy trzystu ubogim, choć wolnym i poza tym im równym, to nikt nie powie, że tam są rządy demokratyczne. Podobnie, jeśli ubodzy, niewielką przedstawiający liczbę, będą jednak silniejsi od bogatych, stanowiących większość, to w tym wypadku nikt tu nie będzie stosował nazwy oligarchia, jeśli inni, którzy są bogaci, nie będą mieli dostępu do godności."},{"type":"paragraph","text":"7. Raczej zatem należy powiedzieć, że demokracja jest wówczas, gdy wolni władają, oligarchia natomiast, gdy władzę dzierżą bogaci, jest to jednak tylko przypadkowa zbieżność, że pierwszych jest mnóstwo, a drugich niewielu, bo wolnych bywa wielu, a bogatych mało. Gdyby nawet rozdawano godności według wzrostu, jak to podobno dzieje się w Etiopii8, albo według urody, to byłaby to również oligarchia, zarówno bowiem urodziwi, jak rośli w niewielkiej występują liczbie."},{"type":"paragraph","text":"8 Wiadomość zaczerpnięta niewątpliwie z Herodota (III 20), według którego w Etiopii wybierano na króla człowieka najwyższego wzrostem i najsilniejszego."},{"type":"paragraph","text":"88"},{"type":"paragraph","text":"8. Ale i te tylko cechy bynajmniej nie wystarczają do określenia istoty wspomnianych ustrojów. Przeciwnie, ponieważ jest więcej części składowych zarówno demokracji, jak i oligarchii, trzeba jeszcze dalsze rozróżnienie wprowadzić i uznać, że nie ma tam demokracji, gdzie nieliczni wolni panują nad większością niewolnych. Tak jest właśnie w Apollonii nad Morzem Jońskim lub na Terze (bo w każdym z tych państw piastowali godności ludzie wyróżniający się szlachetnym pochodzeniem oraz pierwsi założyciele kolonii, którzy wobec masy poddanych niewielką przedstawiali liczbę). Tak samo nie jest to demokracja, jeśli bogaci dzięki swej przewadze liczebnej górują, jak np. niegdyś w Kolofonie, bo tam większość przed wybuchem wojny z Lidami zdobyła sobie wielkie majątki."},{"type":"paragraph","text":"Natomiast demokracja jest, gdy wolni ubodzy, przedstawiający większość, dzierżą pełnię władzy w ręku, oligarchia zaś, gdy rządzą ludzie bogaci i ze szlachetnych rodów, mimo że mniejszość stanowią."},{"type":"paragraph","text":"9. Wykazałem tedy, że jest więcej ustrojów i z jakiego powodu; z kolei pragnę wyłożyć, że jest ich jednak więcej, aniżeli podałem, a także jakie są i dlaczego, zacznę zaś od tego, co powiedziałem poprzednio. Zgadzamy się mianowicie, że każde państwo ma nie jedną, ale więcej części składowych. Gdybyśmy więc wzięli sobie za zadanie określić gatunek zwierząt, to wydzielilibyśmy przede wszystkim to, co każde zwierzę musi posiadać, a więc pewne organy zmysłów i narządy do przyjmowania i trawienia pokarmu, jak pasza i żołądek, a nadto narządy ruchów, którymi każde z nich się posługuje."},{"type":"paragraph","text":"10. Gdyby to były tylko te narządy, a między nimi istniały różnice — mam mianowicie na myśli często występujące różne rodzaje paszczy i żołądka, organów zmysłów, a także i narządów ruchu — to i tak liczba ich kombinacji musi dać w wyniku więcej gatunków zwierząt (bo niemożliwą jest rzeczą, aby to samo zwierzę miało więcej odmian kształtu paszczy czy też podobnie i uszu)."},{"type":"paragraph","text":"Jeśli się tedy uwzględni wszelkie możliwe ich kombinacje, to ma się w wyniku gatunki świata zwierzęcego, i to tyle gatunków, ile jest kombinacji niezbędnych członów."},{"type":"paragraph","text":"11. To samo jest i ze wspomnianymi ustrojami. Bo i państwa, jak to wielokrotnie już powiedziano9, składają się nie z jednej, ale z wielu części. Jedną z nich stanowi masa ludności wytwarzająca żywność, tzw. rolnicy. Drugą tworzą tzw. rękodzielnicy trudniący się rzemiosłami, bez których państwo istnieć nie może; jedne z nich są niezbędnie konieczne, inne służą do zbytku i upiększenia życia. Trzecia część to kupcy, tzn. ci, którzy się zajmują kupnem i sprzedażą, wielkim i drobnym handlem. Do czwartej należą wyrobnicy, do piątej zaś stan żołnierski, którego istnienie nie mniej jest konieczne od tamtych, jeśli nie mają popaść w niewolę u najeźdźców. Byłoby przecież jedną z rzeczy niemożliwych zaszczytne miano „państwa” nadawać takiemu państwu, które by z natury swej nadawało się do roli niewolnika; państwo bowiem jest samowystarczalne, a niewolnik nie."},{"type":"paragraph","text":"9 Por. ks. II, rozdz. 1, § 4; ks. III, rozdz. 7, § 5; wyżej, rozdz. 3, § 1 - 2, 9 tej księgi."},{"type":"paragraph","text":"89"},{"type":"paragraph","text":"12. Dlatego w Państwie punkt ten został wprawdzie pięknie, ale niedostatecznie omówiony. Powiada tam bowiem Sokrates10, że państwo składa się z czterech najkonieczniejszych części i jako takie wymienia: tkacza, rolnika, szewca i budowniczego; w poczuciu, że to nie wystarcza, dodaje znów kowala i pasterzy do niezbędnych stad bydła, poza tym jeszcze kupca i kramarza. Wszystko to miałoby wypełniać pierwsze państwo, jak gdyby każde państwo powstawało dla zaspokojenia koniecznych potrzeb, a nie dla urzeczywistnienia piękna raczej, i jakby potrzebowało na równi szewców i rolników."},{"type":"paragraph","text":"13. Części zbrojnej nie przyznaje państwu pierwej, aż ze wzrostem obszaru przez napaść na sąsiadów w wojnę popadnie. Ale nawet przy tych czterech częściach lub jakiejkolwiek liczbie tych członów wspólnoty musi być przecież ktoś, co by wymierzał sprawiedliwość i sądził. Jeśli więc duszę jako część istoty żyjącej wyżej cenić się będzie od ciała, to również i w państwach odpowiadające jej elementy więcej cenić należy od tych, które mają za zadanie zaspokajać konieczne potrzeby, a więc: wojowników, przedstawicieli sądzącej sprawiedliwości, a nadto członków rady, których działalność stanowi wyraz mądrości politycznej. Czy te czynności przypadają pewnym oddzielnym osobom, czy też i tym samym, to oczywiście nie stanowi żadnej różnicy, bo zdarza się często, że ci sami ludzie i do służby wojskowej są pociągani, i uprawą roli się zajmują."},{"type":"paragraph","text":"14. Skoro więc i te, i tamte stany musi się uznać za części składowe państwa, to rzecz jasna również i stan wojskowy jest niezbędnym członem państwa."},{"type":"paragraph","text":"<Szósty stan to kapłański> 11, siódmy zaś przedstawiają ci, co majątkiem służą państwu przy dźwiganiu ciężarów, zwiemy ich zamożnymi. Ósmy — wysocy urzędnicy państwowi i ludzie, którzy bezinteresownie poświęcają się władaniu państwem, bo przecież bez władz państwo istnieć nie może. Muszą więc być pewni ludzie, którzy potrafią rządzić i ciężar ten czy to trwale, czy okresowo dla dobra państwa obejmują. W końcu idą stany, które właśnie co dopiero wydzieliłem, członkowie rady i sędziowie, wymierzający sprawiedliwość w sporach. Jeśli człony te muszą być w państwach i państwo ma być dobrze i sprawiedliwie rządzone, to nieodzowni są też pewni ludzie, którzy by posiadali zalety mężów stanu."},{"type":"paragraph","text":"15. Wielu sądzi, że ci sami ludzie mogą jednoczyć w sobie różne uzdolnienia, mogą na przykład ci sami być i wojownikami, i rolnikami, i rzemieślnikami, a ponadto i członkami rady, i sędziami. Wszyscy też przypisują sobie odpowiednią cnotę i uważają, że mogliby piastować niemal wszystkie godności. Być jednak równocześnie ubogim i bogatym niemożliwą jest rzeczą, stąd mniemanie, że bogaci i ubodzy stanowią główne części składowe państwa. Ponieważ nadto jednych jest przeważnie niewielu, a drugich mnóstwo, powstaje wrażenie, że wśród 10 Platon, Państwo, ks. II, rozdz. 11 (370 A) 11 Słowa w nawiasach stanowią uzupełnienie Conringa."},{"type":"paragraph","text":"90"},{"type":"paragraph","text":"części składowych państwa te dwa człony przeciwstawiają się sobie. Stąd też według przewagi jednego lub drugiego określa się i ustroje, i przyjmuje się istnienie dwóch form: demokracji i oligarchii."},{"type":"paragraph","text":"Że jest więcej ustrojów i z jakich przyczyn, to wyłożyliśmy już wyżej, obecnie mamy wykazać, że jest także więcej rodzajów zarówno demokracji, jak oligarchii."},{"type":"paragraph","text":"4. Demokracja i jej rodzaje"},{"type":"paragraph","text":"1. Wynika to już z poprzednich wywodów. Jest mianowicie więcej rodzajów i ludu, i tych, których się uważa za elitę. Jeden z nich, gdy o lud chodzi, stanowią rolnicy, drugi rzemieślnicy, inni kupcy, dalszy jeszcze to żeglarze, z których znów jedni służą w marynarce wojennej, inni trudnią się handlem morskim albo przewozami za morze, lub też rybołówstwem (w wielu miejscowościach mianowicie każda z tych klas występuje w znacznej liczbie, tak np. rybacy w Tarencie i Bizancjum, marynarze wojskowi w Atenach, kupcy morscy na Eginie i Chios, przewoźnicy na Tenedos)12; do tego dołączają się nadto wyrobnicy, którzy mają mały majątek, tak że nie mogą sobie pozwolić na odpoczywanie, następnie wolni, których rodzice nie byli oboje obywatelami, i w danym razie inne rodzaje pospólstwa. Wśród znakomitych takie same różnice pociąga za sobą bogactwo, szlachectwo, cnota, wychowanie i inne tego rodzaju zalety."},{"type":"paragraph","text":"2. Otóż demokracją nazywa się w pierwszym rzędzie ten ustrój, w którym najzupełniej przeprowadzona została zasada równości. Równość zaś, według podstawowego prawa takiej demokracji wyraża się w tym, że czy to biedni, czy bogaci, to niczym nie górują jedni nad drugimi, ani też nie skupiają jednostronnie całej władzy, lecz są sobie równi. Bo jeśli, jak niektórzy przyjmują, wolność i równość znajdują się głównie w ustroju demokratycznym, to będzie to faktem przede wszystkim wówczas, gdy wszyscy mieć będą możliwie równy udział"},{"type":"paragraph","text":"w kierowaniu państwem. Ponieważ zaś lud ma większość, a o wszystkim rozstrzyga uchwała większości, więc taka forma ustroju jest bezsprzecznie demokracją. Jest to więc jeden rodzaj demokracji."},{"type":"paragraph","text":"3. Inny rodzaj przedstawia ustrój, w którym urzędy zależne są od cenzusu majątkowego, ale cenzus ten jest niski. Każdy, kto zdobędzie odpowiedni majątek, musi mieć do nich dostęp, a kto traci majątek, traci i dostęp do urzędów."},{"type":"paragraph","text":"Inny rodzaj demokracji istnieje wówczas, gdy wszyscy obywatele, o ile są nieposzlakowani, biorą udział w rządach, poza tym jednak panuje prawo."},{"type":"paragraph","text":"Jeszcze inny rodzaj demokracji bywa, gdy wszyscy mają dostęp do urzędów, jeśli tylko są obywatelami, i panuje prawo."},{"type":"paragraph","text":"Inny to znów rodzaj, gdy co do reszty obowiązują te same zasady, ale panem jest lud, a nie prawo."},{"type":"paragraph","text":"12 Wyspa Tenedos leżała u wejścia do cieśniny Hellespontu. Możliwe, że chodzi tu o pilotów, którzy przeprowadzali wpływające do cieśniny okręty."},{"type":"paragraph","text":"91"},{"type":"paragraph","text":"4. Bywa to wówczas, gdy rolę rozstrzygającą grają każdorazowe uchwały, a nie prawo. Że tak się dzieje, to wina demagogów. Bo w tych demokracjach, gdzie prawo włada, nie ma warunków do wystąpienia demagoga, lecz najlepsi z obywateli grają przewodnią rolę, gdzie zaś prawa nie panują, tam zjawiają się demagodzy."},{"type":"paragraph","text":"Lud mianowicie zajmuje wówczas stanowisko monarchy, jako jednostka zbiorowa, bo panuje tu ogół: nie każdy z osobna, ale wszyscy razem, wzięci jako całość."},{"type":"paragraph","text":"Powiada Homer 13, że wielo władztwo nie jest dobrą rzeczą, nie wiadomo jednak, jaki jego rodzaj ma na myśli, czy ten, czy też inny, przy którym więcej ludzi włada"},{"type":"paragraph","text":"— każdy na własną rękę."},{"type":"paragraph","text":"5. Tak więc lud występujący jako monarcha stara się okazać swą władzę monarchiczną, nie kierując się prawem, i staje się despotą, tak że nawet pochlebcy u niego do znaczenia dochodzą. Toteż taka demokracja odgrywa rolę analogiczną do tyranii między monarchiami. Stąd i charakter obu ustrojów jest ten sam, w obu lepsi znoszą bezwzględny ucisk, uchwały ludu są tu tym, czym tam rozporządzenia, a demagog pełni rolę analogiczną do pochlebcy: jeden i drugi ma wielki wpływ, pierwszy u tyranów, drugi w takiego rodzaju demokracji."},{"type":"paragraph","text":"6. Oni to zwracając się ze wszystkim do ludu powodują, że rządzą uchwały, nie prawa. Zdarza, się też, że dochodzą sami do potęgi, ponieważ lud o wszystkim stanowi, a oni o zdaniu ludu wobec tego, że tłum ich słucha. Ponadto ci, co podnoszą oskarżenia przeciwko urzędnikom, wołają, że lud ich sądzić powinien, i lud wniosek ten ochotnie przyjmuje; w wyniku zaś wszystkie urzędy się rozprzęgają."},{"type":"paragraph","text":"7. Słusznie więc, jak się zdaje, można by tu podnieść zarzut, że taka demokracja w ogóle nie jest ustrojem, bo gdzie prawa nie rządzą, tam nie ma ustroju. Prawo bowiem musi panować nad wszystkim, w poszczególnych zaś wypadkach winny rozstrzygać władze i tylko [tam], gdzie się tak dzieje, winna być mowa o ustroju. Jeśli więc demokracja jest jednym z ustrojów, to oczywiście taki stan rzeczy, przy którym wszystko się załatwia uchwałami, nie jest właściwie wcale demokracją, żadna bowiem uchwała nie może tu mieć charakteru ogólnej normy."},{"type":"paragraph","text":"W ten sposób zatem zakończylibyśmy wywody o rodzajach demokracji."},{"type":"paragraph","text":"5. Demokracja a oligarchia. Różne rodzaje oligarchii."},{"type":"paragraph","text":"Arystokracja. Różne rodzaje arystokracji"},{"type":"paragraph","text":"1. Co się tyczy rodzajów oligarchii, to cechą jednego z nich jest uzależnienie dostępu do urzędów od tak wysokiego cenzusu majątkowego, że ubodzy, stanowiący większość, nie mają do nich dostępu, natomiast kto zdobędzie wymagany majątek, może brać udział w rządzeniu państwem."},{"type":"paragraph","text":"13 Zob. Iliada II 204, gdzie w usta Odyseusza włożone są słowa: „niedobrą rzeczą jest wielowładztwo, niech jeden będzie władcą”."},{"type":"paragraph","text":"92"},{"type":"paragraph","text":"Inny rodzaj przedstawia ustrój, w którym dostęp do urzędów zależy od wysokiego cenzusu, a piastujący je sami dobierają następców na miejsca opróżnione."},{"type":"paragraph","text":"Jeśli przy tym uwzględniają wszystkich, którzy taki cenzus posiadają, ma to charakter raczej arystokratyczny, jeśli zaś ograniczają się do pewnej grupy osób, charakter oligarchiczny."},{"type":"paragraph","text":"Dalszy rodzaj oligarchii bywa, gdy syn obejmuje urząd ojca."},{"type":"paragraph","text":"Czwarty zaś, gdy stosowana jest wspomniana co dopiero dziedziczność urzędów, a zarazem włada nie prawo, lecz urzędnicy. Rodzaj ten zajmuje to samo miejsce między oligarchiami, co tyrania między monarchiami i ostatni omawiany rodzaj demokracji między demokracjami. Toteż taką oligarchię nazywają rządami wielmożów (δυναστεία)."},{"type":"paragraph","text":"2. Tyle jest więc rodzajów oligarchii i demokracji. Nie należy jednak pomijać występującego wielokrotnie zjawiska, że wprawdzie ustrój, sądząc według [obowiązujących w nim] praw, nie jest demokratyczny, a jednak rządy skutkiem istniejących zwyczajów i sposobu życia są demokratyczne; podobnie znów gdzie indziej ustrój wedle praw jest raczej demokratyczny, a przez sposób życia i zwyczaje przybiera charakter raczej oligarchiczny. Zdarza się to zwłaszcza po przewrotach ustrojowych, nie przechodzi się bowiem natychmiast do nowych form, lecz początkowo poprzestaje się na uzyskaniu drobnych korzyści w stosunku do przeciwników, tak że istniejące poprzednio prawa utrzymują się nadal, a tylko władzę ujmują twórcy przewrotu."},{"type":"paragraph","text":"Że tyle jest rodzajów demokracji i oligarchii, okazuje się z tego, cośmy"},{"type":"paragraph","text":"[właśnie] powiedzieli. Bo albo wszystkie wspomniane klasy ludu muszą brać udział w rządzeniu państwem, albo tylko niektóre z wyłączeniem innych. Jeśli więc rolnicy i właściciele średnich majątków władają w państwie, to rządy są oparte na prawie, bo ludzie pracując mają z czego żyć; nie mogą jednak pozwolić sobie na stratę czasu, toteż wysuwają prawo na czoło, a zgromadzenia ludowe odbywają w wypadkach koniecznych. Innym wolno uczestniczyć [w rządach], skoro zdobędą cenzus majątkowy, oznaczony przez prawo; dlatego wszyscy, którzy go zdobyli, mogą być do rządów dopuszczeni. Bo w ogóle uniemożliwienie komuś wejścia [w szeregi rządzących] jest cechą oligarchii, a znów bez dochodów niemożliwą jest rzeczą swobodnie czasem rozporządzać. Tak więc przedstawia się jeden rodzaj demokracji, na takich podstawach oparty."},{"type":"paragraph","text":"4. Drugi rodzaj jest wynikiem łączącego się z nim doboru; wszystkim mianowicie, których urodzenie nie budzi zastrzeżeń, przysługuje tu prawo udziału w rządach, o ile mogą mieć na to czas wolny, że zaś brak im potrzebnych do tego dochodów, więc w takiej demokracji rządzą prawa."},{"type":"paragraph","text":"Trzeci rodzaj [przedstawia ustrój], w którym wszyscy wolni mogą brać udział"},{"type":"paragraph","text":"w rządach, ale z podanego powyżej powodu nie biorą [w nich faktycznie udziału], tak że i w tym wypadku z konieczności władają prawa."},{"type":"paragraph","text":"5. Czwarty rodzaj demokracji to ten, który jako ostatni, co do czasu, w państwach się pojawił. Ponieważ państwa znacznie się rozrosły ponad swe początkowe rozmiary i mają pod dostatkiem dochodów, więc wszyscy mają prawo 93"},{"type":"paragraph","text":"do udziału w rządach skutkiem przewagi pospólstwa; a uczestniczą w nich rzeczywiście, biorąc udział w życiu publicznym, gdyż i ubodzy mogą sobie pozwolić na potrzebny do tego czas wolny, ponieważ otrzymują wynagrodzenie."},{"type":"paragraph","text":"A nawet pospólstwo takie najwięcej ma czasu wolnego. Nie zaprząta ich bowiem bynajmniej troska o własne sprawy, która zajmuje jednak bogatych, tak że często nie biorą udziału w zgromadzeniach ludowych lub w sądach. Dlatego masa ubogich dzierży najwyższą władzę w państwie, nie prawa. Tyle tedy jest rodzajów demokracji i takie jej postaci w koniecznym wyniku tych przyczyn."},{"type":"paragraph","text":"6. Co się tyczy oligarchii, to pierwszy jej rodzaj występuje, jeśli większa liczba obywateli posiada majątek, lecz mniejszy, nie nazbyt wielki. Kto taki majątek zdobędzie, ma możność brać udział w życiu publicznym, że zaś uczestniczących w nim jest mnóstwo, więc z konieczności nie ludzie, lecz prawa władają. Im więcej bowiem oddalają się od monarchii, a nie mają tak dużego majątku, żeby bez troski mogli swobodnie rozporządzać czasem, lub też tak małego, by mieli przez państwo być utrzymywani, tym więcej muszą sobie życzyć, by prawa nimi władały, a nie oni sami."},{"type":"paragraph","text":"7. Jeśli zaś zamożnych ludzi jest mniej niż w poprzednim wypadku, ale większym rozporządzają majątkiem, to powstaje drugi rodzaj oligarchii, bo mając większe środki, większe podnoszą roszczenia. Dlatego sami wybierają spośród innych obywateli ludzi wchodzących do rządu państwa i odpowiednie prawo w tym względzie wydają, ponieważ nie są jeszcze dość silni, by przez prawa rządzić."},{"type":"paragraph","text":"8. Jeśli zaś stan ten spotęguje się przez to, że jest ich jeszcze mniej, a większe mają majątki, powstaje trzeci stopień oligarchii, w której oni to sobie samym nadają urzędy, ale na podstawie prawa postanawiającego, że w razie śmierci któregoś syn obejmuje po nim urząd."},{"type":"paragraph","text":"A gdy już majątki ich i liczba zwolenników wzrosną nadmiernie, to będzie to panowanie wielmożów, które bliskie jest monarchii, i nie prawa wówczas, lecz ludzie są wszechwładnymi panami. Jest to czwarty rodzaj oligarchii, stanowiący przeciwieństwo ostatniego rodzaju demokracji."},{"type":"paragraph","text":"9. Oprócz demokracji i oligarchii są nadto dwa rodzaje ustrojów, z których jeden podają wszyscy, także i ja, jako jedną z czterech form ustrojowych (do tych czterech zalicza się: monarchię, oligarchię, demokrację, a jako czwartą — tzw."},{"type":"paragraph","text":"arystokrację); piątą zaś stanowi [forma], określana wspólnym mianem wszystkich poprzednich (nazywają ją bowiem politeją) 14, ponieważ jednak nie występuje często, uchodzi uwagi próbujących ująć liczbę form ustrojowych, tak że podają ich tylko cztery, jak Platon w Państwie 15."},{"type":"paragraph","text":"10. Arystokracją słusznie tedy nazywa się ta forma ustroju, o której roz-prawiałem w początkowych wywodach16. Bo jedynie ustrój, który oddaje rządy 14 Politeją, we właściwym tego słowa znaczeniu po prostu ustrój polityczny, oznacza u Arystotelesa nadto specjalny rodzaj ustroju; por. ks. III, rozdz. 5, § 2 i wyżej, rozdz. 2, § 1; a także rozdz, 6, §"},{"type":"paragraph","text":"2, 5; rozdz. 7."},{"type":"paragraph","text":"15 W ks. VIII i IX."},{"type":"paragraph","text":"16 Por. ks. III, rozdz. 5, i rozdz. 10, § 7."},{"type":"paragraph","text":"94"},{"type":"paragraph","text":"ludziom bezwzględnie najlepszym pod względem moralnym, a nie dobrym tylko pod pewnym względem, zasługuje sprawiedliwie na miano arystokracji. Tylko w niej dobry człowiek i dobry obywatel to po prostu to samo, podczas gdy w innych ustrojach ci, którzy za dobrych uchodzą, są nimi tylko w stosunku do swej formy ustrojowej. Są jednakowoż jeszcze pewne formy ustroju, które wykazują różnice zarówno w stosunku do oligarchii, jak i do tzw. politei <a zwą się arystokracjami > 17. Dobiera się tam bowiem przedstawicieli władzy nie tylko ze względu na ich bogactwo, ale i wartość moralną."},{"type":"paragraph","text":"11. Ustrój taki różni się od nich obu i nazywa się arystokratyczny. Bo nawet w tych państwach, w których praktykowanie cnoty nie jest przedmiotem troski ogólnej, są mimo to pewni ludzi szacowni i uznani za cnotliwych. Gdzie więc ustrój uwzględnia18 bogactwo, cnotę i lud, jak w Kartaginie19, tam jest on arystokratyczny, gdzie zaś, jak w Lacedemonie, ma na względzie tylko dwa czynniki, cnotę i lud, tam jest mieszanina dwóch form, panowania ludu i panowania cnoty. Arystokracja zatem oprócz pierwszej, najlepszej formy, wykazuje jeszcze te dwa rodzaje; trzeci stanowią te ustroje, które od tzw. politei odchylają się raczej ku oligarchii."},{"type":"paragraph","text":"6. Politeja czyli mieszanina oligarchii i demokracji 1. Pozostają nam jeszcze do omówienia tzw. politeja i tyrania. Przyjęliśmy taki porządek, choć ani politeja, ani omówiona dopiero co arystokracja nie są zwyrodniałymi formami, gdyż po prawdzie wszystkie te ustroje stanowią odchylenia od najwłaściwszego, a następnie dlatego, że liczy się je łącznie, choć tamte są ich odchyleniem, jak to w początkowych wywodach powiedziałem20. O tyranii słusznie wspominamy na końcu, ponieważ ze wszystkich ustrojów najmniej na tę nazwę zasługuje, a przecież nasze rozważania dotyczą ustroju. Tyle o przyczynach dla których taki porządek przyjęliśmy, z kolei przejdziemy do omó-"},{"type":"paragraph","text":"wienia politei."},{"type":"paragraph","text":"2. Po wywodach poświęconych oligarchii i demokracji istota jej jaśniej występuje. Bo politeja jest to, krótko mówiąc, mieszanina oligarchii i demokracji."},{"type":"paragraph","text":"Zwykło się zaś nazywać politejami ustroje przechylające się ku demokracji, natomiast arystokracjami ustroje skłaniające się ku oligarchii, gdyż z większym bogactwem idzie też w parze wykształcenie i szlachectwo. Wchodzi tu nadto w rachubę ten wzgląd, że bogaci posiadają już to, co dla niesprawiedliwych bywa przyczyną niegodziwości, i stąd właśnie zwą ich wytwornymi i szlachetnymi oraz znakomitymi."},{"type":"paragraph","text":"17 Niektórzy wydawcy (tak i O. Immisch Aristoteles, Politica, post. F. Susemihlium rec…, Lipsiae 1909) proponują skreślenie jako wtrętu słów ujętych w ostry nawias, ze względu na początek § lL"},{"type":"paragraph","text":"18 Oczywiście przy wyborze urzędników."},{"type":"paragraph","text":"19 Por. ks. II, rozdz. 8, § 5."},{"type":"paragraph","text":"20 Por. ks. III, rozdz. 5, § 4."},{"type":"paragraph","text":"95"},{"type":"paragraph","text":"3. Skoro tedy arystokracja chce oddać przewagę najlepszym spośród obywateli, zatem i o oligarchii powiada się, że składa się przeważnie z wytwornych i szlachetnych ludzi. Wydaje się jednak rzeczą niemożliwą, żeby państwo z ustrojem arystokratycznym, czyli państwo, w którym najlepsi władają, nie miało posiadać uporządkowanych stosunków prawnych, a miałoby je posiadać państwo, w którym rządzą przewrotni, i znów podobnie, by państwo, nie mające praworządnych stosunków, miało ustrój arystokratyczny, czyli by tam rządzili najlepsi. A nie jest to praworządność, gdy wprawdzie prawa są dobre, ale nie znajdują posłuchu."},{"type":"paragraph","text":"Dlatego jako jedną cechę praworządności przyjąć należy posłuszeństwo wobec istniejących praw; druga zaś wyraża się w tym, że prawa, którym obywatele podlegają, są dobrze ujęte (bo przecież można słuchać także i źle ujętych praw)."},{"type":"paragraph","text":"[Jeśli zaś prawa są dobre, to] są tu możliwe dwie ewentualności: albo są one możliwie najlepsze w istniejących warunkach, albo też bezwzględnie najlepsze."},{"type":"paragraph","text":"4. Istota arystokracji zdaje się leżeć w tym przede wszystkim, że się godności wedle cnoty rozdziela; bo cechą znamienną arystokracji jest cnota, oligarchii bogactwo, a demokracji wolność. Zasada zaś, że wola większości rozstrzyga, obowiązuje wszędzie, bo i w oligarchii, i w arystokracji, i w demokracji, a moc rozstrzygającą ma to, co uchwali większość biorących udział w zarządzie państwa."},{"type":"paragraph","text":"W większości państw chlubią się21 formą ustrojową politei, bo oglądają się jedynie na mieszaninę zamożnych i ubogich, bogactwa i wolności, a jednak niemal w większości wypadków bogaci zdają się zajmować miejsce wytwornych i szlachetnych."},{"type":"paragraph","text":"5. Skoro są trzy czynniki współzawodniczące o równość [prawa] w państwie: wolne urodzenie, bogactwo i cnota (czwarty bowiem, zwany szlachectwem towarzyszy dwom ostatnim; jest przecież szlachectwo z dawna dziedziczonym bogactwem i cnotą), więc jasną jest rzeczą, że mieszaninę dwóch składników: bogatych i ubogich, musi się nazwać politeją, a mieszaninę trzech arystokracją, i to przed innymi formami ustrojowymi, z wyjątkiem prawdziwej i pierwszej22."},{"type":"paragraph","text":"Wykazałem zatem, że prócz monarchii, demokracji i oligarchii istnieją jeszcze inne formy ustroju; okazało się, jakie są i czym się różnią od siebie arystokracje, a czym politeją od arystokracji, tudzież, że nie są one zbyt dalekie od siebie."},{"type":"paragraph","text":"7. Jak powstaje politeją i jak ją należy urządzać 1. Nawiązując do powyższych wywodów pragnę z kolei omówić, w jaki sposób obok demokracji i oligarchii powstaje tzw. politeją i jak ją należy urządzić."},{"type":"paragraph","text":"Równocześnie zaś okaże się, jakie cechy odróżniają demokrację od oligarchii."},{"type":"paragraph","text":"21 Tekst tu zapewne zepsuty, tłumaczenie idzie za poprawką Immischa (καλλωπίζεται zamiast przekazanego καλείται),"},{"type":"paragraph","text":"22 W tekście nie jest tu powiedziane, którą to formę ustroju należy uważać za prawdziwą i pierwszą, ale prawdopodobieństwo przemawia za tym, że chodzi o arystokrację opartą jedynie na cnocie, jak na początku § 4 powiedziano."},{"type":"paragraph","text":"96"},{"type":"paragraph","text":"Trzeba bowiem uchwycić różnicę między nimi, a następnie, ujmując z jednej i drugiej niejako odłamaną część23, złożyć całość."},{"type":"paragraph","text":"2. Są zaś trzy sposoby takiego złożenia i zmieszania. Jeden polega na tym, że z obu ustrojów trzeba wziąć te prawa, jakie oba ustanawiają w pewnej dziedzinie, jak np. w sądownictwie. W oligarchiach bowiem nakładają grzywnę na bogatych uchylających się od obowiązków sędziowskich, ale ubogim nie przyznają za ich pełnienie żadnej zapłaty, w demokracjach przeciwnie, jest zapłata dla ubogich, ale nie ma wcale kary dla bogatych. Wspólna droga pośrednia prowadzi do połączenia jednego i drugiego, co odpowiada charak-terowi politei, przedstawiającej przecież mieszaninę obu tych form. To byłby jeden sposób zespolenia."},{"type":"paragraph","text":"3. Drugi polega na tym, że idzie się pośrednią drogą w przyjmowaniu tego, co obie strony zarządzą; tak np. jedni uzależniają udział w zgromadzeniach ludowych od żadnego albo całkiem małego cenzusu majątkowego, drudzy od wysokiego. [W"},{"type":"paragraph","text":"takim wypadku] nie przyjmuje się żadnego z nich, lecz cenzus pośredni między nimi oboma."},{"type":"paragraph","text":"Trzeci sposób wynika z połączenia dwóch zarządzeń wyjętych częścią z ustawodawstwa oligarchicznego, częścią z demokratycznego. Za cechę demokratyczną np. uchodzi, że się urzędy obsadza przez losowanie, za oligarchiczną zaś, gdy się to dzieje przez wybór; i znów znamieniem demokracji jest, że dostęp do nich nie jest uzależniony od cenzusu majątkowego, a cechą oligarchii — gdy przy tym obowiązuje cenzus. Właściwością arystokracji i politei będzie to, że przejmą z każdego ustroju coś innego, a więc z oligarchii postanowienie, że urzędy obsadza się przez wybór, a z demokracji, że nie ma przy tym zastrzeżenia co do cenzusu majątkowego. Taki to jest ten sposób zespolenia."},{"type":"paragraph","text":"4. Że zmieszanie demokracji i oligarchii dobrze zostało przeprowadzone, okazuje się wówczas, gdy ten sam ustrój można nazwać i demokracją, i oligarchią."},{"type":"paragraph","text":"Tym, co tak mówią, zdarza się to oczywiście dlatego, że mieszanina wypadła dobrze i w ogóle zawsze tak bywa, gdy się obierze pośrednią drogę, bo wówczas występują jedne i drugie skrajności. Zaznacza się to w odniesieniu do ustroju lacedemońskiego."},{"type":"paragraph","text":"5. Wielu próbuje podawać go za demokrację ze względu na to, że w urządzeniach swoich ma wiele cech demokratycznych, jak np. przede wszystkim w dziedzinie wychowania dzieci. Bo. dzieci bogatych otrzymują tam to samo wychowanie, co dzieci ubogich, i to samo wykształcenie, które jest dostępne również i dzieciom ubogich. Podobnie jest i w następnym okresie wieku, i to samo wówczas, gdy na mężów wyrosną. W niczym bowiem nie ujawnia się różnica między bogatym a ubogim; tak więc wszyscy otrzymują to samo pożywienie przy wspólnych biesiadach24, a bogaci noszą takie szaty, że na ich nabycie każdy 23 W org. το σύµβολον — znak, cecha, znak przyjacielskich stosunków, liczman rozłamywany, aby po zestawieniu połów znowu się poznać."},{"type":"paragraph","text":"24 Por. ks. II, rozdz. 6, § 21."},{"type":"paragraph","text":"97"},{"type":"paragraph","text":"z ubogich może się zdobyć. Nadto jest cechą demokratyczną, że z dwóch najwyższych godności jedną obsadza lud w drodze wyboru, a do drugiej każdy może z ludu być wybrany (wybierają mianowicie [członków rady starców, czyli]"},{"type":"paragraph","text":"gerontów, a mają dostęp do eforatu)25. Inni natomiast poczytują ten ustrój za oligarchię; ponieważ posiada wiele cech oligarchicznych, jako że wszystkie urzędy obsadza się w drodze wyboru, a żaden przez losowanie, że w rękach niewielu spoczywa władza orzekania o śmierci i wygnaniu oraz wiele innych znamion tego rodzaju."},{"type":"paragraph","text":"6. W dobrze zmieszanym ustroju powinny się zaznaczać zawarte w nim cechy obu ustrojów, a nie jednego z nich tylko, i winien on mieć zdolność utrzymania się o własnych siłach, nie przy pomocy z zewnątrz, a więc sam przez się; winien się utrzymywać nie dlatego, że większość sąsiadów pragnie jego utrzymania (bo to mogłoby pomagać do utrzymania i marnego ustroju), ale dlatego, że żadna w ogóle z części składowych państwa innego ustroju by nie chciała."},{"type":"paragraph","text":"Wykazaliśmy więc powyżej, jak należy urządzić politeję, zarówno jak i tak zwane arystokracje."},{"type":"paragraph","text":"8. Tyrania i różne jej rodzaje"},{"type":"paragraph","text":"1. Pozostało nam jeszcze pomówić o tyranii, nie dlatego żeby trzeba było długo się nad nią rozwodzić, lecz by znalazła przecież uwzględnienie przy tych rozważaniach, skoro i ją uważamy za pewną formę ustrojową. O królestwie mówiliśmy w poprzednich wywodach26, w których poddaliśmy badaniu królestwo przede wszystkim na tę nazwę zasługujące, wykazując, czy jest ono pożyteczne dla państwa, czy nie, kogo i skąd należy na godność władcy powoływać oraz jak królestwo urządzić."},{"type":"paragraph","text":"2. W toku rozważań poświęconych królestwu rozróżniliśmy dwa rodzaje tyranii, ponieważ władza tyrana w obu wypadkach zbliża się w pewnym stopniu do władzy królewskiej ze względu na to, że obie mają prawną podstawę. Bo jak u niektórych ludów barbarzyńskich wybierają samowładnych monarchów, tak i u dawnych Hellenów powoływano niegdyś w ten sam sposób na monarchów pewnych ludzi, których zwano ajsymnetami. Oba te rodzaje tyranii .wykazywały pewne różnice, ale zbliżone były do królestwa ze względu na prawną podstawę i zgodę podwładnych monarchy, zarazem jednak miały znamiona tyranii, ponieważ władza była despotyczna i kierowała się samowolą."},{"type":"paragraph","text":"3. Trzeci rodzaj to tyrania, która najwięcej na tę nazwę zasługuje, a jest przeciwieństwem pełnego królestwa27. Taka tyrania musi być monarchią, czyli 25 Por. wyżej, ks. II, rozdz. 6, § 14 nn."},{"type":"paragraph","text":"26 Por. ks. III, rozdz. 9."},{"type":"paragraph","text":"27 Por. ks. III, rozdz. 11."},{"type":"paragraph","text":"98"},{"type":"paragraph","text":"panowaniem jednego człowieka, który, sam przed nikim nie odpowiadając, panuje nad wszystkimi, równymi [sobie] jak i lepszymi od siebie, ku swej jedynie korzyści, a nie ku pożytkowi podwładnych. Toteż nie ma oparcia w ich zgodzie, bo żaden wolny człowiek nie znosi dobrowolnie takiej władzy."},{"type":"paragraph","text":"Takie to są tedy rodzaje tyranii i tyle ich jest z powodów podanych."},{"type":"paragraph","text":"9. Najlepszym państwem jest to,"},{"type":"paragraph","text":"które opiera się na stanie średnim"},{"type":"paragraph","text":"1. Jaki jest najlepszy ustrój i jakie jest najlepsze życie dla większości państw i większości ludzi, nie da się rozstrzygnąć ani według cnoty przechodzącej siły zwykłych ludzi, ani według wykształcenia, które wymaga przyrodzonych zdolności i środków zależnych od zrządzenia losu, ani według ustroju, jaki sobie ktoś wedle swojego życzenia pomyśli, ale w ten sposób, że się ma na oku życie, które dla większości jest możliwe do osiągnięcia, i ustrój, który w większości państw może znaleźć zastosowanie."},{"type":"paragraph","text":"2. Bo i tzw. arystokracje, o których dopiero co była mowa, częścią są nie do zastosowania w większości państw, częścią graniczą z tzw. politeją. Dlatego o obu tych formach trzeba pomówić jakby o jednej."},{"type":"paragraph","text":"Rozstrzygnięcie wszystkich tych wątpliwości wychodzi z tych samych założeń."},{"type":"paragraph","text":"Jeśli bowiem w Etyce słusznie powiedziano, że życie szczęśliwe jest to życie polegające na uprawianiu cnoty bez przeszkód28, a cnota to środek między skrajnościami29, to najlepsze musi być życie, które się trzyma środka, i to środka możliwego do osiągnięcia dla wszystkich."},{"type":"paragraph","text":"3. Te same wytyczne muszą rozstrzygać o dobroci czy niedomaganiu państwa względnie ustroju, bo ustrój jest niejako życiem państwa. Otóż we wszystkich państwach są trzy grupy obywateli: bardzo bogaci, bardzo ubodzy i trzecia klasa pośrednia między nimi. Skoro więc panuje ugoda co do tego, że umiarkowanie i środek są najlepsze, to oczywiście i w zakresie posiadania będzie średnia własność [bezwzględnie] ze wszystkich najlepsza."},{"type":"paragraph","text":"4. Ludzie z tej grupy najłatwiej bowiem dają się powodować rozumowi, podczas gdy człowiekowi nadmiernie pięknemu lub nadmiernie silnemu, czy też człowiekowi ze szczególnie znakomitego rodu lub nadmiernie bogatemu, albo też, przeciwnie, nadmiernie ubogiemu, nadmiernie słabemu, czy wreszcie człowiekowi szczególnie pogardzanemu ciężko przychodzi iść za głosem rozumu. Bo pierwsi popadają zbyt łatwo w pychę i przewrotność na wielką miarę, drudzy okazują się zbyt przewrotnymi i złoczyńcami w drobnych rzeczach, a przecież wszystkie nieprawości wynikają z pychy albo z przewrotno-"},{"type":"paragraph","text":"ści. Ponadto ludzie tacy najgorzej się zachowują, tak gdy się od pełnienia 28 Por. Et. nik. 1153 b; por. również 1101a."},{"type":"paragraph","text":"29 Tamże, 1106 a-b."},{"type":"paragraph","text":"99"},{"type":"paragraph","text":"urzędów uchylają, jak i gdy zbyt gorąco o nie zabiegają30, co równie jest dla państwa szkodliwe."},{"type":"paragraph","text":"5. Poza tym ci, co opływają w nadmiar darów losu: siłę, bogactwo, przyjaciół"},{"type":"paragraph","text":"i tym podobne, ani nie chcą, ani nie umieją słuchać — a nastrajają się do tego zaraz od dziecka w domu [rodzicielskim], bo zepsuci przez zbytek nawet w szkole nie umieją przywyknąć do posłuszeństwa; przeciwnie znów ci, którzy wzrośli w zupełnym braku dóbr takich, wykazują nazbyt służalczą uległość. Toteż jedni nie umieją władać, lecz tylko w służalczy sposób słuchać, drudzy nie umieją ulegać żadnej władzy, a rządzić potrafią tylko w sposób despotyczny."},{"type":"paragraph","text":"6. Powstaje więc państwo nie ludzi wolnych, ale niewolników i despotów, z których jedni są przepełnieni zawiścią, a drudzy pogardą. Jest to bardzo dalekie od przyjaźni i poczucia wspólnoty państwowej, która jest przecież przyjaźnią, bo z nieprzyjaciółmi nawet drogi nie chce się dzielić. Państwo zaś chce posiadać możliwie równych i podobnych obywateli, a postulatowi temu najwięcej odpowiada stan średni. Toteż najlepszy ustrój ma z konieczności to państwo, które taki właśnie skład wykazuje, jakiego według naszych wywodów wymaga natura państwa."},{"type":"paragraph","text":"7. Tacy też obywatele najwięcej są w państwach bezpieczni. Bo ani sami nie pożądają, jak ubodzy, dóbr obcych, ani też drudzy nie pożądają ich mienia, jak ubodzy w stosunku do bogatych; że zaś nikt na nich nie czyha, ani też oni sami na nikogo nie nastają, więc żywot z dala od niebezpieczeństw pędzą. Stąd słuszność miał Fokylides31, wyrażając życzenie:"},{"type":"paragraph","text":"Średni stan jest najlepszy, do niego pragnę w państwie należeć."},{"type":"paragraph","text":"8. Jasną też jest rzeczą, że również i wspólnota państwowa, która na średnim stanie się opiera, jest najlepsza, i że takie państwa mogą posiadać dobry ustrój, w których istnieje liczny stan średni, silniejszy bezwzględnie od obu pozostałych lub jeśli nie, to chociaż od jednego z nich. Bo na którąkolwiek stronę się skłoni, przechyla szalę i nie dopuszcza do wytworzenia przewagi jednej czy drugiej skrajności. Toteż największym szczęściem jest, jeśli obywatele danego państwa mają średni a wystarczający majątek, ponieważ tam, gdzie jedni bardzo wiele posiadają, a drudzy nic, przychodzi do władzy w następstwie obu tych skrajności albo skrajna demokracja, albo najczystsza oligarchia, albo i tyrania. Tyrania bowiem wyłania się zarówno z niepohamowanej demokracji, jak i oligarchii, o wiele rzadziej natomiast zdarza się ona tam, gdzie włada stan średni i ludzie bliscy sobie społecznie. Przyczynę tego omówimy później przy rozważaniach poświęconych przemianom ustroju."},{"type":"paragraph","text":"30 Tłumaczenie idzie za korekturą Bernaysa, przyjętą i przez Immischa (φυγαρχοΰσι και"},{"type":"paragraph","text":"σπουδαρχοϋσι) zamiast przekazanego φυλαρχοΰσι και βουλαρχοΰσι, czyli „gdy zabiegają o stanowiska w gminie i radzie”."},{"type":"paragraph","text":"31 Fokylides z Miletu, poeta z połowy VI w. p.n.e., autor zaginionych elegii o charakterze moralizatorskim. Zachowany pod jego imieniem zbiór heksametrów pochodzi z czasów znacznie późniejszych."},{"type":"paragraph","text":"100"},{"type":"paragraph","text":"9. Okazuje się więc, że państwo, na średnim stanie oparte, jest najlepsze, bo też takie jedynie wolne jest od wstrząśnień wewnętrznych. Gdzie bowiem stan średni jest liczny, tam najmniej powstają bunty i rozłamy między obywatelami."},{"type":"paragraph","text":"Z tego samego powodu również wielkie państwa są mniej narażone na wewnętrzne wstrząśnienia, ponieważ stan średni bywa w nich liczny. W małych natomiast łatwiej przychodzi do rozłamu ogółu na dwa obozy, skutkiem czego stan średni zupełnie zanika i wszyscy niemal dzielą się na bogatych i ubogich. Dzięki oparciu o stan średni są też demokracje pewniejsze i trwalsze niż oligarchie, bo w demokracjach ludzie ze stanu średniego są liczniejsi i częściej mają dostęp do godności niż w oligarchiach. Gdzie stanu średniego zabraknie i ubodzy dzięki swej liczbie wezmą górę, następuje rozstrój, który szybko za sobą zgubę pociąga."},{"type":"paragraph","text":"10. Za wymowny dowód słuszności tego poglądu musi się uznać fakt, że także i najlepsi prawodawcy wyszli ze stanu średniego. Bo i Solon do niego należał (co jest widoczne z jego utworów poetyckich), i Likurg (bo nie był królem), i Charondas, i niemal wszyscy inni. Wyjaśnia to również, dlaczego większość państw ma ustrój albo demokratyczny, albo oligarchiczny. Ponieważ mianowicie stan średni jest u nich często nieliczny, więc którakolwiek klasa ma przewagę, czy posiadający majątki, czy lud, zawsze władzę w państwie zagarniają ci, co się poza środkiem znajdują, tak że powstaje albo demokracja, albo oligarchia."},{"type":"paragraph","text":"11. A że nadto wszczynają się zaburzenia i walki między ludem a bogatymi, więc którejkolwiek ze stron uda się przemóc przeciwników, ta nie zaprowadza ustroju liczącego się z dobrem ogólnym i zasadą równości, lecz jako nagrodę zwycięstwa zagarnia przewagę w państwie i urządza czy to demokrację, czy to oligarchię. Przecież i oba te państwa, które hegemonię w Grecji dzierżyły, ze względu na istniejący w nich ustrój zaprowadzały w innych państwach albo demokrację, albo oligarchię, mając na uwadze nie ich, ale swoją własną korzyść."},{"type":"paragraph","text":"12. Z tych powodów pośredni ustrój albo nigdy nie dochodzi do skutku, albo rzadko, i to w niewielu państwach. Bo jeden tylko człowiek spośród tych, co dawniej doszli do władzy, zdobył się na to, by taki ustrój zaprowadzić32. Co więcej, u obywateli różnych państw ustalił się już zwyczaj, że nawet nie pragną równości, lecz albo dążą do władzy, albo też zwyciężeni cierpliwie ją znoszą."},{"type":"paragraph","text":"Okazuje się więc z powyższych uwag, jaki ustrój jest najlepszy i z jakiego powodu."},{"type":"paragraph","text":"13. Co się tyczy innych ustrojów — powiadam bowiem, że jest więcej demokracji i oligarchii — to po ustaleniu najlepszego ustroju nietrudno stwierdzić, który z kolei należy na pierwszym miejscu postawić, a który na drugim i tak dalej według tego, który jest lepszy lub
