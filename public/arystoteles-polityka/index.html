 pod uwagę pewną część jego obywateli, a nie wszystkich. Toteż oczywistą jest rzeczą, że własność ziemska musi być w ich rękach, a rolę muszą uprawiać niewolnicy lub barbarzyńcy w sąsiedztwie mieszkający 12."},{"type":"paragraph","text":"6. Z klas wyliczonych pozostała jeszcze jedna do omówienia — klasa kapłanów, ale i ich stanowisko jest jasne. Nie można ustanowić kapłanem ani rolnika, ani rzemieślnika, bo przyzwoitość wymaga, by bogom cześć oddawali obywatele. Że zaś obywatele dzielą się na dwie grupy, z których jedna stanowi siłę zbrojną państwa, druga zaś radzi nad jego sprawami, a właściwą jest rzeczą, by ci służbę bożą pełnili i równocześnie odpoczynku mogli zażywać, którzy z powodu wieku z życia publicznego się wycofali, więc im też należałoby powierzyć godności kapłańskie."},{"type":"paragraph","text":"11 Por. wyżej, rozdz.1, § 2-6, oraz niżej, § 3 niniejszego rozdz.."},{"type":"paragraph","text":"12 Autor ma na myśli ludność tubylczą w sąsiedztwie różnych kolonii greckich, zepchniętą do roli niewolnych chłopów, jak Mariandynowie pod Herakleą pontyjską lub Killiriowie w sąsiedztwie Syrakuz na Sycylii."},{"type":"paragraph","text":"173"},{"type":"paragraph","text":"Tak tedy wyłożyłem, jakie są składniki niezbędne do istnienia państwa i jakie są jego części. Chłopi mianowicie, rzemieślnicy i wszelkiego rodzaju robotnicy muszą być w każdym państwie, natomiast częściami państwa są obywatele pełniący służbę wojskową i zasiadający w radzie, przy czym części te są od siebie oddzielone, już to całkowicie i zawsze, już to częściowo."},{"type":"paragraph","text":"9. Historyczne uzasadnienie podziału państwa"},{"type":"paragraph","text":"na klasy — podział własności ziemskiej na część wspólną i prywatną. Ich przeznaczenie."},{"type":"paragraph","text":"Do uprawy roli najlepiej użyć niewolników"},{"type":"paragraph","text":"1. Że państwo musi się dzielić na odrębne klasy i wojownicy muszą stanowić klasę odrębną od rolników, to nie jest chyba odkryciem rozmyślających nad ustrojem państwa filozofów z dnia dzisiejszego czy też z ostatnich czasów."},{"type":"paragraph","text":"W Egipcie bowiem urządzenia takie istnieją jeszcze do dnia dzisiejszego, tak samo i na Krecie; w Egipcie zostały one zaprowadzone aktem prawodawczym Sezo-strisa13, na Krecie zaś Minosa14."},{"type":"paragraph","text":"2. Prastary wydaje się też zwyczaj urządzania wspólnych biesiad, który na Krecie zaprowadzony został w okresie panowania króla Minosa, a w Italii istniał"},{"type":"paragraph","text":"w dużo jeszcze dawniejszych czasach. Bo znawcy podań wśród tamtejszej ludności powiadają, że królem Ojnotrii był niejaki Italos, którego imię przyjęli mieszkańcy i nazwali się Italami zamiast Ojnotrami15, a nazwę Italii otrzymał ten skrawek Europy, który się znajduje pośrodku między zatoką miasta Skylletion a Zatoką Lametyjską16, oddalonymi od siebie o pół dnia marszu."},{"type":"paragraph","text":"3. Otóż powiadają, że ten Italos z koczujących Ojnotrów zrobił rolników, nadał"},{"type":"paragraph","text":"im różne prawa i między innymi zaprowadził po raz pierwszy wspólne biesiady, dlatego i teraz jeszcze niektórzy z jego potomków urządzają wspólne biesiady i stosują niektóre z jego praw. Zamieszkiwali ten kraj od strony Morza Tyrreńskiego Opikowie, którzy zarówno dawniej, jak i obecnie mają przydomek Ausonów, od strony zaś Japygii i Morza Jońskiego w tzw. Syrytydzie17 [mieszkali] Chonowie, którzy zresztą byli z pochodzenia również Ojnotrami."},{"type":"paragraph","text":"Otóż urządzenie wspólnych biesiad pierwotnie stamtąd wyszło, podział zaś mas obywateli na klasy pochodzi z Egiptu,· panowanie bowiem Sesostrisa o wiele dalej sięga w przeszłość aniżeli Minosa. W ogóle trzeba przyznać, że i inne urządzenia 13 Sezostris to grecka forma imienia Usirtesen, które nosili władcy Egiptu z XII dynastii (w XX"},{"type":"paragraph","text":"i XIX w. p.n.e.)."},{"type":"paragraph","text":"14 Minos, mityczny władca Knossos na Krecie."},{"type":"paragraph","text":"15 Ojnotrami zwali Grecy mieszkańców dzisiejszej Kalabrii (za czasów rzymskich Bruttium)."},{"type":"paragraph","text":"16 Zatoka Lametyjską, nazwana od rzeki Lametos do tej zatoki uchodzącej, dziś golfo di Eufemia (na zachodnim wybrzeżu Kalabrii) naprzeciw golfo di Sąuillace (na wschodnim wybrzeżu Kalabrii)."},{"type":"paragraph","text":"17 Syrytyda (Siritis), czyli okolica rzeki i miasta Siris nad Zatoką Tarencką, zamieszkana była przez plemię Chonów, którzy w V w. p.n.e. zalani zostali przez inwazję samnickiego szczepu Lukanów."},{"type":"paragraph","text":"174"},{"type":"paragraph","text":"w długim minionym okresie czasu wielokrotnie już albo raczej niezliczoną ilość razy zostały wynalezione. Bo tego, co konieczne, uczy — jak przypuszczać należy — sama potrzeba, a [gdy już te urządzenia powstaną] rozwijają się z natury rzeczy [dalsze], przyczyniające się do podniesienia piękna i wygody życia. Przyjąć zatem należy, że i rozwój urządzeń państwowych w ten sam sposób się dokonywał."},{"type":"paragraph","text":"5. Że zaś są one prastare, dowodem urządzenia w Egipcie. Mieszkańcy tego kraju uchodzą bowiem za najdawniejszy naród, a posiadają od niepamiętnych czasów prawa i ustrój państwowy. Dlatego należy w pełni korzystać z tego, co przekazane, a gdzie się okazują braki, trzeba się starać o ich uzupełnienie."},{"type":"paragraph","text":"Wyłożyłem zatem powyżej, że ziemia powinna należeć do tych, którzy posiadają broń i biorą udział w rządzeniu państwem, jako też dlaczego ci, którzy uprawiają ziemię, muszą stanowić odrębną klasę, i w końcu, jakie powinny być rozmiary kraju tudzież jego jakość."},{"type":"paragraph","text":"6. Z kolei należy najpierw pomówić o podziale kraju i o uprawiających rolę, a mianowicie, co to za ludzie być powinni. Wypowiedziałem się już przedtem przeciw temu, by własność ziemska była wspólna, jak to niektórzy głosili, bo zajmuję to stanowisko, że winna się ona stawać niejako wspólną przez przyjacielskie zużytkowanie, zarazem jednak jestem zdania, że żadnemu obywatelowi nie powinno zabraknąć tego, co mu do utrzymania potrzebne. Co do wspólnych biesiad, to wszyscy są zgodni, że są one użyteczne dla państw dobrze urządzonych; dlaczego i ja przychylam się do tego poglądu, to później wyjaśnię18. Udział brać w nich powinni wszyscy obywatele, ale dla niezamożnych niełatwą jest rzeczą z własnych zasobów złożyć ustaloną składkę, a nadto zaspokoić potrzeby reszty gospodarstwa domowego."},{"type":"paragraph","text":"7. Niezależnie od tego, na całym państwie ciążą wspólne wydatki związane z kultem bogów. Konieczną zatem jest rzeczą, by obszar wiejski podzielony był"},{"type":"paragraph","text":"na dwie części, z których jedna byłaby wspólną, a druga prywatną własnością, przy czym każda z nich dzieliłaby się znów na dwie części, a mianowicie z części wspólnej jedna przeznaczona by była na potrzeby kultu, część druga na wydatki związane ze wspólnymi biesiadami, z części zaś tego, co jest własnością prywatną, jedna byłaby położona na pograniczu, a druga opodal miasta, tak by z ziemi, pod dwie działki losem przydzielonej, każdy otrzymywał przydział zarówno w jednej, jak i drugiej stronie."},{"type":"paragraph","text":"8. Podział taki jest równy i sprawiedliwy, a w razie wojen z sąsiadami skuteczniej zapewnia jednolitość nastrojów. Tam bowiem, gdzie nie ma takich urządzeń, jedni niewiele się troszczą o zatargi z sąsiadami, a drudzy nadmiernie, nawet ponad interes państwa nimi się przejmują. Dlatego w niektórych państwach istnieje prawo, że w naradach nad wypowiedzeniem wojny sąsiedniemu państwu nie mogą brać udziału ci obywatele, którzy z nim graniczą, ponieważ ze względu na swój własny interes nie potrafiliby zająć przy naradzie właściwego stanowiska."},{"type":"paragraph","text":"18 W dalszych wywodach nie ma jednak już o tym mowy."},{"type":"paragraph","text":"175"},{"type":"paragraph","text":"W ten sposób zatem z podanych powodów powinien obszar wiejski być koniecznie podzielony."},{"type":"paragraph","text":"9. Do uprawy roli najlepiej jest, jeśli się ma pod tym względem swobodę decyzji, czy przyjmować niewolników, przy czym nie powinni być oni wszyscy z jednego szczepu ani też hardego ducha, bo wtedy i do roboty są użyteczni, i dają pewność, że się wcale do buntu nie będą porywać."},{"type":"paragraph","text":"Na drugim miejscu stawiam poddanych barbarzyńców w sąsiedztwie mieszkających, o podobnym charakterze, co poprzedni. Ci [z niewolników], którzy pracują na prywatnych gruntach, winni należeć do prywatnych właścicieli, a pracujący na gruntach państwowych do państwa. Jak zaś należy obchodzić się i niewolnikami, dlaczego lepiej jest wszystkim niewolnikom otworzyć w nagrodę [za dobre zachowanie] perspektywę uzyskania wolności, o tym później pomówimy19."},{"type":"paragraph","text":"10. Położenie miasta, jego domy i mury"},{"type":"paragraph","text":"1. Mówiłem o tym już poprzednio20, że miasto musi mieć dobre połączenia zarówno z lądem stałym, jak i z morzem, i podobnie wedle możności z całym swoim obszarem. Należałoby sobie tyczyć, aby posiadało ono położenie wyniosłe21, biorąc pod uwagę cztery względy. A więc przede wszystkim wzgląd na zdrowie. Miasta mianowicie położone na pochyłości skierowanej ku wscho-dowi i wystawione na wiatry wiejące od wschodu są zdrowsze; na drugim miejscu stoją miasta osłonięte od północy, bo te mają łagodniejszą zimę."},{"type":"paragraph","text":"2. Prócz tego miasto musi być tak położone, żeby zadość czyniło zadaniom związanym zarówno z pokojową działalnością obywateli, jak i z wojną. Na wypadek wojny musi umożliwić obywatelom łatwe wypady, a posiadać dostęp mocno utrudniony dla nieprzyjaciół i położenie utrudniające zamknięcie ob-lężeniem. Źródła i strumienie powinny by być w odpowiedniej ilości w obrę-"},{"type":"paragraph","text":"bie miasta, jeżeli jednak ich nie ma, to można temu zaradzić przez zało-"},{"type":"paragraph","text":"żenie wielu wielkich zbiorników na wodę deszczową, tak że mieszkańcy, nawet gdyby się znaleźli odcięci przez wojnę od kraju, nigdy braku [wody] nie będą odczuwać."},{"type":"paragraph","text":"3. Skoro należy dbać o zdrowie mieszkańców, a to zależy od dobrego położenia miejscowości i jej nachylenia w odpowiednim kierunku, następnie zaś od zaopatrzenia w zdrową wodę, więc i o nią należy się usilnie starać. Bo to, czego najwięcej i najczęściej zużywamy dla naszego ciała, to najwięcej też przyczynia 19 Do tematu tego w dalszej części dzieła autor już nie wraca; por. natomiast Ps.-Arystoteles, Ekonomika, ks. I, rozdz. 5, § 6 (1344 b)."},{"type":"paragraph","text":"20 Por. wyżej, rozdz. 5, § 2."},{"type":"paragraph","text":"21 Miejsce zepsute, różnie też było tłumaczone; przyjmuję koniekturę Immischa προσάντη"},{"type":"paragraph","text":"zamiast przekazanej lekcji προς αυτήν."},{"type":"paragraph","text":"176"},{"type":"paragraph","text":"się do zdrowia, a takie właśnie znaczenie ma z natury woda i powietrze. Dlatego w miastach rozumnie urządzonych, gdzie nie wszystka woda płynąca jest równie dobra lub gdzie nie ma jej pod dostatkiem, należy oddzielnie przechowywać wodę do picia i wodę przeznaczoną do innego użytku."},{"type":"paragraph","text":"4. Co się tyczy obronności miejsc, to jednak nie przy wszystkich rodzajach ustrojów jest ona równie korzystna, a więc np. zamek na wyniosłości dobry jest przy ustroju oligarchicznym i monarchicznym, natomiast przy ustroju demokratycznym zaleca się jednolite umocnienie całego miasta, a przy ustroju arystokratycznym ani jedno, ani drugie nie jest wskazane, lecz raczej większa ilość miejsc obwarowanych."},{"type":"paragraph","text":"Przy budowie domów prywatnych uchodzi za rzecz piękniejszą i odpowiedniejszą ze względów praktycznych, jeśli są one rozmieszczone w linii prostej, wedle nowego sposobu budowania Hippodamosa22, ale ze względu na bezpieczeństwo w czasie wojny lepszy jest przeciwny stan rzeczy, jak to za dawnych czasów bywało. W tym drugim wypadku trudno bowiem obcym napastnikom wycofać się z miasta, jak i znaleźć odpowiednią drogę w razie napadu 23."},{"type":"paragraph","text":"5. Dlatego trzeba stosować oba sposoby budowania; jest to mianowicie możliwe, jeśli się rozmieszcza domy w takim porządku, jak to czynią rolnicy przy sadzeniu winnej latorośli24. W ten sposób nie nadaje się całemu miastu regularnego układu, lecz tylko poszczególnym dzielnicom i obwodom, i można zachować wzgląd zarówno na bezpieczeństwo, jak i na piękno."},{"type":"paragraph","text":"Co się zaś tyczy murów, to wprawdzie powiadają, że miasta, które szczycą się ze swej dzielności, mieć ich nie powinny, ale jest to pogląd zbyt przestarzały, zwłaszcza jeśli się widzi, że tego rodzaju przechwałki okazały się próżne wobec faktów25."},{"type":"paragraph","text":"6. Nie przynosi to chwały wobec równego lub niewiele liczbą górującego przeciwnika szukać schronienia za osłoną murów, ale skoro zdarza, się tak i zachodzi możliwość, że przewaga napastników przy całym ludzkim męstwie wobec małej liczby obrońców jest zbyt wielka, to jednak, jeśli ci ostatni mogą się uratować, a nie narazić się na klęskę i hańbę, musi się jak najsilniejsze mury uznać za znakomity środek wojenny, zwłaszcza obecnie, kiedy wynalazki w dziedzinie wyrzutni pocisków i machin oblężniczych tak wielkie poczyniły postępy."},{"type":"paragraph","text":"7. Żądać, by miast nie otaczać murami, to tak, jakby szukać dogodnego do napaści położenia i znosić wokół wyniosłości górskie, albo też nie otoczyć ogrodzeniem własnego domu w obawie, że mieszkańcy jego zatracą męskiego 22 Por. wyżej, ks. II, rozdz. 5, § 1 nn."},{"type":"paragraph","text":"23 Autor ma być może na myśli opowieść Tukidydesa (II 4, 2) o wtargnięciu Teban do Platejów, skąd tylko z trudem i z wielkimi stratami zdołali się wycofać."},{"type":"paragraph","text":"24 Chodzi zapewne o układ w piątki, tzw. quincunx, tak że okrążające takie grupy domów ulice szłyby zygzakiem."},{"type":"paragraph","text":"25 Aluzja do Sparty, która, pozbawiona murów, kilkakrotnie w IV w. p.n.e. znalazła się w obliczu bezpośredniego zagrożenia."},{"type":"paragraph","text":"177"},{"type":"paragraph","text":"ducha. Nie powinno się nadto zapominać o tym, że ci, którzy wznieśli mury wokół"},{"type":"paragraph","text":"miasta, mają zupełną swobodę decyzji, czy zechcą skorzystać z tego środka obronnego, czy nie, a ci, którzy murów nie posiadają, swobody tej nie mają."},{"type":"paragraph","text":"8. Jeśli więc tak jest, to nie tylko powinno się wznosić mury, ale i to mieć na uwadze, by stanowiły one odpowiednią ozdobę miasta i dostosowane były do potrzeb wojny, tak w ogóle, jak i ze względu na nowe wynalazki. Bo jak napastnicy starają się zdobywać coraz nowe środki dla osiągnięcia sukcesu, tak i broniący się powinni nie tylko stosować istniejące środki obrony, ale i wynajdywać i wymyślać nowe; przecież w ogóle niechętnie się zaczepia ludzi, którzy są dobrze uzbrojeni."},{"type":"paragraph","text":"Skoro ogół obywateli powinien być podzielony na grupy zasiadające wspólnie do posiłków, a mury muszą być w odpowiednich miejscach zaopatrzone w strażnice i wieże, więc w sposób oczywisty nasuwa się tu żądanie, by pewne zespoły współbiesiadników w tych strażnicach pomieścić. W taki to sposób można by zatem te rzeczy urządzić."},{"type":"paragraph","text":"11. Świątynie, budynki rządowe, place publiczne 1. Natomiast przybytki poświęcone czci bogów i najprzedniejsze budynki, w których władze spożywają posiłki, najwygodniej jest pomieścić na odpowiednim miejscu razem, z wyjątkiem tych świątyń, którym prawo albo jakieś polecenie wyroczni pytyjskiej osobne wyznaczyło miejsce. Właściwe do tego będzie takie miejsce, które dostatecznie uwidocznia dostojne przeznaczenie budowli, a obronnością przewyższa sąsiednie części miasta."},{"type":"paragraph","text":"2. Poniżej tego miejsca dobrze jest urządzić plac rynkowy tego rodzaju jak w Tesalii, gdzie noszą one nazwę rynku wolnego. Jest to taki plac, na którym nie wystawia się żadnych towarów i na którym bez zawezwania przez władze nie wolno się zjawiać ani robotnikowi, ani chłopu, ani też żadnemu innemu człowiekowi tego rodzaju. Miejsce to może zyskać na powabie, jeśli się tam będą odbywać ćwiczenia cielesne starszych, bo właściwą jest rzeczą, by i te urządzenia były według wieku podzielone, aby na ćwiczeniach młodszych zjawili się jacyś urzędnicy, a plac ćwiczeń starszych leżał w pobliżu budynku władz urzędowych."},{"type":"paragraph","text":"Poczucie bowiem, że obywatel znajduje się na oczach władz, przyczynia się wybitnie do wzbudzenia u niego prawdziwego szacunku i tego lęku, jaki wolnemu przystoi. Plac targowy natomiast powinien być oddzielony od tamtego i gdzie indziej się znajdować, a to w takim miejscu, by wszelkie przesyłki towarowe, czy z morza, czy z lądu z łatwością mogły być tam dostarczone."},{"type":"paragraph","text":"3. Wobec tego, że do czynników przewodnich w mieście należą, prócz urzędników, i kapłani, właściwą jest rzeczą, by miejsca posiłków kapłanów urządzone były w pobliżu świętych budowli. Natomiast lokal urzędowy władz, do których należy sporządzanie kontraktów handlowych, przyjmowanie skarg sądowych, pozwy oskarżonych i inne tego rodzaju zajęcia, podobnie jak i lokal władz 178"},{"type":"paragraph","text":"skarbowych oraz miejskich, musi być położony w pobliżu placu targowego, w miejscu dla wszystkich dostępnym, a takim jest właśnie miejsce wokół placu targowego. Przyjmuje bowiem, że plac górny winien być wolny od hałaśliwych zajęć, a dolny służyć ma koniecznie czynnościom handlowym."},{"type":"paragraph","text":"4. Przedstawiony tu porządek powinien być wedle tego wzoru zastosowany także i na obszarze wiejskim. I tam bowiem dla celów nadzoru muszą istnieć strażnice tudzież budynki służące na wspólne posiłki, przeznaczone dla urzędników, którzy się nazywają już to dozorcami lasów, już to strażnikami wiejskimi, a oprócz tego i świątynie bogów czy herosów, porozmieszczane w różnych stronach kraju. Zbędną jest jednak rzeczą długo się teraz przy tych sprawach zatrzymywać przez wnikanie dokładne w szczegóły i ich omawianie, bo trudność polega nie na ich obmyślaniu, ale raczej na ich wykonaniu. Omawia się przecież rzeczy wedle swego życzenia, ale ich wykonanie zależy od zrządzenia losu."},{"type":"paragraph","text":"Dlatego niech mi wolno będzie oszczędzić sobie na razie dalszych uwag na ten temat."},{"type":"paragraph","text":"12. Nawrót do zagadnienia z początku księgi."},{"type":"paragraph","text":"Szczęście życia polega na cnocie, a to zależy"},{"type":"paragraph","text":"od właściwości przyrodzonych, a nadto od odpowiedniego wyrobienia i rozumu, co zdobywa się przez wychowanie"},{"type":"paragraph","text":"1. [Z kolei] trzeba pomówić o samym ustroju [a mianowicie zastanowić się nad tym], z których i jakiego rodzaju członków powinno się składać państwo, jeśli ma być szczęśliwe i dobrze rządzone. Dwa są warunki, od których zależy wszelkie powodzenie. Jeden z nich polega na tym, aby cel i zadanie działania należycie wytknąć, drugi zaś, aby znaleźć wiodące do celu działanie. Oba warunki mogą być zgodne ze sobą, ale też i niezgodne; czasem mianowicie wytknie się trafnie cel, ale działa się błędnie, tak że się go nie osiąga, niekiedy zaś stosuje się właściwe środki działania, ale cel zostaje błędnie wytknięty, niekiedy znów błądzi się w jednym i drugim względzie, jak [zdarza się] np. w sztuce lekarskiej. Bo lekarze czasem ani nie zdają sobie jasno sprawy, w jakim kierunku ma iść leczenie ciała, ani też nie stosują właściwych środków dla osiągnięcia zamierzonego celu. We wszystkich kunsztach i umiejętnościach należy w jednym i drugim kierunku być biegłym, a więc i w ustalaniu celu, i w stosowaniu środków wiodących do celu."},{"type":"paragraph","text":"2. Bezsporną jest rzeczą, że wszyscy pragną życia szczęśliwego i błogiego, ale tylko pewnym ludziom dostaje się to w udziale, innym zaś nie, czy to przez zrządzenie losu, czy przez przyrodzone warunki. Bo na to, aby żyć szczęśliwie, potrzeba także i wyposażenia w środki zewnętrzne, i to w mniejszym stopniu dla jednostek bogaciej uposażonych, a w wyższym dla uposażonych gorzej. Bywają i tacy, co mają wszelkie środki do osiągnięcia szczęścia, ale go od początku na niewłaściwej drodze szukają. Skoro postawiliśmy sobie za zadanie ustalić, jaki jest najlepszy ustrój, a jest nim taki, według którego najlepiej można rządzić państwem, 179"},{"type":"paragraph","text":"najlepiej zaś rządzić można państwem według ustroju, który zapewnia państwu najwięcej szczęścia, więc oczywistą jest rzeczą, że trzeba zdać sobie jasno sprawę z tego, co to jest szczęście."},{"type":"paragraph","text":"3. Powtarzam tu, co już wykazałem w Etyce 26 (jeśli owe wywody jakiś pożytek przynoszą), że polega ono na doskonałości w rozwijaniu działalności i uprawianiu cnoty, przy czym doskonałość rozumie się bezwzględnie, a nie w zależności od pewnych okoliczności. Względnie doskonałe są czyny dokonane z konieczności, bezwzględnie — czyny piękne. Tak więc, by dać przykład z dziedziny prawa, sprawiedliwe kary i zadośćuczynienia wynikają z cnoty, ale są aktem przymusu i przez przymus prowadzą do poprawy (byłoby przecież bardziej pożądane, aby nikt, ani jednostka, ani państwo tego rodzaju przymusu nie potrzebował); natomiast uczynki zmierzające do pomnożenia godności i zasobności są bezwzględnie najpiękniejsze. Bo pierwsze zmierzają do usunięcia pewnego zła, drugie przeciwnie, przygotowują i stwarzają pewne dobra."},{"type":"paragraph","text":"4. Człowiek cnotliwy potrafi wprawdzie zachować się pięknie nawet w ubóstwie, chorobie i innych przykrych doświadczeniach losu, ale przecież poczucie szczęścia ma się w przeciwnych temu okolicznościach. (Bo i to wyjaśniłem w moich wywodach o etyce, że cnotliwym jest człowiek, dla którego ze względu na jego cnotę dobrem jest to, co jest bezwzględnie dobre, jasną zaś jest rzeczą, że także i dobry użytek, jaki się robi z bezwzględnego dobra, musi być bezwzględnie cnotliwy i dobry.) Dlatego też ludzie uważają, że poczucie szczęścia dają dobra zewnętrzne. Jest to tak, jak gdyby ktoś czystą i piękną grę na cytrze chciał kłaść na rachunek raczej cytry aniżeli kunsztu."},{"type":"paragraph","text":"5. [Jak z tych rozważań wynika], muszą pewne rzeczy być już naprzód dane, a inne musi stworzyć prawodawca. Dlatego pragniemy, by w państwie znalazło się wszystko, co jest od losu szczęsnego zależne (uznajemy bowiem, że wiele od niego zależy), natomiast o tym, czy miasto jest cnotliwe, nie los rozstrzyga, ale wiedza i wola. Otóż państwo jest wówczas cnotliwe, jeśli wszyscy obywatele uczestniczący w jego zarządzie są cnotliwi, według mnie zaś wszyscy obywatele w zarządzie państwa uczestniczą. Wobec tego należy rozważyć, w jaki sposób człowiek staje się cnotliwym."},{"type":"paragraph","text":"Bo jeśli nawet ogół obywateli może być cnotliwy, mimo że nie jest nim każdy poszczególny obywatel, to lepiej przecież, jeśli ci ostatni są wszyscy cnotliwi, bo w takim razie cnotliwy jest oczywiście i ogół."},{"type":"paragraph","text":"6. Na to, by obywatele stawali się dobrymi i cnotliwymi, wpływają trzy czynniki; są nimi: natura, przyzwyczajenie, rozum. Przede wszystkim bowiem trzeba się urodzić człowiekiem, a nie jakąś inną istotą żyjącą, z odpowiednimi właściwościami ciała i duszy. Co do pewnych cech i urodzenie niczego nie przesądza, bo przyzwyczajenie powoduje ich zmianę. Są mianowicie pewne właściwości przyrodzone, które przez przyzwyczajenie ulegają zmianie tak w jedną, jak i drugą stronę: na gorsze i na lepsze."},{"type":"paragraph","text":"26 W Et. nik., ks. I, rozdz. 13."},{"type":"paragraph","text":"180"},{"type":"paragraph","text":"7. Inne istoty żyjące przeważnie żyją wedle swej natury, niektóre w drobnych szczegółach urabia i przyzwyczajenie, ale tylko człowiek kształtuje się pod wpływem rozumu, bo on tylko rozum posiada. Toteż wszystkie te trzy czynniki muszą być u niego zharmonizowane. Jakoż ludzie wiele czynią wbrew swym przyzwyczajeniom i wbrew swej naturze ze względów rozumowych, jeśli dojdą do przekonania, że lepiej jest inaczej."},{"type":"paragraph","text":"Wyłożyliśmy tedy powyżej27, jakie przyrodzone właściwości muszą ludzie posiadać, aby być odpowiednim materiałem dla prawodawcy, reszta jest już rzeczą wychowania, dzięki któremu człowiek już to przez przyzwyczajenie, już to przez naukę przyswaja sobie, co trzeba."},{"type":"paragraph","text":"13. Obywatele winni być tak wychowani,"},{"type":"paragraph","text":"by zdobyli przygotowanie do swych zadań,"},{"type":"paragraph","text":"by umieli za młodu słuchać, a w starszym wieku rządzić."},{"type":"paragraph","text":"Fałszywy system wychowawczy Sparty"},{"type":"paragraph","text":"1. Skoro każda wspólnota państwowa składa się z władających i podwładnych, więc trzeba się zastanowić nad tym, czy władający i podwładni winni się zmieniać, czy też być dożywotnio ci sami, bo jest jasną rzeczą, że zależnie od odpowiedzi na to pytanie trzeba będzie [tak lub inaczej] urządzić wychowanie."},{"type":"paragraph","text":"Gdyby jedni górowali nad drugimi w takim stopniu, w jakim bogowie i herosi górują według naszych wyobrażeń nad ludźmi, przewyższając ich nierównomiernie najpierw fizycznie, a następnie duchowo, tak że przewaga władających byłaby bezsporna i oczywista dla podwładnych, to bez wątpienia lepiej byłoby, aby jedni i ci sami stale władali, a drudzy byli podwładnymi raz na zawsze28."},{"type":"paragraph","text":"2. Skoro jednak trudno to przyjąć i wcale tak nie bywa, jak to Skylaks29"},{"type":"paragraph","text":"opowiada o Indach, u których królowie w tym stopniu jakoby różnią się od swych poddanych, więc oczywiście z wielu względów jest rzeczą konieczną, by wszyscy na równi okresowo brali udział w rządach, względnie byli podwładnymi. Równych musi bowiem równe prawo obowiązywać i z trudnością daje się utrzymać ustrój, który się nie opiera na tej słusznej zasadzie. Bo z niezadowolonymi [w mieście]"},{"type":"paragraph","text":"połączą się wszyscy skłonni do przewrotu na obszarze wiejskim, a jest rzeczą niemożliwą, by dzierżący władzę tak wielką przedstawiali siłę, żeby nad nimi wszystkimi posiadali przewagę."},{"type":"paragraph","text":"3. Niemniej przecież nie ulega żadnej wątpliwości, że władający winni mieć pewne prawa przed podwładnymi. Jak to urządzić, w jaki sposób zapewnić wszystkim udział w rządach, to musi rozważyć prawodawca. Była o tym mowa już 27 Por. wyżej, rozdz. 4."},{"type":"paragraph","text":"28 Por. ks. I, rozdz. 2, § 15."},{"type":"paragraph","text":"29 Skylaks z Karyandy w Karii miał opłynąć na rozkaz króla Dariusza I wybrzeża południowej Azji. Zachowane pod jego imieniem pismo jest tworem późniejszym, z IV w. p.n.e."},{"type":"paragraph","text":"181"},{"type":"paragraph","text":"poprzednio30. Przyroda mianowicie sama to zagadnienie rozstrzygnęła przez to, że każdemu pokoleniu dała okres młodości i starości, przy czym młodym przystoi słuchać, a starym rządzić; toteż nikt się nie oburza, jeśli stosownie do swego wieku ma słuchać, ani też nie uważa, że jest to niżej jego godności, zwłaszcza że po wejściu w odpowiedni wiek również ma widoki osiągnięcia zastrzeżonego dla siebie zaszczytu."},{"type":"paragraph","text":"4. Można więc z równą stanowczością powiedzieć, że ci sami władają i są podwładnymi, jak i że są to różni ludzie. Toteż i wychowanie winno być koniecznie w pewnym względzie to samo, a w innym odmienne. Bo ten, kto ma dobrze władać, musi — jak mówi [przysłowie] — nauczyć się wpierw słuchać."},{"type":"paragraph","text":"Bywa zaś władza sprawowana, jak to w początkowych wywodach powiedziano31, albo w interesie władającego, albo poddanych; pierwszą z nich nazywamy władzą despotyczną, drugą rządami nad wolnymi ludźmi."},{"type":"paragraph","text":"5. W zleceniach [, które się komuś wydaje,] bywają przecież pewne różnice, i to nie tyle co do ich treści, ile co do celu. Dlatego wiele czynności, które zdają się należeć do służby, mogą spełniać i młodzi wolni ludzie bez żadnej ujmy dla siebie, bo różnica między tym, co ujmę przynosi, a co nie, leży nie tylko w samych czynnościach, ile w ich celu i motywach. Skoro stwierdzamy, że cnota obywatela rządzącego jest taka sama co i najlepszego męża, i że ten sam człowiek musi najpierw nauczyć się słuchać, a dopiero potem rządzić, to zadanie prawodawcy na tym winno polegać, by ustalić, jak ludzie dochodzą do cnoty, jakie zajęcia do tego prowadzą i jaki jest cel najdoskonalszego życia."},{"type":"paragraph","text":"6. Dusza człowieka dzieli się na dwie części, z których jedna sama przez się posiada rozum, druga zaś, choć go sama przez się nie posiada, to jednak potrafi iść za jego głosem. Obu częściom przypisujemy cnoty, dzięki którym pewnego człowieka zwiemy w ogóle dobrym. Ci, którzy przyjmują podany przez nas podział"},{"type":"paragraph","text":"władz duszy, bez trudności zdołają powiedzieć, która właśnie część zawiera cel"},{"type":"paragraph","text":"[, do którego człowiek zmierza]. Zawsze bowiem to, co gorsze, jest nim dlatego, że obok niego jest coś lepszego, jak się to okazuje zarówno w dziełach sztuki, jak i tworach natury; lepsze zaś jest to, co posiada rozum."},{"type":"paragraph","text":"7. Ten ostatni według stosowanego przez nas zwykle podziału, dzieli się znów na dwie części: jest mianowicie rozum praktyczny i rozum teoretyczny. Tak samo więc [jak część pierwsza] musi się dzielić oczywiście i ta część [, tj. druga, nie mająca rozumu, ale zdolna iść za nim]. Powiemy zatem, że czynności [tej części duszy] pozostają do siebie w podobnym stosunku [jak czynności pierwszej części], czyli że czynności wychodzące z części lepszej z natury są więcej cenione przez tych, którzy są zdolni albo do wszystkich funkcji duszy, albo tylko do tych dwóch."},{"type":"paragraph","text":"Bo dla każdego zawsze najcenniejsze jest to, czego osiągnięcie jest dla niego najwyższym dobrem."},{"type":"paragraph","text":"30 Por. wyżej, rozdz. 8."},{"type":"paragraph","text":"31 Por. ks. I, rozdz. 2, i ks. III, rozdz. 4."},{"type":"paragraph","text":"182"},{"type":"paragraph","text":"8. Także i życie każde dzieli się na okres pracy i spoczynku, wojny i pokoju, a czynności na konieczne i pożyteczne albo na piękne. Ocena ich musi być taka sama jak w odniesieniu do części duszy i ich czynności, a więc oświadczamy się za wojną dla pokoju, za pracą dla spoczynku, za czynnościami koniecznymi i pożytecznymi dla osiągnięcia piękna."},{"type":"paragraph","text":"9. Wszystko to musi mieć na uwadze mąż stanu przy ustanawianiu praw, uwzględniając i części duszy, i ich czynności, zwłaszcza zaś to, co lepsze i celowe."},{"type":"paragraph","text":"W ten sam sposób ma postępować przy urządzaniu trybu życia i wyborze różnych czynności. Obywatele muszą bowiem umieć pracować i walczyć, ale jeszcze więcej żyć w pokoju i oddawać się spoczynkowi. Muszą czynić to, co konieczne i pożyteczne, ale jeszcze więcej to, co piękne. Toteż według tylu punktów widzenia musi się ich wychowywać zarówno w młodocianym jeszcze wieku, jak i w innych okresach, które jeszcze wychowania wymagają."},{"type":"paragraph","text":"10. A tymczasem te państwa greckie, które obecnie uchodzą za posiadające najlepszy ustrój, i prawodawcy, którzy te ustroje nadali, wcale nie ustanowili wszystkiego mając najlepszy cel na oku, ani też nie wprowadzili praw i zasad wychowania z myślą o [zaprawieniu do] wszelkich cnót, przeciwnie, w sposób niegodny odchylili się w stronę praw, które wydawały się pożyteczne i korzystniejsze dla rządzących. Podobnie jak oni, także niektórzy późniejsi pisarze32"},{"type":"paragraph","text":"wypowiadali się w tym samym duchu, bo chwaląc ustrój polityczny Lacedemoń-"},{"type":"paragraph","text":"czyków wyrażają podziw dla ostatecznego celu prawodawcy, który wszystkie prawa swoje nastawił na zwycięstwo i wojnę."},{"type":"paragraph","text":"11. Że takie urządzenia są chybione, to i w drodze rozumowania z łatwością daje się udowodnić, i bieg wydarzeń dzisiaj to wykazał. Bo jak ogromna część ludzi podziwia narzucanie masom panowania ze względu na to, że wielką obfitość dóbr przynosi, tak i Tibron33 okazuje się wielbicielem prawodawcy Lakończyków, a z nim wszyscy inni piszący o ich ustroju, ponieważ Lakończycy przez zaprawienie się w walce z niebezpieczeństwami zapanowali nad wielu [ludami]."},{"type":"paragraph","text":"12. A przecież okazuje się dzisiaj, kiedy panowanie Lakończyków już się załamało, że im to nie przyniosło szczęścia, że więc i prawodawca ich nie był"},{"type":"paragraph","text":"dobry. Śmieszną też byłoby to rzeczą, żeby się mieli nadal praw jego trzymać, i choć im nikt w ich przestrzeganiu nie przeszkadza, mieli tracić sposobność urządzenia sobie szczęśliwego życia. Niesłuszne jest też zdanie o rodzaju rządu, jakiego wyznawcą winien się okazać prawodawca. Rządzić bowiem wolnymi jest rzeczą piękniejszą i więcej cnoty wymaga niż despotyczne panowanie nad niewolnikami,"},{"type":"paragraph","text":"13. Nie należy też mienić szczęśliwym państwa i sławić jego prawodawcy dlatego, że zaprawił obywateli do zwyciężania w celu trzymania w uległości 32 Aluzja do Platona i Ksenofonta, którzy byli wielbicielami ustroju spartańskiego."},{"type":"paragraph","text":"33 Spartanin Tibron znany jest jako dowódca wojsk spartańskich, działających na terenie Azji Mniejszej w 400 i 399 r. p.n.e. Skazany następnie na wygnanie (w latach 399 - 392), pisał jakieś nie znane nam dzisiaj dzieła o ustroju Likurga, które wspomina tu Arystoteles."},{"type":"paragraph","text":"183"},{"type":"paragraph","text":"sąsiadów; ma to bowiem bardzo poważną stronę ujemną. W myśl tej zasady oczywiście każdy obywatel, który ma odpowiednie do tego siły, powinien by próbować, czyby nie potrafił owładnąć swoim własnym państwem. Byłoby to właśnie to, co tak bardzo mają za złe Lakończycy królowi Pauzaniaszowi34, choć tak wielką czcią był otoczony. Wszystkie tego rodzaju zasady i prawa są pozbawione rozumu politycznego, nie są ani pożyteczne, ani prawdziwe. Toteż prawodawca powinien zaszczepiać w dusze ludzi tylko te zasady, które są najlepsze zarówno dla jednostki, jak i dla społeczności."},{"type":"paragraph","text":"14. O zaprawienie w sztuce wojennej należy dbać nie dlatego, by ujarzmić tych, którzy na taki los nie zasłużyli, ale w tym celu, aby — po pierwsze"},{"type":"paragraph","text":"— uchronić się przed ujarzmieniem przez innych, następnie, by zdobyć hegemonię w interesie poddanych, a bynajmniej nie na to, by wszystkim swoje jarzmo narzucić, i po trzecie, by zdobyć panowanie nad takimi, którzy na los niewolników zasługują."},{"type":"paragraph","text":"15. Że prawodawca powinien raczej starać się o to, by ustawodawstwo dotyczące zagadnień wojennych, jak i wszelkie inne, podporządkować interesom życia spokojnego i pokoju, to stwierdzają zarówno fakty dokonane, jak i wyrozumowane. Bo po największej części takie wojownicze państwa utrzymują się tak długo, jak długo prowadzą wojny, a giną, gdy panowanie zdobędą."},{"type":"paragraph","text":"W okresie pokoju bowiem niby rdzewiejące żelazo zatracają swoją hartowność, a winę tego ponosi prawodawca, który nie wykształcił u nich zdolności do życia w spokoju."},{"type":"paragraph","text":"16. Skoro ludzie, jak się okazuje, zarówno w społeczności, jak i każdy z osobna, mają ten sam cel przed sobą i skoro do najlepszego człowieka, jak i do najlepszego państwa musi się tę samą miarę stosować, to oczywiście muszą istnieć w państwie cnoty potrzebne do spokojnego życia, bo — jak to już wielokrotnie zaznaczyłem — celem wojny jest pokój, a celem pracy spoczynek."},{"type":"paragraph","text":"17. Do urządzenia sobie spoczynku i właściwego trybu życia potrzebne są zarówno te cnoty, które wchodzą w grę w spoczynku, jak i te, które są potrzebne w pracy. Bo żeby się oddawać błogiemu spoczynkowi, musi się wpierw wiele potrzebnych rzeczy przygotować. Dlatego też wskazaną jest rzeczą, by w państwie panowały umiarkowanie, dzielność i wytrwałość, bo (według przysłowia) nie ma spoczynku dla niewolników, a kto nie umie mężnie stawić czoła niebezpieczeństwu, staje się niewolnikiem każdego, kto go zaczepi."},{"type":"paragraph","text":"18. Dzielności więc i hartu potrzeba do życia czynnego, umiłowania mądrości do spoczynku, a umiarkowania i sprawiedliwości w jednym i drugim wypadku, 34 Pauzaniasz z królewskiego rodu Agiadów (bratanek Leonidasa) był dowódcą greckich sil zbrojnych w bitwie pod Platejami (w 479 r, p.n.e.). Aby się narzucić na władcę Sparty i całej Grecji, nawiązał stosunki z Persami, a nadto snuł plany rewolucji w Sparcie, opierając się na upośledzonej warstwie helotów, kiedy zaś wykryły się jego knowania, szukał schronienia w świątyni, gdzie go zaraorzono głodem; por. wyżej, ks. V, rozdz. 5, i rozdz. 6, § 2."},{"type":"paragraph","text":"184"},{"type":"paragraph","text":"zwłaszcza jednak w okresie pokoju i spoczynku. Bo wojna sama zmusza do sprawiedliwości i umiarkowania, a natomiast pławienie się w dobrobycie i zażywanie spoczynku w pokoju sprzyja raczej wyuzdaniu."},{"type":"paragraph","text":"19. Toteż wiele sprawiedliwości i wiele umiarkowania potrzebują ci, którym zdaje się najlepiej powodzić, którzy też zażywają tego wszystkiego, co za warunek szczęścia uchodzi, jak np. ci, co według opowieści poetów żyją na Wyspach Szczęśliwych, jeśli to prawda istotnie. Tacy bowiem najwięcej będą potrzebowali [umiłowania] mądrości i umiarkowania, i sprawiedliwości, i to im bardziej obfitość takich dóbr [zewnętrznych] pozwala na oddawanie się spokoj-nemu używaniu życia. Okazuje się z tego, dlaczego i państwo, które chce sobie szczęśliwe istnienie i tężyznę zapewnić, musi te cnoty posiadać. Haniebną bowiem jest rzeczą, jeżeli ktoś nie umie z dóbr [swoich] korzystać, ale jest jeszcze gorzej, jeśli nie umie tego robić w okresie spoczynku i okazuje się dzielnym wśród zajęć i wojny, a w czasie pokoju i spoczynku wykazuje usposobienie niewolnika."},{"type":"paragraph","text":"20. Dlatego nie należy uprawiać cnoty tak, jak się to robi w państwie Lacedemończyków. Bo odróżniają się oni od innych nie przez to, że nie uważają za największe tych samych dóbr co inni, ale przez to, że sądzą, iż się do nich dochodzi raczej dzięki pewnej cnocie. Ponieważ jednak dobra te i ich użytkowanie wyżej cenili aniżeli cnoty, < utrzymywali się, jak długo wojny prowadzili, ale po zdobyciu panowania upadli. Że zatem i w okresie spoczynku należy cnotę uprawiać >35 i to dla niej samej, jasno z tych wywodów wynika."},{"type":"paragraph","text":"21. Należy teraz rozważyć, jak i za pomocą jakich środków można to osiągnąć."},{"type":"paragraph","text":"Wykazaliśmy już poprzednio, że potrzebne są do tego [trzy czynniki]: natura, przyzwyczajenie i rozum. Jakie znaczenie musi odgrywać czynnik przyrodzony, o tym była już mowa wyżej36, pozostaje tedy rozważyć, czy przy wychowaniu należy wpierw kształtować rozum, czy przyzwyczajenie. Te dwa czynniki winny bowiem być jak najlepiej ze sobą zharmonizowane, bo równie możliwą jest rzeczą, że wyłączne kształcenie umysłu nie pozwala osiągnąć najlepszego celu, jak że samo tylko urabianie obyczajów na błędne drogi prowadzi."},{"type":"paragraph","text":"22. Otóż oczywiste jest najpierw, że jak wszędzie, tak i tutaj powstawanie ma jakiś początek, a cel tego powstawania jest znów początkiem innego celu."},{"type":"paragraph","text":"Takim celem natury jest u nas [ludzi] rozum i duch, toteż odpowiednio do tego trzeba mieć na uwadze i powstawanie człowieka, i troskę o kształtowanie jego obyczajów."},{"type":"paragraph","text":"23. Jak dusza i ciało są dwiema częściami, tak i z kolei w duszy widzimy dwie części: część nie posiadającą rozumu i część obdarzoną rozumem, a więc ich 35 W przekazanym tekście jest tu luka, na którą pierwszy zwrócił uwagę Camerarius w tłumaczeniu łacińskim, wydanym w 1581 r. Ujęte w nawiasy słowa stanowią uzupełnienie, jakie według ks. II, rozdz. 6, § 22 (1271 b 4 n.) oraz Etyki eudemejskiej (1248 b 37) dał C. Thurot, Eudes sur Aristote (1860)."},{"type":"paragraph","text":"36 Por. wyżej, rozdz. 12."},{"type":"paragraph","text":"185"},{"type":"paragraph","text":"właściwości w liczbie dwu, z których jedna to pożądanie, a druga to myśl. Jak zaś ciało wcześniej powstaje niż dusza, tak i część duszy nie posiadająca rozumu wcześniejsza jest od części rozumem obdarzonej. Jest to również rzeczą oczywistą, bo u dzieci zaraz po urodzeniu ukazują się przejawy gniewu i woli, a nawet pragnienia, podczas gdy zdolność rozumowania i myślenia rozwija się u nich z natury rzeczy dopiero z wiekiem. Dlatego troska o ciało musi wyprzedzać troskę o duszę, z kolei zaś nastąpi kształtowanie zdolności pożądania, mające na celu kształcenie myśli, tak jak pielęgnowanie ciała ma za cel urabianie duszy."},{"type":"paragraph","text":"14. Jak powinno być ujęte prawo małżeńskie?"},{"type":"paragraph","text":"Wiek małżonków i ich właściwości fizyczne."},{"type":"paragraph","text":"Okres ciąży. Spędzanie płodu. Granica rozrodczości."},{"type":"paragraph","text":"Kary za niewierność małżeńską"},{"type":"paragraph","text":"1. Jeśli tedy prawodawca przede wszystkim na to baczyć powinien, by wychowywane jednostki jak najlepiej się pod względem fizycznym przedstawiały, to musi najpierw zatroszczyć się o małżeństwo i określić, kiedy i jakie osoby winny wchodzić w związki małżeńskie. Przy wydawaniu zarządzeń dotyczących tego związku musi uwzględniać i osoby same, i czas ich pożycia, by się równomiernie wiekiem do tego samego kresu zbliżali i nie było między nimi rozdźwięku co do sił, gdy on posiadać będzie jeszcze zdolności rozrodcze, a ona już nie, albo też odwrotnie; wywołuje to bowiem między nimi nieporozumienia i różnice."},{"type":"paragraph","text":"2. Następnie musi zwrócić uwagę i na czas, w którym dzieci zajmą miejsce ojców; dzieci nie powinny mianowicie odbiegać zbytnio wiekiem od rodziców (gdyż w takim razie rodzice nie mogą cieszyć się wdzięcznością ze strony dzieci, a dzieci korzystać z pomocy rodziców). Nie powinni też być zbytnio wiekiem zbliżeni, bo to również ma wiele stron ujemnych. Takie dzieci bowiem, które są niemal rówieśnikami rodziców, mniejszy żywią dla nich szacunek, a łatwiej wyłaniają się wówczas zatargi o zarząd majątku. [Po trzecie wreszcie,] by wrócić do tego punktu, od którego wyszedłem, chodzi tu jeszcze i o to, by zrodzone dzieci tak się fizycznie przedstawiały, jak tego chce prawodawca."},{"type":"paragraph","text":"3. Wszystko to mniej więcej daje się osiągnąć przez jedno zarządzenie."},{"type":"paragraph","text":"Ponieważ u mężczyzn wiek 70 lat, u kobiet 50 stanowi zazwyczaj ostatnią granicę rozrodczości, więc początek pożycia małżeńskiego musi sięgać takiego wieku, który by był do takiego odstępu czasu dostosowany."},{"type":"paragraph","text":"4. Związki małżeńskie ludzi zbyt młodych nie są odpowiednie do płodzenia dzieci. U wszystkich stworzeń potomstwo pochodzące od zbyt młodych rodziców jest słabowite, żeńskiego przeważnie rodzaju i niewielkiego wzrostu; to samo z konieczności dotyczy też i ludzi. Dowodem fakt, że we wszystkich państwach, gdzie istnieje zwyczaj łączenia młodych z młodymi, ludzie bywają słabowici i małego wzrostu. Ponadto młode matki ciężej przechodzą poród i częściej umierają."},{"type":"paragraph","text":"Stąd też niektórzy twierdzą, że Troizeńczycy z tego właśnie powodu otrzymali znaną 186"},{"type":"paragraph","text":"odpowiedź wyroczni, a nie ze względu na uprawę plonów, ponieważ wiele młodych kobiet u nich umierało skutkiem zbyt wczesnego małżeństwa37."},{"type":"paragraph","text":"5. Również i ze względu na powściągliwość korzystniej jest w dojrzałym wieku dziewczęta za mąż wydawać, bo jak się zdaje, zbyt młode skutkiem obcowania małżeńskiego bywają zbytnio skłonne do zmysłowości. Przecież i mężczyznom zdaje się to szkodzić fizycznie przez upośledzenie wzrostu, jeśli obcują z kobietami w okresie wzrostu nasienia, bo i tu wzrost ma pewien czas określony, po którego przekroczeniu już dalej nie postępuje."},{"type":"paragraph","text":"6. Dlatego wiekiem odpowiednim do małżeństwa jest dla dziewcząt mniej więcej 18 lat, dla mężczyzn 37 lub niewiele mniej. W takim wieku bowiem pożycie małżeńskie dokonuje się przy pełnym rozkwicie sił fizycznych, a koniec zdolności rozrodczych u obu stron następuje równocześnie, we właściwym czasie; także i wejście dzieci w następstwo po rodzicach przypada na czas ich pełnego rozkwitu (jeśli przychodzą na świat, jak należy oczekiwać, zaraz po zawarciu małżeństwa), podczas gdy rodzice wchodzą już w schyłek wieku około siedem-dziesiątki."},{"type":"paragraph","text":"7. Wypowiedziałem się więc co do tego, kiedy się powinno zawierać małżeństwo. Co się zaś tyczy odpowiedniej do tego pory roku, to według stosowanego i teraz zwyczaju ludzie słusznie zawierają ten związek najczęściej w zimie. Małżonkowie zaś muszą już sami przy płodzeniu dzieci przestrzegać zaleceń ze strony lekarzy i badaczy przyrody. Lekarze bowiem podają odpowiednie wskazówki co do stanu fizycznego małżonków, a badacze przyrody co do wiatrów, zalecając połączenie raczej przy wiatrach północnych niż połu-dniowych 38."},{"type":"paragraph","text":"8. Jakie własności fizyczne rodziców są najwięcej pożyteczne dla potomstwa, o tym muszę pomówić obszerniej w wywodach o wychowaniu dzieci, tu wystarczy wspomnieć o tym ogólnikowo. Bo atletyczna budowa nie jest pożyteczna ani dla sprawności w działalności politycznej, ani dla zdrowia i płodzenia dzieci, podobnie jak budowa wątła i słabowita, lecz tylko pośrednia między nimi. Ciało musi być zahartowane, i to zahartowane nie gwałtownie i niejednostronnie, jak u atletów, lecz z myślą o czynnościach przypadających ludziom wolnym. A tak samo musi być zarówno u mężczyzn, jak i u kobiet."},{"type":"paragraph","text":"9. Kobiety ciężarne również muszą się troszczyć o swoje ciało, nie oddawać się gnuśności, a dbać o dostatnie odżywianie. Prawodawca z łatwością może to osiągnąć przez nakaz odbywania codziennie jakiejś pielgrzymki ku czci tych 37 O wyroczni tej nic zresztą nie wiadomo. W dwóch rękopisach zachował się na marginesie jakoby jej fragment: µη τέµνε νέαν άλοκα — „nie kraj młodej (w młodym gruncie) bruzdy”, co może jednak zostało urobione od tego miejsca. Gottling, wychodząc z przekazanego na marginesie urywka, odtworzył przypuszczalną odpowiedź wyroczni w postaci heksametru: άλλα νέας, Τροίζην, άλοκας"},{"type":"paragraph","text":"µη τέµνε βαδείας (Nie kraj, Trojzeńczyku, w młodym gruncie bruzd głębokich)."},{"type":"paragraph","text":"38 W piśmie O rodzeniu, ks. IV, rozdz. 2 (767 a) powiada Arystoteles, że wiatry północne sprzyjają narodzinom chłopców."},{"type":"paragraph","text":"187"},{"type":"paragraph","text":"bogów, którzy odbierają hołdy jako opiekunowie narodzin. Natomiast umysł, przeciwnie aniżeli ciało, zaleca się utrzymywać raczej w spokoju, bo doświadczenie pokazuje, że płód przejmuje wiele od noszącej go matki, tak jak rośliny od ziemi."},{"type":"paragraph","text":"10. W kwestii usuwania czy wychowywania noworodków winno obowiązywać prawo, by nie wychowywać żadnego dziecka wykazującego kalectwo; biorąc jednak pod uwagę liczbę dzieci należy, wobec tego że istniejące obyczaje nie pozwalają żadnego noworodka usuwać, liczbę urodzin prawem ograniczyć, jeśli zaś jacyś obcujący ze sobą małżonkowie poczną dziecko ponad tę liczbę, należy spowodować jego poronienie, zanim jeszcze czucie i życie w nie wstąpi. Bo co tu jest godziwe, a co nie, zależeć będzie od tego, czy płód już czucie i życie posiada."},{"type":"paragraph","text":"11. Skoro dla męża i żony oznaczyliśmy początek wieku, w jakim winni zacząć pożycie małżeńskie, więc należy również określić, do jakiego wieku wypada im płodzić dzieci. Potomstwo zbyt starych, jak i zbyt młodych, bywa niedostatecznie rozwinięte na ciele i na umyśle, a dzieci starców słabowite. Dlatego jako granicę przyjąć należy szczytowy punkt rozwoju umysłowego, a ten przypada po największej części, jak to mówią niektórzy z poetów mierzący wiek siedmioletnimi okresami, około 50 roku życia39."},{"type":"paragraph","text":"12. Toteż w cztery lub pięć lat po osiągnięciu tego wieku należy zaniechać płodzenia dzieci uznawanych otwarcie, a potem uprawiać stosunki małżeńskie już tylko dla zdrowia albo z jakiejś innej takiej przyczyny. Co się tyczy obcowania z inną kobietą lub innym mężczyzną, to winna tu po prostu obowiązywać zasada, że tego rodzaju stosunki bezwzględnie i w żadnym wypadku nie mogą uchodzić za uczciwe, jak długo ktoś jest i nazywa się małżonkiem. Gdyby się jednak okazało, że ktoś coś takiego czyni w okresie wyznaczonym do płodzenia dzieci, to winien być napiętnowany odebraniem obywatelskich praw honorowych jako karą odpowiadającą jego przestępstwu."},{"type":"paragraph","text":"15. Wychowanie dzieci. Zabawy ich."},{"type":"paragraph","text":"Ochrona dzieci przed zepsuciem moralnym. Dalsza nauka 1. Należy przyjąć, że dla dzieci, które się narodziły, wielką różnicę stanowi ze względu na ich rozwój fizyczny rodzaj pożywienia, jakie otrzymują. Z obserwacji czynionych na zwierzętach, jako też na ludach, które jako cel wychowania wytknęły sobie osiągnięcie tężyzny wojennej, okazuje się, że najodpowiedniejsze jest dla ciała pożywienie obfitujące w mleko, a pozbawione wina, które powoduje choroby."},{"type":"paragraph","text":"2. Korzystne jest również używanie ruchu, o ile [na to] taki wiek pozwala."},{"type":"paragraph","text":"Ażeby członki z powodu miękkości nie uległy skrzywieniu, używają jeszcze i teraz 39 Około 50 lat jako iloczyn 7x7."},{"type":"paragraph","text":"188"},{"type":"paragraph","text":"niektóre ludy pewnych przyrządów, które chronią ciało małych dzieci przed skrzywieniem. Dobrze jest też przyzwyczajać dzieci zaraz od maleństwa do zimna, bo to bardzo korzystne i dla zdrowia, i dla sprawności wojennej. Dlatego u wielu ludów barbarzyńskich jest zwyczaj zanurzać nowo narodzone dzieci w zimnej rzece, u innych, jak u Celtów, odziewać je w lekkie okrycie."},{"type":"paragraph","text":"3. Do wszystkiego bowiem, do czego można dzieci przyzwyczaić, lepiej jest przyzwyczajać je zaraz od początku, ale przyzwyczajać stopniowo, zresztą dzieci ze względu na swe naturalne ciepło z łatwością przywykają do znoszenia zimna."},{"type":"paragraph","text":"W taki więc i podobny temu sposób pożyteczne jest pielęgnować dzieci w pierwszym okresie ich życia."},{"type":"paragraph","text":"4. W następującym z kolei wieku do lat pięciu, w którym jeszcze niedobrze jest zapędzać dzieci do jakiejkolwiek nauki i ciężkich robót, by na tym wzrost nie cierpiał, muszą jednak dzieci mieć tyle ruchu, żeby nie popadły w ocięża-"},{"type":"paragraph","text":"łość; ruch ten trzeba im zapewnić przez różne zajęcia, a zwłaszcza zabawy. Ale i zabawy nie powinny być niewłaściwe dla wolnego człowieka ani uciążliwe czy swawolne."},{"type":"paragraph","text":"5. Także na opowieści i bajki, które są odpowiednie dla uszu dzieci w tym wieku, winni mieć zwróconą baczną uwagę urzędnicy zwani kierownikami chłopców (παιδονόµοι), bo wszystko to ma stanowić przygotowanie do późniejszych zajęć. Dlatego zabawy muszą być przeważnie naśladowaniem późniejszych zajęć."},{"type":"paragraph","text":"6. Wrzasków dziecięcych i płaczów niesłusznie zakazują ci, co prawem chcieliby ich wzbronić40, bo sprzyjają one wzrostowi i stanowią pewnego rodzaju gimnastykę dla ciała. Głęboki oddech dodaje bowiem siły przy ciężkiej pracy, a to samo jest i z dziećmi, gdy swój głos nasilają. Pajdonomowie, którzy te dzieci mają w opiece, muszą i na to uważać, by jak najmniej przestawały one z niewolnikami, bo w tym wieku i jeszcze do siedmiu lat muszą się dzieci wychowywać w domu"},{"type":"paragraph","text":"[rodzicielskim]."},{"type":"paragraph","text":"7. Słuszną też jest rzeczą, aby już w tym wieku odsuwać od uszu i oczu dzieci wszystko, co jest niegodne wolnego człowieka. W ogóle, jeśli cokolwiek, to nieprzyzwoite mowy powinien prawodawca przede wszystkim usunąć z miasta (bo od lekkomyślnego mówienia o jakichkolwiek rzeczach nieprzyzwoitych niedaleko i do haniebnych czynów). Szczególnie więc baczyć należy na młodzieńców, by nie mówili ani nie słuchali nic takiego. Jeśli się zaś okaże, że ktoś mówi lub czyni jakieś rzeczy zakazane, to takiemu, który, choć wolny, nie ma jednak jeszcze prawa udziału we wspólnych biesiadach, należy wymierzyć karę chłosty41, a starszemu, który taki wiek przekroczył, karę odjęcia praw honorowych jakby niewolnikowi [ze względu na zachowanie niegodne wolnego człowieka]."},{"type":"paragraph","text":"40 Autor polemizuje z Platonem (Prawa 792 A)."},{"type":"paragraph","text":"41 Za Immischem, który wraz z Buchelerem przyjął tu skreślenie άτνµίαις (karę odjęcia praw honorowych), opuszczono w tłumaczeniu ten rodzaj kary, który przecież w następnym zdaniu przewidziany jest dla starszych."},{"type":"paragraph","text":"189"},{"type":"paragraph","text":"8. Skoro zaś uważamy za rzecz niedopuszczalną mówić coś takiego, to oczywiście także i oglądać czy to na obrazach nieprzyzwoitych, czy na przed-stawieniach teatralnych. Niechże władze baczą na to, by żadna rzeźba, żaden obraz nie przedstawiał takich scen, chyba że chodzi o pewnych bogów42, przy których święcie prawo pozwala i na żarty swawolne. Na takich uroczystościach prawo pozwala mężczyznom mającym wiek odpowiedni oddawać cześć bogom za siebie oraz za żonę i dzieci."},{"type":"paragraph","text":"9. Młodszym natomiast nie należy pozwalać ani na przysłuchiwanie się wygłaszanym poematom jambicznym, ani na przyglądanie się komediom, dopóki nie dojdą do wieku, w którym już wolno im będzie zajmować miejsce leżące przy wspólnej biesiadzie i pić [czyste wino], bo otrzymane już wychowanie zabezpieczy ich wszystkich przed szkodliwymi wpływami takich przedstawień."},{"type":"paragraph","text":"Obecnie przedmiot ten poruszyliśmy tu tylko mimochodem, później43 musimy się jeszcze przy nim zatrzymać i ściślej określić, po pierwsze, czy należy młodzieży pozwalać na to, czy nie i w jakich okolicznościach. Na razie napomknąłem tu o tych rzeczach, co było konieczne."},{"type":"paragraph","text":"10. Może też i słusznie postępował aktor tragiczny Teodoros44, który nigdy nikomu, nawet najsłabszym aktorom, nie pozwalał występować przed sobą na scenie, ponieważ — mawiał — pierwsze wrażenie słuchowe najsilniej się u widzów utrwala. To samo bywa przy zetknięciu się z ludźmi i rzeczami, bo zawsze mamy większe upodobanie do naszych pierwszych wrażeń. Dlatego trzeba trzymać młodzież z dala od wszystkiego, co złe, zwłaszcza od tego, co trąci występkiem i złowrogością."},{"type":"paragraph","text":"Po zakończeniu lat pięciu, przez dwa lata do siódmego roku winny już dzieci przysłuchiwać się tym naukom, których będą musiały się uczyć."},{"type":"paragraph","text":"11. Nauka dzielić się musi na dwa okresy wieku, a mianowicie od końca siódmego roku życia do czasu dojrzewania i znów od tegoż do lat dwudziestu jeden. Ci bowiem, co dzielą wiek na siedmioletnie okresy, przeważnie czynią to słusznie, należy jednak iść raczej za podziałem podyktowanym przez naturę, gdyż każda sztuka i nauka pragnie jedynie wypełnić pozostawione przez naturę luki."},{"type":"paragraph","text":"Najpierw zatem musimy się zastanowić, czy należy ustanowić pewien określony tok wychowania, następnie, czy lepiej jest, aby je państwo objęło, czy też — jak się to dzieje obecnie w największej części państw — aby wychowanie zostało w rękach prywatnych, i po trzecie, jakie ono być powinno."},{"type":"paragraph","text":"42 Chodzi o kult takich bogów jak Dionizos, Afrodyta, Priapos, Pan itp. Bóstwa te miały w Attyce swe świątynie ze swawolnymi wyobrażeniami i scenami."},{"type":"paragraph","text":"43 W Polityce, tak jak ona się zachowała, ani tez w żadnym zachowanym dziele Arystotelesa, nie ma już więcej mowy o tym przedmiocie."},{"type":"paragraph","text":"44 Teodoros, znany w starożytności również jako poeta dramatyczny, był jednym z najsławniejszych aktorów za czasów Arystotelesa."}]},{"id":"księga-ósma","number":9,"title":"Księga ósma","blocks":[{"type":"paragraph","text":"1. Wychowanie winno być rzeczą państwa"},{"type":"paragraph","text":"i takie samo dla wszystkich."},{"type":"paragraph","text":"Różnice poglądów na cele wychowania"},{"type":"paragraph","text":"1. Nie ulega zatem żadnej wątpliwości, że prawodawca powinien się zająć w pierwszym rzędzie wychowaniem młodzieży1. Jeśli się tak w państwach nie dzieje, to cierpią na tym ustroje, gdyż obywatele muszą być odpowiednio do każdego ustroju wychowani. Każda forma ustroju ma przecież swoisty charakter, który zazwyczaj zapewnia jej trwałość, tudzież stanowi zasadniczo o jej rodzaju, a więc np. cechy demokratyczne [tworzą i utrzymują] demokrację, oligarchiczne oligarchię. Zawsze też najlepszy charakter jest warunkiem lepszego ustroju."},{"type":"paragraph","text":"2. Wszelkie sprawności i kunszty wymagaj ą pewnego uprzedniego przygotowania i wyrobienia do spełniania związanych z nimi czynności; potrzeba tego również i do uprawiania cnoty. Ponieważ zaś całe państwo ma tylko jeden cel, więc oczywiście i wychowanie musi być jedno i to samo dla wszystkich, i państwo jako całość musi wziąć troskę o nie na siebie, a nie osoby prywatne, jak to bywa dzisiaj, kiedy każdy z osobna troszczy się o swe dzieci i według swego upodobania [prywatnie] im nauk udziela. Wspólne zadania wymagają przecież i wspólnego przygotowania. Zarazem nie trzeba sądzić, że ktoś z obywateli do siebie samego należy, przeciwnie, wszyscy należą do państwa, bo każdy z nich jest częścią państwa. Toteż troska o każdą część z osobna musi z natury rzeczy mieć na oku troskę o całość."},{"type":"paragraph","text":"3. W tym względzie zasługują na pochwałę Lacedemończycy, bo u nich bardzo wiele starań poświęca się wychowaniu dzieci, a czyni to państwo. Jasną tedy jest rzeczą, że wychowanie musi być uregulowane w drodze prawa i że przeprowadzać powinno je państwo. Trzeba jednak jasno zdać sobie sprawę z tego, co to jest wychowanie i jak je należy przeprowadzać, bo obecnie panuje pod tym względem rozbieżność poglądów. Nie wszyscy bowiem zgodni są co do tego, czego młodzież uczyć należy, czy przygotowywać ją do cnoty, czy do najlepszego życia, tak jak nie jest to jasne, czy wychowanie oddziaływać ma raczej na wyrobienie rozumu, czy też charakter."},{"type":"paragraph","text":"4. Stosowane obecnie sposoby wychowawcze utrudniają badanie i nie wiadomo wcale, czy ma się uczyć młodzież tego, co w życiu użyteczne, czy też tego, co do cnoty prowadzi, czy wreszcie pewnych nadzwyczajnych rzeczy, bo wszystkie te poglądy mają swoich obrońców. Nie ma jednak zgody i co do dróg wiodących do cnoty, bo nie każdy uznaje z góry te same cechy jako istotne dla cnoty, toteż panują oczywiście różnice i co do dróg ku niej wiodących."},{"type":"paragraph","text":"1 Wyłożone przez Arystotelesa zasady wychowania omówił A. Danysz, Pedagogika Arystotelesa,"},{"type":"paragraph","text":"„Eos” X (1904), s. 42-56. Por. również K. Lutosławski, Rozwój dziecka według Arystotelesa i św."},{"type":"paragraph","text":"Tomasza z Akwinu. Wychowanie w domu i szkole, 1914, s. 337 nn., 460 nn."},{"type":"paragraph","text":"191"},{"type":"paragraph","text":"2. Co powinno być przedmiotem nauczania?"},{"type":"paragraph","text":"Z czterech przedmiotów, które obejmuje wychowanie (gramatyka, gimnastyka, muzyka, rysunki)"},{"type":"paragraph","text":"na szczególną uwagę zasługuje muzyka"},{"type":"paragraph","text":"1. Nie ulega zatem wątpliwości, że z rzeczy pożytecznych uczyć należy tego, co konieczne. Ale i rzeczy pożyteczne nie mogą wszystkie być przedmiotem nauki, bo czynności dzielą się na takie, które są godne wolnych ludzi, i na zajęcia niewolnych. Okazuje się z tego, że młodzież powinna się oddawać takim tylko zajęciom pożytecznym, które jej nie sprowadzają do rzędu pospolitych wyrobników."},{"type":"paragraph","text":"Za zajęcia właściwe wyrobnikom należy uważać ten kunszt i tę umiejętność, które ciało wolnych ludzi, duszę lub rozum robią niezdolnymi do stosowania i uprawiania cnoty. Stąd tego rodzaju kunszty, które szkodę ciału przynoszą, jak i wszelkie prace płatne zwiemy wyrobniczymi, bo zaprzątają umysł i obniżają intelekt."},{"type":"paragraph","text":"2. Nie jest rzeczą niegodną wolnego człowieka oddawać się do pewnego stopnia jakimś umiejętnościom wyzwolonym, ale nadmierne przykładanie się do nich, by do mistrzostwa doprowadzić, może pociągnąć za sobą wspomniane już szkody. Wielką to stanowi różnicę, w jakim celu robi się coś lub czegoś uczy, bo jeżeli się coś robi dla siebie, przyjaciół lub dla cnoty, to nie jest to niegodne człowieka wolnego, ale jeśli się to robi dla innych, to może się to wydawać często zajęciem płatnego wyrobnika i niewolnika. Uprawiane obecnie przedmioty nauki, jak już poprzednio powiedziałem, wahają się więc między obu tymi kierunkami."},{"type":"paragraph","text":"3. Dzisiejsze wychowanie obejmuje zazwyczaj cztery mniej więcej przedmioty: gramatykę, gimnastykę, muzykę i jako czwarty czasami rysunki. Z tych gramatyka i rysunki są pożyteczne w życiu i mają w wielu wypadkach zastosowanie, gimnastyka zaś zaprawia do męstwa. Co się zaś tyczy muzyki, to już można mieć wątpliwości co do jej użyteczności. Bardzo wielu uprawia ją dziś dla przyjemności, ale dawniej zaliczano ją do środków wychowawczych, ponieważ natura sama, jak to już wiele razy powiedziano2, domaga się nie tylko właściwej pracy, ale i możności godnego zapełnienia spoczynku. Spoczynek bowiem, by to raz jeszcze podkreślić, jest założeniem i celem wszelkiej działalności."},{"type":"paragraph","text":"4. Choć bowiem jedno i drugie jest potrzebne, to jednak życie w spoczynku więcej jest pożądane od życia czynnego; w końcu zatem należy się zastanowić, jakimi zajęciami powinno się czas spoczynku wypełnić. Przecież nie rozrywkami, bo [w takim razie] rozrywki musiałyby być celem naszego życia. Skoro zaś jest to niemożliwe, a rozrywek należy raczej zażywać przy pracy (bo ciężko pracujący potrzebuje wytchnienia, rozrywki zaś są właśnie dla wytchnienia, wobec tego, że z pracą połączony jest trud i wysiłek), więc rozrywki należy wprowadzić z uwzględnieniem właściwego na to czasu, tak jak się zażywa lekarstwa. Tego rodzaju poruszenie duszy jest bowiem odprężeniem, i z powodu związanej z tym przyjemności — wytchnieniem."},{"type":"paragraph","text":"2 Por. ks. VII, rozdz. 13, § 16, 17."},{"type":"paragraph","text":"192"},{"type":"paragraph","text":"5. Natomiast stały stan spoczynku sam w sobie zawiera przyjemność, szczęście i błogie życie, a to nie jest udziałem pracujących, lecz zażywających spoczynku. Bo kto pracuje, czyni to dla pewnego celu, którego jeszcze nie osiągnął, szczęście zaś jest samo celem i sprawia, jak to wszyscy uznają, nie przykrość, lecz przyjemność. Co prawda nie wszyscy tak samo pojmują przyjemność, lecz każdy według swego upodobania i usposobienia; człowiek najlepszy za najlepszą przyjemność uważa taką, która płynie z najpiękniejszych źródeł. Toteż jasną jest rzeczą, że do zażywania spoczynku trzeba się niejednego nauczyć i być do tego wychowanym, przy czym to wychowanie i nauki są same dla siebie celem, podczas gdy to, czego się uczymy dla wykonywania pracy, jest koniecznym środkiem do celu."},{"type":"paragraph","text":"6. Dlatego to przodkowie nasi do środków wychowania zaliczyli także muzykę, nie dlatego, żeby była konieczna (bo nic takiego nie ma tu miejsca), ani też tak pożyteczna jak gramatyka, która ma zastosowanie w interesach pieniężnych, gospodarstwie domowym, nauce i wielu czynnościach państwowych, lub też rysunki, które zdają się być użyteczne do lepszej oceny dzieł sztuki, czy wreszcie gimnastyka, która krzepi zdrowie i siły (podczas gdy muzyka — jak wiemy — nic takiego nie daje). Pozostaje tylko wniosek, że służy ona do szlachetnego wypełnienia spoczynku, do czego też — jak się okazuje — ją stosowano. Tam bowiem wyznacza się jej miejsce, gdzie stosuje się tryb życia godny wolnego człowieka."},{"type":"paragraph","text":"Dlatego też Homer3 tak [w jednym wierszu] napisał:"},{"type":"paragraph","text":"ale kogo przystoi do uczty obfitej zaprosić,"},{"type":"paragraph","text":"po czym wymieniwszy jeszcze innych zaproszonych powiada: ci śpiewaka zaproszą, który by wszystkich zabawiał."},{"type":"paragraph","text":"W innym zaś miejscu Odyseusz powiada, że jest to najlepsza zabawa, kiedy się ludzie weselą i"},{"type":"paragraph","text":"uczestnicy biesiady słuchają w sali śpiewaka"},{"type":"paragraph","text":"ławy koleją obsiadłszy."},{"type":"paragraph","text":"3. Znaczenie innych przedmiotów, zwłaszcza gimnastyki."},{"type":"paragraph","text":"1. Widać więc z tego, że jest pewien przedmiot nauki, w którym należy kształcić synów nie ze względów użyteczności lub koniecznej potrzeby, ale dlatego, że jest on godny wolnego człowieka i piękny. Czy jest jeden tylko, czy jest ich więcej i jakie, jak je traktować należy, o tym później trzeba pomówić. Na razie z wywodów dotychczasowych tyle się okazało, że i ze strony dawnych 3 Pierwszego wiersza nie znajdujemy u Homera, drugi, nieco zmieniony, przejęty jest z Odysei XVII 385, trzeci z Odysei IX 7."},{"type":"paragraph","text":"193"},{"type":"paragraph","text":"przodków mamy świadectwo co do przytoczonych przedmiotów wychowania; dowodem tego jest mianowicie muzyka. Dodam i to, że należy kształcić dzieci i w przedmiotach pożytecznych nie tylko ze względu na ich pożytek, jak np. przy nauce gramatyki, ale i dlatego, że dzięki nim możemy przyswoić sobie wiele innych nauk."},{"type":"paragraph","text":"2. Podobnie jest i z rysunkami: należy się ich uczyć nie tylko dlatego, aby przy zakupach własnych nie popełnić błędu i nie dać się oszukać przy zakupie i sprzedaży przedmiotów sztuki, ile raczej dlatego, że wyrabiają poczucie piękna ciała. Oglądać się zaś wszędzie za pożytkiem bynajmniej nie jest odpowiednie dla ludzi wielkodusznych i wolnych. Skoro więc okazuje się, że należy wychować najpierw przez przyzwyczajenie, potem przez rozumowanie, a ciało pierwej niż umysł, to oczywiście należy młodzież szkolić najpierw w gimnastyce i zapaśnictwie, bo pierwsza z nich nadaje ciału pewną postawę, a drugie zaprawia do wysiłków fizycznych."},{"type":"paragraph","text":"3. Obecnie te państwa, które uchodzą za najwięcej dbałe o wychowanie chłopców, starają się kształcić ich na atletów i przez to szkodzą tylko postawie i wzrostowi ciała. Lakończycy nie popełnili tego błędu, ale za to przez [nadmierne]"},{"type":"paragraph","text":"trudy czynią młodych ludzi brutalnymi, jak gdyby to była najlepsza droga do wyrobienia męstwa. A przecież, jak to już wiele razy mówiłem4, uwaga wychowawcy nie powinna być skierowana na ten cel jedynie, ani też w pierwszym rzędzie. A gdyby nawet, to przecież celu i tak osiągnąć się nie da. Bo ani u zwierząt, ani u ludów nie stwierdzamy, by męstwo było właściwe najdzikszym, przeciwnie, jest ono cechą ludzi szlachetniejszych, wykazujących lwi charakter."},{"type":"paragraph","text":"4. Jest wiele ludów, które są pochopne do mordów i ludożerstwa, jak np."},{"type":"paragraph","text":"Achamowie i Heniochowie nad Pontem5 lub inne ludy w głębi lądu, jedne na równi z nimi, inne nawet jeszcze więcej; są to wprawdzie dzicy rabusie, ale męstwa przez to nie wykazują. Wiadomo przecież, że nawet Lakończycy górowali nad innymi, jak długo sami przykładali się do znoszenia trudów, a teraz ustępują innym w zawodach gimnastycznych i ćwiczeniach wojennych. Przewaga ich pochodziła nie stąd, że swoją młodzież w ten sposób ćwiczyli, ale stąd jedynie, że ją ćwiczyli przeciwko tym, którzy takich ćwiczeń nie uprawiali."},{"type":"paragraph","text":"5. Toteż nie dzikość, lecz piękno winno mieć pierwszeństwo. Przecież ani wilk, ani żadne inne zwierzę nie potrafi stoczyć pięknej walki, a tylko dzielny człowiek, ci zaś, którzy nadmiernie do tego zaprawiają chłopców, zaniedbując ich wykształ-"},{"type":"paragraph","text":"cenie w rzeczach potrzebnych, robią z nich naprawdę rzemieślników, bo przygotowują ich do spełniania jednej tylko czynności w życiu obywatela, i to nawet gorzej od innych, jak nasze wywody pokazują. Sądzić należy nie według dawnych doświadczeń, ale wedle obecnych stosunków, bo [Lakończycy] mają dziś współ-"},{"type":"paragraph","text":"zawodników w wychowaniu, a dawniej ich nie mieli."},{"type":"paragraph","text":"4 Por. ks. II, rozdz. 6, § 22, ks. VII, rozdz. 13, § 10 i 20."},{"type":"paragraph","text":"5 Achajowie i Heniochowie należeli do plemion kaukaskich, mieszkających nad północno-"},{"type":"paragraph","text":"-wschodnimi brzegami Morza Czarnego, w sąsiedztwie kolonii greckich Pityus i Dioskurias."},{"type":"paragraph","text":"194"},{"type":"paragraph","text":"4. Wartości wychowawcze muzyki"},{"type":"paragraph","text":"1. Zgodziliśmy się więc na to, że należy uprawiać gimnastykę i jak się to czynić powinno. Do okresu dojrzewania uprawiać należy lżejsze ćwiczenia, unikać przymusowej diety i przymusowych wysiłków, aby wzrostowi nic na przeszkodzie nie stawało. Bo że przedwczesne wysiłki mogą pociągnąć za sobą takie następstwa, tego ważkim dowodem fakt, że między zwycięzcami w igrzyskach olimpijskich znajdzie się zaledwo dwóch lub trzech, którzy odnieśli zwycięstwo i w wieku chłopięcym, i w męskim, ponieważ przez nadmierny wysiłek przy ćwiczeniach w latach młodocianych siły ulegają nadwątleniu."},{"type":"paragraph","text":"2. Gdy jednak od okresu dojrzewania upłyną [młodzieńcowi] trzy lata na innych naukach, wówczas stosowną jest rzeczą poddać go i [ciężkim] trudom, i przymusowej diecie. Nie należy bowiem przemęczać się równocześnie i umysłowo, i fizycznie, bo oba te rodzaje zajęć z natury swej przeciwny dają wynik: praca fizyczna osłabia umysł, a praca umysłowa ciało."},{"type":"paragraph","text":"3. Co do muzyki, to wprawdzie niektóre sporne punkty omówiliśmy już poprzednio6, ale dobrze będzie podjąć znów ten temat obecnie i dalej go rozwinąć, aby dać niejako podstawę do rozważań innym, którzy by chcieli się w tym przedmiocie wypowiedzieć. Nie jest to łatwo powiedzieć dokładnie, jakie znaczenie posiada muzyka, ani w jakim celu należy się nią zajmować. Czy może dla rozrywki i wytchnienia, tak jak się zażywa snu i napoju? I sen, i napój sam przez się nie ma bowiem w sobie nic podniosłego, ale"},{"type":"paragraph","text":"jest przyjemny i koi troskę zarazem,"},{"type":"paragraph","text":"jak mówi Eurypides7. Dlatego i muzykę na równi z nimi się stawia, i w równej mierze się tego wszystkiego używa, bo i snu, i napoju, i muzyki, a dodają do tego także i taniec."},{"type":"paragraph","text":"4. A może należy raczej przyjąć, że muzyka wpływa na cnotę, ponieważ jak gimnastyka wyrabia do pewnego stopnia ciało, tak i muzyka może oddziaływać na charakter przez to, że przyzwyczaja radować się w sposób właściwy? Albo wreszcie przyczynia się nieco do godnego zapełnienia spoczynku i do cnoty? Bo i to trzeba pomieścić jako trzeci punkt wywodów. Otóż nie ulega wątpliwości, że dzieci nie należy wychowywać dla ich rozrywki, bo nauka nie jest dla nich zabawą, lecz jest połączona z przykrością. Nieodpowiednią jednak jest rzeczą zostawiać chłopcom i w ogóle młodocianym swobodę zażywania spoczynku, bo nikomu u początku drogi nie przysługuje to, co bywa u jej kresu."},{"type":"paragraph","text":"5. Ale może ktoś sądzi, że to, czym się chłopcy poważnie zajmują, ma służyć im jako rozrywka, gdy dojdą do wieku męskiego i dojrzeją. Gdyby jednak tak było, to po co mieliby się sami uczyć, zamiast jak królowie Persów i Medów zlecić to innym i przez nich zapewnić sobie możliwość rozkoszowania się i okazywania znawstwa; bo przecież wykonywanie pewnej umiejętności musi się lepiej udawać 6 Por. rozdz. 2, § 3 - 6."},{"type":"paragraph","text":"7 Bachantki 381."},{"type":"paragraph","text":"195"},{"type":"paragraph","text":"tym, którzy ją uprawiają jako swój kunszt i główne zajęcie, aniżeli tym, co tylko tyle czasu na nią poświęcają, ile trzeba, by się z nią zapoznać. Gdyby sami mieli w takiej dziedzinie przeprowadzić gruntowne studia, to powinni by sobie przyswoić i umiejętność przyrządzania potraw, co przecież byłoby niedorzeczne."},{"type":"paragraph","text":"6. Te same wątpliwości nasuwają się, [gdy chodzi o pytanie] czy muzyka może uszlachetniać charakter. Bo po cóż chłopcy mieliby się jej uczyć, zamiast rozkoszować się nią we właściwy sposób i wyrabiać sobie sąd krytyczny słuchając innych, jak Lakończycy, którzy nie uczą się muzyki, a mimo to potrafią — jak zapewniają — wydawać trafny sąd o dobrych czy złych pieśniach. To samo trzeba powiedzieć, jeśli przyjmiemy, że muzyka ma służyć do rozweselania życia i urozmaicenia spoczynku wolnego człowieka. Po co uczyć się jej samemu, zamiast rozkoszować się sztuką innych?"},{"type":"paragraph","text":"7. Można tu przypomnieć wyobrażenie, jakie mamy o bogach; przecież według poetów Zeus sam nie śpiewa ani nie gra na cytrze. Przeciwnie, tych, którzy zawodowo uprawiają muzykę, nazywamy rzemieślnikami, a uprawianie tej sztuki uważamy za rzecz niegodną męża, chyba po pijanemu lub dla żartu. Ale nad tym trzeba będzie może później się zastanowić."},{"type":"paragraph","text":"5. Czy muzyka powinna stanowić"},{"type":"paragraph","text":"przedmiot nauczania i jakim celom ma służyć?"},{"type":"paragraph","text":"(wychowaniu? rozrywce? Czy szlachetnemu używaniu?) 1. Pierwsze pytanie brzmi: czy muzyka powinna stanowić przedmiot nauczania, czy nie, i któremu z trzech możliwych celów może służyć: wychowaniu, rozrywce czy szlachetnemu spędzaniu wolnego czasu? Jest rzeczą słuszną odnieść ją do wszystkich trzech, ponieważ ze wszystkimi zdaje się łączyć. Rozrywka służy bowiem do wytchnienia, a wytchnienie powinno być przyjemne (gdyż jest niejako lekarzem przykrości przez trudy wywołanej). Szlachetne spędzanie wolnego czasu musi być połączone — jak to powszechnie uznają — nie tylko z pięknem, ale i z rozkoszą (oba te czynniki składają się bowiem na poczucie szczęścia). Otóż wszyscy zgadzamy się na to, że muzyka należy do rzeczy najrozkoszniej szych, i to zarówno sama dla siebie, jak i w połączeniu ze śpiewem."},{"type":"paragraph","text":"2. Mówi przecież i Muzajos8:"},{"type":"paragraph","text":"Śpiew jest najmilszą śmiertelnym rozkoszą."},{"type":"paragraph","text":"Stąd na zebraniach towarzyskich i zabawach słusznie uprawia się muzykę, jako że duszę radością przepełnić potrafi. Toteż słusznie można by przyjąć, że młodzież powinna się jej uczyć. Albowiem wszystkie przyjemności nieszkodliwe nie tylko są odpowiednie dla [naczelnego] celu [życia ludzkiego], lecz służą też i do wytchnienia. Że zaś rzadko zdarza się ludziom dosięgnąć wyżyn, a natomiast 8 Legendarny śpiewak grecki, rzekomo uczeń lub przyjaciel mitycznego Orfeusza, podawany za autora pewnych hymnów religijnych."},{"type":"paragraph","text":"196"},{"type":"paragraph","text":"często wypoczywają i oddają się zabawom nie dla jakiegoś wyższego celu, ale właśnie dla samej przyjemności, to może być rzeczą pożyteczną szukać wytchnienia w przyjemności z muzyki płynącej."},{"type":"paragraph","text":"3. Zdarza się jednak, że ludzie biorą sobie za cel życia zabawy. Przedstawia to może pewną przyjemność: osiągnąć cel wytknięty, ale przecież nie byle jaki; szukając zaś doskonałego, bierzemy zań ten pospolity, ponieważ ma pewne podobieństwo do celu naszych czynów. Bo jak dążymy do celu nie dla jakichś przyszłych względów, tak i tych przyjemności zażywamy nie ze względu na to, co ma być, ale ze względu na to, co minęło, tj. na przebyte trudy i utrapienia. W tym więc należy szukać słusznej przyczyny, dla której ludzie szukają szczęścia w takich przyjemnościach."},{"type":"paragraph","text":"4. Uprawia się jednak muzykę nie dla tej tylko przyczyny, ale dlatego, że wydaje się użyteczną dla wytchnienia. Należy jednak zapytać, czy nie jest to rzeczą uboczną (muzyka z natury swej jest zbyt cenna, by się do tej korzyści ograniczać) i czy nie należy nie ograniczać się do tej pospolitej przyjemności, którą wszyscy odczuwają (w muzyce tkwi bowiem przyjemność przyrodzona i dlatego każdy wiek i każdy charakter tak chętnie ją uprawia), a natomiast baczyć, czy muzyka nie oddziaływa również na charakter i na duszę. Byłoby to niewątpliwe, jeślibyśmy pod jej wpływem kształcili się pod względem moralnym."},{"type":"paragraph","text":"5. Że tak jest istotnie, wskazują prócz wielu innych dowodów szczególnie pieśni Olimposa9, które według zgodnej opinii zachwytem przepełniają duszę, zachwyt zaś jest przejawem uczuć moralnych duszy. Przecież samo śledzenie ruchów na scenie, nawet bez rytmu i śpiewu, wywołuje u wszystkich odpowiedni nastrój. Skoro zaś jest właściwością muzyki, że sprawia przyjemność, a cechą cnoty, by się właściwie radować, kochać i nienawidzić, to oczywiście niczego nie należy tak pilnie się uczyć i w niczym tak pilnie zaprawiać, jak w tym, by sądzić słusznie i cieszyć się pięknymi obyczajami i szlachetnymi czynami."},{"type":"paragraph","text":"6. Jest wielkie podobieństwo co do prawdziwej natury między rytmami i melodiami a gniewem i łagodnością, męstwem i rozwagą, i ich wszystkimi przeciwieństwami oraz innymi uczuciami etycznymi. Dowodzą tego fakty: słuchamy takich melodii i nastrój duszy naszej ulega zmianie. Od przyzwyczajenia się do tego, by smucić się czy cieszyć na widok podobieństw, blisko jest jednak do takiego zachowania się wobec rzeczywistości. Jeśli ktoś np. cieszy się na widok obrazu pewnej osoby tylko z powodu piękności postaci, a nie z jakiegoś innego, to oczywiście i widok samej tej osoby, której obraz ogląda, musi być mu miły."},{"type":"paragraph","text":"7. Dołącza się do tego fakt, że w innych przedmiotach zmysłowego odczuwania, tak np. w tym, co można odczuć dotykiem lub smakiem, nie ma żadnego podobieństwa do zjawisk etycznych, natomiast jest go nieco w tym, co się wzrokiem spostrzega. Są to bowiem postaci, a te tylko w nieznacznej mierze, i to nie u wszystkich, są przedmiotem takiego etycznego odczucia; nie są to przecież 9 Również legendarny śpiewak, któremu podobnie jak Muzajosowi przypisywano pewne utwory poetyckie."},{"type":"paragraph","text":"197"},{"type":"paragraph","text":"obrazy stanów etycznych, a raczej tylko ich oznaki, uwidaczniające się w przybranej postawie i barwie ciała w chwilach afektu. Wiele tu jednak zależy od przedmiotu, który się ogląda, stąd młodzież nie powinna oglądać dzieł Pauzona, ale Polignota10, czy też jakiegoś innego malarza lub rzeźbiarza, który umie swoim dziełom nadać pewien rys etyczny."},{"type":"paragraph","text":"8. Natomiast w melodiach samych zawiera się odzwierciedlenie przeżyć moralnych, co oczywistą jest rzeczą. Bo najpierw już natura tonacji bywa rozmaita, tak że słuchacze różnie się nastrajają na każdą z nich, ale np. przy tonacji zwanej miksolidyjską wpadają w nastrój więcej smutny i przygnębiony, przy innych, np."},{"type":"paragraph","text":"przy skocznych, w nastrój raczej wesoły, podczas gdy jeszcze inna wprawia nas przede wszystkim w nastrój pośredni i poważny, co zdaje się wywoływać jedynie tonacja dorycka w przeciwieństwie do frygijskiej, która budzi zachwyt."},{"type":"paragraph","text":"9. Słusznie powiadają tak pisarze, którzy rozmyślali nad tą stroną wychowania, a fakty z doświadczenia stanowią świadectwo słuszności ich wywodów. Tak samo jest i z różnymi rodzajami taktów. Jedne mają charakter spokojny, inne żywy, a tym znów towarzyszą ruchy raz rubaszniejsze, raz szlachetniejsze. Okazuje się z tego, że muzyka posiada zdolności pewnego wpływania na moralne kształcenie duszy. Jeżeli zaś może to robić, to oczywiście powinno się w niej młodzież zaprawiać i kształcić."},{"type":"paragraph","text":"10. Jakoż nauka muzyki zgadza się z przyrodzonymi właściwościami tego wieku, bo młodzi właśnie ze względu na swój wiek nie imają się chętnie żadnej rzeczy, która nie sprawia im przyjemności, a muzyka z natury swojej należy do rzeczy rozkosznych. Zdaje się też istnieć pewne pokrewieństwo między duszą a harmoniami i rytmami, stąd wielu filozofów twierdzi, że dusza to harmonia, inni, że zawiera w sobie harmonię."},{"type":"paragraph","text":"6. Czy młodzież winna sama uczyć się śpiewu i gry na instrumentach i na jakich, czy też tylko wyrabiać w sobie zdolność osądzania piękna?"},{"type":"paragraph","text":"1. Z kolei trzeba teraz omówić poruszone już poprzednio zagadnienie, czy młodzież powinna się sama uczyć śpiewu i gry na instrumentach, czy też nie."},{"type":"paragraph","text":"Wiadomo dobrze, że dla zaznajomienia się z p
