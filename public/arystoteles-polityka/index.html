ione, a tym samym jest prawem."},{"type":"paragraph","text":"1 Por. ks. IV, rozdz. 10."},{"type":"paragraph","text":"2 Tamże, § 2."},{"type":"paragraph","text":"3 Por. ks. V, rozdz. 7, § 16 nn."},{"type":"paragraph","text":"148"},{"type":"paragraph","text":"Powiadają bowiem, że każdy z obywateli musi mieć równe prawa, skutkiem tego w demokracjach ludzie ubodzy więcej znaczą niźli bogaci; przedstawiają przecież większość, a co ta uchwali, ma moc obowiązującą."},{"type":"paragraph","text":"7. To jest zatem jedna cecha wolności, wysuwana przez wszystkich zwolenników demokracji jako zasadniczy rys tego ustroju. Drugą cechę stanowi możność urządzenia sobie życia, jak kto chce. Bo to — powiadają — jest właściwością wolności, podczas gdy niewolnika znamionuje to, że żyje nie tak, jak by chciał."},{"type":"paragraph","text":"Jest to zatem drugi charakterystyczny rys demokracji. Stąd jednak wywodzi się też dążność, aby nie podlegać, o ile możności, nikomu, a jeśli to niemożliwe, to na przemian. W tym względzie zbiega się ta cecha wolności z pierwszą dotyczącą równości."},{"type":"paragraph","text":"8. Z tych założeń i z takiej zasady [wynikają] następujące urządzenia demokratyczne:"},{"type":"paragraph","text":"Wszyscy urzędnicy są wybierani spośród wszystkich."},{"type":"paragraph","text":"Wszyscy panują nad każdym i każdy nad wszystkimi na przemian."},{"type":"paragraph","text":"Urzędy obsadza się w drodze losowania i to albo wszystkie, albo te, które nie wymagają szczególnego doświadczenia ani umiejętności."},{"type":"paragraph","text":"Urzędy nie są uzależnione od żadnego cenzusu majątkowego albo tylko od bardzo niskiego."},{"type":"paragraph","text":"Żadnego urzędu nie może ten sam człowiek dwa razy piastować albo też jest to dopuszczalne niewiele razy, albo w niewielu wypadkach, z wyjątkiem stanowisk wojskowych."},{"type":"paragraph","text":"Urzędy są krótkotrwałe albo wszystkie, albo w tych wypadkach, gdzie to możliwe."},{"type":"paragraph","text":"Sędziami są wszyscy, albo też są oni powoływani spośród wszystkich, a wyrokują o wszelkich sprawach, albo też o największych i najważniejszych, jako to: o sprawozdaniach, o zagadnieniach ustrojowych i prywatnych umowach."},{"type":"paragraph","text":"Zgromadzenie ludowe rozstrzyga we wszystkich sprawach, albo przynajmniej w najważniejszych, żaden zaś urząd nie ma w niczym władzy rozstrzygającej albo też w bardzo niewielu wypadkach."},{"type":"paragraph","text":"9. Z władz najbardziej duchowi demokratycznemu odpowiada rada tam, gdzie nie płaci się wszystkim sowitego wynagrodzenia4. W takim wypadku bowiem i tej władzy odbierają znaczenie, gdyż lud dla dobrej zapłaty zagarnia dla siebie rozstrzygnięcia we wszelkich sprawach, jak to już zaznaczono w powyższych wywodach5."},{"type":"paragraph","text":"Dalszą cechą demokracji jest płacenie wynagrodzeń, i to najlepiej wszystkim, a więc za udział w zgromadzeniach ludowych i sądach, tudzież za piastowanie urzędów, a jeśli to niemożliwe, to przynajmniej za najważniejsze urzędy: sądy, zebrania, rady i zwyczajne zgromadzenia ludowe, albo za te urzędy, których przedstawicieli obowiązuje wspólne spożywanie posiłków."},{"type":"paragraph","text":"4 Za udział w zgromadzeniach ludowych."},{"type":"paragraph","text":"5 Por. ks. IV, rozdz. 12, § 9."},{"type":"paragraph","text":"149"},{"type":"paragraph","text":"Jeśli nadto w oligarchii czynnikami wyróżniającymi są ród, majątek i wykształ-"},{"type":"paragraph","text":"cenie, to w demokracji zdają się grać rolę przeciwieństwa ich: niskie pochodzenie, ubóstwo i nieokrzesanie."},{"type":"paragraph","text":"10. Przy urzędach obowiązuje zasada, że żaden z nich nie jest dożywotni, jeśli jednak z dawnego ustroju, który uległ zmianie, pozostał taki urząd, wówczas odejmuje mu się wszelką władzę i zamiast w drodze wyboru obsadza się go przez losowanie."},{"type":"paragraph","text":"To byłyby zatem wspólne cechy różnych demokracji; z zasady prawnej, uznanej za demokratyczną, a mówiącej, że wszyscy według liczby równe posiadają prawa, wywodzi się ta demokracja i to państwo ludowe, które w pierwszym rzędzie za takie uchodzi. Bo równość polega na tym, że ubodzy czy bogaci nie górują jedni nad drugimi co do władzy i żadna strona nie dzierży wyłącznie władzy rozstrzygającej, lecz wszyscy na równi według stosunku liczbowego. W takim razie bowiem, zdaniem demokratów, istnieje w państwie równość i wolność."},{"type":"paragraph","text":"11. Z kolei nasuwa się pytanie, w jaki sposób zapewnić równość; czy np. jeśli cenzus majątkowy pięciuset obywateli odpowiada cenzusowi tysiąca, to tych tysiąc ma równą władzę posiadać, co owych pięciuset? Czy też może nie należy ustalać równości według cenzusu, a tylko przeprowadzić taki podział i następnie wziąć tyluż z grupy pięciuset, co i z tysiąca, i tym powierzyć w całości wybory urzędników i sądy? Czy zatem ze stanowiska demokratycznego ten ustrój jest najsprawiedliwszy, czy też raczej ten, w którym pospólstwo ma władzę? Demokraci powiadają mianowicie, że prawem jest to, co uchwali większa masa ludzi, wedle oligarchów natomiast to, co postanowi większa własność, ponieważ — zdaniem ich — rozstrzygać winna przewaga majątku."},{"type":"paragraph","text":"12. W jednym i drugim wypadku byłaby to nierówność i niesprawiedliwość."},{"type":"paragraph","text":"Jeśli mianowicie dzieje się to, czego chce niewielu, to jest to tyrania — bo jeśliby nawet jeden człowiek miał więcej niż inni bogaci, to według prawa oligarchicznego on jeden byłby uprawniony do rządzenia; a jeśli dzieje się to, czego chce większość, to nie będzie tu sprawiedliwości, bo większość przeprowadzi konfiskatę"},{"type":"paragraph","text":"[dóbr] bogatych pozostających w mniejszości, jak to już poprzednio powiedziano6."},{"type":"paragraph","text":"Należy się więc zastanowić, jaka byłaby ta równość, na którą jedni i drudzy by się zgadzali, wychodząc z pojęcia sprawiedliwości, tak jak ją obie strony określają."},{"type":"paragraph","text":"Powiadają bowiem, że to, co większość obywateli uchwali, winno mieć znaczenie prawa."},{"type":"paragraph","text":"13. Przyjmujemy tę zasadę, ale nie w zupełności. Skoro państwo składa się z dwóch grup — bogatych i ubogich — więc niechże to, co obie lub większość jednej i drugiej uchwali, będzie prawem. Jeśli zaś zdania ich będą przeciwne, niech prawem będzie to, co postanowi strona górująca liczbą i cenzusem majątkowym."},{"type":"paragraph","text":"Np. jednych jest dziesięciu, drugich dwudziestu; z bogatych sześciu jest za pewną sprawą, natomiast z uboższych piętnastu za inną; do ubogich dołącza się więc czterech z bogatych, a do bogatych pięciu z ubogich. Po czyjej stronie tedy okaże 6 Por. ks. III, rozdz. 6."},{"type":"paragraph","text":"150"},{"type":"paragraph","text":"się przewaga cenzusu majątkowego po zaliczeniu po obu stronach razem idących, tej zdanie stanie się prawem."},{"type":"paragraph","text":"14. Jeśli się zaś zdarzy, że będzie równość po obu stronach, to trudność w takim razie występująca powinna być tak samo traktowana jak obecnie, gdy na zgromadzeniu ludowym lub w sądzie okaże się równość głosów: trzeba mianowicie zastosować losowanie czy też sięgnąć do jakiegoś innego środka tego rodzaju."},{"type":"paragraph","text":"Ale choć trudno jest ustalić prawdę w odniesieniu do równości i sprawiedliwości, to przecież łatwiej to przychodzi, aniżeli przemówić do przekonania tym, którzy mają w ręku moc uzyskania dla siebie korzyści. Zawsze bowiem słabsi są tymi, co szukają równości i sprawiedliwości, możni zaś na to się zupełnie nie oglądają."},{"type":"paragraph","text":"2. Najlepsza jest demokracja rolnicza. Jak ją urządzić?"},{"type":"paragraph","text":"Po niej idzie pasterska, dalej miejska"},{"type":"paragraph","text":"i, najgorsza ze wszystkich, skrajna,"},{"type":"paragraph","text":"w której wszyscy biorą udział w rządach"},{"type":"paragraph","text":"1. Z czterech rodzajów demokracji, jakie istnieją, najlepsza jest pierwsza z rzędu, jak to już w poprzednich wywodach powiedziano7. A jest ona i najstarsza ze wszystkich. Nazywam ją pierwszą w tym znaczeniu, jak pierwszą mógłby ktoś nazwać jedną z klas ludności, na jakie się ona dzieli. Najlepszą ludnością jest mianowicie rolnicza, toteż tam, gdzie masy żyją z uprawy roli lub hodowli bydła, daje się zaprowadzić najlepsza demokracja. Ponieważ nie posiadają wielkiego majątku, nie mają czasu na odbywanie częstych zgromadzeń, a że brak im rzeczy potrzebnych do życia, oddają się gorliwie swym pracom, nie zajmują się obcymi sprawami i więcej mają przyjemności ze swej pracy aniżeli z politykowania i piastowania urzędów, chyba że jakieś urzędy wielkie zyski przynoszą. Ludzie bowiem przeważnie więcej się na zysk oglądają niż na zaszczyty."},{"type":"paragraph","text":"2. Dowodem tego fakt, że ludzie znosili dawniej tyranie, a obecnie znoszą oligarchie, jeśli im ktoś nie przeszkadza w pracy i nic nie zabiera; w takich warunkach bowiem jedni z nich szybko dochodzą do bogactwa, a inni przynajmniej nie cierpią braków. Jeśli ponadto mają jakieś ambicje, to przysługujące im prawo wyboru władz i pociągania ich do odpowiedzialności w zupełności zaspokaja ich potrzeby. Nawet jeśli masy nie biorą udziału w wyborze urzędników, a tylko niektórzy kolejno są wybieram spośród wszystkich obywateli, jak w Mantinei8, masom zaś przysługuje tylko prawo udziału w ciałach obradujących, to i tym się zadowalają. I taki stan rzeczy trzeba istotnie uznać za pewien rodzaj demokracji; tak właśnie było niegdyś w Mantinei."},{"type":"paragraph","text":"3. Dlatego dla omówionej wyżej9 demokracji jest rzeczą korzystną i zwykle 7 Por. ks. IV, rozdz. 4 i 7."},{"type":"paragraph","text":"8 Wynika z tego, że w Mantinei wybory urzędników były pośrednie, przeprowadzali je mianowicie wybrani z ogółu obywateli wyborcy."},{"type":"paragraph","text":"9 Por. wyżej, rozdz. § 1."},{"type":"paragraph","text":"151"},{"type":"paragraph","text":"wypróbowaną w praktyce, że wprawdzie wszyscy wybierają władze, odbierają od nich sprawozdania i wszyscy biorą udział w sądach, ale najwyższe urzędy piastują obywatele wybrani według cenzusu majątkowego, który jest tym większy, im wyższy jest urząd, lub też odpowiednio uzdolnieni bez względu na jakikolwiek cenzus. Państwo, w którym się zastosuje takie zasady rządzenia, będzie niezawodnie dobrze rządzone, bo urzędy spoczywać będą zawsze w rękach najlepszych za zgodą ludu i bez zawiści skierowanej przeciw wybitnym obywatelom. Równocześnie zaś porządek taki spotyka się z zadowoleniem wybitnych i poważnych ludzi; ci bowiem nie znajdują się pod rządami innych, gorszych, a sami będą rządzić sprawiedliwie ze względu na to, że drugim przysługiwać będzie prawo pociągania ich do odpowiedzialności."},{"type":"paragraph","text":"4. Ta zależność od drugich i ograniczenie bezwzględnej swobody działania wedle upodobania jest rzeczą korzystną. Bo możność robienia, co kto chce, nie nadaje się do tego, aby utrzymać w karbach zło tkwiące w każdym człowieku."},{"type":"paragraph","text":"W ten sposób z konieczności wytwarza się stan rzeczy, który jest dla państw najpożyteczniejszy, że rządzą obywatele, nie dopuszczając do niesprawiedliwości, a lud wcale nie jest upośledzony."},{"type":"paragraph","text":"Okazuje się tedy, że taka demokracja jest najlepsza, i z jakiego powodu; a mianowicie dlatego, że lud jest właśnie taki."},{"type":"paragraph","text":"5. W tym kierunku, aby stworzyć taką ludność rolniczą, działały dawnymi czasy pewne pożyteczne prawa, które w wielu państwach istniały: albo w ogóle nie było wolno posiadać więcej ziemi ponad pewną miarę, albo dopiero w pewnym oddaleniu od grodu i miasta. W wielu państwach istniało dawniej prawo, że pierwotnych działek ziemi sprzedawać nie wolno. Coś podobnego miało na celu prawo przypisywane Oksylosowi10, że nie wolno zaciągać pożyczek na pewną część posiadanej przez każdego obywatela ziemi."},{"type":"paragraph","text":"6. W obecnych czasach należałoby dążyć do poprawy stosunków za pomocą prawa Afytejczyków 11, bo dla omawianych celów jest ono użyteczne. Afytejczycy mianowicie, mimo że jest ich dużo, a niewiele ziemi posiadają, zajmują się wszyscy rolnictwem; poddają bowiem oszacowaniu nie całe majątki, lecz dzielą je na tyle drobnych działek, że i ubodzy przy ustaleniu cenzusu majątkowego mogą uzyskać przewagę12."},{"type":"paragraph","text":"7. Po gminie złożonej z ludności rolniczej najlepsza z kolei jest taka, której ludność składa się z pasterzy i żyje z hodowli bydła. W swym sposobie życia jest bowiem ludność pasterska w wielu względach podobna do rolników, dzięki swym nawykom jest najlepiej do służby wojskowej wyćwiczona, a zarazem sprawna fizycznie i pobyt pod gołym niebem najłatwiej znosić potrafi."},{"type":"paragraph","text":"10 Oksylos, z pochodzenia jakoby Etolczyk, legendarny władca Elidy, którą miał otrzymać od wdzierających się na Peloponez Dorów w nagrodę za wskazanie drogi."},{"type":"paragraph","text":"11 Mieszkańcy miasta Afytis na chalkidyckim półwyspie Pallene."},{"type":"paragraph","text":"12 Chodzi zapewne o to, że pewna nieznaczna, z góry określonej wielkości działka, o ile obywatel przy oszacowaniu mógł się nią wykazać, stanowiła podstawę do ustalania zakresu uprawnień politycznych."},{"type":"paragraph","text":"152"},{"type":"paragraph","text":"Inne rodzaje ludności, z jakich składają się pozostałe demokracje, niemal bez wyjątku są już znacznie gorsze od powyższych. Bo i tryb życia jest marny, i żadne z zajęć, jakie wykonuje rzesza rzemieślników, kramarzy i wyrobników, nie wymaga cnoty. Ponadto wszyscy ludzie tego pokroju, że tak powiem, ponieważ obracają się w rynku i w mieście, z łatwością zjawiają się na zgromadzeniach ludowych, podczas gdy rolnicy wskutek tego, że są rozproszeni po kraju, nie stawiają się i nie odczuwają w równym stopniu potrzeby takich zebrań."},{"type":"paragraph","text":"8. Gdzie się to jednak trafi, że kraj ma takie położenie, iż obszar wiejski znacznie jest oddalony od miasta, tam daje się z łatwością zaprowadzić i dobra demokracja, i politeja. Przeważająca większość ludności zmuszona jest mieszkać na wsi, toteż w takich demokracjach musi się wprowadzić zastrzeżenie, że choćby tłum miejski licznie się zebrał, nie można odbywać zgromadzeń ludowych bez udziału ludności wiejskiej."},{"type":"paragraph","text":"Powiedzieliśmy zatem, jak należy urządzić najlepszą i najprzedniejszą demokrację, okazuje się jednak także, jak się ma rzecz z innymi. Muszą one mianowicie odbiegać odpowiednio od właściwej, a w każdym razie gorszą część ludności zawsze odsuwać od rządów."},{"type":"paragraph","text":"9. Co się tyczy jednak najskrajniejszej demokracji, to ponieważ w niej wszyscy mają udział w rządach, nie każde państwo znieść ją potrafi, niełatwo też przychodzi jej się utrzymać, jeśli nie ma silnego oparcia w prawach i obyczajach."},{"type":"paragraph","text":"(O przyczynach, które pociągają za sobą upadek i tego, i innych ustrojów, mówiliśmy już wcale obszernie, powyżej13.) Aby tę demokrację zaprowadzić i wzmocnić szeregi ludu, przywódcy dopuszczają zazwyczaj do obywatelstwa jak najszerszą liczbę ludzi, i to nie tylko ze ślubnych związków, ale i z nieślubnych, jako też tych, którzy mogą się wykazać obywatelskim pochodzeniem tylko z jednej strony, a mianowicie tylko po ojcu lub tylko po matce. Wszelkie takie żywioły więcej bowiem odpowiadają tego rodzaju demokracji."},{"type":"paragraph","text":"10. Tak to zwykli postępować demagogowie, a tymczasem powinno by się tylko tylu obywateli dobierać, ilu potrzeba, by lud przewyższył liczebnie ludzi możnych i stanu średniego, a poza to już się nie należy posuwać. Jeśli się bowiem miarę przekroczy, powstaje zamęt w państwie, a u możnych, którzy i tak niechętnie znoszą demokrację, rośnie rozgoryczenie; tak było właśnie w Cyrenie 14, gdzie to się stało przyczyną przewrotu. Małe zło bowiem łatwo przeoczyć, jeśli się jednak rozrośnie, tym więcej rzuca się ono w oczy."},{"type":"paragraph","text":"11. Dla demokracji tego rodzaju użyteczne są nadto takie urządzenia, jakie w dążeniu do umocnienia demokracji zastosował w Atenach Klejstenes15, a w Cyrenie założyciele demokracji. Należy mianowicie stworzyć większą ilość 13 Por. ks. V, rozdz. 7."},{"type":"paragraph","text":"14 W Cyrenie, po usunięciu rodu królewskiego Battiadów ok. 460 r. p.n.e., zaprowadzona została demokracja, która z kolei obalona została przez oligarchię."},{"type":"paragraph","text":"15 Klejstenes w 508 r. p.n.e. stworzył 10 fyl lokalnych, które zamiast dawnych fyl rodowych stały się podstawą organizacji politycznej obywateli."},{"type":"paragraph","text":"153"},{"type":"paragraph","text":"fyl i związków rodowych (fratrie), a prywatne związki kultowe ograniczyć do niewielu i udostępnić je ogółowi oraz wszystko uczynić, by wszystkie warstwy jak najwięcej się wymieszały, dawniejsze zaś związki rozluźniły."},{"type":"paragraph","text":"12. Poza tym także wszelkie urządzenia stosowane przez tyranię wydają się odpowiednie dla demokracji, tak np. swobodniejsze stanowisko niewolników (do pewnego stopnia może to być użyteczne), podobnie jak kobiet i dzieci, tudzież pozostawienie ludziom swobody urządzania sobie życia, jak się komu podoba. Dla tego rodzaju ustroju będzie to wielce pomocne, gdyż masom milsze jest życie nieskrępowane aniżeli w karby ujęte."},{"type":"paragraph","text":"3. Jak zapewnić trwałość demokracji?"},{"type":"paragraph","text":"Postępowanie demagogów, a postępowanie właściwe 1. Dla prawodawcy, jak i dla tych, którzy chcą stworzyć pewien ustrój, największa i wcale nie jedyna trudność leży nie w jego zaprowadzeniu, ale raczej w tym, jak mu trwałość zapewnić. Bo przez jeden, dwa lub trzy dni da się bez trudności jakikolwiek ustrój utrzymać. Dlatego w myśl poprzednich rozważań nad utrzymaniem i rozkładem ustrojów należy dążyć do tego, aby dziełu trwałość zapewnić, unikając tego, co mu zaszkodzić może, a stanowiąc takie prawa pisane i niepisane, które wykazują cechy sprzyjające zachowaniu ustroju; nie należy zaś sądzić, że demokratyczne i oligarchiczne jest to, co państwu nada wybitnie demokratyczny i oligarchiczny charakter, lecz to, co mu zapewni największą trwałość."},{"type":"paragraph","text":"2. Obecnie demagogowie, aby sobie względy ludu pozyskać, doprowadzają za pomocą sądów do wielu konfiskat. Dlatego ci, którym utrzymanie ustroju leży na sercu, powinni temu przeciwdziałać i prawem zastrzec, że majątek skazanych oraz grzywny wnoszone do skarbu nie przypadają wcale ludowi, ale [mają być użyte]"},{"type":"paragraph","text":"na cele religijne. Bo popełniający przewinienia niemniej będą się mieli na baczności (kara zostanie przecież bez zmiany), ale tłum mniej pochopnie skazywać będzie oskarżonych, jeżeli nic na tym nie zyska."},{"type":"paragraph","text":"Oprócz tego należy zawsze jak najbardziej ograniczać procesy o zdradę stanu i za pomocą wysokich grzywien nie dopuszczać do wnoszenia lekkomyślnych oskarżeń. Zazwyczaj bowiem nie są to ludzie z tłumu, ale możni, przeciw którym wnosi się takie oskarżenia, a przecież wszyscy o ile możności obywatele powinni by się życzliwie ustosunkowywać do ustroju; a jeśli nie, to w każdym razie do tych, co dzierżą władzę w ręce, nie powinni odnosić się jakby do nieprzyjaciół."},{"type":"paragraph","text":"3. Ponieważ skrajne demokracje są bardzo ludne i trudno wymagać, by ludzie bez odszkodowania brali udział w zgromadzeniach, a urządzenie to, tam gdzie przypadkiem nie ma dostatecznych dochodów, zwraca się przeciw możnym (potrzebnych środków muszą bowiem dostarczyć podatki, konfiskaty i niesprawiedliwe sądy, co zgubiło już wiele demokracji) — gdzie zatem nie ma właśnie do rozporządzenia dochodów, należy odbywać niewiele zgromadzeń, a sądy składać 154"},{"type":"paragraph","text":"z wielu wprawdzie członków, lecz odbywać je przez niewiele dni. Przedstawia to bowiem tę korzyść, że bogaci nie boją się wydatków, jeżeli za udział w sądzie otrzymują wynagrodzenie ubodzy, a nie ludzie zasobni, ale ma także i tę stronę dodatnią, że wymiar sprawiedliwości jest o wiele lepszy. Zamożni bowiem nie chcą odrywać się od swych zajęć na wiele dni, na krótki czas natomiast chętnie to czynią."},{"type":"paragraph","text":"4. Gdzie zaś są dochody, nie należy tak postępować, jak to obecnie czynią demagogowie, którzy rozdzielają nadwyżki skarbowe. Bo lud bierze, ale zaraz potem znów znajduje się w takiej samej potrzebie, gdyż taka pomoc biednym jest jak ta dziurawa beczka. Przeciwnie, prawdziwy przyjaciel ludu musi baczyć na to, aby masy nie były zbyt biedne, ponieważ to bywa przyczyną rozkładu demokracji."},{"type":"paragraph","text":"Trzeba więc wynaleźć środki, aby zapewnić trwały dobrobyt ludności, gdyż jest to korzystne i dla zamożnych. Należy zatem nadwyżki dochodów gromadzić i następnie wszystko naraz rozdzielić między ubogich, najlepiej zaś jest, jeśli się zdoła tyle zebrać, by każdy mógł sobie kupić małą posiadłość, albo przynajmniej, żeby to starczyło na podjęcie jakiegoś handlu czy gospodarstwa wiejskiego. Jeśli nie można wszystkich zaopatrzyć, to należy przeprowadzić rozdział według fyl albo jakiegoś innego podziału. Zamożni powinni by przy tym wpłacać kwoty na odszkodowanie za udział konieczny w zgromadzeniach, a za to powinni by być zwolnieni od niepotrzebnych świadczeń."},{"type":"paragraph","text":"5. Takiego mniej więcej rodzaju politykę uprawiają Kartagińczycy i dzięki temu pozyskali sobie przyjaźń ludu. Stale mianowicie wysyłają pewnych ludzi z tej warstwy do miast podległych, a przez to dają im sposobność do zrobienia majątku. Ze strony ludzi zamożnych jest to zarówno szlachetnie, jak rozumnie, jeśli dostarczają, każdy pewnej grupie ubogich, odpowiednich środków umożliwiających im zatrudnienie. Dobrze też byłoby naśladować przykład Tarentyjczyków. Ci mianowicie udostępniają ubogim wspólne użytkowanie pewnych posiadłości i w ten sposób jednają sobie przychylność pospólstwa, ponadto wprowadzili podwojenie wszelkich urzędów, przy czym jedne obsadza się w drodze losowania, drugie w drodze wyboru."},{"type":"paragraph","text":"Losowanie ma na celu udostępnienie urzędów ludowi, wybór ma zapewnić lepsze rządy w państwie. Można by to zastosować również w jednym i tym samym urzędzie w ten sposób, by podzielić w nim miejsca i obsadzać je częścią przez losowanie, częścią przez wybór. Wyłożyliśmy zatem, jak należy urządzać demokracje."},{"type":"paragraph","text":"4. Jak urządzać oligarchie? Jak im zapewnić trwałość?"},{"type":"paragraph","text":"1. W przybliżeniu okazuje się z tego również, jak należy urządzać oligarchie."},{"type":"paragraph","text":"Trzeba mianowicie zestawić każdą oligarchię z części składowych przeciwnych, aniżeli je znajdujemy w przeciwstawiającej się jej demokracji, tak więc i przodującą, najlepiej ze wszystkich wymieszaną oligarchię, która jest zbliżona do tzw. politei."},{"type":"paragraph","text":"Należy tu wprowadzić dwojaki cenzus majątkowy, jeden niższy, drugi wyższy; niższy, który daje uprawnienia do piastowania [niższych] niezbędnych urzędów, wyższy, który otwiera dostęp do ważniejszych. Kto ma cenzus ustawowy, winien 155"},{"type":"paragraph","text":"posiadać pełne prawa obywatelskie, przy czym na postawie cenzusu tyle osób z ludu wprowadza się w szeregi pełnoprawnych obywateli, żeby wzięli górę nad niedopuszczonymi. Zawsze jednak trzeba dobierać dopuszczonych do pełnych praw z lepszych elementów ludu."},{"type":"paragraph","text":"2. Podobnie należy urządzić następną z kolei oligarchię przez nieco silniejsze zastosowanie zasad oligarchicznych. Natomiast oligarchia, która przedstawia przeciwieństwo skrajnej demokracji, a więc forma, która jest najbliższa władzy dynastów i tyranów, wymaga tym większej troskliwości, im jest gorsza. Jak bowiem ludzie o silnej budowie fizycznej lub statki dobrze do żeglugi dostosowane i dobrze w załogę zaopatrzone więcej wytrzymują ciosów, tak że nie giną od nich, a przeciwnie, ciała chorowite i okręty rozklekotane oraz marną mające załogę nie są w stanie znieść nawet drobnych wstrząśnień, tak i najgrosze ustroje wymagają największej troskliwości."},{"type":"paragraph","text":"3. W ogóle demokracje utrzymują się dzięki wielkiej liczbie ludności, bo panowanie masy stoi w sprzeczności z prawem wynikającym z zasługi. Jasną jest więc rzeczą, że przeciwnie, oligarchia musi szukać oparcia w panowaniu ładu."},{"type":"paragraph","text":"Po największej części rozpada się masa ludności na cztery klasy: rolników, rzemieślników, kramarzy i wyrobników; cztery też są rodzaje broni, mające w wojnie znaczenie: jeźdźcy, ciężkozbrojni, lekkozbrojni i marynarze. Gdzie kraj nadaje się dla jazdy, tam istnieją pomyślne warunki do urządzenia silnej oligarchii, bo z jednej strony bezpieczeństwo mieszkańców opiera się na tej sile zbrojnej, a z drugiej strony utrzymanie koni możliwe jest tylko dla ludzi posiadających wielkie majątki. Gdzie zaś są warunki sprzyjające rozwojowi ciężkozbrojnej piechoty, rozwija się najbliższa z kolei forma oligarchii, gdyż służba w ciężkozbrojnej piechocie jest rzeczą raczej zamożnych niż ubogich. Natomiast lekkozbrojna piechota i marynarka wojenna są najzupełniej demokratycznymi rodzajami broni."},{"type":"paragraph","text":"4. Gdzie zatem obecnie ta klasa ludności jest liczna, tam oligarchowie ulegają w walce w razie jakiegoś powstania. Aby temu zapobiec, należałoby naśladować postępowanie doświadczonych w wojnie wodzów, którzy do jazdy i ciężkozbrojnych dołączają odpowiednią liczbę lekkozbrojnych. Przy ich pomocy właśnie warstwy ludowe biorą górę w walkach wewnętrznych nad zamożnymi; to dzięki swemu lekkiemu uzbrojeniu z łatwością odnoszą zwycięstwo nad jazdą i ciężkozbrojną piechotą."},{"type":"paragraph","text":"5. Otóż wystawiać z tych ludzi taką siłę zbrojną znaczyłoby tyle dla oligarchii, co uzbroić ich przeciw sobie; przeciwnie, przy uwzględnieniu różnic wieku, ponieważ część młodzieży należy do starszych, a część do młodszych, powinni by swych własnych synów, którzy są jeszcze w wieku młodocianym, zaprawiać w niezbyt uciążliwych ćwiczeniach lekkozbrojnych, aby gdy wyjdą z lat chłopię-"},{"type":"paragraph","text":"cych, mogli pełnić służbę jako wyszkoleni bojownicy."},{"type":"paragraph","text":"Jeśli oligarchia ma dopuścić masy do udziału w rządach, to należy to uzależnić albo, jak już poprzednio powiedziano 16, od zdobycia pewnego cenzusu majątkowego, albo, jak w Tebach, od powstrzymania się przez jakiś czas od wykonywania 16 Por. wyżej, § 1 niniejszego rozdz."},{"type":"paragraph","text":"156"},{"type":"paragraph","text":"zajęć rzemieślniczych, albo, jak w Massalii, od wyboru zasługujących i to zarówno spośród członków klasy rządzącej, jak spośród ludzi stojących poza jej obrębem."},{"type":"paragraph","text":"6. Ponadto z najważniejszymi urzędami, które mają być zachowane dla klasy rządzącej, powinno się połączyć świadczenia nadzwyczajne, aby lud nie wykazywał"},{"type":"paragraph","text":"chęci do ich piastowania i nie zazdrościł tym, co je piastują, wobec tego, że za swój urząd grubą opłatę składają. Wskazane jest też, by przy objęciu godności urządzali wspaniałe ofiary albo stworzyli jakieś dzieło ogólnej użyteczności, aby lud, biorący udział w ucztach ofiarnych i widzący miasto przyozdobione pomnikami czy budowlami, chętnie też widział utrzymanie ustroju. Także dla możnych będzie to pewna przyjemność zostawić pamiątki swych świadczeń. Dzisiejsi oligarchowie nic takiego jednak nie robią, raczej przeciwnie; uganiają się bowiem za zyskiem nie mniej niż za zaszczytami. Stąd też można by te oligarchie nazwać słusznie małymi demokracjami."},{"type":"paragraph","text":"W ten sposób niech będzie omówione, jak należy urządzać demokracje i oligarchie."},{"type":"paragraph","text":"5. Urzędy, rodzaje ich i zakres działania 1. W związku z podanymi rozważaniami nasuwa się zadanie gruntownego zbadania urzędów, ich liczby, istoty i zakresu działania, przedmiot, o którym już i poprzednio była mowa17. Bez koniecznych urzędów nie może bowiem istnieć żadne państwo, a bez urzędów, które troszczą się o dobry porządek i stateczność, nie może być dobrego zarządu. Ponadto w małych państwach musi być mniej urzędów, w wielkich więcej, jak to już poprzednio powiedziano18. Nie powinno się więc pominąć zagadnienia, jakie urzędy wypadnie złączyć, a jakie utrzymać oddzielnie."},{"type":"paragraph","text":"2. Na pierwszym miejscu między niezbędnymi urzędami stoi nadzór nad targami. Musi do tego być jakaś władza, która ma za zadanie nadzór nad zawieranymi umowami i czuwanie nad porządkiem. We wszystkich niewątpliwie państwach istnieje bowiem konieczność kupowania i sprzedawania dla wzajemnego zaspokojenia niezbędnych potrzeb; jest to pierwszym środkiem samowystarczalno-"},{"type":"paragraph","text":"ści, dla jej osiągnięcia właśnie łączą się ludzie w jedność państwową."},{"type":"paragraph","text":"3. Inna władza nadzorcza łącząca się z tą i zbliżona do niej — to piecza nad miejskimi budynkami publicznymi i prywatnymi, mająca na celu utrzymanie porządku, odnowienie i naprawienie zagrożonych zniszczeniem budowli i dróg, czuwanie nad znakami granicznymi, aby zapobiec zatargom na tym tle i inne zadania podobne. Władzę tego rodzaju nazywają po największej części miejską policją porządkową (αστυνοµία), a obejmuje ona większą liczbę oddziałów, dla których w ludniejszych miastach ustanawia się osobnych urzędników, jako to: nadzorców murów miejskich, dozorców studzien, inspektorów portowych."},{"type":"paragraph","text":"17 Por. ks. IV, rozdz. 12."},{"type":"paragraph","text":"18 Por. tamże, § 5."},{"type":"paragraph","text":"157"},{"type":"paragraph","text":"4. Inna również konieczna władza jest do tej podobna; do zakresu jej należą bowiem te same sprawy, ale działa ona w kraju, poza miastem. Urzędników tych nazywają jedni nadzorcami pól, inni nadzorcami lasów."},{"type":"paragraph","text":"Takie to są te trzy władze nadzorcze, a dołącza się do nich dalsza, która przyjmuje wpłaty dochodów publicznych, przechowuje je i rozdziela między poszczególne zarządy. Urzędników tych nazywają poborcami i skarbnikami."},{"type":"paragraph","text":"Jest jeszcze dalszy urząd, w którym musi się zgłaszać na piśmie prywatne umowy i wyroki sądowe. Tamże trzeba wnosić skargi sądowe i wytaczać procesy."},{"type":"paragraph","text":"W niektórych miejscowościach i ta władza jest podzielona na więcej oddziałów, ale bywają wypadki, że jeden urząd zajmuje się wszystkimi tymi sprawami."},{"type":"paragraph","text":"Urzędnicy tacy mają tytuły notariuszy (ίεροµνήµονες), naczelników (έπιστάται), kancelistów (µνήµονες) i inne do tych zbliżone."},{"type":"paragraph","text":"5. Z kolei idzie władza, łącząca się wprawdzie z tamtą, ale ze wszystkich może najkonieczniejsza i najcięższa, która ma do czynienia z wykonaniem wyroków karnych, ściąganiem obwieszczonych publicznie grzywien i strażą nad uwięzionymi. Ciężki to urząd ze względu na nienawiść, jaką często ściąga na siebie, tak że w miejscowościach, gdzie nie przynosi wielkich zysków, albo go nikt nie chce piastować, albo jeśli się ktoś tego podejmie, nie chce go ściśle według prawa sprawować. A przecież jest on potrzebny, bo byłoby rzeczą zupełnie bezużyteczną rozstrzygać spory prawne, a nie wykonywać wyroków; jeśli więc współżycie ze sobą ludzi nie jest możliwe bez sądów, to byłoby ono również niemożliwe, gdyby wyroki nie były wykonywane."},{"type":"paragraph","text":"6. Toteż lepiej jest, jeżeli [do tego celu] służy nie jedna władza, ale każdy sąd ma osobny organ do rozporządzenia, a do takiego samego rozgraniczenia należy dążyć przy ściąganiu obwieszczonych publicznie grzywien. Pewne [egzekucje]"},{"type":"paragraph","text":"powinny by przeprowadzać nawet odmienne władze: przy [grzywnach] nałożonych ubiegłego roku powinny by działać raczej nowe władze, przy nałożonych przez pozostających przy władzy urzędników powinna by być władza ściągająca inna aniżeli zarządzająca; a więc np. grzywny nałożone przez policję targową winna ściągać policja miejska, a grzywny wyznaczone przez tę ostatnią znów inni"},{"type":"paragraph","text":"[urzędnicy]. Im mniej bowiem urząd ściągający jest znienawidzony, tym sprawniej dają się przeprowadzić egzekucje. Jeśli ci sami, którzy zasądzili, również i wyrok wykonują, to ściągają na siebie podwójną nienawiść, jeżeli zaś ci sami ludzie wszelkie wyroki wykonują, stają się nieprzyjaciółmi wszystkich."},{"type":"paragraph","text":"7. W wielu państwach władza wykonująca straż nad uwięzionymi jest połączonal9 z władzą ściągającą grzywny, tak np. w Atenach [kolegium] tzw."},{"type":"paragraph","text":"jedenastu. Dlatego lepiej jest i taką władzę podzielić i wynaleźć środki odpowiednie do tego. Bo choć ta władza jest nie mniej potrzebna od wspomnianej, to przecież 19 Tłumaczenie idzie za poprawką Immischa προσήρτηται zamiast przekazanego w rękopisach διήρηται, (jest oddzielona). Z toku myśli wynika jednak, że winno tu być „połączona”, bo inaczej nie wysuwałby Arystoteles w następnym zdaniu żądania podziału, Z Ustroju polit. Aten (rozdz. 52, § 1) wynika zresztą, że w Atenach istotnie kolegium jedenastu, oprócz straży nad więźniami, miało pewne agendy związane z roszczeniami skarbu wobec obywateli."},{"type":"paragraph","text":"158"},{"type":"paragraph","text":"tak bywa, że ludzie przyzwoici o ile możności wzbraniają się przed jej pias-towaniem, przewrotnym zaś ją powierzyć nie byłoby bezpiecznie, ponieważ ci raczej sami potrzebują tego, aby ich pilnowano, aniżeli by mogli innych pilnować."},{"type":"paragraph","text":"Dlatego nie powinno być jednej, [do pilnowania więźniów] ustanowionej władzy, ani też nie powinni by jej wykonywać ci sami ludzie stale, lecz zadanie to powinni obejmować na zmianę coraz to inni czy to spośród młodych ludzi tam, gdzie istnieje jakaś organizacja dorastających obywateli (efebów) albo dozorców 20, czy to spośród osób urzędowych."},{"type":"paragraph","text":"8. Te zatem władze jako najpotrzebniejsze trzeba umieścić na pierwszym miejscu, za nimi zaś idą inne, mniej potrzebne, ale w hierarchii wyżej postawione, ponieważ wymagają doświadczenia i wiele zaufania. Do nich należałyby władze czuwające nad bezpieczeństwem w mieście, jako też wszelkie władze powołane do pełnienia zadań związanych z potrzebami wojennymi. Zarówno w pokoju, jak wojnie potrzebni są przecież urzędnicy, którzy zajmują się strażą nad bramami i murami, przeprowadzają pobór, przydzielają obywateli do różnych oddziałów wojskowych."},{"type":"paragraph","text":"9. W niektórych państwach do pełnienia tych zadań powołuje się więcej urzędów, w innych mniej, w małych państwach np. jeden urząd tym wszystkim się zajmuje. Urzędnicy tacy nazywają się strategami i polemarchami. W państwach, gdzie są jeźdźcy lub lekkozbrojni, albo łucznicy, czy marynarka wojenna, ustanawia się czasem dla każdego z tych rodzajów broni osobne władze, które nazywają się nauarchiami, hipparchiami i taksjarchiami, podobnie jak poddane im stanowiska zwą się znów Hierarchiami, lochagiami i fylarchiami, i tak dalej również części tychże. Wszystko to stanowi jednak jeden dział kierownictwa spraw wojskowych."},{"type":"paragraph","text":"10. W ten sposób zatem przedstawia się ta władza. Ponieważ zaś niektóre urzędy, jeśli i nie wszystkie, rozporządzają wielkimi sumami państwowymi, potrzebna jest inna władza, która odbiera od nich i kontroluje rachunki, sama jednak żadnymi sumami nie rozporządza; urzędnicy ci noszą tytuł już to rewidentów (εύΟυνοι), już to rachmistrzów (λογισταί), już to kontrolerów (έξετασταί), już to pomocników (συνήγοροι)21."},{"type":"paragraph","text":"Do wszystkich tych urzędów dochodzi władza, która ma najbardziej ważki głos we wszystkich sprawach; do niej należy często ostateczna decyzja, jak i inicjatywa, albo też gdzie lud jest rozstrzygającym czynnikiem, przewodniczy ona na zgromadzeniu ludowym; musi przecież istnieć władza zwołująca, decydujący w państwie czynnik. Członkowie jej zwą się w niektórych państwach probulami, ponieważ odbywają obrady wcześniej, gdzie zaś jest demokracja, nazywają się raczej radą. Tyle zatem byłoby mniej więcej władz politycznych."},{"type":"paragraph","text":"20 Według Arystotelesa (Ustrój polit. Aten, rozdz. 42) w Atenach młodzieńcy po ukończeniu 18 lat życia (efebowie) zobowiązani byli, po przejściu jednorocznego przeszkolenia odbywać przez dwa lata służbę strażniczą w kraju; w innych państwach istniała odpowiednia organizacja dozorców."},{"type":"paragraph","text":"21 W Atenach (według Arystotelesa, Ustrój polit. Aten, rozdz. 54) losowano dziesięciu członków izby obrachunkowej, przed którymi wszyscy urzędnicy po złożeniu urzędowania musieli składać rachunek."},{"type":"paragraph","text":"159"},{"type":"paragraph","text":"11. Władzą innego rodzaju jest służba boża, jak kapłani i urzędnicy zajmujący się sprawami kultu, którzy opiekują się istniejącymi świątyniami oraz odnawiają podupadające i w ogóle troszczą się o wszystko, co jest z kultem bogów związane."},{"type":"paragraph","text":"Władza ta bywa w niektórych wypadkach jednoosobowa, tak np. w małych miastach, w niektórych zaś składa się z wielu osób, pełniących czynności odrębne od kapłańskich, jako to: pomocników przy ofiarach, dozorców świątyń i skarbników skarbu świątyni. Z władzą tą łączy się oddzielna władza, zajmująca się wszystkimi ofiarami państwowymi, których prawo nie przydziela kapłanom, które jednak są w wielkim poszanowaniu ze względu na to, że się je składa w imieniu państwa; urzędników tych zowią jedni archontami, drudzy królami, inni prytanami."},{"type":"paragraph","text":"12. Krótko rzecz ujmując, konieczne rządy obejmują zatem sprawy następujące: służbę bożą i wojskowość, dochody i wydatki, policję targową, miejską, portową i wiejską, dalej sądownictwo, rejestrację zawartych umów, ściąganie grzywien, więziennictwo, odbieranie rachunków i ich kontrolę, przyjmowanie sprawozdań urzędników i w końcu kierownictwo obrad nad sprawami publicznymi."},{"type":"paragraph","text":"13. Państwa, które cieszą się większym spokojem i dobrobytem, a przy tym dbają o obyczajność, mają ponadto osobne urzędy dla spraw takich jak nadzór nad kobietami, straż nad prawami, nadzór nad chłopcami, nadzór nad ćwiczeniami fizycznymi, ponadto opieka nad zawodami gimnastycznymi i dionizyjskimi oraz innymi ewentualnie widowiskami tego rodzaju. Z władz tych niektóre, jak nadzór nad kobietami i nadzór nad chłopcami, są oczywiście niedemokratyczne. Ubodzy bowiem z braku niewolników zmuszeni są używać do posług swoich żon i dzieci."},{"type":"paragraph","text":"Z trzech władz, które się wybiera w pewnych państwach dla wykonywania władzy naczelnej, tj. stróżów praw, probulów i rady, stróżowie praw są urządzeniem arystokratycznym, probulowie oligarchicznymi, a rada demokratycznym."},{"type":"paragraph","text":"Tak zatem omówiliśmy wszystkie mniej więcej urzędy w ogólnym zarysie."}],"audio_pl":["audio/ch06-part000.mp3","audio/ch06-part001.mp3","audio/ch06-part002.mp3","audio/ch06-part003.mp3","audio/ch06-part004.mp3"]},{"id":"księga-siódma","number":8,"title":"Księga siódma","blocks":[{"type":"paragraph","text":"1. Urządzenie najlepszego państwa."},{"type":"paragraph","text":"Celem jego jest zapewnia obywatelom życie szczęśliwe, a takim jest życie cnotliwe, wyposażone"},{"type":"paragraph","text":"w środki zewnętrzne umożliwiające dobre uczynki 1. Kto z należytą starannością chce się zająć zagadnieniem najlepszego ustroju, musi przede wszystkim określić, jakie życie najbardziej godne jest pożądania. Jeśli się tego nie ustali, to z konieczności nie da się jasno odpowiedzieć na pytanie, jaki ustrój jest najlepszy. Tak to bowiem bywa, że ci, którzy posiadają najlepszy w swoich warunkach ustrój, prowadzą zazwyczaj najszczęśliwszy tryb życia, jeśli tylko nie zajdzie coś nieprzewidzianego. Dlatego trzeba przede wszystkim osiągnąć 160"},{"type":"paragraph","text":"zgodę co do tego, jakie życie jest godne pożądania dla wszystkich w ogóle, a następnie co do tego, czy ono dla ogółu jest takie samo jak i dla jednostki, czy też jest odmienne."},{"type":"paragraph","text":"2. Ponieważ uważam, że w pismach popularnych mówiliśmy już dostatecznie obszernie, jaki jest najlepszy tryb życia, więc trzeba by obecnie zrobić z tego użytek. Istotnie bowiem, zgodnie z przeprowadzonym tam już podziałem, nikt chyba nie poda tego w wątpliwość, że skoro są trzy rodzaje dóbr, a mianowicie dobra zewnętrzne, dobra cielesne i dobra duchowe, to koniecznym warunkiem szczęścia jest łączne posiadanie ich wszystkich. Nikt przecież nie nazwie szczęśliwym człowieka, który nie posiada ani szczypty męstwa, umiarkowania, sprawiedliwości i rozumu, przeciwnie, boi się much przelatujących, pozwala sobie na najskrajniejsze wybryki, jeśli mu przyjdzie ochota na jedzenie i picie, za ćwierć grosza zdradza najlepszych przyjaciół i podobnie, o ile chodzi o rozum, okazuje się tak głupi i łatwy do oszukania, jak dziecko jakieś lub obłąkany."},{"type":"paragraph","text":"3. Jakkolwiek zdania te powszechne znajdują uznanie, to jednak zaznacza się różnica, gdy chodzi o ilość tych dóbr i [ustalenie], które większą wartość posiada."},{"type":"paragraph","text":"Jeśli bowiem chodzi o cnotę, to ludzie uważają, że wystarczy, gdy ją w jakiejkolwiek mierze posiadają, a natomiast bogactwo i pieniądze, potęgę, sławę i wszelkie rzeczy tego rodzaju w nieskończoność pragną pomnażać. Ale my powiemy takim ludziom, że z łatwością mogą się w tym względzie upewnić w drodze doświadczenia, stwierdzając naocznie, że cnoty nabywa się i zachowuje nie dzięki dobrom zewnętrznym, ale przeciwnie, te ostatnie dzięki pierwszym, jak również, że szczęśliwe życie, bez względu na to, czy ludzie widzą je w używaniu, czy w cnocie, czy też w jednym i drugim, spotyka się częściej u tych, których zdobią wybitne zalety serca i umysłu, a którzy miernie są wyposażeni w dobra zewnętrzne, aniżeli u tych, którzy tych ostatnich posiadają więcej, niźli potrzebują, a natomiast wykazują braki co do pierwszych."},{"type":"paragraph","text":"4. Ale nawet, jeśli się tę rzecz zgodnie z rozsądkiem rozważy, z łatwością się do tej samej prawdy dochodzi. Zewnętrzne dobra, będąc niejako narzędziem, mają bowiem swój kres, a wszystko, co służy jedynie do jakiegoś użytku, należy do rzeczy, których nadmiar z konieczności albo szkodzi posiadającym, albo żadnej nie przynosi korzyści. Natomiast wszelkie dobra duchowe, im więcej się wzmagają, tym więcej są pożyteczne, jeśli i tu mówić należy nie tylko o pięknie, ale i o użyteczności. W ogóle jasne jest, że jeśli zestawimy ze sobą dwie rzeczy w ich najlepszym stanie dla wykazania przewagi jednej nad drugą, to sąd wypadnie według wartości porównywanych rzeczy, którym te wysokie właściwości przypisujemy. Toteż jeśli dusza, tak sama w sobie jak i dla nas, cenniejsza jest od majątku i ciała, to z konieczności podobnie ma się rzecz również z najlepszym stanem każdej z tych rzeczy. Ponadto te dobra zewnętrzne są z natury pożądane ze względu na duszę, toteż [mając duszę na względzie] powinni wszyscy ludzie rozumni o nie zabiegać, a nie przeciwnie, [zatracać] duszę dla nich."},{"type":"paragraph","text":"5. Zgódźmy się zatem na to, że każdemu przypada w udziale tyle szczęścia, ile wykazuje cnoty i rozumu, tudzież odpowiednio do tych właściwości działa, a za 161"},{"type":"paragraph","text":"świadka tego weźmy Boga, który jest w pełni szczęśliwy, i to wcale nie dzięki dobrom zewnętrznym, ale sam przez się, dzięki właściwościom swojej natury."},{"type":"paragraph","text":"Właśnie dlatego musi być różnica między dobrym powodzeniem a uczuciem szczęścia. Bo dobra zewnętrzne w stosunku do duszy są dziełem przypadku i losu, ale sprawiedliwym ani też umiarkowanym nikt nie bywa przypadkiem ani też z łaski losu."},{"type":"paragraph","text":"Łączy się z tym na tych samych zasadach opierające się zdanie, że najlepszym państwem jest państwo szczęśliwe i takie, któremu się dobrze powodzi. Nikomu jednak nie może się dobrze powodzić, kto nie czyni dobrze. Nie ma zaś dobrego czynu ani u człowieka, ani w państwie bez cnoty i rozumu. Dzielność, sprawiedliwość i rozum mają w państwie to samo znaczenie i postać, w jakich muszą występować u każdego z ludzi, jeśli ten ma się nazywać rozumnym, sprawiedliwym i umiarkowanym."},{"type":"paragraph","text":"6. Niech jednak kilka tych uwag wystarczy jako wstęp do naszych wywodów, bo ani nie można nie poruszyć tych rzeczy, ani też rozwodzić się szczegółowo nad wszystkimi punktami, gdyż należy to do innego zadania; obecnie jednak stwierdzimy tylko, że najlepszym życiem zarówno dla każdego człowieka z osobna, jak i dla państwa jako wspólnoty jest życie cnotliwe, przy czym cnota o tyle jest wyposażona w środki zewnętrzne, że może się w dobrych uczynkach przejawiać. Zastrzeżenia przeciw temu pominę w obecnych wywodach, a jeśli komuś nie trafia może do przekonania, co powiedziałem, trzeba to będzie później rozważyć."},{"type":"paragraph","text":"2. Wojny i podboje nie są celem państwa, choć państwo musi być i na wojny przygotowane"},{"type":"paragraph","text":"1. Pozostaje nam odpowiedzieć na pytanie, czy szczęście każdego człowieka i szczęście państwa należy uznać za to samo, czy też nie. Nie może tu jednak być wątpliwości, bo wszyscy chyba zgodzą się na to, że to jest to samo. Ci bowiem, którzy szczęście jednostki opierają na bogactwie, mienią szczęśliwym również państwo całe, jeśli jest bogate, a ci, co cenią najwyżej życie [na stanowisku] tyrana, powiedzą zapewne, że najszczęśliwsze jest państwo, które ma najwięcej poddanych; jeśli zaś ktoś szanuje jednostkę ze względu na cnotę, ten powie również, że i państwo tym jest szczęśliwsze, im lepsze."},{"type":"paragraph","text":"2. Ale tu nasuwają się dwa zagadnienia, które wymagają, aby się nad nimi zastanowić; po pierwsze, jakie życie jest więcej pożądane, czy życie połączone z działalnością polityczną i udziałem w zarządzie państwa, czy też raczej życie jakby obcego, stojącego poza obrębem wspólnoty państwowej; a następnie, jaki ustrój i porządek państwowy należy uznać za najlepszy bez względu na to, czy udział w sprawach państwowych jest dla wszystkich pożądany czy też dla przeważającej większości z wyłączeniem niektórych. Ponieważ tylko to ostatnie zagadnienie, a nie to, co jednostka uważa dla siebie za pożądane, należy do politycznego badania i rozważania, które jest teraz naszym zadaniem, więc tamto 162"},{"type":"paragraph","text":"zagadnienie ma tu uboczne znaczenie, a to stanowi właściwy przedmiot obecnych rozważań."},{"type":"paragraph","text":"3. Nie ulega tedy wątpliwości, że najlepszym ustrojem jest z konieczności taki, w którego ramach każdy bez wyjątku najlepiej się czuje i szczęśliwie żyje; panuje jednak spór — nawet między tymi, którzy zgadzają się, że życie cnotliwe jest najbardziej pożądane — czy pożądane jest życie polityczne i czynne, czy też raczej życie odgrodzone od wszelkich spraw zewnętrznych, jakby rozmyślaniom po-"},{"type":"paragraph","text":"święcone, które niektórzy mienią [jedynie godnym] filozofa. Te dwa sposoby życia, jak się okazuje, najgorliwsi miłośnicy cnoty wybierali zarówno w przeszłości, jak i wybierają obecnie; te dwa kierunki, o których mówię, to życie męża stanu i filozofa."},{"type":"paragraph","text":"4. Niemałej wagi to rzecz, po której stronie leży tu prawda, bo rozumny człowiek z konieczności dąży do celu, który za lepszy zostanie uznany, a stosuje się to nie tylko do każdego człowieka, lecz i do państwa w ogóle. Otóż jedni sądzą, że władać bliźnimi despotycznie jest największą niesprawiedliwością, jeśli zaś czyni się to w ramach ustroju, to wprawdzie nie ma w tym nic niesprawiedliwego, ale władca nie ma zapewnionego spokoju. Skrajnie przeciwne do tego jest zdanie drugich: jedynie życie czynne i polityczne godne jest człowieka, bo dla każdej cnoty otwiera się szersze pole działania raczej wówczas, gdy się ktoś sprawom publicznym poświęca i czynny jest politycznie [niż gdy jest prywatnym człowiekiem]."},{"type":"paragraph","text":"5. Jedni więc takiego są zdania, inni natomiast utrzymują, że jedyną formą ustroju zapewniającą szczęście jest despotyzm i tyrania. U niektórych prawa i wychowanie zmierzają do tego, aby ujarzmić sąsiadów. Choć zatem w największej części państw znaczna większość praw ma, że tak powiem, bezładny charakter, to jednak, jeśli gdzieś prawa mają na oku jakiś jeden określony cel, to jest nim zawsze podbój. Tak np. w Lacedemonie i na Krecie wychowanie i przeważna część praw nastawiona jest właśnie na wojny. Także u wszystkich obcych narodów, które są na tyle silne, aby przemóc innych, sztuka ta wielkim cieszy się powodzeniem, tak np. u Scytów, Persów, Traków i Celtów."},{"type":"paragraph","text":"6. W niektórych państwach są nawet pewne prawa, które zachęcają do zdobywania tej cnoty. Tak np. opowiadają, że w Kartaginie przysługuje prawo noszenia ozdoby z tylu pierścieni, ile ktoś odbył wypraw wojennych. Również w Macedonii było niegdyś prawo, że ten, co nie zabił żadnego nieprzyjaciela, opasywał się uździenicą, a u Scytów była taka uroczystość, na której nie wolno było pić z obnoszonego pucharu nikomu, kto nie zabił nieprzyjaciela; u wojowniczego ludu Iberów zmarłemu tyle obelisków wokół grobu stawiają, ilu zabił"},{"type":"paragraph","text":"nieprzyjaciół. Także u innych ludów częstokroć zachowały się różne tego rodzaju postanowienia częścią w prawach, częścią w obyczajach."},{"type":"paragraph","text":"7. Może jednak tym, co chcą bliżej w rzecz wejrzeć, wyda się to osobliwe, jeśliby zadanie męża stanu miało polegać na tym, żeby potrafił narzucić współobywatelom swoją władzę despotyczną bez względu na to, czy pragną tego czy nie. Bo jakżeż z rolą męża stanu czy prawodawcy godziłoby się to, co nawet 163"},{"type":"paragraph","text":"nie jest zgodne z prawem? A nie jest zgodne z prawem, jeśli się włada nie tylko niezupełnie sprawiedliwie, ale nawet wręcz niesprawiedliwie, a gwałt zadawać można i wbrew prawu."},{"type":"paragraph","text":"8. Przecież w innych umiejętnościach nic takiego nie spotykamy. Ani lekarz, ani sternik nie bierze sobie za zadanie czy to przekonywać, czy siłą zmuszać swoich pacjentów lub pasażerów, natomiast wielu ludzi zdaje się uważać despotyzm za mądrość polityczną i nie wstydzi się stosować do innych postępowania, którego w odniesieniu do siebie wszyscy zarówno nie uznają ani za sprawiedliwe, ani za korzystne. Bo gdy o nich samych idzie, domagają się rządów sprawiedliwych, a kiedy to innych dotyka, wcale się o sprawiedliwość nie troszczą."},{"type":"paragraph","text":"9. Byłoby też rzeczą osobliwą, gdyby ludzie nie byli z natury przeznaczeni do roli panów czy niewolników, a jeśli tak jest, to nie należy dążyć do nieograniczonego władania nad wszystkimi, lecz tylko nad tymi, którzy się na niewolników urodzili, tak jak i dla urządzenia uczty lub ofiary nie urządza się polowania na ludzi, lecz na zwierzęta odpowiednie do polowania, tzn. na dzikie zwierzęta nadające się do spożycia."},{"type":"paragraph","text":"Zapewne mogłoby być szczęśliwe i jedno odosobnione państwo, które posiada bezsprzecznie dobry ustrój; przyjmujemy mianowicie, że może istnieć państwo izolowane posiadające dobre prawa, którego urządzenia ustrojowe nie są obliczone na wojnę ani na panowanie nad nieprzyjaciółmi, bo do czegoś takiego nie powinno być żadnej podstawy."},{"type":"paragraph","text":"10. Okazuje się zatem, że wszelkie na wojnę obliczone urządzenia należy wprawdzie uznać za dobre, jednak nie stanowią one bezwzględnie ostatecznego celu państwa, a tylko są środkiem do niego. Zadaniem dzielnego prawodawcy jest raczej baczyć, w jaki sposób państwo i tworzący je rodzaj ludzi oraz wszelka inna społeczność będzie mogła sobie życie dobrze urządzić i osiągnąć możliwe dla siebie szczęście. Oczywiście, w wydawanych postanowieniach prawnych będą pewne różnice, a jeśli są jacyś sąsiedzi, to będzie zadaniem sztuki prawodawczej zastanowić się, jakie zarządzenia przeciw komu należy przygotować i jak zastosować odpowiednie środki przeciw każdemu z nich. Jednakowoż zagadnienie celu, jaki winien sobie wytknąć najlepszy ustrój, później znajdzie odpowiednie omówienie l."},{"type":"paragraph","text":"3. Życie cnotliwe wymaga aktywności — bo „szczęście leży w działaniu” —"},{"type":"paragraph","text":"a ta może być skierowana zarówno ku celom politycznym, jak i ku rozmyślaniu"},{"type":"paragraph","text":"1. Z kolei musimy odpowiedzieć tym, którzy przyznają wprawdzie, że życie cnotliwe jest najdoskonalsze, jednak różnego są zdania co do jego urządzenia."},{"type":"paragraph","text":"Jedni mianowicie odrzekają się od godności państwowych i sądzą, że życie wolnego człowieka różni się od życia męża stanu i jest [bezwzględnie] najdos-1 Por. niżej, rozdz. 13 niniejszej księgi."},{"type":"paragraph","text":"164"},{"type":"paragraph","text":"konalsze ze wszystkich, inni natomiast to ostatnie właśnie uważają za najlepsze."},{"type":"paragraph","text":"Kto bowiem nic nie robi, nie może mieć powodzenia w swojej działalności, a przecież powodzenie w działaniu i szczęście to to samo. Jedni i drudzy pod pewnym względem mają słuszność, pod innym jednak nie. I tak słusznie twierdzą niektórzy, że życie wolnego człowieka jest lepsze aniżeli despoty, bo tak jest naprawdę. Nic w tym przecież nie ma chlubnego, że się niewolnika traktuje jak niewolnika, bo rozkaz dotyczący rzeczy niezbędnych do życia nie wykazuje żadnych znamion piękna."},{"type":"paragraph","text":"2. Natomiast mniemanie, że każde panowanie jest despotyzmem, nie jest słuszne, bo różnica między panowaniem nad wolnymi a panowaniem nad niewolnikami nie jest mniejsza aniżeli różnica między ludźmi wolnymi z natury a niewolnikami z natury. W początkowych wywodach wyczerpująco o tym mówiliśmy2. Nie jest również słuszne, jeżeli się życie bezczynne wyżej ceni aniżeli czynne, bo szczęście leży w działaniu, a nadto czyny sprawiedliwych i rozumnych ludzi dają plon w postaci wielu pięknych dzieł."},{"type":"paragraph","text":"3. Przy takim ujęciu rzeczy mógłby ktoś może przypuścić, że najlepiej jest być panem nad wszystkimi, w ten sposób bowiem można by być również panem bardzo wielu i bardzo pięknych czynów. Toteż kto potrafi dzierżyć władzę, nie powinien by przekazywać jej sąsiadowi, ale raczej mu ją wydzierać, przy czym ani ojciec nie powinien by się liczyć z dziećmi, ani dzieci z ojcem, ani w ogóle żaden przyjaciel z przyjacielem, ani na takie rzeczy nikt by zważać nie powinien. Bo najlepsze jest najbardziej godne pożądania, a dobrze czynić jest właśnie najlepszą rzeczą."},{"type":"paragraph","text":"4. Kto tak mówi, może i ma słuszność, jeśli dla tych, co grabież i przemoc uprawiają, jest istotnie osiągalne najwięcej pożądane dobro życia. Ale to jest chyba niemożliwe, a założenie takie jest błędne. Nie może bowiem dokonywać pięknych czynów ten, kto nie góruje nad innymi w tym stopniu, co mąż nad żoną lub ojciec nad dziećmi, albo pan nad niewolnikami. Toteż kto od wykroczenia zaczyna, ten nie potrafi później tyle naprawić, ile już złego zrobił odstępując od cnoty. Bo ci, co są sobie równi, mają udział w pięknie i sprawiedliwości. Na tym polega równość i podobieństwo; jest to bowiem przeciwne naturze, jeśli się nie przyznaje równych praw równym, a podobnych podobnym, nic zaś nie jest piękne, co jest naturze przeciwne. Dlatego, jeśli się znajdzie ktoś górujący nad najlepszymi cnotą i uzdolnieniem do działania, to piękną jest rzeczą iść za takim człowiekiem i sprawiedliwą być mu posłusznym. Winien on jednak posiadać nie tylko cnotę, ale i moc, która by mu umożliwiła rozwinięcie działalności."},{"type":"paragraph","text":"5. Jeśli to zdanie jest słuszne, a szczęście to owocna działalność, w takim razie czynne życie jest najlepsze zarówno dla każdego państwa jako wspólnoty, jak i dla każdej jednostki. Nie jest jednak rzeczą, konieczną, aby człowiek czynny zajmował"},{"type":"paragraph","text":"się drugimi, jak sądzą niektórzy, i nie te tylko myśli są twórcze, które są skierowane na osiągnięcie korzyści z działania wynikających, ale o wiele bardziej 2 Por. ks. I, rozdz. 2, § 21."},{"type":"paragraph","text":"165"},{"type":"paragraph","text":"twórcze są te rozważania i rozmyślania, które same dla siebie są celem i dla siebie samych zostały podjęte. Bo celem życia jest owocna działalność, a więc pewna aktywność, a za najbardziej aktywnych uważamy nie wykonawców działań zewnętrznych, lecz tych, którzy je myślą kształtują."},{"type":"paragraph","text":"6. Wszelako również i państwa, które się zamykają w kręgu spraw własnych i wzięły sobie za zasadę taki tryb życia, niekoniecznie muszą pozostawać bezczynne."},{"type":"paragraph","text":"Może się tu mianowicie rozwijać wewnętrzna działalność w stosunkach między częściami składowymi, istnieje bowiem wielka ilość wzajemnych związków, w które wchodzą różne składniki państwa. Dotyczy to także każdej jednostki z osobna."},{"type":"paragraph","text":"Inaczej źle byłoby z Bogiem i całym wszechświatem, gdy oprócz właściwych swej naturze czynności nie ujawniają wychodzącego na zewnątrz działania."},{"type":"paragraph","text":"Okazuje się tedy, że takie samo życie musi być najlepsze zarówno dla każdego człowieka z osobna, jak i dla państw czy jakiejkolwiek wspólnoty ludzi."},{"type":"paragraph","text":"4. Liczba ludności w najlepszym państwie"},{"type":"paragraph","text":"1. Wywody powyższe wysunęliśmy na czoło jako wstęp. Że zaś o innych ustrojach poprzednio już była mowa, więc zaczynamy omawianie pozostałych zagadnień od wyjaśnienia, jakie wymogi należy stawiać w stosunku do państwa, które ma być urządzone wedle życzenia. Bez odpowiednich bowiem środków zewnętrznych nie można urzeczywistnić najlepszego ustroju. Dlatego musimy zgłaszając życzenia wysunąć wiele postulatów, żaden z nich jednak nie może być niemożliwy do urzeczywistnienia. Jeden z nich np. dotyczy liczby obywateli i wielkości kraju."},{"type":"paragraph","text":"2. Jak bowiem inni rzemieślnicy, np. tkacz lub budowniczy okrętów, powinni rozporządzać odpowiednim materiałem do pracy — bo im lepszej będzie on jakości, tym piękniejsze musi być z konieczności także dzieło ich sztuki — tak i mąż stanu oraz prawodawca musi mieć do rozporządzenia właściwy materiał"},{"type":"paragraph","text":"odpowiedniej jakości. Do uposażenia państwa należy przede wszystkim masa ludności [, przy czym nasuwa się pytanie], jak wielka ma być jej liczba i jakie cechy winna z natury posiadać; to samo dotyczy i kraju [, co łączy się z zagadnieniem], jak wielki być powinien i jakiego rodzaju."},{"type":"paragraph","text":"3. Otóż ludzie sądzą po największej części, że państwo szczęśliwe powinno by być wielkie. Jeśli nawet to zdanie jest prawdziwe, to pozostaje niejasność, jakie państwo jest wielkie, a jakie małe. Oceniają bowiem wielkość państwa według wielkiej liczby mieszkańców, a tymczasem powinno by się raczej patrzeć nie na ich liczbę, lecz tężyznę. Także i państwo ma pewne zadania do spełnienia, toteż to państwo należy uważać za największe, które najlepiej potrafi je spełniać; tak jak np. Hipokratesa3 nie jako człowieka, lecz jako lekarza mógłby ktoś nazwać większym od tego, kto się wielkością ciała wyróżnia."},{"type":"paragraph","text":"3 Sławny lekarz grecki, żyjący w drugiej połowie V i pierwszej połowie IV w. p.n.e., pod którego imieniem zachował się szereg pism z dziedziny medycyny."},{"type":"paragraph","text":"166"},{"type":"paragraph","text":"4. Gdyby jednak trzeba było nawet oceniać wielkość państwa według liczby obywateli, to nie powinno się tego robić, biorąc pod uwagę wszelkiego rodzaju ludność — z konieczności bowiem znajduje się może po miastach wielka liczba i niewolników, i metojków, i obcych — lecz tych tylko, którzy stanowią część państwa i z których składa się ono jako ze swych istotnych członków. Wybitnie duża ich liczba jest cechą wielkiego państwa, natomiast nie może być wielkim państwo, które posiada wielką liczbę najemnych pracowników, a tylko niewielu hoplitów, bo państwo wielkie i państwo ludne to nie to samo."},{"type":"paragraph","text":"5. Co więcej, doświadczenie jasno wykazuje, że jest trudną rzeczą, a może i niemożliwą, żeby państwo nazbyt ludne mogło mieć dobre urządzenia prawne."},{"type":"paragraph","text":"Widzimy przynajmniej, że żadne z państw uchodzących za dobrze urządzone nie jest obojętne na wzrost masy ludowej. Wskazuje na to jasno i w sposób przekonywający także rozumowanie. Prawo mianowicie jest ustaleniem pewnego porządku, dobre prawa zatem muszą być równoznaczne z dobrym porządkiem, a tymczasem nadmiernie wielka liczba nie może się pomieścić w ramach pewnego porządku, gdyż to wymagałoby boskiej mocy, która cały ten wszechświat utrzymuje."},{"type":"paragraph","text":"6. Skoro piękno zwykło się przejawiać w mnogości i wielkości, więc i państwo musi być najpiękniejsze wówczas, gdy przy wielkości zachowuje wspomnianą granicę. Przecież i państwo ma miarę wielkości, podobnie jak wszystkie inne rzeczy, zwierzęta, rośliny i narzędzia. Żadne z nich bowiem, jeśli będzie nadmiernie małe czy przesadnie wielkie, nie zachowa właściwego sobie charakteru, lecz albo zostanie całkowicie pozbawione swej natury, albo też niezupełnie będzie jej odpowiadać, podobnie jak statek długości jednej piędzi w ogóle statkiem nie będzie, a tak samo wówczas, gdy miara jego wyniesie dwa stadia; w pierwszym wypadku bowiem nie będzie mógł sprawnie żeglować z powodu małości, w drugim zaś z powodu nadmiernej wielkości."},{"type":"paragraph","text":"7. Podobnie jest z państwem: jeśli ma za mało mieszkańców, nie jest samowystarczalne, a przecież powinno być takim; jeśli zaś ma ich zbyt wiele, jest wprawdzie samowystarczalne w zakresie rzeczy koniecznych jako naród, ale nie jako państwo, gdyż ustrój państwowy niełatwo wówczas może istnieć; któż bowiem będzie wodzem nadmiernie wielkiej masy albo kto heroldem bez głosu Stentora4."},{"type":"paragraph","text":"Dlatego państwo powstaje z konieczności dopiero wówczas, gdy osiągnie taką liczbę ludności, jaka jest dostatecznie duża, by samodzielnie w państwowej wspólnocie życie szczęśliwe prowadzić. Może też istnieć większe państwo, górujące nad poprzednim liczbą ludności, jednak, jak powiedzieliśmy, liczba ta nie może się bez ograniczenia pomnażać. Jaka zaś jest dopuszczalna granica, z łatwością można stwierdzić, rozważywszy zadania [państwa]. Funkcje jego podzielone są 4 Stentor był jednym z wojowników greckich pod Troją (por. Iliada V 783). Odznaczał się tak potężnym głosem, że siła jego równała się głosowi pięćdziesięciu innych. Głos Stentorowy, jak widać z tego miejsca, w czasach Arystotelesa był już przysłowiowym."},{"type":"paragraph","text":"167"},{"type":"paragraph","text":"między rządzących i rządzonych, przy czym pierwszym przypada wydawanie zarządzeń i rozstrzyganie. Aby jednak rozstrzygać zagadnienia prawne i rozdzielać urzędy wedle zasługi, muszą obywatele znać się wzajemnie, jaki kto jest, bo gdzie to nie ma miejsca, tam z konieczności źle jest i z urzędami, i sądami. Nierozważne działanie w jednym i w drugim kierunku obraża sprawiedliwość, co aż nazbyt wyraźnie występuje przy wielkim zaludnieniu."},{"type":"paragraph","text":"8. Ponadto obcym i metojkom łatwiej w takim razie przychodzi wcisnąć się w szeregi obywateli, bo skutkiem nadmiaru ludności nietrudno jest przemknąć się niepostrzeżenie."},{"type":"paragraph","text":"Jasną tedy jest rzeczą, że najlepszą miarą ograniczającą wielkość państwa jest następująca: liczba ludności winna być, o ile możności, największa, ale tak dobrana, by umożliwiała samowystarczalność życia i równocześnie pozwalała na łatwe dokonanie przeglądu stosunków."},{"type":"paragraph","text":"W ten sposób niech będzie omówiona wielkość państwa."},{"type":"paragraph","text":"5. Państwa obszar, położenie, połączenie z morzem 1. Podobnie ma się rzecz z obszarem. Co się tyczy jego jakości, to oczywiście każdy pochwali kraj, który jest samowystarczalny, a musi nim być taki, który wszystko wytwarza, bo samowystarczalność polega na tym, aby mieć wszystko, a nie odczuwać braku niczego. Co do rozległości i wielkości, obszar winien tak się przedstawiać, aby mógł zapewnić mieszkańcom życie wygodne, swobodne, a zarazem umiarkowane. Czyśmy te cechy rozgraniczające trafnie ujęli, czy nie, nad tym później dokładniej trzeba się będzie zastanowić5, kiedy przyjdzie pomówić o posiadłości w ogóle i o zasobności majątkowej, tudzież wyjaśnić, jak się winien przedstawiać stosunek majątku do spożycia. W tym względzie panuje bowiem wielka rozbieżność zdań, ponieważ ludzie w swym sposobie życia wykazują skłonność do przesady w jednym i drugim kierunku, jedni do sknerstwa, drudzy do rozrzutności."},{"type":"paragraph","text":"2. Omówienie ukształtowania kraju nie nastręcza trudności i w niejednym trzeba tu posłuchać ludzi doświadczonych w strategii, według których kraj winien być trudno dostępny dla nieprzyjaciół, a swoim swobodne umożliwiać wyjście."},{"type":"paragraph","text":"Jeżeli nadto powiedziałem, że masa mieszkańców ma być taka, żeby można ją łatwo objąć przeglądem, to postulat ten dotyczy również i kraju; w odniesieniu do kraju łatwość przeglądu oznacza jednak, że łatwo mu przyjść z pomocą."},{"type":"paragraph","text":"Jeżeli miasto ma mieć zapewnione położenie, jakiego by sobie życzyć należało, to musi ono być dobrze położone zarówno w stosunku do lądu, jak i do morza."},{"type":"paragraph","text":"Chodzi tu o jeden podany już wzgląd: miasto dla celów wzajemnej pomocy musi mieć ścisłą łączność ze wszystkimi miejscowościami kraju. Dalszy wzgląd dotyczy wygodnego przewozu zbieranych plonów, jak również drzewa z lasu i w ogóle 3 Do zagadnień tych autor już nie wrócił."},{"type":"paragraph","text":"168"},{"type":"paragraph","text":"łatwego transportu wszelkich wyrobów z wytwórni, jakie tylko kraj ewentualnie posiada."},{"type":"paragraph","text":"3. Gdy chodzi o połączenie z morzem, to często omawia się zagadnienie, czy dla państw dobrze urządzonych jest ono pożyteczne, czy szkodliwe. Powiadają bowiem, że napływ obcych, wychowanych pod innymi prawami, szkodliwy jest dla istniejącego porządku prawnego, tak samo jak i nadmierne wzmożenie liczby ludności. To ostatnie bywa mianowicie następstwem faktu, że drogą morską posługuje się wielu kupców wyjeżdżając w świat czy też nią z zewnątrz przybywa, co dla dobrych rządów stwarza jednak trudności."},{"type":"paragraph","text":"4. Jeśli te ujemne zjawiska nie zachodzą, to nie ulega żadnej wątpliwości, że połączenie miasta i kraju z morzem przedstawia zalety zarówno ze względu na bezpieczeństwo, jak i na łatwe zaopatrzenie w rzeczy potrzebne. Bo ci, co potrzebują pomocy, aby łatwiej odeprzeć nieprzyjaciół, muszą posiadać możność otrzymania z łatwością pomocy na jednej i drugiej drodze, a więc i na lądzie, i na morzu; jeśli zaś o to chodzi, by zadać straty napastnikom, a nie można tego zrobić na obu drogach, to przecież tym, którzy mają oba połączenia, łatwiej to przyjdzie na tej lub tamtej drodze. Ważne jest też położenie nadmorskie, gdy chodzi o takie potrzeby, jak sprowadzanie produktów, których się właśnie nie ma u siebie, a wywożenie nadmiaru tych plonów, które się w kraju udają. Państwo bowiem winno uprawiać handel dla siebie, a nie dla innych."},{"type":"paragraph","text":"5. Ci zaś, którzy otwierają u siebie targi dla wszystkich, czynią to dla podniesienia dochodów; jeśli jednak państwo nie musi brać udziału w pogoni za zyskiem, to nie powinno by też posiadać takiego miejsca obrotów handlowych."},{"type":"paragraph","text":"Widzimy to i obecnie, że wiele krajów i miast posiada miejsca postoju okrętów i porty, które są tak korzystnie dla miasta położone, że ani do właściwego miasta nie należą, ani też nie są zbytnio od niego oddalone, przeciwnie, dzięki murom i innym tego rodzaju obwarowaniom włączone są w jego sferę władania; widoczne jest tedy, że owe korzyści, które daje ewentualnie połączenie lądu i morza, miasto ma zapewnione dzięki prawom, które podają i określają, komu nie wolno, a komu wolno wchodzić w stosunki wzajemne."},{"type":"paragraph","text":"6. Co się tyczy sił morskich, to nie ulega wątpliwości, że posiadanie ich w pewnej ilości jest wysoce pożyteczne. Bo państwo powinno nie tylko u własnych obywateli, ale także i u niektórych ze swych sąsiadów budzić postrach, a zarazem posiadać możność niesienia pomocy zarówno na lądzie, jak i na morzu. Przy ustalaniu liczebności i rozmiarów tych sił należy wziąć pod uwagę interesy życiowe państwa. Jeśli bowiem będzie ono zajmować przewodnie stanowisko i wkraczać w wielką politykę, to musi też posiadać i taką siłę [morską], odpowiednią do zadań."},{"type":"paragraph","text":"7. Nie jest to jednak rzeczą konieczną, by ta wielka liczba ludzi, która stanowi masę marynarzy, należała do państwa, bo oni wcale nie powinni stanowić jego części składowej. Żołnierze marynarki są wolnymi obywatelami dobranymi z piechoty, oni też są panami na okrętach i wydają rozkazy marynarzom, ale gdzie istnieje liczna warstwa periojków i pracujących na roli, zawsze jest też pod 169"},{"type":"paragraph","text":"dostatkiem marynarzy. Obserwujemy i dzisiaj taki stan rzeczy w niektórych państwach, tak np. w Heraklei6, której obywatele znajdują potrzebną załogę dla wielu trójwiosłowców, choć miasto ich w porównaniu z innymi jest skromnej wielkości."},{"type":"paragraph","text":"W ten sposób zatem skończylibyśmy wywody o kraju, o portach, o miastach, o morzu i sile morskiej."},{"type":"paragraph","text":"6. Jakie cechy charakteru powinni z natury wykazywać obywatele najlepszego państwa"},{"type":"paragraph","text":"1. O liczbie ludności państwa, a mianowicie, jakie by dla niej należało przyjąć granice, była już mowa poprzednio. Z kolei pomówimy więc o tym, jakie właściwości charakteru powinni by z natury wykazywać [obywatele]."},{"type":"paragraph","text":"Pewien pogląd w tym względzie można sobie wyrobić, jeśli się rzuci okiem na najsławniejsze miasta greckie i cały świat zamieszkany, jak jest między ludy podzielony. Ludy bowiem mieszkające w zimnych krajach i w Europie są wprawdzie pełne ducha wojennego, ale wykazują pewien brak bystrości i zdolności do sztuk, dlatego też utrzymują łatwiej swą wolność; nie umieją jednak tworzyć organizacji państwowych i nie potrafią panować nad sąsiadami. Przeciwnie, ludy azjatyckie są wprawdzie bystre i posiadają zdolności twórcze, ale brak im odwagi, toteż żyją stale w zależności i niewoli. Natomiast naród grecki, jak co do położenia w środku się znajduje, tak i dodatnie cechy jednych i drugich posiada, bo jest i odważny, i twórczy. Dlatego trwale utrzymuje swą wolność i ma najlepsze urządzenia państwowe, a byłby w stanie panować nad wszystkimi narodami, gdyby się w jedno państwo zespolił."},{"type":"paragraph","text":"2. Takie same różnice wykazują też szczepy greckie; niektóre z nich są bowiem z natury jednostronnie uzdolnione, inne znów łączą szczęśliwie jedne i drugie zdolności. Okazuje się zatem, że ci, których by prawodawca miał prowadzić do cnoty bez trudu, muszą z przyrodzenia wykazywać i dzielność, i bystrość umysłową."},{"type":"paragraph","text":"Jeśli bowiem niektórzy powiadają7, że strażnicy powinni być ujmujący dla znajomych, a szorstcy dla nieznajomych, to trzeba zauważyć, iż właśnie dzielne serce oddziałuje w sposób ujmujący, bo ono jest siłą duszy, dzięki której kochamy."},{"type":"paragraph","text":"3. Dowodem tego jest fakt, że oburza się serce więcej na zaufanych i przyjaciół"},{"type":"paragraph","text":"aniżeli na nieznajomych. Stąd i Archiloch, skarżąc się na przyjaciół, w ten sposób trafnie do serca swojego przemawia:"},{"type":"paragraph","text":"toż przyjaciele są twej udręki przyczyną."},{"type":"paragraph","text":"Tej władzy duszy zawdzięczają też wszyscy ludzie to, co ich do władzy przysposabia i o ich wolności stanowi, bo dzielność ma władcze skłonności i nie zna poddaństwa."},{"type":"paragraph","text":"Nie jest to natomiast pięknie, jeśli się mówi, by do nieznajomych szorstko się 6 Mowa o Heraklei nad Pontem, która panowała nad poddaną ludnością miejscową z plemienia Mariandynów, pociąganą, jak wynika z tego miejsca, również do służby na okrętach jako wioślarze."},{"type":"paragraph","text":"7 Platon, Państwo 375 C."},{"type":"paragraph","text":"170"},{"type":"paragraph","text":"odnosić. Tak bowiem wobec nikogo nie należy się zachowywać: toteż ludzie wielkoduszni z natury nie są szorstcy, chyba w stosunku do tych, od których krzywdy zaznali. Ale są oni w swych uczuciach tym więcej dotknięci, jak już poprzednio zauważyłem, jeśli chodzi o zaufanych, którzy im w ich przekonaniu krzywdę wyrządzili."},{"type":"paragraph","text":"4. I to jest zupełnie zrozumiałe, widzą bowiem, że właśnie ci, którzy w ich mniemaniu powinni by im oddawać przysługi, nie tylko ich nie świadczą, ale w dodatku i szkodę czynią. Stąd też powiada się:"},{"type":"paragraph","text":"ciężkie są walki między braćmi8"},{"type":"paragraph","text":"tudzież:"},{"type":"paragraph","text":"ci, co się nadmiernie kochali, nadmiernie też się nienawidzą9."},{"type":"paragraph","text":"Tyle zatem uwag ogólnych o obywatelach państwa, o tym, ilu ich być powinno, jaki winni posiadać przyrodzony charakter, jak wielki kraj i jakiego rodzaju; mówię „uwag ogólnych”, bo nie trzeba wymagać przy czysto teoretycznych wywodach tej samej dokładności, co przy omawianiu spostrzeżeń."},{"type":"paragraph","text":"7. Konieczne człony najlepszego państwa i ich zadania 1. Skoro przy pewnych tworach z natury złożonych części całości złożonej nie są tym samym co rzeczy, bez których całość istnieć by nie mogła, to oczywiście nie należy i tego wszystkiego, co państwo koniecznie mieć musi, uważać za część składową państwa; dotyczy to każdej zbiorowej całości, która co do gatunku ma stanowić pewną jedność. Członkowie wspólnoty muszą mieć jakąś jedną rzecz wspólną, i to tę samą dla wszystkich, niezależnie od tego, czy w niej w równym lub nierównym stopniu uczestniczą, czy to będzie np. pożywienie, czy pewien obszar ziemi, czy coś takiego innego."},{"type":"paragraph","text":"2. Jeśli jednak z dwóch rzeczy jedna jest środkiem do celu, a druga samym celem, to nie ma między nimi nic wspólnego jak tylko to, że jedna stwarza to, co druga przyjmuje. Mam tu na myśli np. stosunek, jaki zachodzi między wszelkim narzędziem i jego twórcą a tworzonym dziełem, bo między domem a jego budowniczym nie ma nic, co by mogło być wspólne, i tylko sztuka budowniczych jest środkiem służącym do celu, jakim jest dom. Dlatego też i państwa potrzebują posiadłości, ale posiadłość nie jest bynajmniej częścią państwa, nawet wówczas, gdy wiele jej części duszę posiada10. Państwo zaś jest pewną wspólnotą równych, mającą na celu możliwie doskonałe życie."},{"type":"paragraph","text":"3. Ponieważ zaś najwyższym dobrem jest szczęście, a to polega na czynnym stosowaniu i pełnym rozwoju cnoty, i ponieważ tak to już jest, że jedni posiadają 8 Fragment z niezachowanej sztuki Eurypidesa (frg. 975, Nauck)."},{"type":"paragraph","text":"9 Urywek z nieznanego autora (frg. 78, Nauck)."},{"type":"paragraph","text":"10 Autor ma na myśli niewolników."},{"type":"paragraph","text":"171"},{"type":"paragraph","text":"uzdolnienie do niej, a drudzy wcale nie lub tylko w nieznacznej mierze, więc oczywistą jest rzeczą, że wskutek tego wytwarzają się różne rodzaje państw,"},{"type":"paragraph","text":"[wyłaniają się] różnice i powstaje większa ilość ustrojów. Wszyscy bowiem, którzy dążą do tego celu [, jakim jest szczęście i cnota], w rozmaity sposób postępują i rozmaite środki stosują, toteż rozmaicie się u nich i życie, i ustrój państwowy kształtuje. Rozważmy, ile jest składników, bez których państwo nie mogłoby istnieć, bo między nimi muszą się z konieczności znaleźć i te, które nazywamy jego częściami składowymi."},{"type":"paragraph","text":"4. Ustalić trzeba zatem liczbę zadań, stojących przed państwem, bo to rzecz wyjaśni. A więc pierwszą potrzebą jest żywność, następnie umiejętności techniczne (bo wiele narzędzi potrzeba do życia), po trzecie broń (bo członkowie wspólnoty powinni mieć broń zarówno dla utrzymania swej władzy wewnątrz, na wypadek nieposłuszeństwa, jak i ze względu na próby napaści z zewnątrz); dalej, pewne zasoby pieniężne tak dla pokrycia potrzeb wewnętrznych, jak i wydatków wojennych, po piąte — co bardzo ważne — służba boża, którą się zwie kultem, i po szóste — rzecz nade wszystko potrzebna — organy do orzekania o tym, co dla ogółu pożyteczne, i do rozstrzygania spraw spornych między obywatelami."},{"type":"paragraph","text":"5. Wszystko to są rzeczy, których — można powiedzieć — każdemu państwu potrzeba. Bo państwo to nie przypadkowa zbieranina ludzi, ale wspólnota zdolna do samowystarczalności — jak to się mówi — życia, jeśli zaś przypadkiem brak któregoś z tych składników, to wspólnota taka po prostu nie może być samowystarczalna. Do swego istnienia państwo potrzebuje zatem koniecznie współdziałania wszystkich tych członów, czyli musi posiadać rzeszę rolników, którzy zaopatrzą je w żywność, i rzemieślników, i siłę zbrojną, zasobnych obywateli, kapłanów i ludzi orzekających, co sprawiedliwe i pożyteczne."},{"type":"paragraph","text":"8. Naczelne zadania państwa"},{"type":"paragraph","text":"(obrona, zarząd, wymiar sprawiedliwości, służba boża) i kto do ich pełnienia jest powołany"},{"type":"paragraph","text":"1. Po rozgraniczeniu tych zadań pozostaje jeszcze rozważyć, czy wszyscy obywatele powinni by brać uddział w ich pełnieniu (bo możliwą jest rzeczą, że ci sami ludzie byliby wszyscy i rolnikami, i rzemieślnikami, i członkami rady, i sędziami), czy też do pełnienia każdego zadania inni ludzie winni być pociągani, czy [w końcu] jedne [z wielu konieczności] winny być przez wszystkich spełniane, a inne tylko przez pewnych ludzi. Nie w każdym ustroju tak samo się to przedstawia, bo, jak powiedziałem, bywa i tak, że wszyscy we wszystkich zajęciach uczestniczą, ale też i tak, że nie wszyscy we wszystkich, a tylko niektórzy w niektórych. To właśnie stanowi o odrębności ustroju, bo w demokracjach wszyscy obywatele uczestniczą we wszystkich zajęciach, w oligarchiach zaś przeciwnie."},{"type":"paragraph","text":"2. Wracamy jednak do rozważań o najlepszym ustroju. Otóż najlepszym ustrojem jest ten, który zapewnia państwu najwięcej szczęścia, szczęście zaś —jak 172"},{"type":"paragraph","text":"już poprzednio powiedziano11 — istnieć nie może bez cnoty. Wynika z tego, że w państwie posiadającym najlepszy ustrój i mężów sprawiedliwych bezwzględnie, a nie z pewnego tylko punktu widzenia, obywatele nie mogą prowadzić życia prostego robotnika ani handlowca, bo życie takie nie jest szlachetne i nie pozwala na rozwijanie cnoty; nie mogą też być rolnikami ci, którzy mają być mężami stanu, bo do uprawiania cnoty i rozwijania działalności politycznej potrzeba wolnego czasu."},{"type":"paragraph","text":"3. Skoro i siła zbrojna, i obrady nad tym, co pożyteczne, i wymiar sprawiedliwości należą do zadań państwa oraz okazują się jego istotnymi częściami składowymi, to [z kolei nasuwa się pytanie,] czy powinno się te zadania odłączyć jedne od drugich, czy też je tym samym ludziom powierzyć? Otóż jasną jest rzeczą, że w pewnych okolicznościach będą to ci sami ludzie, a w innych różni."},{"type":"paragraph","text":"Różni mianowicie będą, jeśli każda z tych funkcji wymaga innego stopnia dojrzałości, a poza tym w jednym wypadku wchodzi w grę rozum, w drugim siła."},{"type":"paragraph","text":"Ci sami zaś w sytuacji, gdy niemożliwą jest rzeczą, aby ludzie, którzy mogą żyć i stawić opór, trwale znajdowali się w zależności. Bo obywatele, którzy mają broń w ręku, rozstrzygają też o utrzymaniu czy o obaleniu ustroju."},{"type":"paragraph","text":"4. Nie pozostaje zatem nic innego, jak powierzyć te funkcje państwowe tym samym ludziom, a tylko — wobec tego, że z natury rzeczy młodych cechuje siła, starych zaś rozum — pożyteczną i słuszną wydaje się rzeczą, by te zadania między jednych i drugich rozdzielić, bo przy takim podziale każdy otrzymuje to, co mu się słusznie należy."},{"type":"paragraph","text":"5. Także i własność ziemska powinna być w ich rękach. Obywatele bowiem powinni być zamożni, oni właśnie są obywatelami. Pospolici rzemieślnicy nie zaliczają się właściwie do obywateli, tak samo jak i jakakolwiek inna klasa ludzi, która nie zaprawia się w cnocie. Wynika to z naszych założeń, że szczęście życia występuje tylko w łączności z cnotą, a szczęśliwym nie można nazwać żadnego państwa biorąc
