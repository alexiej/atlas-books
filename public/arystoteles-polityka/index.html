 widzenia oligarchią, bo w jednej i drugiej niewielu tylko rządzi, a choć ograniczenie do niewielu ma w obu wypadkach różne podłoże, to jednak w pospolitym mniemaniu także i arystokracja uchodzi z podanego powodu za oligarchię.) Musi zaś dojść do takiego przewrotu szczególnie wówczas, gdy się znajdzie pewna znaczniejsza ilość ludzi mających przekonanie, że nie ustępują co do cnoty rządzącym. Tak było w Lacedemonie z tak zwanymi Parteniami59, pochodzącymi przecież z równych"},{"type":"paragraph","text":"[im obywateli], których ujęto na sprzysiężeniu i wyprawiono do Tarentu jako osadników."},{"type":"paragraph","text":"2. Dochodzi też do przewrotu, gdy pewni ludzie wybitni doznają zniewag ze strony takich, którym bynajmniej nie ustępują w cnocie, a którzy wyższe jednak piastują godności, tak np. Lizander ze strony królów60, albo też gdy jakiś dzielny człowiek nie znajduje dostępu do godności, jak np. Kinadon61, który za Agesilaosa uknuł spisek przeciw Spartiatom, albo znów, gdy jedni są nadmiernie biedni, a drudzy zbyt bogaci, zjawisko, które zwłaszcza w czasie wojen występuje. Tak 59 Partemowie, którzy według podania wyemigrowali ze Sparty i założyli w południowej Italii miasto Tarent, mieli być synami dziewcząt spartańskich (παρθένος), zrodzonymi ze związku ich z odesłanymi z terenu wojny w Mesenii młodzieńcami. Ponieważ po zakończeniu wojny urodzeni z tych nielegalnych związków czuli się upośledzeni, próbowali zamachu stanu, a gdy ten przedwcześnie został wykryty, opuścili Spartę i osiedli w Tarencie (por. Strabon, Geographica VI, 3). Nieco inną wersję podawał Antiochos z Syrakuz — mieli to być synowie Spartan, którzy w wyprawie nie wzięli udziału i zepchnięci zostali do klasy helotów."},{"type":"paragraph","text":"60 Por. wyżej, rozdz. 1, § 5."},{"type":"paragraph","text":"61 Kinadon, zepchnięty z warstwy pełnouprawmonych Spartiatów (tzw. homoioi) do warstwy upośledzonych (hypomeiones) z powodu utraty majątku, uknuł spisek celem obalenia istniejącego ustroju. Zanim zdołał jednak swe plany przeprowadzić, został skutkiem zdrady ujęty i stracony (398 r."},{"type":"paragraph","text":"p.n.e.). Por. Ksenofont, Hellemka III 3, 4-11."},{"type":"paragraph","text":"125"},{"type":"paragraph","text":"było też w Lacedemonie w okresie wojny meseńskiej, jak się to okazuje z utworu Tyrtajosa62 pt. Eunomia; z powodu wojny mianowicie znaleźli się niektórzy w biedzie i domagali się nowego podziału ziemi. [Są też warunki do przewrotu,]"},{"type":"paragraph","text":"jeśli się znajdzie jakiś człowiek potężny, zdolny do wzniesienia się jeszcze wyżej aż do jedynowładztwa, jak Pauzaniasz w Lacedemonie, który dowodził w wojnie z Persami, i Hanno w Kartaginie63."},{"type":"paragraph","text":"3. Głównie jednak zarówno politeja, jak arystokracja ulegają rozkładowi skutkiem naruszenia w samym ustroju zasady sprawiedliwości. Źródło zła leży w tym mianowicie, że w politei demokracja i oligarchia, w arystokracji oba te czynniki i cnota, ale głównie te dwa pierwsze, nie są odpowiednio zmieszane. Dwa te czynniki, tj., (jak powiadam), ludowy i oligarchiczny, usiłują połączyć zarówno politeja, jak i przeważna część tak zwanych arystokracji."},{"type":"paragraph","text":"4. Właśnie na tym punkcie różnią się arystokracje od tzw. politei i od rodzaju tego złączenia zależy też dłuższe lub krótsze trwanie arystokracji. Bo jeśli się skłaniają raczej ku oligarchii, zwą się arystokracjami, jeśli zaś ku demokracji, politejami. Stąd także te ostatnie wykazują więcej trwałości niż inne ustroje."},{"type":"paragraph","text":"Większość bowiem jest w nich silniejsza, a poczucie równości praw daje więcej zadowolenia, podczas gdy bogaci, jeśli im ustrój zapewni przewagę, popadają w butę i zachłanność."},{"type":"paragraph","text":"5. W ogóle jeden i drugi ustrój przechodzi w tę formę, ku której się skłania, ponieważ i tu, i tam silniejszy drugi obóz dąży do wzmożenia swej siły, a więc politeja przechodzi w demokrację, a arystokracja w oligarchię; albo też dzieje się wręcz przeciwnie, np. arystokracja przechodzi w demokrację, bo krzywdzeni wymuszają przejście do przeciwnej formy ustrojowej, a politeja w oligarchię."},{"type":"paragraph","text":"Trwałość wykazuje tylko ten ustrój, który zapewnia równość praw wedle zasługi i przyznaje każdemu posiadanie własności."},{"type":"paragraph","text":"6. To, o czym tu mowa, zdarzyło się w Turiach. Ponieważ dostęp do urzędów był tu uzależniony od zbyt wysokiego cenzusu majątkowego, wprowadzono niższy cenzus i pomnożono urzędy, a że możnowładcy wbrew prawu skupili w swych rękach całą własność ziemską, bo ustrój zbyt oligarchiczny umożliwiał im gromadzenie zysków 64, lud, który w wojnie zdobył wyszkolenie, pokonał najemną załogę i nie spoczął, aż ci, którzy zbyt wiele ziemi posiadali, dobrowolnie ją oddali."},{"type":"paragraph","text":"7. Ponieważ nadto wszystkie ustroje arystokratyczne mają charakter oligarchiczny, więc możni dążą do nadmiernego gromadzenia posiadłości, tak np."},{"type":"paragraph","text":"i w Lacedemonie majątki przechodzą w posiadanie niewielu; mają też możni większą swobodę czynienia, co zechcą, i wydawania córek za mąż, za kogo chcą."},{"type":"paragraph","text":"62 Poeta spartański z czasów II wojny meseńskiej (VII w, p.n.e.); z jego poematu Eunomia (Praworządność) zachowały się drobne urywki."},{"type":"paragraph","text":"63 Według relacji Justyna (XXI 4) możny Kartagińczyk Hanno planował ok. 346 r. p.n.e. zamach stanu w Kartaginie, opierając się na niewolnikach, spisek jego został jednak wykryty i Hanno wraz z rodziną życiem przypłacił swe ambitne plany, w okrutny sposób stracony."},{"type":"paragraph","text":"64 W tekście prawdopodobnie luka."},{"type":"paragraph","text":"126"},{"type":"paragraph","text":"Z tego powodu upadło też państwo Lokryjczyków, ponieważ obywatelka ich wyszła za Dionizjosa65, do czego nie doszłoby przy ustroju demokratycznym ani też przy dobrze zmieszanym ustroju arystokratycznym. Niepostrzeżnie ulegają zmianie arystokracje przede wszystkim przez powolny rozkład, jak to już poprzednio zaznaczyłem w ogólnych rozważaniach na temat wszystkich ustrojów, podnosząc, że nawet nieznaczna przyczyna powoduje przewroty."},{"type":"paragraph","text":"Jeśli się bowiem dopuści do naruszenia jakiejś części ustroju, to potem już łatwiej przychodzi podważyć część inną, nieco ważniejszą, aż zburzy się cały porządek."},{"type":"paragraph","text":"8. Taki właśnie los spotkał ustrój w Turiach. Istniało tu mianowicie prawo, że wodzem można zostać ponownie po upływie lat pięciu. Tymczasem pewni młodzi ludzie, którzy zdobyli sobie sławę wojenną i popularność u mas najemników, zlekceważyli stojących u steru rządu i licząc na łatwe powodzenie zabiegów, usiłowali najpierw znieść ten przepis, tak aby ci sami mogli nieprzerwanie godność wodza piastować. Przewidywali przy tym, że lud ich chętnie wybierze. Urzędnicy, do których tego rodzaju sprawy należały, tzw. doradcy (σύµβουλοι), próbowali zrazu stawić opór, ustąpili jednak w przekonaniu, że tamci po usunięciu tego prawa resztę ustroju zostawią nietkniętą. Kiedy jednak usiłowali później nie dopuścić do dalszego naruszania praw, na nic się to już nie zdało, lecz cały porządek ustrojowy przekształcił się w samowolne panowanie tych, co te nowości wprowadzili."},{"type":"paragraph","text":"9. Wszystkie ustroje jednakże ulegają rozkładowi albo same z siebie, albo pod naciskiem z zewnątrz, gdy państwo o przeciwnym ustroju albo się znajduje w pobliżu, albo też wielki wpływ wywiera, chociaż i dalej leży. Tak właśnie było z Ateńczykami i Lacedemończykarni; Ateńczycy usuwali wszędzie oligarchie, a Lacedemończycy demokracje."},{"type":"paragraph","text":"Tak więc omówiliśmy mniej więcej przyczyny zmian ustrojowych i przewrotów."},{"type":"paragraph","text":"7. Warunki trwałości ustrojów w ogóle i w szczególności 1. Z kolei trzeba by pomówić o utrzymywaniu się ustrojów, i to zarówno w ogóle, jak i każdego z osobna."},{"type":"paragraph","text":"Przede wszystkim tedy jasną jest rzeczą, że jeśli znamy przyczyny, które wywołują upadek ustrojów, to znamy też i środki, pomagające do ich utrzymania."},{"type":"paragraph","text":"Bo przeciwieństwo wywołuje zawsze przeciwny skutek, a upadek jest przeciwień-"},{"type":"paragraph","text":"stwem trwania."},{"type":"paragraph","text":"A więc w dobrze mieszanych ustrojach, jeśli na coś trzeba uważać, to na to, aby się nic przeciw prawom nie działo, przede wszystkim zaś należy mieć się na baczności przed drobnymi nawet przekroczeniami."},{"type":"paragraph","text":"65 Druga żona tyrana syrakuzańskiego Dionizjosa I, Doris, pochodziła z miasta Lokry w południowej Italii. Kiedy syn jej Dionizjos II został wypędzony z Syrakuz (356 r. p.n.e.), uszedł do Lokrów i starał"},{"type":"paragraph","text":"się tam ugruntować swe panowanie."},{"type":"paragraph","text":"127"},{"type":"paragraph","text":"2. Naruszenie prawa podkopuje bowiem niepostrzeżenie państwo, podobnie jak niewielkie wydatki, często się jednak powtarzające, rujnują majątki. Suma wydatków uchodzi bowiem uwagi przez to, że się ich naraz nie robi, a rozum daje się w ten sposób w błąd wprowadzić, tak jak to jest przy tym sofistycznym rozumowaniu: jeśli każda cześć składowa jest mała, to i całość jest mała."},{"type":"paragraph","text":"Z pewnego punktu widzenia jest tak istotnie, ale z innego jest to fałsz, bo całość i suma nie jest mała, a tylko składa się z małych części. Należy więc, po pierwsze, mieć się na baczności przed takim początkiem, a następnie nie ufać służącym do tumanienia tłumu wymysłom, które się okazują zwodnicze wobec faktów (co zaś w odniesieniu do ustrojów nazywamy zwodniczymi wymysłami, o tym poprzednio już była mowa)66."},{"type":"paragraph","text":"3. Należy ponadto zwrócić uwagę na to, że zarówno niektóre arystokracje, jak i oligarchie utrzymują się długo nie dlatego, żeby te ustroje były trwałe, ale dlatego, że przedstawiciele władzy umieją się odpowiednio obchodzić zarówno z odsuniętymi od rządów, jak i z pełnouprawnionymi. Pierwszych mianowicie nie krzywdzą, a tych, którzy przewodnią wśród nich rolę odgrywają, wprowadzają do grona rządzących, baczą, by nie urazić czci ambitnych, a pospólstwu nie uszczuplić zysków, w stosunku zaś do swych kolegów i do klasy rządzącej stosują zasadę równości demokratycznej. Bo zasada równości, której demokraci domagają się dla pospólstwa, jest i między równouprawnionymi nie tylko sprawiedliwa, ale i pożyteczna."},{"type":"paragraph","text":"4. Dlatego jeśli więcej ludzi bierze udział w rządach, to wiele urządzeń demokratycznych okazuje się tu pożytecznymi, jak np. to, że okres urzędowania trwa sześć miesięcy, aby wszyscy równouprawnieni mogli dojść do godności. Bo równouprawnieni są w takim razie jakby ludem, stąd często i demagogowie między nimi się zjawiają, jak to już poprzednio zaznaczono67. Zmniejsza się też w ten sposób i niebezpieczeństwo przekształcenia arystokracji i oligarchii w panowanie dynastów. Bo temu, co tylko krótki czas urząd piastuje, nie przychodzi tak łatwo dopuszczać się niegodziwości, jak temu, który na urzędzie długi czas zasiada, a właśnie długi okres urzędowania bywa w oligarchiach i demokracjach podstawą do wytworzenia się tyranii. W jednej i drugiej bowiem dążą do tyranii albo najmożniejsi (tu demagogowie, tam dynaści), albo też ludzie piastujący najwyższe godności, gdy okres urzędowania jest długi."},{"type":"paragraph","text":"5. Zachowaniu ustrojów sprzyja nie tylko ta okoliczność, że czynniki rozkładu są dalekie, ale niekiedy również i fakt, że są one bliskie, bo wówczas obawa przed nimi zmusza do tym pilniejszego czuwania nad istniejącym ustrojem. Toteż ci, którym leży na sercu utrzymanie ustroju, powinni stwarzać nastrój obawy, aby się obywatele mieli na baczności i nie zaniedbywali czuwania nad ustrojem, niczym nocna straż bezpieczeństwa, co więcej, nawet dalekie niebezpieczeństwo powinni by im przedstawiać jako bliskie."},{"type":"paragraph","text":"66 Por. ks. IV, rozdz. 10, § 6 nn."},{"type":"paragraph","text":"67 Por. wyżej, rozdz. 5, § 4."},{"type":"paragraph","text":"128"},{"type":"paragraph","text":"Ponadto należy dążyć do tego, aby zapobiec za pomocą środków prawnych kłótniom i walkom możnych, i mieć baczenie na tych, co stoją poza tymi waśniami, zanim i oni nie zostaną w ich odmęt wciągnięci. Bo poznać zło w pierwszych jego przejawach nie jest rzeczą pierwszego lepszego; na to trzeba prawdziwego męża stanu."},{"type":"paragraph","text":"6. Aby zapobiec przemianom zachodzącym w oligarchiach i politejach wskutek cenzusu majątkowego — co może się zdarzyć, gdy stawki cenzusu pozostają bez zmiany, podczas gdy wzmaga się ilość pieniądza — korzystną bywa rzeczą porównanie wysokości nowego cenzusu z poprzednim. W państwach, w których cenzus określany jest corocznie, można to robić każdego roku, w większych zaś co trzy lub pięć lat. Jeśli suma szacowanych majątków okaże się kilkakrotnie większą czy też i mniejszą aniżeli wówczas, kiedy ustanowiono ustrojową wysokość cenzusu, to winno być prawo nakazujące podwyższenie lub obniżenie cenzusu, a mianowicie, jeśli wzrosło bogactwo, należy go podwyższyć w stosunku do wzrostu, jeśli się zaś zmniejszyło, to trzeba zejść niżej i wprowadzić skromniejszy cenzus."},{"type":"paragraph","text":"7. Jeśli się bowiem tego drugiego nie zrobi, to może się zdarzyć, że politeja przejdzie w oligarchię, a oligarchia w rządy dynastów, natomiast w razie zaniedbania podwyżki politeja może się przekształcić w demokrację, a oligarchia w politeję albo i demokrację. Zarówno w demokracji i oligarchii, jak i w każdym innym ustroju należy się trzymać ogólnej zasady, aby nikomu nie pozwolić na nadmierne wyniesienie, przeciwnie, należy czynić starania w tym kierunku, aby raczej nadawać godności nieznaczne a długotrwałe, aniżeli w krótkim czasie wysokie, psuje to bowiem ludzi, a nie każdy człowiek umie znosić szczęście. Jeżeli zaś nie, to przynajmniej nie powinno się nadawać wszystkich godności naraz, ani też naraz ich odejmować, lecz tylko z wolna."},{"type":"paragraph","text":"8. Przede wszystkim jednak należy dążyć do stworzenia za pomocą praw takiego porządku, aby nikt nadmiernie nie wzrastał w potęgę, opierając się czy to na zwolennikach, czy to na majątku, a jeśli się to nie uda, należy ludzi takich z kraju wydalić."},{"type":"paragraph","text":"Ponieważ jednak również prywatny tryb życia obywateli staje się powodem do wprowadzenia nowości, powinno się ustanowić jakąś władzę, mającą za zadanie nadzorować tych, których sposób życia niezgodny jest z ustrojem, a więc w demokracji przeciwny jest duchowi demokratycznemu, w oligarchii zaś kłóci się z zasadami oligarchicznymi, i podobnie w każdym innym ustroju."},{"type":"paragraph","text":"Z tych samych powodów trzeba też czuwać nad tą warstwą obywateli, którym się dobrze powodzi. Środek zapobiegający szkodom na tym tu polega, że się czynności i urzędy rozdziela zawsze między przeciwne sobie klasy, a więc między znakomitych obywateli i pospólstwo, między ubogich i bogatych. Winno się też dążyć do tego, aby albo zespolić warstwę ubogich z warstwą bogatych, albo też wzmóc stan średni, bo to kładzie kres walkom wynikającym z nierówności."},{"type":"paragraph","text":"9. Najważniejszą rzeczą jest jednak w każdym ustroju, by taki zaprowadzić porządek za pomocą praw i innych zarządzeń, żeby przedstawiciele władz ze 129"},{"type":"paragraph","text":"swego stanowiska zysków ciągnąć nie mogli. Zwłaszcza w oligarchiach trzeba na to baczną zwrócić uwagę. Masy bowiem, odsunięte od rządów, nie buntują się tak przeciw temu, przeciwnie, chętnie nawet widzą, jeśli ktoś pozwala im spokojnie krzątać się koło swoich interesów; jeśli jednak nabiorą przekonania, że władze dopuszczają się kradzieży dobra publicznego, wówczas drażni ich jedno i drugie: i odsunięcie od godności, i odsunięcie od zysków."},{"type":"paragraph","text":"10. Jedynie też wówczas tylko może mieć ustrój równocześnie demokratyczny i arystokratyczny charakter, jeśli się zdoła takie urządzenie zaprowadzić. W takim razie bowiem jedni i drudzy, a więc i możni, i lud mogą mieć to, czego pragną."},{"type":"paragraph","text":"Bo to, że dla wszystkich otwarty jest dostęp do rządów, jest cechą demokratyczną, to zaś, że w rzeczywistości możni piastują urzędy, cechą arystokratyczną. Tak będzie jednak wówczas tylko, gdy nie ma możności ciągnięcia zysków z urzędu, gdyż ubodzy nie zechcą zabiegać o urzędy nie widząc w tym korzyści, a zajmą się raczej własnymi interesami, zamożni zaś będą mogli obejmować urzędy ze względu na to, że żadnego zysku kosztem dobra publicznego nie potrzebują."},{"type":"paragraph","text":"W rezultacie ubodzy dojdą do majątku dzięki temu, że bez przeszkód mogą się swym zajęciom poświęcać, a możni nie będą znosić rządów pierwszego lepszego."},{"type":"paragraph","text":"11. Aby się więc zabezpieczyć przed kradzieżą mienia państwowego, należałoby przeprowadzić przekazywanie kasy w obecności wszystkich obywateli, a odpisy rachunków składać w związkach rodowych [fratriach], oddziałach wojskowych i obwodach administracyjnych [fylach]; dla wsławionych zaś bezinteresownością przy piastowaniu urzędów powinny istnieć prawem określone nagrody."},{"type":"paragraph","text":"W demokracjach należałoby oszczędzać bogatych i nie dzielić nie tylko ich majątków, ale i dochodów, co w niektórych ustrojach dzieje się niepostrzeżenie; a lepiej jest, nawet jeśli sami tego chcą, nie pozwolić im na podejmowanie kosztownych a nieużytecznych świadczeń na rzecz państwa, jak wystawianie chórów, urządzanie wyścigów z pochodniami itp."},{"type":"paragraph","text":"12. W oligarchii znów powinno by się ubogich otoczyć troskliwą opieką i przydzielać im urzędy połączone z dochodami, a krzywdy, jakie by im ktoś z bogatych wyrządził, winny się spotkać z surowszą karą niż krzywdy ze strony równych im stanem. Spadków nie powinno by się przekazywać dowolnie w darze, ale winny zostać w rodzinie, i ten sam człowiek nie powinien dziedziczyć więcej niż jeden spadek. W ten sposób bowiem można by dojść do wyrównania majątków i więcej ubogich mogłoby dojść do bogactwa."},{"type":"paragraph","text":"13. Zarówno w demokracjach, jak i w oligarchiach korzystne jest, by obywatelom, w mniejszym stopniu uczestniczącym w rządach, otworzyć równy albo i większy dostęp do innych godności, w demokracjach bogatym, w oligarchiach ubogim. Wyjątek przy tym w danym ustroju stanowić będą naczelne urzędy, bo te powinno się oddawać, jedynie lub przeważnie, pełnouprawnionym obywatelom."},{"type":"paragraph","text":"14. Ci, którzy mają piastować najwyższe urzędy, powinni posiadać trzy właściwości: najpierw miłość do istniejącego ustroju, następnie jak największe uzdolnienie do zajęć związanych z urzędem, po trzecie, cnotę i sprawiedliwość 130"},{"type":"paragraph","text":"dostosowaną w każdym ustroju do tegoż. Bo jeśli nie we wszystkich ustrojach to samo jest sprawiedliwe, to z konieczności i w sprawiedliwości bywają różnice."},{"type":"paragraph","text":"Wyłania się jednak wątpliwość, jak należy przeprowadzić wybór, gdy się tak zdarzy, że ten sam człowiek wszystkich tych właściwości nie posiada, a więc np."},{"type":"paragraph","text":"jeśli ktoś będzie dobrym wodzem, ale przewrotnym człowiekiem i wcale nie będzie przyjacielem istniejącego ustroju, drugi znów tylko sprawiedliwym człowiekiem i zwolennikiem ustroju. Jakże w takim razie winno się przeprowadzić wybór?"},{"type":"paragraph","text":"15. Trzeba tu — jak się zdaje — na dwie rzeczy zwracać uwagę: jaka właściwość częściej u ogółu ludzi występuje, a jaka rzadziej. Dlatego przy wyborze wodza więcej należy uważać na jego znajomość rzeczy aniżeli na wartość moralną (bo znajomość sztuki wojennej rzadsza jest niż prawość), natomiast gdy chodzi o nadzór nad prawami i prowadzenie skarbu, przeciwnie (bo tu więcej cnoty potrzeba, aniżeli ją wykazuje największa część ludzi, podczas gdy znajomość rzeczy wszyscy zarówno mogą sobie przyswoić)."},{"type":"paragraph","text":"Mógłby ktoś jednak zapytać, na co potrzeba cnoty, jeśli się posiada odpowiednie uzdolnienie i miłość do istniejącego ustroju; przecież obie te właściwości same dla siebie starczą do spełnienia zadań potrzebnych. A jednak możliwą jest rzeczą, że ludzie wykazujący obie te właściwości nie posiadają umiejętności panowania nad sobą; toteż jak pewni ludzie, mimo cechującej ich znajomości rzeczy i dbałości o siebie, nie umieją chodzić koło swych interesów, tak samo nic nie przeszkadza temu, by pewni ludzie zachowywali się tak również i wobec dobra społecznego."},{"type":"paragraph","text":"16. Ogółem biorąc wszystko, co w dziedzinie praw podajemy jako zbawienne dla ustrojów, ma znaczenie również dla ich zachowania. Tutaj należy też często wspominana naczelna zasada — czuwać, aby liczba tych, co chcą utrzymania ustroju, była większa aniżeli liczba tych, którzy go nie chcą. Przede wszystkim jednak nie należy tracić z oczu, jak się to dziś dzieje w zwyrodniałych ustrojach, drogi pośredniej. Wiele bowiem z urządzeń, uchodzących za demokratyczne, powoduje rozkład demokracji, podobnie jak wiele, na pozór oligarchicznych, gubi oligarchię."},{"type":"paragraph","text":"17. Są jednak ludzie, którzy wykazują skłonność do przesady, uważając to za jedyną cnotę, a nie zdając sobie sprawy, że to jest tak jak z nosem, który choć wykazuje odchylenie od najpiękniejszej prostej linii ku kształtowi orlemu lub zadartemu, bywa mimo to jeszcze piękny i powabny dla oka. Gdyby jednak jakiś artysta chciał to odchylenie posunąć jeszcze dalej, aż do przesady, to najpierw zatraci właściwą proporcję tej części ciała, a w końcu dojdzie do tego, że nie będzie już ona na nos wyglądała — skutkiem przesady w jednym lub niedociąg-nięciu w drugim kierunku. Tak samo ma się rzecz i z innymi częściami ciała, nie inaczej bywa też w innych dziedzinach, a także i w kwestii ustroju."},{"type":"paragraph","text":"18. I oligarchia bowiem, i demokracja mogą się przedstawiać zadowalająco, chociaż odbiegają od najlepszego ustroju; jeśli jednak ktoś powiększy jeszcze owo odchylenie jednej czy drugiej, to najpierw pogorszy tylko ustrój, a w końcu odbierze mu w ogóle charakter ustroju. Dlatego prawodawca i mąż stanu powinni 131"},{"type":"paragraph","text":"wiedzieć dokładnie, jakie urządzenia demokratyczne podtrzymują, a jakie podkopują demokrację; to samo dotyczy wpływu takich czy innych urządzeń oligarchicznych na podtrzymanie czy podkopanie oligarchii. Ani pierwsza, ani druga nie może istnieć i utrzymać się bez bogatych i bez masy ludowej, lecz jeśli nastąpi wyrównanie majątku, to z konieczności w inny przechodzi się ustrój; toteż ci, którzy nieumiarkowanymi prawami dążą do zniszczenia jednej z tych klas, niszczą również istniejący ustrój."},{"type":"paragraph","text":"19. Wspomniany błąd popełniają zarówno w demokracjach, jak i w oligarchiach; a mianowicie w demokracjach, w których masy ludowe samowolnie stanowią o prawach, popełniają go demagogowie, którzy walcząc z bogatymi ustawicznie rozszczepiają państwo na dwie części. Właśnie przeciwnie, powinni by stwarzać wrażenie, że przemawiają za sprawą bogatych. Podobnie w oligarchiach rzecznicy rządu oligarchicznego winni udawać, że walczą o prawa ludu; przysięga składana przez oligarchów powinna by też brzmieć przeciwnie aniżeli obecna. Teraz bowiem w niektórych oligarchiach przysięgają: „do ludu wrogo się będę odnosić i ku szkodzie jego doradzać, co zdołam”, a tymczasem powinni by przyjąć przeciwną zasadę i wedle niej postępować, zaznaczając w przysiędze: „ludowi krzywdy czynić nie będę”."},{"type":"paragraph","text":"20. Najważniejszą jednak rzeczą dla zapewnienia trwałości ustrojów, ważniejszą od wszystkiego, o czym była dotąd mowa, choć dziś wszędzie zaniedbaną, jest przystosowane do ustroju wychowanie. Na nic bowiem zdadzą się najzbawienniejsze prawa, wynikające ze zgodnej uchwały wszystkich obywateli, jeśli ludzie do nich nie przywykną i nie zostaną w duchu ustroju wychowani; a więc jeśli prawa są demokratyczne — w duchu demokratycznym, jeśli oligarchiczne — w duchu oligarchicznym. Gdzie jednostki hołdują swawoli, tam cechuje ona i życie państwowe."},{"type":"paragraph","text":"21. Wychowanie w duchu ustroju nie polega na tym, żeby robić to, co mile jest widziane u oligarchów i zwolenników demokracji, lecz to, co przysposabia do podtrzymania rządów oligarchicznych czy też demokratycznych. Dzisiaj jednak w oligarchiach synowie możnowładców prowadzą rozpustny tryb życia, podczas gdy synowie ubogich przechodzą szkołę trudów i znojów, tak że wzmaga się zarówno ich chęć, jak i zdolność do wprowadzania nowości."},{"type":"paragraph","text":"22. Natomiast w państwach demokratycznych, które w pierwszym rzędzie za takie uchodzą, występuje zjawisko przeciwne ich interesowi, a przyczyną jego jest fałszywe zrozumienie pojęcia wolności. Dwie są mianowicie cechy, zdające się znamionować demokrację: panowanie większości i wolność. Otóż sprawiedliwość miałaby być równoznaczna z równością, a równość polegać na tym, że wola ludu bezwzględnie rozstrzyga; wolność zaś68 miałaby się wyrażać w tym, że każdy robi, co mu się podoba. Toteż w takich demokracjach żyje każdy, jak chce i „wedle swego upodobania” — jak mówi Eurypides. A przecież jest to zupełnie błędne."},{"type":"paragraph","text":"68 Za wydaniem Immischa, który przyjmuje tu koniekturę Spengla, opuszczam słowa και ίσον"},{"type":"paragraph","text":"(i równość)."},{"type":"paragraph","text":"132"},{"type":"paragraph","text":"Nie należy bowiem uważać tego za niewolę, lecz za wyzwolenie z niewoli, jeśli się żyje wedle ustroju."},{"type":"paragraph","text":"Tyle zatem, ogółem biorąc, byłoby do powiedzenia o przyczynach przemian i rozkładu ustrojów, jako też o środkach zapewniających ich zachowanie i trwanie."},{"type":"paragraph","text":"8. Obalenie monarchii"},{"type":"paragraph","text":"1. Pozostaje jeszcze pomówić o przyczynach upadku monarchii i okolicznoś-"},{"type":"paragraph","text":"ciach sprzyjających jej utrzymaniu. Losy monarchii i tyranii są mniej więcej podobne do tego, co powiedzieliśmy o politejach. Królestwo bowiem odpowiada arystokracji, a tyrania stanowi połączenie najskrajniejszej oligarchii i demokracji; ponieważ składają się na nią dwa zła, wykazuje zwyrodnienia oraz błędy obu tych ustrojów. Dlatego jest też i ona najszkodliwsza dla poddanych."},{"type":"paragraph","text":"2. Już powstanie obu tych rodzajów jedynowładztwa jest krańcowo odmienne."},{"type":"paragraph","text":"Królestwo bowiem wynikło z potrzeby ochrony znacznych obywateli przed ludem; króla powołuje się spośród znamienitych obywateli ze względu na wybitne zalety charakteru albo wybitne czyny ich wyrazem będące, czy też ze względu na to, że go wyróżnia pochodzenie ze znakomitego rodu. Tyrana natomiast bierze się z ludu i pospólstwa przeciwko możnym, aby lud na żadną krzywdę z ich strony nie był"},{"type":"paragraph","text":"narażony."},{"type":"paragraph","text":"3. Okazuje się to z wydarzeń historycznych. Bo bezwzględnie chyba przewa-"},{"type":"paragraph","text":"żająca część tyranów, można powiedzieć, wyszła z demagogów, którzy zdobyli sobie zaufanie dzięki temu, że oczerniali możnych. Tak przynajmniej było z pewnymi tyraniami, które powstały w czasie, gdy się już państwa rozrosły: dawniejsze natomiast wyłoniły się z królestwa, gdy królowie poczęli naruszać prastare zasady prawne i dążyli do władzy bardziej despotycznej, inne zaś z najwyższych godności urzędniczych, które w drodze wyboru nadawano (lud bowiem obsadzał stanowiska urzędnicze i kapłańskie na dłuższy okres czasu), a wreszcie i w takich oligarchiach, które wybierały jakiegoś jednego człowieka, przekazując mu pełnię władzy najwyższych urzędów."},{"type":"paragraph","text":"4. We wszystkich tych wypadkach przeprowadzenie zmiany było rzeczą łatwą, jeśli tylko była wola w tym kierunku, ponieważ potrzebną władzę posiadali już uprzednio, jedni na podstawie swej godności królewskiej, drudzy z racji swego wysokiego stanowiska. W ten sposób i Fejdon w Argos69, i inni narzucili się na tyranów, opierając się na posiadanej władzy królewskiej; tyrani w Jonii, a także Falaris70, piastowali uprzednio wysokie godności, a Panajtios w Leontinoj71, 69 Fejdon, król Argos zapewne ok. połowy VΠ w. p.n.e., odnowił powagę władzy królewskiej i zdobył sobie na krótki czas przewodnie stanowisko na Peloponezie."},{"type":"paragraph","text":"70 Falaris — tyran miasta Akragas na Sycylii ok. 560 r. p.n.e."},{"type":"paragraph","text":"71 Panajtios narzucił się na tyrana w mieście Leontinoj na Sycylii ok. 600 r. p.n.e., obaliwszy rządy arystokracji."},{"type":"paragraph","text":"133"},{"type":"paragraph","text":"Kypselos w Koryncie72, Pizystrat w Atenach73, Dionizjos w Syrakuzach74 i inni doszli do tyranii jako demagogowie."},{"type":"paragraph","text":"5. Co do królestwa, to odpowiada ono, jak już mówiliśmy, arystokracji75."},{"type":"paragraph","text":"Opiera się mianowicie na zasłudze, czy to będzie cnota osobista, czy świetność rodu, czy wyświadczone dobrodziejstwa, czy też to wszystko i siła poza tym."},{"type":"paragraph","text":"Wszyscy bowiem, którzy doszli do władzy królewskiej, osiągnęli ją dzięki dobrodziejstwom wyświadczonym swym państwom i ludom albo też dzięki temu, że mieli możliwości w tym względzie, a więc jedni przez to, że uchronili w wojnie lud swój od niewoli, jak Kodros76, inni przez to, że go oswobodzili, jak Cyrus77, lub też dzięki temu, że zbudowali państwo czy też rozszerzyli je przez zdobycze, jak królowie Lacedemończyków, Macedończyków i Molosów."},{"type":"paragraph","text":"6. Król z natury rzeczy ma stać na straży, by właściciele majątków nie cierpieli niesprawiedliwości, a lud w niczym nie doznawał krzywdy. Tyrania przeciwnie, jak to wielokrotnie zaznaczałem78, nie ma wcale na oku dobra ogółu, chyba że wchodzi w grę korzyść własna. Celem tyrana jest użycie, a celem króla piękno moralne. Dlatego też tyrana cechuje pogoń za pieniędzmi, a króla raczej dbałość o cześć. Straż przyboczna króla składa się z obywateli, tyrana zaś z obcych najemników."},{"type":"paragraph","text":"7. Że tyrania posiada ujemne strony zarówno demokracji, jak oligarchii, to oczywiste. Z oligarchią łączy ją to, że głównym jej celem jest bogactwo — bo z konieczności jedynie w ten sposób daje się utrzymać i straż przyboczną, i wystawny tryb życia — do ludu odnosi się z bezwzględną nieufnością, dlatego przeprowadza jego rozbrojenie. Również ucisk warstw niższych, usuwanie ich z miasta i rozmieszczanie w różnych miejscowościach jest cechą wspólną zarówno oligarchii, jak i tyranii. Do demokracji znów zbliża ją walka z możnymi, których stara się, skrycie i otwarcie, zniszczyć i wyrzucić z kraju jako współzawodników oraz przeszkodę w dążeniu do władzy. Z ich bowiem szeregów wychodzą zazwyczaj zamachowcy, gdyż jedni chcą sami panować, a drudzy nie chcą się poddać pod jarzmo niewoli. Tym też tłumaczy się rada Periandra udzielona Trazybulosowi79, by ścinać wystające kłosy, wskazująca na to, że trzeba zawsze uprzątać najwybitniejszych obywateli."},{"type":"paragraph","text":"72 Kypselos obalił panowanie arystokratycznego rodu Bakchiadów w Koryncie i rządził jako tyran 30 lat (Herodot, V 92) w drugiej połowie VII w. p.n.e.; por. niżej, rozdz. 9, § 22 nn."},{"type":"paragraph","text":"73 Pizystrat rządził jako tyran w Atenach z przerwami między 560 a 528 r."},{"type":"paragraph","text":"74 Por. ks. I, rozdz. 4, § 8."},{"type":"paragraph","text":"75 Por. wyżej, § 1."},{"type":"paragraph","text":"76 Kodros, legendarny król Attyki, który przez swoją śmierć ofiarną miał uchronić Attykę od najazdu Dorów (praojciec królewskiego rodu w Atenach — Medontydów)."},{"type":"paragraph","text":"77 Cyrus, założyciel państwa perskiego, zrzucił w 550 r. p.n.e. supremację Medów."},{"type":"paragraph","text":"78 Por. ks. III, rozdz. 5, § 4, i ks. IV, rozdz. 7, § 3."},{"type":"paragraph","text":"79 Trazybulos, tyran Miletu w początkach VI w, p.n.e., utrzymywał przyjazne stosunki z tyranem Koryntu Periandrem. Według Herodota (V 92) to właśnie Trazybulos miał udzielić takiej rady Periandrowi."},{"type":"paragraph","text":"134"},{"type":"paragraph","text":"8. Jak to już zaznaczyłem pokrótce80, należy przyjąć, że przyczyny przewrotów w monarchiach są te same, co i w politejach. Doznana krzywda, strach i wzgarda pobudzają bowiem wielu z poddanych do zamachu na monarchię; przy krzywdach boli najwięcej zadany gwałt, niekiedy też pozbawienie własności. Również i cele przewrotów są przy tyranii i królestwie te same, co tam: bo jedynowładcy posiadają ogromne bogactwo i poważanie, a więc dobra, których wszyscy ludzie pożądają."},{"type":"paragraph","text":"9. Zamachy kierowane są już to przeciw osobie władców, już to przeciw ich panowaniu. Przeciwko osobie, jeżeli przyczyną była zniewaga; występuje ona w różnych postaciach, ale każda z nich rozpala uczucie gniewu. Z płonących zaś gniewem największa chyba część zrywa się do powstania, aby się zemścić, a nie by władzę zagarnąć. Tak było z zamachem na Pizystratydów, który spowodowany został przez zniewagę wyrządzoną siostrze Harmodiosa i obrazę samego Harmodiosa, bo Harmodios powodował się względem na siostrę, a Arystogejton względem na Harmodiosa81. Tak samo doszło do spisku przeciw Periandrowi w Ambracji82, ponieważ przy pijatyce zapytał swego ulubieńca, czy zaszedł w ciążę za jego sprawą."},{"type":"paragraph","text":"10. Pauzaniasz urządził zamach na Filipa, ponieważ ten dopuścił do zelżenia go przez Attalosa i jego ludzi83, a Derdas na Amyntasa Małego84 dlatego, że ten chwalił się, jakoby z nim w wieku młodocianym utrzymywał stosunki miłosne; podobnie było z eunuchem, który zabił Euagorasa z Cypru85, czując się obrażony z powodu, że syn jego uwiódł mu żonę."},{"type":"paragraph","text":"11. Wiele zamachów doszło też do skutku z powodu zniewagi, jakiej niektórzy doznali ze strony władców przez nadużycia cielesne, tak np. zamach Kratajosa na Archelaosa86. Zawsze wstrętny bowiem był mu ten stosunek, tak że nieznaczny pozór wystarczył, aby go popchnąć do czynu. Mimo obietnicy nie dał mu Archelaos 80 Por. wyżej, § 1"},{"type":"paragraph","text":"81 Harmodios i Arystogejton, zabójcy Hipparcha, syna Pizystrata, w 514 r. p.n.e.; por. Arystoteles, Ustrój polit. Aten, rozdz, 18."},{"type":"paragraph","text":"82 Por. wyżej, rozdz. 3, § 6."},{"type":"paragraph","text":"83 Pauzaniasz, oficer króla Filipa II, zhańbiony przez Attalosa, jednego z możnych panów macedońskich, szukał sprawiedliwości u króla, a kiedy mu jej odmówiono, pomścił swą obrazę na osobie samego Filipa, którego zamordował (336 r. p.n.e.); por. Diodor Sycylijski, XVI 93."},{"type":"paragraph","text":"84 Arayntas Mały, syn króla macedońskiego Archelaosa (411 - 399), owładnął na krótko tronem w zamęcie, w jakim się znalazła Macedonia po śmierci jego ojca. Zabójca jego Derdas pochodził"},{"type":"paragraph","text":"zapewne z rodźmy władców macedońskiej dzielnicy Elimiotis."},{"type":"paragraph","text":"85 Euagoras, król Salaminy cypryjskiej (411/410-374/473), zginął zamordowany wpadłszy, w zasadzkę przygotowaną przez eunucha Trazydajosa z Elidy, który zarówno jemu, jak i jego synowi ułatwił początkowo stosunki miłosne z córką niejakiego Nikokreonta; por. Teopomp, frg. 111 (Muller, Fragmenta hist. Graec., t. I)."},{"type":"paragraph","text":"85 Król Macedonii Archelaos (413 - 399) miał dwie żony, z których pierwsza, nieznana z imienia, dała mu, prócz córki, syna Amyntasa (Małego), druga — Kleopatra — syna i córkę. Małżeństwo Amyntasa z córką Kleopatry miało złagodzić nieporozumienia między dziećmi jednej i drugiej matki."},{"type":"paragraph","text":"Małżeństwo starszej córki z księciem Elimiotis miało zapewnić pomoc tegoż w wojnie z władcą innej dzielnicy Górnej Macedonii, Lynkestis, Arrabajosem (Tukidydes, IV 79, 2) i nieznanym bliżej Irrasem (w niektórych rękopisach Sirras)."},{"type":"paragraph","text":"135"},{"type":"paragraph","text":"żadnej z córek za żonę, lecz zaprzątnięty wojną z frrasem i Arrabajosem wydał starszą za króla Elimei, a młodszą za syna swego Amyntasa, sądząc, że w ten sposób załagodzi nieporozumienia między nim a synem urodzonym z Kleopatry. Istotna przyczyna zamachu Kratajosa leżała jednak w niechęci, jaką w nim budził miłosny stosunek."},{"type":"paragraph","text":"12. Współdział w tym zamachu także Hellanokrates z Larysy, i to z tego samego powodu. I z nim bowiem utrzymywał Archelaos stosunek miłosny, i mimo obietnicy nie odsyłał go do domu, tak że młodzieniec nabrał przekonania, że u podstawy stosunku leżało nie miłosne pożądanie, ale chęć jego znieważenia. Pyton87"},{"type":"paragraph","text":"i Heraklejdes z Ajnos zabili Kotysa88, aby pomścić ojca, a Adamas odstąpił od Kotysa z powodu zniewagi, jakiej doznał przez niego skutkiem kastracji w latach dziecinnych."},{"type":"paragraph","text":"13. Wielu też władców zabili lub próbowali zabić ludzie rozgoryczeni z powodu zniewagi, jakiej doznali na ciele przez wymierzenie im chłosty, a robili to ludzie nawet spośród osób na wysokich urzędach oraz z rodu królewskiego. Tak np."},{"type":"paragraph","text":"w Mitylenie Megakles ze swoimi przyjaciółmi napadł i uprzątnął Pentylidów89, którzy krążąc po mieście katowali ludzi pałkami. Później znów Smerdes zabił"},{"type":"paragraph","text":"Pentylosa90, ponieważ został przez niego pobity i wyrzucony z domu, z objęć żony. Na czele sprzysiężenia przeciw Archelaosowi stanął Dekamnichos, który pierwszy pobudził spiskowców. Przyczyną jego rozgoryczenia było wydanie go poecie Eurypidesowi celem wymierzenia mu chłosty. Eurypides mianowicie był"},{"type":"paragraph","text":"oburzony na niego za uwagę, że zapach z ust jego jest niemiły."},{"type":"paragraph","text":"14. Także i wielu innych władców z takich powodów czy to zostało zabitych, czy też spotkało się z zamachami."},{"type":"paragraph","text":"Podobną rolę grała w takich razach również i obawa, która była już wymieniona91"},{"type":"paragraph","text":"jako jedna z przyczyn zarówno upadku politei, jak i monarchii. Tak np. Kserksesa zamordował Artapanes, obawiając się oskarżeń z powodu Dariusza, którego powiesił"},{"type":"paragraph","text":"bez wyraźnego rozkazu Kserksesa, a tylko w przekonaniu, że czyn znajdzie uznanie, ponieważ król nie będzie pamiętał szczegółów sprawy omówionej przy uczcie 92."},{"type":"paragraph","text":"87 W rękopisach imię jego występuje w formie: Pyrrhon, Parrhon, Parthon, nie ulega jednak wątpliwości, że należy czytać Python, bo pod tym imieniem występuje on u Demostenesa (In Aristocratem 119), który podaje, że obaj bracia w nagrodę za zasługę, jaką dla Aten stanowiło usunięcie groźnego przeciwnika, otrzymali obywatelstwo ateńskie i wieniec złoty. Diogenes Laertios (III 46) zalicza ich do uczniów Platona."},{"type":"paragraph","text":"88 Kotys, syn Seutesa, król Odrysów, który w latach 383 - 360 zajął przewodnie stanowisko wśród plemion trackich i zagrażał miastom greckim leżącym na trackim wybrzeżu, m.in. zapewne i Ajnos, położonemu u ujścia rzeki Hebrous (dziś Marica)."},{"type":"paragraph","text":"89 Panujący w Mitylenie ród szlachecki, obalony pod koniec VII w. p.n.e."},{"type":"paragraph","text":"90 Tyran Mityleny, zapewne z rodziny obalonych niedługo przedtem Pentylidów."},{"type":"paragraph","text":"91 Por. wyżej, § 8 oraz rozdz. 1, § 5."},{"type":"paragraph","text":"92 Opowieść Arystotelesa o śmierci Kserksesa odbiega od innych przekazów (Diodor Sycylijski, XI 69, Justyn, III 1), które powiadają, że Kserkses zamordowany został przez swego wszechwładnego ministra Artabanosa. Artabanos mianowicie, dążąc sam do tronu, rzucił oskarżenie o zabicie Kserksesa na syna jego Dariusza, a gdy obwiniony został stracony na rozkaz młodszego brata Artakserksesa, Artabanos usiłował uprzątnąć z kolei i jego. Ostrzeżony Artakserkses uprzedził jednak zamach i sam zabił Artabanosa."},{"type":"paragraph","text":"136"},{"type":"paragraph","text":"Do innych znów zamachów dała powód pogarda, tak np. w wypadku Sardanapala93, którego ktoś zobaczył przędącego w gronie kobiet, jeżeli prawdą jest, co baśń o tym mówi. Jeśli to nie jego dotyczy, to jednak coś takiego mogło się zdarzyć istotnie komu innemu. Także przeciw Dionizjosowi II94 powstał Dion, uczuciem wzgardy wiedziony, widząc, że i obywatele takie dla niego żywią uczucia z powodu jego ustawicznego pijaństwa."},{"type":"paragraph","text":"15. Nawet przyjaciele władców knują przeciw nim spiski, w pewnych wypadkach wzgardą powodowani. Właśnie zaufanie, jakie im okazują, budzi u nich pogardę i przekonanie, że zamach się ukryje. Także i ci, którzy sądzą, że są w stanie przywłaszczyć sobie władzę, knują zamachy wzgardą się poniekąd kierując; lekceważą sobie bowiem niebezpieczeństwo w poczuciu swej siły i z łatwością ważą się na zamach. Tak bywa z wystąpieniami wodzów przeciw ich monarchom. Cyrus np. obalił Astyagesa95, gdy nabrał pogardy dla jego trybu życia i potęgi, widząc, że jego siły zbrojne są w rozkładzie, a on sam oddaje się używaniu. Podobnie było z Trakiem Seutesem 96, który był wodzem Amadokosa."},{"type":"paragraph","text":"Przychodzi też do zamachów pod wpływem kilku tych przyczyn równocześnie, np. uczucia wzgardy łączą się z żądzą zysku; tak było przy powstaniu Mitrydatesa przeciw Ariobarzanesowi97. Głównie jednak z podanej wyżej przyczyny, tj. pod wpływem wzgardy, porywają się do powstania ludzie zuchwałego charakteru, cieszący się poważaniem u swoich monarchów jako wojownicy; odwaga łącznie z siłą stwarza przedsiębiorczość, toteż obie te cechy, otwierające widoki łatwego zwycięstwa, pobudzają do zamachów."},{"type":"paragraph","text":"16. U tych osób jednak, które w żądzy sławy porywają się do powstania, pobudka jest innego rodzaju aniżeli w omówionych poprzednio wypadkach. Ci mianowicie, którzy ambicją powodowani urządzają zamach, wkraczają na tę niebezpieczną drogę nie z tych pobudek, jakie u niektórych stanowi widok wielkich bogactw i wielkiej czci oddawanej tyranom; przeciwnie, inaczej aniżeli tamci, którzy się kierują podanymi pobudkami, ci działają tak, jak się działa przy jakimś innym, niezwykłym czynie, dającym imię i sławę u drugich: porywają się na monarchów powodując się pragnieniem nie jedynowładztwa, lecz sławy."},{"type":"paragraph","text":"93 Około osoby króla asyryjskiego Asurbanipala (669 - 626), zwanego przez Greków Sardanapalem, rozsnuła tradycja grecka różne opowieści, w których, wbrew prawdzie historycznej, jest on przedstawiony jako zniewieściały, zmysłowemu używaniu oddany władca."},{"type":"paragraph","text":"94 Następca Dionizjosa I, Dionizjos Młodszy (367 - 356), obalony został przez szwagra swego Diona, który próbował z kolei zmienić stosunki w Syrakuzach, ale zginął zamordowany w 354 r.; por."},{"type":"paragraph","text":"niżej, § 17."},{"type":"paragraph","text":"93 Relacja Arystotelesa odbiega tu od znanej opowieści Herodota (I 55 nn.), według której wódz Astyagesa Harpagos, przez uratowanie życia małemu Cyrusowi i przejście następnie na jego stronę w rozstrzygającej walce, głównie się przyczynił do obalenia panowania Medów (ok. 550 r. p.n.e.)."},{"type":"paragraph","text":"96 Władający nad Propontydą książę tracki Seutes (ok. 400 r. p.n.e.) był wasalem króla Odrysów Amadokosa."},{"type":"paragraph","text":"97 Mitrydates był synem satrapy perskiego we Frygii nad Hellespontem, Ariobarzanesa, przeciwko któremu wystąpił, opowiedziawszy się po stronie króla w wielkim powstaniu satrapów (366 - 360)."},{"type":"paragraph","text":"137"},{"type":"paragraph","text":"17. Wszelako takich, którzy z tego rodzaju pobudek podejmują akcję, bardzo niewielu można naliczyć. U podłoża musi tu bowiem leżeć zupełne wyzbycie się troski o własne życie, jeśli się ktoś nie ma zawahać w przeprowadzeniu dzieła."},{"type":"paragraph","text":"Ludzie tacy muszą sobie przyswoić sposób myślenia Diona, co jednak rzadko komu z łatwością przychodzi. Ten bowiem wyprawił się przeciw Dionizjosowi z niewielkim oddziałem, wyrażając przekonanie, że jakikolwiek obrót weźmie przedsięwzięcie, będzie miał pewne zadowolenie z samego faktu jego podjęcia, więc choćby mu przyszło umrzeć przy pierwszych krokach po wylądowaniu, to śmierć ta będzie piękna dla niego."},{"type":"paragraph","text":"18. Upadek tyranii, jak i każdego innego ustroju, przychodzi po pierwsze z zewnątrz, jeśli przyjdzie do starcia z państwem o przeciwnym ustroju, przedstawiającym większą siłę."},{"type":"paragraph","text":"Wola w tym kierunku znajdzie się oczywiście ze względu na przeciwieństwo założeń, czego zaś ludzie chcą, tego i dokonują, jeśli tylko mogą. Przeciwne sobie ustroje to demokracja i tyrania, kłócące się ze sobą, jak ten garncarz z garncarzem według Hezjoda98 — bo i demokracja skrajna jest właściwie tyranią — tudzież królestwo i arystokracja, ze względu na przeciwieństwa ustrojowe. Dlatego też Lacedemończycy obalili bardzo wiele tyranii, podobnie jak Syrakuzanie w czasach, kiedy państwo ich dobre posiadało rządy."},{"type":"paragraph","text":"19. Po wtóre, upada tyrania sama z siebie, gdy się zaczną rozterki w najbliższym otoczeniu władcy, jak to było z rodziną Gelona99, a ostatnio i Dionizjosa. Dom Gelona obalony został przez to, że Trazybulos, brat Hierona, pragnąc sam władzę zagarnąć, usidlił syna Gelonowego i popchnął go do rozpusty. Członkowie rodziny, aby nie dopuścić do obalenia tyranii w ogóle, ale tylko Trazybulosa, poruszyli obywateli, ci jednak skorzystali ze sposobności i wypędzili ich wszystkich."},{"type":"paragraph","text":"Przeciw Dionizjosowi urządził wyprawę jego szwagier Dion i obalił go pozyskawszy lud, ale sam wkrótce zginaj:."},{"type":"paragraph","text":"20. Dwie są przyczyny, które w pierwszym rzędzie zaznaczają się przy zamachach na tyranię: nienawiść i pogarda. Jedna z nich, nienawiść, jest nieodłącznym towarzyszem tyranów, ale i pogarda bywa w wielu wypadkach powodem ich obalenia. Dowodem tego faktu że przeważna część tych, którzy zdobyli sobie władzę, zdołała ją zachować, ale ci, którzy ją od nich przejęli, wszyscy niemal wkrótce ją stracili. Skutkiem rozwiązłego życia z łatwością bowiem ściągają na siebie pogardę i dają wiele sposobności do przeprowadzenia zamachu."},{"type":"paragraph","text":"21. Jako rodzaj nienawiści trzeba też uznać gniew, bo do pewnego stopnia prowadzi do takich samych czynów, a nawet często jest aktywniejszy od nienawiści."},{"type":"paragraph","text":"Owładnięci gniewem, ponieważ nie znają rozumowania, więc uderzają z tym 98 Prace i dnie, 25 - 6: Garncarz kłóci się z garncarzem i z cieślą wadzi się cieśla, Żebrak zazdrości żebrakom, jak śpiewak śpiewakom."},{"type":"paragraph","text":"99 Por. niżej, rozdz. 9, § 23 i przypis 110."},{"type":"paragraph","text":"138"},{"type":"paragraph","text":"większą gwałtownością. Ludzie dają się ponosić gniewowi przede wszystkim skutkiem doznanej zniewagi; z takiego właśnie powodu obalona została tyrania Pizystratydów i wiele innych. Natomiast nienawiść zostawia więcej czasu dla rozwagi. Gniewowi bowiem towarzyszy uczucie bólu, tak że niełatwo stosować rozwagę, podczas gdy nienawiść nie łączy się z bólem."},{"type":"paragraph","text":"Ujmując rzecz ogólnie, stwierdzamy: wszystkie podane przyczyny upadku czystej i krańcowej oligarchii, tudzież skrajnej demokracji trzeba przyjąć również w odniesieniu do tyranii, bo obie te formy ustrojowe są właściwie wielogłowymi tyraniami."},{"type":"paragraph","text":"22. Królestwo upada najmniej pod działaniem przyczyn zewnętrznych i dlatego jest długotrwałe, natomiast najczęściej upadek jego następuje pod działaniem przyczyn wewnętrznych. Ginie zaś w sposób dwojaki: raz, gdy członkowie domu królewskiego poróżnia się ze sobą, a następnie, gdy królowie próbują władać w sposób bardziej despotyczny, usiłując rozszerzyć swą władzę wbrew prawu."},{"type":"paragraph","text":"Obecnie zresztą królestwa już się nie pojawiają, a jeśli coś takiego powstaje, to są to raczej jedynowładztwa i tyranie. Królestwo bowiem jest władzą uznawaną dobrowolnie i o większych uprawnieniach, a dziś jest wielu równych sobie, nie ma zaś nikogo, kto by tak dalece nad innymi górował, iżby się nadawał do tak wielkiej i dostojnej władzy. Z tego to powodu ludzie nie poddają się z dobrej woli jedynowładztwu, a jeśli ktoś siłą lub podstępem władzę zagarnie, to uchodzi to już za tyranię."},{"type":"paragraph","text":"23. W królestwie dziedzicznym, prócz podanych przyczyn, jako dalszą wymienić należy i to, że dochodzą tu do rządów często ludzie godni pogardy, którzy poza tym dopuszczają się nadużyć, choć nie posiadają siły tyrana, a tylko dostojeństwo królewskie. Toteż upadek przychodził z łatwością: bo król natychmiast przestaje być królem, gdy go poddani już nie chcą, natomiast tyran pozostaje nim nawet wbrew ich woli. Takie to i inne podobne przyczyny pociągają za sobą upadek monarchii."},{"type":"paragraph","text":"9. Środki sprzyjające utrzymaniu się monarchii, a zwłaszcza tyranii"},{"type":"paragraph","text":"1. Utrzymaniu ich sprzyjają oczywiście, ogółem biorąc, przyczyny stanowiące przeciwieństwo powyższych, w szczególności zaś, o ile chodzi o królestwo, ta okoliczność, że zakres władzy królewskiej ulega ograniczeniu. Im mniejszą władzę mają królowie, tym dłużej trwa z konieczności królestwo w ogóle. Bo i sami królowie wykazują mniej skłonności do despotyzmu, a żyją bardziej na stopie równości z innymi i mniej się spotykają z zawiścią poddanych. Z tego właśnie powodu utrzymało się królestwo przez długi czas u Molosów100, podobnie jak 100 U Molosów władała rodzina Ajakidów, z której pochodził znany król Pyrrus. Królestwo utrzymało się tu do ok. 234/233 r. p.n.e."},{"type":"paragraph","text":"139"},{"type":"paragraph","text":"u Lacedemończyków, dzięki temu, że władza była tu podzielona od początku między dwóch królów, a nadto i dlatego, że ograniczył ją jeszcze Teopomp101, w ten sposób między innymi, że ustanowił obok niej władzę eforów. Przez takie ograniczenie zakresu władzy królewskiej przedłużył jej trwanie, tak że poniekąd nie osłabił jej, lecz raczej ją wzmocnił. Myśl ta jest też zawarta w odpowiedzi, jaką podobno dał żonie, gdy go zapytała, czy się nie wstydzi, że synom przekazuje władzę królewską mniejszą, aniżeli ją od ojca przejął. „Bynajmniej — miał"},{"type":"paragraph","text":"powiedzieć — bo przekazuję ją o wiele trwalszą.”"},{"type":"paragraph","text":"2. Tyrani zaś utrzymują się w dwojaki sposób, wręcz sobie przeciwny. Jeden z nich to tradycyjny, wedle którego większość tyranów sprawuje swą władzę."},{"type":"paragraph","text":"Wiele zastosowanych tu zasad rządzenia miał zaprowadzić Periander z Koryntu, ale wiele tego rodzaju reguł można też przejąć z perskiego sposobu rządzenia."},{"type":"paragraph","text":"Należą tu podane już poprzednio środki, służące wedle możności do podtrzymania tyranii; polegają one na tym, że się ludzi wybitnych nie dopuszcza do steru, a ambitnych niszczy, że się ich nie dopuszcza do stowarzyszeń organizujących wspólne biesiady, ani do ugrupowań politycznych, ani do głębszego wykształcenia, ani też niczego podobnego, lecz stara się zabezpieczyć przed wszystkim, co zwykło wytwarzać poczucie własnej godności i wzajemne zaufanie; ani następnie"},{"type":"paragraph","text":"[tyran] nie pozwala na tworzenie zrzeszeń ani też na urządzanie innych zebrań towarzyskich, a czyni to wszystko, by wszyscy jak najmniej wzajemnie się znali (ponieważ poznanie podnosi wzajemne zaufanie)."},{"type":"paragraph","text":"3. Z drugiej strony, czuwa się nad tym, aby obywatele bawiący w mieście ciągle się pokazywali publicznie i u drzwi tyrana się zjawiali, bo w ten sposób najmniej dają się ukryć ich poczynania, a nadto w ciągłym służalstwie przywykają oni do obniżenia lotu swoich myśli. Także i inne środki tego rodzaju, u Persów i barbarzyńców spotykane, znajdują zastosowanie u tyranów, bo wszystkie zmierzają do tego samego celu. Stara się też tyran o to, aby dochodziło do jego wiadomości wszystko, co mówi lub co czyni ktokolwiek z jego poddanych. Do tego celu służą szpiedzy, jak w Syrakuzach, tzw. donosicielki (αϊ ποταγωγίδες), albo też"},{"type":"paragraph","text":"„podsłuchiwacze”, których wysyłał Hieron102, gdziekolwiek było jakieś zebranie towarzyskie i zgromadzenie. Z obawy bowiem przed takimi ludźmi obywatele niniejszą wykazują odwagę do wypowiadania się otwarcie, a jeśli to czynią, niełatwo utrzymać to w tajemnicy."},{"type":"paragraph","text":"4. Należy też do sposobów rządzenia tyranów, że się ludzi pobudza do wzajemnego oczerniania i do starć: przyjaciół przeciw przyjaciołom, lud przeciw możnym, a bogatych jednych przeciw drugim; że się poddanych zuboża, aby zdobyć środki na utrzymanie straży, a nadto, by ludzie pochłonięci dzień w dzień zajęciami nie mieli czasu na knowania. Jako przykład można tu przytoczyć i piramidy w Egipcie, i dary wotywne Kypselidów 103 i budowę świątyni Zeusa 101 Król spartański z rodziny Eurypontydów (ok. 720 r. p.n.e.)."},{"type":"paragraph","text":"102 Tyran syrakuzański w latach 478 - 466."},{"type":"paragraph","text":"103 Darem takim była m.in. sławna w starożytności skrzynia Kypselosa ofiarowana do Olimpu."},{"type":"paragraph","text":"140"},{"type":"paragraph","text":"olimpijskiego przez Pizystratydów, i budowy Polikratesa na Samos 104, bo wszystko to do tego samego celu zmierzało: nieustannego zatrudnienia i zubożenia poddanych."},{"type":"paragraph","text":"5. Tu należy też obciążenie podatkami, jak w Syrakuzach, gdzie zaistniał taki wypadek, że za Dionizjosa w ciągu pięciu lat obywatele wpłacili cały majątek jako podatek. Tyran chętnie też podejmuje wojny, aby obywatele byli zatrudnieni i nieustannie potrzebowali wodza. Podczas gdy królestwo podtrzymują przyjaciele władcy, to tyrana cechuje w pierwszym rzędzie nieufność w stosunku do przyjaciół, ponieważ wie, że wszyscy pragnęliby go obalić, a ci przede wszystkim mieliby siły do tego."},{"type":"paragraph","text":"6. Zjawiska towarzyszące skrajnej demokracji występują wszystkie również w tyranii, a więc i rządy kobiet w domach, by rozgłaszały poczynania swych mężów, i z tej samej przyczyny rozluźnienie karności niewolników. Bo niewolnicy i kobiety nie knują spisków przeciw tyranom, a że im się dobrze powodzi, więc muszą się życzliwie odnosić i do tyranii, i do demokracji. I lud bowiem chce być jedynowładcą."},{"type":"paragraph","text":"Dlatego to pochlebca w obu tych formach ustrojowych mile jest widziany, demagog w demokracji — bo demagog jest właśnie pochlebcą ludu — a u tyranów ludzie płaszczący się w zetknięciu z nimi, co jest przecież objawem pochlebstwa. Z tego powodu tyrani są przyjaciółmi złych ludzi, znajdują bowiem przyjemność w pochlebst-wie, na które nie zdobędzie się człowiek o niezależnym sposobie myślenia, bo ludzie tacy mogą być tylko przyjaciółmi, nigdy zaś nie schlebiają. Są też źli ludzie użyteczni do złych czynów; toż klin wybija się klinem, jak mówi przysłowie."},{"type":"paragraph","text":"7. Jest też cechą tyranów, że nie znajdują upodobania w ludziach dostojnych i niezależnych. Bo tyran chciałby te cechy jedynie u siebie widzieć, więc kto z godnością i niezależnością się mu przeciwstawia, uszczupla przewagę i despotyzm tyranii, i skutkiem tego jest znienawidzony jako podkopujący jej władzę. Do koła współbiesiadników i towarzyszy zajęć codziennych dopuszcza tyran raczej obcych niż obywateli, bo ci ostatni są w jego oczach wrogami, a pierwsi przeciw niemu nie występują. Takie to i tym podobne środki stosuje tyrania dla podtrzymania swej władzy, a wszystkie są one nacechowane przewrotnością."},{"type":"paragraph","text":"8. Środki te można ująć z trzech punktów widzenia, bo i tyrania ma trzy rzeczy na celu: po pierwsze, aby poddani byli małoduszni, bo człowiek małoduszny nie uknuje spisku na nikogo; po wtóre, aby szerzyć wzajemną nieufność, bo żadna tyrania nie upada wpierw, nim pewni ludzie nie nabiorą do siebie zaufania. (Toteż tyrani zwalczają ludzi przyzwoitych, jako szkodliwych dla swojego panowania nie tylko dlatego, że nie pozwalają rządzić sobą w sposób despotyczny, ale i dlatego, że dochowują wiary i między sobą, i w stosunku do innych, i nie oskarżają ani wykonana z drzewa cedrowego, inkrustowana złotem i kością słoniową, kunsztownie ozdobiona scenami mitologicznymi, których opis znajdziemy u Pauzaniasza (V 17 -19); tenże Kypselos miał"},{"type":"paragraph","text":"ofiarować nadto posąg Zeusa do świątyni Hery w Olimpu."},{"type":"paragraph","text":"104 Budowy Polikratesa w II połowie VI w. p.n.e., jak wodociąg przeprowadzony przez tunel kuty w skale, wielkie tamy w porcie i świątynia Hery, sławi Herodot (III 60) jako największe za jego czasów w Grecji."},{"type":"paragraph","text":"141"},{"type":"paragraph","text":"siebie wzajemnie, ani drugich.) Po trzecie [ma tyrania na celu] utrzymanie niemocy do działania, bo nikt się nie porwie na rzeczy niemożliwe, a więc i na obalenie tyranii, jeśli brak mu sił do tego."},{"type":"paragraph","text":"9. Do tych [trzech] punktów tedy dają się sprowadzić zamierzenia tyranów."},{"type":"paragraph","text":"Jakiekolwiek byłyby ich poczynania, zawsze u podstaw będzie jeden z tych celów: czy to, by ludzie sobie wzajemnie nie ufali, czy aby byli bezsilni, czy też małoduszni. Taki to jest zatem jeden sposób służący do zachowania tyranii."},{"type":"paragraph","text":"10. Drugi polega na tym, że się stosuje niemal przeciwne środki aniżeli omówione poprzednio, a można go określić, rozważywszy okoliczności towarzyszące upadkowi królestwa. Bo jak jednym ze sposobów podkopania królestwa jest przetworzenie panowania w tyranię, tak środkiem do podtrzymania tyranii jest zbliżenie jej do królestwa. Jednego musi przy tym tyran pilnować, a mianowicie władzy, aby mógł swe panowanie utrzymywać nie tylko za wolą poddanych, ale i w brew ich woli, wypuszczając bowiem władzę z ręki pozbywa się również tyranii. Przeciwnie, władza musi pozostać trwałą podstawą, a zresztą powinien działać jak prawdziwy król lub też stwarzać wrażenie, że rolę tę dobrze odgrywa."},{"type":"paragraph","text":"11. Przede wszystkim musi się troszczyć o mienie publiczne i nie trwonić pieniędzy na takie rzeczy, które u mas wywołują rozgoryczenie, gdy się im zabiera to, co z biedą w pracy i trudzie zdobyli, a rozdaje hojnie nałożnicom, obcym i artystom; przeciwnie, winien składać sprawozdania z dochodów i wydatków, jak to już niektórzy z tyranów czynili. Tak bowiem gospodarując wyda się rządcą raczej, a nie tyranem. Nie należy się zaś obawiać, by mu kiedy zabrakło pieniędzy, skoro jest władcą w państwie."},{"type":"paragraph","text":"12. Natomiast w razie wyjazdu tyranów z kraju jest to nawet dla nich korzystniejsze, aniżeli gdy zostawiają nagromadzone skarby, bo wówczas nie potrzebują strażników, którzy mogliby się pokusić o zagarnięcie władzy, a którzy dla bawiących poza krajem tyranów są niebezpieczniejsi od obywateli. Ci ostatni bowiem ciągną razem z nimi w pole, a strażnicy zostają na miejscu. Następnie, powinien wzbudzić wrażenie, że podatki i nadzwyczajne świadczenia ściąga w interesie gospodarki państwowej i na wypadek potrzeby w razie wojny, w ogóle okazywać się stróżem oraz zarządcą majątku państwowego, a nie własnego."},{"type":"paragraph","text":"13. Powinien też występować na zewnątrz w sposób nie drażniący, lecz dostojny, tak mianowicie, aby ci, co się do niego zbliżają, nie odczuwali strachu, ale raczej szacunek, co oczywiście .niełatwo przychodzi, gdy się ktoś godnym pogardy okaże. Dlatego, jeśli już nie dba o inne zalety, to przecież powinien się starać o sprawność w sztuce wojennej105 i w tym względzie wpoić w poddanych wysokie wyobrażenie o sobie. Ponadto nie tylko on sam, ale i nikt z jego otoczenia nie powinien ściągać na siebie zarzutu z powodu zniesławienia któregoś z poddanych, czy to młodzieńca, czy dziewczyny, a podobnie powinny się zachowywać kobiety z jego dworu wobec innych, gdyż i przez pychę kobiecą wiele tyranii upadło."},{"type":"paragraph","text":"105 przyjmuję za Immischem poprawkę Madviga: πολεµικής, zamiast przekazanej lekcji: πολιτικής."},{"type":"paragraph","text":"142"},{"type":"paragraph","text":"14. Co do uciech zmysłowych, powinien postępować przeciwnie, aniżeli czynią to obecnie niektórzy z tyranów. Nie tylko bowiem oddają się im od wczesnego ranka, i to przez szereg dni z rzędu, ale chcą, by ich inni przy tym widzieli i podziwiali z powodu szczęsnego i rozkosznego trybu życia. Właśnie przeciwnie, powinni by w tych rzeczach zachować jak największe umiarkowanie, a jeśli nie, to przynajmniej baczyć na to, by ich inni przy tym nie widzieli. Bo nie trzeźwy, ale pijany, i nie czujny, ale zaspany staje się z łatwością ofiarą zamachu i przedmiotem pogardy."},{"type":"paragraph","text":"15. W ogóle musi postępować wręcz przeciwnie aniżeli we wszystkich niemal poprzednio omówionych wypadkach; musi bowiem rozbudowywać miasto i przy-ozdabiać je, jak by był jego opiekunem, a nie tyranem. Ponadto powinien stwarzać wrażenie, że mu kult bogów szczególnie leży na sercu. Bo obywatele ze strony takich mniej się obawiają bezprawia, jeśli nabiorą przekonania, że władca jest bogobojny i pobożny, i mniej pochopnie spiski przeciw niemu knują, jako że ma w bogach sprzymierzeńców. Musi jednak przy tym uważać, aby się nie wydał"},{"type":"paragraph","text":"głupio zabobonny."},{"type":"paragraph","text":"16. Ludzi, którzy w pewnym kierunku wykazali tężyznę, winien tak odznaczać, żeby nabrali przekonania, że nie znaleźliby większego uznania nawet u współobywateli przy pełnej wolności, przy czym odznaczenia takie powinien sam rozdawać, kary zaś wymierzać przez innych urzędników i sądy."},{"type":"paragraph","text":"Środkiem zabezpieczającym każde w ogóle jedynowładztwo jest zasada, by nikogo nie wywyższać pojedynczo, lecz jeśli to wskazane, większą ilość ludzi, bo wówczas jeden czuwać będzie nad drugim, a jeśli już trzeba będzie kogoś wywyższyć, to w każdym razie nie człowieka zuchwałego charakteru, bo taki do wszelkich knowań bywa wielce pochopny. Jeśli się zaś okaże potrzeba, by kogoś władzy pozbawić, z wolna to czynić należy, a nie odbierać mu naraz wszystkich uprawnień."},{"type":"paragraph","text":"17. [Winien dalej tyran] unikać wszelkich czynów gwałtownych, zwłaszcza zaś dwojakiego rodzaju: kaźni cielesnej i nadużycia wieku młodocianego. Głównie jednak powinien przy tym mieć się na baczności przed ludźmi ambitnymi. Bo jak skąpcy ciężko boleją nad uszczupleniem majątku, tak ludzie ambitni i szanowni nad zniewagą. Dlatego albo nie należy posługiwać się takimi ludźmi, albo też trzeba stwarzać wrażenie, że karę wymierza się po ojcowsku, a nie dla zelżenia, stosunki zaś z młodzieniaszkami uprawia się z miłości, a nie z rozpusty, i w ogóle trzeba to, co mogłoby się wydać zniewagą, okupywać większymi odznaczeniami."},{"type":"paragraph","text":"18. Z tych, którzy na życie tyrana nastają, najgroźniejsi są i najwięcej też czujności wymagają ci, którym nie zależy na utrzymaniu własnego życia, byle tylko go zabili. Dlatego powinien się mieć na baczności, zwłaszcza przed tymi, którzy uważają, że czy to sami, czy też ich bliscy doznali ciężkiej zniewagi. Bo kto namiętnością powodowany na coś się porywa, nie oszczędza siebie, jak to już Heraklit106 zauważył mówiąc:"},{"type":"paragraph","text":"trudna jest walka z namiętnością, bo ta cel swój życiem okupuje."},{"type":"paragraph","text":"106 Heraklit z Efezu, filozof, żył na przełomie VI i V wieku."},{"type":"paragraph","text":"143"},{"type":"paragraph","text":"19. Skoro państwa składają się z dwóch klas, ludzi ubogich i bogatych, najlepiej by było, żeby jedni i drudzy to przekonanie żywili, iż panowanie tyrana stanowi gwarancję ich bezpieczeństwa i zabezpieczenie jednych przed jakimikolwiek krzywdami ze strony drugich; jeśli jedna klasa silniejsza jest od drugiej, powinien ją jak najściślej związać ze swymi rządami. Jeśli bowiem tak się ułożą stosunki, nie będzie tyran potrzebował przeprowadzać ani uwolnienia niewolników, ani rozbrojenia obywateli, gdyż siła jego połączona z jedną z owych dwóch części okaże się dostateczną, aby nad buntującymi się wziąć górę."},{"type":"paragraph","text":"20. Zbędną jest rzeczą wszystko to w szczegółach rozwijać, bo cel jest tutaj jasny: chodzi o to, że tyran nie powinien się wydawać w oczach poddanych tyranem, ale rządcą i królem, nie wyzyskiwaczem, lecz opiekunem, człowiekiem, który żyje w sposób umiarkowany, a nie zbytkowny, który nadto pociąga możnych przez ujmujące obejście, a masy przez służenie ich interesom. W następstwie tego panowanie jego nie tylko będzie z konieczności piękniejsze i podziwu godniejsze, ponieważ się rozciąga na ludzi lepszych i nie uciśnionych, a życie jego nie upływa w ciągłym strachu i nienawiści, lecz także będzie to panowanie znacznie trwalsze; ponadto i on sam tak swój charakter urobi, że będzie w pełni lub choćby połowicznie cnotliwy, czy też niecałkowicie, lecz tylko w części przewrotny."},{"type":"paragraph","text":"21. Najmniejszą trwałość ze wszystkich ustrojów wykazują wszelako oligarchia i tyrania. Najdłużej utrzymała się tyrania Ortagorydów i samego Ortagorasa w Sykionie, a trwała lat sto107. Pochodziło to stąd, że się z poddanymi obchodzili w sposób umiarkowany i sami na ogół podporządkowywali się prawom, że Klejstenes, który zdobył sobie sławę wojenną, budził odpowiedni szacunek, że wreszcie jednali sobie przychylność ludu, wykazując w wielu względach dbałość o jego interesy. Przecież Klejstenes podobno w zawodach wieńcem obdarzył"},{"type":"paragraph","text":"sędziego, który nie przysądził mu zwycięstwa, a niektórzy powiadają, że stojący na rynku wizerunek siedzącego człowieka przedstawia właśnie tego sędziego."},{"type":"paragraph","text":"Także o Pizystracie mówią, że stawił się raz na pozwanie przed sąd areopagu."},{"type":"paragraph","text":"22. Drugie miejsce zajmuje tyrania Kypselidów w Koryncie, bo ta przetrwała lat 73 i 6 miesięcy108. Kypselos mianowicie władał lat 30, Periander 40 i pół, a Psammetichos, syn Gorgosa, 3 lata. Przyczyny trwałości były tu te same: Kypselos bowiem zabiegał o względy ludu i przez cały okres panowania obchodził"},{"type":"paragraph","text":"się bez straży przybocznej, a Periander stosował wprawdzie metody tyrana, ale był"},{"type":"paragraph","text":"wojowniczy."},{"type":"paragraph","text":"23. Trzecia z rzędu jest tyrania Pizystratydów w Atenach, choć nie trwała nieprzerwanie. Dwa razy bowiem w czasie swych rządów musiał Pizystrat uciekać, 107 Tyrania ugruntowana w Sykionie przez Ortagorasa (ok. 630 r. p.n.e.), a następnie przez jego bratanka Klejstenesa (ok. 590 - 560) przetrwała zapewne nawet dłużej, bo do ok. 510 r."},{"type":"paragraph","text":"p.n.e."},{"type":"paragraph","text":"108 Ponieważ początek tyranii Kypselosa przypada według chronografów na 657 r. p.n.e., okres tyranii Kypselidów w Koryncie obejmowałby lata od 657 do 583, z czego rządy Kypselosa przypadałyby na lata 657 - 627, syna jego Periandra na lata 627 - 587/6, i wreszcie rządy Psammetichosa (bratanka Periandra) na lata 586 - 583. Daty te nie są jednak pewne."},{"type":"paragraph","text":"144"},{"type":"paragraph","text":"tak że w ciągu 33 lat tylko przez 17 rządził jako tyran, a że synowie panowali lat 18, więc ogółem okres ich panowania wynosi lat 35109. Z innych tyranii dłuższa była tyrania Hierona i Gelona w Syrakuzach110. Nie trwała ona jednak długo, bo ogółem lat 18. Gelon mianowicie po 7 latach panowania zakończył życie w roku ósmym, Hieron panował lat 10, a Trazybulos uszedł na wygnanie już w jedenastym miesiącu111. Przeważnie jednak tyranie trwały w ogóle całkiem krótko."},{"type":"paragraph","text":"Tak tedy omówiliśmy mniej więcej wszystko, co się składa na przyczyny upadku, jak znów i zachowania tak politei, jak i monarchii."},{"type":"paragraph","text":"10. Krytyka uwag Platona o przemianach ustroju"},{"type":"paragraph","text":"1. W Państwie Platona mówi też Sokrates o przemianach ustroju, wywody jego nie są jednak trafne. Nie określa bowiem w sposób właściwy przemiany najlepszego i najprzedniejszego ustroju. Przyczynę jej widzi mianowicie w tym, że nic nie pozostaje trwale, ale wszystko ulega przemianom w pewnym okresie czasu, „istota zaś tego zjawiska leży w liczbach, które przedstawiają stosunek 4:3 wyrażający się liczbą 1,1/3, a które związane z liczbą 5 dają dwie harmonie”, a to, jak mówi, wówczas, gdy liczba tej figury nabierze charakteru stałego112. Kieruje się przy tym zdaniem, że natura wydaje niekiedy ludzi złych i opierających się wszelkiemu wychowaniu. Pogląd ten nie jest może pozbawiony słuszności, bo mogą się znaleźć pewne jednostki, których niepodobna wychować i urobić na tęgich ludzi. Dlaczegóż jednak ta przemiana miałaby być właściwa raczej temu ustrojowi, który on nazywa najlepszym, a nie i wszystkim innym, i w ogóle wszelkim rzeczom?"},{"type":"paragraph","text":"2. W takim razie w czasie, z którego nastaniem wszystko, jego zdaniem, ulega zmianie, to, co nie zaczęło równocześnie istnieć, musiałoby zmieniać się równocześnie, a więc np. to, co powstało dnia poprzedzającego przełom, miałoby być równocześnie objęte przemianą. A następnie, z jakiejże przyczyny miałby się ten ustrój zamienić w lakoński? Wszystkie ustroje przechodzą przecież częściej w formę im przeciwną aniżeli do nich zbliżoną. To samo trzeba powiedzieć 109 Narzucił się Pizystrat na tyrana w 560 r. p.n.e., okres 33-letni upłynął zatem w 527 r., obalenie syna jego Hippiasza przypada na 510 r."},{"type":"paragraph","text":"110 Tyrania Gelona w Syrakuzach przypada na lata 485-478, brat jego Hieron panował, według Diodora Sycylijskiego (XI 66, 4), niespełna lat 12 (478-466), najmłodszy brat Trazybulos rządził"},{"type":"paragraph","text":"w latach 466 - 465."},{"type":"paragraph","text":"111 Uderza w tym zestawieniu długotrwałych tyranii brak wzmianki o panowaniu obu Dionizjosów w Syrakuzach (405 - 357, względnie nawet 345). Stąd niektórzy wydawcy, tak i Immisch, przyjmują tu w tekście lukę, w której i ten przykład był podany."},{"type":"paragraph","text":"112 Uwagi Arystotelesa odnoszą się do sławnego miejsca w Państwie Platona (543 BC), którego interpretacja nastręcza nieprzezwyciężone trudności. Do ich wyjaśnienia i Arystoteles się nie przyczynił, choć ze sposobu, w jaki się wyraża, można sądzić, że rozumiał to miejsce u Platona (por. m.in. uwagi do tego miejsca w wydaniu Susemihla, II 369 nn., przyp. 1763). Pewne jest tu tylko tyle, że punktem wyjścia kombinacji Platona jest stosunek boków prostokątnego trójkąta, którego przyprostokątne wynoszą 4 i 3, a przeciwprostokątna 5."},{"type":"paragraph","text":"145"},{"type":"paragraph","text":"o innych przemianach. Powiada bowiem [Sokrates], że ustrój lakoński przechodzi z kolei w oligarchie, z tej znów w demokrację, a z demokracji w tyranię."},{"type":"paragraph","text":"Tymczasem przemiany idą też i w przeciwnym kierunku, a więc np. z demokracji"},{"type":"paragraph","text":"[przechodzą ustroje] w oligarchię, i to nawet częściej aniżeli w monarchię."},{"type":"paragraph","text":"3. Ponadto nic Sokrates nie mówi o tyranii, ani czy ulega ona przemianom, ani czy nie, a jeśli ulega, to z jakiej przyczyny i w jaki ustrój przechodzi. Pochodzi to stąd, że niełatwo by mu to przyszło powiedzieć. Nie daje się to bowiem określić, skoro według niego tyrania powinna by przejść w najprzedniejszy i najlepszy ustrój, bo tylko w takim razie istniałaby ciągłość i zamknięty krąg przemian ustrojowych. Tymczasem tyrania przechodzi i w tyranię, jak np. w Sykionie, gdzie po tyranii Myrona nastąpiła tyrania Klejstenesa113, i w oligarchię, jak było z tyranią Antileonta w Chalkis114, i w demokrację, jak tyrania następców Gelona w Syrakuzach, i w arystokrację, jak tyrania Charilaosa w Lacedemonie 115 i tyrania w Kartaginie116."},{"type":"paragraph","text":"4. W tyranię znów przechodzi też i oligarchia, jak to było na Sycylii z wszystkimi niemal oligarchiami: i tak w Leontinoj przeszła oligarchia w tyranię Panajtiosa117, w Geli w tyranię Kleandra118, w Region w tyranię Anaksylaosa119, a tak samo było w wielu innych miastach."},{"type":"paragraph","text":"Bezpodstawne jest też jego twierdzenie, że przejście w oligarchię dlatego się dokonuje, ponieważ ludzie zajmujący urzędy są chciwi pieniędzy i uprawiają lichwę, a nie dlatego, że ludzie znacznie górujący majątkiem uważają za niesprawiedliwe, aby ci, co nic nie posiadają, mieli równy udział w rządach, jak posiadający. W wielu oligarchiach robienie interesów pieniężnych nie jest dozwolone, przeciwnie, są prawa zabraniające tego, w Kartaginie zaś, która ma ustrój demokratyczny, robi się takie interesy, a jednak dotąd nie przyszło tu do zmiany ustroju."},{"type":"paragraph","text":"5. Tak samo nieuzasadnione jest twierdzenie, że oligarchia przedstawia dwa państwa: bogatych i ubogich. Dlaczegóż miałoby tak być w tym tylko ustroju, a nie i w lakońskim również lub jakimkolwiek innym, w którym nie wszyscy równą posiadają własność lub też nie wszyscy pochodzą z równie szlachetnych rodów?"},{"type":"paragraph","text":"Przecież choć nikt nie został biedniejszy, aniżeli był poprzednio, przechodzą mimo 113 Myron był synem założyciela tyranii w Sykionie, Ortagorasa, a Klejstenes jego bratem stryjecznym, który po zamordowaniu Myrona zdołał jednak opanować sytuacje i ujął władzę w swe ręce."},{"type":"paragraph","text":"114 Skądinąd nieznany."},{"type":"paragraph","text":"115 Charilaos lub Charillos, król spartański z rodziny Eurypontydów, miał panować w IX w."},{"type":"paragraph","text":"p.n.e. Na okres jego rządów przypadałaby działalność prawodawcza Likurga. Według wersji, za którą idzie tu Arystoteles, miał on jakoby władać w sposób samowolny („tyrański”), aż obalony został przez Likurga; według innej tradycji, podporządkował się reformom Likurga."},{"type":"paragraph","text":"116 Imię tyrana wypadło lub nie było znane autorowi. Może jednak powinno tu być „w Chalkedonie”, jak przyjmują niektórzy wydawcy, zwłaszcza że i Arystoteles nazywa ustrój Kartaginy demokratycznym. Greckie nazwy Karchedon (Kartagina) i Kalchedon (Chalkedon) z łatwością mogły być pomylone."},{"type":"paragraph","text":"117 Por. wyżej, rozdz. 8, § 4 i przypis 71."},{"type":"paragraph","text":"118 Między 505 a 498 r."},{"type":"paragraph","text":"119 W latach 494-475."},{"type":"paragraph","text":"146"},{"type":"paragraph","text":"to z oligarchii do demokracji, jeśli ubodzy zyskają większość, i z demokracji do oligarchii, jeśli zamożni wezmą górę nad pospólstwem, a jedni zaniedbują swe interesy, drudzy zaś bacznie ich pilnują. Choć wiele jest przyczyn, które wywołują przemiany ustrojów, Sokrates wymienia tylko jedną, a mianowicie, iż ludzie przez rozrzutność i długi lichwiarskie ubożeją, jak gdyby wszyscy, czy też większość ich od początku była bogaczami."},{"type":"paragraph","text":"6. Jest to jednak zupełnie błędne; przeciwnie, bywa tak, że obywatele grający przewodnią rolę, gdy stracą swój majątek, wszczynają przewroty, a natomiast, jeśli się to innym przydarzy, nic z tego poważniejszego nie wynika. Dokonywane w takim razie przewroty bynajmniej też nie idą częściej w kierunku demokracji niż innego ustroju. Dochodzi nadto do zaburzeń i zmian ustroju, jeśli ludzie nie mają dostępu do godności, jeśli są niesprawiedliwie albo i zelżywie traktowani, choćby nawet nie roztrwonili majątku 120 dlatego, że wolno im robić, co zechcą."},{"type":"paragraph","text":"Przyczyną tego jest, zdaniem Sokratesa, nadmierna wolność. A choć wiele jest rodzajów oligarchii i demokracji, Sokrates mówi o ich przemianach tak, jak gdyby obie jednego tylko były rodzaju."}],"audio_pl":["audio/ch05-part000.mp3","audio/ch05-part001.mp3","audio/ch05-part002.mp3","audio/ch05-part003.mp3","audio/ch05-part004.mp3","audio/ch05-part005.mp3","audio/ch05-part006.mp3","audio/ch05-part007.mp3","audio/ch05-part008.mp3","audio/ch05-part009.mp3","audio/ch05-part010.mp3","audio/ch05-part011.mp3"]},{"id":"księga-szósta","number":7,"title":"Księga szósta","blocks":[{"type":"paragraph","text":"1. Jak należy urządzić ustrój demokratyczny?"},{"type":"paragraph","text":"Założeniem jego jest wolność, równość i sprawiedliwość."},{"type":"paragraph","text":"Trudności przy realizowaniu tych zasad"},{"type":"paragraph","text":"1. Była więc mowa poprzednio, jak liczne i jakiego rodzaju są różnice, występujące w obradującej i rozstrzygającej władzy państwowej, tudzież różnice w organizacji urzędów i sądów, przy czym wskazano, jaka forma odpowiada temu czy innemu ustrojowi; mówiliśmy następnie o upadku i zachowaniu ustrojów, a mianowicie, jakie są początki i przyczyny obu tych zjawisk. Skoro zaś się okazało, że jest więcej rodzajów demokracji, a podobnie innych ustrojów, nie od rzeczy będzie rozważyć, co, być może, jeszcze w tym względzie pozostało do powiedzenia, i podać właściwy, poszczególnym ustrojom odpowiadający sposób urządzenia."},{"type":"paragraph","text":"2. Ponadto, przy wszystkich tych formach, które omówiliśmy, należałoby rozważyć ich różne połączenia, bo te ich kombinacje pociągają za sobą przemianę ustrojów, tak że arystokracje przybierają charakter oligarchiczny, a politeje bardziej demokratyczny. Mówiąc o połączeniach, które należy rozpatrzyć, a które dotąd rozpatrywane nie były, mam na myśli np. wypadek, kiedy rada i wybory urzędników są urządzone w sposób oligarchiczny, natomiast sądy arystokratycznie, 120 W tekście prawdopodobnie luka, jak to przyjmował B. Schneider, a za nim Immisch."},{"type":"paragraph","text":"147"},{"type":"paragraph","text":"albo te ostatnie i rada oligarchicznie, a wybory urzędników arystokratycznie, albo też jakiekolwiek inne wypadki, w których nie wszystkie cechy właściwe pewnemu ustrojowi rzeczywiście w nim występują."},{"type":"paragraph","text":"3. Jakiego więc rodzaju demokracja jakiemu państwu odpowiada i, tak samo, jaka oligarchia do jakiej ludności jest dostosowana, tudzież który z innych ustrojów jest pewny, [obywatelom] pożyteczny, o tym poprzednio była mowa1. Powinno się jednak jasno wiedzieć nie tylko, który z tych ustrojów jest dla państw najlepszy, ale także, w jaki sposób należy i te, i inne ustroje wprowadzać, i to chcę pokrótce rozważyć. Zacznijmy najpierw od demokracji, bo równocześnie wystąpi jasno przeciwny jej ustrój, tj. ten, który pewni ludzie nazywają oligarchią."},{"type":"paragraph","text":"Przy badaniu tym należy wziąć pod uwagę wszelkie urządzenia demokratyczne i zjawiska uchodzące za nieodłączne od demokracji. Z ich połączenia bowiem wynikają pewne rodzaje demokracji, tak że istnieje nie jedna jej forma, lecz więcej różniących się od siebie odmian. Dwie są mianowicie przyczyny, które powodują, że jest więcej demokracji. Jedna to podana wyżej2, a więc że masy ludu bywają różnego rodzaju; w jednym wypadku składają się bowiem z rolników, w innych z rzemieślników czy też wyrobników. Jeśli więc do pierwszej klasy ludności dołączy się druga i znów do nich obu trzecia, to nie tylko zaznacza, się różnica co do tego, że demokracja staje się lepszą czy gorszą, ale w ogóle nie pozostaje już ona tą samą."},{"type":"paragraph","text":"5. Druga przyczyna to ta, o której obecnie mówimy. Urządzenia mianowicie, towarzyszące demokracjom i uchodzące za właściwe temu ustrojowi, stwarzają zależnie od swego połączenia różne odmiany demokracji: w jednym wypadku bowiem znajdzie zastosowanie mniej urządzeń, w drugim więcej, w innym jeszcze"},{"type":"paragraph","text":"— te wszystkie. Znajomość każdego z nich jest jednak pożyteczna, czy to by zaprowadzić demokrację, jakiej ktoś pragnie w danym wypadku, czy też by istniejącą naprawić. Bo twórcy ustrojów starają się zestawić wszystkie urządzenia, które zamierzonej formie ustrojowej są właściwe, ale postępowanie takie jest błędne, jak to wykazano poprzednio w uwagach poświęconych upadkowi i utrzymaniu ustroju3."},{"type":"paragraph","text":"Omówimy teraz podstawy różnych ustrojów demokratycznych, charakter ich i cele, do których zmierzają."},{"type":"paragraph","text":"4. Założeniem ustroju demokratycznego jest wolność. Tak się też pospolicie mówi, że jedynie w tej formie zażywają obywatele wolności i to właśnie"},{"type":"paragraph","text":"— powiadają — ma na celu demokracja. Jedną cechą wolności jest to, że się na przemian to słucha, to rozkazuje. Bo prawo w ujęciu demokratycznym polega na tym, że za podstawę równości przyjmuje się liczbę, nie wartość. Jeśli się zaś tak ujmuje prawo, to tłum jest z konieczności czynnikiem rozstrzygającym i co większość uchwali, jest ostatecznie załatw
