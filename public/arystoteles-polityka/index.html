 gorszy. Zawsze mianowicie lepszy musi być ustrój, który jest tegoż najbliższy, a gorszy ten, który jest więcej oddalony od owego środka, o ile ktoś nie sądzi na podstawie pewnych szczególnych okoliczności. Chcę zaś przez to powiedzieć, że choć często inny ustrój jest lepszy, to jednak wcale to nie przeszkadza, iż dla niektórych państw korzystniej jest utrzymać ustrój odmienny."},{"type":"paragraph","text":"32 Kogo Arystoteles ma na myśli, nie wiadomo. Może chodzi o Pittakosa z Lesbos, tylko że sam Arystoteles powiada wyżej (ks. II, rozdz. 9, § 9), że Pittakos był „twórcą praw, lecz nie ustroju”."},{"type":"paragraph","text":"101"},{"type":"paragraph","text":"10. Jaki ustrój jest korzystny dla pewnych grup społecznych?"},{"type":"paragraph","text":"Jakie środki stosują oligarchie i demokracje dla utrzymania ustroju?"},{"type":"paragraph","text":"1. W związku z powyższymi wywodami przychodzi nam z kolei rozważyć, który ustrój i jak urządzony korzystny jest dla pewnych ludzi i jakich. Przede wszystkim trzeba ustalić tu ogólną, wszystkie ustroje zarówno obowiązującą regule. Ta część obywateli, która chce utrzymania ustroju, musi być silniejsza od tej, która tego nie chce. W każdym państwie zaś wchodzi w rachubę wzgląd na jakość i ilość. Mówiąc o jakości mam na myśli wolność, bogactwo, wykształcenie i szlachectwo, natomiast przy ilości przewagę liczby."},{"type":"paragraph","text":"2. W jednej z części, z których się składa państwo, może występować czynnik jakościowy, w innej zaś ilościowy, a więc np. mogą ludzie pospolitego pochodzenia górować do co liczby nad ludźmi szlachetnego rodu lub też ubodzy nad bogatymi, nie na tyle jednak, żeby przewaga ilościowa wyrównywała różnicę jakościową."},{"type":"paragraph","text":"Dlatego oba te czynniki winny być złączone w odpowiednim stosunku wzajemnym."},{"type":"paragraph","text":"Gdzie zatem liczba ubogich przewyższa podany stosunek, tam powstaje z natury rzeczy demokracja, i to we wszystkich swoich rodzajach zależnie od tego, jaka klasa ludu ma przewagę; a więc pierwsza forma demokracji występuje, jeśli przeważa liczba rolników, ostatnia zaś, jeśli górują liczebnie rzemieślnicy i wyrobnicy, a podobnie jest z innymi formami pośrednimi między tymi."},{"type":"paragraph","text":"3. Gdzie natomiast grupa osób bogatych i znamienitych w wyższym stopniu góruje jakością, niż nie dorównuje ilością, tam powstaje oligarchia i znów w ten sam sposób wszelkie jej formy, zależnie od większej czy mniejszej przewagi oligarchów. Prawodawca musi jednak zawsze w swój ustrój włączyć stan średni: jeśli bowiem ustanawia prawa w duchu oligarchicznym, to musi mieć na względzie stan średni, jeśli zaś w duchu demokratycznym, to musi się starać o pozyskanie go dla tych praw."},{"type":"paragraph","text":"4. Gdzie jednak masa stanu średniego posiada przewagę albo nad obu skrajnymi obozami, albo tylko nad jednym z nich, tam ustrój może być trwały. Nie ma tu bowiem najmniejszej obawy, aby bogaci połączyli się kiedykolwiek z ubogimi przeciw stanowi średniemu. Nigdy przecież jedni z nich nie zechcą służyć drugim, a jeśli będą szukać ustroju więcej ogółowi odpowiadającego, nie znajdą innego jak tylko ten pośredni. Bo na to, aby rządzić na przemian, nigdy się nie zgodzą ze względu na wzajemną nieufność. Rozjemca natomiast wszędzie cieszy się największym zaufaniem, a takim rozjemcą jest tu stan średni. Im bardziej zaś ustrój jest mieszany, tym większą wykazuje trwałość."},{"type":"paragraph","text":"5. Wielu [prawodawców], nawet i takich, którzy chcą stworzyć ustroje arystokratyczne, popełnia ten błąd, że nie tylko zbyt wiele ustępstw czyni bogatym, lecz jeszcze lud oszukuje. Z czasem przecież z tego, co niesłusznie uchodzi za dobre, musi wyniknąć istotne zło, bo zachłanność bogatych prędzej rozprzęga ustroje niż zachłanność ludu."},{"type":"paragraph","text":"6. Takich pozornie korzystnych dla ludu urządzeń ustrojowych, którymi się go 102"},{"type":"paragraph","text":"łudzi, jest pięć; dotyczą one zgromadzenia ludowego, urzędów, sądów, uzbrojenia i ćwiczeń cielesnych."},{"type":"paragraph","text":"Co do zgromadzenia ludowego, bywa postanowienie, że wszyscy są uprawnieni do udziału, ale karę za uchylanie się od uczestnictwa nakłada się albo tylko na bogatych, albo na bogatych o wiele większą. Co do piastowania urzędów, bywa zarządzenie, że posiadającym odpowiedni cenzus majątkowy pod przysięgą nie wolno się od nich wymawiać, natomiast ubodzy mają w tym względzie swobodę."},{"type":"paragraph","text":"Co do sądów znów, ustanawia się karę na bogatych, jeśli się wzbraniają zasiadać w sądach przysięgłych, ubogim zaś uchodzi to bezkarnie, albo też na pierwszych nakładają wielką karę, a na drugich nieznaczną, jak to jest w prawach Charondasa."},{"type":"paragraph","text":"7. Gdzie indziej prawo uczestniczenia w zgromadzeniach ludowych i sądach przysięgłych przysługuje wszystkim, którzy się zapisali na listę; jeśli jednak po zapisaniu nie biorą udziału w zgromadzeniach czy w sądach, nakłada się na nich wysokie kary, aby ze względu na karę nie kwapili się zbytnio do zapisywania, a tym samym nie posiadali dostępu czy do sądów, czy do zgromadzeń ludowych."},{"type":"paragraph","text":"W taki sam sposób ujmuje się postanowienia prawne co do posiadania broni i co do ćwiczeń cielesnych; ubodzy bowiem nie są zobowiązani do posiadania broni, na bogatych zaś nakłada się karę, jeśli jej nie posiadają; w razie zaniedbywania przepisanych ćwiczeń fizycznych pierwszym nie grozi żadna kara, podczas gdy bogaci podlegają karze, bo chodzi tu o to, aby jedni brali udział w ćwiczeniach ze względu na karę, a drudzy, nie potrzebując się jej obawiać, raczej od nich stronili."},{"type":"paragraph","text":"Takie to są oligarchiczne sztuczki prawodawcze."},{"type":"paragraph","text":"8. W demokracjach jednak stosują również odpowiednie do tego pomysły."},{"type":"paragraph","text":"Ubogim bowiem przyznają wynagrodzenie za udział w zgromadzeniach ludowych i sądach przysięgłych, a bogatym żadnej nie wyznaczają kary [za to, że od nich stronią]. Toteż jest widoczne, że jeśli ktoś chce tu sprawiedliwą stworzyć mieszaninę, to powinien złączyć oba postanowienia i przyznać pierwszym wynagrodzenie, a na drugich nałożyć karę; w takim razie bowiem wszyscy będą brać udział w życiu publicznym, podczas gdy w innym wypadku rządy w państwie dostaną się wyłącznie w ręce tej lub tamtej grupy. Rządy w państwie winni zaś ci tylko sprawować, którzy posiadają broń. Jednak wysokości cenzusu majątkowego nie można w krótkiej drodze oznaczyć i powiedzieć, że winno być tyle a tyle, lecz trzeba go określić po zbadaniu, jaka byłaby najwyższa stawka, przy której dopuszczeni do rządów w państwie przedstawialiby większą liczbę niż nie dopuszczeni."},{"type":"paragraph","text":"9. Bo ubodzy, choć i nie mają dostępu do godności, chętnie spokój zachowują, jeśli ich ktoś nie traktuje wzgardliwie, ani też nie uszczupla ich mienia (nie jest to jednak łatwe, bo ci, co dzierżą władzę w państwie, nie zawsze miewają ogładę)."},{"type":"paragraph","text":"Zwykli też, gdy wojna wybuchnie, wzbraniać się przed udziałem, jeśli nie dostają utrzymania mimo swego ubóstwa; jeśli jednak zapewni się im utrzymanie, chętnie ruszają na wojnę."},{"type":"paragraph","text":"10. W niektórych państwach w szeregi pełnouprawnionych obywateli wchodzą nie tylko ci, co pełnią służbę wojskową jako ciężkozbrojni, ale i ci, co ją już 103"},{"type":"paragraph","text":"odbyli; taki ustrój był też u Malijczyków33, tylko że urzędników dobierali z tych, którzy jeszcze zdolni byli do służby wojskowej. U Greków w pierwszych czasach po zniesieniu królestwa rządy w państwie spoczęły w rękach wojowników i to z początku rycerzy (bo jazda stanowiła o sile i przewadze w wojnie; ciężkozbrojna piechota bez odpowiedniej taktyki jest bowiem nieużyteczna, a w dawnych czasach nie było w tym względzie doświadczenia i znajomości zasad wojowania, tak że siła wojskowa opierała się na jeździe). Ze wzrostem państw i wzmożeniem się znaczenia ciężkozbrojnych wzrosła też liczba biorących udział w rządach. Dlatego dzisiejsze politeje nazywano dawniej demokracjami."},{"type":"paragraph","text":"11. Ze zrozumiałych przyczyn dawne państwa miały ustrój oligarchiczny i królewski. Z powodu niewielkiej liczby ludności nie posiadały mianowicie licznego stanu średniego, tak że lud nieliczny i niezorganizowany łatwiej znosił"},{"type":"paragraph","text":"panowanie innych."},{"type":"paragraph","text":"Wyłożyliśmy tedy, z jakiego powodu istnieje większa ilość ustrojów i dlaczego prócz tych, o których zwyczajnie się mówi, są inne jeszcze (bo demokracja nie jest co do liczby jedna, a podobnie jest i z innymi ustrojami), ponadto jakie są między nimi różnice i z jakiej przyczyny one występują, i w końcu, jaki ustrój — jest ogólnie mówiąc, najlepszy, a jaki spośród innych jakim ludziom odpowiada."},{"type":"paragraph","text":"11. Części składowe każdego ustroju."},{"type":"paragraph","text":"Czynnik obradujący"},{"type":"paragraph","text":"1. Nasuwające się z kolei zagadnienia pragniemy znów omówić zarówno ogólnie, jak i każde z osobna, przyjąwszy odpowiedni do tego punkt wyjścia."},{"type":"paragraph","text":"Wszystkie ustroje mają trzy części składowe, toteż mądry prawodawca musi się nad tym zastanowić, co jest dla każdej z nich pożyteczne; jeśli się one przedstawiają dobrze, to i ustrój musi być dobry, a różnice między nimi stanowią także o różnicy ustrojów. Jedną z tych trzech części jest czynnik obradujący nad sprawami państwowymi, drugą czynnik rządzący (bierze się przy tym pod uwagę, jakie winny być urzędy, jaki ich zakres władzy i jaki sposób ich wyboru), trzecią zaś czynnik sądzący."},{"type":"paragraph","text":"Czynnik obradujący rozstrzyga o pokoju i wojnie, o zawarciu i zerwaniu przymierza, o prawach, o [karze] śmierci, wygnania i konfiskaty mienia, o wyborze urzędników i ich kontroli."},{"type":"paragraph","text":"2. Z konieczności rozstrzygnięcia we wszystkich tych sprawach albo spoczywają w rękach wszystkich obywateli, albo tylko niektórych, a więc pewnej jednej władzy czy też i kilku władz, albo też w pewnych wypadkach powierza się rozstrzygnięcia różnym władzom, albo w końcu pewne rozstrzygnięcia oddaje się wszystkim, a pewne tylko niektórym. To, że wszyscy o wszystkim decydują, jest cechą demokratyczną, bo lud dąży do takiej równości."},{"type":"paragraph","text":"33 Mieszkańcy krainy Malis w środkowej Grecji nad zatoką Morza Egejskiego tej samej nazwy."},{"type":"paragraph","text":"104"},{"type":"paragraph","text":"3. Jeśli rozstrzygnięcie spoczywa w rękach wszystkich, to dokonuje się to w różnych formach. Jedna z nich polega na tym, że obywatele nie działają wszyscy gromadnie, lecz w pewnej kolejności. (Tak jest w ustroju Teleklesa z Miletu34; także i w innych ustrojach urzędnicy obradują na wspólnych zebraniach, ale na urzędy dostają się wszyscy obywatele kolejno z fyl i najmniejszych poddziałów, aż wszyscy się przez kolejkę przesuną.) Schodzą się zaś wszyscy tylko wówczas, gdy chodzi o zagadnienia ustawodawcze i ustrojowe lub o wysłuchanie obwieszczeń urzędników."},{"type":"paragraph","text":"4. Druga forma przejawia się w tym, że rozstrzygają wszyscy gromadnie, ale zbierają się tylko dla wyboru urzędników, dla uchwalenia praw, dla powzięcia uchwały w sprawie pokoju i wojny, dla przyjęcia sprawozdań z działalności urzędników, podczas gdy nad innymi sprawami radzą urzędnicy powołani do odpowiednich zadań w drodze wyboru spośród wszystkich lub przez losowanie."},{"type":"paragraph","text":"Trzecia znów forma polega na tym, że obywatele schodzą się na wybory urzędników i dla przyjęcia sprawozdań z ich działalności oraz dla obrad nad wojną i przymierzem, podczas gdy resztę spraw załatwiają urzędnicy, o ile możności wybierani, co wówczas zwłaszcza jest konieczne, gdy chodzi o urzędy wymagające rzeczowych wiadomości."},{"type":"paragraph","text":"5. W czwartej formie wszyscy na wspólnym zebraniu obradują nad wszystkim, urzędnicy zaś o niczym nie stanowią, a tylko wydają uprzedzające uchwałę ludu orzeczenie. W ten sposób właśnie rządzi się dziś skrajna demokracja, która jest, jak powiadam, odpowiednikiem oligarchii wielmożów i monarchii o charakterze tyranii. To są zatem wszystkie te formy demokratyczne."},{"type":"paragraph","text":"6. Jeśli zaś rozstrzygnięcie we wszystkich sprawach spoczywa w rękach kilku"},{"type":"paragraph","text":"[ludzi], to jest to oligarchia. Ta również wykazuje więcej odmian. Jeśli mianowicie przeprowadza się wybory według umiarkowanego cenzusu majątkowego, skutkiem czego więcej ludzi ma dostęp do rządów, a ludzie nie naruszają żadnego z przepisów prawnych, ale się do nich stosują, jeśli nadto osiągnięcie cenzusu daje prawo do udziału w rządach, to jest to wprawdzie oligarchia, ale o charakterze politei ze względu na zachowanie umiaru. Jeśli natomiast nie wszyscy są dopuszczeni do obrad, lecz tylko wybrani, rządzą jednak według prawa jak w poprzednim przypadku, to jest to oligarchia. Jeśli zaś członkowie rady sami się uzupełniają przez wybór lub jeśli syn wchodzi na miejsce ojca, a rząd stoi ponad prawem, to porządek taki jest oczywiście oligarchiczny35."},{"type":"paragraph","text":"7. Jeśli natomiast o pewnych sprawach, jak o wojnie, pokoju i przyjęciu sprawozdań urzędników, decydują wszyscy36, o innych zaś sprawach urzędnicy, i to wybierani, nie 34 Skądinąd nieznany."},{"type":"paragraph","text":"35 Tak w przekazanym tekście (όλιγαρχνκήν τάξιν). Tok myśli domagałby się jednak tu silniejszego podkreślenia tej formy oligarchii i przeciwstawienia jej poprzedniej, stąd wydawcy proponują tu poprawkę: „więcej oligarchiczny” lub „ustrój wielmożów” albo „władanie oligarchów” itp."},{"type":"paragraph","text":"36 Tak według tekstu Imrnischa, który śladem znacznej grupy rękopisów opuszcza τινές jako psujące tok myśli. Przy zachowaniu τινές należałoby tłumaczyć: “jeśli o pewnych sprawach rozstrzygają pewni ludzie, a więc o wojnie…. wszyscy, o innych zaś urzędnicy”."},{"type":"paragraph","text":"105"},{"type":"paragraph","text":"12. Czynnik rządzący"},{"type":"paragraph","text":"1. Łączy się z tym z kolei rozważanie poświęcone urzędom [kierowniczym]."},{"type":"paragraph","text":"Bo także i ta dziedzina ustroju wykazuje wiele różnic, dotyczących ilości urzędów, zasięgu ich władzy, czasu trwania każdego (bo jedni wybierają urzędników na sześć miesięcy, inni na krótszy czas, jedni na rok, drudzy na dłużej), zagadnienia, czy urzędy powinny być dożywotnie, czy długoletnie, czy też ni jedno, ni drugie, lecz czy ci sami ludzie powinni by wielokrotnie ten sam urząd piastować, czy też nikt nie powinien go piastować dwa razy, a tylko raz jeden."},{"type":"paragraph","text":"2. Poza tym trzeba rozważyć zagadnienie obsadzania urzędów, kto winien być na nie powoływany, przez kogo i w jaki sposób. By na to wszystko odpowiedzieć, trzeba uwydatnić wszystkie możliwości, jakie przy tym zajść mogą, a następnie wyszukać stosowne urządzenia, jakie pewnym ustrojom odpowiadają. Ale nawet tego nie da się tak łatwo określić, co należałoby nazwać [urzędem czy] władzą. Bo wspólnota państwowa wymaga wielu kierowników, stąd też nie wszystkich, którzy są wybrani czy losowani, należy uważać za przedstawicieli władzy, tak np."},{"type":"paragraph","text":"w pierwszym rzędzie kapłanów (ta godność bowiem musi być uznana za coś odmiennego od urzędów państwowych), poza tym choregów39, heroldów oraz posłów, którzy przecież też są wybierani."},{"type":"paragraph","text":"3. Zadania urzędowe mają częściowo charakter polityczny i obejmują albo wszystkich obywateli pociąganych do pewnych czynności, jak np. zadania wodza w polu, albo pewną część ludności, jak to jest na urzędzie opiekuna kobiet i dzieci; częściowo mają one charakter gospodarczy (jak urząd dozorców targowych, których w wielu państwach ustanawiają), częścią w końcu charakter służebny, gdy chodzi o czynności, których pełnienie zleca się niewolnikom, jeśli są na to odpowiednio duże środki. Urzędami w ścisłym tego słowa znaczeniu należy jednak nazwać przede wszystkim takie stanowiska, na których przysługuje prawo naradzania się nad pewnymi sprawami, rozstrzygania i wydawania rozporządzeń, zwłaszcza to ostatnie, bo prawo wydawania rozporządzeń jest najistotniejszą cechą władzy urzędowej. W praktyce rozróżnienie to nie wchodzi oczywiście zupełnie w rachubę, bo nigdy się nie zdarzyło, by przedmiotem sporu była nazwa, jednakowoż ma ono pewne inne znaczenie teoretyczne."},{"type":"paragraph","text":"4. [Tu nasuwa się jednak raczej pytanie], jakie urzędy i w jakiej liczbie są konieczne, jeśli państwo ma istnieć, a jakie nie są wprawdzie konieczne, ale pożyteczne dla sprawnego działania państwa; dotyczy zaś to pytanie każdego państwa, zwłaszcza państw małych. Bo w wielkich dla każdej sprawy może i powinna być ustanowiona oddzielna władza. Wobec wielkiej liczby obywateli może wielu przejść przez stanowiska urzędowe, tak że jedne piastują w dłuższych odstępach czasu, inne nawet raz jeden, z drugiej zaś strony każda praca lepiej na 39 Obywatele, którzy swoim kosztem wystawiali chór przy agonach dramatycznych."},{"type":"paragraph","text":"106"},{"type":"paragraph","text":"tym wychodzi, gdy się jej ktoś wyłącznie poświęca, aniżeli gdy się ich kilka naraz łączy."},{"type":"paragraph","text":"5. W małych państwach natomiast konieczność zmusza do skupienia wielu urzędów w rękach niewielu osób, bo z powodu niewielkiej liczby ludności niełatwo jest osadzić wielu ludzi na urzędach; a jakżeż tu znaleźć znów ich następców? Małe państwa co prawda potrzebują nieraz tych samych władz i praw, co i wielkie, tylko że jedne potrzebują ich często, a drugim zdarza, się to w znacznych odstępach czasu. Dlatego nic nie stoi na przeszkodzie, by tej samej osobie zlecić różnorodne czynności jednocześnie, bo jedna drugiej nie przeszkadza, niewielka zaś liczba ludności zmusza do takiego postępowania z urzę-"},{"type":"paragraph","text":"dami, jak to się robi z przyrządem, który służy równocześnie za rożen i za świecznik."},{"type":"paragraph","text":"6. Jeślibyśmy więc mogli powiedzieć, ile urzędów powinno być koniecznie w każdym państwie, a ile nie, to łatwiej wiedząc to można by ustalić, jakie urzędy dają się złączyć odpowiednio w jeden."},{"type":"paragraph","text":"Nie należy i o tym zapominać, jakimi sprawami, zależnie od miejscowości, powinno by się zająć więcej władz, jakie zaś sprawy winna by wszędzie jedna władza załatwiać, a więc np. czy o porządek na placu targowym ma się troszczyć tu urzędnik sprawujący pieczę nad targowiskiem (άγορανόµος), gdzie indziej zaś jakiś inny urzędnik, czy też wszędzie [ma być] ten sam. [Istnieje też pytanie], czy urzędy trzeba dzielić według czynności, czy też według osób, czy np. ma być jedna władza mająca nadzór nad obyczajami, czy też inna dla dzieci, a inna dla kobiet."},{"type":"paragraph","text":"7. W stosunku do ustroju [nasuwa się pytanie], czy w każdym z nich występują różnice również i co do rodzajów urzędów, czy też nie; czy zatem np. w demokracji, oligarchii, arystokracji i monarchii te same urzędy są w posiadaniu najwyższej władzy, a tylko piastujący je dobierani są nie z tych samych, ani nawet ze zbliżonych klas, lecz czy tylko tu z tej, tam z innej klasy, a więc np. w arystokracjach spośród wykształconych, w oligarchiach z bogatych, w demokracjach spośród wolnych; czy też zachodzą pewne różnice i co do samych urzędów i te same urzędy tutaj są równe, a gdzie indziej różne, bo w jednym państwie uznano za stosowne wyposażyć tę samą władzę w wielkie uprawnienia, w innym natomiast w małe."},{"type":"paragraph","text":"8. W istocie [różnice są tu tak znaczne, że] pewne urzędy związane są z określonym rodzajem ustroju; tak np. probulowie nie są urządzeniem demokratycznym, jest nim natomiast rada. Musi istnieć bowiem jakaś władza, której zadaniem jest omawianie spraw, zanim się je przedłoży ludowi, by ten nie tracił"},{"type":"paragraph","text":"na to czasu. Władza ta ma charakter oligarchiczny, jeśli liczy niewielu członków, że zaś ta mała liczba z konieczności wynika z istoty urzędu probulów, więc jest ona związana z oligarchią. Gdzie jednak obie te władze występują, tam probulowie stają ponad radą i wykonują swe zadania jako organ oligarchii w przeciwieństwie do demokratycznej rady."},{"type":"paragraph","text":"9. Znaczenie rady upada jednak w takich demokracjach, gdzie lud sam na zgromadzeniach roztrząsa wszelkie sprawy. Dzieje się to zwykle wówczas, gdy za 107"},{"type":"paragraph","text":"udział w zgromadzeniach ludowych dają uczestnikom pewne dostatnie wynagrodzenie 40. Bo mając czas wolny, często się zbierają i wszystko sami rozsądzają."},{"type":"paragraph","text":"Władze nadzorujące chłopców i kobiety jako też inne ewentualnie urzędy, którym zlecono tego rodzaju nadzór, mają charakter arystokratyczny, nie demokratyczny (bo jakże można zabronić wychodzenia żonom ubogich?), ale i nie oligarchiczny (bo żony oligarchów prowadzą swobodny tryb życia). Na razie jednak dość tych uwag na ten temat."},{"type":"paragraph","text":"10. Z kolei trzeba spróbować omówić [gruntownie] zagadnienie obsadzania urzędów. Różnice sprowadzają się tu do trzech punktów, których kombinacje z konieczności pozwalają ująć wszystkie możliwe wypadki. Oto te trzy punkty: po pierwsze, kto obsadza, po drugie, z jakiego ośrodka, po trzecie, w jaki sposób."},{"type":"paragraph","text":"Każdy z tych trzech punktów wykazuje znów trzy różne możliwości: bo albo wszyscy obywatele ustanawiają urzędników, albo [tylko] niektórzy, i to albo spośród wszystkich, albo spośród pewnej określonej grupy, np. według cenzusu majątkowego albo pochodzenia, albo według cnoty, czy też czegoś podobnego (tak np. w Megarze dokonano obsady urzędów spośród tych, co z wygnania wrócili i uczestniczyli w walce przeciw demokracji), a to znów albo w drodze wyboru, albo losowania."},{"type":"paragraph","text":"11. Trzecią możliwość stanowi kombinacja tych poprzednich, polegająca na tym, że jedną część urzędów obsadzają niektórzy, inną wszyscy, i to jedne ze wszystkich, drugie spośród niektórych obywateli, jedne w drodze wyboru, inne przez losowanie."},{"type":"paragraph","text":"W każdym z tych wypadków będą znów cztery różne możliwości. Albo mianowicie pewien urząd obsadzają wszyscy w drodze wyboru spośród wszystkich, albo też wszyscy spośród wszystkich przez losowanie; a jeśli spośród wszystkich, to albo według podziału np. na fyle, demy i fratrie, aż wszyscy obywatele osiągną kolejno daną godność, albo za każdym razem spośród wszystkich bezwzględnie 41"},{"type":"paragraph","text":"albo też jedne urzędy obsadza się w ten sposób, drugie w inny sposób42."},{"type":"paragraph","text":"A znów jeśli tylko niektórzy obsadzają, to czynią to albo przez wybór spośród wszystkich, czy też losowanie ze wszystkich, albo przez wybór spośród niektórych czy też losowanie z niektórych, albo wreszcie częściowo w jeden, częściowo w drugi sposób, tzn. część przez wybór spośród wszystkich, część przez losowanie."},{"type":"paragraph","text":"W ten sposób okazuje się dwanaście możliwości poza tymi, które wynikają z kombinacji obu sposobów obsadzania43."},{"type":"paragraph","text":"40 Tekst tu niepewny, tłumaczenie idzie za wydaniem Immischa, który przyjmuje poprawkę Spengla (εύπορία τις f) µισ&οΰ) inni czytają tu εύπορία τις fj ή µισ9ός, a więc: „gdy albo panuje pewien dostatek, albo też dają wynagrodzenie”."},{"type":"paragraph","text":"41 Dwie dalsze możliwości: a więc: 3) wszyscy obywatele obsadzają pewien urząd wybierając kandydatów spośród pewnych tylko obywateli i 4) toż samo, ale przez losowanie — albo zostały świadomie pominięte przez Arystotelesa jako oczywiste, albo też, jak niektórzy przyjmują, jest tu luka w przekazanym tekście."},{"type":"paragraph","text":"42 To jest częścią spośród wszystkich, częścią według różnych ugrupowań kolejno."},{"type":"paragraph","text":"43 Chodzi może o kombinację wyboru czy losowania z zasadą doboru wedhig cenzusu majątkowego, urodzenia, cnoty itp."},{"type":"paragraph","text":"108"},{"type":"paragraph","text":"12. Z tych sposobów obsadzania urzędów dwa są demokratyczne, a więc obsadzanie wszystkich urzędów spośród wszystkich obywateli przez wybór albo przez losowanie, czy też i połączenie obu, tj. obsadzanie urzędów częścią przez losowanie, częścią przez wybór."},{"type":"paragraph","text":"Jeśli natomiast nie wszyscy równocześnie mają prawo obsadzania, lecz urzędy obsadza się spośród wszystkich lub spośród niektórych obywateli, czy to przez losowanie czy przez wybór, czy jedno i drugie, albo też częścią spośród wszystkich, częścią spośród niektórych w jeden i drugi sposób (tzn. jedne przez losowanie, drugie przez wybór) — znamionuje to ustrój zwany politeją. Gdy niektórzy tylko obsadzają urzędy spośród wszystkich, czy to przez wybór, czy przez losowanie, czy i w jeden sposób, i w drugi (tj. jedne w drodze losowania, drugie w drodze wyboru), to jest to cecha oligarchiczna, a bywa ona jeszcze bardziej oligarchiczna, jeśli jeden i drugi sposób znajduje zastosowanie 44."},{"type":"paragraph","text":"13. Jeśli zaś obsadza się urzędy częścią spośród wszystkich, częścią spośród niektórych < albo też jedne w drodze wyboru, i inne przez losowanie > 45, to wskazuje to na politeję z odcieniem arystokratycznym. Gdy niektórzy tylko spośród niektórych urzędy obsadzają, znamionuje to oligarchię bez względu na to, czy dzieje się to przez losowanie (co jednak nie bywa równie często), czy też w jeden i drugi sposób [tj. losowanie i wybór]. Cechą natomiast arystokratyczną jest, jeśli pewni obywatele obsadzają urzędy w drodze wyboru spośród wszystkich albo przeciwnie, wszyscy spośród niektórych."},{"type":"paragraph","text":"Tyle co do liczby sposobów obsadzania urzędów i takie są między nimi różnice zależnie od ustroju. Jasną też rzeczą będzie, jakie sposoby jakim ustrojom odpowiadają i jak się winno dokonywać obsadzanie, a zarazem jaki jest zakres działania poszczególnych urzędów i jaka ich treść. Przez zakres działania rozumiem np. uprawnienia do rozporządzania dochodami lub w dziedzinie utrzymania bezpieczeństwa publicznego. Bo inny rodzaj uprawnień przedstawia władza taka, jak wodza, a inny władza roztaczająca opiekę nad targowicą i handlem."},{"type":"paragraph","text":"13. Czynnik sądzący"},{"type":"paragraph","text":"1. Pozostaje do omówienia trzecia część składowa ustroju — czynnik sądzący."},{"type":"paragraph","text":"Różne jego formy musimy ująć również na tej samej drodze. Różnica między sądami wyraża się w trzech punktach: z jakich osób dobiera się sędziów, co sądzą i jak się ich wybiera. Przy pierwszym punkcie mam na myśli pytanie, czy spośród wszystkich, czy spomiędzy niektórych; przy drugim, jakie są rodzaje sądów; przy trzecim, czy się ich dobiera przez losowanie, czy wybór."},{"type":"paragraph","text":"44 Czyli że wybierają większą liczbę miłych sobie ludzi, a potem przeprowadzają spośród nich losowanie."},{"type":"paragraph","text":"45 Słowa w nawiasach uważa Immisch (za Thurotem) za wtręt późniejszy."},{"type":"paragraph","text":"109"},{"type":"paragraph","text":"Ustalmy więc najpierw, ile jest rodzajów sądów. Otóż jest ich osiem: po pierwsze, sąd dla przyjmowania sprawozdań urzędników; po wtóre, dla przestępstw powodują-"},{"type":"paragraph","text":"cych szkodę dla ogółu; po trzecie, dla zamachów na ustrój państwowy; po czwarte, dla spraw między urzędnikami a osobami prywatnymi o niewłaściwie nałożoną karę; po piąte, dla spraw prywatnych dotyczących umów większego znaczenia, ponadto dla spraw dotyczących rozlewu krwi, tudzież spraw cudzoziemców46."},{"type":"paragraph","text":"2. Sądów o rozlew krwi, czy to o tym samym składzie sędziów, czy o innym, są różne rodzaje zależnie od tego, czy chodzi o zamierzone zabójstwo, czy mimowolne, czy się ktoś przyzna do czynu, a sporne jest tylko jego uprawnienie47, i po czwarte, czy wygnanym za zabójstwo wytacza się nowe oskarżenie przy powrocie — jako przykład tego ostatniego rodzaju podaje się w Atenach sąd zasiadający we Freatto48. Wypadki tego rodzaju zdarzają się jednak zawsze49"},{"type":"paragraph","text":"rzadko, nawet i w wielkich państwach. W sprawach cudzoziemców jest jeden sąd, gdy chodzi o postępowanie cudzoziemców przeciw cudzoziemcom, i drugi, gdy cudzoziemcy wnoszą skargi przeciwko miejscowym. I w końcu oprócz tych wszystkich rodzajów jest jeszcze jeden sąd, dla drobnych spraw spornych, gdy chodzi o drachmę czy pięć drachm, czy niewiele więcej. Bo i takie sprawy muszą znaleźć rozstrzygnięcie, choć nie wymagają one większej liczby sędziów."},{"type":"paragraph","text":"3. Pomińmy jednak te sądy, jak i sądy o rozlew krwi czy sądy dla spraw cudzoziemców, a pomówmy o sądach dla spraw politycznych, bo jeśli te nie działają właściwie, powstają niepokoje i przewroty ustrojowe."},{"type":"paragraph","text":"Z konieczności sądzą tu albo wszyscy obywatele powołam w drodze wyboru lub losowania do sądzenia wszystkich tych spraw rozmaitych, albo też wszyscy sądzą wszelkie sprawy, ale tak, że do jednych są losowani, do drugich wybierani, albo wreszcie sądzą pewne sprawy tego samego rodzaju sędziowie, powołani do tego, jedni przez losowanie, drudzy przez wybór. Są zatem cztery rodzaje tych sądów50. Taka sama liczba okazuje się w wypadku, gdy tylko część [obywateli dopuszczona jest do udziału w sądach]. Bo także w takim razie, jeśli się sędziów powołuje spośród niektórych, to albo sądzą wszelkie sprawy sędziowie powołani w drodze wyboru czy spośród niektórych na podstawie losowania, albo też niektóre sprawy losowani, inne wybierani, albo w końcu niektóre trybunały, sądzące te same sprawy, składają się i z losowanych, i wybieranych sędziów. Takie to są, jak się powiedziało, rodzaje sądów [odpowiadające]51 omówionym już urzędom."},{"type":"paragraph","text":"46 Ósmy rodzaj spraw i załatwiający je sąd podany później w § 2 (drobne sprawy sporne)."},{"type":"paragraph","text":"47 Sprawy tego rodzaju sądził w Atenach sąd zasiadający w Delfinium, czyli w świątyni Apollina, położonej w pd.-wsch. stronie miasta; por. Ustrój polit. Aten, rozdz. 57, § 3."},{"type":"paragraph","text":"48 Por. tamże, rozdz. 57, § 3. Okręg Freatto leżał zapewne na końcu małego półwyspu, zamykającego od wschodu port Zea (na półwyspie Pireusu)."},{"type":"paragraph","text":"49 Tłumaczenie według tekstu Immischa (παντί χρόνφ zamiast przekazanego παρόντι, tj."},{"type":"paragraph","text":"„obecnie”.)"},{"type":"paragraph","text":"50 A więc trybunały: 1) wybierany, 2) losowany, 3) do pewnych spraw wybierany, do innych losowany, 4) w pewnych sprawach częściowo wybierany, częściowo losowany."},{"type":"paragraph","text":"51 W tekście luka, przyjmuję uzupełnienie Newmana."},{"type":"paragraph","text":"110"},{"type":"paragraph","text":"4. Także i one jednak mogą występować w kombinowanej postaci, gdy np."},{"type":"paragraph","text":"część sądów obsadza się spośród wszystkich, część spośród niektórych, a część i z jednych, i z drugich, lub też gdy np. w tym samym trybunale zasiadają sędziowie, powoływani częściowo spośród wszystkich, częściowo spośród niektórych, i to albo w drodze wyboru, albo losowania, albo jedno i drugie."},{"type":"paragraph","text":"Wykazano tedy, ile jest możliwych sposobów składania sądów. Pierwsze z nich, tj."},{"type":"paragraph","text":"te sądy, w których zasiadają sędziowie powoływani spośród wszystkich do sądzenia wszelkich spraw, należą do ustroju demokratycznego, drugie, a więc gdy sędziowie spośród pewnych tylko obywateli dobierani sądzą wszelkie sprawy, do ustroju oligarchicznego, a trzecie, tj. sądy, które są obsadzane częściowo spośród wszystkich obywateli, częściowo spośród niektórych, do ustroju arystokratycznego i do tzw. politei."}],"audio_pl":["audio/ch04-part000.mp3","audio/ch04-part001.mp3","audio/ch04-part002.mp3","audio/ch04-part003.mp3","audio/ch04-part004.mp3","audio/ch04-part005.mp3","audio/ch04-part006.mp3","audio/ch04-part007.mp3","audio/ch04-part008.mp3"]},{"id":"księga-piąta","number":6,"title":"Księga piąta","blocks":[{"type":"paragraph","text":"1. Przyczyny zmian ustroju. Uwagi wstępne"},{"type":"paragraph","text":"1. Niemal wszystkie zagadnienia, których zbadanie zamierzyliśmy, zostały zatem omówione. Po tych wywodach należy z kolei rozważyć przyczyny wywołujące zmianę ustroju, liczbę ich i rodzaj, czynniki, które powodują rozkład każdego ustroju, formy, z których i w które głównie przechodzą ustroje, a nadto środki, podtrzymujące wszystkie ustroje w ogóle i każdy w szczególności, i wreszcie główne przyczyny składające się na zapewnienie trwałości każdego z ustrojów."},{"type":"paragraph","text":"2. Należy tu najpierw stwierdzić, że zostało stworzonych wiele ustrojów, których twórcy wszyscy zgodnie przyjmowali zasadę sprawiedliwości i stosunkowej równości, a tylko błędnie ją rozumieli, jak to już i poprzednio powiedziano1. I tak ustrój demokratyczny był wynikiem mniemania, że ci, którzy są sobie równi pod pewnym względem, są sobie równi w ogóle (a więc, skoro wszyscy jednako wolni się urodzili, to są też sobie bezwzględnie równi). Oligarchia, przeciwnie, wynikła z przekonania, że ci, co wykazują nierówność w jednym względzie, są w ogóle nierówni (przyjmują bowiem, że skoro nierówne posiadają majątki, to w ogóle nie stosuje się do nich zasada równości)."},{"type":"paragraph","text":"3. W następstwie tego jedni jako równi domagają się równego udziału we wszystkich prawach, drudzy jako nierówni żądają większych praw, bo większe prawa są wyrazem nierówności. Otóż wszystkie takie ustroje mają wprawdzie pewne uzasadnienie, ale są wręcz błędne i dlatego, gdy jedni czy drudzy nie mają w rządach udziału odpowiadającego mniemaniom, jakie właśnie żywią, zrywają się do zamieszek. Najwięcej usprawiedliwiony powód do zaburzeń mieliby jednak ci, którzy najbardziej są dalecy od tego, a mianowicie wyróżniający się cnotą obywatele; 1 Por. ks.III, rozdz. 6 i 7."},{"type":"paragraph","text":"111"},{"type":"paragraph","text":"bo [ściśle rzecz biorąc] jedynie oni bezwzględnie wyrastają ponad równość."},{"type":"paragraph","text":"Bywają jednak pewni ludzie, którzy górują znakomitością rodu i ze względu na tę nierówność nie chcą się zadowolić posiadaniem praw równych z innymi; uchodzą bowiem za ludzi znakomitych, którzy się mogą wykazać cnotą i bogactwem przodków."},{"type":"paragraph","text":"4. Takie to są, krótko mówiąc, zarzewia i źródła, [z których wynikają zaburzenia,] dlatego też przewroty dokonują się w dwojaki sposób. W pewnych wypadkach mianowicie [przewrót kieruje się] przeciwko ustrojowi, aby zamiast istniejącego inny zaprowadzić, np. zamiast demokracji oligarchię, czy też demokrację zamiast oligarchii lub zamiast oligarchii i demokracji politeję i arystokrację, czy też na odwrót; w innych zaś wypadkach [buntujący] się nie zwracają się przeciw istniejącemu ustrojowi, owszem, pragną jego utrzymania, a tylko sami chcą ująć władzę, czy to będzie oligarchia, czy monarchia."},{"type":"paragraph","text":"5. Ponadto chodzi przy przewrotach o zmianę w kierunku wzmocnienia lub osłabienia stanu istniejącego, a więc np. o to, aby istniejącą oligarchię ukształtować w duchu jeszcze więcej czy też mniej oligarchicznym, istniejącą demokrację w duchu więcej lub mniej demokratycznym i podobnie pozostałe ustroje albo zaostrzyć, albo złagodzić. Może też zmiana dotyczyć tylko pewnej części ustroju, a więc może polegać na ustanowieniu lub zniesieniu jakiejś władzy, jak to było w Lacedemonie, gdzie podobno Lizander usiłował znieść władzę królewską2, a król Pauzaniasz eforat3."},{"type":"paragraph","text":"6. Również w Epidamnos uległ ustrój częściowej zmianie4, bo na miejsce naczelników fyl wprowadzono radę, natomiast w zgromadzeniu ludowym (ήλιαΐα) muszą jeszcze i teraz brać udział urzędnicy należący do pełnouprawnionych obywateli, gdy się głosuje nad obsadzeniem jakiegoś urzędu; charakter oligarchiczny nadawało też temu ustrojowi istnienie jedynego archonta."},{"type":"paragraph","text":"Zaburzenia wynikające z nierówności powstają wszędzie tam mianowicie, gdzie nierównym nie daje się odpowiedniego odszkodowania5, bo i dożywotnia 2 Lizander, dowódca floty spartańskiej w ostatniej fazie wojny peloponeskiej, a po jej zakończeniu (404 r. p.n.e.) pierwszy obywatel w Sparcie, wysoce popularny w całym świecie greckim, popadł"},{"type":"paragraph","text":"w konflikt z królem Agesilaosem, którego przerastał znaczeniem, i nosił się podobno z planami przekształcenia ustroju politycznego Sparty przez obalenie królestwa (por. Plutarch, Lizander 24 - 26)."},{"type":"paragraph","text":"3 Pauzaniasz (wnuk Pauzaniasza, głośnego zwycięzcy Persów w bitwie pod Platejami), zasiadający na tronie królewskim w Sparcie w latach 445 -426 i 408 - 395 p.n.e., nosił się z planami reformy ustroju przez usunięcie eforatu, musiał jednak uchodzić ze Sparty na wygnanie. Niektórzy sądzą, że chodzi tu o jego dziada Pauzaniasza, zwycięzcę spod Piątej ów, opiekuna Plejstarcha, małoletniego syna Leonidasa, tylko nieściśle tu określonego jako król (podobnie jak w ks. VII, rozdz."},{"type":"paragraph","text":"13, § 13)."},{"type":"paragraph","text":"4 Chodzi zapewne o reformę ustroju, jaką miasto Epidamnos (później Dyrrachium) przeprowadziło w przededniu wybuchu wojny peloponeskiej. Reforma szła niewątpliwie w kierunku demokratycznym, ale szczegóły nie są znane, uwagi zaś Arystotelesa w tym miejscu są bardzo niejasne. Nie wiadomo na pewno, czy heliaia oznaczała w Epidamnos zgromadzenie ludowe, czy jakieś inne ciało, niejasna jest też rola urzędników i ich przynależność stanowa."},{"type":"paragraph","text":"5 Tekst tu niepewny, tłumaczenie idzie za wydaniem Immischa (ου µη), inni proponują ου µην"},{"type":"paragraph","text":"ει, czyli „chyba że się daje”."},{"type":"paragraph","text":"112"},{"type":"paragraph","text":"władza królewska sprzeciwia się zasadzie równości, gdy wśród równych istnieje."},{"type":"paragraph","text":"W ogóle bowiem dążenie do równości bywa przyczyną przewrotów."},{"type":"paragraph","text":"7. Są zaś dwa rodzaje równości: ze względu na liczbę i ze względu na wartość."},{"type":"paragraph","text":"Równe co do liczby jest moim zdaniem to, co jest takie samo, oraz równe co do ilości albo wielkości, według wartości zaś równe jest to, co jest równe stosunkowo. Tak np."},{"type":"paragraph","text":"liczbowo równa jest różnica między trzy a dwa i między dwa a jeden, stosunkowo zaś różnica między cztery a dwa i między dwa a jeden, bo dwa jest równą częścią czterech, a jeden takąż częścią dwóch; w obu wypadkach jest to mianowicie połowa."},{"type":"paragraph","text":"Choć zatem zgadzają się ludzie, że równość ujmowana według wartości jest bezwzględnie sprawiedliwa, to przecież zaznaczają się między nimi różnice, jak to poprzednio zauważono, gdy jedni, jeśli w czymś równi są drugim, że są im równi w ogóle, a drudzy, jeśli w czym górują nad innymi, domagają się uznania swej przewagi nad wszystkimi nie dorównującymi im [w tym względzie]."},{"type":"paragraph","text":"8. Dlatego też dwa głównie ustroje powstają: demokracja i oligarchia; szlachectwo bowiem i cnota jest udziałem niewielu, natomiast to [, co stanowi podstawę obu tych ustrojów] częściej się spotyka. Bo ludzi szlachetnego rodu i cnotliwych nigdzie i setki nie ma, a bogatych [jak i ubogich]6 wielu wszędzie bywa."},{"type":"paragraph","text":"Przeprowadzać wszędzie bezwzględnie jeden czy drugi rodzaj równości jest błędem, jak to się okazuje z wyników, bo żaden z takich ustrojów nie wykazuje trwałości. Przyczyna leży w tym, że niemożliwą jest rzeczą, by pierwszy, u podstaw popełniony błąd nie pociągał za sobą jakiegoś złego następstwa. Dlatego też w pewnych okolicznościach należy stosować równość liczbową, w innych zaś równość wynikającą z oceny wartości."},{"type":"paragraph","text":"9. Niemniej przecież demokracja jest trwalsza i więcej na wstrząsy odporna aniżeli oligarchia. Bo w państwach rządzonych oligarchicznie zaznaczają się dwa rozłamy, jeden w łonie samej oligarchii, a drugi w stosunku do ludu, natomiast w państwach demokratycznych występuje jedynie przeciwieństwo do oligarchii, a nie przejawiają się jakieś uwagi godne ruchy wśród ludu przeciw niemu samemu skierowane. Także i politeja, opierająca się na średnim stanie, która jest najtrwalsza z tego rodzaju ustrojów, bliższa jest demokracji aniżeli oligarchii."},{"type":"paragraph","text":"2. W jakich warunkach ludzie przystępują do zmiany ustroju, do jakich celów zmierzają, jakie bywają początki i przyczyny zamieszek?"},{"type":"paragraph","text":"1. Skoro się zastanawiamy nad tym, co wywołuje zaburzenia i przemiany ustroju, musimy przede wszystkim ująć ogólnie początki ich i przyczyny. Jest ich, krótko mówiąc, trzy co do liczby i te trzeba by najpierw określić w ogólnym zarysie. Należy mianowicie ustalić, przy wystąpieniu jakich nastrojów porywają się ludzie do zaburzeń, do jakich celów zmierzają, a po trzecie, jakie bywają początki zamieszek politycznych i tarć wzajemnych."},{"type":"paragraph","text":"6 [jak i ubogich] uzupełnienie Stahra przyjęte w wydaniu Immischa."},{"type":"paragraph","text":"113"},{"type":"paragraph","text":"Otóż co się tyczy nastrojów, które sprzyjają przewrotowi, to przyczyny ich na ogół szukać należy przede wszystkim w tym, o czym już poprzednio mówiliśmy7."},{"type":"paragraph","text":"Bo ci, co pragną równości, burzą się, jeżeli dojdą do przeświadczenia, że są upośledzeni w stosunku do warstwy uprzywilejowanej, mimo że są jej równi, ci zaś, którzy się domagają nierówności i uprzywilejowania, burzą się, jeśli nabiorą przekonania, że mimo swej przewagi nie mają większych praw, lecz równe tylko albo i mniejsze."},{"type":"paragraph","text":"2. Dążenia takie mogą być w pewnych wypadkach usprawiedliwione, w innych zaś nie. Bo jedni będąc upośledzeni burzą się, aby dojść do równych praw, inni mając równe prawa podnoszą się, aby zdobyć większe."},{"type":"paragraph","text":"Wyłożyłem tedy, jakie nastroje wpływają na zamieszki; przedmiotem zaś walki jest zysk i cześć, lub chęć zabezpieczenia się przed ich przeciwieństwem. Bo ludzie wszczynają powstania w państwach, by uchronić czy to siebie, czy też przyjaciół przed utratą czci obywatelskiej (ατιµία) i karą."},{"type":"paragraph","text":"3. Przyczyn i zaczynów rozruchów, z których wynikają omówione nastroje i dążności do osiągnięcia podanych celów, można przyjąć, biorąc rzecz z pewnego punktu widzenia, siedem, choć [gdy się to ujmie inaczej] może ich być więcej."},{"type":"paragraph","text":"Dwie z nich są identyczne z podanymi powyżej, tylko [działanie ich] nie [zaznacza się] w taki sam sposób; trafia się mianowicie, że ludzie powstają jedni przeciw drugim, mając na oku zysk i zaszczyty, nie dlatego jednak, by je posiąść dla siebie, jak to poprzednio powiedziano, ale dlatego, że widzą innych uprzywilejowanych w tym względzie, w pewnych wypadkach słusznie, w innych niesłusznie. Dalsze przyczyny to: samowola, strach, nadmiar znaczenia, wzgarda oraz nieproporcjonalny przerost pewnych elementów. Prócz tego, choć w inny sposób, grają tu rolę: wyłudzenie urzędu, niedbalstwo, drobne przekroczenia, nierównomierny rozwój."},{"type":"paragraph","text":"4. Jaki wpływ spośród tych przyczyn wywierają samowola i żądza zysku, i o ile stają się przyczyną przewrotów, o tym właściwie nie potrzeba mówić. Bo jeśli piastujący władzę dopuszczają się gwałtów i uganiają za zyskiem, to podnosi się bunt zarówno przeciw nim samym, jak i przeciw ustrojowi, który im na takie nadużycia pozwala, bez względu na to, czy ich pożądliwość sięga po mienie prywatne, czy po dobra państwowe."},{"type":"paragraph","text":"Jasną również jest rzeczą, jaki wpływ wywiera żądza zaszczytów i w jaki sposób staje się ona przyczyną zaburzeń; obywatele bowiem buntują się, gdy sami są odsunięci od godności, a widzą, że inni je osiągają. Popełnia się zaś tę niesprawiedliwość, gdy wbrew zasłudze obdarza się pewnych ludzi godnościami lub też się ich do nich nie dopuszcza; sprawiedliwe postępowanie zachodzi natomiast wtedy, gdy się to dzieje stosownie do zasługi."},{"type":"paragraph","text":"Bywają też przewroty z powodu nadmiaru znaczenia, gdy ktoś, czy to jednostka czy jakaś grupa, większy wpływ posiada, aniżeli to odpowiada państwu i powadze władzy państwowej, zwykle bowiem powstaje z tego monarchia lub panowanie możnowładców."},{"type":"paragraph","text":"7 Por. wyżej, rozdz. 1, § 3,7."},{"type":"paragraph","text":"114"},{"type":"paragraph","text":"5. Dlatego w niektórych państwach, np. w Argos i Atenach, zwykło się takich usuwać za pomocą sądu skorupkowego [ostracyzmu]8. Lepiej wszakże od początku baczyć na to, by się nie jawili ludzie tak dalece górujący znaczeniem, aniżeli dopuszczać do ich wystąpienia, a potem stosować środki zaradcze."},{"type":"paragraph","text":"Ze strachu zrywają się do buntu zarówno tacy, którzy dopuścili się czynu niegodziwego i boją się kary, jak i tacy, którzy są zagrożeni krzywdą i chcą jej dokonanie uprzedzić; tak np, było na Rodos, gdzie możni obywatele wystąpili przeciw ludowi, by się uchronić przed procesami, którymi ich nękano9."},{"type":"paragraph","text":"6. Również wzgarda powoduje zamieszki i powstania, i to zarówno w oligarchiach, gdy niedopuszczonych do rządów jest zbyt wielu, tak że się za silniejszych uważają, jak i w demokracjach, gdy panujący nieporządek i anarchia przepełnia możnych obywateli wzgardą. Tak było np. w Tebach, gdzie po bitwie pod Ojnofytami obalona została demokracja z powodu złych rządów10, tak było w Megarze, gdzie lud [uległ] z powodu panującego tu nieporządku i anarchii11 tak samo w Syrakuzach przed tyranią Gelona12"},{"type":"paragraph","text":"i na Rodos, gdzie istniejące przed powstaniem panowanie ludu zostało usunięte."},{"type":"paragraph","text":"7. Zdarzają się też przewroty ustrojowe z powodu nierównomiernego przerostu pewnych części. Jest to tak jak z ciałem składającym się z części, które powinny rozrastać się proporcjonalnie, aby się utrzymała symetria, inaczej ciało ginie."},{"type":"paragraph","text":"Jakżeż by to było, gdyby stopa mierzyła cztery łokcie, a reszta ciała dwie piędzie?"},{"type":"paragraph","text":"Toż człowiek przybrałby nieraz postać jakiejś innej istoty żyjącej, jeśliby się rozrastał nieproporcjonalnie nie tylko co do wielkości, ale i co do jakości. Tak samo i państwo składa się z części, z których jedna często rozrasta się niepostrzeżenie, jak np. masa ubogich w demokracjach i politejach."},{"type":"paragraph","text":"8. Zdarza się to czasem i ze zrządzenia losu, jak np. w Tarencie, gdzie niedługo po wojnach perskich znaczna część możnych obywateli zginęła w klęsce zadanej im przez Japygów, po czym na miejsce politei zaprowadzono tam demokrację 13."},{"type":"paragraph","text":"Także i w Argos, gdzie wielu obywateli zostało wyciętych przez Lakończyka 8 Por. wyżej, ks. III, rozdz. 8, § 2."},{"type":"paragraph","text":"9 Chodzi prawdopodobnie o przewrót dokonany w 412 r, p.n.e. w związku z odpadnięciem Rodos od ateńskiego Związku Morskiego i przejściem na stronę Sparty, co połączone było z zaprowadzeniem rządów oligarchicznych. Oligarchia utrzymała się na Rodos do bitwy pod Knidos (394 r. p.n.e.), po czym ster ujęła demokracja, ale tylko na krótko, bo już w 390 r. p.n.e. przy pomocy Spartan została obalona (Diodor Sycylijski, XIV 97; Ksenofont, Hellenika IV 8)."},{"type":"paragraph","text":"10 Zwycięscy w bitwie pod Ojnofytami (457 r. p.n.e) Ateńczycy skłóceni z rządzącymi dotąd w Tebach demokratami postawili u steru oligarchów."},{"type":"paragraph","text":"11 Panująca w Megarze demokracja, zagrożona przez wyrzuconych oligarchów, szukała w czasie wojny peloponeskiej (424 r. p.n.e.) oparcia w Atenach, a że go nie uzyskała w dostatecznej mierze, więc przy pomocy Sparty wzięli w mieście górę oligarchowie."},{"type":"paragraph","text":"12 Możni właściciele ziemscy (γεωµόρον) w Syrakuzach zostali ok. 493 r. p.n.e. wyrzuceni przez demokratów, ale rządy demokratyczne były tak niedołężne, że władzę ujął w końcu tyran Gelon, który umożliwił powrót geomorów w 485 r. p.n.e."},{"type":"paragraph","text":"13 Mowa tu o klęsce poniesionej przez Tarent w walce z jego kalabryjskimi sąsiadami Japygami w 473 r. p.n.e. Herodot, który wspomina tę klęskę (VII 170), nazywa ją „największą”, jaką za jego pamięci Grecy ponieśli."},{"type":"paragraph","text":"115"},{"type":"paragraph","text":"Kleomenesa w pamiętnym dniu siódmym, musiano przyjąć w szeregi obywateli pewną ilość periojków14. Również w Atenach po nieszczęśliwych bitwach na lądzie zmniejszyła się liczba możnych obywateli, ponieważ w okresie wojny peloponeskiej zaciągano ich według list w szeregi wojskowe. Zdarza się to, co prawda rzadziej, także i w demokracjach; gdy się bowiem wzmoże liczba zamożniejszych albo też wzrosną majątki, przechodzą [demokracje] w oligarchie i panowanie wielmożów."},{"type":"paragraph","text":"9. Zmiany ustroju dokonują się jednak i bez zaburzeń, po pierwsze dla zapobieżenia nadużyciom przy wyborach urzędników (jak w Herai15, gdzie zamiast wyborów wprowadzono losowanie urzędników, ponieważ wybory wypadały na korzyść krętaczy), dalej w następstwie niedbalstwa, gdy pozwolą dochodzić do najważniejszych urzędów przeciwnikom istniejącego ustroju (tak było w Oreos 16, gdzie upadła oligarchia, gdy do kolegium archontów wszedł"},{"type":"paragraph","text":"Herakleodor, który na miejsce oligarchii zaprowadził politeję i z kolei demokrację)."},{"type":"paragraph","text":"Dalszą przyczynę przemian ustrojowych stanowią drobne niedopatrzenia."},{"type":"paragraph","text":"Mam tu na myśli fakt, że często niepostrzeżenie dokonuje się wielka przemiana w stosunkach prawnych, gdy się nie uwzględnia drobnych różnic. Tak np. w Ambracji17 obowiązywał urzędników nieznaczny cenzus majątkowy, a w końcu dopuszczono do urzędów ludzi bez żadnego majątku, jak gdyby między małym cenzusem a żadnym była niewielka różnica, albo i nie było jej wcale."},{"type":"paragraph","text":"10. Bywają też przyczyną przewrotów i różnice plemienne, dopóki nie nastąpi zupełne zlanie. Bo tak, jak państwo nie tworzy się przez skupienie dowolnej masy ludzi, tak też nie tworzy się ono w dowolnym czasie. Dlatego gminy, które przyjęły w szeregi obywatelstwa obcych, czy to już przy założeniu miasta, czy i później, przechodziły po największej części wstrząsy wewnętrzne. Tak np."},{"type":"paragraph","text":"Sybaris założyli Achajowie łącznie z Trojzeńczykami18, gdy zaś następnie Achajowie zyskali większość, wypędzili Trojzeńczyków (stąd klątwa boża dosięgła 14 W 520 r. p.n.e. doszło do morderczej bitwy między Argejczykami a Spartanami pod wodzą króla Kleomenesa I, w której rozgromieni Argejczycy stracili ogromną część swojej ludności, tak że dla wypełnienia szczerb musiano nadać prawo obywatelstwa mieszkańcom gmin poddanych, czyli tzw."},{"type":"paragraph","text":"periojkom. Tłumaczenie „w p a m i ę t n y m d n i u s i ó d m y m (miesiąca) niepewne, bo w tekście jest tylko: „siódmym” (εν τη εβδόµη). Pewne jest tylko tyle, że liczba „siedem” w różny sposób z bitwą była złączona. Według Plutarcha (De mul. virt. IV 245 D) rozegrała się ta bitwa w siódmym dniu miesiąca, w okresie 7-dniowego zawieszenia broni, a liczba poległych miała wynosić 7777. Niektórzy sądzą, że Hebdome (siódma) była to może nazwa wspomnianego u Herodota gaju, opodal którego bitwa się toczyła."},{"type":"paragraph","text":"15 Heraja — miasto w północno-zachodniej stronie Arkadii."},{"type":"paragraph","text":"16 Kolonia ateńska na północy Eubei od 446 r. p.n.e., dawniej Histaja. Po złamaniu Aten w wojnie peloponeskiej zaprowadzona tu została oligarchia, która załamała się przy wstąpieniu do II ateńskiego Związku Morskiego (w 377 r.p.n.e.)."},{"type":"paragraph","text":"17 Kolonia koryncka w południowym Epirze."},{"type":"paragraph","text":"18 Trojzena — miasto na wybrzeżu Argolidy."},{"type":"paragraph","text":"116"},{"type":"paragraph","text":"Sybarytów19). W Turiach20 popadli Sybaryci w zatarg z innymi osadnikami, ponieważ jako dawni panowie tej ziemi domagali się większych praw, co doprowadziło do ich wyrzucenia. W Bizancjum knuli zamachy późniejsi osadnicy, a kiedy się to wykryło, zostali po walce wypędzeni."},{"type":"paragraph","text":"11. Obywatele Antissy21, którzy przyjęli wygnańców z Chios, byli zmuszeni wyrzucić ich z bronią w ręku, przeciwnie zaś, mieszkańcy miasta Zankle, którzy przyjęli Samijczyków, sami zostali przez nich wypędzeni22. Mieszkańcy Apollonii nad Morzem Czarnym po sprowadzeniu nowych osadników wzniecili powstanie, a tak samo doszło do zaburzeń i walki w Syrakuzach23, gdy po obaleniu tyranii nadano obywatelstwo obcym i najemnikom. Mieszkańcy Amfipolis, którzy przyjęli osadników z Chalkis, zostali przez nich po największej części wyrzuceni."},{"type":"paragraph","text":"W oligarchiach, jak to już poprzednio powiedziano, porywają się do powstania masy, które odczuwają to jako krzywdę, że nie posiadają praw równych, mimo że są równe innym, natomiast w demokracjach czynią to możni obywatele, ponieważ przysługują im tylko równe prawa, chociaż wyrastają ponad równość."},{"type":"paragraph","text":"12. Niekiedy dochodzi do starć w państwach także i z powodu warunków terenowych, gdy położenie kraju nie przedstawia się korzystnie dla jedności państwa. Tak np. w Klazomenaj mieszkańcy dzielnicy Chytron wadzili się z mieszkańcami wyspy24, podobnie jak mieszkańcy właściwego Kolofonu z mieszkańcami Notion25. Także i w Atenach zaznacza się na tym tle różnica, gdyż mieszkańcy Pireusu są więcej demokratyczni aniżeli mieszkańcy [samego] miasta."},{"type":"paragraph","text":"Bo jak na wojnie nawet zupełnie małe rowy, które przychodzi przekroczyć falandze, powodują jej rozerwanie, tak i w państwie każda różnica stanowi, jak się okazuje, podstawę do narastania przeciwieństw. Największe może przeciwieństwo istnieje między cnotą a występkiem, następnie między bogactwem a ubóstwem i tak dalej, jedno przeciwieństwo bywa większe od drugiego, a jednym z nich jest i wyżej wspomniane26."},{"type":"paragraph","text":"19 Autor ma tu na myśli zniszczenie Sybaris w wojnie z Krotoną w 510 r. p.n.e."},{"type":"paragraph","text":"20 Kolonia założona przez Ateńczyków w 444 r. p.n.e. na terenie dawnej Sybaris."},{"type":"paragraph","text":"21 Miasto na wyspie Lesbos."},{"type":"paragraph","text":"22 Zankle, jedna z najstarszych kolonii chalkidyckich na Sycylii, opanowana została ok. 480 r."},{"type":"paragraph","text":"p.n.e. przez uchodźców z Samos; niedługo potem znaleźli tu przytułek emigranci z Mesenii, od których miasto otrzymało nową nazwę Mesana."},{"type":"paragraph","text":"23 W Syrakuzach po obaleniu w 466/5 r. tyranii Trazybulosa (por. niżej, rozdz. 8, § 19) zaciągnięci przez tyranów najemnicy zostali pozostawieni w mieście, gdzie otrzymali prawa obywatelskie. Kiedy dawni obywatele próbowali ograniczyć ich uprawnienia, porwali się najemnicy do broni, opanowali starą część miasta i dopiero po dłuższych walkach zostali poskromieni (por. Diodor Sycylijski, XI 72, 76)."},{"type":"paragraph","text":"24 Położone na małoazjatyckim wybrzeżu Chytron stanowiło najstarszą dzielnicę miasta Klazomenaj, które przeniosło się na wyspę oddzieloną wąską cieśniną od lądu."},{"type":"paragraph","text":"25 Notion było portem położonego nieco w głębi lądu Kolofonu."},{"type":"paragraph","text":"26 Tj. przeciwieństwo wyłaniające się na tle warunków zamieszkania."},{"type":"paragraph","text":"117"},{"type":"paragraph","text":"3. Przykłady zaburzeń i przewrotów"},{"type":"paragraph","text":"w różnych państwach greckich"},{"type":"paragraph","text":"1. Zaburzenia powstają nie o drobnostki, ale z drobnostek, przedmiotem walki są jednak wielkie rzeczy. Nawet małe rozterki nabierają bardzo wielkiego znaczenia, jeśli się wyłonią miedzy możnymi osobami. Przykładem tego wydarzenie, jakie zaszło za dawnych czasów w Syrakuzach. Z powodu zatargu na tle miłosnym między dwoma młodzieńcami, którzy piastowali urzędy, przyszło tu do zmiany ustroju. Bo kiedy jeden z nich wyjechał"},{"type":"paragraph","text":"z kraju, drugi, mimo że był jego towarzyszem, uwiódł jego kochanka, a znów tamten rozgniewany o to uprowadził mu żonę; że zaś wciągnęli z kolei w swój spór ludzi stojących u steru rządów, więc spowodowali ogólny rozłam."},{"type":"paragraph","text":"2. Dlatego należy pilnie baczyć na początki takich [sporów] i zaraz wyrównywać zatargi między przywódcami i możnymi. Bo błąd leży w początku, a początek jest, jak powiadają, połową całości, tak iż nawet mały błąd w początkach pociąga za sobą doniosłe następstwa w dalszym przebiegu. W ogóle spory między możnymi powodują, że je całe państwo przeżywa. Tak zdarzyło się np."},{"type":"paragraph","text":"w Hestiai po wojnach perskich, kiedy to dwóch braci pokłóciło się przy podziale ojcowizny. Uboższy bowiem głosząc, że brat zataił stan majątku i skarb znaleziony przez ojca, pozyskał sobie lud, drugi zaś, mając wielki majątek do rozporządzenia, zjednał sobie możnych."},{"type":"paragraph","text":"3. Także i w Delfach spór, jaki się wywiązał na tle spraw małżeńskich, stał"},{"type":"paragraph","text":"się przyczyną późniejszych wielkich zaburzeń. Jeden narzeczony mianowicie, przybywszy do swej oblubienicy, dopatrzył się w pewnym znaku jakiejś złej wróżby, wobec czego odstąpił od zawarcia związku małżeńskiego. Krewni porzuconej uczuli się z tego powodu tak obrażeni, że kiedy ten składał ofiary, podrzucili mu pewne kosztowności ze świątyni, a następnie zabili go jako świętokradcę27."},{"type":"paragraph","text":"Również w Mitylenie wybuchła kłótnia o córki dziedziczki i stała się przyczyną wielu nieszczęść tudzież wolny z Ateńczykami, w czasie której Paches zajął"},{"type":"paragraph","text":"miasto28. Jeden z zamożnych obywateli, mianowicie Timofanes, pozostawił dwie córki, o które starał się dla swych synów niejaki Deksander. Spotkawszy się z odmową, począł wichrzyć i podburzać Ateńczyków przeciw swemu miastu, w którym był zastępcą proksenosa."},{"type":"paragraph","text":"27 Opowieść podaje obszernie Plutarch, Praec. ger. rei. publ. (Moralia 825 B): W czasie zaślubin wypadł z ręki oblubieńcowi Orgilaosowi puchar, co ten wziął za złą wróżbę i wycofał się z ojcem do domu. Ojciec narzeczonej Krates, aby się zemścić za tę zniewagę, podrzucił Orgilaosowi pewne kosztowności świątyni i następnie zamordował jego i jego ojca jako świętokradców. Kiedy ten podstęp się wykrył, przyszło do dalszych rozruchów."},{"type":"paragraph","text":"28 Paches, dowódca wojsk ateńskich, które złamały powstanie na Lesbos 428/427 r. p.n.e."},{"type":"paragraph","text":"— Tukidydes, który opowiada historię tego powstania (III 2 nn.), o Timofanesie ani Deksandrze (czy Doksandrze, jak jego imię podają niektóre rękopisy) nic nie mówi."},{"type":"paragraph","text":"118"},{"type":"paragraph","text":"4. Tak samo z powodu córki dziedziczki wybuchł spór w Fokidzie między Mnaseaszem, ojcem Mnasona29, i Eutykratesem, ojcem Onomarcha, a walka ta stała się dla Fokijczyków30 początkiem wojny świętej. Także w Epidamnos doszło do zmiany ustroju na tle zatargów o sprawy małżeńskie. Tutaj bowiem pewien obywatel zaręczył skrycie swą córkę z pewnym młodzieńcem, a kiedy ojciec tegoż, wszedłszy w skład rządu, nałożył za to karę na niego, dotknięty tym do żywego ojciec narzeczonej połączył się z odsuniętymi od rządu dla obalenia ustroju."},{"type":"paragraph","text":"5. Przemiany ustroju na oligarchię, demokrację i politeję bywają też następstwem wzrostu powagi lub mocy czy to jakiejś władzy, czy pewnego członu państwa. Tak np. w czasie wojen perskich wzrosło znaczenie rady na Areopagu, tak iż zdawała się nadawać ustrojowi charakter wybitnie umiarkowanej demokracji, czyli politei, a znów pełniące służbę okrętową pospólstwo, które przyczyniło się do zwycięstwa pod Salaminą, a przez to i do ugruntowania hegemonii Aten dzięki panowaniu na morzu, przyczyniło się też do wzmożenia siły demokracji. Także w Argos możni obywatele, którzy okryli się sławą w bitwie z Lacedemończykami pod Mantineą31, usiłowali [następnie] obalić demokrację."},{"type":"paragraph","text":"6. W Syrakuzach lud, któremu przypadła zasługa zwycięstwa w wojnie z Ateńczykami32, przeszedł od politei do demokracji. W Chalkis lud usunąwszy wspólnie z możnymi tyrana Foksosa33 sam zaraz ujął rządy w państwie. Tak samo znów było w Ambracji, gdzie lud razem ze spiskowcami wypędził tyrana Periandra34 i sam zagarnął władzę."},{"type":"paragraph","text":"7. W ogóle trzeba to sobie uprzytomnić, że ci, co się przyczynili do wzmożenia sił państwa, czy to ludzie prywatni, czy urzędnicy, czy fyle, czy w ogóle jakiś człon państwa lub jakakolwiek grupa, wywołują przewrót; bo albo wszczynają zaburzenia ci, którzy im zazdroszczą ich uprzywilejowanego stanowiska, albo oni sami w poczuciu swej przewagi nie chcą poprzestać na stopie równości z innymi."},{"type":"paragraph","text":"Przewroty ustrojowe następują również wówczas, gdy klasy obywateli uchodzące za przeciwstawne, jak np. bogaci i lud, utrzymują się w równowadze, a stan pośredni nie istnieje albo też znikomą gra rolę. Bo jeśli jedna z tych klas znaczną wykazuje przewagę, to druga nie zechce podjąć niebezpiecznej walki przeciw wyraźnie silniejszej. Z tego też po prostu powodu ci, którzy cnotą górują, przewrotów nie robią; drobną bowiem przedstawiają garstkę wobec licznego tłumu."},{"type":"paragraph","text":"Tak tedy, ogółem rzecz biorąc, przedstawia się sprawa początków i przyczyn zaburzeń oraz przewrotów we wszystkich ustrojach."},{"type":"paragraph","text":"29 Według Atenajosa, VI 86 (264 a), Mnason był przyjacielem Arystotelesa. Bliższe okoliczności wspomnianego tu zatargu nieznane."},{"type":"paragraph","text":"30 W latach 355 - 346."},{"type":"paragraph","text":"31 W 419 r. p.n.e. Opis bitwy u Tukidydesa (V 70-74)."},{"type":"paragraph","text":"32 W 413 r. p.n.e.; mowa o nieszczęsnej wyprawie sycylijskiej Ateńczyków."},{"type":"paragraph","text":"33 Skądinąd nieznany."},{"type":"paragraph","text":"34 Syn tyrana Ambracji Gorgosa, bratanek Periandra, znanego tyrana Koryntu z pierwszej połowy VI w. p.n.e."},{"type":"paragraph","text":"119"},{"type":"paragraph","text":"8. Jako środek do przeprowadzenia zmiany ustroju służy w jednych wypadkach gwałt, w innych podstęp; gwałt wówczas, gdy się stosuje przymus czy to zaraz z początku, czy później. Ale i postęp bywa dwojakiego rodzaju. Niekiedy bowiem ktoś łudzi najpierw obywateli i przeprowadza zmianę za ich zgodą, następnie zaś utrzymuje się przy władzy siłą wbrew ich woli. Tak np. za rządów czterystu35"},{"type":"paragraph","text":"oszukiwano lud zapewnieniami, że król [perski] dostarczy pieniędzy na wojnę z Lacedemończykami, a kiedy się kłamstwo wydało, usiłowano zatrzymać władzę za pomocą siły. Niekiedy zaś zarówno od początku, jak znów i w czasie późniejszym zjednuje się obywateli, tak że godzą się z nowym rządem."},{"type":"paragraph","text":"Ogółem zatem rzecz biorąc, z podanych przyczyn wynikły przemiany, jakie się dokonały we wszystkich rodzajach ustrojów."},{"type":"paragraph","text":"4. Obalenie demokracji w różnych państwach"},{"type":"paragraph","text":"1. Z kolei przyjmując za podstawę ten podział, trzeba rozpatrzyć przemiany każdej z osobna formy ustroju. Otóż demokracje ulegają przewrotowi głównie skutkiem rozpasania demagogów, którzy zmuszają ludzi zamożnych do zrzeszenia się już to przez wytaczanie im na własną rękę złośliwych procesów (a przecież wspólny strach zbliża do siebie i najgorszych nieprzyjaciół), już to przez publiczne podburzanie przeciw nim tłumu. Fakty takie potwierdza wiele przykładów."},{"type":"paragraph","text":"2. I tak na wyspie Kos upadła demokracja, gdy wystąpili przewrotni demagogowie, bo możni porozumieli się co do ich obalenia; to samo było na Rodos, gdzie demagogowie wprowadzili wynagrodzenie za pełnienie obowiązków obywatelskich i nie dopuszczali do wypłaty sum dłużnych trierarchom36, tak że ci, nękani wytaczanymi im procesami, zostali zmuszeni do porozumienia się i obalenia demokracji37. Także i w Heraklei38 niedługo po założeniu kolonii przyszło do upadku demokracji z winy demagogów; możni bowiem, trapieni przez nich krzywdami, uszli z miasta, po czym wygnańcy połączyli się i powróciwszy obalili panowanie ludu."},{"type":"paragraph","text":"3. Podobnie też została usunięta demokracja w Megarze, demagogowie bowiem wielu spośród znacznych obywateli zsyłali na wygnanie, aby móc przejąć ich majątki na rzecz skarbu, aż wygnańców było tak dużo, że podjęli próbę powrotu i zwyciężywszy lud w walce zaprowadzili oligarchię39. To samo stało się także z demokracją w Kyme, którą obalił Trazymachos40."},{"type":"paragraph","text":"35 W czasie próby przewrotu oligarchicznego w Atenach w 411 r. p.n.e."},{"type":"paragraph","text":"36 Trierarchami zwano ludzi, na których nałożono obowiązek uzbrojenia własnym kosztem dostarczonego przez państwo okrętu (triery), którym też potem dowodzili."},{"type":"paragraph","text":"37 Chodzi tu zapewne o ten sam przewrót, który jest wspomniany wyżej, § 2 i niżej, § 5."},{"type":"paragraph","text":"38 Wzmianka dotyczy zapewne Heraklei (nad Morzem Czarnym w Azji Mniejszej), która założona została w 559 r. p.n.e. jako kolonia Megary."},{"type":"paragraph","text":"39 Por. wyżej, § 2 i niżej, § 6."},{"type":"paragraph","text":"40 Skądinąd nieznany."},{"type":"paragraph","text":"120"},{"type":"paragraph","text":"Obserwując przemiany zachodzące także w innych wypadkach można stwierdzić, że niemal wszędzie dokonały się one w taki właśnie sposób. Bo demagogowie, aby zdobyć popularność, trapią możnych i albo parcelują ich majątki, albo ukrócają ich dochody przez narzucanie im nadzwyczajnych świadczeń na rzecz państwa (λειτουργία), albo też wytaczają im złośliwe procesy, aby mieć powód do zajęcia na rzecz skarbu majątków bogaczy, w ten sposób zaś pobudzają ich do spisków i buntów przeciw istniejącemu ustrojowi."},{"type":"paragraph","text":"4. Za dawnych czasów, gdy ten sam człowiek bywał nieraz przywódcą ludu"},{"type":"paragraph","text":"[demagogiem] i wodzem, przewrót dawał w wyniku tyranię. Istotnie, największa chyba część dawnych tyranów wyszła spośród demagogów. Przyczyna tego, że to się wówczas zdarzało, a teraz nie, leży w tym, że wtedy demagogowie wywodzili się spomiędzy wodzów (bo w wymowie nie byli jeszcze mocni), a teraz, wraz z postępem wyszkolenia retorycznego, ludzie umiejący przemawiać zdobywają sobie wprawdzie stanowiska przywódców ludu, ale doświadczenia w sztuce wojennej nie posiadają; dlatego też nie próbują uzurpacji, z małymi może wyjątkami, które jednak były krótkotrwałe."},{"type":"paragraph","text":"5. Dochodziło zaś dawniej do tyranii częściej niż teraz i z tego także powodu, że pewnym ludziom powierzano wszelkie uprawnienia władzy. Tak było np."},{"type":"paragraph","text":"w Milecie, gdzie tyrania wyszła z prytanii, bo prytan41 miał tu rozstrzygającą władzę w wielu ważnych dziedzinach. Ponadto państwa były wówczas niewielkie, a ludzie mieszkali po wsiach i zajęci byli gospodarstwem rolnym, tak że przywódcy ludu, gdy jeszcze doświadczenie wojenne zdobyli, sięgali bez trudności po władzę tyrana. Ale wszyscy robili to opierając się na zaufaniu ludu, podstawą zaś zaufania było wrogie ich ustosunkowanie się do bogaczy. Tak było np."},{"type":"paragraph","text":"w Atenach, gdzie Pizystrat powstał przeciw właścicielom ziemskim z równinnej części kraju 42, tak też i w Megarze, gdzie Teagenes zajął pasące się nad rzeką stada bogaczy i wyrżnął je43. Dionizjosa, który wystąpił z oskarżeniem Dafnajosa44"},{"type":"paragraph","text":"i bogaczy, uznano za godnego tyranii, ponieważ wobec wrogiego ustosunkowania się do nich budził zaufanie jako przyjaciel ludu."},{"type":"paragraph","text":"6. Zdarza się też, że starodawne demokracje ulegają przekształceniu na zupełnie nowoczesne. Bo gdzie urzędnicy są wybierani, ale niezależnie od cenzusu majątkowego, i lud ma prawo wyboru, tam ludzie starający się o godności przez demagogiczne zabiegi doprowadzają do tego, że lud stawia się ponad prawa."},{"type":"paragraph","text":"Środkiem zapobiegającym, aby to się nie działo albo nie w tym stopniu, jest przeprowadzanie wyboru władz przez fyle, a nie przez ogół ludu."},{"type":"paragraph","text":"Wszystkie zatem przemiany demokracji sprowadzają się mniej więcej do podanych przyczyn."},{"type":"paragraph","text":"41 Prytanami zwano w wielu miastach greckich po obaleniu królestwa nowych naczelników państwa."},{"type":"paragraph","text":"42 Pizystrat narzucił się na tyrana w 560 r. p.n.e."},{"type":"paragraph","text":"43 Tyrania Teagenesa w Megarze przypada na czas ok. 640 r. p.n.e."},{"type":"paragraph","text":"44 Dafnajos, wódz syrakuzański, obalony przez Dionizjosa, który z kolei narzucił się na tyrana (lata 405 - 367)."},{"type":"paragraph","text":"121"},{"type":"paragraph","text":"5. Obalenie oligarchii"},{"type":"paragraph","text":"1. Oligarchie znów ulegają przemianom w dwojaki sposób; przynajmniej te dwa najmocniej się zaznaczają. Jeden ma miejsce, jeśli lud doznaje ucisku, bo wówczas pierwszy lepszy nadaje się na głowę opozycji, zwłaszcza jeśli się zdarzy, że taki przywódca sam pochodzi z oligarchii, jak to było na Naksos z Ligdamisem45, który był potem tyranem u Naksyjczyków."},{"type":"paragraph","text":"2. Po wtóre, bywa przewrót wynikiem innych przyczyn i w różny rozgrywa się sposób. W pewnych wypadkach mianowicie powstanie jest dziełem samych możnych, nie należących jednak do rządu, gdy bardzo niewielu ma dostęp do godności. Tak było np. w Massalii46 i w Istros47, i w Heraklei, i w innych miastach. Bo ci, co w rządach nie brali udziału, burzyli się, aż zostali dopuszczeni do współudziału, najpierw najstarsi synowie rządzących, potem zaś młodsi. W niektórych bowiem miejscowościach nie mogą piastować urzędów równocześnie i ojciec, i syn, w innych zaś starszy i młodszy brat. Oligarchia w Massalii zbliżyła się dzięki temu do politei, w Istros przeszła w końcu w demokrację, a w Heraklei z niewielkiej liczby doszła do [liczby] sześciuset"},{"type":"paragraph","text":"[uczestników]."},{"type":"paragraph","text":"3. Również w Knidos uległa oligarchia przemianie, gdy możni porwali się do walki ze sobą. Przyczyną było ograniczenie udziału w rządach do niewielu osób, przy czym, jak powiedziałem, jeśli brał w nich udział ojciec, syn nie był"},{"type":"paragraph","text":"dopuszczony, a jeśli więcej było braci, to prawo udziału posiadał tylko najstarszy. Do toczącej się walki wmieszał się też lud i znalazłszy przywódcę wśród możnych, w starciu wziął górę nad nimi, bo niezgoda pociąga za sobą osłabienie."},{"type":"paragraph","text":"4. Podobnie było za dawnych czasów w Erytraj48 za oligarchii Bazylidów. Bo chociaż rządy dobrze tu były sprawowane, to przecież lud burzył się przeciw panowaniu niewielkiej garstki i przeprowadził zmianę ustroju."},{"type":"paragraph","text":"Oligarchie upadają też z winy samych możnowładców, gdy skutkiem wzajemnej zawiści zaczną uprawiać demagogię. Demagogia taka bywa dwojakiego rodzaju. Może się ona przejawiać wśród niewielu możnowładców, bo zdarza się, że i między nimi występuje demagog, choćby ich liczba była bardzo szczupła; tak było np. w Atenach w rządzie „trzydziestu”49, gdzie Charikles ze swym otoczeniem rządził wszechwładnie dzięki stosowaniu środków demagogicznych w stosunku 45 Według Atenajosa (VIII 40), który opierał się tu na zaginionym dziele Arystotelesa Ustrój Naksos, Ligdamis, choć sam należał do oligarchii Naksos, stanął na czele ruchu rewolucyjnego przeciw panującej oligarchii, po czym narzucił się na tyrana przy pomocy Pizystrata ok. 550 r. p.n.e."},{"type":"paragraph","text":"46 Massalia (dziś Marsylia) — kolonia Fokejczyków, opodal ujścia Rodami, miała ustrój wybitnie oligarchiczny, rządziła tam grupa złożona z 15 członków wyłonionych z rady 600."},{"type":"paragraph","text":"47 Miasto Mizejczyków u ujścia Dunaju."},{"type":"paragraph","text":"48 Erytraj — miasto jońskie na małoazjatyckim wybrzeżu (naprzeciw wyspy Chios)."},{"type":"paragraph","text":"49 W 404 r. p.n.e., po kapitulacji Aten w wojnie peloponeskiej. Według Ksenofonta (Hellenika II 3) rolę przewodnią w tym rządzie „30 tyranów” odgrywał raczej Krytiasz, nie Charikles."},{"type":"paragraph","text":"122"},{"type":"paragraph","text":"do tychże trzydziestu, a tak samo też i Frynichos w stosunku do rady"},{"type":"paragraph","text":"„czterystu”50."},{"type":"paragraph","text":"5. Ale bywa też i tak, że oligarchowie uprawiają demagogię w stosunku do ludu; przykładem Larysa, gdzie tzw. strażnicy obywateli schlebiali ludowi, ponieważ ich wybierał. [To samo dzieje się] we wszystkich oligarchiach, gdzie nie ta klasa, z której są urzędnicy, wybiera władzę, lecz wybór przeprowadzają ciężkozbrojni"},{"type":"paragraph","text":"[hoplici] albo lud, podczas gdy dostęp do urzędów uzależniony jest od wysokiego cenzusu majątkowego lub przynależności do pewnej grupy politycznej; tak właśnie było w Abydos51. Podobnie bywa tam, gdzie sądy obsadza się nie spośród warstwy rządzącej; w takim wypadku demagogowie schlebiają ludowi, by wpłynąć na wyroki, co może prowadzić do obalenia ustroju, jak to się stało w Heraklei nad Pontem."},{"type":"paragraph","text":"6. Inny jeszcze przykład [przedstawia wypadek, kiedy to] pewni członkowie oligarchii dążą do jej zacieśnienia do mniejszej liczby uczestników, bo wówczas ci, którzy się starają o utrzymanie równości, zmuszeni są wezwać lud na pomoc."},{"type":"paragraph","text":"Dochodzi też do upadku oligarchii, gdy możnowładcy przez rozrzutny tryb życia roztrwonią swoje własne majątki; tacy bowiem stają się zwolennikami przewrotów i albo sami dążą do tyranii, albo drugiego robią tyranem, jak Hipparinos52 w Syrakuzach Dionizjosa, a w Amfipolis niejaki Kleotimos sprowadził"},{"type":"paragraph","text":"osadników z Chalkis, a gdy przybyli, podburzył ich przeciw możnym. Także i na Eginie ten, który prowadził rokowania z Charesem53, usiłował z tego samego powodu obalić istniejący ustrój."},{"type":"paragraph","text":"7. Zrujnowani oligarchowie to starają się doprowadzić zaraz do jakiegoś przewrotu, to sprzeniewierzają dobro publiczne; stąd też albo dochodzi do walk między nimi samymi, albo z tymi, którzy ich jako złodziei zwalczają, jak to się zdarzyło w Apollonii nad Pontem."},{"type":"paragraph","text":"Natomiast oligarchia zgodna niełatwo upada sama z siebie. Dowodem ustrój w Farsalos, gdzie niewielu możnowładców rządzi rzeszą dzięki temu, że się dobrze porozumiewają między sobą."},{"type":"paragraph","text":"8. Przeciwnie, oligarchia ulega rozkładowi, gdy w łonie jej wytworzy się druga oligarchia. Bywa to wówczas, gdy przy niewielkiej liczbie uczestniczących w rządzie dostęp do najwyższych godności nie jest otwarty dla wszystkich, którzy do tej niewielkiej liczby należą, jak to było niegdyś w Elidzie. Rządy spoczywały tam bowiem w rękach niewielu, ale jeszcze i z tych tylko bardzo mała garstka dochodziła do rady starszych, ponieważ członkowie jej w liczbie 90, byli 50 W 411 r. p.n.e. Jest rzeczą zastanawiającą, że Arystoteles przypisuje tu Frynichosowi rolę kierowniczą w oligarchicznej radzie 400, kiedy z Tukidydesa wiadomo, że przyłączył się on do całej akcji później (VIII 68) i wkrótce padł ofiarą zamachu (VIII 92)."},{"type":"paragraph","text":"51 Kolonia założona przez Milet na azjatyckim wybrzeżu Hellespontu."},{"type":"paragraph","text":"52 Hipparinos, mąż stanu w Syrakuzach, który dopomógł Dionizjosowi do zagarnięcia władzy (405 r. p.n.e.)."},{"type":"paragraph","text":"53 Wódz ateński, czynny w latach 367 - 333. O jakie to rokowania chodziło, nie wiadomo."},{"type":"paragraph","text":"123"},{"type":"paragraph","text":"dożywotnio wybierani z niewielu możnych rodzin w sposób podobny do tego, jaki stosowano przy wyborze gerontów w Lacedemonie54."},{"type":"paragraph","text":"9. Upadek oligarchii dokonuje się zarówno w czasie wojny, jak i pokoju."},{"type":"paragraph","text":"W czasie wojny, gdy oligarchowie z nieufności do ludu muszą posługiwać się najemnikami; ten bowiem, któremu powierzą dowództwo, narzuca się często na tyrana, jak Timofanes55 w Koryncie; jeśli zaś dowódców jest więcej, to ci stwarzają sobie rządy dynastów. Czasami jednak obawiają się tego i przyznają masom udział w rządach, ponieważ zmuszeni są lud do broni powołać. W czasie pokoju zaś skutkiem wzajemnej nieufności powierzają straż najemnikom i pośred-niczącemu archontowi, który niekiedy narzuca się na pana jednych i drugich, jak to się stało z Simosem56 w Larysie za panowania Aleuadów i w Abydos za rządów klubów politycznych, z których jeden był klubem Ifiadesa57."},{"type":"paragraph","text":"10. Zaburzenia powstają też i z tego powodu, że jedni z możnowładców czują się upośledzeni przez drugich, i przychodzi do przewrotów na tle spraw małżeńskich i procesów sądowych. O zatargach małżeńskich jako przyczynach przewrotów mowa już była poprzednio; i tak w Eretrii obalił oligarchię rycerstwa Diagoras, czując się w sprawie małżeństwa skrzywdzony. Natomiast w Heraklei, a także i w Tebach przyszło do przewrotu z powodu wyroku sądowego, ponieważ w Heraklei Euetion, a w Tebach Archias58 słusznie wprawdzie ukarani zostali z powodu cudzołóstwa, jednakże w sposób nacechowany stronniczą zapalczywością."},{"type":"paragraph","text":"Ich nieprzyjaciele bowiem tak dalece się posunęli w swej nienawiści, że ich na rynku przywiązali do pręgierza."},{"type":"paragraph","text":"11. Wiele oligarchii zostało też obalonych, skutkiem zbyt despotycznego charakteru, przez niektórych członków rządu, którzy się z tym nie godzili; tak było z oligarchią w Knidos i na Chios."},{"type":"paragraph","text":"Jednakowoż także i czysty przypadek pociągał za sobą przemianę zarówno tzw."},{"type":"paragraph","text":"politei, jak i oligarchii, jeśli w nich przynależność do rady, sądu i innych urzędów zależna była od cenzusu majątkowego. Zdarza się często mianowicie, że cenzus ustalony pierwotnie odpowiednio do istniejących stosunków, a dopuszczający do udziału w rządach oligarchicznych niewielu, w politei zaś stan średni, okazuje się 54 Por. wyżej, ks. II, rozdz. 6, § 18."},{"type":"paragraph","text":"55 Timofanes, członek panującej w Koryncie arystokracji, objąwszy dowództwo nad najemnikami usiłował się narzucić na tyrana, ale został obalony przez brata swego Timoleonta i zabity (ok. 365 r."},{"type":"paragraph","text":"p.n.e.)."},{"type":"paragraph","text":"56 Simos z Larysy znany jest tylko z mowy Demostenesa O wieńcu (48), gdzie napiętnowany jest jako zdrajca, który wydal Tesalię Filipowi II."},{"type":"paragraph","text":"57 Imię Ifiadesa występuje u Demostenesa, wygłoszonej w 352 r. mowie przeciw Aristokratesowi (177), gdzie powiedziano, że syn jego dany został Ateńczykom jako zakładnik, ale miasta Sestos, nie Abydos. O roli klubów politycznych (hekyrii) w Abydos por. wyżej, § 5. Z toku wywodów Arystotelesa można by się domyślać, że Ifiades, mając poparcie swego klubu, narzucił się na tyrana Abydos."},{"type":"paragraph","text":"58 Archias znany jest jako przywódca obozu oligarchicznego i polemarch w Tebach; padł ofiarą zamachu Pelopidasa i towarzyszy w 379 r. p.n.e. Małe jednak jest prawdopodobieństwo, żeby był"},{"type":"paragraph","text":"identyczny ze wspomnianym tu Archiasem."},{"type":"paragraph","text":"124"},{"type":"paragraph","text":"za niski, ponieważ skutkiem pokoju lub jakichś innych szczęśliwych okoliczności tak wzrasta dobrobyt, że wielokrotnie podnosi się wartość tych samych posiadłości."},{"type":"paragraph","text":"W następstwie tego wszyscy uzyskują dostęp do wszelkich godności, przy czym przemiana w pewnych wypadkach dokonuje się z wolna, nieznacznymi krokami i niepostrzeżenie, w innych zaś nawet i prędzej."},{"type":"paragraph","text":"12. Z takich tedy przyczyn ulegają oligarchie przemianom i przewrotom."},{"type":"paragraph","text":"W ogóle zaś dodać należy, że i demokracje, i oligarchie przechodzą niekiedy nie w przeciwne formy ustrojowe, ale i w tegoż samego rodzaju, a więc np. z prawnie uporządkowanych demokracji i oligarchii w też same formy, ale nacechowane samowolą, i na odwrót."},{"type":"paragraph","text":"6. Obalenie arystokracji"},{"type":"paragraph","text":"1. W arystokracjach dochodzi do przewrotów w pierwszym rzędzie dlatego, że niewielu ma dostęp do godności. (Jak już zaznaczono, pociąga to za sobą upadek również oligarchii, a przecież i arystokracja jest z pewnego punktu
