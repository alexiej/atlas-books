twa i nie powinien posiadać żadnej cząstki władzy ani prawodawczej, ani wykonawczej; ale dlatego właśnie jego władza jest największa; nie mogąc bowiem nic zdziałać, wszystkiemu może przeszkodzić. Jest bardziej uświęcony i bardziej szanowany jako obrońca praw niż książę, który prawa wykonywa, i niż zwierzchnik, który je nadaje. Okazało się to jasno w Rzymie, gdy dumni patrycjusze, gardzący zawsze całym ludem, zmuszeni byli ustępować przed prostym urzędnikiem ludowym, niemającym ani auspicjów 364 , ani jurysdykcji."},{"type":"paragraph","text":"Trybunat mądrze miarkowany jest najsilniejszą podporą dobrego ustroju; gdy jednak ma choćby cokolwiek za dużo siły, wywraca wszystko; co do słabości, nie leży ona w jego charakterze, i by tylko czymś był, nigdy tym nie jest mniej niż potrzeba."},{"type":"paragraph","text":"Wyradza się w tyranię, gdy uzurpuje władzę wykonawczą, którą ma tylko miarkować, tudzież, gdy chce nadawać prawa, które powinien jedynie ochraniać. Olbrzymia władza eforów, bezpieczna tak długo, dopóki Sparta zachowała swe obyczaje, przyśpieszyła raz rozpoczęte zepsucie. Krew Agisa 365 zamordowanego przez tych tyranów pomścił jego następca; zarówno zbrodnia, jak kara eforów przyśpieszyły zgubę republiki, i po Kleomenesie 366 Sparta nie była już niczym. Rzym także zginął w ten sam sposób, i nadmierna władza trybunów, stopniowo przez nich przywłaszczana, służyła jeszcze przy pomocy praw wydanych dla wolności za ochronę cesarzom, którzy ją zburzyli 367 . Co się tyczy Rady Dziesięciu w Wenecji, jest to krwawy trybunał, straszny zarówno patrycjuszom, jak ludowi, który, daleki od udzielania prawom wysokiej ochrony, po upodleniu ich służy już tylko do zadawania w ciemnościach ciosów, których widzieć nie mają odwagi."},{"type":"paragraph","text":"Trybunat osłabia się, tak jak rząd, pomnażaniem liczby jego członków. Gdy trybunowie ludu rzymskiego naprzód w liczbie dwóch, później pięciu, chcieli tę liczbę podwoić, senat pozwolił im na to, pewny, że będzie hamował jednych drugimi, co też istotnie nastąpiło."},{"type":"paragraph","text":"Najlepszym środkiem zapobieżenia uzurpacjom tak straszliwego ciała, środkiem, o którym dotychczas żaden rząd jeszcze nie pomyślał, byłoby uczynić to ciało niestałym i wyznaczyć okresy czasu, w których by nie funkcjonowało. Te okresy, które nie powinny być tak wielkie, by nadużycia miały czas się utrwalić, może prawo oznaczać w ten sposób, by nadzwyczajnym komicjom łatwo było skrócić je w razie potrzeby."},{"type":"paragraph","text":"Wydaje mi się, że ten środek nie przedstawia stron ujemnych, ponieważ — jak to powiedziałem — trybunat, nie będąc częścią ustroju, może być bez szkody dla niego usunięty; a wydaje mi się skuteczny, ponieważ świeżo na nowo ustanowiony urzędnik nie opiera się na władzy, jaką miał jego poprzednik, ale na władzy, jaką mu oddaje prawo 368 ."}]},{"id":"rozdział-vi-o-dyktaturze","number":52,"title":"Rozdział VI. O dyktaturze","blocks":[{"type":"paragraph","text":"Brak giętkości praw, niepozwalający im naginać się do wypadków, może czasami uczynić je niebezpiecznymi i spowodować przez nie zgubę państwa, które przechodzi kryzys. Porządek i powolność form wymagają przestrzeni czasu, jakiej nieraz okoliczności nie dają. Tysiące wypadków może się zdarzyć, tysiące wypadków, których prawodawca nie przewidział, a przezorność koniecznie wymaga poczucia, że nie można wszystkiego przewidzieć."},{"type":"paragraph","text":"Nie trzeba więc pragnąć takiego ustalenia urządzeń politycznych, by aż pozbawiać się możności zawieszenia ich działania. Nawet Sparta pozwalała zasypiać swym prawom."},{"type":"paragraph","text":"Tylko jednak bardzo wielkie niebezpieczeństwa mogą przeciwważyć niebezpieczeństwo zmącenia porządku publicznego, i świętą władzę praw wolno wstrzymać jedynie wtedy, gdy chodzi o ocalenie ojczyzny. W tych rzadkich i widocznych wypadkach zapewnia się bezpieczeństwo publiczne w drodze specjalnego aktu, który obowiązek czuwania nad nim oddaje najgodniejszemu. Tego pełnomocnictwa można udzielić w dwojaki sposób, zależnie od rodzaju niebezpieczeństwa."},{"type":"paragraph","text":"Jeżeli dla zaradzenia niebezpieczeństwu wystarcza powiększyć działalność rządu, ześrodkowuje go się w rękach jednego lub dwóch z jego członków: w ten sposób nie zmienia się władzy praw, lecz jeno formę zarządzania nimi. O ile jednak niebezpieczeństwo jest tak wielkie, że aparat praw staje się przeszkodą do uchronienia się przed nim, wówczas mianuje się najwyższego naczelnika, który nakazuje milczenie wszystkim prawom i na chwilę zawiesza władzę zwierzchniczą. W takim wypadku wola powszechna nie ulega wątpliwości i oczywiste jest, iż naród przede wszystkim pragnie, by państwo nie zginęło. W ten sposób zawieszenie władzy prawodawczej nie znosi jej wcale: urzędnik nakazujący jej milczenie nie może kazać jej, by przemawiała; panuje nad nią, nie mogąc jej reprezentować; może robić wszystko, z wyjątkiem praw."},{"type":"paragraph","text":"Pierwszego sposobu używał senat rzymski, gdy sakralną formułą wkładał na konsulów obowiązek zajęcia się ocaleniem ojczyzny; drugi sposób miał zastosowanie, gdy jeden z dwóch konsulów mianował dyktatora 369 , zwyczaj, którego przykład dała Rzymowi Alba 370 ."},{"type":"paragraph","text":"W początkach republiki często bardzo uciekano się do dyktatury, państwo nie stało jeszcze na dość trwałej podstawie, by mogło utrzymać się jedynie siłą swej organizacji. Ponieważ obyczaje pozwalały obejść się bez wielu ostrożności, które byłyby konieczne w innych czasach, nie obawiano się ani tego, by dyktator nadużył swej władzy, ani by usiłował zachować ją poza terminem. Przeciwnie, wydawało się, że tak wielka władza jest ciężarem dla tego, kto był w nią przyobleczony, tak śpieszył się zrzucić ją, jak gdyby stanowisko polegające na zastępowaniu praw było nazbyt uciążliwe i niebezpieczne."},{"type":"paragraph","text":"Toteż niebezpieczeństwo nie nadużycia, ale poniżenia każe mi zganić to nadmierne stosowanie najwyższego urzędu w pierwszych czasach. Gdy bowiem szafowano nim przy wyborach, poświęceniach, rzeczach czysto formalnych, można było obawiać się, by nie stał się mniej straszny w potrzebie i by nie przyzwyczajono się uważać za czczy tytuł jedynie tytułu używanego podczas czczych tylko ceremonii."},{"type":"paragraph","text":"Pod koniec republiki Rzymianie, stawszy się bardziej nieufnymi, oszczędzali dyktatury w sposób równie mało uzasadniony, jak wtedy, kiedy nią szafowali hojnie. Łatwo było spostrzec, że obawa ich była bezpodstawna; że słabość stolicy zabezpieczała ją przed urzędnikami, których miała w swym łonie; że dyktator mógł w pewnych wypadkach bronić wolności publicznej, nie mogąc nigdy zrobić przeciwko niej zamachu; i że kajdany Rzymu nie będą wykute w Rzymie samym, lecz w jego armiach. Słaby opór, jaki stawił Mariusz 371 Sulli 372 , a Pompejusz 373 Cezarowi 374 , dobitnie okazał, czego można oczekiwać od władzy wewnętrznej przeciwko sile zewnętrznej."},{"type":"paragraph","text":"Pomyłka ta stała się przyczyną wielkich błędów: błędem było na przykład, że nie zamianowano dyktatora za czasów sprawy Katyliny 375 ; skoro bowiem rozchodziło się jedynie o samo miasto i co najwyżej o kilka prowincji italskich, dyktator z nieograniczoną władzą, jaką dawały mu prawa, byłby łatwo rozproszył spisek, który został zduszony jedynie dzięki szczęśliwemu zbiegowi przypadków, na który nigdy ludzie przezorni nie powinni byli liczyć."},{"type":"paragraph","text":"Zamiast tego senat zadowolił się oddaniem całej swej władzy konsulom, skąd wynikło, że Cycero, chcąc działać skutecznie, zmuszony był przekroczyć tę władzę w bardzo ważnym punkcie, i jeżeli pierwsze wybuchy radości kazały pochwalić jego postępowanie, to jednak słusznie zażądano odeń rachunku za przelanie krwi obywateli wbrew prawu, zarzut, którego nie można byłoby postawić dyktatorowi. Wymowa konsula porwała jednak wszystkich; i on sam, choć Rzymianin, umiłowawszy bardziej swą sławę niż ojczyznę, nie tyle szukał najbardziej legalnego i pewnego środka ocalenia państwa, ile sposobu wyciągnięcia dla siebie całego zaszczytu z tej sprawy 376 . Toteż słusznie oddano mu cześć jako oswobodzicielowi Rzymu i słusznie ukarano jako tego, co złamał prawa. Jakkolwiek chlubne było jego odwołanie z wygnania, pewną jest rzeczą, że była to łaska."},{"type":"paragraph","text":"Zresztą, w jakikolwiek sposób nadano by te ważne pełnomocnictwa, ważną jest rzeczą ustalić ich trwanie na czas bardzo krótki, który nigdy nie mógłby być przedłużony: w przełomach, powodujących ustanowienie dyktatury, państwo szybko bądź ginie, bądź zostaje uratowane, a gdy nagła potrzeba minie, dyktatura staje się tyrańska lub zbędna. W Rzymie, gdzie dyktatorów mianowano tylko na sześć miesięcy, większość ich składała urząd przed tym terminem. Gdyby termin był dłuższy, może mieliby pokusę jeszcze go przedłużyć tak, jak to uczynili decemwirowie z terminem jednorocznym. Dyktator miał jedynie czas, by uczynić zadość potrzebie, co spowodowała jego wybór; nie miał już czasu myśleć o innych projektach."}]},{"id":"rozdział-vii-o-cenzurze","number":53,"title":"Rozdział VII. O cenzurze","blocks":[{"type":"paragraph","text":"Tak samo jak oświadczenie woli powszechnej następuje w drodze prawa, oświadczenie sądu publicznego następuje w drodze cenzury; opinia jest rodzajem prawa, którego ministrem jest cenzor, a które zastosowuje on jedynie do poszczególnych przypadków na wzór księcia."},{"type":"paragraph","text":"Trybunał cenzoralny nie tylko zatem nie jest panem opinii narodu, lecz jest jedynie jej wyrazicielem, i skoro tylko od niej się oddala, natychmiast orzeczenia jego stają się czcze i bezskuteczne."},{"type":"paragraph","text":"Nie potrzeba odróżniać obyczajów narodu od przedmiotów jego czci; wszystko to bowiem wiąże się z tą samą zasadą i z konieczności miesza się z sobą. Nie natura to wcale decyduje u wszystkich narodów świata o wyborze ich przyjemności, lecz opinia. Wyprostujcie opinie ludziom, a obyczaje ich oczyszczą się same przez się. Kocha się zawsze to, co jest piękne lub co się uważa za piękne; ale sąd o tym dopuszcza omyłki: ten sąd zatem należy unormować. Kto wydaje sąd o obyczajach, sądzi o honorze, kto zaś sądzi o honorze, przyjmuje za swe prawo opinię."},{"type":"paragraph","text":"Opinie narodu rodzą się z jego ustroju; aczkolwiek prawo nie normuje obyczajów, prawodawstwo je rodzi; gdy prawodawstwo słabnie, obyczaje wyradzają się; wówczas jednak sąd cenzorów nie zdziała tego, czego nie mogła zdziałać siła praw."},{"type":"paragraph","text":"Wynika stąd, że cenzura może być pożyteczna do zachowania obyczajów, lecz nigdy do ich przywrócenia. Ustanawiajcie cenzorów, gdy prawa jeszcze są żywotne; gdy tylko nimi być przestają, trzeba zwątpić o wszystkim: nic z tego, co słuszne, nie ma już siły, kiedy prawa jej już nie mają."},{"type":"paragraph","text":"Cenzura utrzymuje obyczaje, nie pozwalając psuć się opiniom, zachowując ich prawość przy pomocy mądrych zastosowań, często nawet ustalając je, gdy jeszcze są chwiejne. Zwyczaj sekundantów w pojedynkach 377 , aż do szaleństwa krzewiący się w królestwie francuskim, zniosły te tylko słowa edyktu królewskiego: „Co się tyczy tych, co są na tyle podli, by przyzywać sekundantów...”. Sąd ten, ubiegając sąd powszechności, od razu go zdecydował. Gdy jednak te same edykty chciały orzec, że jest także podłością bić się w pojedynku — co jest prawdą, lecz jest sprzeczne z powszechną opinią — powszechność śmiała się z tego orzeczenia, co do którego powzięła już swoje zdanie."},{"type":"paragraph","text":"Ponieważ — jak powiedziałem gdzie indziej 378 — opinia publiczna nie podlega przymusowi, nie potrzeba nawet śladu jego w trybunale, powołanym do reprezentowania opinii. Nie można dosyć podziwiać, z jaką sztuką sprężyna ta, całkowicie zagubiona przez nowożytnych, była wprawiona w ruch u Rzymian, a jeszcze lepiej u Lacedemończyków 379 ."},{"type":"paragraph","text":"Gdy pewien człowiek złych obyczajów podał dobrą radę na zgromadzeniu Spartan, eforowie, nie uwzględniając jej, postarali się o to, by ten sam wniosek postawił cnotliwy obywatel. Jakiż zaszczyt dla tego, jakaż hańba dla tamtego, choć nie udzielono ani pochwały, ani nagany żadnemu z nich! Pewni pijacy z Samos 380 zanieczyścili trybunał eforów: nazajutrz edyktem publicznym pozwolono Samijczykom być gburami. Prawdziwa kara mniej byłaby surowa niż podobna bezkarność. Gdy Sparta orzekła o tym, co jest uczciwe lub nim nie jest, Grecja nie wnosi odwołania od jej sądu."}]},{"id":"rozdział-viii-o-religii-państwowej","number":54,"title":"Rozdział VIII. O religii państwowej","blocks":[{"type":"paragraph","text":"Z początku ludzie nie mieli innych królów prócz bogów ani też innego rządu prócz teokratycznego. Rozumowali jak Kaligula 381 i wówczas rozumowali trafnie. Trzeba długiego zepsucia uczuć i myśli, by móc się zdecydować wziąć bliźniego swego za pana i pochlebiać sobie, że tak będzie się można czuć dobrze."},{"type":"paragraph","text":"Z tego samego już, że stawiano Boga na czele każdej społeczności politycznej, wynikło, iż było tylu bogów, ile narodów. Dwa narody sobie obce i zawsze prawie nieprzyjazne nie mogły uznawać długo tego samego pana; dwa wojska walczące z sobą w bitwie nie mogą słuchać tego samego wodza. Z narodowych podziałów wypłynął przeto politeizm, a stąd znów nietolerancja teologiczna i państwowa, które z natury rzeczy są tym samym, jak to później przedstawię."},{"type":"paragraph","text":"Urojenie Greków, że odnajdują swych bogów u barbarzyńskich ludów, płynęło z innego ich urojenia, polegającego na tym, że uważali siebie za naturalnych zwierzchników tych ludów. W naszych czasach jednak śmieszna jest erudycja, obracająca się koło tożsamości bóstw różnych narodów; jak gdyby Moloch, Saturn i Kronos 382 mogli być tym samym bogiem; jak gdyby Baal Fenicjan, Zeus Greków i Jowisz Latynów 383 mogli być tym samym; jak gdyby istoty będące tworami wyobraźni, noszące różne miana mogły mieć jeszcze coś z sobą wspólnego!"},{"type":"paragraph","text":"Na pytanie, dlaczego w świecie pogańskim, kiedy każde państwo miało swoją religię i swoich bogów, nie było wcale wojen religijnych, odpowiadam, że dlatego właśnie, ponieważ każde państwo, mając zarówno własną religię, jak własny rząd, nie odróżniało wcale swoich bogów od swoich praw. Wojna polityczna była równocześnie wojną teologiczną; granice narodów wyznaczały — że się tak wyrażę — tereny bogom. Bóg jednego narodu nie miał żadnego prawa wobec innych narodów. Pogańscy bogowie nie byli bogami zazdrosnymi; dzielili się między sobą panowaniem nad światem. Niekiedy nawet Mojżesz i lud hebrajski przyjmowali ten pogląd, mówiąc o bogu Izraela. Co prawda, za nic mieli oni bogów Kananejczyków 384 , ludu wyjętego spod prawa, skazanego na zagładę, którego dziedziny mieli zająć; posłuchajcie jednak, w jaki sposób mówili o bóstwach sąsiednich narodów, których nie było im wolno napadać: „Czyż nie należy wam się z prawa — mówił Jefte do Ammonitów — posiadanie tego, co jest własnością boga waszego Chamosa? 385 Takim samym prawem my posiadamy ziemie, które nasz zwycięski bóg nabył” 386 . Zdaje mi się, że jest to wyraźne uznanie równorzędności praw Chamosa i praw boga Izraela."},{"type":"paragraph","text":"Gdy jednak Żydzi, poddani królom Babilonu, następnie zaś królom Syrii, chcieli upierać się przy nieuznawaniu żadnego innego boga prócz swojego, odmowa ta, uważana za bunt przeciwko zwycięzcy, ściągnęła na nich prześladowania, o których się czyta w ich historii, a których nie ma żadnego innego przykładu przed chrześcijaństwem 387 ."},{"type":"paragraph","text":"Gdy więc każda religia była związana jedynie z prawami państwa, które ją przepisywało, nie było innego sposobu nawrócenia jakiegoś ludu prócz podbicia go, i innych misjonarzy prócz zdobywców; a skoro prawo pobitych nakazywało obowiązek zmiany wiary, trzeba było najpierw zwyciężyć, a potem dopiero o tym mówić. Nie tylko że ludzie nie walczyli za bogów, lecz właśnie — jak u Homera — bogowie walczyli za ludzi; każdy prosił swojego boga o zwycięstwo i wynagradzał go nowymi ołtarzami. Rzymianie przed zdobyciem jakiejś twierdzy prosili jej bogów, by ją opuścili; i jeżeli pozostawili Tarentyjczykom 388 ich rozgniewanych bogów, to dlatego, że uważali wówczas tych bogów za poddanych swoim bogom i za zmuszonych do hołdowania im. Zostawiali pobitym ich bogów, tak jak zostawiali im ich prawa. Często wieniec dla Jowisza kapitolińskiego 389 był jedynym haraczem, jaki nakładali."},{"type":"paragraph","text":"W końcu, gdy Rzymianie rozprzestrzenili wraz ze swym panowaniem swoją wiarę i swoich bogów i gdy sami często przyjmowali wiarę i bogów od zwyciężonych, przyznając jednym i drugim prawo obywatelstwa, ludy tego rozległego państwa powoli znalazły się w posiadaniu mnóstwa bogów i wiar, mniej więcej wszędzie jednakich; i oto w jaki sposób poganizm stał się w końcu w całym znanym świecie jedną i tą samą religią."},{"type":"paragraph","text":"W tych to okolicznościach przyszedł Jezus założyć na ziemi królestwo ducha, co przez oddzielenie systemu teologicznego od systemu politycznego spowodowało, że państwo przestało być jednością, oraz wywołało wewnętrzne różnice, które nigdy nie przestały wstrząsać narodami chrześcijańskimi. Otóż ponieważ ta nowa idea królestwa z tamtego świata nie mogła nigdy pomieścić się w głowach pogan, uważali oni zawsze chrześcijan za prawdziwych buntowników, którzy pod pozorem fałszywej uległości czekali tylko na stosowną chwilę, by uniezależnić się i stać się panami, tudzież zręcznie przywłaszczyć sobie władzę, dla której w słabości swojej udawali szacunek. Taka była przyczyna prześladowań."},{"type":"paragraph","text":"To, czego poganie obawiali się, nadeszło. Wówczas wszystko zmieniło oblicze: pokorni chrześcijanie odmienili mowę i wkrótce ujrzano, jak to rzekome królestwo z tamtego świata staje się pod rządami widomej głowy najgwałtowniejszym despotyzmem na tym świecie."},{"type":"paragraph","text":"Tymczasem, skoro zawsze istniał książę i prawa państwowe, następstwem tej podwójnej władzy był wieczny konflikt jurysdykcji, uniemożliwiający w państwach chrześcijańskich wszelką dobrą organizację; i nigdy nie było można poradzić sobie z tym, by wiedzieć, kogo trzeba słuchać: władzy czy księdza."},{"type":"paragraph","text":"Jednakowoż kilka narodów, nawet w Europie lub w jej sąsiedztwie, chciało zachować, względnie przywrócić dawny system — ale bez powodzenia: duch chrześcijaństwa opanował wszystko. Kult religijny pozostał zawsze niezależny od zwierzchnika, z powrotem uniezależnił się od niego, i był nadal niezwiązany w sposób konieczny z ciałem państwowym. Mahomet miał bardzo zdrowe poglądy; dobrze związał swój polityczny system i dopóki forma jego rządu utrzymała się pod panowaniem następców jego, kalifów, rząd ten miał najściślejszą jedność, i dlatego był dobry. Barbarzyńcy jednak podbili Arabów, którzy doszli do rozkwitu, stali się uczonymi, cywilizowanymi, miękkimi i gnuśnymi; wówczas zaczął się na nowo przedział między obydwoma władzami; aczkolwiek jest mniej widoczny u Mahometan niż u chrześcijan, istnieje jednak, zwłaszcza w sekcie Alego 390 , i są państwa, jak na przykład Persja, gdzie ustawicznie daje się odczuwać."},{"type":"paragraph","text":"Pośród nas królowie angielscy ustanowili się naczelnikami Kościoła, tak samo uczynili carowie; przez tytuł ten jednak stali się nie tyle panami, jak wykonawcami woli Kościoła; nabyli nie tyle prawo przeprowadzania w nim zmian, ile władzę podtrzymywania go; nie są w nim prawodawcami, są jedynie książętami. Wszędzie, gdzie duchowieństwo tworzy korporację 391 , jest w swoim dziale panem i prawodawcą. W Anglii więc i w Rosji istnieją dwie władze, tak samo jak gdzie indziej."},{"type":"paragraph","text":"Ze wszystkich chrześcijańskich autorów jedyny filozof Hobbes spostrzegł wyraźnie i zło, i lekarstwo, odważył się zaproponować zjednoczenie obydwu głów orła i sprowadzenie wszystkiego do jedności politycznej, bez której nigdy ani państwo, ani rząd nie będą dobrze zorganizowane; powinien był jednak spostrzec, że duch panujący w chrześcijaństwie nie da się pogodzić z jego systemem i że interes księdza zawsze pokona interes państwa. Znienawidzono jego politykę nie tyle dla tego, co jest w niej straszne i fałszywe, jak dla tego, co w niej słuszne i prawdziwe 392 ."},{"type":"paragraph","text":"Mniemam, że rozwijając z tego punktu widzenia fakty dziejowe, można by łatwo odeprzeć sprzeczne z sobą poglądy Bayle’a 393 i Warburtona, z których pierwszy twierdzi, że żadna religia nie jest pożyteczna dla ciała politycznego, a drugi przeciwnie, utrzymuje, że chrześcijanizm jest najsilniejszą jego podporą. Pierwszemu można by dowieść, że religia tworzyła zawsze podstawę nowo założonego państwa; drugiemu zaś, że chrześcijański zakon w gruncie rzeczy przynosi większą szkodę niż korzyść silnej organizacji państwa. Aby być całkowicie zrozumianym, trzeba mi tylko jeszcze nadać więcej ścisłości zanadto ogólnikowym pojęciom o religii, z punktu widzenia mojego przedmiotu."},{"type":"paragraph","text":"Religia, rozważana w stosunku swoim do społeczności, która jest bądź powszechna, bądź szczególna 394 , da się również podzielić na dwa gatunki, mianowicie religię człowieka i religię obywatela. Pierwsza, bez świątyń, bez ołtarzy, bez obrzędów, ograniczona do czysto wewnętrznego wyznawania najwyższego Boga oraz do wieczystych obowiązków moralności, jest czystą i prostą religią Ewangelii, prawdziwym teizmem oraz tym, co można nazwać boskim prawem naturalnym 395 . Druga, zamknięta w obrębie jednego tylko kraju, daje mu bogów, własnych jego i opiekuńczych patronów: ma swoje dogmaty, obrzędy, kult zewnętrzny przez prawa przepisany; prócz jednego wyznającego ją narodu wszystko jest w jej oczach niewierne, obce, barbarzyńskie; rozciąga ona obowiązki i prawa człowieka tylko tak daleko, jak swe ołtarze. Takie były religie wszystkich pierwotnych narodów, a można im dać miano bożego prawa państwowego, czyli pozytywnego."},{"type":"paragraph","text":"Jest jeszcze trzeci rodzaj religii, dziwaczniejszy, który obdarzając ludzi dwoma prawodawstwami, dwiema ojczyznami, poddaje ich pod sprzeczne obowiązki i nie pozwala im być równocześnie pobożnymi i obywatelami. Taka jest religia Lamów 396 , taka jest religia Japończyków, takie jest chrześcijaństwo rzymskie. Można je nazwać religią księży. Wynika z niej rodzaj mieszanego i aspołecznego prawa, niemającego nazwy."},{"type":"paragraph","text":"Jeżeli rozważa się ze stanowiska polityki te trzy rodzaje religii, to każda z nich ma swoje wady. Trzecia jest tak oczywiście zła, że szkoda czasu na bawienie się w dowodzenie tego. Wszystko, co łamie jedność społeczną, nic nie jest warte; wszystkie urządzenia wikłające człowieka w wewnętrzne sprzeczności są bez wartości."},{"type":"paragraph","text":"Druga ma tę zaletę, że jednoczy wiarę w Boga i miłość praw, oraz tę, że czyniąc z ojczyzny przedmiot uwielbienia obywateli, uczy ich, że służyć państwu, znaczy służyć jego bogu opiekuńczemu. Jest to rodzaj teokracji, w której nie powinno być innego arcykapłana prócz księcia ani innych księży prócz urzędników. Wówczas umrzeć za ojczyznę, to iść na męczeństwo; gwałcić prawa, to być bezbożnym; a poddać winnego hańbie publicznej, to poświęcić go gniewowi bogów: sacer esto 397 ."},{"type":"paragraph","text":"Jest jednak zła w tym, że opierając się na błędzie i na kłamstwie, oszukuje ludzi, czyni ich łatwowiernymi, przesądnymi i topi prawdziwy kult bóstwa w czczym ceremoniale. Jest jeszcze zła, gdy stając się wyłączną i tyrańską, czyni naród i krwawym, i nietolerancyjnym, tak że dyszy mordem i rzezią i mniema spełniać święty czyn, gdy zabija każdego, kto nie uznaje jego bogów. To stawia taki naród w naturalny stan wojenny ze wszystkimi innymi, w stan szkodliwy dla jego własnego bezpieczeństwa."},{"type":"paragraph","text":"Pozostaje więc religia człowieka, czyli chrześcijaństwo, nie to dzisiejsze, lecz owo ewangeliczne, całkowicie od tamtego różne. Dzięki tej świętej, szczytnej, prawdziwej religii ludzie, dzieci tego samego Boga, uważają się wszyscy za braci, a jednocząca ich społeczność nie rozwiązuje się nawet ze śmiercią."},{"type":"paragraph","text":"Religia ta jednak, nie pozostając z ciałem politycznym w żadnym szczególnym stosunku, pozostawia prawom jedynie tę siłę, którą czerpią same z siebie, a żadnej innej im nie dodaje; i w ten sposób traci działanie jeden z najsilniejszych więzów społeczności poszczególnej. Więcej jeszcze, nie tylko że nie przywiązuje serc obywateli do państwa, ale je jeszcze od niego oddala, jak od wszystkiego, co ziemskie. Nie znam nic bardziej przeciwnego duchowi społecznemu."},{"type":"paragraph","text":"Powiadają, że naród prawdziwych chrześcijan tworzyłby najbardziej doskonałą społeczność, jaką tylko sobie można wyobrazić. Widzę jedną tylko wielką trudność w tym przypuszczeniu, a mianowicie tę, że społeczność prawdziwych chrześcijan nie byłaby już społecznością ludzką."},{"type":"paragraph","text":"Twierdzę nawet, że ta przypuszczalna społeczność nie byłaby przy całej swej doskonałości ani najsilniejsza, ani najtrwalsza; z powodu jej doskonałości brakłoby jej spójności; wada niszcząca ją tkwiłaby właśnie w jej doskonałości."},{"type":"paragraph","text":"Każdy spełniałby swój obowiązek; naród ulegałby prawom, naczelnicy byliby sprawiedliwi i umiarkowani, urzędnicy uczciwi i nieprzekupni; żołnierze gardziliby śmiercią; nie byłoby ani próżności, ani zbytku — wszystko to bardzo pięknie, ale patrzmy dalej."},{"type":"paragraph","text":"Chrześcijaństwo jest religią czysto duchową, zajętą wyłącznie rzeczami niebieskimi: ojczyzna chrześcijanina nie jest z tego świata. Pełni swój obowiązek, prawda; czyni to jednak z głęboką obojętnością na to, czy trudy jego uwieńczy powodzenie, czy nie. Byleby sobie nic nie miał do wyrzucenia, mało go obchodzi, czy dobrze, czy źle się dzieje na tym padole. Gdy państwo kwitnie, gdy mu się powodzi, on ledwo ośmiela się cieszyć szczęśliwością publiczną; obawia się wzbić w pychę z powodu sławy swego kraju; gdy państwo ginie, błogosławi ręce Bożej, co zaciążyła nad jego narodem."},{"type":"paragraph","text":"Aby społeczeństwo żyło w spokoju i aby utrzymała się harmonia, trzeba, aby wszyscy bez wyjątku obywatele byli równie dobrymi chrześcijanami; gdyby jednak na nieszczęście znalazł się choć jeden ambitny, choć jeden hipokryta, jakiś Katylina na przykład, jakiś Cromwell, to ten na pewno łatwo pochwyci władzę nad swymi pobożnymi współobywatelami. Chrześcijańskie miłosierdzie nie pozwala pochopnie myśleć źle o bliźnim. Skoro tylko przez jakiś podstęp znajdzie on sposób omamienia ich i zawładnięcia jakąś częścią władzy publicznej, już staje się człowiekiem wielce czcigodnym: Bóg chce, by go szanowano; wkrótce staje się potęgą: Bóg chce, by jej słuchano. Jeżeli depozytariusz władzy nadużywa jej, jest biczem, którym Bóg karze swe dzieci. Będzie się sobie robiło skrupuły, czy można wypędzić przywłaszczyciela: trzeba by zaburzyć spokój publiczny, chwycić się gwałtu, przelewać krew; wszystko to źle się godzi z łagodnością chrześcijańską; a zresztą, czyż nie wszystko jedno, czy się jest wolnym, czy niewolnikiem na tym padole nędzy? Istotną rzeczą jest pójść do nieba, a rezygnacja jest jednym więcej środkiem do tego celu."},{"type":"paragraph","text":"Gdy wybucha wojna z cudzoziemcem, obywatele bez trudu idą w bój; żaden z nich nie myśli uciekać; pełnią swój obowiązek, nie pożądając jednak zwycięstwa; umieją raczej umierać niż zwyciężać. Alboż to nie wszystko jedno, czy będą zwycięzcami, czy zwyciężonymi? Czyż Opatrzność nie wie lepiej, czego im potrzeba? Proszę sobie wyobrazić, jak może wyzyskać ich stoicyzm nieprzyjaciel dumny, gwałtowny, namiętny! Postawcie naprzeciw nich te szlachetne narody, które trawiła płomienna miłość sławy i ojczyzny; wyobraźcie sobie waszą chrześcijańską republikę naprzeciw Sparty czy Rzymu: pobożni chrześcijanie zostaną pobici, zmiażdżeni, wytępieni, zanim znajdą czas opatrzyć się, albo będą zawdzięczać swoje ocalenie jedynie pogardzie, jaką nieprzyjaciel ku nim poweźmie. Piękna była, moim zdaniem, przysięga żołnierzy Fabiusza 398 ; nie przysięgali oni umrzeć lub zwyciężyć, przysięgli, że powrócą zwycięzcami, i dotrzymali przysięgi; nigdy chrześcijanie nie złożyliby takiej przysięgi: mniemaliby, że kuszą Boga."},{"type":"paragraph","text":"Mylą się jednak, mówiąc: republika chrześcijańska; obydwa te słowa wykluczają się wzajemnie. Chrześcijaństwo głosi jedynie poddaństwo i zależność. Duch jego zbyt sprzyja tyranii, by nie miała ona zawsze tego wyzyskiwać. Prawdziwi chrześcijanie są stworzeni na niewolników; wiedzą o tym i wcale się tym nie przejmują; to krótkie życie za mało ma wartości w ich oczach."},{"type":"paragraph","text":"Mówią nam, że wojska chrześcijańskie są znakomite. Zaprzeczam temu. Proszę mi je pokazać! Co do mnie, nie znam wcale wojsk chrześcijańskich. Przytoczą mi krucjaty. Nie sprzeczając się co do wartości krzyżowców, zauważę, że dalecy od chrześcijaństwa, byli oni żołnierzami księży, byli obywatelami Kościoła; bili się za jego ojczyznę duchową, którą Kościół, nie wiadomo w jaki sposób, zamienił na doczesną. Właściwie mówiąc, mieści się to w pogaństwie; skoro Ewangelia nie ustanawia religii narodowej, wszelka święta wojna nie jest możliwa wśród chrześcijan."},{"type":"paragraph","text":"Za panowania pogańskich cesarzy chrześcijańscy żołnierze odznaczali się dzielnością; zapewniają o tym wszyscy autorzy chrześcijańscy, i wierzę temu: była to rywalizacja o honor z wojskami pogańskimi. Gdy tylko cesarze przyjęli chrześcijaństwo, współzawodnictwo to już się nie utrzymało; i gdy krzyż wypędził orła, cała dzielność rzymska znikła."},{"type":"paragraph","text":"Pozostawiając jednak rozważania polityczne 399 na boku, powróćmy do prawa i ustalmy zasady co do tego ważnego punktu. Jak powiedziałem, prawo, jakie układ społeczny daje zwierzchnikowi nad poddanymi, nie przekracza granic pożytku publicznego 400 . Poddani winni są więc zwierzchnikowi rachubę ze swoich przekonań o tyle tylko, o ile te przekonania posiadają wagę dla wspólnoty 401 . Otóż państwu zależy bardzo na tym, by każdy obywatel miał jakąś religię, która nakazywałaby mu kochać jego obowiązki; dogmaty tej religii interesują jednak państwo, tudzież jego członków o tyle tylko, o ile dotyczą moralności i obowiązków, jakie wyznający ją powinien spełniać wobec drugich. Poza tym każdy może mieć przekonania, jakie mu się tylko podoba; a nie należy do zwierzchnika wdawać się w nie, ponieważ władza jego nie rozciąga się na tamten świat, nie obchodzi go, jaki los spotka poddanych w przyszłym życiu, byleby tylko w tym życiu byli dobrymi obywatelami."},{"type":"paragraph","text":"Istnieje więc czysto państwowe wyznanie wiary, a ustalenie jego artykułów należy do zwierzchnika, ściśle mówiąc nie jako dogmatów religijnych, ale jako społecznych odczuć, bez których niemożliwe jest być dobrym obywatelem ani wiernym poddanym 402 . Nie mogąc zobowiązać nikogo do wierzenia w to, może wygnać z państwa każdego, kto w to nie wierzy; może go wygnać nie jako bezbożnego, ale jako niespołecznego człowieka, jako niezdolnego do szczerego ukochania praw, sprawiedliwości i poświęcenia w potrzebie życia dla obowiązku. Gdyby zaś ktoś, uznawszy publicznie te same dogmaty, postępował tak, jakby w nie nie wierzył, niech będzie ukarany śmiercią; dopuścił się najcięższej zbrodni: skłamał w obliczu praw."},{"type":"paragraph","text":"Dogmaty państwowej religii powinny być proste, nieliczne, wypowiedziane ze ścisłością, bez wyjaśnień i bez komentarzy. Istnienie potężnego Bóstwa, rozumnego, dobroczynnego, przewidującego i zapobiegającego, życie przyszłe, szczęście sprawiedliwych, kara na złych, świętość umowy społecznej i praw — oto pozytywne dogmaty. Co do negatywnych dogmatów, ograniczam je do jednego: jest nim nietolerancja; wchodzi ona w skład religii, któreśmy wyłączyli."},{"type":"paragraph","text":"Moim zdaniem mylą się ci, co odróżniają nietolerancję państwową od nietolerancji teologicznej. Obydwie te nietolerancje są nierozłączne. Niemożliwe jest żyć w spokoju z ludźmi, których się uważa za potępionych; miłować ich znaczyłoby nienawidzić Boga, który ich karze; bezwzględnie trzeba ich albo nawrócić, albo zamęczyć. Wszędzie, gdzie przyjęto nietolerancję teologiczną, musi mieć ona jakieś państwowe skutki 403 , a skoro tylko je ma, zwierzchnik nie jest już odtąd zwierzchnikiem, nawet w rzeczach doczesnych, i odtąd księża są prawdziwymi panami; królowie są tylko urzędnikami."},{"type":"paragraph","text":"Obecnie, gdy nie ma i być już nie może religii wyłącznie narodowej, powinno się tolerować wszystkie religie, które tolerują inne, o ile dogmaty ich nie zawierają nic sprzecznego z obowiązkami obywatelskimi. Ktokolwiek jednak ośmiela się mówić: „Poza Kościołem nie masz zbawienia”, winien być wygnany z państwa, chyba że państwo byłoby Kościołem, a książę byłby arcykapłanem. Taki dogmat jest dobry tylko przy rządzie teokratycznym; przy każdym innym jest zgubny. Powód, dla którego, jak mówią, Henryk IV przyjął religię rzymską 404 , powinien kazać ją porzucić każdemu uczciwemu człowiekowi, a przede wszystkim każdemu księciu, który umie myśleć 405 ."}]},{"id":"rozdział-ix-zakończenie","number":55,"title":"Rozdział IX. Zakończenie","blocks":[{"type":"paragraph","text":"Po ustaleniu prawdziwych zasad prawa politycznego i po postaraniu się o to, by ugruntować państwo na jego podstawie, pozostawałoby jeszcze wywieść oparcie dla jego zewnętrznych stosunków, co musiałoby objąć prawo narodów, handel, prawo wojny i podbojów, prawo publiczne, ligi, układy, traktaty itd. Wszystko to jednak stanowi przedmiot nazbyt rozległy, przechodzący krąg mojego widzenia; powinien bym zawsze rozpatrywać to, co leży bliżej mnie 406 ."}]}]};</script>
