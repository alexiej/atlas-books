ydwu władz i do podtrzymania ich odnośnych praw. Wówczas rząd nie jest mieszany, jest miarkowany 259 ."},{"type":"paragraph","text":"Za pomocą podobnych środków można zaradzić odwrotnej wadzie i gdy rząd jest zanadto luźny, ustanowić urzędy w celu ześrodkowania go 260 . Praktykuje się to we wszystkich demokracjach. W pierwszym wypadku dzieli się rząd, by go osłabić, w drugim zaś, by go wzmocnić; rządy proste posiadają bowiem maksimum zarówno siły, jak słabości, podczas gdy formy mieszane stwarzają siłę przeciętną 261 ."}]},{"id":"rozdział-viii-nie-każda-forma-rządu-jest-odpowiednia-dla-każdego-kraju","number":35,"title":"Rozdział VIII. Nie każda forma rządu jest odpowiednia dla każdego kraju","blocks":[{"type":"paragraph","text":"Wolność, nie będąc owocem wszystkich klimatów, nie jest dostępna dla wszystkich narodów. Im więcej rozważa się tę zasadę, ustaloną przez Monteskiusza 262 , tym bardziej czuje się jej prawdziwość; im bardziej się jej zaprzecza, tym więcej nastręcza się sposobności do ustalenia jej za pomocą nowych dowodów 263 ."},{"type":"paragraph","text":"We wszystkich rządach świata osoba publiczna spożywa, a nic nie wytwarza. Skądżeż więc otrzymuje to, co spożywa? Z pracy swych członków. Nadmiar, jaki mają obywatele, dostarczą na konieczne potrzeby powszechności. Skąd wynika, że stan społeczny może utrzymać się tylko o tyle, o ile praca ludzi wytwarza więcej, niż oni potrzebują."},{"type":"paragraph","text":"Otóż ta nadwyżka nie jest taka sama we wszystkich krajach świata. W wielu jest znaczna, w innych mierna, w innych wcale jej nie ma, w innych jeszcze jest ujemna. Stosunek ten zależy od płodności klimatu, od rodzaju pracy, jakiego ziemia wymaga, od gatunku płodów, od siły mieszkańców, od mniejszej lub większej koniecznej dla nich konsumpcji i od kilku innych podobnych stosunków, z których stosunek ten się składa."},{"type":"paragraph","text":"Z drugiej strony, nie wszystkie rządy mają tę samą naturę: jedne pochłaniają mniej, drugie więcej; a różnice gruntują się na innej zasadzie: że im bardziej podatki publiczne oddalają się od swego źródła, tym bardziej są uciążliwe. Nie trzeba mierzyć tego ciężaru ilością podatków, lecz drogą, jaką mają one odbyć, by wrócić do rąk, z których wyszły. Gdy ten obrót odbywa się szybko i dobrze jest od początku unormowany, wówczas wszystko jedno, czy płaci się mało czy wiele, naród zawsze jest bogaty, a skarb zawsze ma się dobrze. Przeciwnie, choćby naród dawał mało, ale gdy to mało doń nie wraca, dając ciągle, wkrótce się on wyczerpie: państwo nigdy nie jest bogate, a naród zawsze jest w nędzy."},{"type":"paragraph","text":"Wynika stąd, że im bardziej zwiększa się odległość między narodem a rządem, tym uciążliwsze stają się daniny: więc w demokracji naród jest najmniej obciążony, w arystokracji już więcej, w monarchii dźwiga największy ciężar. Monarchia odpowiada więc jedynie narodom bogatym; arystokracja państwom miernym tak co do bogactwa, jak co do wielkości; demokracja państwom małym i biednym."},{"type":"paragraph","text":"Istotnie, im więcej się nad tym zastanawiamy, tym więcej odkrywamy co do tego różnic między państwami wolnymi a monarchicznymi: w pierwszych wszystko idzie na cele pożytku publicznego; w drugich siły publiczne i poszczególne są odwrotnie proporcjonalne i jedne powiększają się przez osłabienie drugich; w końcu despotyzm, zamiast rządzić poddanymi, by ich uczynić szczęśliwymi, czyni ich nędzarzami, by nimi rządzić."},{"type":"paragraph","text":"Oto więc w każdym klimacie naturalne przyczyny, według których można oznaczyć formę rządu, którą pociąga za sobą siła klimatu, a nawet powiedzieć, jaki tam powinien być rodzaj mieszkańców 264 ."},{"type":"paragraph","text":"Ziemie niewdzięczne i jałowe, gdzie produkt nie opłaca pracy, powinny pozostać bez uprawy i w pustce lub być zaludnione jedynie dzikimi; ziemie, gdzie praca ludzka wydaje jedynie na konieczne potrzeby, powinny być zamieszkiwane przez ludy barbarzyńskie; wszelka organizacja byłaby na nich niemożliwa; ziemie, gdzie nadwyżka produktów ponad pracę jest mierna, nadają się dla wolnych narodów; takie, gdzie gleba obfita i żyzna wydaje wiele płodów w zamian za małą pracę, wymagają rządu monarchicznego, by zbytek księcia spożywał zbędny nadmiar poddanych; lepiej bowiem, by nadmiar ten rząd pochłonął, niżby go mieli trwonić poddani. Są wyjątki, wiem o tym, lecz te wyjątki same potwierdzają regułę przez to, że wywołują prędzej czy później rewolucje, które z powrotem przyprowadzają rzeczy do naturalnego porządku."},{"type":"paragraph","text":"Odróżniajmy zawsze prawa ogólne od przyczyn szczególnych, które mogą modyfikować ich działanie. Choćby całe południe było pokryte republikami, cała zaś północ państwami despotycznymi, niemniej byłoby prawdą, że na skutek klimatu despotyzm odpowiada krajom gorącym, barbarzyństwo krajom zimnym, a dobra organizacja strefom umiarkowanym. Spostrzegam jeszcze, że zgadzając się na zasadę, można by sprzeczać się co do jej zastosowania: można by powiedzieć, że są kraje północne bardzo żyzne, a południowe bardzo niewdzięczne. Ta trudność powstaje jednak tylko dla tych, którzy nie badają rzeczy we wszystkich jej stosunkach. Trzeba — jak to już powiedziałem — uwzględnić stosunki pracy, sił, konsumpcji itd."},{"type":"paragraph","text":"Przyjmijmy, że z dwóch równych obszarów jeden przynosi pięć, a drugi dziesięć. Jeśli mieszkańcy pierwszego spożywają cztery, a drugiego dziewięć, nadwyżka przychodu z pierwszego będzie wynosić jedną piątą, z drugiego zaś jedną dziesiątą. Skoro więc stosunek tych dwóch nadwyżek jest odwrotny do stosunku przychodów, obszar przynoszący tylko pięć da nadwyżkę podwójną nadwyżki obszaru przynoszącego dziesięć."},{"type":"paragraph","text":"Nie ma jednak mowy o podwójnym przychodzie i nie sądzę, by ktokolwiek śmiał ogólnie kłaść na równi żyzność krajów zimnych z żyznością krajów gorących. W każdym razie przypuśćmy tę równość: każmy, jeśli już tak chcemy, Anglii równoważyć się z Sycylią, a Polsce z Egiptem; bardziej na południe będziemy mieć Afrykę i Indie, bardziej na północ nic już nie znajdziemy. W zamian za tę równość przychodów jakaż różnica w uprawie! Na Sycylii wystarczy poskrobać ziemię, w Anglii ileż trudów przy oraniu! Otóż tam, gdzie więcej rąk trzeba, by dać ten sam przychód, nadwyżka musi być z konieczności mniejsza."},{"type":"paragraph","text":"Zważcie ponadto, że ta sama liczba ludzi spożywa o wiele mniej w krajach gorących. Klimat wymaga tam wstrzemięźliwości, jeśli się chce być zdrowym: Europejczycy, którzy chcą tam żyć jak u siebie, giną wszyscy na dyzenterię 265 i na niestrawność. Chardin 266 powiada: „Jesteśmy zwierzętami mięsożernymi, wilkami w porównaniu z Azjatami. Niektórzy przypisują wstrzemięźliwość Persów temu, że kraj ich jest mniej uprawny, ja zaś sądzę przeciwnie, że kraj ich mniej obfituje w żywność, ponieważ mieszkańcy mniej jej potrzebują. Gdyby ich skromne życie było wynikiem ubóstwa kraju, tylko biedni jedliby mało, gdy tymczasem tam w ogóle wszyscy mało jedzą; i w każdej prowincji jedliby mniej albo więcej, zależnie od żyzności kraju, gdy tymczasem tę samą wstrzemięźliwość spotyka się w całym państwie. Bardzo sobie chwalą swój sposób życia, mówiąc, że wystarczy spojrzeć na ich cerę, by poznać, o ile jest lepsza od cery chrześcijan. Rzeczywiście cera Persów jest jednolita, mają skórę piękną, cienką i gładką, gdy przeciwnie, cera Ormian, ich poddanych, żyjących po europejsku, jest szorstka, wągrowata, ciała ich są grube i ciężkie”."},{"type":"paragraph","text":"Im bliżej równika, tym bardziej ludy żyją z niewiela 267 . Prawie zupełnie nie jedzą mięsa; zwyczajne ich pożywienie stanowią ryż, kukurydza, kuskus, proso, mąka z korzonka manioku. W Indiach są miliony ludzi, których pożywienie nie kosztuje jednego szeląga 268 dziennie. Nawet w Europie widzimy znaczne różnice między apetytem ludów północnych a południowych. Hiszpan będzie żył osiem dni obiadem Niemca. W krajach, gdzie ludzie żarłoczniejsi, zbytek skierowuje się także na przedmioty spożycia. W Anglii przejawia się w stołach uginających się pod mięsiwem; we Włoszech uraczą cię cukrami i kwiatami."},{"type":"paragraph","text":"Podobne różnice występują także przy zbytku w strojach. W klimatach, gdzie zmiany pór są nagłe i gwałtowne, używają sukien lepszych i prostszych; tam, gdzie ubiera się tylko dla stroju, szuka się w nich więcej blasku niż pożytku; nawet suknie są tam zbytkiem. W Neapolu ujrzycie codziennie ludzi spacerujących na Pausylipie 269 w złocistych kurtkach, a bez pończoch. Tak samo ma się rzecz z budynkami: wszystko się poświęca dla wspaniałości, gdy nie potrzeba się niczego obawiać ze strony pogody. W Paryżu, w Londynie chce się mieszkać ciepło i wygodnie; w Madrycie ma się wspaniałe salony, lecz nie ma okien, które by się domykały, a śpi się w gniazdach szczurzych."},{"type":"paragraph","text":"W krajach gorących potrawy są o wiele bardziej treściwe i pożywne; to trzecia różnica, która nie może zostać bez wpływu na drugą. Dlaczego je się we Włoszech tyle jarzyn? Ponieważ są tam dobre, pożywne, o doskonałym smaku. We Francji, gdzie jarzyny odżywiają się tylko wodą, nie są pożywne i prawie że nie liczą się przy stole. Jednak nie zajmują mniej ziemi i wymagają przynajmniej takiej samej pracy przy uprawie. Z doświadczenia wiadomo, że zboża Berberii 270 , gorsze zresztą od francuskich, więcej dają mąki, a znowuż francuskie więcej niż zboża północne; skąd można wnosić, że podobne stopniowanie zauważa się na ogół w tym samym kierunku od równika ku biegunowi. Otóż czyż to nie jest widoczne upośledzenie, gdy w równej ilości wytworów ma się mniejszą ilość pożywienia?"},{"type":"paragraph","text":"Do tych różnych uwag mogę dodać jeszcze jedną z nich wypływającą i popierającą je, mianowicie, że kraje gorące mniej potrzebują mieszkańców niż kraje zimne, a mogłyby ich więcej wyżywić; co wytwarza podwójny nadmiar, znowuż z korzyścią dla despotyzmu. Gdy ta sama liczba mieszkańców zajmuje wielką przestrzeń, tym trudniejsze stają się bunty, ponieważ nie można porozumieć się szybko i tajemnie i ponieważ rządowi zawsze jest łatwo zwietrzyć zamiary i przeciąć połączenia; ale im bardziej skupia się liczny naród, tym trudniej może rząd uzurpować władzę nad zwierzchnikiem; przywódcy naradzają się równie bezpiecznie w swych pokojach, jak książę w swojej radzie, a tłum zbiera się równie prędko na placach, jak wojsko w koszarach. Tutaj więc korzystne jest dla rządu tyrańskiego, że działa na dalekie przestrzenie. Przy pomocy punktów oparcia, jakie sobie stwarza, zwiększa swą siłę na odległość, tak jak dźwignia 271 . Siła narodu, przeciwnie, działa tylko skupiona: ulatnia się i gubi, gdy się rozprzestrzenia, jak energia prochu rozsypanego po ziemi, który wybucha dopiero ziarno po ziarnie. Kraje najmniej zaludnione są przeto najbardziej sposobne do tyranii; drapieżne zwierzęta królują tylko w pustyniach."}]},{"id":"rozdział-ix-o-oznakach-dobrego-rządu","number":36,"title":"Rozdział IX. O oznakach dobrego rządu","blocks":[{"type":"paragraph","text":"Pytanie, jaki rząd jest bezwzględnie najlepszy, jest pytaniem nie do rozwiązania, ponieważ jest nieokreślone; albo — jeśli ktoś woli — pytanie to zawiera tyle dobrych rozwiązań, ile jest możliwych kombinacji co do bezwzględnych i względnych położeń narodów."},{"type":"paragraph","text":"Gdyby jednak pytanie brzmiało: po jakich znakach można rozpoznać, że dany naród jest dobrze lub źle rządzony, sprawa byłaby inna i pytanie faktyczne dałoby się rozwiązać."},{"type":"paragraph","text":"Jednak nie rozwiązuje się go, ponieważ każdy chce go swoim sposobem rozwiązać. Poddani chwalą spokój publiczny, obywatele wolność jednostek 272 ; jeden woli bezpieczeństwo posiadania, inny bezpieczeństwo osobiste; jeden chce, by rządem najlepszym był rząd najbardziej surowy, drugi utrzymuje, że jest nim najbardziej łagodny; jeden chce, by zbrodnie karano, drugi, by im zapobiegano; jednemu podoba się, żeby sąsiedzi się bali, drugi woli, by zapominali; jeden jest zadowolony, gdy pieniądz obiega, drugi wymaga, by lud miał chleb. Choćby się nawet zgodzić co do tych punktów i innych podobnych, czyż postąpiłoby się przez to naprzód? Skoro jakości moralnych nie można ściśle mierzyć, choćby się zgodzono na oznakę, jakżeż się godzić na ocenę?"},{"type":"paragraph","text":"Co do mnie, dziwię się zawsze, że zapomina się o tak prostym znaku, względnie, że ma się złą wiarę nie godzić się na niego. Jakiż jest cel stowarzyszenia politycznego? Oto zachowanie i dobrobyt członków. A jakiż jest znak najpewniejszy, że zachowują się i żyją w dobrobycie? Oto ich liczba i zaludnienie. Nie szukajcie więc daleko tego tak spornego znaku. Przy równości wszystkich innych rzeczy ten rząd jest nieomylnie najlepszy, pod którym — bez obcych środków, bez naturalizacji, bez kolonii — obywatele gęściej kraj zaludniają i więcej się mnożą. Najgorszy jest ten, pod którym naród zmniejsza się i wymiera. Kalkulatorzy, teraz jest już waszą rzeczą rachować, mierzyć, porównywać 273 ."}]},{"id":"rozdział-x-o-nadużyciu-rządu-i-o-jego-skłonności-do-zwyrodnienia","number":37,"title":"Rozdział X. O nadużyciu rządu i o jego skłonności do zwyrodnienia","blocks":[{"type":"paragraph","text":"Tak jak wola szczególna działa ustawicznie przeciw woli powszechnej, tak samo rząd czyni ciągłe wysiłki przeciw władzy zwierzchniczej. Im bardziej wzrasta ten wysiłek, tym bardziej ustrój się psuje; a ponieważ nie ma tutaj innej woli grupy, która by, opierając się woli księcia, równoważyła ją, prędzej czy później musi nastąpić to, że książę w końcu zgniecie zwierzchnika i złamie układ społeczny. Oto wada nierozłączna i nie do uniknięcia, która od samych narodzin ciała politycznego zmierza bez przerwy do zniszczenia go, tak samo jak starość i śmierć niszczą w końcu ciało ludzkie 274 ."},{"type":"paragraph","text":"Dwie są ogółem drogi, na których rząd wyrodnieje: mianowicie, gdy ścieśnia się lub gdy państwo rozpada się."},{"type":"paragraph","text":"Rząd ścieśnia się, gdy przechodzi z wielkiej liczby do małej, to znaczy z demokracji do arystokracji, a z arystokracji do formy królewskiej. Taka jest jego naturalna skłonność 275 . Gdyby cofał się od małej liczby ku wielkiej, można by powiedzieć, że się rozluźnia; ten postęp odwrotny nie jest jednak możliwy."},{"type":"paragraph","text":"W istocie rząd zmienia formę wtedy tylko, gdy przez zużycie się sprężyny stał się zanadto słaby, by mógł zachować swą formę. Otóż gdyby rozluźnił się jeszcze, rozszerzając się, straciłby zupełnie siłę i tym mniej mógłby się utrzymać. Trzeba więc nakręcać i ściskać sprężynę, w miarę jak się rozkręca: inaczej państwo, które ona podtrzymuje, popadłoby w ruinę."},{"type":"paragraph","text":"Wypadek rozpadnięcia się państwa może nastąpić w dwojaki sposób."},{"type":"paragraph","text":"Najpierw, gdy książę nie zarządza już państwem stosownie do praw i gdy uzurpuje władzę zwierzchniczą. Wówczas następuje godna uwagi zmiana: mianowicie ścieśnia się nie rząd, lecz państwo; chcę powiedzieć, że wielkie państwo rozpada się i że wewnątrz niego tworzy się nowe państwo, złożone jedynie z członków rządu, które dla reszty narodu nie jest już niczym więcej, jak tylko panem jego i tyranem. Tak, że natychmiast z chwilą, gdy rząd uzurpuje władzę zwierzchniczą, układ społeczny zostaje zerwany, a wszyscy zwyczajni obywatele z samego prawa odzyskują swą przyrodzoną wolność i są zmuszani, lecz już nie zobowiązani, do posłuszeństwa."},{"type":"paragraph","text":"Ten sam wypadek zdarza się, gdy członkowie rządu pojedynczo przywłaszczają sobie władzę, którą jedynie kolegialnie winni sprawować; co nie jest mniejszym przełamaniem praw i wywołuje jeszcze większy bezład. Wówczas ma się — by użyć tego wyrażenia — tylu książąt, ilu urzędników, państwo zaś, nie mniej jak rząd podzielone, ginie lub zmienia formę."},{"type":"paragraph","text":"Gdy państwo się rozpada, nadużycie rządu, jakimkolwiek by ono było, przybiera ogólną nazwę anarchii. Wprowadzając rozróżnienia, demokracja wyradza się w ochlokrację 276 , arystokracja w oligarchię 277 ; dodam, że rząd królewski wyradza się w tyranię ; lecz to ostatnie słowo jest dwuznaczne i wymaga wyjaśnienia."},{"type":"paragraph","text":"W zwykłym znaczeniu tyranem jest król, który rządzi gwałtownie i nie zważa na sprawiedliwość i na prawa. W ścisłym znaczeniu tyranem jest jednostka, która sobie przywłaszcza władzę królewską, nie mając do tego prawa. W ten sposób Grecy rozumieli to słowo „tyran”: dawali je zarówno dobrym, jak złym książętom, których władza nie była legalna 278 . Tyran przeto i przywłaszczyciel są to dwa wyrazy, będące całkowicie synonimami."},{"type":"paragraph","text":"By dać różne nazwy różnym rzeczom, nazywam tyranem przywłaszczyciela władzy królewskiej, despotą zaś przywłaszczyciela władzy zwierzchniczej. Tyranem jest ten, kto buntuje się przeciwko prawom, by rządzić zgodnie z prawami; despotą jest ten, kto stawia się ponad prawami. Tyran przeto może nie być despotą, lecz jest zawsze tyranem."}]},{"id":"rozdział-xi-o-śmierci-ciała-politycznego","number":38,"title":"Rozdział XI. O śmierci ciała politycznego","blocks":[{"type":"paragraph","text":"Taka jest naturalna i nieuchronna skłonność najlepiej urządzonych rządów. Jeśli Sparta i Rzym zginęły, jakież państwo może mieć nadzieję wiecznego trwania? Jeśli chcemy stworzyć urządzenie trwałe, nie myślmy więc wcale o tym, by uczynić je wiecznym. By się coś mogło powieść, nie wolno kusić się o niemożliwe, ani też pochlebiać sobie, że się da człowieczemu dziełu trwałość, jakiej rzeczy ludzkie nie znoszą."},{"type":"paragraph","text":"Ciało polityczne, tak samo jak ciało ludzkie, zaczyna umierać od samych narodzin i w sobie samym nosi przyczyny zagłady. Lecz jedno i drugie może mieć organizację mniej lub więcej silną i zdolną do zachowania go dłużej lub krócej. Organizacja człowieka jest dziełem przyrody: organizacja państwa jest dziełem sztuki. Przedłużać swoje życie nie jest w mocy ludzi; jest w ich mocy przedłużać życie państwa tak długo, jak to jest możliwe, dając mu najlepszy ustrój, jaki tylko mieć może. Najlepiej zorganizowane skończy się, później jednak niż inne, o ile żaden nieprzewidziany przypadek nie sprowadzi jego zguby przed czasem."},{"type":"paragraph","text":"Zasada życia politycznego leży we władzy zwierzchniczej. Władza prawodawcza jest sercem państwa; władza wykonawcza jest jego mózgiem, wprawiającym w ruch wszystkie części. Mózg może ulec paraliżowi, a osobnik jeszcze będzie żyć. Człowiek staje się głupcem i żyje; lecz i gdy tylko serce przestaje funkcjonować, zwierzę umiera."},{"type":"paragraph","text":"Państwo utrzymuje się przy życiu nie dzięki prawom, lecz dzięki władzy prawodawczej. Prawo wczorajsze nie obowiązuje dzisiaj; lecz z milczenia wnosi się o cichym przyzwoleniu, a zwierzchnik zatwierdza ustawicznie w sposób domniemany prawa, których nie zmienia, chociaż może to uczynić. Co raz oświadczył, że jest jego wolą, tego chce zawsze, o ile tego nie odwoła."},{"type":"paragraph","text":"Dlaczegóż więc darzy się dawne prawa takim szacunkiem? Właśnie dlatego. Powinno się wierzyć, że tylko dzięki znakomitej dobroci starodawnej woli mogły się utrzymać tak długo: gdyby zwierzchnik nie był ich uznał za stale zbawienne, byłby je tysiąc razy odwołał. Oto dlaczego prawa nie tylko nie słabną, lecz ustawicznie nowej siły nabywają w każdym dobrze zorganizowanym państwie; przesąd starożytności czyni je z dniem każdym bardziej szanownymi 279 , gdy przeciwnie, wszędzie tam, gdzie prawa, starzejąc się, słabną, istnieje dowód, że nie ma już władzy prawodawczej i że już państwo nie żyje 280 ."}]},{"id":"rozdział-xii-w-jaki-sposób-utrzymuje-się-władza-zwierzchnicza","number":39,"title":"Rozdział XII. W jaki sposób utrzymuje się władza zwierzchnicza","blocks":[{"type":"paragraph","text":"Zwierzchnik, nie mając innej siły jak tylko władzę prawodawczą, działa jedynie przez prawa; a ponieważ prawa są tylko autentycznymi 281 aktami woli powszechnej, zwierzchnik może działać jedynie, gdy naród jest zgromadzony. Powie ktoś: „Naród zgromadzony! Cóż za mrzonka!”. Dzisiaj jest to mrzonką, lecz nie było to nią dwa tysiące lat temu. Czyżby ludzie zmienili swoją naturę?"},{"type":"paragraph","text":"Granice możliwości w rzeczach moralnych nie są tak ciasne, jak myślimy: słabości to nasze, wady, przesądy ścieśniają je. Niskie dusze nie wierzą w wielkich ludzi; nędzni niewolnicy uśmiechają się drwiąco na słowo wolność ."},{"type":"paragraph","text":"Z tego, co było, sądźmy o tym, co być może. Nie będę mówił o starożytnych greckich republikach, ale rzymska republika była, zdaje mi się, wielkim państwem, a miasto Rzym wielkim miastem. Ostatni spis wykazał w Rzymie czterysta tysięcy obywateli noszących broń, a ostatnie obliczenie w całym cesarstwie przeszło cztery miliony obywateli, nie licząc poddanych, cudzoziemców, kobiet, dzieci, niewolników."},{"type":"paragraph","text":"Jakież to trudności można by sobie wyobrazić w częstym zgromadzaniu ogromnego narodu tej stolicy i jej okolic! A jednak prawie że nie było tygodnia, by lud rzymski nie gromadził się, i to nawet kilka razy. Nie tylko wykonywał prawa zwierzchnicze, lecz także część praw rządowych. Załatwiał pewne sprawy, sądził w pewnych przedmiotach, i cały ten naród był na placu publicznym prawie tak samo często urzędnikiem jak obywatelem."},{"type":"paragraph","text":"Można by się przekonać, sięgając do pierwszych epok narodów, że większość dawnych rządów, nawet monarchicznych, tak jak rząd Macedończyków lub Franków, miała podobne rady. Jakkolwiek by było, ten jeden niezaprzeczalny fakt daje odpowiedź na wszystkie trudności: wydaje mi się, że wniosek z tego, co istnieje, o tym, co być może, jest dobry."}]},{"id":"rozdział-xiii-ciąg-dalszy","number":40,"title":"Rozdział XIII. (Ciąg dalszy)","blocks":[{"type":"paragraph","text":"Nie wystarcza, by zgromadzony naród raz ustalił ustrój państwa, dając sankcję zbiorowi praw; nie wystarcza, by ustanowił rząd wieczysty lub by załatwił raz na zawsze wybory urzędników. Poza nadzwyczajnymi zgromadzeniami, jakich mogą wymagać nieprzewidziane wypadki, trzeba, by zgromadzenia odbywały się stale i periodycznie tak, by nic nie mogło ich znieść ani odroczyć, w ten sposób, by w oznaczonym dniu prawo zwoływało legalnie naród i by nie było potrzeby żadnego innego formalnego zwołania."},{"type":"paragraph","text":"Poza jednak tymi zgromadzeniami, prawomocnymi przez samą swoją datę, każde zgromadzenie narodu, którego by nie zwołali upoważnieni do tego urzędnicy według przepisanych form, powinno być uważane za bezprawne, a wszystko, co na nim zdziałano, za nieważne, sam bowiem rozkaz zgromadzenia się powinien wychodzić od prawa 282 ."},{"type":"paragraph","text":"Co się tyczy mniejszej lub większej częstości legalnych zgromadzeń, zależy ona od tylu względów, że nie można by co do tego postawić ścisłych reguł. Można jedynie powiedzieć ogólnie, że im więcej rząd ma siły, tym częściej zwierzchnik powinien się pokazywać."},{"type":"paragraph","text":"Powie mi ktoś na to: Może to być dobre dla jednego miasta, cóż jednak robić, gdy państwo zawiera ich więcej? Czy się podzieli władzę zwierzchniczą, czy może powinno się ją ześrodkować w jednym mieście, a wszystko inne oddać w poddaństwo?"},{"type":"paragraph","text":"Odpowiadam, że nie powinno się zrobić ani jednego, ani drugiego. Najpierw władza zwierzchniczą jest prosta i jedna i nie można jej dzielić, nie niszcząc jej. Po drugie, miasto, zarówno jak naród, nie może być legalnie poddane innemu, ponieważ istotę ciała politycznego tworzy zgodność posłuszeństwa i wolności, i ponieważ te słowa poddany i zwierzchnik oznaczają pojęcia korelatywne, odnoszące się do tego samego przedmiotu, których idea łączy się w jednym terminie obywatel ."},{"type":"paragraph","text":"Odpowiadam jeszcze, że zawsze jest złą rzeczą łączyć kilka miast w jedno państwo i że gdy się chce to połączenie przeprowadzić, nie powinno się pochlebiać sobie, iż uniknie się złych, a naturalnych stron tego kroku. Nie powinno się wysuwać w formie zarzutu nadużyć wielkich państw przeciwko temu, kto pragnie tylko małych. Jakżeż jednak dać małym państwom dość siły do oparcia się wielkim? Tak, jak niegdyś miasta greckie oparły się wielkiemu królowi i jak — nie tak już dawno — Holandia i Szwajcaria oparły się domowi austriackiemu 283 ."},{"type":"paragraph","text":"W każdym razie, jeżeli nie da się sprowadzić państwa do odpowiednich granic, zostaje jeszcze jeden sposób: nie dopuścić w nim stolicy, kazać rządowi przebywać kolejno w każdym mieście i w nim także po kolei zgromadzać stany krajowe."},{"type":"paragraph","text":"Zaludniajcie równomiernie terytorium, rozciągajcie wszędzie te same prawa, nieście wszędzie obfitość i życie — w taki sposób państwo stanie się równocześnie możliwie najsilniejsze i najlepiej rządzone. Pamiętajcie o tym, że mury miast wznoszą się jedynie z gruzów chat wiejskich. Ilekroć patrzę na pałac jakiś budujący się w stolicy, wydaje mi się, że widzę kraj cały obrócony w rumowisko."}]},{"id":"rozdział-xiv-ciąg-dalszy","number":41,"title":"Rozdział XIV. (Ciąg dalszy)","blocks":[{"type":"paragraph","text":"Z chwilą, gdy naród zebrał się legalnie w ciele zwierzchniczym, ustaje cała jurysdykcja 284 rządu, władza wykonawcza zostaje zawieszona, a osoba ostatniego z obywateli jest równie poświęcana i nietykalna jak osoba pierwszego urzędnika, tam bowiem, gdzie znajduje się reprezentowany, znika i reprezentant. Przeważna część rozruchów wybuchających w Rzymie na komicjach 285 występowała z powodu nieświadomości lub zaniedbania tej reguły. Konsulowie 286 podówczas byli jedynie przewodniczącymi narodu, trybunowie 287 zwykłymi mówcami 288 , senat nie był niczym."},{"type":"paragraph","text":"Te pory zawieszenia, kiedy książę uznaje lub powinien uznać obecnego przełożonego, zawsze dlań były straszne; i naczelnicy wszystkich czasów nienawidzili tych zgromadzeń narodu, będących tarczą ciała politycznego i hamulcem dla rządu; toteż nie szczędzą oni nigdy starań ani zarzutów, ani trudności, ani obietnic, by odstręczyć od nich obywateli. Gdy obywatele są skąpi, tchórzliwi, małoduszni, bardziej rozmiłowani w wygodzie niż w wolności, niedługo opierają się podwojonym wysiłkom rządu: w ten to sposób, gdy oporna siła rządu ustawicznie wzrasta, władza zwierzchnicza w końcu zamiera, i tak większość państw pada i ginie przed czasem 289 ."},{"type":"paragraph","text":"Czasami jednak wciska się między władzę zwierzchniczą a samowładny rząd władza pośrednia, o której należy pomówić."}]},{"id":"rozdział-xv-o-posłach-czyli-przedstawicielach","number":42,"title":"Rozdział XV. O posłach czyli przedstawicielach","blocks":[{"type":"paragraph","text":"Gdy tylko służba publiczna przestaje być najważniejszą sprawą obywateli i gdy tylko wolą nakładać kieską 290 niż swoją osobą, państwo jest już bliskie ruiny. Kiedy trzeba iść w bój, oni zaciągają wojska i zostają w domu; kiedy trzeba iść na radę, oni mianują posłów i zostają w domu. Dzięki lenistwu i pieniądzom mają w końcu żołnierzy dla ujarzmienia ojczyzny i przedstawicieli dla jej zaprzedania."},{"type":"paragraph","text":"Krzątanina to handlu i rzemiosł, chciwość to zysku, miękkość to i zamiłowanie wygód zamieniają osobiste świadczenia na pieniężne. Ustępuje się część zysku, by powiększać go swobodnie. Dawajcie pieniądze, wkrótce będziecie mieć kajdany. Słowo finanse jest słowem niewolnika; nie zna go państwo obywateli. W prawdziwie wolnym państwie obywatele robią własnymi rękami, a nic pieniędzmi: dalecy od tego, by płacić za zwolnienie się od obowiązków, zapłaciliby za możność osobistego ich spełniania. Oddalam się bardzo od powszechnie przyjętych poglądów: uważam, że robocizny mniej są przeciwne wolności niż podatki."},{"type":"paragraph","text":"Im lepiej państwo jest zorganizowane, tym bardziej sprawy publiczne górują w umysłach obywateli nad prywatnymi. Nawet o wiele mniej jest spraw prywatnych, albowiem gdy ogół wspólnego szczęścia stanowi znaczniejszą część szczęścia każdej jednostki, mniej go ona szukać potrzebuje w staraniach o samą siebie. W dobrze kierowanym państwie każdy biegnie na zgromadzenie; pod złym rządem nikt nie chce zrobić kroku, by iść na nie, ponieważ nikogo nie obchodzi to, co się tam robi, bo przewiduje się, że nie zapanuje na nim wola powszechna, bo w końcu krzątanina domowa pochłania wszystkie siły. Dobre prawa wywołują lepsze, złe sprowadzają jeszcze gorsze. Gdy tylko ktoś mówi o sprawach państwa: „Cóż mnie obchodzą?”, można wnioskować, że państwo zginęło."},{"type":"paragraph","text":"Oziębienie się miłości ojczyzny, silne wzmożenie się interesu prywatnego, ogromny obszar państw, podboje, nadużycia rządu sprawiły, że wymyślono urządzenie posłów, czyli przedstawicieli ludu w zgromadzeniach narodowych. Jest to to, co w pewnych krajach ośmielają się nazywać trzecim stanem 291 . Tak więc interes szczególny dwóch stanów kładzie się na pierwszym i na drugim miejscu; interes publiczny stoi dopiero na trzecim."},{"type":"paragraph","text":"Władza zwierzchnicza nie może być reprezentowana, a to z tego samego powodu, dla którego nie może być przenoszona na kogoś drugiego; z istoty swojej polega na woli powszechnej, a woli nie reprezentuje się: jest tą samą wolą lub jest inną wolą; nie masz drogi pośredniej 292 . Posłowie narodu nie są więc ani być nie mogą jego przedstawicielami, są jedynie jego mandatariuszami; nie mogą niczego ostatecznie postanawiać 293 . Każde prawo, którego naród osobiście nie zatwierdził, jest nieważne, wcale nie jest prawem. Naród angielski mniema, że jest wolny, ale mocno się myli: jest wolny jedynie w czasie wyborów członków parlamentu; gdy tylko są wybrani, staje się niewolnikiem, jest niczym. Przez użytek, jaki robi z wolności w krótkich chwilach, kiedy ją ma, zasługuje na to, żeby ją utracił 294 ."},{"type":"paragraph","text":"Pomysł przedstawicieli jest nowożytny: zawdzięczamy go rządowi feudalnemu, temu niesprawiedliwemu i niedorzecznemu rządowi, który poniża rodzaj ludzki i trzyma w pogardzie imię człowieka. W starożytnych republikach, a nawet monarchiach, nigdy naród nie miał przedstawicieli; nie znano tego słowa. Szczególną jest rzeczą, że w Rzymie, gdzie trybunowie byli świętością, nigdy nie wyobrażano sobie nawet, by mogli sobie przywłaszczyć funkcje narodu, i że wśród takiego tłumu nigdy nie usiłowali własną mocą wydać ani jednego plebiscytu. A jednak można ocenić kłopoty, jakie sprawiała niekiedy tłumność zgromadzeń, z tego, co wydarzyło się za czasów Grakchów 295 , kiedy część obywateli głosowała z dachów."},{"type":"paragraph","text":"Gdzie prawo i wolność są wszystkim, niedogodności są niczym. U tego mądrego narodu wszystko było trafnie ułożone; pozwalał robić liktorom 296 to, czego by nie śmieli robić trybunowie: nie obawiał się, by liktorowie chcieli go reprezentować 297 ."},{"type":"paragraph","text":"By wytłumaczyć jednak, w jaki sposób trybunowie reprezentowali go niekiedy, wystarczy pojąć, w jaki sposób rząd reprezentuje zwierzchnika. Skoro prawo jest jedynie oświadczeniem woli powszechnej, jasne jest, że naród nie może być reprezentowany we władzy prawodawczej; może jednak i powinien być we władzy wykonawczej, która jest jedynie siłą zastosowaną do prawa. Pokazuje się z tego, że przy bliższym zbadaniu rzeczy odkryłoby się, iż bardzo mało narodów ma prawa. Jakkolwiek jest, to pewne, że trybunowie, nie mając żadnego udziału we władzy wykonawczej, nie mogli nigdy reprezentować narodu rzymskiego na mocy praw swojego urzędu, ale jedynie przywłaszczając sobie częściowo prawa senatu 298 ."},{"type":"paragraph","text":"U Greków wszystko, co naród miał robić, robił sam; bez przerwy zgromadzony był na placach. Żył w łagodnym klimacie; nie był wcale chciwy; niewolnicy za niego pracowali; najważniejszą sprawą była dlań wolność. Nie mając tych samych korzyści, jakżeż zachować te same prawa? Wasz klimat ostrzejszy daje wam więcej potrzeb 299 ; przez sześć miesięcy w roku nie można korzystać z placu publicznego; waszej bezdźwięcznej mowy nie dosłyszy się na wolnym powietrzu; więcej poświęcacie zyskowi niż wolności i o wiele mniej boicie się niewoli niż nędzy."},{"type":"paragraph","text":"Jak to, wolność utrzymuje się jedynie oparciem o niewolę? Może. Dwa krańce stykają się. Wszystko, co nie leży w naturze, ma swoje złe strony, a zrzeszenie państwowe bardziej niż wszystko inne. Są takie nieszczęśliwe położenia, kiedy można zachować wolność jedynie kosztem wolności drugich i kiedy obywatel nie może być doskonale wolny, jeśli niewolnik nie jest całkowicie niewolnikiem. Takie było położenie Sparty 300 . Co się was tyczy, narody współczesne, to wy niewolników nie macie, lecz same nimi jesteście; ich wolność okupujecie waszą. Możecie sobie zachwalać to, że tak wolicie — ja widzę w tym więcej upodlenia niż ludzkości."},{"type":"paragraph","text":"Nie rozumiem przez to wszystko, jakoby trzeba było mieć niewolników, ani też jakoby prawo niewoli miało być legalne, skoro sam udowodniłem przeciwieństwo tego 301 . Wypowiadam jedynie powody, dlaczego narody współczesne, uważające się za wolne, mają przedstawicieli, i dlaczego narody starożytne ich nie miały. Jakkolwiek jest, w chwili kiedy jakiś naród daje sobie przedstawicieli, przestaje być wolny, przestaje istnieć."},{"type":"paragraph","text":"Zbadawszy wszystko dokładnie, nie widzę, by zwierzchnik mógł zachować odtąd między nami swe prawa, o ile państwo nie jest bardzo małe. Lecz jeśli jest bardzo małe, to zostanie podbite? Nie. Pokażę później 302 , w jaki sposób można połączyć potęgę zewnętrzną wielkiego narodu z wygodną organizacją i dobrym porządkiem małego państwa."}]},{"id":"rozdział-xvi-ustanowienie-rządu-nie-jest-bynajmniej-umową","number":43,"title":"Rozdział XVI. Ustanowienie rządu nie jest bynajmniej umową","blocks":[{"type":"paragraph","text":"Gdy urządzi się już dobrze władzę prawodawczą, trzeba urządzić w ten sam sposób władzę wykonawczą; ta ostatnia bowiem, działając jedynie przez akty szczególne, mając inną od tamtej istotę, oddziela się w sposób naturalny od tamtej. Gdyby było rzeczą możliwą, żeby zwierzchnik, uważany jako taki, miał władzę wykonawczą, nastąpiłoby takie pomieszanie się prawa z faktem, że by już nie wiedziano, co jest prawem, a co nim nie jest; ciało polityczne zaś tak wynaturzone stałoby się wkrótce żerem gwałtu, przeciwko któremu zostało założone 303 ."},{"type":"paragraph","text":"Ponieważ wszyscy obywatele są równi na mocy umowy społecznej, wszyscy mogą przepisywać to, co wszyscy mają robić, gdy równocześnie nikt nie ma prawa wymagać od drugiego, by ten robił coś, czego on nie robi. Otóż właśnie to prawo, niezbędne dla nadania życia i ruchu ciału politycznemu, oddaje zwierzchnik księciu, ustanawiając rząd."},{"type":"paragraph","text":"Kilku autorów twierdziło, że akt tego ustanowienia jest umową między narodem a naczelnikiem, którego sobie przybiera, umową, w drodze której układano między dwiema stronami warunki, pod jakimi jedna z nich zobowiązywała się rozkazywać, druga zaś słuchać 304 . Łatwo się zgodzić, jestem przekonany, że dziwny to sposób umawiania się. Przypatrzmy się jednak, czy ten pogląd da się utrzymać."},{"type":"paragraph","text":"Najpierw najwyższej władzy tak samo nie można zmieniać, jak jej przenosić na kogo innego nie można; ograniczać ją, znaczy ją niszczyć. Jest rzeczą niedorzeczną i wewnętrznie sprzeczną, by zwierzchnik nadawał sobie przełożonego: zobowiązywać się do posłuszeństwa wobec jakiegoś pana, znaczy powracać do pełnej wolności 305 ."},{"type":"paragraph","text":"Ponadto jest rzeczą oczywistą, że ta umowa narodu z tą lub inną osobą byłaby aktem szczególnym; skąd wynika, że umowa ta nie mogłaby być prawem, ani też aktem zwierzchniczym, i że w następstwie tego byłaby bezprawna 306 ."},{"type":"paragraph","text":"Łatwo też dostrzec, że strony umawiające się stałyby między sobą jedynie pod prawem natury i nie miałyby żadnej rękojmi wzajemnych swoich zobowiązań, co nie zgadza się ze wszech miar ze stanem społecznym 307 : skoro ten, kto ma siłę w ręku, jest zawsze panem wykonania, równie dobrze można by nazwać umową akt człowieka, który by drugiemu powiedział: „Oddaję ci całe swe mienie, pod warunkiem, że mi oddasz, co sam zechcesz” 308 ."},{"type":"paragraph","text":"W państwie ma miejsce tylko jedna umowa, umowa stowarzyszenia się, a ta jedna wyłącza wszelkie inne. Nie można by sobie wyobrazić żadnej umowy publicznej, która nie byłaby pogwałceniem pierwszej 309 ."}]},{"id":"rozdział-xvii-o-ustanowieniu-rządu","number":44,"title":"Rozdział XVII. O ustanowieniu rządu","blocks":[{"type":"paragraph","text":"Jakże więc należy pojąć akt, w drodze którego rząd zostaje ustanowiony? Zauważę naprzód, że akt ten jest złożony, czyli że składa się z dwóch innych aktów, mianowicie z ustanowienia prawa i wykonania prawa."},{"type":"paragraph","text":"Za pomocą pierwszego zwierzchnik stanowi, że ciało rządowe będzie ustanowione w tej czy innej formie; a jasne jest, że akt ten jest prawem."},{"type":"paragraph","text":"Za pomocą drugiego naród mianuje naczelników, którzy będą sprawować rząd ustanowiony. Otóż to mianowanie, będąc aktem szczególnym, nie jest drugim prawem, lecz jedynie następstwem prawa i czynnością rządową 310 ."},{"type":"paragraph","text":"Trudność stanowi zrozumienie, w jaki sposób można mieć akt rządowy przed powstaniem rządu i w jaki sposób naród, będący jedynie zwierzchnikiem lub poddanym, może w pewnych okolicznościach stać się księciem, czyli urzędnikiem."},{"type":"paragraph","text":"Znowu tutaj odkrywa się jedna z tych zadziwiających właściwości ciała politycznego, dzięki którym godzi ono działania na pozór z sobą sprzeczne; ta czynność bowiem odbywa się na skutek nagłej przemiany władzy zwierzchniczej w demokrację, tak że bez żadnej widocznej zmiany i jedynie na podstawie nowego stosunku wszystkich do wszystkich, obywatele, którzy stali się urzędnikami, przechodzą od aktów ogólnych do aktów szczególnych i od prawa do wykonania."},{"type":"paragraph","text":"Ta zmiana stosunku nie jest wcale spekulatywną subtelnością, niemającą przykładu w praktyce: codziennie zachodzi w parlamencie angielskim, gdzie izba niższa w pewnych wypadkach zawiązuje się w wielki komitet dla lepszego omówienia spraw i staje się w ten sposób zwyczajną komisją ze zwierzchniczej izby, jaką była przed chwilą; tak że później sama sobie, jako Izbie Gmin, przedkłada sprawozdanie o tym, co uchwaliła jako wielki komitet, i pod inną nazwą obraduje na nowo nad tym, co już rozstrzygnęła pod inną."},{"type":"paragraph","text":"Rząd demokratyczny daje tę właściwą sobie korzyść, że może być faktycznie ustanowiony prostym aktem woli powszechnej. Po czym ten tymczasowy rząd bądź zatrzymuje władzę, jeśli tę formę przyjęto, bądź ustanawia w imieniu zwierzchnika rząd przepisany przez prawo: i w ten sposób wszystko mieści się w regule. Nie można ustanowić rządu w żaden inny legalny sposób bez wyrzeczenia się zasad poprzednio ustalonych."}]},{"id":"rozdział-xviii-środek-zapobieżenia-uzurpacjom-ze-strony-rządu","number":45,"title":"Rozdział XVIII. Środek zapobieżenia uzurpacjom ze strony rządu","blocks":[{"type":"paragraph","text":"Z wyjaśnień tych wynika, w potwierdzeniu rozdziału XVI, że akt ustanawiający rząd nie jest wcale umową, lecz jest prawem; że depozytariusze władzy wykonawczej nie są wcale panami narodu, lecz jego urzędnikami; że naród może powoływać ich i pozbawiać urzędu według swojej woli; że nie ma dla nich mowy o umawianiu się, lecz o słuchaniu; i że podejmując się funkcji nałożonych na nich przez państwo, wypełniają jedynie obowiązek obywatelski, nie mając w żadnej mierze prawa spierać się o warunki."},{"type":"paragraph","text":"Gdy więc zdarza się, że naród ustanawia rząd dziedziczny, bądź monarchiczny w jakiejś rodzinie, bądź arystokratyczny w jakimś stanie obywateli, nie jest to wcale zaciągnięciem przezeń zobowiązania: daje zarządowi taką tymczasową formę dopóty, dopóki nie spodoba mu się inaczej tego urządzić."},{"type":"paragraph","text":"Prawda, że te zmiany są zawsze niebezpieczne i że nie trzeba nigdy ruszać ustanowionego rządu, chyba że nie da się już pogodzić z dobrem publicznym; ta przezorność jednak jest zasadą polityczną, a nie normą prawną; a państwo nie więcej jest zobowiązane pozostawiać władzę cywilną swym naczelnikom niż władzę wojskową swym generałom."},{"type":"paragraph","text":"Prawdą jest jeszcze, że nie ma tak wielkiej staranności, której nie trzeba by było dołożyć w podobnym wypadku celem przestrzegania wszystkich formalności wymaganych dla rozpoznania aktu regularnego i legalnego od buntowniczego harmideru, oraz woli całego narodu od krzyków jakiejś partii. Tutaj właśnie należy przyznać prawu dokładnie to tylko, czego nie można mu już odmówić ściśle według litery ustawy; i ten właśnie obowiązek wielce pomaga księciu zachować władzę wbrew narodowi w ten sposób, by nie można było powiedzieć, że ją sobie przywłaszczył; bardzo łatwo może on bowiem, pozornie korzystając jedynie ze swoich praw, rozszerzyć je i pod pretekstem spokoju publicznego przeszkodzić zgromadzeniom przeznaczonym do przywrócenia dobrego porządku; tak, że w rezultacie powołuje się na milczenie, którego przerwać nie pozwala, lub na nieprawidłowości, jakie sam wywołuje, bądź by podawać milczenie ze strachu za korzystne dlań wypowiedzenie się, bądź by karać tych, co śmią mówić. Tak decemwirowie, wybrani naprzód na rok, następnie ponownie na rok drugi, usiłowali zatrzymać wieczyście władzę, nie pozwalając wcale zebrać się komicjom; i za pomocą tego to łatwego środka rządy całego świata, raz przyobleczone w siłę publiczną, prędzej czy później przywłaszczają sobie władzę zwierzchniczą."},{"type":"paragraph","text":"Periodyczne zgromadzenia, o których poprzednio mówiłem 311 , zdolne są zapobiec temu nieszczęściu lub je odroczyć, zwłaszcza gdy nie potrzebują być formalnie zwoływane; wówczas bowiem książę nie może przeszkodzić im, nie podając się otwarcie za gwałciciela praw i wroga państwa."},{"type":"paragraph","text":"Otwarcie tych zgromadzeń, mających na celu jedynie utrzymanie układu społecznego, powinno zawsze odbywać się za pomocą postawienia dwóch wniosków, których nie byłoby można pominąć, a które poddaje się osobno pod głosowanie."},{"type":"paragraph","text":"Pierwsze: „Czy zwierzchnik 312 chce zachować obecną formę rządu?”."},{"type":"paragraph","text":"Drugie: „Czy naród 313 chce pozostawić sprawowanie rządu tym, którzy go obecnie piastują?” 314 ."},{"type":"paragraph","text":"Przyjmuję tutaj to, co, jak mniemam, udowodniłem, mianowicie, iż nie ma w państwie żadnego podstawowego prawa, które by nie mogło być odwołane, że nim nie jest nawet układ społeczny: gdyby bowiem wszyscy obywatele zgromadzili się, by rozwiązać ten układ za wspólną zgodą, nie można wątpić, że zostałby najzupełniej legalnie rozwiązany. Grotius nawet sądzi, że każdy może wyrzec się państwa, którego jest członkiem, i odzyskać swą naturalną wolność i swe mienie, opuszczając kraj 315 . Otóż byłoby rzeczą niedorzeczną, gdyby wszyscy obywatele, zebrani razem, nie mogli tego, co może każdy z nich z osobna 316 ."}]},{"id":"księga-czwarta","number":46,"title":"Księga czwarta","blocks":[]},{"id":"rozdział-i-wola-powszechna-jest-niezniszczalna","number":47,"title":"Rozdział I. Wola powszechna jest niezniszczalna","blocks":[{"type":"paragraph","text":"Dopóki pewna liczba zebranych ludzi uważa się za jedno ciało, ma tylko jedną wolę, skierowaną ku wspólnemu zachowaniu się i ku powszechnej pomyślności. Wówczas wszystkie sprężyny państwa silne są i proste; zasady jego są jasne i przejrzyste; nie ma ono wcale zagmatwanych, sprzecznych interesów; dobro wspólne wszędzie z całą oczywistością jest widoczne i wystarczy mieć zdrowy rozsądek, by je spostrzec. Pokój, jedność, równość są nieprzyjaciółmi subtelności politycznych. Trudno jest oszukać ludzi prawych i prostych, ponieważ są prości; przynęty, wyrafinowane pozory nie omamią ich: nie są nawet dość subtelni na to, by być oszukanymi. Kiedy widzi się, jak u najszczęśliwszego z narodów w świecie gromady chłopów normują sprawy państwowe pod dębem i jak zawsze mądrze postępują 317 , czyż można powstrzymać się od pogardy dla wyrafinowań innych narodów, które zdobywają sławę i rządzą taką sztuką i z tyloma tajemnicami?"},{"type":"paragraph","text":"Państwo w ten sposób rządzone potrzebuje bardzo niewielu praw; a w miarę, gdy staje się rzeczą konieczną ogłosić nowe, konieczność tę spostrzegają wszyscy. Pierwszy, który występuje z wnioskiem, wypowiada jedynie to, co wszyscy już odczuli; i nie potrzeba ani zyskiwania stronników, ani wymowy, by stało się prawem to, co każdy już postanowił zrobić natychmiast, skoro się tylko zapewni, że inni tak samo zrobią, jak on."},{"type":"paragraph","text":"Mędrków myli to, że widząc jedynie państwa źle od samego początku urządzone, uderzeni są niemożliwością utrzymania w nich podobnego porządku. Śmieją się, wyobrażając sobie wszystkie głupstwa, jakie jakiś zręczny szalbierz, jakiś wnikliwy mówca mógłby wmówić ludowi Paryża czy Londynu. Nie wiedzą, że lud berneński byłby postawił pod pręgierz Cromwella 318 , a genewski skazał na plagi księcia de Beaufort 319 ."},{"type":"paragraph","text":"Gdy jednak węzeł społeczny zaczyna się rozluźniać, a państwo zaczyna słabnąć, gdy interesy szczególne zaczynają stawać się nazbyt widoczne, małe zaś społeczności wywierać wpływ na wielką, świadomość wspólnego interesu mąci się, pojawiają się sprzeciwiający się mu, jednomyślność nie panuje już przy głosowaniach, wola powszechna przestaje być wolą wszystkich 320 , występują sprzeczności, dysputy i najlepsza rada nie przechodzi bez sporów."},{"type":"paragraph","text":"W końcu, gdy państwo bliskie ruiny utrzymuje się jedynie jako złudna i pusta forma, gdy więź społeczna poszarpana została we wszystkich sercach, gdy najpodlejszy interes stroi się bezwstydnie w święte imię dobra publicznego, wówczas wola powszechna niemieje; wszyscy, kierowani tajnymi względami, nie głosują już tak, jak powinni głosować obywatele, jak gdyby państwa wcale nie było; i uchwala się pod fałszywą nazwą praw niesprawiedliwe dekrety, mające na celu jedynie prywatny interes."},{"type":"paragraph","text":"Czyż stąd wynika, że wola powszechna jest unicestwiona lub zepsuta? Nie: ona jest zawsze stała, nieulegająca zepsuciu i czysta, lecz poddana została innym wolom, które nad nią górują. Każdy, odłączając swój interes od interesu wspólnego, dobrze widzi, że nie może tych dwóch interesów zupełnie oddzielić; część jednak zła publicznego, jaka nań przypada, niczym mu się być wydaje w porównaniu z wyłącznym dobrem, jakie chce sobie przywłaszczyć. Poza tym swoim szczególnym dobrem chce dobra powszechnego dla swojego własnego interesu, tak samo silnie, jak każdy inny. Nawet sprzedając głos swój za pieniądze, nie gasi w sobie woli powszechnej; odsuwa ją na bok. Popełnia błąd, polegający na zmianie treści pytania i na udzieleniu odpowiedzi na co innego, niż go się pytają; tak, że zamiast powiedzieć w głosowaniu: „Jest korzystne dla państwa”, mówi: „Jest korzystne dla takiego człowieka lub dla takiej partii, by przeszła ta lub inna uchwała”. Prawo przeto porządku publicznego na zgromadzeniach nie tyle polega na utrzymywaniu w nich woli powszechnej, jak na spowodowaniu, by ona zawsze była pytana i ona zawsze odpowiadała."},{"type":"paragraph","text":"Miałbym tu wiele do zauważenia o prostym prawie głosowania przy każdym akcie zwierzchniczym, prawie, którego obywatelowi nic odjąć nie może, tudzież o prawie opiniowania, stawiania wniosków, dzielenia ich, dyskutowania, które zawsze rząd usilnie stara się zastrzec jedynie dla swoich członków; ta ważna materia wymagałaby jednak osobnej rozprawy, a w tej nie mogę wszystkiego powiedzieć 321 ."}]},{"id":"rozdział-ii-o-głosowaniu","number":48,"title":"Rozdział II. O głosowaniu","blocks":[{"type":"paragraph","text":"Z poprzedniego rozdziału widać, że sposób, w jaki załatwia się sprawy ogólne, może dać wskazówkę wcale pewną co do obecnego stanu obyczajów oraz zdrowia ciała politycznego. Im większa zgoda panuje w zgromadzeniach, to znaczy im bardziej zdania zbliżają się do jednomyślności, tym więcej góruje wola powszechna; długie jednak rozprawy, spory, wrzawa świadczą o wpływie interesów szczególnych i o schyłku państwa."},{"type":"paragraph","text":"Wydaje się to mniej oczywiste, gdy dwa lub więcej stanów wchodzi w jego skład, jak w Rzymie patrycjusze i plebejusze, których zwady często niepokoiły komicja, nawet za najpiękniejszych czasów Rzeczypospolitej 322 ; ten wyjątek jest jednak raczej pozorny niż rzeczywisty; wówczas bowiem, z powodu wewnętrznej wady ciała politycznego, ma się — by użyć tego wyrażenia — dwa państwa w jednym; to, co nie jest prawdziwe o dwóch razem, jest prawdziwe o każdym z osobna. I istotnie, w najburzliwszych nawet czasach plebiscyty ludowe, gdy senat nie mieszał się do nich, uchwalane były zawsze w spokoju i ogromną większością głosów; ponieważ obywatele mieli jeden tylko interes, naród miał jedną wolę."},{"type":"paragraph","text":"Po drugiej stronie koła powraca jednomyślność: mianowicie gdy obywatele, popadłszy w niewolę, nie mają już ani wolności, ani woli. Wówczas strach i pochlebstwo zmieniają głosowanie w aklamacje; nie rozprawia się już, uwielbia się lub przeklina. W ten nikczemny sposób wydawał swe opinie senat pod panowaniem cesarzy. Niekiedy odbywało się to ze śmiesznymi ostrożnościami. Tacyt 323 zauważa, że za panowania Otona 324 senatorowie, obrzucając przekleństwami Witeliusza 325 , starali się równocześnie robić straszliwy hałas, a to dlatego, aby — w razie gdyby przypadkiem doszedł do panowania — nie mógł wiedzieć, co każdy z nich powiedział."},{"type":"paragraph","text":"Z tych różnych rozważań wyłaniają się zasady, według których należy normować sposób obliczania głosów i porównywania zdań, zależnie od tego, czy łatwiej lub trudniej jest poznać wolę powszechną, a państwo jest bliższe lub dalsze od schyłku."},{"type":"paragraph","text":"Jest tylko jedno prawo, które z natury swojej wymaga jednomyślnej zgody: jest nim układ społeczny; stowarzyszenie społeczne bowiem jest aktem najbardziej w świecie wolnym; skoro każdy człowiek rodzi się wolny i panem samego siebie, nikt nie może, pod żadnym pozorem, poddać go sobie bez jego zgody. Postanowić, że syn niewolnika rodzi się niewolnikiem, znaczy postanowić, że nie rodzi się człowiekiem."},{"type":"paragraph","text":"Jeżeli więc w chwili zawierania układu społecznego znajdą się sprzeciwiający się mu, ich sprzeciw nie sprowadza nieważności umowy, nie pozwala jednak, by oni nią zostali objęci; są oni cudzoziemcami wśród obywateli. Gdy państwo zostanie założone, zgoda polega na przebywaniu w nim; zamieszkiwać terytorium, znaczy poddawać się władzy zwierzchniczej 326 ."},{"type":"paragraph","text":"Poza tą pierwotną umową głos większości zobowiązuje zawsze wszystkich pozostałych; jest to następstwem samej umowy 327 . Powstaje jednak pytanie, w jaki sposób człowiek może być wolny i równocześnie zmuszany do stosowania się do woli niebędącej jego wolą. W jakiż sposób sprzeciwiający się są wolni, a równocześnie podlegli prawom, na które się nie zgodzili?"},{"type":"paragraph","text":"Odpowiadam, że pytanie jest źle postawione. Obywatel zgadza się na wszystkie prawa, nawet na uchwalone wbrew sobie, a nawet na te, co go karzą, gdy ośmieli się któreś z nich pogwałcić. Wola powszechna jest stałą wolą wszystkich członków państwa; przez nią to są oni obywatelami i wolnymi 328 . Gdy się wnosi jakieś prawo na zgromadzenie narodu, właściwie nie zapytuje się ich, czy wniosek przyjmują lub czy go odrzucają, lecz czy ten wniosek zgodny jest, czy nie, z wolą powszechną, która jest ich wolą. Każdy, oddając głos, wypowiada swoje co do tego zdanie, a z obliczenia głosów wynika oświadczenie woli powszechnej. Gdy więc zwycięża zdanie przeciwne mojemu, dowodzi to jedynie, że się pomyliłem i że to, co uważałem za wolę powszechną, nią nie było. Gdyby było zwyciężyło moje osobiste zdanie, byłbym zrobił co innego, niż chciałem; wówczas to nie byłbym wolny 329 ."},{"type":"paragraph","text":"To każe przypuścić, co prawda, że wszystkie cechy woli powszechnej spoczywają w większości; gdy przestaje tak być, jakiegokolwiek byłoby się zdania, nie ma już wolności 330 ."},{"type":"paragraph","text":"Okazując poprzednio 331 , w jaki sposób podstawiano w uchwałach publicznych w miejsce woli powszechnej wole szczególne, wystarczająco wskazałem środki, jakich można użyć celem zapobieżenia temu nadużyciu; w dalszym ciągu jeszcze będę o tym mówił 332 . Co się tyczy stosunku liczby głosów potrzebnego dla oświadczenia tej woli, również podałem już zasady, według których można go oznaczyć. Różnica jednego głosu łamie równość; jeden sprzeciwiający się łamie jednomyślność; między wszakże jednomyślnością a równością w różny nierówny sposób mogą się głosy rozdzielić i można według każdego z tych podziałów ustalić liczbę głosów (wymaganą dla powzięcia uchwały), zależnie od stanu i potrzeb ciała politycznego."},{"type":"paragraph","text":"Dwie ogólne zasady mogą służyć do unormowania tych stosunków: pierwsza, że im obrady są bardziej doniosłe i poważne, tym bardziej zdanie zwyciężające powinno zbliżać się do jednomyślności; druga, że im więcej szybkości wymaga sprawa, o którą idzie, tym bardziej powinno się zmniejszać różnicę przepisaną dla rozdziału zdań: przy uchwałach, które należy powziąć natychmiast, powinna wystarczyć większość jednego głosu. Pierwsza z tych zasad wydaje się być odpowiedniejsza dla praw, druga zaś dla spraw. Jakkolwiek jest, przez kombinowanie tych dwóch zasad właśnie ustalają się najlepsze ustosunkowania, według których można określić większość wymaganą dla powzięcia uchwały."}]},{"id":"rozdział-iii-o-wyborach","number":49,"title":"Rozdział III. O wyborach","blocks":[{"type":"paragraph","text":"Co się tyczy wyborów księcia i urzędników, które są — jak już powiedziałem 333 — aktami złożonymi, to istnieją dwie drogi przeprowadzenia ich, mianowicie wybór i los. W różnych republikach używano jednej i drugiej, i jeszcze obecnie widzi się bardzo skomplikowane pomieszanie obu przy elekcji doży weneckiego."},{"type":"paragraph","text":"Monteskiusz 334 mówi: „Wybory za pomocą losowania odpowiadają demokracji”. Zgadzam się, lecz dlaczegóż to? Ciągnie dalej: „Losowanie jest sposobem wyborów niesprawiającym nikomu przykrości; pozwala mieć każdemu obywatelowi rozumną nadzieję służenia ojczyźnie”. To nie są żadne powody."},{"type":"paragraph","text":"Jeśli zwrócimy uwagę na to, że wybory naczelników są funkcją rządową, a nie zwierzchniczą, spostrzeżemy, dlaczego droga losowania leży bardziej w charakterze demokracji, gdzie zarząd jest tym lepszy, im mniej liczne są jego działania."},{"type":"paragraph","text":"W każdej prawdziwej demokracji urząd jest nie korzyścią, ale ciężkim brzemieniem, którego nie można ze słusznością nakładać raczej na tę, niż na inną jednostkę. Jedynie prawo może nałożyć ten ciężar temu, na którego los padnie: wówczas bowiem, skoro warunek jest równy dla wszystkich, a wybór nie zależy bynajmniej od woli ludzkiej, nie występuje wcale zastosowanie szczególne, które by krzywiło powszechność prawa."},{"type":"paragraph","text":"W arystokracji książę wybiera księcia, rząd zachowuje się przez siebie samego, i tu właśnie głosowanie jest zupełnie na miejscu."},{"type":"paragraph","text":"Przykład elekcji doży weneckiego nie tylko że nie burzy tego rozróżnienia, lecz przeciwnie, popiera je; ta mieszana forma odpowiada mieszanemu rządowi. Jest bowiem błędem brać rząd wenecki za prawdziwą arystokrację. Jeśli lud nie bierze tam wcale udziału w rządzie, sama szlachta jest tam ludem. Mnóstwo ubogich Barnabotów 335 nigdy nie dostąpiło żadnego urzędu i ma ze swego szlachectwa jedynie czczy tytuł ekscelencji oraz prawo obecności na Wielkiej Radzie. Ponieważ ta Wielka Rada jest równie liczna 336 jak nasza Rada Ogólna w Genewie, jej jaśnie wielmożni członkowie nie większe mają przywileje niż nasi zwyczajni obywatele. Jest rzeczą pewną, że wyjąwszy krańcową nierówność obu republik, mieszczaństwo genewskie jest dokładnym przedstawieniem patrycjatu weneckiego; nasi „urodzeni” i mieszkańcy przedstawiają mieszczan i lud Wenecji; nasi chłopi przedstawiają poddanych stałego lądu; w końcu, w jakikolwiek sposób rozważałoby się tę republikę, abstrahując od jej wielkości, rząd jej nie jest bardziej arystokratyczny niż nasz. Cała różnica polega na tym, że nie mając dożywotniego naczelnika, nie potrzebujemy w tym samym stopniu losowania."},{"type":"paragraph","text":"Wybory przez losowanie miałyby mało ujemnych stron w prawdziwej demokracji, gdzie wybór osób stałby się prawie obojętny, ponieważ wszyscy są równi tak pod względem obyczajów i zdolności, jak zasad i majątku. Powiedziałem już jednak, że nie ma prawdziwej demokracji."},{"type":"paragraph","text":"Gdy wybór i los są razem stosowane, pierwszy powinien obsadzać miejsca wymagające specjalnych zdolności, takie np. jak urzędy wojskowe; drugi nadaje się do obsadzania miejsc, na których wystarcza rozsądek, sprawiedliwość, uczciwość, takich jak urzędy sądowe, ponieważ w dobrze urządzonym państwie zalety te są wspólne wszystkim obywatelom."},{"type":"paragraph","text":"W rządzie monarchicznym losowanie ani wybory nie mają wcale zastosowania. Ponieważ monarcha jest na mocy prawa sam jeden księciem i jedynym urzędnikiem, do niego jedynie należy wybór pomocników. Gdy ksiądz de Saint-Pierre projektował powiększenie liczby rad króla Francji oraz wybór ich członków w drodze głosowania, nie spostrzegł się, że projektował zmianę formy rządu 337 ."},{"type":"paragraph","text":"Pozostawałoby mi jeszcze pomówić o sposobie oddawania i zbierania głosów na zgromadzeniach narodu; może jednak wiadomości historyczne o porządkach rzymskich w tym względzie wytłumaczą bardziej naocznie wszystkie zasady, jakie mógłbym ustalić. Nie jest rzeczą niegodną rozumnego czytelnika przypatrzyć się nieco szczegółowiej, w jaki sposób załatwiano sprawy publiczne i prywatne na radzie złożonej z dwustu tysięcy ludzi."}]},{"id":"rozdział-iv-o-komicjach-rzymskich","number":50,"title":"Rozdział IV. O komicjach rzymskich","blocks":[{"type":"paragraph","text":"Nie posiadamy żadnego pewnego pomnika z pierwszych czasów Rzymu; bardzo prawdopodobne, że większość tego, co się o nich opowiada, jest bajką 338 ; a na ogół najsilniej odczuwamy brak najbardziej pouczającej części roczników narodów, jaką stanowi historia ich powstania. Doświadczenie uczy nas codziennie, jakie przyczyny wywołują przewroty państwowe; ponieważ jednak nie powstają już nowe narody, możemy tylko tworzyć przypuszczenia, w jaki sposób one powstawały."},{"type":"paragraph","text":"Zwyczaje, które znachodzimy 339 jako ustalone, świadczą przynajmniej o tym, że miały one jakiś swój początek. Za najbardziej pewne należy uważać tradycje sięgające tych początków, poparte przez największe autorytety i potwierdzone przez najbardziej silne względy rozumowe. Oto zasady, których starałem się trzymać, dochodząc, w jaki sposób naród najbardziej wolny i najpotężniejszy w świecie wykonywał swą najwyższą władzę."},{"type":"paragraph","text":"Po założeniu Rzymu rodząca się republika, to znaczy armia założyciela, złożona z Albanów 340 , Sabinów 341 i cudzoziemców, została podzielona na trzy klasy, które na podstawie tego podziału przybrały nazwę trybusów 342 . Każdy z tych trybusów został znów podzielony na dziesięć kurii, a każda kuria na dekurie, na czele których postawiono naczelników, nazwanych kurionami i dekurionami."},{"type":"paragraph","text":"Ponadto z każdego trybusu wzięto oddział stu jeźdźców, czyli kawalerów, nazwany centurią; widać z tego, że podziały te, niezbyt konieczne w małym miasteczku, były z początku jedynie wojskowe. Zdaje się jednak, że jakiś instynkt wielkości pchał małe miasto Rzym do nadania sobie z góry organizacji odpowiedniej dla stolicy świata."},{"type":"paragraph","text":"Z tego pierwszego podziału wkrótce wynikła niedogodność: mianowicie trybus Albinów 343 i trybus Sabinów 344 zachowywał ciągle ten sam stan liczebny, podczas gdy trybus cudzoziemców 345 stale wzrastał przez ustawiczny ich napływ, tak że wkrótce ten ostatni trybus przeszedł liczebnością obydwa inne. Na tę niebezpieczną nierównomierność znalazł Serwiusz lekarstwo w zmianie podziału: mianowicie zniósł podział ze względu na pochodzenie i wprowadził nowy, oparty na dzielnicach miasta, jakie każdy trybus zamieszkiwał. Zamiast trzech trybusów utworzył cztery, z których każdy zajmował jedno ze wzgórz rzymskich i nosił jego nazwę. Tak więc, zaradzając ówczesnej nierówności, zapobiegł jej jeszcze na przyszłość; aby zaś podział ten obejmował nie tylko miejsca, ale i ludzi, zabronił mieszkańcom jednej dzielnicy przenosić się do drugiej, co zapobiegło zmieszaniu się ras."},{"type":"paragraph","text":"Podwoił także trzy dawne centurie kawalerii i dodał dwanaście nowych, zawsze jednak pod dawnymi nazwami; środek prosty i słuszny, za pomocą którego przeprowadził ostatecznie wyróżnienie kawalerów od ludu, nie wzbudzając szemrania w tym ostatnim."},{"type":"paragraph","text":"Do tych czterech trybusów miejskich dodał Serwiusz piętnaście innych, zwanych trybusami wiejskimi, ponieważ były utworzone z mieszkańców wsi, podzielonych na tyleż kantonów. Później utworzono tyleż nowych, i naród rzymski podzielony został w końcu na trzydzieści pięć trybusów, która to liczba utrzymała się już stale do końca Rzeczypospolitej."},{"type":"paragraph","text":"Ten podział na trybusy miejskie i na trybusy wiejskie wywołał następstwo godne uwagi, ponieważ nie ma żadnego innego podobnego przykładu i ponieważ Rzym zawdzięczał mu równocześnie zachowanie swych obyczajów i powiększenie swego władztwa. Można by mniemać, że trybusy miejskie wkrótce przywłaszczyły sobie władzę i zaszczyty i że nie omieszkały upośledzić trybusów wiejskich: stało się jednak wprost przeciwnie. Znane jest zamiłowanie pierwszych Rzymian do życia wiejskiego. To zamiłowanie pochodziło od mądrego prawodawcy, który z wolnością złączył prace rolnicze i wojskowe, a zepchnął — że się tak wyrażę — do miasta rzemiosła, warsztaty, intrygę, majątek i niewolnictwo."},{"type":"paragraph","text":"Tak więc, gdy wszystko, co Rzym miał znakomitego, żyło na wsi i uprawiało rolę, przyzwyczajono się tam tylko szukać podpór republiki. Stan ten, będąc stanem najbardziej dostojnych patrycjuszy, był szanowany przez wszystkich; przenoszono 346 proste i pracowite życie wieśniaków nad próżniacze i rozluźnione życie mieszczan rzymskich, i niejeden, będąc na wsi rolnikiem, stał się szanowanym obywatelem, podczas gdy w mieście byłby tylko nieszczęśliwym proletariuszem. Nie bez przyczyny mówił Warron 347 : wielkoduszni przodkowie nasi na wsi założyli kadry silnych i dzielnych ludzi, co ich bronili w czasie wojny, a żywili w czasie pokoju. Pliniusz 348 mówi wyraźnie, że szanowano trybusy wiejskie ze względu na ludzi, jacy je tworzyli; gdy przeciwnie, na znak hańby przenoszono do trybusów miejskich tchórzy, których chciano poniżyć. Gdy Sabin Appius Claudius przyszedł osiedlić się w Rzymie, obsypano go tam zaszczytami i wpisano do jednego z wiejskich trybusów, który następnie przybrał jego rodzinne miano. W końcu wszyscy wyzwoleńcy wchodzili do trybusów miejskich, nigdy do wiejskich, i nie ma podczas całego trwania republiki jednego przykładu, by któryś z tych wyzwoleńców dostąpił jakiegokolwiek urzędu, chociaż stał się obywatelem."},{"type":"paragraph","text":"Zasada ta była doskonała, lecz posunięto ją tak daleko, że w końcu wywołała zmianę i niewątpliwe nadużycie w całym porządku."},{"type":"paragraph","text":"Najpierw cenzorowie 349 przywłaszczyli sobie od dawna prawo samowolnego przenoszenia obywateli z jednego trybusu do innego i pozwolili większej ich części wpisać się do trybusu takiego, jaki im się podobał; pozwolenie z pewnością zupełnie bezużyteczne i pozbawiające cenzurę jednego z jej walnych środków. Ponadto, skoro wszyscy wielcy i możni kazali się wpisywać do trybusów wiejskich, a wyzwoleńcy, którzy stali się obywatelami, pozostawali razem z motłochem w trybusach miejskich, trybusy w ogóle przestały mieć swe własne siedziby i terytoria, lecz wszystkie wymieszały się do tego stopnia, że można już było odróżnić członków każdego z nich jedynie przy pomocy rejestrów; w ten sposób, że znaczenie słowa tribus zmieniło się z rzeczowego na osobowe lub raczej stało się prawie urojeniem."},{"type":"paragraph","text":"Zdarzało się jeszcze, że trybusy miejskie, będące bardziej pod ręką, często bywały silniejsze na komicjach i sprzedawały państwo tym, co chcieli kupować głosy hołoty, z jakiej się one składały."},{"type":"paragraph","text":"Co się tyczy kurii, ponieważ prawodawca utworzył ich dziesięć w każdym trybusie, cały naród rzymski, zamknięty podówczas w murach miasta, dzielił się na trzydzieści kurii, z których każda miała swoje świątynie, swych bogów, urzędników, kapłanów i swoje święta, nazywane compitalia , podobne do paganalii , jakie później obchodziły trybusy wiejskie."},{"type":"paragraph","text":"Gdy przy nowym podziale Serwiusza ta liczba trzydziestu nie dała się równo podzielić przez cztery trybusy, Serwiusz nie chciał jej tykać i kurie, uniezależnione od trybusów, stały się odrębnym podziałem mieszkańców Rzymu; nie było jednak mowy o kuriach ani w trybusach wiejskich, ani w składającym je ludzie, ponieważ — skoro trybusy stały się urządzeniem czysto cywilnym i skoro wprowadzono nowy porządek dla powoływania wojska — wojskowe podziały Romulusa okazały się zbędne. Aczkolwiek więc każdy obywatel był wpisany do jakiegoś trybusu, daleko było do tego, by każdy był wpisany do jakiejś kurii."},{"type":"paragraph","text":"Serwiusz przeprowadził jeszcze trzeci podział, niemający żadnego związku z dwoma poprzednimi, który dzięki swym następstwom stał się najważniejszy ze wszystkich. Rozdzielił cały naród rzymski między sześć klas, które odróżniały się nie miejscem ani ludźmi, ale majątkiem; w ten sposób, że do pierwszych z tych klas należeli bogaci, do ostatnich ubodzy, do środkowych zaś ci, co posiadali średnie majątki. Tych sześć klas dzieliło się znów na sto dziewięćdziesiąt trzy inne ciała, nazywane centuriami, a te ostatnie ciała były rozdzielone w ten sposób, że sama pierwsza klasa zawierała więcej niż połowę z nich, a ostatnia zaś stanowiła tylko jedno. Stało się zatem, że najmniej licząca ludzi klasa liczyła najwięcej centurii, cała zaś ostatnia klasa liczyła się za jedną centurię, chociaż sama jedna obejmowała więcej niż połowę mieszkańców Rzymu."},{"type":"paragraph","text":"By utrudnić narodowi przeniknięcie skutków tej ostatniej formy, Serwiusz starał się nadać jej pozór wojskowy: zaliczył do drugiej klasy dwie centurie płatnerzy 350 , do czwartej dwie centurie przyborów wojennych; w każdej klasie, z wyjątkiem ostatniej, odróżnił młodych i starych, to znaczy obowiązanych do noszenia broni i zwolnionych od tego przez prawo z powodu wieku; odróżnienie, które bardziej niż odróżnienie majątków wywołało konieczność częstego przeprowadzania na nowo cenzusu, czyli spisu; rozkazał w końcu, by zgromadzenie odbywało się na Polu Marsowym 351 i by wszyscy będący w wieku służby wojskowej stawiali się tam zbrojnie."},{"type":"paragraph","text":"Powód, dla którego nie zastosował w ostatniej klasie tego podziału na młodych i starych, leżał w tym, że motłochowi, który ją składał, nie przyznawano zaszczytu walczenia za ojczyznę; trzeba było mieć ogniska domowe, by otrzymać prawo bronienia ich; i zapewne spośród tych, co tworzą owe niezliczone gromady nędzarzy, którymi błyszczą dzisiaj królewskie armie, nie ma ani jednego, którego nie wypędzono by wzgardliwie z rzymskiej kohorty 352 w czasach, kiedy żołnierze byli obrońcami wolności."},{"type":"paragraph","text":"Rozróżniono jednak jeszcze w ostatniej klasie proletariuszy od tych, których nazywano capite censi . Pierwsi, niepozbawieni zupełnie wszystkiego, dostarczali państwu przynajmniej obywateli, niekiedy nawet żołnierzy w naglących potrzebach. Co się tyczy tych, którzy zupełnie nic nie mieli i których można było spisywać jedynie według głów, ci za nic byli uważani, a Mariusz 353 był pierwszym, co raczył ich werbować."},{"type":"paragraph","text":"Nie rozstrzygając, czy ten trzeci podział był sam w sobie dobry, czy też zły, mogę, jak mi się zdaje, stwierdzić, że w praktyce dał on się zastosować jedynie dzięki prostym obyczajom pierwszych Rzymian, ich bezinteresowności, zamiłowaniu do rolnictwa, pogardzie dla handlu i dla żądzy zysku. Gdzież jest naród współczesny, u którego zachłanna chciwość, niepokój umysłu, intryga, ustawiczne wędrowanie, wieczne przewroty majątkowe pozwoliłyby podobnemu urządzeniu przetrwać dwadzieścia lat bez wstrząśnięcia całym państwem? Trzeba wreszcie dobitnie zaznaczyć, że obyczaje i cenzura, silniejsze od tego urządzenia, naprawiły jego błędy w Rzymie, i że niejeden bogaty ujrzał się zepchniętym do klasy ubogich za to, że nazbyt popisywał się swym bogactwem."},{"type":"paragraph","text":"Z tego wszystkiego można łatwo zrozumieć, dlaczego prawie zawsze wzmiankuje się tylko o pięciu klasach, chociaż w rzeczywistości było ich sześć. Ponieważ szósta nie dostarczała ani żołnierzy do armii, ani głosujących na Pole Marsowe 354 , i była prawie bezużyteczna w republice, rzadko ją za coś liczono."},{"type":"paragraph","text":"Takie były różne podziały narodu rzymskiego. Przypatrzmy się teraz skutkom, jakie wywarły na zgromadzenia. Te zgromadzenia, zwołane legalnie, nazywały się comitia ; odbywały się zazwyczaj na rynku rzymskim lub na Polu Marsowym i dzieliły się na komicja kurialne, komicja centurialne i komicja trybusowe, zależnie od tej z trzech form, według której były zorganizowane. Komicja kurialne ustanowił Romulus, centurialne Serwiusz, trybusowe trybunowie ludu. Jedynie w komicjach zatwierdzano prawa, wybierano urzędników; a ponieważ nie było obywatela, który nie byłby wpisany do jakiejś kurii, centurii lub do jakiegoś trybusu, wynika stąd, że żaden obywatel nie był pozbawiony prawa głosu i że naród rzymski był naprawdę prawnie i faktycznie zwierzchnikiem."},{"type":"paragraph","text":"Potrzeba było trzech warunków, by komicja zebrały się legalnie i by to, co się na nich działo, miało moc prawną: pierwszy, by zwołujące je ciało lub urzędnik byli wyposażeni w konieczną do tego władzę; drugi, by zgromadzenie odbywało się w jednym z dni dozwolonych przez prawo; trzeci, by wróżby były przychylne."},{"type":"paragraph","text":"Nie potrzeba tłumaczyć powodu uzasadniającego pierwszy przepis. Drugi jest sprawą porządku; tak więc nie było wolno odbywać komicjów w dnie świąt i targów, kiedy wieśniacy, przybywający do Rzymu w swoich sprawach, nie mieli czasu przepędzać dnia na placu publicznym. Za pomocą trzeciego przepisu senat trzymał w cuglach dumny i ruchliwy naród i w porę miarkował żarliwość buntowniczych trybusów; te jednak znalazły wiele sposobów, by uwalniać się od tego skrępowania."},{"type":"paragraph","text":"Pod sąd komicjów poddawano nie tylko prawa i wybór naczelników; ponieważ naród rzymski przywłaszczył sobie najważniejsze funkcje rządu, można powiedzieć, że los Europy normowany był na tych zgromadzeniach. Ta rozmaitość przedmiotów powodowała różnice form, jakie te zgromadzenia przybierały, zależnie od materii, co do których miały orzekać."},{"type":"paragraph","text":"By ocenić te różne formy, wystarczy je porównać. Romulus, ustanawiając kurie, miał na celu hamowanie senatu przez naród, narodu zaś przez senat, gdy sam górował nad wszystkim. Za pomocą tej formy obdarzył więc naród całym autorytetem liczby, by zrównoważyć autorytet władzy i bogactw, który pozostawił patrycjuszom. Idąc jednak za monarchicznym duchem, więcej korzyści zostawił patrycjuszom, rozporządzającym wpływami swych klientów 355 na wielość głosów. To podziwu godne urządzenie patronatu i klientów było arcydziełem polityki i ludzkości, bez którego patrycjat, tak sprzeczny z duchem republiki, nie mógłby się był utrzymać. Rzymowi tylko przypadł zaszczyt, że dał światu ten piękny przykład, który nigdy nie przyniósł nadużyć, a jednak nigdy nie był naśladowany."},{"type":"paragraph","text":"Ponieważ ta sama forma kurii utrzymała się za panowania królów aż do Serwiusza, a panowania ostatniego Tarkwiniusza nie uważano za legalne, przeto ogólnie oznaczano prawa królewskie nazwą leges curiatae 356 ."},{"type":"paragraph","text":"Za czasów republiki kurie, ciągle ograniczone do czterech trybusów miejskich i obejmujące jedynie motłoch rzymski, nie mogły dogadzać ani senatowi, stojącemu na czele patrycjuszów, ani trybunom, którzy — chociaż plebejusze — stali na czele dostatnich obywateli. Straciły więc poważanie, i tak wielkie było ich upodlenie, że trzydziestu ich liktorów razem zebranych załatwiało to, co powinny były załatwiać komicja kurialne."},{"type":"paragraph","text":"Podział na centurie do tego stopnia sprzyjał arystokracji, że nie spostrzega się od razu, dlaczego senat nie zawsze brał górę w noszących tę nazwę komicjach, które wybierały konsulów, cenzorów i innych kurulnych urzędników. Istotnie, gdy ze stu dziewięćdziesięciu trzech centurii, tworzących sześć klas całego narodu rzymskiego, pierwsza klasa zawierała dziewięćdziesiąt osiem, a głosy obliczano tylko według centurii, sama ta pierwsza klasa górowała liczbą głosów nad wszystkimi pozostałymi. Gdy wszystkie te centurie zgadzały się między sobą, nie zbierano nawet dalej głosów; to, co postanowiła najmniejsza liczba obywateli, uchodziło za postanowienie gromady; i można powiedzieć, że w komicjach centurialnych normowano sprawy większością raczej talarów niż głosów."},{"type":"paragraph","text":"Ta krańcowa władza była jednak miarkowana przy pomocy dwóch środków. Najpierw, ponieważ zazwyczaj trybunowie, zawsze zaś wielka liczba plebejuszy należała do klasy bogatych, równoważyło to wpływ patrycjuszy w tej pierwszej klasie."},{"type":"paragraph","text":"Drugi środek polegał na tym, że zamiast by centurie głosowały w takiej kolei, w jakiej szły po sobie, na skutek czego zawsze pierwsza centuria musiałaby rozpoczynać, wylosowywano którąś z nich i ta 357 sama przystępowała do wyborów; po czym wszystkie centurie, zwoływane innego dnia według swego porządku, powtarzały te same wybory i najczęściej je zatwierdzały. W ten sposób autorytet przykładu odejmowano stopniowi, by powierzyć go losom, stosownie do zasady demokracji."},{"type":"paragraph","text":"Jeszcze jedna korzyść wypływała z tego zwyczaju: mianowicie, że obywatele wiejscy mieli czas między dwoma wyborami poinformować się o zaletach kandydata prowizorycznie wybranego, tak by oddać swe głosy z całą znajomością rzeczy. Pod pozorem jednak pośpiechu zniesiono w końcu ten zwyczaj i obydwa wybory odbywały się tego samego dnia."},{"type":"paragraph","text":"Komicja trybusowe były właściwą radą narodu rzymskiego. Zwoływali je tylko trybunowie; trybunowie byli na nich wybierani i na nie wnosili swe plebiscyty. Senat nie tylko nie wchodził w ich skład, ale nie miał nawet prawa obecności na nich; i senatorowie, zmuszeni słuchać praw, nad którymi nie mogli głosować, byli pod tym względem mniej wolni niż ostatni z obywateli. Niesprawiedliwość ta nie była niczym uzasadniona i wystarczałaby sama dla nieważności dekretów ciała, do którego nie dopuszczano wszystkich jego członków. Choćby wszyscy patrycjusze byli obecni na tych komicjach stosownie do prawa, jakie im się jako obywatelom należało, stając się wówczas zwyczajnymi jednostkami, nie wywieraliby wcale wpływu przy formie głosowania, w której zbierano głosy według głów i w której najmniejszy proletariusz mógł tyleż, co przewodniczący senatu."},{"type":"paragraph","text":"Widzimy więc, że pominąwszy wynikający z tych różnych podziałów porządek przy odbieraniu głosów tak wielkiego narodu, podziały te nie sprowadzały się do form, obojętnych w samych sobie, lecz że każda z nich pociągała za sobą skutki stosowne do celów, które kazały ją przyjąć."},{"type":"paragraph","text":"Nie wchodząc co do tego w bliższe szczegóły, należy z poprzednich wyjaśnień wyciągnąć wniosek, że komicja trybusowe najbardziej sprzyjały rządowi ludowemu, komicja zaś centurialne arystokracji. Co się tyczy komicjów kurialnych, gdzie sam motłoch rzymski tworzył większość, to te, nadając się jedynie do popierania tyranii i złych zamiarów, musiały popaść w niesławę, gdy nawet buntownicy sami wstrzymywali się od środka zanadto odsłaniającego ich plany. To pewne, że jedynie w komicjach centurialnych spoczywał cały majestat narodu rzymskiego, gdyż one jedne były zupełne; z tego powodu, że w komicjach kurialnych brakowało trybusów wiejskich, w komicjach zaś trybusowych senatu i patrycjuszy."},{"type":"paragraph","text":"Co się tyczy sposobu zbierania głosów, był on u pierwszych Rzymian równie prosty, jak ich obyczaje, aczkolwiek mniej jeszcze prosty niż w Sparcie. Każdy oddawał swój głos ustnie; pisarz w miarę tego spisywał głosy; większość głosów w każdym trybusie rozstrzygała o uchwale narodu; tak samo w kuriach i w centuriach. Zwyczaj ten był dobry, dopóki uczciwość panowała wśród obywateli i dopóki każdy wstydził się oddawać swój głos publicznie za niesłusznym zdaniem lub za niegodnym kandydatem; lecz gdy lud zepsuł się i gdy zaczęto kupować głosy, odpowiedniejsze stało się głosowanie tajne, by kupujących wstrzymywać przez nieufność i by łajdakom ułatwić możność niezostawania zdrajcami."},{"type":"paragraph","text":"Wiem, że Cycero 358 gani tę zmianę i jej przypisuje w części upadek republiki. Aczkolwiek jednak czuję, jaką wagę powinien mieć tutaj autorytet Cycerona 359 , nie mogę być jego zdania. Sądzę przeciwnie, że przyśpieszono zgubę państwa, nie przeprowadzając więcej podobnych zmian. Jak sposób życia ludzi zdrowych nie jest właściwy dla chorych, tak samo nie można chcieć rządzić narodem zepsutym za pomocą tych samych praw, które odpowiadają dobremu narodowi. Nic lepiej nie udowadnia tej zasady jak trwanie republiki weneckiej, której cień jeszcze istnieje jedynie dlatego, że prawa jej są odpowiednie tylko dla złych ludzi."},{"type":"paragraph","text":"Rozdano więc obywatelom tabliczki, za pomocą których każdy mógł głosować tak, by nikt nie wiedział, jakie jest jego zdanie; wprowadzono także nowe formalności dla odbierania tabliczek, liczenia głosów, porównywania liczby itd.; co nie zapobiegło częstemu podejrzewaniu o nierzetelność urzędników pełniących te funkcje 360 . Wydawano w końcu dla przeciwdziałania intrydze i kupczeniu głosami edykty, których wielość okazuje ich bezskuteczność."},{"type":"paragraph","text":"Pod koniec Rzeczypospolitej często musiano uciekać się do nadzwyczajnych środków, by zaradzić niedostateczności praw. Raz wymyślano cuda, ten środek jednak, który mógł obałamucić lud, nie obałamucał tych, co nim rządzili; to znów nagle zwoływano zgromadzenie, zanim kandydaci mieliby czas rozpocząć kaptowanie sobie głosów; wreszcie zużywano całe posiedzenie na mowy, gdy widziano, że lud przekupiony gotów jest powziąć jakąś złą decyzję. W końcu jednak ambicja odsunęła wszystko, a jest rzeczą nie do wiary, że ten olbrzymi naród, pośród tylu nadużyć, dzięki dawnym swym przepisom wybierał urzędników, uchwalał ustawy, sądził, załatwiał sprawy prywatne i publiczne prawie z tą samą łatwością, z jaką mógłby to robić sam senat."}]},{"id":"rozdział-v-o-trybunacie","number":51,"title":"Rozdział V. O trybunacie","blocks":[{"type":"paragraph","text":"Gdy nie można ustalić ścisłej proporcji między składowymi częściami państwa lub gdy niedające się usunąć przyczyny psują ustawicznie ich wzajemne ustosunkowania, wówczas ustanawia się specjalny urząd, niezłączony wcale z innymi, który każdy czynnik stawia z powrotem w jego właściwy stosunek i tworzy — gdy to jest konieczne — łącznik, czyli termin środkowy, bądź między księciem a narodem, bądź między księciem a zwierzchnikiem, bądź równocześnie z obu stron 361 ."},{"type":"paragraph","text":"Ciało to, które będę nazywał trybunatem , jest konserwatorem praw i władzy prawodawczej. Służy czasami do chronienia zwierzchnika przed rządem, jak to czynili w Rzymie trybunowie ludu; czasami do podtrzymywania rządu przeciwko narodowi, jak to czyni obecnie w Wenecji Rada Dziesięciu 362 ; czasami zaś do utrzymywania ogólnej równowagi, jak to czynili eforowie 363 w Sparcie."},{"type":"paragraph","text":"Trybunat nie jest istotną częścią składową pańs
