spolitą do szlacheckiego stanu, nie odczuwając nawet potrzeby bardziej sprawiedliwego unormowania położenia niższych klas. Uczniem Russa nie jest. Nie przejął się całością doktryny filozofa ani znaczenia jej właściwego nie przeniknął. Od Russa przejmuje tylko pewne argumenty na poparcie własnych swych tez poszczególnych. Pisze, by przedstawić projekt reformy, ma na oku praktyczny, konkretny cel, więc też raczej z Uwag niż z Umowy czerpie. Sam już tytuł dzieła jego O przywróceniu dawnego rządu według pierwiastkowych Rzeczypospolitej ustaw wskazuje, że metoda jego inna od metody Umowy . Nie opiera się więc na abstrakcyjnych dedukcjach, ale bada pozytywne, historyczne urządzenia i wzmacnia swoje twierdzenia i plany głównie historycznymi racjami. Chce budować na polskich historycznych stosunkach i na dawnym ustroju Polski, takim oczywiście, jak się on jego pojęciu przedstawia."},{"type":"paragraph","text":"Publicyści obozu przeciwnego staroszlacheckiemu, zwolennicy i głosiciele naprawy Rzeczypospolitej, poprzednicy i inicjatorowie odrodzeńczej działalności Sejmu Czteroletniego, przygotowujący lub tworzący Konstytucję 3 maja i ustawy z nią związane, ci publicyści rozczytują się również w Russie, znają go i cenią, i w pewnej mierze pozostają pod wpływem jego doktryny. Rozumieją go bez porównania lepiej i nie nadużywają jego imienia dla żadnych wstecznych, egoistycznych i kastowych celów. Wielu z nich teoretyzuje także, ma własną koncepcję genezy i podstaw prawnych społeczeństwa, nie te jednak filozoficzne konstrukcje głównie mają na oku. Patrioci jasno widzą, że Polska na skutek swej anarchii nad brzegiem przepaści się znalazła, zdają sobie sprawę, że ostatnia godzina ratunku ojczyzny wydzwania. I piszą, by bić na alarm, uświadamiać grozę położenia i wskazywać środki ocalenia. Uczeni, statyści 43 , czynni politycy trzeźwo patrzą na rzeczywistość, obliczają wszystkie siły narodu i organizują je z myślą o stworzeniu ustroju politycznego, społecznego, ekonomicznego odpowiadającego współczesnym europejskim warunkom, zdolnego oprzeć się skutecznie naporowi z zewnątrz, dążącemu do zniszczenia samodzielności i niepodległości Polski. Prawodawcy stwarzają ustawy mające wlać w naród nowe życie, wzmocnić go, uodpornić i popchnąć jego historię na nowe tory. Teoretycznie uświadomieni nie poświęcą jednak dla teoretycznej czystości linii żywotnych interesów, uwzględnią wskazania doktryny, o ile się one dadzą pogodzić z wymaganiami położenia, ze stanem faktycznych stosunków, z rzeczywistymi potrzebami i z dotychczasowym doświadczeniem politycznym. Ocalić ojczyznę, wydobyć ją z toni anarchii i z niebezpieczeństwa rozszarpania przez obcych: oto jest ich zadanie, do którego dążą za wszelką cenę, choćby kosztem teoretycznej prawności przyszłego ustroju. Z nich najwybitniejsi Wybicki, Staszic, Kołłątaj."},{"type":"paragraph","text":"Józef Wybicki w swych Listach patriotycznych , ogłoszonych w 1777 r., mających torować drogę kodeksowi Zamoyskiego, głosi konieczność sprawiedliwości powszechnej, z goryczą piętnuje krzywdy ludu i mądrze przemawia za wzięciem chłopów pod opiekę prawa, wojując teoretycznymi i ekonomicznymi argumentami. Russa nazywa wielkim autorem, głębokim, cały rozdział cytuje z Umowy o zaludnieniu jako znaku dobroci rządu i z tego punktu widzenia ostro krytykuje ustrój Polski, biadając nad ciągle wzrastającą depopulacją. Refleksów teorii Russa u niego wiele. Prawi, że człek się sprzedać nie może, że prawa winny mieć powszechne dobro na oku, że wolność polega na poddaniu swych pasji rozumowi, rozumu zaś sprawiedliwości, że istotę społeczeństw tworzy doskonała praw i obowiązków wszystkich wzajemność. Ale myśli wytrawnie i spokojnie i nie zaślepia się żadną doktryną. Wiele czytał i rozważał, zna Monteskiusza i Mirabeau 44 (ojca), zna także angielskich autorów i kameralistów 45 niemieckich. Interesował się stosunkami różnych krajów, powołuje się na Anglię, Szwajcarię, Holandię, Francję. W swej teorii społeczeństwa jest naturalistą teologicznym. Według niego społeczność jest dziełem Stwórcy, obowiązki społeczne polegają na naturalnym, przez Stwórcę zakreślonym porządku rzeczy, który Stwórca wyrył w sercu człowieka. I ten naturalny porządek jest wzorem wszelkich dobrych praw, a ludzie powinni doń powracać z miłości i bojaźni bożej. W politycznych poglądach przypomina Wybicki raczej Monteskiusza niż Russa. Aczkolwiek żąda równej sprawiedliwości dla wszystkich, jednak „stanów wyższych i niższych granice i potrzebę” wytknęło dlań samo przyrodzenie. Chwali monarchię dziedziczną, prawem ograniczoną. Ustawodawstwo oddaje ciału reprezentacyjnemu, każe jedynie konstytucję stanowić całemu ludowi zgromadzonemu. Wybicki, wykształcony eklektyk 46 , umiejący obserwować, rozumny obywatel, pisze książkę propagandystyczną dla przygotowania opinii publicznej, a nie dzieło naukowe, dlatego przystosowuje się do szlacheckich pojęć, starając się je oczyścić i sprostować."},{"type":"paragraph","text":"Stanisław Staszic złożył swe myśli o społeczności i prawie, o Polsce i konieczności reformy jej ustroju w dwóch dziełach, również propagandystycznych, mających uprzytomnić grozę położenia, wzruszyć umysły, pobudzić serca. Pierwsze z nich to Uwagi nad życiem Jana Zamoyskiego (1785), drugie, już za czasów Sejmu Czteroletniego, w 1790 r. ogłoszone Przestrogi dla Polski 47 ."},{"type":"paragraph","text":"Staszic daje za podkład projektom swoim rozwiązania różnych polskich problemów ustrojowych, społecznych i gospodarczych, własną swą teorię prawnych związków społecznych. Prawność opiera na prawach natury w przyrodniczym znaczeniu, mianowicie na prawach o charakterze biologicznym: instynkt samozachowawczy, rozkosz odczuwana przez człowieka przy wprawianiu w funkcjonowanie swych władz, niedoskonałość sił jego i ich niewystarczalność dla jego obrony, konieczność pomocy innych istot podobnych do utrzymania się przy życiu, prawo silniejszego do poddania sobie słabszego; fakt, że tym silniejszym, rozporządzającym zawsze większą wrodzoną siłą, jest tylko większość, nigdy zaś mniejszość czy jednostka, dyktują naturalną ustawę wszystkim społeczeństwom, jedną dla ludzi jakiegokolwiek klimatu. Ta naturalna ustawa wyraża się w zasadach: obowiązku społeczności chronienia wolności, równości, własności obywateli, obowiązku jednostki poddania się prawom społeczności i oddania własności swoich, gdy tego obrona całości wymaga, zwierzchnictwa narodu, przejawiającego się w uchwale większości wszystkich obywateli, charakteru rządu, jako jedynie wykonawcy praw."},{"type":"paragraph","text":"Sam Staszic tak streszcza swoje poglądy na idealne państwo: „Gdzie żaden człowiek nie ma więcej mocy i woli osobistej, tylko ile mu prawo pozwala, a do stanowienia praw wszyscy bez wyłączenia właściciele należą, gdzie wszyscy tylko wszystkim są powolni, i tylko moc i wola powszechna, tj. naród, większością głosów sobie prawa wyznacza, tam na miejscu kłótliwej nierówności osobistej stanęła obywatelska równość, wolność i pokój. To jedno towarzystwo nazywam Rzecząpospolitą”."},{"type":"paragraph","text":"Jakiż jest stosunek tej Staszicowskiej teorii społeczeństwa do teorii Russa? Staszic jest widocznie przejęty Russem, prawie wszystkie jego konkluzje akceptuje: rządy prawa jako woli powszechnej, równość wszystkich wobec prawa, zwierzchnictwo narodu, zasadę większości, bezpośrednie sprawowanie przez naród ustawodawstwa. Całe zdania dosłownie z Russa wypisuje, próbuje nawet za jego wzorem symbolizować w matematycznych proporcjach wzajemne stosunki różnych czynników związków społecznych."},{"type":"paragraph","text":"A jednak pomiędzy nim a Russem zachodzą głębokie różnice. Przede wszystkim obiera całkowicie inną niż Russo podstawę dowodu. Podczas gdy u Russa naczelnym aksjomatem całej dedukcji jest twierdzenie o normatywnym charakterze ( pacta sunt servanda ), Staszic na naturze się opiera i z niej wywodzi swój prawno-polityczny system. Naturalizm tworzy cały charakter teorii Staszica, zupełnie obcy czystej, wyłącznej normatywności teorii Russa. Stąd, gdy Russo mówi o umowie, jako podstawie prawnych społeczeństw, Staszic na ustawie natury opiera swój porządek. Nie wyzwoliwszy się od naturalizmu, nie wyzwolił się też Staszic od empiryzmu w tym stopniu jak Russo. Jego pomocnicze konstrukcje pojęciowe chorują na empiryzm i nie dochodzą do tej racjonalizacji, jaką im nadaje Russo. Najbardziej to widoczne w pojęciu woli powszechnej. U Russa wola powszechna jest racjonalną, powszechną korzyścią, obiektywną i od rzeczywistej woli ludzi naród składających niezależną. U Staszica jest z wolą większości zidentyfikowana. Tak dalece, że doprowadza to w końcu Staszica do wykolejenia: „Zguba części mniejszej od ogłoszenia prawa, które uszczęśliwia towarzystwa część większą, prawodawcę odwodzić nie może”. Więc despotyzm większości, idea, którą Russo odrzuciłby z oburzeniem."},{"type":"paragraph","text":"Także liberalizm Staszica nieco inaczej każe mu ująć stosunek jednostki do państwa, niż to jest u Russa. Podczas gdy Russo całkowicie poddaje obywatela woli powszechnej, tak że ta wola może rozporządzać nim i wszystkim co jego, bez ograniczeń, dla celów zakreślonych przez korzyść całości, gdyż ta korzyść zawsze jest korzyścią jednostki — Staszic, upatrując cel związków społecznych w ochronie możliwie najpełniejszego używania przez człowieka swych właściwości, które są jego naturalnymi prawami, godzi się na bardziej uciążliwe skrępowanie wolności indywidualnych tylko na wypadek, gdy tego wymaga utrzymanie bytu państwa samego, konieczność obrony zewnętrznej."},{"type":"paragraph","text":"Według Staszica np. sprzeciwiają się w zasadzie prawom natury armie stałe, zawodowe, gdyż są obroną, której utrzymanie nie cierpi wolności człowieka (bo polega na przymuszaniu niektórych obywateli do opuszczenia i wyrzeczenia się wszystkiego na zawsze, odbierając im koniecznie własność osobistą), która niszczy własność gruntową (bo dla powiększenia swego zabiera wszelki z własności pożytek przez ciężary, podatki). „Według praw Stwórcy tylko sami obywatele są naturalnymi obrońcami swoich praw, wolności i własności”. W ten sposób Russo nie argumentowałby nigdy. I on także był przeciwnikiem armii regularnych i stałych, a zwolennikiem milicji obywatelskich, ale nie dlatego, że armie te wymagają rujnujących podatków, lecz dlatego, że mogą stać się groźne dla wolności narodu (czego zresztą i Staszic obawia się także). Pomimo to Staszic gorąco przemawia za podatkami i wojskiem w Polsce. Polska bowiem jest zmuszona przez nacisk zewnętrznych despotyzmów pod grozą śmierci do utrzymywania armii i do obciążania na jej rzecz obywateli podatkami. Czyniąc to w obronie swego istnienia, nie złamie praw natury i nie przestanie być republiką na prawie opartą. Wreszcie odnośnie do stosunku władzy prawodawczej do wykonawczej Staszic w przeciwieństwie do Russa jest zwolennikiem konfuzji, zespolenia obydwu funkcji w jednym organie."},{"type":"paragraph","text":"Plan nowego pozytywnego ustroju Polski buduje Staszic w zgodzie ze swoją teorią. Zachowuje główne linie republiki naturalnej, modyfikując je tam jedynie, gdzie zupełna realizacja byłaby przedwczesna lub w danych warunkach praktycznie nieosiągalna. Dotyczy to zwłaszcza reformy społecznej. Tutaj zbliża się Staszic pod względem polecanej przez siebie metody postępowania do ostrożnego programu, jaki Russo złożył w Uwagach . W programie reformy ustroju przez silne zaakcentowanie potrzeby instrukcji 48 o wiążącym charakterze stara się uczynić zadość naczelnemu przykazaniu swojej teorii i teorii Umowy . We wskazówkach swych jednak co do innych szczegółowych urządzeń od Umowy odbiega znowu, trzymając się jednak granic swojego systemu."},{"type":"paragraph","text":"Streszczając się, należy stwierdzić silny wpływ Russa na Staszica w ogólnych jego tendencjach. Republikanizm i demokratyzm Russa są duszą książek Staszica. Z przesłanek swej teorii, raczej fizjokratów 49 przypominającej, wysnuwa Staszic wnioski podobne do wniosków Russa, choć nie identyczne. Przyjmuje w zupełności zasady Russa warunkujące prawność związków społecznych: w każdej społeczności berło rządów należy wyłącznie do prawa — prawo ma być równe dla wszystkich — do stanowienia praw powinni należeć wszyscy, których życiem i majątkiem prawa te będą zarządzać. Zwierzchnictwo jednak większości oddaje, utożsamiając jej wolę z wolą powszechną i przepaja liberalizmem swoje także społeczne zresztą ujęcie stosunku jednostki do państwa. W praktycznych radach swych dla Polski samodzielny, nie idzie ślepo za radami Russa, aczkolwiek w programie reformy społecznej (i edukacji narodowej) zbliża się do niego."},{"type":"paragraph","text":"Hugo Kołłątaj , bardzo bystry, prawdziwie europejski, a samodzielny umysł, niestrudzony i zręczny organizator i projektodawca reformy, głęboko przesiąkł humanitaryzmem wieku oświecenia. W swych dziełach: Do Stanisława Małachowskiego anonima listów kilka (1788–1789), Prawo polityczne Narodu Polskiego (1790) oraz w licznych broszurach, wydawanych podczas Sejmu Czteroletniego, głosi on wytrwale i z przekonaniem prawa człowieka do wolności i własności. Wolność człowieka jest dlań najświętszą, nienaruszalną zasadą, a prawo społeczne, przestępujące prawo natury, według którego osoba każdego człowieka jest wolna, jest najpierwszą niesprawiedliwością i gwałtem. Niewola, poddaństwo jednych ludzi u innych prywatnych ludzi jest rzeczą przeciwną prawom naturalnym i boskim. W tym wysokim poszanowaniu godności człowieka zbliża się Kołłątaj do wszystkich kulturalnych umysłów na Zachodzie i w tym jeszcze trudno się dopatrzyć specjalnego nań wpływu Russa. Zarówno w swym projekcie reformy społecznej, jak w projektach naprawy ustroju jest trzeźwym i samodzielnym politykiem, nie kierującym się żadną doktryną. Kołłątajowski projekt reformy jest wypływem jego głębokiej znajomości rzeczywistych stosunków Polski, jej potrzeb i grożących jej niebezpieczeństw, a także jest wypływem jego poważnej prawno-politycznej kultury. Znał Kołłątaj także i pisma Russa, ale nie brał go sobie za wzór i zasilał myśl swoją nie tylko nim. Odbiega on też w wielu swych poglądach od idei Russa."},{"type":"paragraph","text":"W jednym tylko punkcie Kołłątaj zdaje się chcieć zbliżyć do ideału w Umowie skreślonego. Wiąże mianowicie posłów instrukcjami i to tak dalece, że żąda, by głosowanie posła wbrew instrukcjom zdziałane nic nie znaczyło i nie wiązało województwa. A instrukcje to sposób zbliżenia władzy ustawodawczej do narodu i umożliwienia każdemu obywatelowi zabierania głosu w kwestiach ustaw. Tu Kołłątaj dalej nawet idzie niż sam Russo w Uwagach : Russo instrukcji nie czynił wiążącymi. Trudno jednak orzec stanowczo, czy to wpływ doktryny Umowy , czy też liczenie się z tradycją szlachecką i koncesją na rzecz przyzwyczajeń narodowych. Zapewne jedno i drugie."},{"type":"paragraph","text":"Podczas Sejmu Czteroletniego włożyło Kołłątajowi w rękę pióro „teraźniejsze położenie interesów ojczyzny”. Obawiał się on też najbardziej tego, by nie pomieszczono pism jego w liczbie romansów lub Platonowej Rzeczypospolitej 50 , by nie zdały się one być niepodobne 51 do egzekucji 52 . Filozoficznej teorii społeczeństwa w nich się zatem nie znajdzie. Trzeba jej szukać gdzie indziej."},{"type":"paragraph","text":"Wyniki swoich rozmyślań nad obowiązkiem społecznym, istotnym dla współżycia ludzi pomiędzy sobą, złożył on w książce pt. Porządek fizyczno-moralny, czyli nauka o należytościach i powinnościach człowieka, wydobytych z praw wiecznych, nieodmiennych i koniecznych przyrodzenia (1810). Tytuł już sam wskazuje na to, kto w systemie Kołłątaja będzie prawodawcą. Przyrodzenie poddało człowieka pod prawa moralne, które go obowiązują w jeden prawie sposób jak prawa fizyczne. A czyni to w sposób następujący: fizyczne przyczyny wywołują w człowieku czucia, z doznanych czuć budzą się potrzeby. Dając człowiekowi potrzeby, dała mu przyroda prawo nabywania rzeczy, tzn. dała mu należytości, z tymi należytościami zaś nieoddzielnie związała powinności. Prawodawstwo przyrody zabezpiecza człowiekowi: 1) własność jego osoby, 2) własność przezeń nabytych rzeczy, 3) należytości i powinności wszystkich nawzajem. Te objawione przez przyrodę prawidła są jasne dla każdego, kto idzie za naturą i nie ma rozumu zamąconego przesądami wypływającymi ze złych nałogów. Sama przyroda nadała sankcję swoim prawom moralnym, karząc surowo ludzi i społeczności za ich gwałcenie. A zatem według Kołłątaja porządek moralny i społeczny zależy od porządku fizycznego, wiąże się z nim przez czucia i razem z nim stanowi całość wielkiego porządku przyrodzenia. Całkowite przeciwieństwo z Russem! U genewskiego filozofa porządek moralny i prawny jest odrębnym światem, mającym własne swe założenia, z których się cały wywodzi. Nie idzie ten porządek wbrew porządkowi naturalnemu, liczy się z nim, bo on stawia granice jego własnym możliwościom urzeczywistnienia, bo ma do czynienia z ludźmi, a więc z wytworem tamtego naturalnego porządku. Uwzględnia go, ale się na nim nie opiera i przekształca dane tamtego na własne wartości. Russo posługuje się pojęciem interesu człowieka (a więc wartością o charakterze faktycznym), ale je racjonalizuje i nie z tego interesu formalnie wyprowadza obowiązek, tylko z normy, a jedynie treść tego obowiązku warunkuje zgodnością z interesem. U polskiego filozofa prawo moralne jest z prawami fizycznymi splątane, konieczność przyrodnicza najfałszywiej z obowiązkami pomieszana, fakty przyrodnicze z normatywnymi wartościami pomylone. Stąd fikcyjność całego przedstawienia w najgorszym znaczeniu, stąd podawanie za empirię rzeczy, jakich nie można odkryć w żadnym doświadczeniu. W jakiejże faktycznej rzeczywistości istnieje konieczny związek należytości i powinności? Jeżeli prawa moralne są prawami przyrody, dlaczegóż nie one kierują faktycznymi przebiegami zjawisk? Jeżeli są w przyrodniczym znaczeniu konieczne, jakżeż się dziać może, że nie one kształtują rzeczywistość? Jakimże sposobem rzeczywistość może odbiegać od praw, które nią mają kierować? Dlatego zapewne, że człowiek ma wolną wolę, co jest najpierwszym prawem moralnym? Więc ta przyroda rezygnuje już u samego progu ze swej konieczności i poddaje się dowolności. Jej prawa moralne przestają już działać prawidłowo i koniecznie. Więc cóż to za prawa przyrody? Kołłątaj odrzuca historycyzm, zastrzega się, że nie pisze o człowieku, jakim był, ale o takim, jakim się stać był powinien według praw przyrodzenia. Ale fakty historyczne faktami przyrodniczymi stara się zastąpić i zapomina, że Russo już wiedział, iż z faktów norm się nie wywodzi i że prawa moralne i społeczne bynajmniej konieczności fizycznej nie mają. Kołłątaj gmatwa się w węzeł sprzeczności nie do rozplątania ze swoją naturalną moralnością dlatego, że nie poszedł za Russem i nie przyjął jego metodologicznej postawy. U Russa norma powinności wcale nie naturalna, lecz normatywna. U Kołłątaja naturalna, ale jakiejś natury, której nigdy nie było."},{"type":"paragraph","text":"Kołłątaj zatem, także i jako filozof moralności społecznej, nie był uczniem Russa, poszedł raczej za fizjokratami i obrał nie nazbyt pewnych przewodników. W polityce Russo z pewnością go zapładniał, myśl jego poruszał, na równi z innymi Francji, Anglii, Ameryki myślicielami i politykami rozbudzał jego własny geniusz. I tutaj, na tym terenie Kołłątaj góruje nad Russem. Tutaj umysł jego, odżywiony sokami rzeczywistości, daje owoce zdrowe i posilne, których bardziej spekulatywny umysł Russa nie byłby zapewne zdolny wydać."},{"type":"paragraph","text":"Zamykając przegląd najwybitniejszych polskich pisarzy politycznych obozu reformy, należy stwierdzić, że Umowa społeczna nie znalazła między nimi żadnego wiernego ucznia. Myśleli oni o przekształceniach politycznych i społecznych dla ratowania ojczyzny i to ich cel główny, a nie stwarzanie abstrakcyjnych systemów. Russo natchnął ich jednak swym republikanizmem, demokratyzmem, kultem prawności, w ogólnym nastroju ich dzieł czuć niewątpliwy jego wpływ i duch jego w nich żyje. Ciekawa rzecz, że bezpośredniego echa jego myśli można się dosłuchać raczej w ich politycznych programach niż w ich filozoficznych poglądach. Russa pomysły zabarwiają raczej ich konkretne wnioski poprawy ustroju: pomijając ich plany reformy społecznej, troszczą się bardzo o zachowanie zwierzchnictwa narodu, i to w sensie bezpośredniego wpływu narodu na ustawodawstwo. I czynią tak wówczas właśnie, gdy we Francji współcześnie chwalcy Russa z Konstytuanty, mający ciągle imię jego na ustach, nie myśleli nawet najbardziej dlań istotnych urządzeń politycznych wcielać w życie. W teorii natomiast nie idą za nim, za jego zasadami prawności, wysnutymi z samego związku społecznego, ale raczej na fizjokratów się oglądają, doszukując się w naturalnym porządku podstaw swoich harmonii społecznych."},{"type":"paragraph","text":"Bibliografia"},{"type":"paragraph","text":"Pierwsze wydanie Umowy : Du Contrat social ou Principes du Droit politique , par J. J. Rousseau, citoyen de Genève, à Amsterdam, chez M. M. Rey, 1762."},{"type":"paragraph","text":"Przekładu dokonano z wydania: J. J. Rousseau: Du Contrat social . Publié avec une introduction et des notes explicatives par Georges Beaulavon, professeur de philosophie au Lycée Louis-le-Grand. 3e édition, revue et corrigée. Paris. F. Rieder et Cie, Éditeurs. 1922."},{"type":"paragraph","text":"(Tłumacz korzystał w kilku miejscach swego komentarza z objaśnień Beaulavona, zwłaszcza w przypisach do ks. III)."},{"type":"paragraph","text":"Przekłady poprzednie"},{"type":"paragraph","text":"1) O wolności człowieka b. m. i d. (1778). Jest to tłumaczenie ks. I Umowy , bez podania, że to przekład."},{"type":"paragraph","text":"2) W rękopisie Warszawskiej Biblioteki Uniwersyteckiej całkowity przekład anonimowy z 1799 r. (podaje Szyjkowski, s. 95)."},{"type":"paragraph","text":"3) Umowa towarzyska, czyli zasady prawa politycznego . Napisał po francusku Jan Jakób Rousseau. Przetłumaczył Józef Wien. W Agen, czcionkami J. A. Quellota, 1839. (8°, s. 160)."},{"type":"paragraph","text":"Toż. Nowe wydanie (tytułu). Berlin, Behr, 1859."},{"type":"paragraph","text":"Toż. Nowe wydanie. 1862."},{"type":"paragraph","text":"(Wien zaopatruje swój przekład przypisami, przeważnie odnoszącymi się do historycznych zdarzeń i osób wspomnianych w Umowie , nie sięgając głębiej w treść dzieła)."},{"type":"paragraph","text":"4) Jan Jakób Rousseau: Umowa społeczna . Przełożył i objaśnił dr Antoni Peretiatkowicz, prof. Uniwersytetu Poznańskiego. Wydanie drugie. Poznań 1920."},{"type":"paragraph","text":"Wydania dzieł Russa"},{"type":"paragraph","text":"Oeuvres complètes de J. J. Rousseau . 13 Vol. (Paris, Hachette)."},{"type":"paragraph","text":"Oeuvres et Correspondance inédites de Jean Jacques Rousseau , publiés par M. G. Streckeisen-Moultou (Paris, Michel Lévy frères, 1861)."},{"type":"paragraph","text":"Correspondance générale de J. J. Rousseau . Collationnée sur les originaux, annotée et commentée par Théofile Dufour. Paris, A. Colin, 1924 (dotąd pięć tomów)."},{"type":"paragraph","text":"The political writings of Jean Jacques Rousseau edited from the original manuscripts and authentic editions with introductions and notes by C. E. Vaughan. In two volumes. Cambridge, University Press 1915."},{"type":"paragraph","text":"E. Dreyfus-Brisac. Le Contrat social , édition comprenant, avec le texte définitif, les versions primitives de l’ouvrage, collationnées sur les Mss. autographes de Genève et de Neufchâtel, une introduction et des notes. Paris, Alcan, 1896."},{"type":"paragraph","text":"Dzieła o Russie i Umowie społecznej"},{"type":"paragraph","text":"Z olbrzymiej literatury o Russie i Umowie społecznej podaje się jedynie dzieła najdostępniejsze:"},{"type":"paragraph","text":"Dr Antoni Peretiatkowicz: Filozofia społeczna J. J. Rousseau . Wydanie drugie. Poznań 1921."},{"type":"paragraph","text":"M. Liepmann: Die Staatstheorie des Contrat social . Halle 1896."},{"type":"paragraph","text":"— Die Rechtsphilosophie des J. J. Rousseau , Berlin 1898."},{"type":"paragraph","text":"F. Haymann: J. J. Rousseau’s Sozialphilosophie . Leipzig 1898."},{"type":"paragraph","text":"Emile Faguet: Vie de Rousseau. — Rousseau penseur . 2 tomy. Paris 1912."},{"type":"paragraph","text":"— La politique comparée de Montesquieu, Rousseau et Voltaire. Paris 1902."},{"type":"paragraph","text":"H. Rodet: Le Contrat social et les Idées politiques de Rousseau . Paris 1909."},{"type":"paragraph","text":"Leçons faites à l’École des Hautes Études sociales: J. J. Rousseau , par M. M. Baldensperger, Beaulavon, Benrubi, Bouglé, A. Cahen, Delbos, Dwelshauvers, Gastinel, Momet, Parodi et Vial. Paris 1912."},{"type":"paragraph","text":"A. Chuquet: J. J. Rousseau . Paris 1896."},{"type":"paragraph","text":"Harald Höffding: Jean Jacques Rousseau et sa Philosophie . Paris 1912."},{"type":"paragraph","text":"E. Seillière: J. J. Rousseau . Paris 1921."},{"type":"paragraph","text":"Stosunku Wielkiej Rewolucji do Russa dotyczą:"},{"type":"paragraph","text":"A. Meynier: J. J. Rousseau révolutionnaire . Paris 1911."},{"type":"paragraph","text":"E. Champion: J. J. Rousseau et la Révolution française . Paris 1909."},{"type":"paragraph","text":"A. Dide: J. J. Rousseau, le protestantisme et la Révolution française . Paris 1911."},{"type":"paragraph","text":"R. Redslob: Die Staatstheorien der französischen Nationalversammlung von 1789. Leipzig 1912."},{"type":"paragraph","text":"O wpływie Russa w Polsce:"},{"type":"paragraph","text":"Marian Szyjkowski: Myśl Jana Jakóba Rousseau w Polsce XVIII wieku . Kraków 1913."},{"type":"paragraph","text":"Stanisław Grabski: Zarys rozwoju idei społeczno-gospodarczych w Polsce , tom I: Od pierwszego rozbioru do trzeciego . Kraków 1903."},{"type":"paragraph","text":"Z innych dzieł Russa wyszły w Bibliotece Narodowej, seria II, nr 32: Uwagi nad rządem Polski w przekładzie i opracowaniu dra Macieja Starzewskiego."}]},{"id":"o-umowie-społecznej-czyli-zasady-prawa-politycznego-przez-j-j-rousseau-obywatela-genewskiego","number":3,"title":"O Umowie społecznej, czyli zasady prawa politycznego przez J. J. Rousseau, obywatela genewskiego","blocks":[{"type":"verse","text":"Foederis aequas\nDicamus leges... 53"},{"type":"paragraph","text":"Uwaga"},{"type":"paragraph","text":"Ta niewielka rozprawa jest wyjęta z obszerniejszego dzieła, które przedsięwziąłem niegdyś, nie licząc się ze swymi siłami, a dawno już porzuciłem. Z różnych fragmentów, które można było wyciągnąć z tego, co już było gotowe, ten jest najznaczniejszy, a wydał mi się najmniej jeszcze niegodny, by go ofiarować czytelnikom. Reszta już nie istnieje."}]},{"id":"księga-pierwsza","number":4,"title":"Księga pierwsza","blocks":[{"type":"paragraph","text":"Zamierzam zbadać, czy w społecznym porządku może tkwić jakaś słuszna i pewna norma rządzenia — biorąc ludzi takimi, jakimi są, prawa zaś takimi, jakimi być mogą. Będę się starał zawsze godzić w tym poszukiwaniu to, na co pozwala prawo, z tym, czego wymaga interes, by sprawiedliwość i pożytek nie były z sobą skłócone 54 ."},{"type":"paragraph","text":"Przystępuję do rzeczy, nie udowadniając ważności mego przedmiotu. Pytać mnie będą, czy jestem księciem lub prawodawcą, że piszę o polityce. Gdybym był księciem lub prawodawcą, nie traciłbym czasu na mówienie o tym, co należy robić; robiłbym to albo milczałbym."},{"type":"paragraph","text":"Urodziłem się obywatelem państwa wolnego i członkiem władzy zwierzchniej, i — jakkolwiek słaby wpływ mógłby mieć głos mój w sprawach publicznych — prawo głosowania nad nimi wystarcza, by nałożyć na mnie obowiązek poznania ich; szczęśliwy jestem, że ilekroć zastanawiam się nad rządami, zawsze w badaniach mych znajduję nowe powody miłowania rządu mego kraju! 55"}]},{"id":"rozdział-i-przedmiot-tej-pierwszej-księgi","number":5,"title":"Rozdział I. Przedmiot tej pierwszej księgi","blocks":[{"type":"paragraph","text":"Człowiek urodził się wolny, a wszędzie jest w okowach. Niejeden mniema, że jest panem innych, a jest bardziej niewolny niż oni. W jaki sposób dokonała się ta przemiana? Nie wiem. Co może ją uprawnić? Mniemam, że potrafię rozwiązać to zagadnienie 56 ."},{"type":"paragraph","text":"Gdybym wziął pod uwagę jedynie siłę oraz wypływający z niej skutek, powiedziałbym: „Dopóki naród jakiś zmuszony jest słuchać i słucha, robi dobrze; skoro tylko może zrzucić jarzmo i zrzuca je, robi jeszcze lepiej; skoro bowiem odzyskuje wolność za pomocą tego samego prawa, które mu ją odjęło, to albo jest uprawniony odzyskać ją, albo też ci, co mu wzięli wolność, nie mieli do tego prawa”. Ale porządek społeczny jest prawem świętym, stanowiącym podstawę wszystkich innych praw. Jednakowoż prawo to nie pochodzi od natury; opiera się więc na umowach. Idzie o to, by poznać, jakie to są te umowy. Zanim do tego przejdę, powinienem ustalić to, co właśnie powiedziałem 57 ."}]},{"id":"rozdział-ii-o-pierwszych-społecznościach","number":6,"title":"Rozdział II. O pierwszych społecznościach","blocks":[{"type":"paragraph","text":"Najstarszą ze wszystkich społeczności i jedyną przyrodzoną jest rodzina: a jeszcze dzieci pozostają w związku z ojcem jedynie dopóty, dopóki potrzebują go, by zachować się przy życiu. Skoro tylko potrzeba ta ustaje, węzeł naturalny rozwiązuje się. Dzieci wolne od posłuszeństwa, jakie winne były ojcu, ojciec, wolny od opieki, jaką winien był dzieciom, na równi odzyskują niezależność. Jeżeli nadal pozostają w jedności, to już nie z przyrodzenia, ale z własnej woli; i nawet rodzina utrzymuje się tylko przez umowę 58 ."},{"type":"paragraph","text":"Ta powszechna wolność jest następstwem natury człowieka. Pierwszym jego prawem 59 jest czuwać nad własnym zachowaniem, pierwsze jego starania to te, które winien samemu sobie; i z chwilą, gdy dojdzie do wieku używania rozumu, sam będąc sędzią środków, które są zdolne zachować go, staje się przez to swym własnym panem."},{"type":"paragraph","text":"Rodzina jest zatem, jeśli się tak chce, pierwszym wzorem społeczności politycznej: naczelnik jest obrazem ojca, naród jest obrazem dzieci; i wszyscy z urodzenia równi i wolni, pozbywają się swej wolności jedynie dla swej korzyści. Cała różnica leży w tym, że w rodzinie miłość ojca do swych dzieci stanowi dlań zapłatę za trudy, które im poświęca; w państwie natomiast tę miłość, której naczelnik nie odczuwa dla swych ludów, zastępuje przyjemność rozkazywania 60 ."},{"type":"paragraph","text":"Grotius 61 przeczy, jakoby wszelka władza ludzka miała być ustanowiona dla korzyści tych, którymi się rządzi; jako przykład przytacza niewolnictwo. Jego najbardziej stałym sposobem rozumowania jest zawsze utwierdzanie praw przez fakty 62 . Można by użyć metody bardziej logicznej, ale nie można by użyć metody bardziej korzystnej dla tyranów 63 ."},{"type":"paragraph","text":"Według Grotiusa zatem jest rzeczą wątpliwą, czy ród ludzki należy do jakiejś setki ludzi, czy też ta setka ludzi należy do rodu ludzkiego; i w całej swej książce zdaje się przechylać ku pierwszemu poglądowi. Tak mniema także Hobbes 64 . Oto więc cały rodzaj ludzki podzielony na trzody bydła, z których każda ma swego naczelnika, strzegącego jej, aby ją pożreć."},{"type":"paragraph","text":"Jak natura pasterza jest wyższa niż natura jego trzody, tak pasterze ludzi, to jest ich naczelnicy, mają także naturę wyższą niż ich ludy. Tak rozumował, wedle tego, co podaje Filo 65 , cesarz Kaligula 66 , wnioskując z tej analogii dość trafnie, że królowie są bogami, względnie że narody są bydłem."},{"type":"paragraph","text":"Rozumowanie tego Kaliguli wychodzi na to samo, co rozumowanie Hobbesa i Grotiusa. Arystoteles 67 , wcześniej niż oni wszyscy, powiedział także, że ludzie nie są z natury swej równi, ale że jedni rodzą się do niewoli, drudzy do panowania 68 ."},{"type":"paragraph","text":"Arystoteles miał słuszność, brał jednak skutek za przyczynę. Każdy człowiek urodzony w niewoli rodzi się do niewoli — nic pewniejszego nad to. Niewolnicy tracą w okowach wszystko, tracą nawet pragnienie, by je zrzucić; kochają swą niewolę tak, jak towarzysze Ulissa 69 ukochali swe zezwierzęcenie 70 . Jeżeli więc istnieją niewolnicy z natury, to dlatego, że istnieli niewolnicy wbrew naturze. Pierwszych niewolników stworzyła siła, ich własna podłość utrwaliła ich w niewoli."},{"type":"paragraph","text":"Nie wspomniałem o królu Adamie ani o cesarzu Noem 71 , ojcu trzech wielkich monarchów, co świat pomiędzy siebie podzielili, tak jak to zrobiły dzieci Saturna 72 , które mniemano rozeznawać w dzieciach Noego. Mam nadzieję, że ta moja powściągliwość będzie wdzięcznie przyjęta; pochodzę bowiem w prostej linii od jednego z tych książąt, i może nawet ze starszej linii, i kto wie, czy po sprawdzeniu tytułów, nie pokazałoby się, że jestem prawowitym królem rodzaju ludzkiego? Jakkolwiek jest, nie można się nie zgodzić, że Adam był panem świata, jak Robinson 73 był panem swej wyspy, dopóki był jej jedynym mieszkańcem, i wygodnie było w tym państwie, że monarcha, pewny swego tronu, nie potrzebował obawiać się ani buntów, ani wojen, ani spiskowców."}]},{"id":"rozdział-iii-o-prawie-silniejszego","number":7,"title":"Rozdział III. O prawie silniejszego","blocks":[{"type":"paragraph","text":"Najsilniejszy nigdy nie jest dość silny, by być zawsze panem, jeżeli nie przekształci swej siły na prawo, posłuszeństwa zaś na obowiązek. Stąd prawo silniejszego; prawo pozornie wzięte w znaczeniu ironicznym, w rzeczywistości ustanowione jako zasada 74 . Lecz czyż nigdy nie wytłumaczą nam tego słowa? Siła jest mocą fizyczną; nie widzę, jaka zasada moralna może wynikać z jej skutków. Ustępowanie przed siłą jest aktem konieczności, a nie woli; co najwyżej jest aktem rozsądku. W jakim znaczeniu miałoby to być obowiązkiem?"},{"type":"paragraph","text":"Przyjmijmy na chwilę to ciekawe prawo. Twierdzę, że stąd wynika pomieszanie nie do rozplątania. Skoro bowiem siła właśnie rodzi prawo, skutek zamienia się na przyczynę: każda siła biorąca górę nad pierwszą wstępuje w jej prawo. Skoro tylko można nie słuchać bezkarnie, można nie słuchać legalnie; i skoro zawsze silniejszy ma rację, należy starać się tylko o to, by być silniejszym. Otóż czymże jest prawo, które ginie z chwilą, kiedy zanika siła? Jeżeli trzeba słuchać pod przymusem, nie ma potrzeby słuchać z obowiązku, i kiedy nie jest się już zmuszonym do posłuchu, nie jest się doń już i obowiązanym. Widzimy więc, że to słowo: „prawo” niczego nie dodaje do siły: nie znaczy ono tutaj nic zgoła."},{"type":"paragraph","text":"Bądźcie posłuszni władzom. Jeśli to ma znaczyć: ustępujcie przed siłą, przykazanie jest dobre, ale zbędne; ręczę, że nigdy nie będzie gwałcone. Każda władza pochodzi od Boga — przyznaję; ale każda choroba także od Niego pochodzi: czyż stąd wynika, że nie wolno wezwać lekarza? 75 Przypuśćmy, że rozbójnik napadnie mnie w lesie: czyż nie tylko pod gwałtem trzeba oddać mu sakiewkę — czyż nadto, choćbym mógł ją ukryć, mam obowiązek sumienia oddać mu ją? Boć 76 w końcu pistolet, co go ma w ręku, jest także siłą."},{"type":"paragraph","text":"Zgódźmy się więc, że siła nie tworzy prawa i że ma się obowiązek posłuchu tylko wobec władz legalnych. Tak więc pierwotny mój problem powraca znowu 77 :"}]},{"id":"rozdział-iv-o-niewolnictwie","number":8,"title":"Rozdział IV. O niewolnictwie","blocks":[{"type":"paragraph","text":"Skoro żaden człowiek nie ma danej od natury władzy nad swoim bliźnim, i skoro siła nie rodzi żadnego prawa — pozostają więc tylko umowy jako podstawa wszelkiej legalnej władzy między ludźmi 78 ."},{"type":"paragraph","text":"Grotius mówi: Jeśli jednostka może pozbyć się swej wolności na rzecz drugiego i uczynić się niewolnikiem jakiegoś pana, dlaczegóż by cały naród nie mógł pozbyć się swej wolności i uczynić się poddanym jakiegoś króla? Jest tu wiele słów o niepewnym znaczeniu, które należałoby wyjaśnić; lecz zatrzymajmy się przy słowie „pozbyć się”. Pozbyć się na rzecz drugiego, znaczy darować lub sprzedać. Otóż człowiek czyniący się niewolnikiem drugiego nie darowuje się; sprzedaje się, przynajmniej za swe utrzymanie; ale dlaczego naród się sprzedaje? Król nie tylko, że nie dostarcza swoim poddanym ich środków utrzymania, ale sam od nich jedynie czerpie swoje; a według Rabelais’go 79 król nie z byle czego żyje. Poddani więc oddają swe osoby, z warunkiem, że zabrane im będzie także ich mienie? Nie widzę, co jeszcze pozostaje im do zachowania."},{"type":"paragraph","text":"Można by powiedzieć, że despota zapewnia swym poddanym spokój społeczny. Niechaj i tak będzie; ale cóż na tym zyskują, jeśli bardziej niż ich niezgody, wyniszczają ich wojny, jakie ściąga na nich jego ambicja, jego nienasycona chciwość, nadużycia jego rządu 80 . Cóż zyskują, jeśli ten spokój właśnie stanowi jedno z ich nieszczęść? Spokojnie żyje się także w więzieniu: czyż to wystarcza, by się w nim czuć dobrze? Grecy zamknięci w jaskini Cyklopa 81 żyli w spokoju, czekając każdy na swą kolej, kiedy zostanie pożarty."},{"type":"paragraph","text":"Mówić, że człowiek darowuje się za darmo, to mówić rzecz niedorzeczną i nie do pojęcia; taki akt jest bezprawny i nieważny, już przez to samo, że zawierający go nie jest przy zdrowych zmysłach. Mówić to samo o całym narodzie, znaczy przyjmować istnienie narodu szaleńców; szaleństwo nie rodzi prawa."},{"type":"paragraph","text":"Choćby każdy mógł oddać swą własną osobę na rzecz drugiego, nie może oddawać swych dzieci: rodzą się one ludźmi i wolnymi; wolność ich do nich należy, nikt prócz nich samych nie może nią rozporządzać. Zanim dojdą do wieku używania rozumu, ojciec może w ich imieniu umawiać warunki potrzebne dla zachowania ich przy życiu, dla ich dobrobytu, ale nie może darowywać ich nieodwołalnie i bezwarunkowo; dar taki bowiem przeciwny jest celom przyrody i przekracza prawa ojcostwa. Na to więc, by rząd samowładczy był legalny, trzeba, by w każdym pokoleniu naród mógł go przyjąć lub odrzucić; ale wówczas rząd ten nie byłby samowładczy."},{"type":"paragraph","text":"Zrzekać się wolności to zrzekać się godności człowieczej, praw ludzkich, nawet obowiązków. Nie ma odpłaty możliwej dla tego, kto się zrzeka wszystkiego. Takie zrzeczenie się nie zgadza się z naturą człowieka; i odjąć całkowicie wolność swej woli znaczy to odjąć całą moralność swym synom. Próżny wreszcie i wewnętrznie sprzeczny jest taki układ, gdzie umowa oznacza dla jednej ze stron władzę absolutną, a dla drugiej nieograniczone posłuszeństwo. Czyż nie jest rzeczą jasną, że do niczego nie jest się zobowiązanym wobec tego, od którego ma się prawo żądać wszystkiego? I ten jedyny warunek, bez równowartości, bez wzajemności, czyż nie pociąga za sobą nieważności aktu? Jakież bowiem prawo wobec mnie miałby mój niewolnik, skoro wszystko, co posiada, należy do mnie, i skoro, wobec tego, że jego prawo jest moim prawem, to prawo moje wobec mnie samego jest słowem bez żadnego sensu?"},{"type":"paragraph","text":"Grotius i inni wyprowadzają z wojny inny początek rzekomego prawa niewolnictwa. Ponieważ — wedle ich zdania — zwycięzca ma prawo zabić zwyciężonego, ten ostatni może okupić życie kosztem wolności; układ tym bardziej legalny, że wychodzi na korzyść obydwu."},{"type":"paragraph","text":"Ale jest rzeczą jasną, że to rzekome prawo zabijania zwyciężonych w żadnej mierze nie wynika ze stanu wojny. Już przez to samo, że ludzie, żyjący w pierwotnej niezawisłości, nie mają ze sobą stosunków dość stałych, które mogłyby stanowić stan pokoju czy wojny, nie są z natury wrogami. Wojnę wytwarzają stosunki wzajemne rzeczy, a nie ludzi; a ponieważ stan wojny nie może zrodzić się z prostych osobistych stosunków, lecz tylko ze stosunków rzeczowych — wojna prywatna albo wojna człowieka z człowiekiem nie może mieć miejsca ani w stanie natury, w którym nie ma wcale stałej własności, ani w stanie społecznym, w którym wszystko podlega władzy praw."},{"type":"paragraph","text":"Walki poszczególne, pojedynki, spotkania są działaniami, które wcale nie tworzą stanu; co się zaś tyczy wojen prywatnych, dozwolonych przez Urządzenia Ludwika IX, króla francuskiego 82 , a które ustały na skutek pokoju Bożego 83 , to są to nadużycia rządu feudalnego, będącego systemem do gruntu niedorzecznym, przeciwnym zasadom prawa naturalnego i wszelkiej dobrej organizacji politycznej."},{"type":"paragraph","text":"Wojna nie jest więc wcale stosunkiem człowieka do człowieka, lecz jest stosunkiem państwa do państwa, stosunkiem, w którym jednostki są nieprzyjaciółmi jedynie przypadkowo, nie jako ludzie ani jako obywatele 84 , ale jako żołnierze; nie jako członkowie ojczyzny, ale jako jej obrońcy. Każde państwo w końcu może mieć za nieprzyjaciół tylko inne państwa, a nie ludzi, skoro między przedmiotami różnej natury nie można ustalić żadnego prawdziwego stosunku."},{"type":"paragraph","text":"Ta zasada jest nawet zgodna z regułami przyjętymi we wszystkich czasach, i ze stałą praktyką wszystkich uspołecznionych ludów. Wypowiedzenia wojny są ostrzeżeniami skierowanymi nie tyle do monarchów, ile do ich poddanych. Obcy, czy to król, czy obywatel, czy naród, który kradnie, zabija lub więzi poddanych bez wypowiedzenia wojny panującemu, nie jest nieprzyjacielem, jest rozbójnikiem. Nawet gdy wojna wre, sprawiedliwy władca zajmuje w nieprzyjacielskim kraju wszystko, co stanowi własność publiczną, ale szanuje osoby prywatne i ich mienie; szanuje prawa, na których opierają się jego prawa. Skoro celem wojny jest zniszczenie państwa nieprzyjacielskiego, ma się prawo zabijać obrońców, dopóki mają broń w ręku; ale kiedy składają broń i poddają się, przestają być nieprzyjaciółmi, względnie narzędziami nieprzyjaciela, z powrotem stają się po prostu ludźmi i od tej chwili nie ma się już prawa nad ich życiem. Niekiedy można zabić państwo, nie zabijając ani jednego z jego członków; otóż wojna nie daje żadnego prawa, które by nie było konieczne dla jej celu. Te zasady nie są zasadami Grotiusa, nie gruntują się one na autorytecie poetów, wypływają jednak z natury rzeczy i gruntują się na rozumie 85 ."},{"type":"paragraph","text":"Co się tyczy prawa podboju, nie ma ono innej podstawy, jak tylko prawo silniejszego. Jeśli wojna nie daje zwycięzcy prawa wytępiania pokonanych narodów, prawo to, którego nie posiada, nie może uzasadniać prawa obracania ich w niewolników. Ma się prawo zabić nieprzyjaciela jedynie wówczas, gdy nie można uczynić go niewolnikiem; prawo uczynienia go niewolnikiem nie wywodzi się więc z prawa zabicia go: handel to zatem niesłuszny kazać mu kupować życie za cenę wolności, skoro się nie ma żadnego prawa do jego życia. Czyż nie jest jasne, że wpada się w błędne koło, kiedy prawo życia i śmierci uzasadnia się prawem niewolnictwa, a prawo niewolnictwa prawem życia i śmierci?"},{"type":"paragraph","text":"Przyjmując nawet to straszliwe prawo zabijania wszystkiego, twierdzę, że niewolnik wzięty podczas wojny, względnie naród podbity, nie ma wobec swojego pana żadnych zgoła obowiązków, jak tylko być mu posłusznym, o tyle, o ile jest do tego zmuszony. Zwycięzca, biorąc równowartość jego życia, wcale mu go nie darował: zamiast zabić go bezowocnie, zabił go z pożytkiem dla siebie. Bynajmniej więc nie nabył nad nim jakiejś władzy, która by łączyła się z siłą — stan wojenny nadal trwa między nimi, jak przedtem; stosunek ich sam jest następstwem tego stanu, a wykonywanie prawa wojny nie pozwala przypuścić żadnego traktatu pokoju. Zawarli umowę, zgoda; umowa ta jednak nie znosi bynajmniej stanu wojny, każe przyjąć dalsze jego trwanie."},{"type":"paragraph","text":"Tak więc, z którejkolwiek strony spojrzymy na rzeczy, prawo niewoli nie istnieje, nie tylko dlatego, że jest niesłuszne, ale dlatego, że jest niedorzeczne i że nic nie znaczy. Słowa „niewola” i „prawo” są w stosunku do siebie sprzeczne; wyłączają się wzajemnie. Czy to wypowiedziane przez człowieka do człowieka, czy też przez człowieka do narodu, nigdy zarówno nie będą miały sensu te słowa: „Zawieram z tobą umowę, która w całości obciąża ciebie, mnie zaś daje same korzyści — umowę, której będę dotrzymywał, dopóki sam zechcę, a którą ty będziesz wypełniał, dopóki ja zechcę” 86 ."}]},{"id":"rozdział-v-trzeba-zawsze-sięgać-do-pierwotnej-umowy","number":9,"title":"Rozdział V. Trzeba zawsze sięgać do pierwotnej umowy","blocks":[{"type":"paragraph","text":"Gdybym zgodził się nawet na to wszystko, co dotychczas odparłem, i tak jeszcze poplecznicy despotyzmu niewiele zyskaliby na tym. Będzie zawsze wielka różnica między poddaniem sobie tłumu a rządzeniem społeczeństwem. Że rozproszonych ludzi, w jakiejbykolwiek byli liczbie, opanuje po kolei jakaś jednostka — widzę w tym pana i niewolników, nie widzę narodu i jej naczelnika; jest to, jeśli się chce tak określić, zbiorowisko, ale nie jest stowarzyszenie; nie ma w tym ani dobra publicznego, ani ciała politycznego. Chociażby człowiek jakiś poddał sobie nawet połowę świata, byłby zawsze tylko poszczególną jednostką; jego interes, oddzielony od interesu innych, zawsze jest tylko interesem prywatnym. Gdy ten człowiek zginie, władztwo jego zostaje po nim rozproszone i niezwiązane, tak jak dąb ogniem strawiony, rozsypuje się i przemienia w garść popiołów 87 ."},{"type":"paragraph","text":"Grotius mówi, że naród może się oddać królowi. Według Grotiusa zatem naród jest narodem, zanim się odda królowi. Samo to oddanie się jest aktem społecznym; wymaga publicznych obrad. Przed zbadaniem więc aktu, za pomocą którego naród wybiera króla, dobrze byłoby zbadać akt, za pomocą którego naród staje się narodem; ten akt bowiem, poprzedzający koniecznie ów drugi, stanowi prawdziwy fundament społeczeństwa 88 ."},{"type":"paragraph","text":"Istotnie, gdyby nie było poprzedniej umowy, na czymże opierałby się obowiązek mniejszości, by poddać się wyborowi większości, o ile wybór nie był jednomyślny? I skąd stu ludzi, którzy chcą mieć pana, ma prawo głosować za dziesięciu, którzy go nie chcą? Samo prawo większości głosów jest urządzeniem opartym na umowie i każe przypuszczać, że raz przynajmniej istniała jednomyślność."}]},{"id":"rozdział-vi-o-układzie-społecznym","number":10,"title":"Rozdział VI. O układzie społecznym","blocks":[{"type":"paragraph","text":"Przyjmuję 89 , że ludzie doszli do tego punktu, w którym przeszkody zagrażające ich utrzymaniu się przy życiu w stanie natury przewyższają stawianym przez siebie oporem te siły, jakie każda poszczególna jednostka może obrócić na to, by pozostać w tym stanie. Wówczas ten stan pierwotny nie może się dłużej utrzymać; i rodzaj ludzki zginąłby, gdyby nie zmienił sposobu życia."},{"type":"paragraph","text":"Otóż, skoro ludzie nie mogą stworzyć nowych sił, lecz mogą jedynie siły już istniejące zjednoczyć i nimi kierować, przeto 90 nie mają innego środka, by zachować się przy życiu, jak tylko utworzyć przez zrzeszenie się sumę sił, która by przewyższała ów opór, wprawić te siły w ruch jakąś jedną przyczyną i kazać im zgodnie działać."},{"type":"paragraph","text":"Tę sumę sił może wytworzyć tylko współdziałanie wielu; gdy jednak siła i wolność każdego człowieka są pierwszymi narzędziami jego zachowania się przy życiu, jakoż 91 odda je bez szkody dla siebie i bez zaniedbania tego, co winien jest samemu sobie? Tę trudność, sprowadziwszy do mego przedmiotu, można wyrazić w następujących słowach:"},{"type":"paragraph","text":"„Wynaleźć taką formę stowarzyszenia, która by broniła i chroniła osobę i dobra każdego stowarzyszonego za pomocą całej wspólnej siły, a w której to formie każdy, jednocząc się ze wszystkimi, słuchałby jednak samego siebie i był tak samo wolny jak przedtem” 92 . Takie jest zagadnienie podstawowe, którego rozwiązanie przynosi Umowa społeczna 93 ."},{"type":"paragraph","text":"Sama natura aktu do tego stopnia określa z góry klauzule tej umowy, że najmniejsza zmiana spowodowałaby ich nieważność i bezskuteczność: tak, że aczkolwiek może nigdy formalnie nie były wypowiedziane, wszędzie są te same, wszędzie milcząco przyjęte i uznane dopóty, dopóki w razie pogwałcenia układu społecznego każdy nie wstąpi z powrotem w pierwotne swoje prawa i nie odzyska wolności naturalnej, tracąc wolność umowną, dla której zrzekł się tamtej 94 ."},{"type":"paragraph","text":"Klauzule te, dobrze zrozumiane, sprowadzają się wszystkie do jednej, mianowicie: całkowite oddanie się każdego stowarzyszonego ze wszystkimi swymi prawami całej wspólnocie. Po pierwsze bowiem, gdy każdy całkowicie się oddaje, warunek jest równy dla wszystkich; a gdy warunek jest równy dla wszystkich, nikt nie ma interesu w tym, by stał się uciążliwy dla innych."},{"type":"paragraph","text":"Po wtóre, skoro oddanie się następuje bez zastrzeżeń, zjednoczenie jest możliwie najzupełniejsze i nikt ze stowarzyszonych nie może już wysuwać żadnych specjalnych żądań: gdyby bowiem jednostki poszczególne zatrzymały jakieś prawa, to wobec braku jakiegoś wspólnego zwierzchnika, który by mógł rozstrzygać pomiędzy nimi a ogółem, każdy, sam będąc co do pewnych punktów własnym swym sędzią, wkrótce chciałby nim być we wszystkim; stan natury trwałby nadal, a stowarzyszenie z konieczności stałoby się tyrańskie lub bezskuteczne."},{"type":"paragraph","text":"W końcu, gdy każdy oddaje się wszystkim, nie oddaje się nikomu; i skoro nad każdym ze stowarzyszonych nabywa się to samo prawo, które mu się oddaje nad sobą — zyskuje się równowartość wszystkiego, co się traci, i więcej siły do zachowania tego, co się ma 95 ."},{"type":"paragraph","text":"Jeśli więc usuniemy z układu społecznego to wszystko, co nie należy do jego istoty, spostrzeżemy, że ogranicza się on do następujących słów: Każdy z nas oddaje wspólnocie osobę swą i całą moc swoją pod najwyższe kierownictwo woli powszechnej 96 — a my wszyscy przyjmujemy społem 97 każdego członka, jako nieoddzielną część całości ."},{"type":"paragraph","text":"Ten akt stowarzyszenia natychmiast wytwarza w miejsce poszczególnej osoby każdego kontrahenta ciało moralne i zbiorowe, złożone z tylu członków, ilu głosowało w zgromadzeniu, a ciało to otrzymuje z mocy tego samego aktu swą jedność, swoją osobowość zbiorową, swe życie i swą wolę 98 . Ta osoba publiczna, utworzona w ten sposób przez zjednoczenie się wszystkich poszczególnych osób, nazywała się dawniej cité 99 , dzisiaj zaś nazywa się republiką lub ciałem politycznym , które członkowie jego mianują państwem , gdy jest bierne, zwierzchnikiem , gdy jest czynne, mocarstwem , gdy je porównują do podobnych mu tworów. Co się tyczy członków, przybierają oni w odniesieniu do stowarzyszonych wspólne miano narodu, a pojedynczo mienią się obywatelami , jako uczestniczący we władzy zwierzchniej, poddanymi zaś, jako podlegający prawom państwa. Terminy te jednak często mieszają się i są brane jedne za drugie; wystarczy umieć je rozróżniać wówczas, gdy są użyte w całej swej ścisłości."}]},{"id":"rozdział-vii-o-zwierzchniku","number":11,"title":"Rozdział VII. O zwierzchniku","blocks":[{"type":"paragraph","text":"Z formuły układu społecznego widać, że akt stowarzyszenia zawiera wzajemne zobowiązanie się ogółu i poszczególnych jednostek i że każda jednostka, zawierając, że tak się wyrażę, umowę sama z sobą, zostaje zobowiązana w dwojaki sposób: mianowicie, jako członek władzy zwierzchniej wobec poszczególnych jednostek oraz jako członek państwa wobec władzy zwierzchniej. Nie można tu jednak stosować zasady prawa cywilnego, że nikogo nie wiąże zobowiązanie zaciągnięte wobec samego siebie; zachodzi bowiem wielka różnica między zobowiązaniem się wobec siebie samego a wobec jakiejś całości, w której skład się wchodzi."},{"type":"paragraph","text":"Należy jeszcze zauważyć, że uchwała publiczna, która może zobowiązać wszystkich poddanych wobec zwierzchnika, ponieważ każdego z nich bierze się jako występującego w dwóch różnych stosunkach — nie może, z przeciwnego względu, zobowiązywać zwierzchnika wobec samego siebie — i że wskutek tego jest rzeczą sprzeczną z naturą ciała politycznego, by zwierzchnik nakładał na siebie prawo, którego by nie mógł przekroczyć. Ponieważ może on być rozpatrywany tylko jako występujący w jednym i tym samym stosunku, znajduje się przeto w położeniu osoby zawierającej umowę sama z sobą; z czego wynika, że nie ma i być nie może żadnego rodzaju prawa podstawowego, obowiązującego ciało narodu, że prawem takim nie jest nawet umowa społeczna 100 . Nie znaczy to, by to ciało nie mogło zobowiązać się wobec kogoś drugiego do czegoś, co nie sprzeciwia się tej umowie; w stosunku bowiem do zagranicy staje się istotą prostą, jednostką."},{"type":"paragraph","text":"Ciało jednak polityczne, czyli zwierzchnik, wyprowadzając swe istnienie tylko ze świętości umowy, nie może nigdy zobowiązać się, nawet wobec drugiego, do niczego, co by sprzeciwiało się temu pierwotnemu aktowi, jak np. do pozbycia się jakiejś części samego siebie albo do poddania się innemu zwierzchnikowi. Pogwałcenie aktu, przez który istnieje, byłoby unicestwieniem się; a coś, co jest niczym, nie wytwarza niczego 101 ."},{"type":"paragraph","text":"Z chwilą, gdy tłum zjednoczył się w ten sposób w jedno ciało, nikt nie może obrazić jednego z członków bez obrażenia tym samym całego ciała, ani tym mniej, obrazić ciała bez tego, by się to nie dało odczuć członkom. Tak więc zarówno i obowiązek, i interes każą obydwu umawiającym się stronom pomagać sobie nawzajem; i ci sami ludzie powinni się starać połączyć pod tym dwojakim względem wszystkie zależne od niego korzyści 102 ."},{"type":"paragraph","text":"Otóż zwierzchnik, złożony jedynie z jednostek, które go tworzą, nie ma i mieć nie może interesu sprzecznego z ich interesem; wobec tego władza zwierzchnicza nie potrzebuje wcale dawać rękojmi poddanym, jest bowiem niemożliwe, żeby ciało chciało szkodzić wszystkim swym członkom; w dalszym zaś ciągu zobaczymy, że żadnemu w szczególności szkodzić nie może. Zwierzchnik, przez to samo, że jest, jest zawsze tym, czym być powinien 103 ."},{"type":"paragraph","text":"Inaczej jednak ma się rzecz odnośnie do poddanych w stosunku do zwierzchnika; pomimo wspólności interesu nic by zwierzchnikowi nie gwarantowało, że dotrzymają zobowiązań, gdyby nie znalazł środków zapewnienia sobie ich wierności."},{"type":"paragraph","text":"W istocie, każda jednostka może, jako człowiek, mieć wolę osobistą przeciwną lub różną od woli powszechnej, którą ma jako obywatel. Interes prywatny może doń całkiem inaczej przemawiać niż interes wspólny; jego istota, absolutna i z natury niezawisła, może kazać mu uważać to, co winien wspólnej sprawie, za świadczenie darmowe, którego utrata nie byłaby dla innych szkodą tak wielką, jak wielkim jest dlań ciężarem spełnienie go; i uważając osobę moralną, stanowiącą państwo, za istotę idealną 104 , dlatego że nie jest ono człowiekiem, korzystałby z praw obywatela, nie chcąc wypełniać obowiązków poddanego — niesprawiedliwość, która w razie wzrostu spowodowałaby ruinę ciała politycznego."},{"type":"paragraph","text":"By nie być więc czczym formularzem, układ społeczny zawiera milczące zobowiązanie, które samo jedno zdolne jest dać moc innym zobowiązaniom, a mianowicie, że ktokolwiek odmówi woli powszechnej posłuszeństwa, będzie do niego zmuszony przez całe ciało: co nic innego nie znaczy, jak, że zmusi się go do tego, iżby był wolny 105 ; taki bowiem jest warunek, który, oddając każdego obywatela ojczyźnie, zabezpiecza go przed wszelką osobistą zależnością — warunek stanowiący sztukę i zasadę funkcjonowania machiny politycznej; on sam jeden czyni słusznymi zobowiązania społeczne, które bez tego byłyby niedorzeczne, tyrańskie i narażone na najstraszniejsze nadużycia 106 ."}]},{"id":"rozdział-viii-o-stanie-społecznym","number":12,"title":"Rozdział VIII. O stanie społecznym","blocks":[{"type":"paragraph","text":"To przejście ze stanu natury do stanu społecznego wywołuje w człowieku bardzo znaczną zmianę, wprowadzając w postępowaniu jego sprawiedliwość w miejsce instynktu i nadając czynom jego moralność, której im przedtem brakło 107 . Wówczas to dopiero — gdy głos obowiązku wstępuje w miejsce fizycznego popędu, prawo zaś w miejsce żądzy — wówczas dopiero człowiek, dotychczas zważający tylko na siebie samego, widzi się zmuszonym do działania według innych zasad i do radzenia się rozumu, zanim posłucha swych skłonności. Aczkolwiek w stanie tym pozbawia się pewnych korzyści, które mu daje natura, zyskuje ich tak wiele, zdolności jego do tego stopnia ćwiczą i rozwijają się, myśli rozszerzają, uczucia uszlachetniają, dusza jego cała podnosi się, że gdyby nadużycia tego nowego stanu nie upadlały go często poniżej stanu, z którego wyszedł, powinien by ustawicznie błogosławić chwilę szczęśliwą, która go zeń na zawsze wyrwała i która ze zwierzęcia głupiego i ograniczonego stworzyła istotę rozumną i człowieka."},{"type":"paragraph","text":"Sprowadźmy całe to odważanie strat i korzyści do terminów, które łatwo można z sobą porównać. Człowiek traci przez umowę społeczną swą wolność przyrodzoną i nieograniczone prawo 108 do wszystkiego, co go nęci i co może osiągnąć; zyskuje wolność społeczną i własność wszystkiego, co posiada 109 . By nie pomylić się w tych stratach i zyskach, trzeba należycie odróżnić wolność przyrodzoną, mającą granice jedynie w siłach własnych jednostki, od wolności społecznej, ograniczonej przez wolę powszechną; oraz posiadanie, będące jedynie skutkiem siły, względnie prawem pierwszego zawłaszczającego, od własności, która może się gruntować jedynie na pozytywnym tytule 110 ."},{"type":"paragraph","text":"Do tego, co powyżej, można by jeszcze dodać na dobro stanu społecznego wolność moralną, która sama jedna czyni człowieka naprawdę panem samego siebie; wyłączny bowiem impuls żądzy jest niewolą, a posłuszeństwo prawu, które się samemu sobie przepisało, jest wolnością. Ale dość już długo zatrzymałem się na tym przedmiocie, a znaczenie filozoficzne słowa „wolność” nie wchodzi tutaj w zakres mojego tematu."}]},{"id":"rozdział-ix-o-władzy-na-rzeczach","number":13,"title":"Rozdział IX. O władzy na rzeczach","blocks":[{"type":"paragraph","text":"W chwili tworzenia się wspólnoty każdy z jej członków oddaje się jej, taki jaki jest obecnie, siebie i wszystkie swe siły, których część tworzą dobra, jakie posiada 111 . Nie znaczy to, że posiadanie na skutek tego aktu zmienia charakter, przechodząc do innych rąk, i że staje się własnością w rękach zwierzchnika; ale gdy siły ciała politycznego są bez porównania większe niż siły jednostki, także i posiadanie publiczne jest faktycznie silniejsze i bardziej nieodwołalne, nie będąc bardziej legalne, przynajmniej wobec cudzoziemców. Państwo bowiem odnośnie do swych członków jest panem wszystkich ich dóbr na mocy umowy społecznej, stanowiącej w państwie podstawę wszelkich praw; odnośnie jednak do innych mocarstw jest tym panem jedynie na zasadzie prawa pierwszego zawłaszczającego, jakie otrzymało od poszczególnych jednostek 112 ."},{"type":"paragraph","text":"Prawo pierwszego zawłaszczającego, aczkolwiek bardziej rzeczywiste niż prawo silniejszego, staje się prawdziwym prawem dopiero po ustanowieniu prawa własności. Każdy człowiek ma z przyrodzenia prawo do wszystkiego, co dlań jest niezbędne; akt pozytywny jednak, na mocy którego staje się właścicielem jakiegoś dobra, sprawia, że zostaje on wykluczony od całej reszty. Otrzymawszy swoją część, winien się do niej ograniczyć, i nie ma już żadnego prawa do wspólnoty. Oto dlaczego prawo pierwszego zawłaszczającego, tak słabe w stanie natury, szanuje każdy człowiek uspołeczniony. Szanuje on w tym prawie nie tyle to, co należy do drugiego, ile to, co nie należy do niego 113 ."},{"type":"paragraph","text":"Na ogół trzeba następujących warunków do powstania na jakimkolwiek terenie prawa pierwszego zawłaszczającego: po pierwsze, by na terenie tym nikt jeszcze nie mieszkał; po drugie, by zajęto z niego jedynie ilość potrzebną do utrzymania się; po trzecie, by objęto go w posiadanie nie za pomocą próżnej ceremonii, lecz przez pracę i uprawę, jedyny znak własności, który w braku sądowych tytułów winien być przez innych szanowany."},{"type":"paragraph","text":"Zaiste, czyż przyznawać potrzebie i pracy prawo pierwszego zawłaszczającego nie znaczy rozciągać je tak daleko, jak tylko sięgnąć jest zdolne? Czyż można prawu temu nie zakreślić granic? Czyżby wystarczało postawić nogę na wspólnym terenie, by się zaraz podawać za jego pana? Czyżby wystarczało mieć siłę odsunięcia na chwilę od niego innych ludzi, by odjąć im na zawsze prawo wrócenia nań? Jakoż człowiek jakiś lub naród może opanować olbrzymie terytorium i cały ród ludzki terytorium tego pozbawić, jeśli nie przez przywłaszczenie karygodne, skoro odbiera reszcie ludzi miejsce pobytu i środki żywności, które wspólnie natura im daje? Gdy Nunez Balboa brał na wybrzeżu w posiadanie Morze Południowe i całą Południową Amerykę w imieniu kastylskiej korony 114 , czyż to wystarczyło do wywłaszczenia wszystkich mieszkańców i wyłączenia wszystkich władców świata? Tym trybem ceremonie takie mnożyły się dość bezskutecznie, a król katolicki mógł bez dalszego trudu ze swego gabinetu objąć naraz w posiadanie cały świat, z małym zastrzeżeniem, że później wykroi ze swego cesarstwa to, co przedtem inni władcy posiadali."},{"type":"paragraph","text":"Łatwo pojąć, w jaki sposób ziemie osób poszczególnych, połączone i stykające się z sobą, stają się terytorium publicznym, i w jaki sposób prawo zwierzchnictwa, rozciągając się z poddanych na zajmowane przez nich ziemie, staje się równocześnie rzeczowe i osobowe; co oddaje posiadaczy w większą zależność, a ich własną siłę czyni rękojmią ich wierności; korzyść, którą, zdaje się, niezbyt dobrze czuli dawni monarchowie, co mianując się jedynie królami Persów, Scytów, Macedończyków, zdali się uważać siebie raczej za naczelników ludzi niż za panów kraju. Dzisiejsi monarchowie zręczniej mianują się królami Francji, Hiszpanii, Anglii itd.; trzymając w ten sposób ziemię, pewni są, że trzymają i jej mieszkańców."},{"type":"paragraph","text":"Co jest szczególne w tym przeniesieniu, to to, że wspólnota, przyjmując dobra poszczególnych osób, nie tylko im ich nie odbiera, lecz przeciwnie, zapewnia im legalne ich posiadanie; zamienia przywłaszczenie w prawdziwe prawo, a używanie we własność. Wówczas posiadacze — skoro uważa się ich za depozytariuszy dobra publicznego, skoro wszyscy członkowie państwa szanują ich prawa i gdy państwo broni ich praw wszystkimi siłami przeciw cudzoziemcowi — wówczas posiadacze przez cesję korzystną dla ogółu, a jeszcze bardziej dla nich samych, nabyli, że się tak wyrażę, wszystko, co oddali: paradoks tłumaczy się łatwo przez rozróżnienie praw, jakie zwierzchnik i właściciel mają do tego samego gruntu, jak to się poniżej okaże 115 ."},{"type":"paragraph","text":"Może się także zdarzyć, że ludzie zaczynają się jednoczyć, zanim jeszcze cośkolwiek posiadają, i że opanowując później ziemię, która wystarcza dla wszystkich, wspólnie z niej korzystają lub dzielą ją między siebie, bądź równo, bądź według stosunku ustalonego przez zwierzchnika. W jakikolwiek sposób następuje to nabycie, prawo, jakie każdy poszczególny ma na swym własnym gruncie, zawsze jest podporządkowane prawu, jakie ma wspólnota na wszystkich gruntach: bez czego ani związek społeczny nie miałby trwałości, ani wykonywanie zwierzchnictwa nie miałoby rzeczywistej siły."},{"type":"paragraph","text":"Zakończę ten rozdział i tę księgę uwagą, która powinna służyć za podstawę całego systemu społecznego: mianowicie, że zamiast niszczyć równość naturalną, układ podstawowy zgoła przeciwnie, wprowadza równość moralną i prawną w miejsce tego, co z nierówności fizycznej mogła natura wprowadzić między ludzi, i że ludzie, jakkolwiek mogą być nierówni siłą i geniuszem 116 , stają się wszyscy równi na mocy umowy i prawa 117 ."}]},{"id":"księga-druga","number":14,"title":"Księga druga","blocks":[]},{"id":"rozdział-i-o-niepozbywalności-zwierzchnictwa-118","number":15,"title":"Rozdział I. O niepozbywalności zwierzchnictwa 118","blocks":[{"type":"paragraph","text":"Pierwsza i najważniejszą konsekwencją zasad powyżej ustalonych jest, że tylko wola powszechna może kierować siłami państwa stosownie do celu jego ustanowienia, którym jest wspólne dobro; jeżeli bowiem sprzeczność poszczególnych interesów wywołała konieczność ustanowienia społeczeństw, to umożliwiło je uzgodnienie tych samych interesów. To, co jest wspólne tym różnym interesom, tworzy węzeł społeczny; i gdyby nie było jakiegoś punktu, w którym wszystkie interesy się godzą, nie mogłoby istnieć żadne społeczeństwo. Otóż jedynie według tego wspólnego interesu winno się rządzić społeczeństwem."},{"type":"paragraph","text":"Twierdzę więc, że zwierzchnictwo, będąc jedynie sprawowaniem woli powszechnej, nie może być nigdy zbyte, i że zwierzchnika, będącego istotą zbiorową, nie może przedstawiać nikt inny, jak tylko on sam: władza może być przeniesiona, ale nie wola."},{"type":"paragraph","text":"W istocie, o ile nie jest możliwą rzeczą, by jakaś wola szczególna zgadzała się w pewnych punktach z wolą powszechną — jest przynajmniej możliwe, by zgoda ta była trwała i stała; wola szczególna bowiem zmierza z natury swojej do uprzywilejowań, wola powszechna zaś do równości. Bardziej jest jeszcze niemożliwą rzeczą uzyskać jakieś zabezpieczenie tej zgodności; choćby nawet zawsze miała się utrzymać, nie byłoby to wynikiem sztuki, lecz przypadku. Zwierzchnik może doskonale powiedzieć: „Obecnie chcę tego, czego chce ten człowiek, a przynajmniej co mówi, że chce”; nie może jednak powiedzieć: „Czego ten człowiek będzie chciał jutro, ja też będę chciał”; jest bowiem rzeczą niedorzeczną, by wola narzucała sobie okowy na przyszłość, a żadna wola nie może zgodzić się na cokolwiek, co jest sprzeczne z dobrem istoty chcącej. Jeśli więc naród przyrzeka po prostu posłuszeństwo, aktem tym rozwiązuje się, traci swój charakter narodu; z chwilą gdy istnieje pan, nie masz 119 już zwierzchnika, i ciało polityczne ulega zniszczeniu 120 ."},{"type":"paragraph","text":"Nie znaczy to, by rozkazy naczelników nie mogły uchodzić za wyrazy woli powszechnej, dopóki zwierzchnik, mając wolność przeciwstawienia się im, nie czyni tego. W podobnym wypadku z powszechnego milczenia można wnosić o zgodzie narodu. Wytłumaczę to jeszcze obszerniej 121 ."}]},{"id":"rozdział-ii-o-niepodzielności-zwierzchnictwa","number":16,"title":"Rozdział II. O niepodzielności zwierzchnictwa","blocks":[{"type":"paragraph","text":"Z tego samego powodu, dla którego zwierzchnictwo jest nieprzenaszalne, jest ono niepodzielne; wola bowiem jest powszechna 122 lub nie jest: jest wolą narodu w całości lub tylko wolą jego części. W pierwszym wypadku oświadczenie tej woli jest aktem zwierzchniczym i tworzy prawo; w drugim jest tylko wolą szczególną, względnie aktem wykonawczym; co najwyżej jest rozporządzeniem 123 ."},{"type":"paragraph","text":"Politycy nasi jednak, nie mogąc podzielić zwierzchnictwa w jego zasadzie, dzielą je w jego podmiocie: dzielą je na siłę i na wolę; na władzę prawodawczą i na władzę wykonawczą; na prawa podatków, sprawiedliwości i wojny; na administrację wewnętrzną i na władzę zawierania traktatów z zagranicą: raz mieszają z sobą wszystkie te działy, to znów je rozdzielają; robią ze zwierzchnika istotę fantastyczną i pozszywaną z najrozmaitszych części, tak zupełnie, jakby tworzyli człowieka o kilku ciałach, z których jedno miałoby oczy, drugie ramiona, inne znów nogi, i nic więcej. Mówią, że szarlatani japońscy ćwiartują dziecko w oczach widzów; następnie zaś, rzucając w powietrze wszystkie jego członki jeden po drugim, sprawiają, że dziecko spada z powrotem żywe i całe. Takie są mniej więcej sztuczki kuglarskie naszych polityków; rozczłonkowawszy ciało społeczne sztuką czarnoksięską godną jarmarku, łączą części z powrotem, nie wiadomo w jaki sposób 124 ."},{"type":"paragraph","text":"Błąd ten wynika z braku dokładnego pojęcia władzy zwierzchniej i stąd, że za części tej władzy wzięło się to, co jest tylko jej emanacją. Tak na przykład uważano akt wypowiedzenia wojny i akt zawarcia pokoju za akty zwierzchnicze; a tak przecież nie jest, skoro żaden z tych aktów nie jest prawem, lecz jedynie jest zastosowaniem prawa, aktem szczegółowym, stwarzającym sytuację konkretną określoną w prawie, jak się to jasno okaże, kiedy zostanie ustalone pojęcie związane ze słowem „prawo” 125 ."},{"type":"paragraph","text":"Badając w ten sposób inne podziały władzy, przekonalibyśmy się, że się mylimy we wszystkich wypadkach, w których mniemamy widzieć zwierzchnictwo podzielone, że prawa, które się bierze za części tego zwierzchnictwa, są wszystkie jemu podporządkowane i zawsze każą przyjąć wole wyższe, których same są tylko wykonaniem."},{"type":"paragraph","text":"Trudno wyrazić, do jakiego stopnia ten brak ścisłości zaciemnił sąd autorów piszących w przedmiocie prawa politycznego, gdy za pomocą ustalonych przez siebie zasad chcieli ocenić wzajemne prawa królów i narodów. Każdy może widzieć w rozdziałach III i IV pierwszej księgi Grotiusa, jak ten uczony, człowiek i jego tłumacz Barbeyrac 126 gmatwają się, plączą w sofizmatach 127 , bojąc się powiedzieć za wiele lub za mało stosownie do swych zamiarów i obrazić interesy, które mieli pogodzić. Grotius, schroniwszy się do Francji, niezadowolony ze swej ojczyzny, chcąc przypodobać się Ludwikowi XIII 128 , któremu poświęcił swą książkę, nie oszczędza niczego, by z całą możliwą sztuką pozbawić narody wszystkich ich praw i przyoblec w nie królów. Przypadłoby to było także do smaku Barbeyracowi, który poświęcił swój przekład angielskiemu królowi Jerzemu I 129 . Na nieszczęście jednak wypędzenie Jakuba II 130 , które nazywa abdykacją, zmusiło go do trzymania się w rezerwie, do wymijań, do wykrętów, by nie zrobić z Wilhelma 131 uzurpatora. Gdyby ci dwaj pisarze byli przyjęli 132 prawdziwe zasady, wszystkie trudności byłyby znikły i byliby, zawsze pozostali konsekwentni, lecz powiedzieliby nieefektownie prawdę i staraliby się przypodobać tylko narodowi. Otóż prawda nie wiedzie do fortuny, a naród nie rozdaje ani ambasad, ani katedr, ani pensji."}]},{"id":"rozdział-iii-czy-wola-powszechna-może-błądzić","number":17,"title":"Rozdział III. Czy wola powszechna może błądzić","blocks":[{"type":"paragraph","text":"Z powyższego wynika, że wola powszechna jest zawsze prosta i zawsze zmierza do publicznego pożytku; ale nie wynika, iżby obrady narodu miały zawsze taką samą trafną prostotę. Zawsze pragnie się swego dobra, lecz nie zawsze się je widzi; nigdy się nie przekupuje narodu, często jednak oszukuje się go, i wówczas pozornie jedynie naród chce czegoś, co jest złem 133 ."},{"type":"paragraph","text":"Często zachodzi znaczna różnica pomiędzy wolą wszystkich a wolą powszechną; ta baczy wyłącznie na wspólny interes; tamta baczy na interes prywatny i jest tylko sumą poszczególnych woli; lecz jeżeli się odtrąci od tych samych woli te plus i minus, które się wzajemnie znoszą 134 , zostanie jako suma różnic wola powszechna 135 ."},{"type":"paragraph","text":"Jeżeliby obywatele — gdy naród obraduje, będąc dostatecznie pouczonym — nie komunikowali się zupełnie między sobą, z wielkiej liczby małych różnic wynikałaby zawsze wola powszechna, a uchwała zawsze byłaby dobra. Gdy jednak tworzą się partyjne umowy, częściowe związki kosztem wielkiego związku, wola każdego z tych związków staje się powszechna w stosunku do jego członków, szczególna zaś w stosunku do państwa; można wówczas powiedzieć, że nie ma już tylu głosujących, ilu jest ludzi, lecz jest ich jedynie tyle, ile jest związków. Różnice stają się mniej liczne i dają wynik mniej powszechny. Jeśli wreszcie jeden z tych związków wielkością swą przewyższa wszystkie inne, nie otrzyma się już w wyniku sumy małych różnic, lecz jedyną różnicę; wówczas nie masz już woli powszechnej i zdanie zwycięskie jest jedynie szczególnym zdaniem 136 ."},{"type":"paragraph","text":"Ważną więc jest rzeczą dla otrzymania prawdziwego brzmienia woli powszechnej, by w państwie nie było częściowych związków i by każdy obywatel wypowiadał tylko swoje zdanie 137 : takie było jedyne i szczytne urządzenie wielkiego Likurga 138 . Jeżeli istnieją już częściowe zrzeczenia, trzeba mnożyć ich liczbę i zapobiegać ich nierówności, jak to uczynili Solon 139 , Numa 140 , Serwiusz 141 . Jedynie te ostrożności mogą sprawić, że wola powszechna zawsze będzie oświecona i że naród nie będzie błądził 142 ."}]},{"id":"rozdział-iv-o-granicach-władzy-zwierzchniej-143","number":18,"title":"Rozdział IV. O granicach władzy zwierzchniej 143","blocks":[{"type":"paragraph","text":"Skoro państwo, czyli civitas , jest jedynie osobą moralną, której życie polega na zjednoczeniu jej członków, i skoro najważniejszym jego zadaniem jest własne utrzymanie się, potrzebuje ono siły rozciągającej się na wszystkich i zdolnej do wywarcia przymusu, by poruszać i rozrządzać każdą cząstką w sposób najbardziej korzystny dla całości. Tak jak natura daje każdemu człowiekowi absolutną władzę nad jego członkami, układ społeczny daje ciału politycznego absolutną władzę nad jego członkami: i ta właśnie władza, kierowana przez wolę powszechną, nosi, jak powiedziałem, nazwę zwierzchnictwa 144 ."},{"type":"paragraph","text":"Trzeba nam jednak zastanowić się nie tylko nad osobą publiczną, lecz także i nad osobami prywatnymi w skład jej wchodzącymi, których życie i wolność z natury są od niej niezależne. Idzie o dobre rozróżnienie odnośnych praw obywateli i zwierzchnika 145 , oraz obowiązków, jakie pierwsi mają wypełniać w charakterze poddanych, od prawa przyrodzonego, z którego powinni korzystać w charakterze ludzi 146 ."},{"type":"paragraph","text":"Zgoda na to, że każdy pozbywa w drodze układu społecznego jedynie tę część swojej mocy, swoich dóbr, swej wolności, której wspólnota potrzebuje dla swego użytku; należy się jednak zgodzić także na to, że sam zwierzchnik jest sędzią tego, co dlań jest ważne 147 ."},{"type":"paragraph","text":"Wszelkie usługi, jakie obywatel może oddać państwu, winien mu jest natychmiast, gdy zwierzchnik ich zażąda; zwierzchnik jednak nie może nałożyć na poddanych kajdan niepotrzebnych wspólnocie; nie może nawet chcieć tego, albowiem pod panowaniem praw rozumu nic nie dzieje się bez przyczyny, tak samo jak pod panowaniem praw przyrody 148 ."},{"type":"paragraph","text":"Zobowiązania wiążące nas z ciałem politycznym są wiążące tylko dlatego, że są wzajemne — a istota ich polega na tym, że wypełniając je, nie można pracować dla innych, nie pracując także równocześnie dla siebie. Dlaczego wola powszechna jest zawsze prosta i dlaczego wszyscy stale chcą szczęścia każdego spośród siebie, jeśli nie dlatego, że nie masz nikogo, kto by nie odnosił do siebie tego słowa „każdy” i kto by głosując dla wszystkich, nie myślał o sobie samym. To właśnie dowodzi, iż równość wobec prawa tudzież wytworzone przez nią pojęcie sprawiedliwości wypływają z faktu, że każdy sobie pierwszeństwo oddaje, a zatem z natury człowieka; że wola powszechna, by być naprawdę wolą powszechną, musi nią być zarówno w swym przedmiocie, jak w swojej istocie, że powinna pochodzić od wszystkich, by do wszystkich się odnosić; i że traci swą naturalną trafność, gdy zmierza do jakiegoś przedmiotu indywidualnego i określonego — wówczas bowiem, wydając sąd o tym, co jest dla nas obce, nie mamy żadnej prawdziwej zasady słuszności, która by nam wskazała drogę."},{"type":"paragraph","text":"Istotnie, skoro tylko rozchodzi się o jakiś fakt lub o jakieś prawo poszczególne w przedmiocie, który nie został unormowany za pomocą konwencji jakiejś ogólnej i uprzedniej, sprawa staje się sporna. Jest to proces, w którym zainteresowane poszczególne osoby są jedną ze stron, powszechność zaś drugą, w którym nie widzę jednak ani prawa, za którym iść trzeba, ani sędziego, który powinien wydać orzeczenie. Byłoby rzeczą śmieszną chcieć wówczas odnieść się do wyraźnego rozstrzygnięcia woli powszechnej, która tutaj może być tylko postanowieniem jednej ze stron, i która wskutek tego jest w stosunku do strony drugiej jedynie wolą obcą, szczególną, skłonną w tym wypadku do niesprawiedliwości i podległą błędowi. A więc tak samo, jak wola szczególna nie może przedstawiać woli powszechnej, wola powszechna z kolei zmienia charakter, zwracając się do szczególnego jakiegoś przedmiotu, i nie może, jako wola powszechna, orzekać ani o pojedynczym człowieku, ani o pojedynczym fakcie. Gdy np. lud ateński mianował lub odwoływał swych naczelników, jednemu nadawał zaszczyty, drugiego okładał karą, i za pomocą mnóstwa szczegółowych dekretów wykonywał na równi wszystkie akta rządowe — lud ten wówczas nie miał woli powszechnej we właściwym tego słowa znaczeniu; nie działał w charakterze zwierzchnika, lecz jako wykonawca. Wyda się to przeciwne ogólnie przyjętym poglądom; trzeba mi jednak dać czas do przedstawienia moich poglądów."},{"type":"paragraph","text":"Stąd pojąć należy, że tym, co wolę czyni powszechną, jest nie tyle liczba głosów, ile jednoczący je wspólny interes; przy tym urządzeniu bowiem każdy z konieczności poddaje się tym samym warunkom, jakie narzuca innym; godne podziwu pogodzenie interesu i sprawiedliwości, nadające wspólnym uchwałom charakter słuszności, znikający przy rozpatrywaniu każdej szczegółowej sprawy, z braku wspólnego interesu, który by jednoczył i identyfikował regułę oceny sędziego z regułą strony."},{"type":"paragraph","text":"Z którejkolwiek strony przystępujemy do zasady, dochodzimy zawsze do tego samego wniosku, mianowicie, iż układ społeczny ustanawia między obywatelami równość tak wielką, że wszyscy zobowiązują się pod tymi samymi warunkami i wszyscy winni korzystać z tych samych praw. Tak, dzięki naturze samej układu, każdy akt zwierzchniczy, tzn. każdy autentyczny akt woli powszechnej, zobowiązuje, względnie popiera na równi wszystkich obywateli; w ten sposób, że zwierzchnik zna tylko naród jako całość, a nie rozróżnia nikogo spośród wchodzących w skład narodu. Czymże jest właściwie akt zwierzchniczy? Nie jest on umową przełożonego z podlegającym mu, lecz umową ciała z każdym z jego członków: umową legalną, bo mającą za podstawę umowę społeczną; sprawiedliwą, bo dla wszystkich wspólną; korzystną, bo mogącą mieć na celu jedynie dobro powszechne; i trwałą, bo zabezpieczoną przez siłę publiczną i władzę najwyższą. Dopóki poddani podlegają jedynie takim umowom, nie słuchają nikogo prócz własnej woli; a pytać, jak daleko rozciągają się wzajemne prawa zwierzchnika i obywateli, to pytać, do jakiego stopnia mogą zobowiązać się obywatele wobec samych siebie, każdy wobec wszystkich, a wszyscy wobec każdego z nich."},{"type":"paragraph","text":"Widać stąd, że władza zwierzchnicza, jakkolwiek absolutna, święta, nienaruszalna, nie może przekroczyć granic umów powszechnych, i że każdy człowiek może w pełni rozporządzać tym, co mu te umowy pozostawiły z jego dóbr i wolności; tak, że zwierzchnik nigdy nie ma prawa obciążać jednego poddanego bardziej niż innego, wówczas bowiem sprawa staje się szczegółowa i władza jego przestaje być właściwa 149 ."},{"type":"paragraph","text":"Gdy raz przyjmiemy te rozróżnienia, widzimy całą fałszywość twierdzenia, jakoby przez umowę społeczną poszczególni zrzekali się naprawdę czegokolwiek; położenie ich bowiem na skutek tej umowy staje się rzeczywiście korzystniejsze, niż było przedtem, i zamiast pozbycia się uskutecznili jedynie korzystną wymianę: stanu niepewnego i niestałego na stan inny, lepszy i pewniejszy, naturalnej niezależności na wolność, władzy szkodzenia innym na własne bezpieczeństwo, i siły swej, którą inni ugiąć mogli, na prawo, które związek społeczny czyni niezwyciężonym. Życie ich nawet, które państwu poświęcili, otacza państwo ciągłą opieką; i gdy narażają je dla jego obrony, czyż nie oddają mu wówczas tego, co odeń otrzymali? Czyż robią coś, czego by nie czynili częściej i z większym niebezpieczeństwem w stanie natury, gdyby, wdając się w walki nie do uniknięcia, bronili z niebezpieczeństwem życia tego, co im służy do zachowania go? Prawda, w potrzebie wszyscy mają walczyć za ojczyznę; ale też nikt nigdy nie potrzebuje walczyć za siebie. I czyż, ryzykując w obronie tego, co nam zapewnia bezpieczeństwo, nie zyskuje się wreszcie części tego, co w obronie samych siebie trzeba byłoby zaryzykować natychmiast, skoro tylko to bezpieczeństwo byłoby nam odjęte?"}]},{"id":"rozdział-v-o-prawie-życia-i-śmierci","number":19,"title":"Rozdział V. O prawie życia i śmierci","blocks":[{"type":
