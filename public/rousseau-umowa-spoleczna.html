X1NFYVxqyXMNzFHabTEygO0pYknuf1/Ek0V1worlS7Du2z/9k=","chapters":[{"id":"umowa-społeczna","number":1,"title":"Umowa społeczna","blocks":[]},{"id":"wstęp","number":2,"title":"Wstęp","blocks":[{"type":"paragraph","text":"I. W drodze ku umowie społecznej"},{"type":"paragraph","text":"Opowiada Russo w Wyznaniach (Część II, ks. IX, 1756 r.), że powziął pierwszą myśl napisania Instytucji politycznych w Wenecji. Pełnił on tam w latach 1743–1744 przez około 15 miesięcy obowiązki sekretarza ambasadora francuskiego, faktycznie nawet sekretarza ambasady. Stanowisko to dało mu możność zapoznania się ze swoistym, bardzo skomplikowanym i ciekawym mechanizmem ustrojowym tej arystokratycznej republiki oraz zaobserwowania wad tego tak chwalonego rządu."},{"type":"paragraph","text":"Skierowanie się umysłu Russa w stronę problemów prawno-politycznych, poważne i szczere, niemało musiało dziwić znających jego życie. Dotychczasowe koleje losu nie pozwalały bynajmniej spodziewać się po nim tego rodzaju zainteresowań. Opuściwszy rodzinną Genewę w szesnastym roku życia, prowadził próżniaczy żywot włóczęgi, próbując najróżniejszych zawodów. Przeszedł dla chleba na katolicyzm, był z kolei lokajem, nauczycielem muzyki, małym urzędnikiem katastralnym, guwernerem, prywatnym sekretarzem. Romansowa wyobraźnia, pragnienie przygód, zamiłowanie do swobodnej, beztroskiej tułaczki, do włóczęgi pozwalającej napawać się do syta pięknościami przyrody, niechęć wreszcie do przymusu systematycznej pracy pędziły go z miejsca na miejsce po pogranicznych okolicach Szwajcarii, Sabaudii 1 , Francji — a nawet dalej, do Turynu, Montpellier, Paryża. Najchętniej powracał na dłuższe wypoczynki do swojej „mamusi”, pani de Warens, gdzie znajdował wygodny przytułek bez żadnych określonych obowiązków, utrzymanie, towarzystwo wreszcie miłej i kulturalnej kobiety. Tam, w Annecy czy w Chambéry, dużo mógł czasu poświęcać na leniwe rozkoszowanie się przyrodą, chodzić na długie spacery, puszczać wodze swobodnie błądzącej myśli. Wtedy też wiele czytał — lektura to jedna z jego największych namiętności — i uzupełniał swoje bardzo dotychczas urywkowe wykształcenie. Pociągały go wielce literatura i muzyka, i gdy myślał o swej przyszłości, spodziewał się po nich zapewnienia sobie dalszej kariery. Był już w nim jednak wówczas zaród innych zainteresowań. Nie dawały mu spokoju zagadnienia moralności. Ten dość bezceremonialnie postępujący sobie młodzieniec, mający na sumieniu różne niezbyt piękne sprawki, miał wysokie wyobrażenie o moralności i chętnie wracał myślą do jej zagadnień. Surowa obyczajność kalwińskiej Genewy, gdzie spędził dzieciństwo, lektura umiłowanego Plutarcha 2 i historyków rzymskich, rozczytywanie się w pisarzach francuskich XVII w., długie rozmowy z panią de Warens, lubiącą moralizować i zastanawiać się nad etycznymi kwestiami, wszystko to wpłynęło na nastawienie myśli Russa w wybitnie etycznym kierunku. Przywykł wszystko odnosić do moralności i oceniać z etycznego stanowiska. Moralność opanowała na razie jego myśl, zanim obrał cnotę za kierowniczkę własnych czynów, zanim zaczął naginać samego siebie do swych ideałów, przetwarzać siebie w moralnym surowym trudzie i wysiłku etycznym. I właśnie to przebywanie w świecie moralnych wartości pchnęło go ku problemom prawniczym, politycznym i społecznym."},{"type":"paragraph","text":"Nigdzie naokoło nie widział urzeczywistnienia wypielęgnowanego w myśli ideału cnoty, toteż począł się zastanawiać, dlaczego tak jest, dlaczego wszędzie ludzie są źli i nieszczęśliwi. Na każdym kroku raziły go podłości, zepsucie, wyzysk, intrygi. A jednak nie mógł poddać się pesymizmowi, nie chciał posunąć się do bezwzględnego potępienia ludzkości, do uznania całego człowieczego rodu za dzieło szatana. W sercu swym czuł, że człowiek nie jest zły w głębi duszy, że nie został na to stworzony, by popełniał zbrodnie i męczył się nieszczęśliwy. Człowiek z natury swojej dobry, łagodny, przychylny dla podobnych sobie stworzeń — cóż go zatem mogło przywieść do takiego stanu znikczemnienia i deprawacji, w jakim się obecnie znajduje? Ta myśl gnębiła Russa, ustawicznie pracował nad rozwiązaniem tej zagadki, na nią szukał odpowiedzi w różnych uczonych dziełach. Od czasu pobytu w Wenecji, gdzie po raz pierwszy zaczął zastanawiać się nad urządzeniami politycznymi, nad ich mechaniką, duchem i skutkami, upłynęło wiele lat."},{"type":"paragraph","text":"Od tego czasu — pisze w Wyznaniach — poglądy moje bardzo się rozszerzyły przez historyczne studia nad moralnością. Spostrzegłem, że wszystko w samej swej zasadzie łączy się z polityką i że jakkolwiek by się brać do tego, każdy naród tym tylko będzie, czym go uczyni natura jego rządu; w ten sposób więc wydało mi się, że to wielkie zagadnienie możliwie najlepszego rządu da się sprowadzić do następującego pytania: jaka jest natura rządu zdolnego wytworzyć naród najbardziej cnotliwy, najbardziej oświecony, najbardziej mądry, najlepszy w końcu w najwyższym znaczeniu tego słowa. Sądziłem, że to pytanie bardzo ściśle łączyło się z innym pytaniem, jeżeli to drugie nawet różne od niego było: jaki jest rząd, który z natury swojej najbliżej stoi prawa? A stąd, czym jest prawo? I cały łańcuch równie ważnych zagadnień."},{"type":"paragraph","text":"Odkrył źródło panującego zła w urządzeniach politycznych. Więc zły nie jest z natury człowiek, lecz złym czynią go rządy, pod jakimi żyje. W ten oto sposób rozwija się myśl Russa: pierwszy etap stanowi skonstatowanie powszechnie krzewiącego się zła i upośledzenia cnoty; drugi przynosi stwierdzenie, że sama natura człowieka nie jest zła, że człowiek jest istotą obdarzoną wolną wolą, a więc istotą moralną, zdolną także i do dobrego; trzeci etap wreszcie każe doszukiwać się dla zepsucia człowieka przyczyn społecznych. W twórczości Russa pierwszemu etapowi odpowiada rozprawa pt. Czy odrodzenie nauk i sztuk przyczyniło się do oczyszczenia obyczajów? — drugiemu i trzeciemu Rozprawa o nierówności . Obydwie prace powstały w Paryżu, gdzie Russo zamieszkał na stałe od 1744 r. Wszedł tam w bliższe stosunki z ówczesnymi literatami, obracał się w kole encyklopedystów, zawarł serdeczną przyjaźń z Diderotem 3 ."},{"type":"paragraph","text":"Rozprawa o naukach i sztukach , napisana na konkurs ogłoszony przez akademię w Dijon w 1750 r. i odznaczona pierwszą nagrodą, przyniosła od razu nieznanemu dotychczas autorowi rozgłos i sławę. Odpowiadając negatywnie na postawione w tytule pytanie, wywołał Russo liczne polemiki, w których m. in. zabrał głos także król Stanisław Leszczyński. Świetna forma rozprawy, namiętny, gorący ton wytoczonego przez Russa procesu całej współczesnej cywilizacji, paradoksalność tezy, gwałtowne ataki na zepsucie, hipokryzję, zanik etyki nie pozwoliły przejść obojętnie obok rzuconego przez autora granatu."},{"type":"paragraph","text":"W pierwszym tym swoim ważniejszym piśmie Russo umyślnie przerysowuje, przesadza, kładzie jaskrawe tony. Jak gdyby naukom i sztukom przypisywał całe zło, despotyzm, nierówność ludzi, odwrócenie się ludzkości od właściwego celu, jedynie zdolnego ją uszczęśliwić: cnoty. Krzywe zwierciadło pokazuje współczesności i odbija się ona w nim w spotworniałych kształtach. Nie wyciąga żadnych wniosków: rzuca jedynie światło idei moralnej na dumną z siebie cywilizację, która, tak widziana, wydaje się ohydna."},{"type":"paragraph","text":"Druga rozprawa, również konkursowa, ogłoszona została w roku 1754 pt. W jaki sposób powstała nierówność pomiędzy ludźmi i czy jest uprawniona przez prawo naturalne? Równie gwałtowna w potępieniu stosunków panujących, nie zawiera już jednak tylko negacji. Przynosi odpowiedź na pytania, jaka jest prawdziwa natura człowieka i w czym należy szukać źródła zła, a chociaż jeszcze nie wysuwa pełnej, pozytywnej konstrukcji, nie wskazuje, w jaki sposób dałoby się usunąć zło, to jednak otwiera horyzonty na inne możliwości. Rozprawa dzieli się na dwie części. Pierwsza ma na celu dojście do uchwycenia istotnej natury człowieka, do skonstruowania człowieka „samego w sobie”, takiego, jakim jest niezależnie od społecznych warunków życia. Tę istotę człowieka, właściwość odróżniającą go najbardziej stanowczo od zwierząt, odkrywa Russo nie w jego umysłowości, ale w tym, że ma on wolną wolę i że jest zdolny do doskonalenia się. Człowieczeństwo zasadza się na moralnych wartościach, a ich podstawą i metafizyczną zasadą jest wolność. I tej wolności człowiek nie może się pozbyć, gdy zaś tak czyni, unicestwia się w swej istocie, zrzekając się jej, obraża naturę i rozum. To najważniejsze, fundamentalne dla całego późniejszego rozwoju myśli Russa, twierdzenie otacza w rozprawie bogatą wyobraźnią narysowany obraz pierwotnego, przedspołecznego stanu człowieka, stanu zresztą, „który może nigdy nie istniał”. Te pomysły można pominąć przy śledzeniu pochodu koncepcji Russa, prowadzącego ostatecznie do tez Umowy społecznej . Zanotować trzeba jedynie, że nierówność w stanie natury jest bardzo mała i nie wywiera znaczniejszego wpływu. Druga część jest poświęcona hipotetycznemu rozwojowi społeczeństwa. Russo odsuwa świadomie wszelką historyczność, nie opiera się na żadnych rzeczywistych, dających się stwierdzić faktach. Daje racjonalistyczną hipotezę genezy społeczeństwa, „bardziej mającą służyć do wyjaśnienia natury rzeczy niż do okazania prawdziwych początków”. Zadaniem jego jest wytłumaczyć za pomocą rozumowania, jak mogło dojść do obecnego stanu rzeczy, do panoszącej się wszędzie niewoli i nierówności, a nie jak faktycznie rozwijały się stosunki. Nie jest to więc historia, lecz historiozofia — nie idzie tu o rzeczywiste procesy dziejowe, ale o ich sens wewnętrzny. A oto ten sens: dopiero społeczne życie zrodziło sztuczną nierówność pomiędzy ludźmi, stwarzając własność, urzędy, władzę arbitralną — społeczne życie rozdmuchało wszystkie złe namiętności, społeczeństwo uczyniło z pierwotnego, nieznającego moralności człowieka istotę złą i niemoralną, społeczeństwo poddało jednych ludzi drugim, społeczeństwo doprowadziło do wojen, uzurpacji i despotyzmu. Społeczeństwo stworzyło wyzysk i gwałt, panów i niewolników, bogaczy i nędzarzy. „Społeczeństwo to i prawa dały nowe więzy słabemu, a bogatemu nowe siły, bezpowrotnie zniszczyły przyrodzoną wolność, na zawsze ustaliły prawo własności i nierówności, ze zręcznej uzurpacji uczyniły nieodwołalne prawo i dla zysku kilku ambitnych poddały odtąd cały ród ludzki pracy, niewoli i nędzy”. Winę za wszelkie zło ponosi zatem społeczeństwo."},{"type":"paragraph","text":"Czyż to zło jednak wiąże się z samą naturą społeczeństwa, czy musi ono zawsze tylko zło tworzyć? Rozprawa o nierówności mówi tylko o tych społeczeństwach, jakie rzeczywiście istnieją, o faktycznych organizacjach, opartych na niewoli i na nierówności. Ale czy takie tylko organizacje są możliwe, czy nie mogą być z natury rzeczy inne, czy nie mogą budować się na wolności i sprawiedliwości? Że są możliwe takie inne społeczności, wskazuje dedykacja rozprawy. Russo poświęca ją republice genewskiej 4 w dłuższym przemówieniu. Sławi w nim swe ojczyste miasto, jego konstytucję i rząd, idealizuje je i stawia za wzór, jako ustrój oraz typ życia i obyczaju, który umie pogodzić wskazania wypływające z natury człowieka z bardzo rozwiniętym życiem zbiorowym. Z tą dedykacją rozpoczyna się ostatni etap podróży myśli Russa w świecie moralno-społecznym. Skoro jest możliwa lepsza organizacja społeczna, jest możliwa także i całkiem dobra. A zatem taka całkiem dobra wszelka organizacja społeczna być powinna."},{"type":"paragraph","text":"Po ukończeniu Rozprawy Russo odwiedził Genewę latem 1754 r. Owiany ojczystym powietrzem, wzruszony doskonałym przyjęciem przez współobywateli, silniej jeszcze ugruntował się w podziwie dla ustroju Genewy, poczuł się dumny, że urodził się obywatelem wolnej republiki. „Szlachetny obraz wolności, równości, jedności, słodyczy obyczajów podnosił mą duszę”. Zamanifestował swe uczucia powrotem na łono kalwinizmu i odzyskał przez to swe prawa obywatelskie. Wzór idealnego państwa miał przed oczyma: zasady rządów Genewy wcielone jeszcze konsekwentniej w pozytywne instytucje, jeszcze bardziej pogłębione i ujęte w czystszej formie, będą zasadami jego republiki. Na pytanie, jaki powinien być ustrój państwa i rządu, by był sprawiedliwy i by szanował wolną naturę człowieka, a wskutek tego popierał jego rozwój moralny, czynił go dobrym i szczęśliwym — na to pytanie otrzymał ostateczną odpowiedź w Genewie. Miały ją zawrzeć Instytucje polityczne , których zarys zaczął coraz wyraźniej stawać w wyobraźni Russa. Dzieło na ogromną skalę zakreślone miało zawrzeć prawdopodobnie filozofię społeczeństwa, zasady prawa politycznego i prawa międzynarodowego, politykę ekonomiczną, obyczajową, wychowawczą. W tym też zapewne czasie rzucił Russo na papier pierwszy szkic Umowy , znany pod nazwą Rękopisu genewskiego . Wiele lat jednak miało jeszcze upłynąć, Instytucje wiele jeszcze pracy wymagały i ostatecznie nigdy nie było mu dane wykończyć ich. Koncepcji nurtującej ciągle Russa brakło jeszcze wielu ważnych wiązadeł logicznych, wiele części nie wyszło jeszcze ze stadium mgławicowych pomysłów, nie znalazł nawet drogi do rozwiązania wielu zagadnień."},{"type":"paragraph","text":"W listopadzie 1755 r. ukazuje się w piątym tomie Encyklopedii artykuł Russa O ekonomii politycznej . Jest to traktat o polityce wewnętrznej, jaką powinien prowadzić rząd republikański. Zawiera już wiele twierdzeń, które miały się stać najbardziej istotnymi częściami teorii zawartej później w Umowie . Russo uchwycił już ideę mającą stać się cementem całej jego konstrukcji. Idea prawa mianowicie występuje już tutaj jako jedyny czynnik mogący przynieść rozwiązanie zagadnienia dobrego rządu, zgodnego z naturą człowieka i popierającego rozwój jego istotnych wartości. „Za pomocą jakiejż to sztuki nie do pojęcia można było wynaleźć środek uczynienia ludzi poddanymi, by ich wolnymi zrobić, zyskać dla służby państwu mienie, ręce, a nawet życie wszystkich jego członków, nie przymuszając ich ani się ich radząc, związać ich wolę za ich własną zgodą, ich samych zezwolenie wytoczyć przeciw ich odmowie i zmusić ich, by karali samych siebie, gdy czynią to, czego nie chcieli? Jak to może się dziać, by słuchali, a by nikt nie rozkazywał, by służyli, a nie mieli pana, w istocie tym wolniejsi, gdy przy pozorze poddania nikt nie traci więcej ze swej wolności prócz tego, co może szkodzić wolności drugiego? Te cuda są dziełem prawa. Prawu to jedynie zawdzięczają ludzie sprawiedliwość i wolność; ten to zbawienny organ woli wszystkich przywraca w prawie naturalną równość pomiędzy ludźmi; ten to niebiański głos dyktuje każdemu obywatelowi przepisy publicznej racji i uczy go, by postępował zgodnie z zasadami własnego swego rozumu oraz by nie był sam z sobą w sprzeczności. Także prawo wyłącznie winni dopuszczać do głosu naczelnicy, kiedy rozkazują; gdy bowiem człowiek jakiś chce od praw niezależnie poddać drugiego swej prywatnej woli, wychodzi natychmiast ze stanu społecznego i w stosunku do tamtego drugiego wstępuje w czysty stan natury, w którym posłuszeństwo przepisuje jedynie konieczność”. Podstawową regułą rządu winna być wola powszechna, która zmierza zawsze do zachowania i dobrobytu całości oraz każdej części i która jest źródłem prawa. Ta wola powszechna nie jest identyczna z uchwałą publiczną. Artykuł przynosi już także rozróżnienie rządu i zwierzchnika oraz twierdzenie, że władza zwierzchnicza, mająca za swój przedmiot jedynie wspólne dobro, nie ma żadnych granic, prócz dobrze zrozumianej korzyści publicznej. Wszystkie zatem podstawowe elementy Umowy zawiera już artykuł O ekonomii , aczkolwiek nie ujęte jeszcze w karby jej żelaznej konstrukcji logicznej. Russo w tym czasie znajduje się już w posiadaniu całego prawie materiału pojęć i pomysłów, z którego wzniesie gmach swojej doktryny."},{"type":"paragraph","text":"Wiosną 1756 r. Russo przenosi się z Paryża na wieś. Mieszka zrazu w „Pustelni”, w lesie pobliskim zamku la Chevrette, później w Montmorency. Na czas tego wycofania się z życia stołecznego na łono przyrody przypada najbujniejszy okres twórczości Russa. Teraz powstają najobszerniejsze i najwybitniejsze jego dzieła: List o widowiskach , Nowa Heloiza i Emil . Tutaj równocześnie rozmyśla nad Instytucjami i wykańcza tę ich część, która miała się stać Umową społeczną ."},{"type":"paragraph","text":"Z różnych dzieł, jakie miałem na warsztacie — mówi w Wyznaniach — tym dziełem, nad którym rozmyślałem już od dawna, którym zajmowałem się najchętniej, nad którym pragnąłem pracować przez całe życie i którym miałem, moim zdaniem, przypieczętować mą sławę, tym dziełem były Instytucje publiczne ... Aczkolwiek pracowałem już nad tym dziełem od jakichś pięciu czy sześciu lat, nie posuwało się wcale naprzód. Tego rodzaju książki wymagają rozmyślań, wolnego czasu, spokoju. Ponadto pisałem je, jak to mówią, w miłosnej przygodzie i nie chciałem się zwierzać nikomu ze swoim projektem, nawet Diderotowi. Obawiałem się, by nie wydało się za śmiałe na ten wiek i na kraj, w którym pisałem, i by przestrach moich przyjaciół nie krępował mnie w wykonaniu. Nie wiedziałem jeszcze, czy ukończę je w porę i tak, by mogło ukazać się za mojego życia. Pragnąłem móc powiedzieć o swoim przedmiocie bez żadnego przymusu to wszystko, czego wymagał, przekonany, że nie posiadając satyrycznego usposobienia i nie chcąc nigdy szukać praktycznego zastosowania, zostanę zawsze nienaganny według wszelkiej słuszności. Zapewne, że pragnąłem korzystać w pełni z prawa myślenia, jakie otrzymałem z urodzenia, szanując jednak zawsze rząd, pod którym miałem żyć, słuchając zawsze jego ustaw..."},{"type":"paragraph","text":"Instytucje nadal jednak postępowały bardzo wolno. Ukończył tymczasem i wydał Nową Heloizę , która spotkała się z olbrzymim sukcesem. Pod rokiem 1759 pisze w Wyznaniach o Instytucjach : „Zbadałem stan tej książki i przekonałem się, że wymagała jeszcze kilku lat pracy. Nie miałem odwagi prowadzić jej dalej i czekać do wykonania swego postanowienia, aż będzie skończona. Rezygnując więc z tego dzieła, postanowiłem wyjąć zeń to, co dało się odłączyć, a potem resztę spalić; wziąwszy się gorliwie do roboty, nie przerywając Emila , ukończyłem Umowę społeczną w okresie mniej niż dwóch lat”. W sierpniu 1761 r. Umowa była ukończona. Druk prowadzony w Hadze przewlókł się, tak że książka ukazała się dopiero w kwietniu 1762 r. Długo noszony owoc wychodził nareszcie na świat, gdy autor miał już lat pięćdziesiąt."},{"type":"paragraph","text":"II. Umowa społeczna"},{"type":"paragraph","text":"Metodą całą rozumowania oraz normatywnym celem, do którego zmierza, tkwi Umowa społeczna w tradycji XVII w. i pod tymi względami przeciwstawia się nawet świadomie nowym prądom, rozkwitłym już w wieku XVIII. W dziedzinie nauk społecznych jest w XVIII w. nowatorem Monteskiusz 5 . Opierając się na materiale rzeczywistych faktów, na pomnikach pozytywnego ustawodawstwa, na urządzeniach funkcjonujących u różnych narodów i w różnych czasach, stara się Monteskiusz ująć je w odrębne typy i wytłumaczyć ich różnolitość przez działanie szczególnych przyczyn fizycznych i psychicznych, nadających im ich własną, odrębną fizjonomię 6 . Cel zatem wyłącznie w zasadzie poznawczy: zdać sobie sprawę z bogactwa form prawno-politycznych władających społeczeństwami ludzkimi i wyjaśnić je za pomocą powiązania ich w sposób konieczny z faktami bądź tego samego porządku, bądź też należącymi do porządków innych, fizycznego i czysto psychologicznego. Monteskiusz staje się przez to ojcem historii prawa i prawa porównawczego, wreszcie prekursorem współczesnej socjologii, ojcem przyrodniczej metody, zastosowanej do zjawisk życia społecznego i prawnego. I mimo że nie dochodzi do tej dokładności i ścisłości, jaka przypadła w udziale późniejszemu rozwojowi podjętej przezeń dyscypliny naukowej, mimo że dzieło jego cechuje pochopność uogólnień, częsta dowolność twierdzeń i niezbyt wielki krytycyzm w przyjmowaniu pewności faktów, mimo że nie zadowala się on czysto obiektywnym stanowiskiem wobec swojego przedmiotu, lecz ma pewien swój własny ideał prawny, którym mierzy wartość opisywanych przez siebie ustrojów, nie poprzestając na wyłożeniu ich mechanizmu i na wykryciu kształtujących je przyczyn, mimo niedoskonałości swej metody i przetykania murów wznoszonej przez siebie budowli wątkami należącymi z istoty swej do innych ujęć i konstrukcji — mimo to wszystko stanowi Monteskiusz punkt zwrotny w rozwoju nauk społecznych. Pchnął je na nowe tory, odwracając ich dotychczasowy stosunek do rzeczywistości. Dotychczas posługiwały się te nauki wyłącznie dedukcyjną metodą, stawiały sobie za zadanie tworzenie idealnych systemów, opartych na abstrakcyjnych, wyłącznie rozumowych fundamentach, miały służyć do usprawiedliwienia lub do potępienia panujących urządzeń za pomocą kryteriów uzyskanych drogą spekulacji myślowej. Obecnie przeciwnie: rzeczywistość staje się punktem wyjścia, a prawda jedynym celem, fakty i ich związki stają się alfą i omegą nauki, naukami społecznymi zawładnęły opis i wyjaśnienie, nie zaś konstruowanie norm powszechnowartościowych i ocenianie. Zamiast by świat nadziemski idei przybliżał się ku ziemi i stawał normą jej urządzeń, zjawiska życia przez coraz to wyższe uogólnienia przybierają kształt idei, niebędących już prawzorami rzeczy, lecz jedynie schematycznymi ujęciami rzeczywistych procesów. A z tą zmianą metody i celów łączy się zmiana charakteru nauk społecznych. Z normatywnych, dążących do wydobycia norm, za pomocą których można by było mierzyć materiał rzeczywistości, norm będących idealnymi formami wszelkiej prawności, stają się te nauki fenomenologiczne 7 i nomotetyczne 8 i już nie o prawność (zgodność z normami) im chodzi, ale o prawidłowość zjawisk (konieczność stale zachodzących pomiędzy nimi stosunków). Porzucają łańcuchy rozumowań o tym, co być powinno, i obserwują jedynie to, co jest. A ich wewnętrznym kryterium staje się już nie tylko sama prawda formalna, wyłącznie dotychczas stanowiąca o ich rezultatach i wnioskach, ale prawda materialna. Tę rewolucję w naukach społecznych zapoczątkował Monteskiusz w swym epokowym dziele O duchu praw , wydanym w 1748 r."},{"type":"paragraph","text":"Tymczasem 13 lat później ukazuje się książka Russa, będąca najświetniejszym zamknięciem tej poprzedniej, właśnie przez Monteskiusza przezwyciężonej, epoki nauk społecznych. Russo Ducha praw rozumiał doskonale, nie zapuścił się jednak w krainy przezeń wskazane, nie stał się pionierem biorącym pod uprawę nowo odkryte dziedziny, lecz poszedł gościńcem, po którym kroczyli od czasów starożytnych filozofowie zajmujący się społeczeństwem i rządzącymi nimi prawami. Zarówno przez cele, które sobie stawia, jak przez całą metodę, za pomocą której przedmiot swój traktuje, należy Russo do już zdawało się minionego okresu. Pozytywne urządzenia mało go obchodzą, zajmuje się jedynie wykryciem zasad prawa politycznego. Zasady te zaś pojmuje jako jakieś nadprawo, powszechnie obowiązujące i całkowicie niezależne od prawa pozytywnego, nadprawo, które winno stanowić kierowniczą ideę wszelkich ustrojów państwowych, o ile mają być one prawne, które ma być powszechnowartościową miarą dla oceny prawności urządzeń społecznych."},{"type":"paragraph","text":"A stanął Russo w szeregu wielkich swych poprzedników z dawnych wieków zupełnie świadomie, zdając sobie dokładnie sprawę zarówno ze środków, jak z granic obranej przez siebie metody i odrzucając cele i metodę Monteskiusza, jako zupełnie niewspółmierne z jego własnymi zamiarami i z zadaniem, jakie sobie postawił. I nie spuszcza on nigdy z oka tego zadania, i nigdy nie myli się w wyborze środków mających mu dopomóc do jego rozwiązania. To metodologiczne uświadomienie Russa jest godne podziwu: pisząc o nadprawie, nie zaciera on nigdy granic pomiędzy światem norm idealnych a światem faktów, nie miesza nigdy jednego z drugim, nie popełnia nigdy tak i dzisiaj częstego błędu metodycznego, polegającego na wnioskowaniu z faktu o normie lub odwrotnie."},{"type":"paragraph","text":"Umowa społeczna składa się jak gdyby z dwóch części. Pierwsza część zawiera filozoficzno-prawną doktrynę Russa. Panuje w niej czysta dedukcja; element faktycznej rzeczywistości nie odgrywa tu żadnej roli; obraca się cała w sferze normatywnych wymiarów; wysnuwa się wyłącznie z apriorycznych 9 założeń i definicji, wpatrzona w nie oraz w ich logiczne powiązania i konsekwencje myślowe. Część druga, prawno-polityczna, korzeniami swymi w doktrynę pierwszej części wrosła, ma za zadanie obmyślenie sposobów najlepszej realizacji wyników tamtej w pozytywnych urządzeniach. Część doktrynalna jest najciekawsza, najbardziej samodzielna, w logicznej swej architekturze nieskazitelnie piękna, genialności umysłu Russa dająca najpełniejszy wyraz."},{"type":"paragraph","text":"Jakżeż przedstawia się ta teoria Russa prawności społeczeństw, państw, urządzeń jurydycznych 10 ? Porządek społeczny opiera się na prawach, które nie są prawami przyrody; nie mają one w sobie nieuniknionej, niezmiennej konieczności tamtych, nie działają ani z tą siłą, ani z tą bezwzględnością, co one. Prawa przyrody nie potrzebują usprawiedliwienia, wystarczy, że są, innymi być nie mogą. Prawa społeczne nie mogą się legitymować tą koniecznością, uzasadnienie swoje muszą czerpać skądinąd i w czym innym muszą szukać uprawnienia swego istnienia."},{"type":"paragraph","text":"Zadanie komplikuje się przez to, że porządek społeczny ma wszelkie pozory niewoli, każda zaś niewola jest przeciwna samej istocie człowieka, jego naturze, która jest wolna. W jakiż więc sposób uprawnić to, co wydaje się niepogadzalne z wolnością, najistotniejszą treść człowieczeństwa stanowiącą? Jakżeż to, co gwałci naturę człowieka, może być prawne i jakżeż człowiek pozbawiony swego człowieczeństwa może mieć jeszcze obowiązek poddania się pod jarzmo społeczności i słuchania jej rozkazów? Jakżeż w ogóle istota, co przestała być wolna, a zatem przestała być moralna, może mieć jakieś obowiązki? A jednak obowiązek taki istnieje — chodzi tylko o to, by zbadać, pod jakimi warunkami może on powstać, kiedy wiąże naprawdę człowieka."},{"type":"paragraph","text":"Obowiązku społecznego nie da się oprzeć na prawach przyrody, skoro prawa przyrody nic wspólnego nie mają z prawami moralnymi. Nie może on być także wypływem siły zewnętrznej, bo siła prawa nie rodzi. Może się uzasadniać jedynie aktem, który sam człowiek zdziałał jako wolna i moralna istota, aktem, przez który każdy człowiek sam dobrowolnie obowiązek społeczny na siebie przyjmuje. Aktem tym jest umowa społeczna . Dlaczego umowa społeczna obowiązuje? Bo jest wypełnieniem normy ogólnej: „wszelka umowa obowiązuje”. Istnienie takiej normy jest pierwszym postulatem dedukcji Russa. Chcąc logicznie poprawnie rozumować, musi on obowiązek wyprowadzić z normy. Wszelkie gruntowanie obowiązku na faktach musiałoby zawsze zawierać nieuprawniony przeskok, zupełnie dowolne podstawienie we wniosku terminu „winien” w miejsce wyłącznie figurującego w przesłankach „jest”. A zatem obowiązek społeczny opiera się na umowie."},{"type":"paragraph","text":"Cóż to jest ten obowiązek społeczny, na czym polega, jaka jest jego treść? Przez umowę społeczną ludzie stwarzają społeczność, jednoczą się we wspólnej organizacji, zespalają i łączą wszystkie swe siły dla celów zbiorowej korzyści. To połączenie, zespolenie, zjednoczenie będzie mogło być zrealizowane jedynie wówczas, gdy każdy z zawierających umowę odda się społeczeństwu całkowicie, bez zastrzeżeń i zobowiąże do wszystkiego, czego odeń społeczeństwo zażąda. Inaczej nawet i być nie mogłoby: gdyby jednostka chciała, przystępując do związku społecznego, zarezerwować sobie jakąś sferę wyłącznie własną, niedostępną dla społeczności, miałoby się do czynienia z ustawicznym sporem pomiędzy społeczeństwem a jednostką, z ustawicznym konfliktem, przy którym nie mogłoby być mowy o jedności, a który legalnie w żaden sposób nie mógłby być rozsądzony. Jakaż bowiem mogłaby być władza wyższa, ponad społeczeństwem i jednostką stojąca, a do rozstrzygania tych sporów powołana? Treścią umowy społecznej może być zatem tylko całkowite poddanie się każdego społeczności."},{"type":"paragraph","text":"W jakiż sposób tak brzmiąca umowa może być ważna? Warunkiem ważności każdej umowy jest, by była zgodna z naturą człowieka, by nie degradowała w nim jego człowieczeństwa zasadzającego się na wolności. A tu człowiek oddaje się cały w niewolę społeczeństwu. Warunkiem ważności każdej umowy jest, by była rozumna, a jako rozumna, by wychodziła na korzyść zawierającego ją, nikt bowiem rozumny nie może chcieć swej szkody. A czyż nie wygląda na szaleństwo zawierać umowę unicestwiającą człowieka? Jakąż korzyść może on z takiej umowy wyciągnąć? Umowa zatem społeczna, by być ważną, musi jednostkom ich wolność zachowywać, musi być rozumna, dla uczestników korzystna, i to dla wszystkich uczestników, inaczej bowiem nie byłaby sprawiedliwa. Czy ta sprzeczność pomiędzy treścią umowy a warunkami jej ważności nie da się usunąć? Owszem, ale za pomocą jednego tylko sposobu."},{"type":"paragraph","text":"Umowa społeczna, pomimo całkowitego oddania się człowieka społeczności, uszanuje jego wolność i zapewni mu jego własną korzyść, o ile tak urządzi stosunki, że rozkazy wychodzące od społeczności będą zawsze zgodne z rozumną wolą wszystkich członków. Wtedy człowiek każdy, słuchając tych rozkazów, będzie naprawdę słuchał samego siebie, a ograniczenia, skrępowania nakładane nań przez społeczeństwo, nie będą niewolą. I wtedy także korzyść wszystkich członków będzie zabezpieczona: społeczność niczego żądać nie będzie mogła, co by godziło w interesy jednostek. A zatem obowiązek człowieka, powstały na podstawie przystąpienia przezeń do umowy społecznej, istnieje, o ile rozkazy społeczności zawsze będą szły w kierunku korzyści jednostki, której ona musi chcieć racjonalnie. Każdy z poszczególnych obowiązków, przez społeczność nakładanych, winien być dla jednostki korzystny. Tak zaś będzie mogło być jedynie wówczas, gdy obowiązki te będą przynosiły zawsze korzyść całemu ogółowi. Wówczas bowiem ten, kto spełniając obowiązek, ponosi ofiarę, będzie równocześnie współuczestniczył w ogólnej korzyści i to, co utraci jako jednostka prywatna, zyska równocześnie jako członek zbiorowości. Ażeby zaś pełną mógł odnieść korzyść, aby pożytek zbiorowości nie łączył się z taką jego ofiarą, która by nie znalazła równowartości w zysku, jaki nań częściowo przypada, treść jego obowiązku winna być równocześnie także treścią obowiązków wszystkich innych członków społeczności, tak iżby przy równym rozkładzie strat równo rozkładały się zyski. Obowiązki zatem w społeczeństwie winny być równe dla wszystkich. Konkluzja całego rozumowania brzmi: normy obowiązujące obywateli winny opierać się na ogólnej korzyści i winny być powszechne, obejmować ogół obywateli. Takie normy nazywa Russo wolą powszechną ."},{"type":"paragraph","text":"Pojęcie woli powszechnej, zajmujące samo centrum systemu Russa, jest konstrukcją genialną, wyodrębniającą teorię jego od wszystkich jej poprzedniczek. Konstrukcja ta kładzie swe wybitnie indywidualne piętno na całej doktrynie, rozwiązując w sposób prosty, a zupełny na początku postawioną antynomię jednostki i społeczeństwa, wolności przyrodzonej a obowiązku społecznego. A rozwiązuje za pomocą wysunięcia wymagania równości praw i obowiązków ."},{"type":"paragraph","text":"Cała dalsza budowa wznosi się już na tym fundamencie woli powszechnej. Jest rozwinięciem jej cech i przekładaniem jej na język politycznego ustroju. A więc wola powszechna, odnosząc się do wszystkich na równi, nie może zajmować się ani poszczególnymi osobami, ani poszczególnymi działaniami, lecz musi zawsze tak jedne jak drugie traktować in abstracto 11 , musi być z natury swojej ogólna, a przejawy jej muszą być aktami publicznymi ogólnymi, czyli muszą być aktami prawodawczymi. Ta powszechność i abstrakcyjność woli powszechnej jest warunkiem równości, zabezpieczającej znów ze swej strony wolność. Gdyby bowiem obowiązki przez wolę powszechną stanowione obciążały członków w różnym stopniu, podlegaliby ci bardziej obciążeni nie sobie samym, własnej korzyści, własnej woli, lecz służyliby wyłącznie interesom uprzywilejowanych, czego jako rozumni ludzie chcieć nie mogą. A więc wola powszechna, mieszcząc w sobie zawsze element korzyści powszechnej, jest stała, nie może błądzić, nie ulega zepsuciu, jednym słowem, wznosi się ponad przypadkowe wahania psychiki zbiorowej. Dąży zawsze do celu, który może być uchwycony przez umysł wyższy, zdolny ogarnąć i przeniknąć wszystkie okoliczności danego momentu, niezaciemniony interesami i namiętnościami. Albowiem korzyść całości da się pojąć czysto obiektywnie, tak że w danym momencie i w danym kierunku tylko coś jedno będzie korzystne, a wszystko inne w porównaniu z tą korzyścią będzie niekorzyścią."},{"type":"paragraph","text":"W jaki sposób ma się wola powszechna przejawiać? Organ powołany do wyrażania woli powszechnej nazywa Russo zwierzchnikiem. Skoro wola ta działa tylko przez akty prawodawcze, więc zwierzchnictwo polega wyłącznie na stanowieniu praw, jest władzą prawodawczą. Skoro władza prawodawcza jest przejawianiem woli powszechnej, wola zaś powszechna jest wyrazem interesu ogólnego, wyrazem sumy tych momentów z poszczególnych interesów wszystkich jednostek, które dadzą się sprowadzić do wspólnego mianownika, zatem piastunem tej władzy musi być ogół obywateli, cały naród; albowiem nie jest do pomyślenia, by interes czyjś mógł być celem stałego skierowania woli kogoś drugiego, niebędącego nim samym. Chodzi o interes narodu jako całości; podmiotem woli, chcącej tej korzyści, musi być sam naród i sam tylko może tę wolę przez usta wszystkich swych członków przejawiać. Nikt inny nie jest zdolny do odkrywania prawdziwej woli powszechnej w całej jej czystości. Każdy inny piastun władzy zwierzchniczej musiałby prędzej czy później podsunąć własną swą wolę, własny swój interes w miejsce powszechnego. Naród więc sam winien przejawiać wolę powszechną, on jest jej podmiotem i przedmiotem i on także winien być jej organem. Zwierzchnictwa doń należącego nie może naród ani się pozbyć, przenosząc je na kogo innego, ani też powierzyć komuś innemu do wykonywania w charakterze reprezentanta (wolę powziąć i przejawiać może tylko jej podmiot). Zwierzchnictwo to wreszcie nie może być dzielone, gdyż wola powszechna musi być wolą całości."},{"type":"paragraph","text":"W końcu jeszcze bardzo ważna cecha zwierzchnictwa: jego absolutność, jego wszechwładza. Zwierzchnik jest wyłącznym panem stanowienia takich lub innych norm, nakładania takich lub innych obowiązków i nikt nie może go w tym ograniczyć. Wypływa to z samego stanowiska zwierzchnika jako władzy najwyższej, niemającej już nikogo nad sobą. Wypływa także stąd, że zwierzchnik nie może się wobec poddanych do niczego zobowiązać, bo działa tylko za pomocą praw, akty zaś prawodawcze nie mogą być aktami umowy, zarazem też samego siebie nie może skrępować obowiązkami żadnymi, bo nikt się nie może zobowiązywać wobec samego siebie. Wypływa to wreszcie z brzmienia umowy społecznej, z bezwarunkowego poddania się wszystkich woli powszechnej. Jedna tylko wola powszechna ogranicza zwierzchnika, ale jest to ograniczenie czysto logicznej natury, nie prawniczej. Streszczając, można tak określić władzę zwierzchniczą: jest to absolutna władza narodu nad swymi członkami, oparta na umowie społecznej, kierująca się wolą powszechną, przejawiająca się w formie praw."},{"type":"paragraph","text":"I oto zamyka się cały łańcuch rozumowania Russa. Każdy obywatel ma obowiązek słuchać woli powszechnej, wyrażonej w formie prawa uchwalonego w drodze plebiscytu. W państwie, gdzie prawa są wolą powszechną, nie ma niewoli społecznej. Jedynie państwa, w których motorem wszystkiego jest wola powszechna, są państwami prawnymi. Pierwotnie postawione sobie zadanie autor spełnił. Z natury samej związku społecznego, jako stowarzyszenia na umowie opartego, wyprowadził zasady uprawniające społeczeństwo i uzyskał reguły decydujące o prawności ustroju, o tym, czy dane skupienie społeczne jest tylko tłumem ludzkim ulegającym przymusowi, czy też organizmem prawnym, związkiem opartym na prawie i prawem się rządzącym."},{"type":"paragraph","text":"W całym pochodzie swej myśli trzymał się Russo ściśle drogi wskazanej przez metodę normatywno-dedukcyjną: rozumował o tym, jak być powinno, i posługiwał się konstrukcjami czysto racjonalistycznymi, które nie były interpretacją ani uogólnieniem faktów empirycznych, historycznych czy też psychologicznych. Zarówno umowa społeczna, jak wola powszechna, te dwa filary, na których spoczywa całe sklepienie teorii, są tworami czystej abstrakcji, nie mają nic wspólnego z rzeczywistością faktyczną. Są fikcjami mającymi za zadanie wiązać razem, harmonizować i stapiać w pojęciową jedność, niezbędną w dedukcyjnym wnioskowaniu, sprzeczne ze sobą pierwotne pojęcia indywidualnej wolności i społecznej niewoli, interesu całości i interesów osobistych jednostek, obowiązku dobrowolnie przyjętego z narzuconym przez społeczeństwo zachowywaniem się. I w tym właśnie, w tej metodologicznej jednolitości, w tej zdolności konsekwentnego utrzymania się na obranej płaszczyźnie, w tym swobodnym i pewnym poruszaniu się w abstrakcyjnym święcie powinności, leży olbrzymie znaczenie Umowy społecznej . Russo dał w niej bodajże po raz pierwszy normatywną teorię społeczeństwa i państwa, zasługującą w całej pełni na tę nazwę. W rozwoju myśli ludzkiej przypada mu dlatego jedno z naczelnych kierowniczych stanowisk. Jest on w tej dziedzinie poprzednikiem Kanta 12 , który u niego szukał natchnienia i wiele zeń zaczerpnął dla swojej filozofii społeczeństwa i państwa."},{"type":"paragraph","text":"Dzięki doskonałemu całokształtowi swej doktryny jest Russo na wskroś oryginalnym myślicielem, mimo że nie wszystkie jej części składowe wywiódł on z własnej głowy, lecz zużytkował dla swych celów wiele cudzych pomysłów. Niejedno zawdzięczał swoim poprzednikom. Grotius 13 , Hobbes 14 , Locke 15 , protestanccy pamfleciści polityczni są mistrzami, których był genialnym uczniem. Umowa, jako podstawa prawna urządzeń społecznych, była od czasów Grotiusa dobrem powszechnym, punktem wyjścia wszystkich pisarzy szkoły prawa natury. Jeno że tamci za jej pomocą chcieli uzasadnić przede wszystkim cenione przez siebie formy rządu, ponadto nadawali oni umowie mniej lub więcej wyraźny hipotetyczny charakter, starali się za jej pomocą wyjaśnić w sposób domniemany faktyczne procesy powstawania społeczeństw. Russo natomiast rozumuje zawsze jedynie tak, jak gdyby umowa była zawarta, jest ona dlań jedynie środkiem, dzięki któremu zdoła ze sprzecznych ze sobą początkowo założeń wyprowadzić i teoretyczną konstrukcję państwa prawnego, i prawnej jego formy. Ponadto Russo, przyjmując za pierwszą i najwyższą przesłankę dowodzenia postulat Grotiusa: pacta sunt servanda 16 , zdaje sobie w zupełności sprawę z odrębności wymiarów świata normatywnego, toteż nie próbuje uzasadnić tego postulatu naturalnymi, wrodzonymi człowiekowi popędami; wie on, że faktów nie należy przywodzić na poparcie praw. — Twierdzenie, że państwo winno się kierować pożytkiem ogółu, było chyba najbardziej banalnym żądaniem wysuwanym przez wszystkich teoretyków polityki. Żaden z nich jednak nie nadał mu tego tak koniecznego logicznie, powszechnie, bezwzględnie obowiązującego charakteru, jaki ma u Russa, żaden nie ujął go w koncepcję woli powszechnej i nie związał tak nierozerwalnie z samą istotą porządku społecznego. Sam wreszcie termin „woli powszechnej” występuje już przed Russem u Diderota. U Diderota jednak wola powszechna jest aktem indywidualnym rozumu człowieka, badającego ogólne prawa i obowiązki ludzi wzajemnie wobec siebie. Przetworzona dopiero przez Russa w kierunku obiektywnej korzyści całego społeczeństwa, dyktującej normy prawa pozytywnego, mogła się stać zwornikiem normatywnej teorii związków społecznych."},{"type":"paragraph","text":"Tak jak same założenia innego nabierają u Russa znaczenia, tak samo we wnioskach swych odbiega on daleko od konkluzji swoich poprzedników. Podobnie jak u Hobbesa, poddaje się u niego jednostka całkowicie w pierwotnej umowie, a warunek ten jest równy dla wszystkich współkontrahentów. Jednakowoż u Russa to zupełne zrzeczenie się praw nie następuje na rzecz jednostki czy korporacji rządzącej, ale na rzecz ogółu, całości kierowanej wolą powszechną. U jednego i u drugiego zatem jednostka nie ma żadnych praw własnych, ale u Russa zrzeka się ich tylko dla własnego dobra, utożsamionego z dobrem powszechnym, i otrzymuje gwarancje, że to jej dobro będzie uszanowane. Wbrew Grotiusowi i Hobbesowi, którzy dopuszczali całkowite przeniesienie praw zwierzchniczych na inny jakiś podmiot niebędący narodem, stawia Russo zasadę niezbywalności władzy zwierzchniczej, której podmiotem może być wyłącznie sam naród. Jak kalwińscy publicyści i prawnicy, Languet, Jurieu, Burlamaqui, łączy Russo zwierzchnictwo nieoddzielnie z narodem. W tym spotyka się z Locke’em, który nadto, jak Russo, uznaje władzę prawodawczą za zwierzchniczą, a od którego liberalizmu oddalił się poprzednio, wyznając absolutyzm państwowy. Lecz znowu z Locke’em, pionierem systemu reprezentacyjnego, niezgodny, gdy nie dopuszcza powierzenia wykonywania władzy prawodawczej przedstawicielom i żąda bezpośredniego wykonywania jej przez naród. Russo więc nie tylko jest oryginalny w wyborze i ukształtowaniu pojęciowym zasadniczych podstaw swojego systemu, lecz także i w końcowych rezultatach swoich rozważań, w wyprowadzeniu kierowniczych idei wszelkiego prawnego ustroju. Doktryna Russa państwa prawnego, polegającego na rządach prawa równego dla wszystkich i uchwalanego w drodze plebiscytu, jest jego zupełną własnością, wybitnie różną od doktryn jego poprzedników."},{"type":"paragraph","text":"Konsekwencją doktryny Russa jest ustalenie formy państwa prawnego. Państwo prawne może być tylko i wyłącznie republiką, tzn. państwem rządzonym przez prawa uchwalone bezpośrednio przez cały naród. Sama doktryna stanowi więc o tym, kto ma sprawować władzę prawodawczą: wykonywanie jej przez naród jest koniecznym, niezmiennym warunkiem każdego państwa prawnego. To przykazanie Russowego nadprawa nie przesądza jednak jeszcze rozwiązania ogromnego kompleksu zagadnień łączących się z konstytucją państw. Pozostają na boku różne praktyczne problemy związane z funkcjonowaniem władzy zwierzchniczej (sposób zwoływania narodu na zgromadzenia, inicjatywa prawodawcza, głosowanie, większość potrzebna dla przyjścia do skutku ustawy itd.). Pozostają na boku wszystkie kwestie złączone z formą rządu, jego powoływaniem, atrybutami itd. Tymi pytaniami zajmuje się druga część Umowy społecznej , obejmująca księgi III i IV. Ta część poświęcona już nie filozoficzno-prawnym, lecz wyłącznie prawno-politycznym problemom, opiera się na części pierwszej doktrynalnej o tyle, że zadaniem jej jest wyszukanie środków mających urzeczywistnić w charakterze pozytywnych urządzeń państwowych naczelne idee doktryny: prawności opartej na wolności i równości. Również i w tej części Umowy panuje abstrakcyjne rozumowanie. Russo szuka instytucji mogących najlepiej ideał prawności w praktyce życia ziścić i zabezpieczyć na drodze oderwanych rozważań raczej, i w małym tylko stopniu posługuje się historycznym doświadczeniem. Pomimo tego część ta nosi całkowicie odmienny od części pierwszej charakter. Rozumowania obecne skierowane ku rzeczywistości nie mogą mieć i nie mają tego samego charakteru bezwzględnego, dogmatycznego. Chodzi już nie o zdobycie zasad powszechnowartościowych, o absolutnym charakterze, lecz o sposoby i środki praktyczne przyobleczenia tych zasad w ciało i nadania im życia. Stąd konieczność uwzględnienia właściwości konkretnego materiału, w którym mają się przejawić zasady doktryny, konieczność liczenia się z faktycznymi warunkami, przystosowania się do danych empirycznych. Dlatego wszystkie rozumowania tej części mają charakter względności, a wszystkie ich wyniki są raczej radami niż imperatywami."},{"type":"paragraph","text":"Ten charakter względności dostrzegamy najlepiej w sposobie traktowania organizacji egzekutywy 17 . Rząd jest dla Russa jedynie siłą mającą stosować prawa, jest sługą praw i poruszać się może tylko w ich granicach. To konsekwencja doktryny państwa prawnego. Zwierzchnik-naród jest najwyższym i jedynym władcą, przejawiającym swą wolę w formie praw abstrakcyjnych i powszechnych; rząd to czynnik od zwierzchnika odrębny, działający w myśl woli zwierzchnika. Wynika stąd, że przy praktycznym organizowaniu rządu należy uwzględnić dwa momenty: najpierw trzeba się starać, by rząd był istotnie siłą, energią, bezpośrednim działaniem, następnie, by utrzymywał się zawsze w ramach praw. To są stałe wytyczne przy budowaniu ustroju rządowego. Która jednak z form rządu odpowie najlepiej tym wskazaniom — demokracja, arystokracja, monarchia czy liczne formy mieszane — to już zależy od właściwości danego środowiska: od obszaru terytorium, gęstości zaludnienia, od klimatu, płodów naturalnych, sposobu życia, obyczajów, tradycji. Miarą wartości tej czy innej formy rządu jest jej zdatność do zapewnienia rządowi należytego wykonywania jego zadań w danych warunkach. Z prawnego punktu widzenia wszystkie te formy są dopuszczalne, są równorzędne. Kwestie związane z organizacją rządu są zatem dla Russa praktycznymi kwestiami polityki ustawodawczej, a nie prawniczymi kwestiami w ścisłym znaczeniu. Prawniczo obojętne, nie mają żadnej styczności z samymi zasadami prawa, związane natomiast ściśle z tysiącem czynników natury faktycznej, mogą być rozwiązane nie przez prawnika, za pomocą reguł prawa, lecz przez polityka, przez jego sztukę i wiedzę. Form rządu nie wyprowadza się bezpośrednio z przesłanek tworzących ciało doktryny normatywnej. Ujęcie to wysoce oryginalne; wyróżnia ono Russa od jego poprzedników, którzy ustrój rządu czynili zawsze jedną z osi swych normatywnych rozważań."},{"type":"paragraph","text":"Z teoretykiem polityki prawodawczej łączy się w Russie uczeń Monteskiusza. Tę część swojego dzieła zabarwia determinizmem, właściwym socjologicznemu punktowi widzenia. W klimacie, glebie, innych fizycznych czynnikach widzi przyczyny kształtujące dusze ludzkie, urabiające w nich pewne stałe skłonności i dążenia i wpływające tą drogą na wytworzenie się mechanizmu politycznego. Wszystkie te czynniki teoria polityki każe politykowi uwzględnić. A przybierają one w umyśle Russa tak potężne znaczenie, że przed nimi jako naturalnymi koniecznościami skłania głowę Russo, polityk praktyczny, reformator ustrojów państw istniejących. W siłach faktycznych widzi Russo hamulec dla reformatorskich dążeń, zdaje sobie sprawę z daremności walki z naturą rzeczy. To tylko jest trwałe, co jest zgodne z naturą, pogwałcona natura musi wejść wkrótce z powrotem w swoje prawa. Do tych sił faktycznych należą także psychiczne własności narodów, wytworzone na podkładzie dotychczasowego ich rozwoju. I one ograniczają swobodę działania reformatora. Stan obyczajów, moralność, wierzenia religijne, stopień kultury umysłowej, politycznej, ekonomicznej, wszystko to czynniki determinujące ustrój, z którymi musi się liczyć reformator. I dlatego Russo w praktycznej polityce jest zachowawcą-ewolucjonistą. To, co jest, jest konieczne, a choćby nie było dobre, jednak istnieje, żyje, może powoli drogą naturalnego rozwoju polepszyć się. Chcieć gwałtownej zmiany, radykalnych przewrotów, to znaczy chcieć ruiny i śmierci. Gdy więc idzie o program pozytywnych reform, Russo się cofa; powtarza, że lepsze nieraz jest o wiele gorsze , radzi poddać się losowi i odżegnywa się od wszelkich rewolucyjnych poczynań."},{"type":"paragraph","text":"W praktyczne urzeczywistnienie swego ideału państwa prawnego w Europie sobie współczesnej nie wierzył, bo nie widział warunków do tego. Nieliczne tylko narody, jak sądził, posiadały w sobie możliwości ziszczenia jego republiki. Przede wszystkim myślał o Genewie, ojczyźnie swojej, która, jak mu się zdawało, tworzyła najbardziej odpowiedni teren. Jeszcze małe kantony Szwajcarii, Korsyka, społeczności rozsiadłe na szczupłych terytoriach, mające mało zróżnicowany ustrój społeczny i ekonomiczny, o patriarchalnej prostocie obyczajów, nie zarażone zbytkiem i wyrafinowaniem cywilizacji, uznawał za zdolne do wytworzenia rządów odpowiadających zasadom prawności. Później dopiero zajął się Polakami, a w patriotyzmie ich i republikanizmie odkrył podstawy podatne dla ugruntowania prawdziwej republiki."},{"type":"paragraph","text":"Na tym sceptycyzmie, determinizmie, konserwatyzmie Russa-polityka widać wyraźnie istotny dla jego umysłowości dualizm światopoglądu. Co innego świat abstrakcyjnych norm, co innego świat rzeczywistych faktów. Różne nimi prawa rządzą i jednego z drugim mieszać nie wolno. Do tego stopnia jasno przeciwstawiają się w jego umyśle obydwie dziedziny, że wystrzega się tego, tak częstego u twórców abstrakcyjnych doktryn normatywnych, gestu wtłaczania gwałtem w żywy materiał wyrozumowanych przez siebie ideałów. Russo nie tylko myśli zawsze formalnie poprawnie, ale stara się być na terenie rzeczywistości politycznej poprawnym politykiem. Pyta się zawsze, czy konkretne warunki życia narodów pozwalają na zrealizowanie uzasadnionych przezeń idei, czy reformy wypływające z jego idealnych założeń dadzą się przeprowadzić bez zatracenia istniejących wartości. Russo jako spekulatywny filozof prawa liczy się tylko z wewnętrzną logiką swojego systemu, ze zgodnością pomiędzy sobą wybranych przez siebie założeń, z ich zdolnością do rozwiązania postawionego zagadnienia, prawidłowością wreszcie wysnuwanych z nich wniosków. Russo-polityk nie daje się zaślepić logiczną słusznością wywodów doktrynera, stara się uwzględnić w najszerszej mierze czynniki realne, jest ostrożny i sceptyczny i nie hołduje bynajmniej maksymie: pereat mundus, fiat iustitia 18 ."},{"type":"paragraph","text":"III. „Biblia rewolucji”"},{"type":"paragraph","text":"Umowa społeczna jest książką trudną, niełatwo zrozumiałą, której konstrukcja i naczelne idee nie występują od razu jasno przed umysłem czytelnika. Wiele przyczyn składa się na to. Przede wszystkim trudność utrzymania się na torach teorii normatywnej u ludzi przyzwyczajonych do myślenia kategoriami świata istnień, trudność potęgująca się jeszcze na skutek podwójnego kierunku Umowy : filozoficzno-prawnego i politycznego. Następnie ogromna kondensacja myśli i stylu, wymagająca od czytającego wielkiego skupienia i uwagi. Styl Umowy abstrakcyjny, suchy, zwięzły, wybitnie różny od stylu innych dzieł Russa, od jego zwyczajnej retorycznej frazeologii, jego wybuchów uczuciowych, żywości jego wyobraźni. Tutaj obnaża się styl, panuje myśl zimna, logika ścisłego rozumowania, która szuka dla siebie wyrazów najprostszych, oczyszczonych z wszelkich nieracjonalnych elementów. Słowa mają oddać jedynie sam szkielet myśli i nie oblepiają go w drgające życiem i ciepłem ciało ani go nie przystrajają żadnymi draperiami. Także układ sam dzieła, o planie, który dopiero po bardzo dokładnej analizie treści okazuje się celowy i dobrze rozczłonkowany, na pierwszy rzut oka wydaje się chaotyczny i nieprzejrzysty. Trudność również stanowi częste używanie homonimów, tudzież posługiwanie się pojęciami właściwymi Russowi w formie terminów o znaczeniu nieraz odmiennym w codziennym języku, terminów, których definicja nie zawsze od razu podana, lecz rozsiana pojedynczymi członami po najrozmaitszych ustępach, terminów, o których znaczeniu przyjętym przez Russa należy ustawicznie pamiętać. Ogromną wreszcie trudność sprawia spoistość rozumowania, ścisłość i konsekwencja, dzięki czemu istotnie „wszystko się u niego jak najdokładniej razem trzyma”, co jednak powoduje, że trzeba mieć ustawicznie w pamięci całość odbytej drogi, i co nie pozwala na zrozumienie poszczególnych ustępów, jeśli się ich ustawicznie nie wiąże z całością. To wszystko jest powodem, że Umowa była bardzo rozmaicie wykładana, że przypisywano jej różne tendencje i cele i że wywoływała tysiące pomyłek. Nie jest to wina Russa: jego teoria, gdy się w nią wniknie, odsłania podziwu godną jedność i okazuje się wolna od wewnętrznych sprzeczności. Wymaga jednak i przygotowania, i znacznej cierpliwości, i skupienia się przy badaniu jej prawdziwej treści oraz całkowitego zamknięcia się w kole myśli i określeń autora, cierpliwego kroczenia za nim w miarę rozwijania przezeń swej koncepcji, wyrzeczenia się w końcu wszelkich własnych, skądinąd przyniesionych, a nie z niej tylko czerpanych, środków interpretacji."},{"type":"paragraph","text":"Tak jak różnie Umowę tłumaczono, tak samo różną wyznaczano jej rolę i różny przypisywano jej wpływ na bieg historycznych wypadków. Według bowiem ogólnie przyjętego zdania, Umowa jest zjawiskiem doniosłym nie tylko w dziejach spekulatywnej myśli ludzkiej, ale nadto ma także wybitne znaczenie historyczne, jest ważnym faktem historii politycznej, i to nie tylko francuskiej. A przede wszystkim od dawna przypisywano jej niezmierny, wprost decydujący wpływ na genezę i bieg Wielkiej Rewolucji. Istotnie była dziełem, na które najczęściej może powoływali się działacze rewolucji, i to we wszystkich okresach wielkiego przewrotu, cytowali przy każdej okazji, nim argumentowali i z niego zapożyczali swoje sformułowania Mirabeau i Robespierre, żyrondyści, feuillanci i jakobini. Była największym autorytetem, nieomal biblią rewolucji. A Russo był jednym ze świętych, najbardziej czczonym i w zewnętrznym kulcie skupiającym najwięcej wyznawców. Biusty 19 jego zdobiły sale klubów i ciał prawodawczych, uchwalano dlań pomniki, a ciało jego złożono w Panteonie 20 ."},{"type":"paragraph","text":"Ci jednak, co widzieli w Russie jednego z głównych autorów rewolucji, ci, co starali się złożyć na jego barki zarówno jej zło, jak dobro, upraszczają już zanadto naiwnie jej potężne, groźne i żywiołowe, a wysoce złożone zjawisko. Wywołały je i nadużycia przeszłości całej, i przeżycie się absolutyzmu, niezdolnego już do poradzenia sobie z coraz bardziej nabrzmiałymi problemami politycznymi, społecznymi, ekonomicznymi i skarbowymi, i żywiołowa reakcja przeciw ustrojowi feudalnemu społeczeństwa, gniotącemu nieznośnym ciężarem rozwój żywotnego narodu, krępującemu i duszącemu rozbudzający się do samodzielności stan trzeci. A kierowała rewolucją nie doktryna, nie myśl idealna stwarzała wypadki, lecz raz rozpętana rewolucja toczyła się dalej własnym swym ciężarem, rosła i potężniała, porywając po drodze wszystko, co spotkała, zwalczając coraz to nowe wyrastające przed nią przeszkody i opory, przystosowując się do wymagań tej na śmierć i życie prowadzonej walki. Gra zaostrzonych a sprzecznych interesów klasowych, narodowych, osobistych, religijnych kształtowała raczej rzeczywistość rewolucyjną niż ideologia myślicieli. W ogniu walki na wszystkie fronty nowe wartości życia szukały dla siebie konkretnego wyrazu w formach organizacyjnych i one to formy te wyrzucały. Nie przystosowywały się do doktryny, lecz doktrynę do siebie naginały i budowały ustrój polityczny i społeczny na swoją miarę, a nie na miarę abstrakcji. Teoria dawała pewne gotowe ramy, sformułowania czy hasła, lecz rewolucja chwytała z nich to tylko, co jej z tego było potrzebne, i bez żadnej ceremonii odrzucała wszystko, co jej celom nie odpowiadało, nie dbając, że to, co odrzuciła, stanowi może właśnie najbardziej istotny moment doktryny, którą wywiesiła na swoim sztandarze. Dlatego przy bliższym zbadaniu także wpływ Russa na ludzi rewolucji i na ich działania przedstawia się zupełnie inaczej, niż to wydało się tym, którzy chcieli obserwować rewolucję jedynie z sal klubów i zgromadzeń prawodawczych i zmieścić ją w horyzoncie akademickich dysput i oratorskich popisów reprezentantów narodu i klubowców. Pod cienką powłoką modnych frazesów i haseł kryły się zupełnie realne dążenia i namiętności. One to określały cele i dyktowały metody. Russo przyczynił się bezsprzecznie dziełami swoimi do uświadomienia w społeczeństwie nurtujących je pragnień i potrzeb, dał bardzo silne pchnięcie ruchowi umysłowemu, który poprzedził rewolucję i przygotował ją, rzucił pewne hasła i formuły, które zdawały się syntetycznie ujmować rozbudzone już aspiracje — nie on jednak wywołał rewolucję i nie on był jej kierownikiem. Był tylko jednym z siewców, którzy rzucali ziarna na dobrze już przygotowaną rolę. Rewolucja odżywiała się i tym zbożem, ale tym samym nie zasiewała już własnych swych pól i zakładała sobie za cel nie taką uprawę."},{"type":"paragraph","text":"Co więcej, gdyby się chciała oprzeć na Russie, nie byłaby się nigdy poczęła. Russo bowiem był przeciwnikiem wszelkich rewolucji. Nie wierzył w ich rezultaty, miał przekonanie, że więcej złego niż dobrego przynoszą. Ujemnie oceniał ruchy mas, widział w nich agitację ambitnych jednostek szukających własnych zysków — nad chaos i zdziczenie, nieunikniony, jego zdaniem, owoc przewrotów, przenosił już choćby nie na prawie (jak on je rozumiał) oparty porządek. A już współczesne ludy, także i francuski, uważał za całkowicie niezdolne do stworzenia prawnego społeczeństwa. W polityce praktycznej ostrożny, liczący się z faktycznym stanem rzeczy, tradycjonalista, wierzący, że każdy naród taki ma rząd, na jaki zasługuje i jaki mieć może, przekonany, że ustrój jest wypływem różnych faktycznych sił i że z tą naturą rzeczy walczyć daremnie i niebezpiecznie, determinista raczej i pesymistycznie ujmujący możliwości prób zmiany na lepsze, zniechęcał raczej Russo do realizacji ideału w czynie, a już przestrzegał jak najusilniej przed gwałtownymi poczynaniami. Książka zresztą, w której złożył swe dociekania nad istotą prawności związków społecznych, przez samą już formę swoją i cały swój nastrój jak najmniej nadawała się na narzędzie agitacji rewolucyjnej. Dzieło czysto teoretyczne, nie miało na celu burzyć istniejących porządków. Tak też je zrozumiały owoczesne władze francuskie. Parlament paryski, nakazujący spalenie Emila 21 przez kata, nie zainteresował się Umową i przymknął oczy na rozpowszechnianie we Francji tej książki drukowanej w Hadze."},{"type":"paragraph","text":"By ocenić istotny wpływ Russa na rewolucję, należy choćby w krótkości oświetlić doktryną Russa najważniejsze o prawniczym charakterze pomniki rewolucji. Nasamprzód działalność Zgromadzenia Narodowego Konstytucyjnego 22 . Od samego początku stanęło ono na stanowisku, że jest przedstawicielem zwierzchniczego narodu francuskiego, powołanym do ustanowienia konstytucji. Ustanowienia, a nie tylko opracowania jej projektu. Sobie więc wyłącznie przyznało władzę zwierzchniczą, skoro ono samo miało nadać państwu zasadniczą ustawę. Teoretycznie naród był źródłem tej władzy, wykonywanie jej jednak należało wyłącznie do Zgromadzenia. Powołując się na suwerenność narodu, obracało się Zgromadzenie w kręgach doktryny Russa. Sobie wyłączną władzę ustrojodawczą przyznając, zrywało z Russem. Dla Russa uchwały Zgromadzenia nie byłyby prawem, wszakżeż według niego tylko sam naród może stanowić prawa. I cała dalsza działalność Zgromadzenia odbiega daleko od doktryny Russa. Zgromadzenie przyjęło za swoją teorię Sieyèsa 23 o substancji władzy należącej do narodu i o wykonywaniu tej władzy zawsze i wyłącznie przez reprezentację narodu. U Russa zwierzchnictwo narodu ma najzupełniej pozytywną treść. Dla Zgromadzenia jest jedynie negacją zwierzchniczej władzy króla, jest taranem, którym się rozbija absolutyzm królewski, nie ma jednak żadnego pozytywnego, prawniczego znaczenia. Naród występuje tylko jako wyborca, więc nie jako zwierzchnik w rozumieniu Russa."},{"type":"paragraph","text":"Noc z 4 na 5 sierpnia 1789 r. 24 ziszczała ideał Umowy : równość. Wszystkie przywileje znikły, zmiecione jednym potężnym podmuchem patriotyzmu i miłości. W miejsce stanów, rozdzielających Francję na kilka ściśle prawnie wyodrębnionych grup społecznych, pozostał jeden wielki naród francuski. Ciała pośrednie, tworzące stopnie piramidy społecznej, na szczycie której stał król, rozpłynęły się w jedności narodowej, dymy woli grup, woli egoistycznych stanów rozwiały się, a słońce woli powszechnej mogło nareszcie zaświecić Francji. Feudalizm, ta zmora gnębiąca chłopów i miasta, pogrzebany został na zawsze. Do nastroju tej wiekopomnej nocy, wzruszenia i entuzjazmu elektryzujących zgromadzenie, do porywu, który ogarnął duchowieństwo i szlachtę, trzeba było przygotowania dusz i umysłów, wytworzenia się przekonania, że ta przez wieki uświęcona organizacja społeczna jest zła i niesprawiedliwa. Umowa społeczna z pewnością w tym przygotowaniu odegrała niemałą rolę. Swoim republikanizmem (w etymologicznym znaczeniu) wołała głośno, że wszyscy są równi w społeczności i że wszyscy są równouprawnionymi członkami wspólnej rzeczy, ojczyzny. Szlachta, duchowieństwo, co darli przywileje i rzucali je pod stół prezydenta w zbiorowym uniesieniu entuzjazmu, to czytelnicy Umowy , przejęci nią i ogarnięci jej obywatelskim duchem."},{"type":"paragraph","text":"Drugi sławny akt Zgromadzenia, Deklaracja praw człowieka i obywatela , jest przesiąknięty cały liberalizmem, obcym Russowi, zwolennikowi omnipotencji państwa. Deklaracja wylicza szereg praw jednostki naturalnych, świętych, nieprzenaszalnych i nieprzedawnialnych, pomiędzy nimi własność, praw, których ustawy „nie mają prawa” naruszać i przed którymi wola powszechna musi się zatrzymać. Nazwano Deklarację umową społeczną odrodzonej Francji. Jeżeli jest umową, to nigdy tą Russa, bezwarunkową, której jedyną treścią jest całkowite, bez żadnych zastrzeżeń oddanie się jednostki społeczności. Może być tylko umową Locke’a, w drodze której jednostka przenosi tylko część swoich uprawnień na ogół. Deklaracja ogranicza państwo, według Russa prawnie niczym niezwiązane. Naczelną ideą Deklaracji jest wolność, nie równość, w której Russo wolność roztapia. Równość, której Deklaracja każe państwu przestrzegać jako warunku wolności, równość tylko i wyłącznie wobec prawa, rezygnuje całkowicie z równości faktycznej, której zupełne ziszczenie wprawdzie i Russo za rzecz niemożliwą uznaje, ale do której każe państwu zmierzać przez stosowne normowanie własności. Takie zadanie państwa jest Deklaracji całkowicie obce. Także urządzenia państwowe, mające zabezpieczać prawa wolnościowe, są wzorowane raczej na Monteskiuszu niż na Russie. Z Russa niewiele wzięto: mówi się o zwierzchnictwie narodu, lecz równocześnie dopuszcza pośrednie wykonywanie tego zwierzchnictwa przez przedstawicieli, mówi się o woli powszechnej, lecz równocześnie ogranicza się ją i nie oddaje wyrażania jej narodowi. Wyrazy Russa zostają pozbawione swej ideowej treści, stają się jedynie ornamentem budowli konstruowanej z innego materiału."},{"type":"paragraph","text":"Główne dzieło Zgromadzenia, konstytucja 1791 r., posługuje się terminologią Russa, zdaje się głosić jego zasady. Tylko pozornie. „Władza zwierzchnicza jest jedna, niepodzielna, nieprzenaszalna i nieprzedawnialna; należy do narodu: żadna część narodu ani żadna jednostka nie mogą przyznawać sobie jej wykonania”. Brzmi to jakby żywcem wyjęte z Umowy . Zaraz jednak następny ustęp wali w gruzy to, co tak uroczyście wypowiedział pierwszy: „Naród, od którego jednego tylko wywodzą się wszystkie władze, może je wykonywać jedynie przez delegację. Konstytucja francuska opiera się na zasadzie przedstawicielstwa; przedstawicielami są: ciało prawodawcze i król”. Kościec konstytucji 1791 r. stanowi zasada reprezentacji Monteskiusza i Locke’a. Naród, najwyższy zwierzchnik, jest skrępowany i zakneblowany, wolny jest tylko w chwili wyborów. A nawet wtedy, czy cały jest wolny, czy cały udziela pełnomocnictw swym reprezentantom? Wybory cenzusowe 25 , dwustopniowe tak są obmyślone, by warstwy zamożne musiały mieć większość w ciele prawodawczym. Równość cywilną, przez siebie samą zaprowadzoną, skorygowała Konstytuanta nierównością praw politycznych. Burżuazja, dochodząca do władzy na ruinach feudalizmu, baczy pilnie, by zachować ster państwa w swoich rękach: imieniem narodu egzorcyzmuje tylko marę absolutyzmu. Obywatele czynni i bierni, a podstawą rozróżnienia — majątek! Russo nie uznałby tego nigdy. Jednoizbowość legislatywy 26 starają się uzasadnić argumentem wydobytym z arsenału pojęć Russa: jedna wola powszechna, więc jeden musi być organ wyrażający tę wolę. Chodzi jednak o co innego: obawa odrodzenia się arystokracji, opanowania przez nią twierdzy Izby Wyższej, reminiscencje Izby Lordów — to istotne motywy i silniej działające niż teoretyczne wywody. Król — naczelnik władzy wykonawczej, pierwszy urzędnik narodu, tym go tylko Russo chciał mieć, uznawał bowiem istnienie króla w tak wielkim państwie jak Francja za konieczność. Im większy naród, tym egzekutywa musi być bardziej skoncentrowana, gdyż to tylko może jej zapewnić siłę i energię działania. Więc we Francji monarchia, choć może nie dziedziczna. Tymczasem konstytuanci pozostawiają króla dziedzicznego, ale cały zarząd decentralizują jednocześnie krańcowo i króla czynią bezsilnym. Nawet pozbawiają go całkowicie wpływu na sądownictwo. Za Monteskiuszem osobną władzę z wyborów tworzą, choć Russo nie uznawał takiego zasadniczego rozdziału i w radach dla Polski królowi oddawał wymiar sprawiedliwości. Lecz za to przyznają królowi prawo veta, bardzo mocnego, aczkolwiek nie stanowczego, co znowu z Russa poglądami niezgodne. Cóż więc zostało z Russa w konstytucji 1791 r.? Kilka frazesów, bez żadnego pozytywnego znaczenia, niezwiązanych organicznie z właściwym wątkiem fundamentów konstytucji."},{"type":"paragraph","text":"Rewolucja 10 sierpnia 1792 r. 27 zmiotła monarchię i wyniosła nowych ludzi, demokratów i republikanów, co szczerze wyznawali naukę Russa. Konwent 28 , w powszechnym, choć dwustopniowym głosowaniu wybrany, uchwala na wniosek Dantona zaraz na pierwszym swym posiedzeniu, że nie może być innej konstytucji, jak tylko ta, którą sam naród przyjmie. Także i swoją konstytucję buduje Konwent na fundamentach Russa. Zarówno projekt żyrondystów, jak konstytucja stronnictwa „góry” 29 , uchwalona ostatecznie 24 czerwca 1793 i poddana pod plebiscyt, wywodzą się z Russa. Konstytucja 1793 r. jest na wskroś demokratyczna: nie tylko równość w poprzedzającej ją Deklaracji kładzie w rzędzie praw człowieka, ale istotnie wszystkim równe prawa nadaje, także polityczne. Jest również demokratyczna w tym znaczeniu, że dopuszcza naród bezpośrednio do władzy. Pierwiastek reprezentacyjny uwzględnia, stara się jednak opartym na nim instytucjom wyznaczyć skromniejsze miejsce i przekazać im te tylko funkcje, których naród nie może sam spełniać. W najważniejszych sprawach naród mógł zawsze wystąpić sam i zabrać głos decydujący. Przede wszystkim w ustawodawstwie. Każda ustawa miała się stawać ważna dopiero, gdy nie sprzeciwił się jej naród. A w materiach konstytucyjnych naród miał mieć już nie tylko to prawo veta, ale także nawet prawo inicjatywy. Russo nie domagałby się sam więcej. Naród mógł jednak sprzeciwić się nie tylko ustawom we właściwym tego słowa znaczeniu, lecz nawet budżetowi i wypowiedzeniu wojny. Tak daleko nawet Russo już nie szedł. Naród zatem w konstytucji 1793 r. był naprawdę zwierzchnikiem, ustawy musiały się zgadzać z jego wolą i wola powszechna nareszcie miała zabezpieczone istotne swoje przejawianie się w prawach. Russo triumfował i zdawało się, że odniósł walne za grobem zwycięstwo."},{"type":"paragraph","text":"Lecz konstytucja 1793 r. to tylko teoria Konwentu, której nie myślał nawet od razu wcielać w życie. Odroczył jej wprowadzenie w życie aż do ukończenia wojny, niektórzy nawet twierdzą, że cała ta konstytucja była po prostu manewrem politycznym. Więcej niż doktryny zajmowała Konwent wojna o niepodległość Francji, o całość Republiki Francuskiej, o sam byt narodu. Zanim mógł pomyśleć o urzeczywistnieniu idealnego ustroju, musiał ocalić ojczyznę, pokonać wrogów wewnętrznych i zewnętrznych, wydobyć państwo z tylu niebezpieczeństw, z tak straszliwej toni, w jakiej nie znalazło się może nigdy przedtem. Rządził sam, a typ rządów, jaki wytworzył, i metody, jakimi się posługiwał, nie mają nic wspólnego z Russem ani z jakimkolwiek innym teoretykiem. Rządy Konwentu stworzyły potrzeby chwili, wymagania ciągle zmieniającego się, a coraz groźniejszego położenia, konieczność wydobycia wszystkich sił, chwycenia się wszystkich środków, byle zwalczyć wrogów i uratować ojczyznę i rewolucję. Konwent zespala w sobie całą władzę, jest absolutnym panem, wydaje prawa i wykonuje je, rządzi samowładnie za pośrednictwem swych komitetów. A raczej sam jest narzędziem polityków, opanowujących przy pomocy motłochu Paryża władzę w komitetach, trzymających grozą w posłuchu Konwent i całą Francję. Kulminacyjny punkt rządów rewolucyjnych przedstawia się jako dyktatura Robespierre’a 30 w Komitecie Ocalenia Publicznego 31 , dyktatura Komitetu w Konwencie, dyktatura Konwentu nad Francją. Robespierre trzyma w karbach Konwent przez Gminę Paryża i jej sekcje oraz przez klub jakobinów, Paryż jest miastem kierującym losami całego kraju, frakcja „góry” ciałem uprzywilejowanym, narzucającym swą wolę całemu narodowi. A metodą rządzenia terror, prawa wyjątkowe, sądy nadzwyczajne i gilotyna. Ustawa o podejrzanych śle do więzień całe pewne kategorie obywateli, potworna ustawa z 21 prairiala zdaje ich na łaskę i niełaskę Trybunału Rewolucyjnego i jego prokuratora, odmawiając im nawet ochrony form proceduralnych. Milczą prawa, króluje strach. Idą pod nóż gilotyny bogaci i nędzarze, arystokraci i plebejusze, wszyscy podejrzani o sprzyjanie emigrantom i koalicji, o zdradę, szpiegostwo, organizowanie powstań prowincjonalnych, o spekulacje asygnatami, o oszustwa przy dostawach wojskowych. Wszyscy, co osłabiają wysiłek obrony narodowej, co burzą konieczną jedność i karność. Idą pod nóż rywale dyktatora, żyrondyści, hebertyści, dantoniści, co ośmielają się inaczej niż on myśleć, podejrzani, że mogliby pokusić się o jego władzę. Idą generałowie nieumiejący zwyciężać. Wszystko to z doktryną Russa nie ma nic wspólnego. Despotyzm i terror nie dają się pogodzić żadną miarą z Umową społeczną i winić za nie Russa może chyba ten tylko, co nigdy go nie pojął 32 . Jeżeli nawet wprowadzanie przez Robespierre’a kultu Istoty Najwyższej tkwi swoim pomysłem w ostatnim rozdziale Umowy , toć 33 to tylko epizod, nie związany ściśle z istotą ustroju rządów rewolucyjnych i z całym ich systemem rządzenia."},{"type":"paragraph","text":"Teoria zatem przedtermidorowego Konwentu, skrystalizowana w konstytucji 1793 r., a jego praktyka — to dwa różne światy. A po termidorze 34 nawet teoria zrywa z Russem. Konstytucja roku III (Dyrektoriatu 35 ), opierająca ustrój na zasadzie reprezentacyjnej, na ścisłym rozdziale trzech władz, na wyborach cenzusowych i pośrednich, wprowadzająca dwuizbowość legislatywy i kolegialność egzekutywy, raczej już znowu do Monteskiusza nawraca. Jedyny ślad nauki Russa to poddanie i tej także konstytucji pod plebiscyt. Ale to konieczność prawniczej natury, skoro tamtą, niewprowadzoną w życie naród uchwalał, a nadto silny atut przeciw niezadowolonym marzycielom — demokratom. W rzeczywistości zarówno ten plebiscyt z roku III, jak i późniejsze Napoleońskie z roku VIII, X, XII 36 , mają na celu wywołać zrzeczenie się przez naród praw, które Russo za niezbywalne uznał, i przeniesienie ich zrazu na ciała reprezentacyjne, później na konsula i cesarza."},{"type":"paragraph","text":"Taka jest rola Russa Umowy w Wielkiej Rewolucji, sprowadzona do właściwej miary. Rozbudził wraz z innymi krytycyzm względem istniejących urządzeń, rzucił kilka haseł: równości, zwierzchnictwa narodu, panowania woli powszechnej, poddania władzy rządowej prawu, haseł, które rewolucja wypisała na swym sztandarze, nauczył patriotyzmu, republikanizmu w znaczeniu obywatelskości, otworzył bogaty spichlerz frazeologii, poddał słowa powtarzane z lubością i modne. Ale inspiratorem wypadków i dzieł rewolucji nie był. Polityczna retoryka, jeden tekst konstytucji nigdy niewprowadzony w życie, zapewne także niechęć do „frakcji”, niepozwalająca partiom zorganizować się w stronnictwa w dzisiejszym tego słowa znaczeniu, niechęć przezwyciężona we Francji dopiero w czasach Restauracji 37 — to cały prawie wkład Russa do rewolucji. On sam podpisałby z pewnością w całości czyn nocy z 4 na 5 sierpnia, ale była ona wynikiem długiego procesu dziejowego, nagłym wytryskiem sił od dawna gromadzących się w narodzie i dojrzałych do zerwania sztucznych tam. I jedna jeszcze stała tendencja rewolucji: oparcia całego życia zbiorowego na prawie, urzeczywistnienia ideału państwa praworządnego, ma w Russie swego poprzednika i propagatora. Tę jednak zasługę musi on dzielić ze wszystkimi innymi filozofami i teoretykami prawno-politycznymi wieku oświecenia, boć 38 to było głównym celem rozważań i projektów ich wszystkich."},{"type":"paragraph","text":"Jakkolwiek jest, należy widzieć w Russie tego, który pierwszy z taką siłą logiki i uczucia głosił zasady demokratyzmu i prawności. On pierwszy oparł prawność na demokracji (w dzisiejszym znaczeniu). A przez to stał się wielkim rodzicem wszystkich współczesnych społeczeństw. Jemu także śmiało można przypisać uznanie praw narodów do samostanowienia, ideę plebiscytów jako podstawy włączenia pewnych terytoriów do danych organizmów państwowych, ideę przez Wilsona 39 tak mocno głoszoną, w traktatach pokojowych przeprowadzoną tylko z wielkimi ograniczeniami i niezbyt konsekwentnie. Na współczesne prawno-polityczne urządzenia wywarł mniejszy wpływ, tak samo jak na konstytucyjne twory rewolucji. Ale i na tym także terenie daje się zauważyć jak gdyby nawrót do Russa. Nowe konstytucje zdają się szukać w plebiscycie, w referendum lekarstwa na różne niedomagania ustroju parlamentarnego. Do Szwajcarii, ojczyzny Russa i ludowego ustawodawstwa, sięgają po wzory konstytucje Niemiec, Czechosłowacji, Republiki Austriackiej, dopuszczając naród w pewnych wypadkach do bezpośredniego głosu w ustawodawstwie. Russo zdaje się stawać na nowo aktualny i budzi na nowo duże zainteresowanie. Świadczy o tym liczna i bogata literatura o nim, która po przyćmieniu jego sławy w XIX w. wzrasta obecnie ciągle nieustannie, zwłaszcza od 1912 r., roku dwóchsetnej rocznicy urodzin Russa."},{"type":"paragraph","text":"IV. Umowa społeczna w Polsce końca XVIII w."},{"type":"paragraph","text":"Sława Russa i jego niezwykłych teorii dotarła rychło do Polski. Elita umysłowa i towarzyska ostatniej ćwierci XVIII w., rozmiłowana w kulturze i obyczaju francuskim, dość wcześnie zapoznała się z jego pismami, wraz z innymi także i z Umową społeczną . Polska, szczycąca się swym republikanizmem i demokratyzmem, dumna była, że jej naczelne hasła znalazły tak znakomitego i wymownego głosiciela na Zachodzie. Ten, który wszelką prawność zasadzał na zachowaniu wolności, musiał znaleźć oddźwięk w społeczeństwie, które wolność nade wszystko ceniło. Przecież wszystkie sejmy rozbrzmiewały frazesami o wolności, równości, wszechwładzy narodu, podporządkowaniu władzy królewskiej jego woli."},{"type":"paragraph","text":"Że jednak przepaść dzieliła świat pojęć szlacheckich od świata pojęć Russa, że zupełnie inne znaczenie miały te same słowa u niego, aniżeli w Polsce, z tego mało kto zdawał sobie sprawę. Na ogół czytano Umowę przez szkła zakorzenionych w szlacheckich głowach przesądów, nie rozumiano jej też przeważnie zupełnie i interpretowano najfałszywiej w świecie. Książka, przez którą obywatel genewski chciał uprawnić społeczeństwo, ugruntować obowiązek społeczny na nienaruszalnych podstawach rozumu, więź społeczną ścieśnić i opleść nią jednostkę tak, by już tylko żyła życiem powszechności — książka ta zdała się Polakom sankcjonować ich złotą wolność. Książka, przez którą Russo chciał uzasadnić całkowite poddanie się jednostki ogółowi, postawić każdemu obywatelowi za cel powszechność i sprawić, by interesy prywatne zlały się zupełnie z interesem ojczyzny — książka ta zdała się Polakom sankcjonować wybujałość wolności, nieograniczoną swobodę szlachecką i niepodleganie nikomu. Szlachcic, szlachcica tylko za człowieka mający, gardzący mieszczaninem, z chłopem jak z rzeczą postępujący, zachwycał się teorią Russa równości powszechnej, nie czując jej głębokiego humanitaryzmu, nie zdając sobie sprawy, że ta równość wypływa z najmocniejszego dążenia ku sprawiedliwości i że nie może nie obejmować wszystkich ludzi. Szlachcic indywidualista, nie znający granic w kulcie swojego „ja”, w głębi duszy, jak Ludwik XIV 40 , mówiący „ojczyzna to ja”, nie był zdolny zrozumieć uniwersalistycznego nastawienia teorii Umowy ani pojąć jego koncepcji państwa, jako w całkowitą jedność moralną zespolonego ogółu obywateli; prywatą rządzący się, puszczał mimo ucha głośne wołanie Szwajcara, że jeden jest tylko usprawiedliwiony interes: powszechny. Zwolennik zwierzchnictwa narodu, dlatego, by każdy szlachcic mógł narzucić swą wolę wszystkim przez liberum veto i zasłaniać tym swoim politycznym prawem swoją własną samowolę i swój anarchiczny brak uczuć społecznych, wynosił pod niebiosa Russa za teorię tego zwierzchnictwa, nie widząc, że ma ono na celu zabezpieczyć całość przed arbitralnością jednostki, stać na straży panowania prawa w społeczeństwie, dać suwerenność woli powszechnej. Walczący z widmem absolutum dominium 41 , rozprzęgający władzę wykonawczą, obezwładniający państwo i odbierający mu wszelką siłę, przytakiwał Russowi za jego nieufność wobec dziedzicznych królów, za jego troskę o środki utrzymywania egzekutywy w szrankach prawa, nie zwracał jednak uwagi na to, że ten sam Russo chciał mieć władzę rządową silną, zdolną do energicznego spełniania swych zadań, trzymającą kierownictwo narodem, że głosił potrzebę skoncentrowania władzy wykonawczej w wielkich państwach i że uznał rozbity i niejednolity rząd polski za najgorszy."},{"type":"paragraph","text":"W takim stanie rzeczy trudno jest mówić o wyznawcach Russa w konserwatywnym, szlacheckim obozie. Raczej należałoby mówić o pomyłkach z Russem. Jednym też wielkim nieporozumieniem jest powoływanie się na Russa i chwalenie go przez publicystów staroszlacheckiego obozu, zachowawców, którzy w okresie Sejmu Czteroletniego bronili dotychczasowego ustroju, odżegnywali się od wszelkich reform jak od największego zła i upatrywali zbawienie w zniesieniu tych wszystkich nowości, które wprowadzano do ustroju od czasu wstąpienia na tron Stanisława Augusta. Tacy Rzewuscy, hetman polny koronny Seweryn i kasztelan witebski Adam Wawrzyniec, maniacy niebezpieczeństw grożących wolności ze strony króla, uważający niezawisłość władzy hetmańskiej za oś polskiej niepodległości, co o najlżejszej poprawie doli chłopa słyszeć nie chcieli, uznając chłopów za poddanych szlachty, a nie Rzeczypospolitej, co liberum veto za źrenicę wolności mieli, chyba tylko ironicznie mogą być nazywani uczniami Russa. Veto dla nich wolnością, ucisk mieszczan i chłopów, bezsilność króla i wolna elekcja — to gwarancje praw narodu. Obezwładnienie króla jedynym celem ich polityki, według tego rachunku budują całą machinę ustrojową, dlatego nie chcą nawet powiększenia wojska. Z własnych plew oni chleb swój pieką i z Russa wzięte ziarna z tymi plewami mielą, tak że ziarn nawet w takiej mące nie czuć. Cóż może być wspólnego pomiędzy tymi dumnymi i anarchicznymi oligarchami a apostołem organicznej społeczności i powszechnej równości? Nie można winić Russa za tępotę tych głów, za nieprawdopodobny zamęt ich pojęć i za zamroczenie ich dusz stanowym egoizmem."},{"type":"paragraph","text":"Do publicystów konserwatywnego obozu należy też zaliczyć Michała Wielhorskiego . O wiele on wcześniej od Rzewuskich wystąpił, bo w 1775 r., a Russa znał nie tylko z pism. Wszedł z nim w bliższe, osobiste stosunki, bawiąc jako poseł generalicji konfederacji barskiej 42 w Paryżu, i dla niego to spisał filozof swoje Uwagi nad rządem Polski . Wielhorski znacznie wyżej stoi od tamtych zakamieniałych chwalców ustroju z czasów saskich, wyżej i szczerym przejęciem się nieszczęściami ojczyzny i myślą obejmującą szersze widnokręgi. Rozumie on konieczność głębokich reform i przebudowania od gruntu zarówno sejmu, jak rządu. Wolność dominuje jednak u niego, jak u tamtych główną troską jego jest, jak zapobiec absolutum dominium . Jest republikaninem gorącym, ale republikaninem szlacheckim i ogranicza Rzeczpo
