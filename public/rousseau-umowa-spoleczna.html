"paragraph","text":"Postawiono pytanie 150 , w jaki sposób poszczególni ludzie, nie mając prawa rozporządzać swym własnym życiem, mogą przenieść na zwierzchnika to prawo, którego nie posiadają. Zagadnienie to wydaje się trudne do rozwiązania dlatego tylko, że jest źle postawione. Każdy człowiek ma prawo narażać swe życie dla zachowania go. Czyż człowieka rzucającego się przez okno w ucieczce przed pożarem uważano kiedy za winnego samobójstwa? Czyż nawet kiedykolwiek obwiniono o tę zbrodnię człowieka, który zginął podczas burzy, choć wsiadając na okręt, zdawał sobie sprawę z jej niebezpieczeństwa?"},{"type":"paragraph","text":"Umowa społeczna ma na celu zachowanie umawiających się. Kto pragnie celu, pragnie także środków, a środki te są nieodłącznie związane z pewnym ryzykiem, nawet z pewnymi stratami. Kto chce zachować swe życie kosztem drugich, w potrzebie winien je także oddać za nich. Otóż obywatel nie jest już całkiem sędzią niebezpieczeństwa, na które prawo chce, by się naraził; i gdy doń książę 151 mówi: „Korzystnie jest dla państwa, byś umarł”, winien umrzeć, skoro pod tym tylko warunkiem żył dotychczas w bezpieczeństwie i skoro życie jego nie jest już tylko dobrodziejstwem przyrody, lecz warunkowym darem państwa."},{"type":"paragraph","text":"Na karę śmierci, stosowaną wobec zbrodniarzy, można patrzeć mniej więcej z tego samego punktu widzenia: By nie stać się ofiarą mordercy, jednostka zgadza się ponieść śmierć w razie, gdyby sama stała się zbrodniarzem. I kiedy zawiera tę umowę, wówczas daleka od tego, by rozporządzać swoim życiem, myśli jedynie, by je zabezpieczyć, i nie można przypuścić, iżby ktoś z umawiających się przemyśliwał wówczas o tym, by dać się powiesić 152 ."},{"type":"paragraph","text":"Każdy zresztą złoczyńca, porywając się na prawo społeczne, staje się przez swe zbrodnie buntownikiem i zdrajcą ojczyzny; gwałcąc jej prawa, przestaje być jej członkiem, a nawet prowadzi z nią wojnę. Wówczas zachowanie państwa nie da się pogodzić z jego zachowaniem przy życiu; musi zginąć jedna lub druga strona; i gdy się zadaje śmierć winowajcy, to nie tyle jako obywatelowi, ile jako nieprzyjacielowi. Formy procesowe, wyrok dostarczają dowodów i stwierdzenia, że złamał układ społeczny i że wskutek tego przestał być członkiem państwa. Otóż, skoro uznał się członkiem państwa, choćby tylko przez fakt przebywania w państwie, powinien być z państwa usunięty przez wygnanie, jako naruszający układ, albo przez śmierć, jako nieprzyjaciel publiczny; taki nieprzyjaciel bowiem nie jest osobą moralną, jest człowiekiem: a wtedy właśnie zabicie pokonanego jest prawem wojny 153 ."},{"type":"paragraph","text":"Powie mi ktoś jednak, że skazanie zbrodniarza jest aktem szczególnym. Zgoda; toteż to skazanie nie należy wcale do zwierzchnika; jest to prawo, które może on nadać, nie mogąc sam go wykonywać. Wszystkie moje poglądy wiążą się, ale nie mogę ich wszystkich wyłożyć naraz."},{"type":"paragraph","text":"Zresztą, częste wyroki śmierci są zawsze oznaką słabości lub lenistwa w rządzie. Nie masz złego człowieka, którego nie można by było uczynić dobrym do czegoś. Ma się prawo zadać śmierć, nawet dla przykładu, tylko temu, którego bez niebezpieczeństwa nie można zachować przy życiu."},{"type":"paragraph","text":"Co się tyczy prawa ułaskawienia lub darowania winowajcy kary przepisanej przez prawo i orzeczonej przez sędziego, należy ono tylko do tego, kto jest ponad sędzią i ponad prawem, tzn. do zwierzchnika; a jeszcze prawo jego w tym względzie nie jest zupełnie jasne 154 , a wypadki korzystania z niego są zaiste bardzo rzadkie. W dobrze rządzonym państwie mało jest wypadków karania, nie dlatego, że się wielu ułaskawia, lecz dlatego, że mało jest zbrodniarzy; gdy państwo ginie, mnogość zbrodni zapewnia im bezkarność. Za czasów republiki rzymskiej nigdy senat ani konsulowie nie usiłowali ułaskawiać; lud sam nawet nie stosował łaski, aczkolwiek czasem znosił swój wyrok. Częste ułaskawienia zwiastują, że wkrótce zbrodnie nie będą już ich potrzebować, a każdy widzi, do czego to prowadzi. Czuję jednak, że serce me szemrze i wstrzymuje me pióro; pozostawmy rozpatrywanie tych zagadnień człowiekowi sprawiedliwemu, co nigdy nie zbłądził i co nigdy sam nie potrzebował łaski."}]},{"id":"rozdział-vi-o-prawie","number":20,"title":"Rozdział VI. O prawie","blocks":[{"type":"paragraph","text":"Przez układ społeczny daliśmy byt i życie ciału politycznemu: idzie teraz o to, by mu nadać ruch i wolę przez prawodawstwo. Akt pierwotny bowiem, za pomocą którego ciało to tworzy się i jednoczy, nie określa jeszcze wcale, co ono winno czynić, by się zachować 155 ."},{"type":"paragraph","text":"Wszystko, co jest dobre i zgodne z porządkiem, jest tym z natury rzeczy i niezależnie od ludzkich umów. Wszelka sprawiedliwość pochodzi od Boga, on jeden jest jej źródłem; gdybyśmy jednak umieli otrzymywać ją z tak wysoka, nie potrzebowalibyśmy ani rządu, ani praw. Bez wątpienia istnieje sprawiedliwość powszechna, będąca przejawem samego rozumu; sprawiedliwość ta jednak, by być przez nas przyjęta, musi być wzajemna. Biorąc rzeczy po ludzku, prawa sprawiedliwości, w braku naturalnych sankcji, próżne są dla ludzi; stwarzają jedynie dobro złego, a zło sprawiedliwego, gdy ten zachowuje je wobec wszystkich, a nikt ich nie zachowuje wobec niego. Trzeba więc umów i praw, by związać prawa z obowiązkami i sprowadzić sprawiedliwość do jej treści. W stanie natury, gdzie wszystko jest wspólne, nic nie jestem winien tym, którym nic nie przyrzekałem; uznaję, że do innych należy to tylko, co mnie nie jest potrzebne. Inaczej mają się rzeczy w stanie społecznym, w którym wszystkie podmiotowe prawa ustala prawo 156 ."},{"type":"paragraph","text":"Czymże jednak w końcu jest prawo? Dopóki będziemy zadowalać się podkładaniem pod to słowo metafizycznych jedynie idei, dopóty będziemy rozumować, nie rozumiejąc się wzajemnie; i gdy powiemy, czym jest prawo natury, nie będziemy jeszcze przez to wiedzieć, czym jest prawo państwa 157 ."},{"type":"paragraph","text":"Powiedziałem już, że nie ma woli powszechnej odnośnie do szczegółowego przedmiotu. W istocie, ten szczegółowy przedmiot jest wewnątrz lub na zewnątrz państwa. Jeśli jest na zewnątrz państwa, wola, która dlań jest obca, nie jest wcale powszechna w stosunku do niego; jeżeli zaś ten przedmiot jest wewnątrz państwa, stanowi jego część; wówczas zaś wytwarza się między całością a jej częścią stosunek, który robi z nich dwie oddzielne istności: jedną z nich jest część, drugą zaś całość pomniejszona o tę część. Całość jednak pomniejszona o część wcale nie jest całością; i dopóki utrzymuje się ten stosunek, nie masz całości, lecz są dwie nierówne części; skąd wynika, że wola jednej nie jest bynajmniej także powszechna odnośnie do drugiej."},{"type":"paragraph","text":"Gdy jednak cały naród stanowi o całym narodzie, ma jedynie na uwadze samego siebie; i jeżeli wówczas powstaje jakiś stosunek, to jest to stosunek całego przedmiotu, wziętego z pewnego punktu widzenia, do całego przedmiotu, wziętego z innego punktu widzenia, bez żadnego podziału całości. Wówczas materia, co do której się stanowi, jest powszechna, tak jak wola, która stanowi. Ten właśnie akt nazywam prawem 158 ."},{"type":"paragraph","text":"Mówiąc, że przedmiot praw jest zawsze powszechny, rozumiem przez to, że prawo rozważa poddanych w całości, działania zaś w oderwaniu, a nigdy człowieka jako indywiduum ani jakąś poszczególną działalność. Tak więc prawo może postanowić, że będą istnieć przywileje, jednak imiennie nie może udzielić ich nikomu; prawo może utworzyć kilka klas obywateli, nawet oznaczyć właściwości nadające prawo tym klasom, nie może jednak wymieniać tego lub owego, że ma być do nich przyjęty; może ustanowić rząd królewski i dziedziczne następstwo, nie może jednak wybrać króla ani powołać rodziny królewskiej; jednym słowem, żadna funkcja odnosząca się do indywidualnego przedmiotu nie należy do władzy prawodawczej."},{"type":"paragraph","text":"Przy takim rozumieniu dostrzeżemy natychmiast, że nie należy już pytać, do kogo należy wydawanie praw, skoro są one aktami woli powszechnej; ani też, czy władca stoi ponad prawem, skoro jest członkiem państwa; ani czy prawo może być niesprawiedliwe, skoro nikt nie jest niesprawiedliwy wobec samego siebie; ani w jaki sposób jest się wolnym i podległym prawom, skoro prawa są jedynie rejestrami naszych woli."},{"type":"paragraph","text":"Widzimy nadto, że skoro prawo jednoczy powszechność woli z powszechnością przedmiotu, tedy to, co człowiek jakiś, kimkolwiek by on był, rozkazuje sam z siebie, nie jest wcale prawem; to nawet, co rozkazuje zwierzchnik odnośnie do szczegółowego przedmiotu, jest także nie prawem, ale dekretem; ani też aktem zwierzchniczym, ale aktem wykonawczym."},{"type":"paragraph","text":"Nazywam więc republiką każde państwo rządzone przez prawa, jakikolwiek miałoby ono ustrój zarządu; wówczas tylko bowiem rządzi interes publiczny i rzecz publiczna coś znaczy. Każdy rząd prawny jest republikański 159 160 ; później wytłumaczę, co to jest rząd."},{"type":"paragraph","text":"Prawa są w istocie jedynie warunkami stowarzyszenia społecznego. Naród, podległy prawom, powinien być ich twórcą; normowanie warunków stowarzyszenia należy tylko do tych, co się stowarzyszają. Lecz jakoż je unormują? Czy wspólną zgodą, w drodze nagłego natchnienia? Czy ciało polityczne ma organ do wypowiadania swej woli? Któż mu da zdolność przewidywania, konieczną do przedsiębrania aktów tej woli i ogłaszania ich z góry? Lub jakżeż wypowie je w chwili potrzeby? Jakżeż ślepy tłum, często niewiedzący, czego chce, albowiem rzadko wie, co jest dla niego dobre, miałby wypełnić zadanie tak wielkie, tak trudne, jak zbudowanie systemu prawodawstwa? Sam z siebie naród chce zawsze dobra, ale nie zawsze sam z siebie je widzi. Wola powszechna jest zawsze prosta, sąd jednak, co nią kieruje, nie zawsze jest oświecony 161 . Trzeba jej ukazać przedmioty takimi, jakie są, niekiedy takimi, jakimi trzeba, by jej się wydały, wskazać jej dobrą drogę, której szuka, ochronić ją przed uwiedzeniem ze strony woli szczególnych, przybliżyć do jej oczu miejsca i czasy, zrównoważyć ponętę doraźnych i łatwo dających się spostrzec korzyści — niebezpieczeństwem zła odległego i ukrytego. Jednostki widzą dobro, które odrzucają; powszechność chce dobra, którego nie widzi. Wszyscy na równi potrzebują kierowników. Należy zobowiązać jednostki do przystosowywania woli do rozumu; należy powszechności uświadomić to, czego chce. Wówczas oświecenie powszechne sprowadza połączenie rozumu i woli w ciele społecznym; stąd ścisłe współdziałanie części i w końcu największa siła całości. Oto skąd rodzi się konieczność prawodawcy 162 ."}]},{"id":"rozdział-vii-o-prawodawcy","number":21,"title":"Rozdział VII. O prawodawcy","blocks":[{"type":"paragraph","text":"Dla wykrycia najlepszych norm społecznych odpowiadających narodom potrzeba wyższej inteligencji, która widziałaby wszystkie namiętności ludzkie, nie odczuwając żadnej z nich; która nie miałaby żadnego związku z naturą naszą, a znała ją jednak do gruntu; której szczęście byłoby niezależne od nas wszystkich, a która mimo to zechciałaby zająć się naszym; która by w końcu, przygotowując sobie w postępie czasów daleką sławę, mogła pracować w jednym wieku, używać zaś (owoców zasługi) w innym 163 . Do nadawania praw ludziom trzeba by bogów."},{"type":"paragraph","text":"Tak samo jak Kaligula odnośnie do rzeczywistości faktycznej, rozumował i Platon 164 odnośnie do prawa, by zdefiniować człowieka społecznego, czyli królewskiego, jakiego poszukuje w księdze swej o Panowaniu 165 . Jeśli prawdą jest, że wielki władca zjawia się rzadko, o ileż bardziej dotyczy to wielkiego prawodawcy? Pierwszy ma iść jedynie za wzorem, który zaprojektował drugi. Ten jest mechanikiem, który wynalazł maszynę, ów jest tylko robotnikiem, który ją zestawia i wprawia w ruch. Monteskiusz powiada 166 : „U kolebki społeczeństw naczelnicy republik tworzą urządzenia, następnie zaś urządzenia tworzą naczelników republik”."},{"type":"paragraph","text":"Ten, kto waży się przedsięwziąć nadanie urządzeń jakiemuś narodowi, powinien czuć się na siłach, by, że się tak wyrażę, zmienić naturę ludzką, przekształcić każdą jednostkę, co sama przez się jest całością doskonałą i samotną, w cząstkę większej całości, od której jednostka ta otrzymuje w pewnej mierze życie swe i istnienie; osłabić ustrój człowieka, by go wzmocnić; podstawić w miejsce bytu fizycznego i niezależnego, jaki wszyscy otrzymaliśmy od natury, byt częściowy i moralny. Ma, jednym słowem, odjąć człowiekowi własne jego siły, by dać mu siły, które są dlań obce, a których nie mógłby używać bez pomocy drugich. Im bardziej te naturalne siły są martwe i unicestwione, tym są większe i trwalsze, tym są stalsze, także i doskonalsze; tak że jeżeli każdy obywatel jest niczym i nic nie może jak tylko przez innych oraz jeżeli siła nabyta przez całość jest równa lub wyższa od sumy sił wszystkich jednostek, wówczas można powiedzieć, że prawodawstwo wzniosło się do najwyższego stopnia doskonałości, jaki mogło osiągnąć."},{"type":"paragraph","text":"Prawodawca jest pod każdym względem człowiekiem w państwie nadzwyczajnym. Jeśli powinien być nim przez swój geniusz, nie mniej jest nim przez swoją godność. Nie jest to urząd, nie jest to zwierzchnictwo. Godność ta, dzięki której republika otrzymuje swój ustrój, nie stanowi części tego ustroju; jest to funkcja specjalna i wyższa, niemająca nic wspólnego z ludzkim panowaniem; o ile bowiem ten, kto rozkazuje ludziom, nie powinien rozkazywać prawom, także i ten, kto rozkazuje prawom, nie powinien rozkazywać ludziom; inaczej prawa te, będąc służebnikami jego namiętności, uwieczniałyby często tylko jego niesprawiedliwości; nie mógłby nigdy umknąć, by osobiste względy nie wypaczyły świętości jego dzieła."},{"type":"paragraph","text":"Gdy Likurg nadawał prawa ojczyźnie, zaczął od złożenia swego królewskiego urzędu. Było zwyczajem większości miast greckich powierzać cudzoziemcom urządzenie swych zwyczajów prawnych. Nowoczesne włoskie republiki często naśladowały ten zwyczaj; tak samo uczyniła republika genewska, i dobrze na tym wyszła 167 . Rzym w najpiękniejszej swej epoce ujrzał odradzające się w swym łonie wszystkie zbrodnie tyranii i ujrzał się bliski zgonu dlatego, że połączył w jednych rękach 168 władzę prawodawczą i władzę zwierzchniczą."},{"type":"paragraph","text":"A jednak nawet decemwirowie 169 nigdy nie przywłaszczyli sobie prawa wydawania ustaw własną swą władzą. Mówili narodowi: „Nic z tego, co wam proponujemy, nie może stać się ustawą bez waszej zgody. Rzymianie, bądźcie sami twórcami praw, które mają wam dać szczęście”."},{"type":"paragraph","text":"Ten więc, kto układa prawa, nie ma, względnie nie powinien mieć żadnego prawa ustawodawczego, i naród nawet nie może, choćby sam chciał, pozbawić się tego prawa nieprzenaszalnego, ponieważ według podstawowego układu jedynie wola powszechna zobowiązuje jednostki — i ponieważ co do tego, iż jakaś wola szczególna zgodna jest z wolą powszechną, można upewnić się jedynie przez poddanie jej pod wolne głosowanie narodu 170 ; powiedziałem to już, ale nie jest rzeczą zbyteczną to powtórzyć."},{"type":"paragraph","text":"W ten sposób w dziele prawodawczym znachodzi się 171 równocześnie dwie rzeczy pozornie niedające się pogodzić: przedsięwzięcie przechodzące siły ludzkie, zupełny brak władzy."},{"type":"paragraph","text":"Inna trudność zasługująca na uwagę. Mędrcy, chcący przemawiać do pospólstwa swoim, nie zaś jego językiem, nie będą przezeń rozumiani. Otóż jest tysiąc rodzajów myśli, których nie można przełożyć na język ludowy. Niedostępne mu są zarówno zbyt ogólne poglądy, jak zanadto odległe przedmioty: każda jednostka, podobając sobie tylko w takim planie rządu, jaki dotyczy jej szczególnego interesu, z trudnością spostrzega korzyści, które winna odnieść z ustawicznych ofiar, jakich wymagają dobre prawa. Na to, by rodzący się naród mógł zasmakować w zdrowych prawidłach polityki i iść za podstawowymi zasadami racji stanu, trzeba, by skutek stał się przyczyną; by duch społeczny, mający być dziełem urządzeń, przewodniczył już przy ich zaprowadzaniu; i by ludzie przed wprowadzeniem prawa byli już tym, czym powinni się stać dzięki prawom. Tak więc prawodawca, który nie może użyć ani siły, ani argumentów 172 , musi koniecznie uciec się do autorytetu z innej dziedziny, autorytetu, który mógłby pociągnąć bez gwałtu i nakłonić bez przekonywania."},{"type":"paragraph","text":"Oto co było zawsze powodem, że ojcowie narodów musieli uciekać się do pośrednictwa nieba i własną swoją mądrość przypisywać bogom, aby narody, podlegając prawom państwa tak, jak prawom przyrody, i uznając tę samą władzę w stworzeniu człowieka i w stworzeniu państwa, dobrowolnie słuchały i chętnie dźwigały jarzmo szczęśliwości publicznej."},{"type":"paragraph","text":"Wyroki tego samego szczytnego rozumu, co wznosi się ponad horyzonty pospolitych ludzi, wkłada prawodawca w usta nieśmiertelnych, by boskim autorytetem pociągnąć tych, których nie mogłaby wzruszyć mądrość ludzka 173 . Nie każdy jednak człowiek może kazać przemawiać bogom, ani też im swą wiarę narzucać, podając się za ich tłumacza. Jedynym cudem, który winien dowodzić jego misji, jest wielkość jego duszy. Każdy człowiek może wykuć kamienne tablice lub przekupić wyrocznię, lub udać tajemne obcowanie z jakimś bóstwem, lub wytresować ptaka, by mu mówił do ucha, lub znaleźć jakiś inny gruby środek omamienia narodu. Kto by tylko to umiał, może dzięki przypadkowi zebrać gromadę szaleńców, ale nigdy nie założy państwa i dziwaczne jego dzieło razem z nim ginie. Marne cuda tworzą przelotne więzy; mądrość jedynie daje im trwałość. Zakon 174 żydowski, zawsze trwający, zakon syna Ismaela 175 , rządzący od dziesięciu wieków połową świata, świadczy dziś jeszcze o wielkości ludzi, co go podyktowali; i gdy dumna filozofia lub zaślepiony stronniczością umysł widzi w nich tylko szczęśliwych oszustów 176 , to prawdziwy polityk podziwia w ich urządzeniach ten wielki i potężny geniusz, który przewodniczy trwałym dziełom."},{"type":"paragraph","text":"Z tego wszystkiego nie trzeba wyciągać wniosku razem z Warburtonem 177 , że wśród nas polityka i religia mają ten sam przedmiot, lecz że u kolebki narodów jedna służy za narzędzie drugiej."}]},{"id":"rozdział-viii-o-narodzie","number":22,"title":"Rozdział VIII. O narodzie","blocks":[{"type":"paragraph","text":"Jak architekt, zanim wzniesie wielki gmach, obserwuje i zgłębia grunt, by przekonać się, czy zniesie ciężar gmachu, tak i mądry twórca urządzeń nie zaczyna od ułożenia praw dobrych samych w sobie, lecz przedtem bada, czy naród, któremu je przeznacza, jest zdolny je wytrzymać. Dlatego Platon odmówił nadania praw Arkadyjczykom i Cyrenejczykom, wiedząc, że obydwa te narody były bogate i nie mogły znosić równości; dlatego na Krecie były dobre prawa, ale źli ludzie, Minos 178 bowiem dał urządzenia narodowi pełnemu zepsucia."},{"type":"paragraph","text":"Tysiące narodów błyszczało na ziemi, które nigdy nie mogły znieść dobrych praw; a nawet te, które by to mogły, przez cały czas swego trwania bardzo krótko je miały. Większość narodów, tak samo jak ludzi, posiada giętkość tylko w młodości; starzejąc się, stają się niezdolni do poprawy. Skoro raz ustalą się zwyczaje i zakorzenią przesądy, jest niebezpiecznym i próżnym przedsięwzięciem chcieć je reformować; naród nie może nawet znieść, by tykano się jego cierpień dla usunięcia ich, podobny do tych głupich i tchórzliwych chorych, drżących na widok lekarza."},{"type":"paragraph","text":"Zdarza się niekiedy, że podobnie jak pewne choroby, wstrząsające rozumy ludzi i odbierające im pamięć przeszłości, występują w życiu państw gwałtowne epoki, kiedy rewolucje działają na narody tak, jak niektóre chorobliwe kryzysy na ludzi — kiedy nie zapominając wprawdzie przeszłości, wstręt do niej poczują i kiedy państwo, rozpalone wojnami domowymi, odradza się — by się tak wyrazić — z popiołów i odzyskuje siłę młodości, wychodząc z ramion śmierci. Taka była Sparta za czasów Likurga, taki był Rzym po Tarkwiniuszach 179 , i takie były wśród nas Holandia i Szwajcaria po wypędzeniu tyranów 180 ."},{"type":"paragraph","text":"Wypadki te są jednak rzadkie; są to wyjątki, mające zawsze przyczynę swą w szczególnym ustroju państwa, w którym zachodzą. Nawet nie mogą zdarzyć się dwa razy w tym samym narodzie; może bowiem uczynić się wolny, dopóki jest jeszcze barbarzyński, nie może już jednak być wolny, gdy zużyje się jego energia obywatelska. Wówczas zamieszania mogą go zniszczyć, a rewolucje nie mogą go uzdrowić; i z chwilą złamania okowów rozpada się i istnieć przestaje: potrzeba mu odtąd pana, a nie oswobodziciela. Wolne narody, pamiętajcie o tej zasadzie: „Można wolność nabyć, lecz nigdy się jej nie odzyskuje”."},{"type":"paragraph","text":"Młodość nie jest dzieciństwem. Narody mają, tak jak ludzie, wiek młodości lub — jeśli wolimy — dojrzałości, na który trzeba poczekać, zanim się je podda prawom; lecz nie zawsze łatwo poznać, że naród dojrzał; a jeśli się porę uprzedzi, dzieło się nie uda. Jeden naród, już z chwilą gdy się rodzi, jest zdolny do przyjęcia urządzeń, drugi nie nadaje się do tego nawet po upływie dziesięciu wieków. Rosjanie nigdy nie będą naprawdę uspołecznieni, za wcześnie bowiem byli uspołeczniani. Piotr 181 miał geniusz naśladowcy; nie miał prawdziwego geniuszu, który stwarza i wszystko z niczego czyni. Kilka z rzeczy, jakie zdziałał, było dobrych, większość była nie na miejscu. Widział, że naród jego jest barbarzyński, nie widział, że nie dojrzał do kultury; chciał go cywilizować, kiedy trzeba go było tylko hartować. Chciał od razu robić Niemców, Anglików, kiedy trzeba było zacząć od urobienia Rosjan: przeszkodził poddanym, by kiedykolwiek stali się tym, czym być mogli, a to wmawiając w nich, że są tym, czym nie byli. Podobnie nauczyciel Francuz kształci wychowanka, by błyszczał, będąc dzieckiem, a później nigdy niczym nie był. Cesarstwo rosyjskie zechce podbić Europę, a samo zostanie podbite. Tatarzy, jego poddani lub sąsiedzi, staną się jego i naszymi panami; ta rewolucja wydaje mi się nieuchronna. Wszyscy królowie Europy zgodnie pracują, by ją przyśpieszyć."}]},{"id":"rozdział-ix-ciąg-dalszy","number":23,"title":"Rozdział IX. (Ciąg dalszy)","blocks":[{"type":"paragraph","text":"Podobnie jak natura zakreśliła krańce wzrostowi dobrze zbudowanego człowieka, a kiedy je przekracza, stwarza już olbrzymy lub karły — tak samo gdy się rozważa najlepszy ustrój państwa, trzeba wziąć pod uwagę granice, jakie mieć może, by nie było ani zbyt wielkie, iżby można nim dobrze rządzić, ani zbyt małe, iżby się mogło utrzymać własnymi siłami. W każdym ciele politycznym jest maksimum sił, którego przekraczać nie może, i od którego często oddala się, właśnie przez to, że się powiększa. Im szerzej rozciąga się węzeł społeczny, tym bardziej się rozluźnia; i na ogół małe państwo jest stosunkowo silniejsze od wielkiego."},{"type":"paragraph","text":"Tysiąc racji udowadnia tę zasadę. Przede wszystkim zarząd na wielkich przestrzeniach staje się trudniejszy, atak jak ciężar staje się cięższy na końcu dłuższej dźwigni. W miarę jak mnożą się stopnie zarządu, staje się on też kosztowniejszy, bo naprzód miasto każde ma swój zarząd, który naród opłaca, dalej każdy obwód swój zarząd, znowu opłacany przez naród, następnie każda prowincja, w końcu wielkie zarządy, satrapie, wicekrólestwa, które — im wyżej się wznosimy — trzeba coraz drożej opłacać, a zawsze kosztem nieszczęsnego narodu; w końcu przychodzi najwyższy zarząd, przygniatający wszystko. Tyle nadmiernych ciężarów ustawicznie wyczerpuje poddanych, a nie tylko, że nie są lepiej rządzeni przez tyle różnych hierarchii, lecz nawet gorzej, niż gdyby mieli nad sobą tylko jeden zarząd. Tymczasem ledwo zostają jakieś zasoby na nadzwyczajne wypadki; i gdy trzeba się do nich uciec, państwo zawsze staje w przededniu ruiny."},{"type":"paragraph","text":"To jeszcze nie wszystko: nie tylko rząd mniej energicznie i mniej szybko zdoła nakazać posłuch dla praw, zaradzić nadużyciom, naprawić je, zapobiec buntom, jakie mogą wybuchnąć w odległych prowincjach — ale naród mniej miłuje swych naczelników, których nigdy nie widzi, ojczyznę, która wydaje mu się wielka jak świat, i współobywateli, których większość jest mu obca. Te same prawa nie mogą odpowiadać tylu różnym prowincjom, mającym różne obyczaje, żyjącym w całkowicie różnych klimatach i niemogącym znieść tej samej formy rządu. Różne prawa rodzą tylko zamieszanie i nieład wśród ludów, które żyjąc pod tymi samymi naczelnikami i ciągle komunikując się z sobą, przechodzą jedni do drugich lub żenią się z sobą, a podlegając różnym zwyczajom prawnym, nie wiedzą nigdy, czy ojcowizna ich naprawdę do nich należy. Wśród tego mnóstwa ludzi nieznających się wzajemnie, których siedziba najwyższego zarządu skupia się na tym samym miejscu, talenty pozostają niewydobyte, cnoty nieznane, błędy nieukarane."},{"type":"paragraph","text":"Naczelnicy, przeciążeni sprawami, niczego własnymi oczami nie widzą; podrzędni urzędnicy rządzą państwem. W końcu całą energię publiczną pochłaniają środki, jakie trzeba stosować do utrzymania władzy powszechnej, gdy tylu daleko rozrzuconych urzędników chce się spod niej wydobyć lub narzucić się jej; nie starczy już tych starań dla szczęścia narodu, zaledwie starczy do obrony w potrzebie — i oto w ten sposób ciało za wielkie na swój ustrój upada i ginie przywalone własnym ciężarem."},{"type":"paragraph","text":"Z drugiej strony państwo powinno zbudować sobie pewną podstawę, by zachować stałość, by oprzeć się wstrząsom, jakich z pewnością dozna, tudzież wysiłkom, do jakich będzie zmuszone, by się utrzymać; wszelkie narody bowiem mają rodzaj siły odśrodkowej, przez którą ustawicznie wzajemnie jedne na drugie działają i usiłują powiększyć się kosztem swych sąsiadów, tak jak wiry Kartezjusza 182 . Tak więc słabym grozi szybkie pochłonięcie; i nikt nie może się zachować przy bycie, o ile nie wytworzy z wszystkimi innymi rodzaju równowagi, dzięki której nacisk staje się ze wszystkich stron mniej więcej równy."},{"type":"paragraph","text":"Widać stąd, że istnieją racje przemawiające za rozciąganiem się i za ścieśnianiem; i nie najmniejszy talent polityka polega na znalezieniu między jednym a drugim stosunku najbardziej korzystnego dla zachowania państwa. Można na ogół powiedzieć, że te pierwsze racje, będąc jedynie zewnętrzne i względne, powinny być pod porządkowane tym drugim, które są wewnętrzne i absolutne 183 . Najpierwszą rzeczą, której trzeba szukać, jest zdrowy i silny ustrój; i więcej trzeba liczyć na energię, którą rodzi dobry rząd, niż na środki, jakich może dostarczyć wielkie terytorium."},{"type":"paragraph","text":"Zresztą, widziano już państwa o takim ustroju, że konieczność podbojów tkwiła w samej ich konstrukcji, i które, by się utrzymać, zmuszone były ustawicznie się powiększać 184 . Może cieszyły się bardzo z tej szczęśliwej konieczności, choć ona przecież wskazywała im nieuchronną chwilę upadku z osiągnięciem najdalszych granic wielkości."}]},{"id":"rozdział-x-ciąg-dalszy","number":24,"title":"Rozdział X. (Ciąg dalszy)","blocks":[{"type":"paragraph","text":"Można mierzyć ciało polityczne w dwojaki sposób: mianowicie obszarem terytorium oraz liczbą ludności; a pomiędzy jedną i drugą z tych miar istnieje pewien stosunek, zdolny dać państwu prawdziwą wielkość. Ludzie tworzą państwo, a ziemia żywi ludzi; stosunek powyższy więc polega na tym, by ziemia wystarczyła do utrzymania mieszkańców i by było tylu mieszkańców, ilu ziemia może wyżywić. W tym stosunku znajduje się maksimum siły danej liczby ludności; jeśli bowiem za wiele jest ziemi, strzeżenie jej jest zbyt uciążliwe, uprawa niedostateczna, produkcja nadmierna: oto bliska przyczyna wojen obronnych; jeśli ziemi jest za mało, państwo znajduje się co do braków w zależności od sąsiadów: oto bliska przyczyna wojen zaborczych. Każdy naród, który z powodu swego położenia ma jedynie wybór pomiędzy handlem a wojną, jest sam w sobie słaby: zależy od sąsiadów, zależy od wypadków; ma tylko istnienie niepewne i krótkie. Podbija i zmienia swe położenie lub zostaje podbity i przestaje istnieć. Może zachować się wolny jedynie przez małość lub wielkość."},{"type":"paragraph","text":"Nie można podać rachunkowo stałego stosunku między obszarem ziemi a liczbą ludzi, wystarczającymi sobie wzajemnie, a to zarówno z powodu różnic zachodzących w jakości ziemi, w stopniu żyzności, w rodzaju produktów, we wpływie klimatu, jak z powodu różnic, jakie spostrzega się w temperamentach zamieszkujących je ludzi, z których jedni spożywają mało w urodzajnym kraju, inni wiele na niewdzięcznej glebie. Trzeba jeszcze mieć wzgląd na większą lub mniejszą płodność kobiet, na więcej lub mniej sprzyjające zaludnieniu warunki kraju, na wzrost ludności, na który prawodawca może spodziewać się wpłynąć przez swe urządzenia — tak, że nie powinien on opierać swego sądu na tym, co widzi, ale na tym, co przewiduje, i nie tyle zatrzymywać się na obecnym stanie ludności, ile na tym, do którego powinna ona dojść w sposób naturalny. W końcu zachodzi tysiące wypadków, w których szczególne ukształtowania terenu wymagają, względnie pozwalają, by zająć więcej ziemi, niż to wydaje się konieczne. Tak więc można rozsiedlić się szeroko w kraju górskim, gdzie produkty naturalne, mianowicie lasy, pastwiska, mniej wymagają pracy, gdzie, jak doświadczenie uczy, kobiety są płodniejsze niż na równinach i gdzie wobec przewagi górskich zboczy ma się tylko niewielką poziomą powierzchnię, na jakiej jedynie można liczyć na plony. Przeciwnie, można ścieśnić się na brzegu morza, nawet w skałach i piaskach prawie jałowych, ponieważ tam rybołówstwo może zastąpić w znacznej mierze produkty ziemi, ludzie winni być bardziej skupieni dla odpierania korsarzy, i ponieważ zresztą zachodzi większa łatwość uwolnienia kraju z nadmiaru mieszkańców za pomocą kolonii."},{"type":"paragraph","text":"Do tych warunków nadania narodowi urządzeń trzeba dodać jeden jeszcze, który żadnego innego nie może zastąpić, bez którego jednak wszystkie inne są bezużyteczne; jest nim korzystanie z obfitości i z pokoju, czas bowiem porządkowania się kraju, tak samo jak czas tworzenia się batalionu, jest chwilą, kiedy ciało najmniej jest zdolne do odporu i najłatwiej je zniszczyć. Lepiej oparłoby się ono, będąc w zupełnym nieładzie, niż w chwili fermentacji, gdy każdy myśli o swym miejscu, a nie o niebezpieczeństwie. Niechaj w tym przełomowym czasie wybuchnie wojna, głód, bunt, państwo nieuchronnie zostanie obalone."},{"type":"paragraph","text":"Nie znaczy to, by nie było wielu rządów ustanowionych podczas tych burz; lecz wówczas te rządy właśnie niszczą państwo. Przywłaszczyciele wywołują lub wybierają zawsze te czasy zamętu, by pod wpływem przestrachu powszechnego spowodować uchwalenie rujnujących praw, których naród nigdy nie przyjąłby z zimną krwią. Wybór chwili nadania urządzeń jest najpewniejszą cechą, po której można odróżnić dzieło prawodawcy od dzieła tyrana."},{"type":"paragraph","text":"Któryż więc naród nadaje się do otrzymania praw? Ten, który będąc już związany jakimś węzłem pochodzenia, interesu lub umowy, nie nosił jeszcze nigdy prawdziwego jarzma praw; który nie ma zakorzenionych zwyczajów ni przesądów, który nie boi się być dotknięty nagłym najazdem; który nie mieszając się do sporów swych sąsiadów, może każdemu z nich stawić opór sam lub też skorzystać z pomocy jednego do oparcia się drugiemu; ten, którego każdy członek może być znany przez wszystkich i w którym nie jest się zmuszonym wkładać na człowieka ciężaru tak wielkiego, jakiego jeden udźwignąć nie potrafi; który może się obejść bez innych narodów i bez którego mogą się obejść inne narody 185 , który nie jest ani bogaty, ani ubogi i może wystarczyć sam sobie; ten w końcu, który łączy spójność starego narodu z giętkością narodu nowego. Trudność i dzieła prawodawstwa wywołuje nie tyle to, co trzeba ustanowić, jak to, co trzeba zniszczyć; niemożliwość zaś znalezienia prostoty natury połączonej z potrzebami społecznego życia sprawia, że powodzenie jest tak rzadkie. Prawda, że trudno znaleźć wszystkie te warunki zebrane razem: dlatego widzi się mało państw posiadających dobry ustrój."},{"type":"paragraph","text":"Jest jeszcze w Europie kraj zdolny do otrzymania praw: jest nim wyspa Korsyka. Waleczność i stałość, z jaką ten dzielny naród umiał odzyskać i bronić swej wolności, zasługiwałyby na to, by go jakiś mądry człowiek nauczył ją zachować. Mam jakieś przeczucie, że kiedyś ta mała wyspa zadziwi Europę 186 ."}]},{"id":"rozdział-xi-o-różnych-systemach-prawodawczych","number":25,"title":"Rozdział XI. O różnych systemach prawodawczych","blocks":[{"type":"paragraph","text":"Kto dochodzi, na czym właśnie polega największe dobro wszystkich, które powinno być celem wszelkiego prawodawczego systemu, przekona się, że sprowadza się ono do dwóch głównych przedmiotów: wolności i równości; wolności, ponieważ każda zależność poszczególna zmniejsza siłę ciała państwowego; równości, ponieważ wolność bez niej nie może się utrzymać 187 ."},{"type":"paragraph","text":"Powiedziałem już, co to jest wolność społeczna; co się tyczy równości, to nie należy przez to słowo rozumieć, że rozmiary władzy i bogactwa mają być bezwzględnie takie same; lecz w zastosowaniu do władzy, że ma ona być za słaba na jakikolwiek gwałt i ma być wykonywana jedynie na mocy stopnia i praw; w zastosowaniu zaś do bogactwa, że żaden obywatel nie ma być dosyć bogaty na to, by mógł kupić innego, a żaden dość biedny, by musiał się sprzedawać 188 : co każe przyjąć po stronie możnych umiarkowanie dóbr i wpływu, po stronie zaś maluczkich umiarkowanie chciwości i pożądań."},{"type":"paragraph","text":"Mówią, że ta równość jest urojeniem spekulacji myślowej, niemogącym istnieć w praktyce. Lecz jeśli nie można uniknąć nadużycia, czyż stąd wynika, że nie potrzeba go przynajmniej miarkować? Właśnie dlatego, że siła rzeczy dąży zawsze do zniszczenia równości, prawodawstwo winno zawsze dążyć do jej utrzymania."},{"type":"paragraph","text":"Jednakowoż te ogólne zadania wszelkich dobrych urządzeń powinny w każdym kraju ulegać modyfikacjom odpowiednio do stosunków wytworzonych tak przez miejscowe położenie, jak również przez charakter mieszkańców; i według tych stosunków należy wyznaczyć każdemu narodowi właściwy system urządzeń, co by był najlepszy może nie sam w sobie, lecz dla państwa, dla którego jest przeznaczony 189 . Na przykład ziemia jest niewdzięczna i jałowa lub kraj za ciasny dla mieszkańców — zwróćcie się do przemysłu i rzemiosł, których wytwory będziecie wymieniać na brakujące wam środki żywności. Przeciwnie, zajmujecie bogate równiny i żyzne wzgórza, na dobrej ziemi brakuje wam mieszkańców — poświęćcie wszystkie wysiłki rolnictwu, które mnoży ludzi, i wypędźcie rzemiosła, które doprowadziłyby w końcu do zupełnego wyludnienia, skupiając w kilku punktach terytorium tę garstkę mieszkańców, jaką posiada 190 . Zajmujecie wybrzeża rozległe i wygodne — pokryjcie morze okrętami, pielęgnujcie handel i żeglarstwo; będziecie mieć żywot świetny i krótki. Morze oblewa na waszych brzegach jedynie niedostępne prawie skały — pozostańcie barbarzyńcami i żywcie się rybami; będziecie żyć spokojniejsi, może lepsi, a na pewno szczęśliwsi. Jednym słowem, poza wspólnymi dla wszystkich zasadami w każdym narodzie tkwią pewne warunki, które kształtują w szczególny sposób te zasady, i każdy wydaje prawodawstwo odpowiednie tylko dla siebie. Tak niegdyś Hebrajczycy, a ostatnio Arabowie za główny cel mieli religię, Ateńczycy sztuki, Kartagina i Tyr handel, Rodos żeglugę, Sparta wojnę, a Rzym cnotę. Autor Ducha praw wykazał na mnóstwie przykładów, jaką sztuką prawodawca nagina urządzenia do każdego z tych celów."},{"type":"paragraph","text":"Że ustrój państwa naprawdę jest mocny i trwały, sprawia przestrzeganie zgodności do tego stopnia, iż naturalne stosunki oraz prawa schodzą się zawsze zgodnie w tych samych punktach, i że te ostatnie — że się tak wyrażę — zabezpieczają tylko tamte, towarzyszą im, poprawiają je. Jeśli jednak prawodawca, myląc się co do swego zadania, przyjmuje zasadę różną od tej, jaka wypływa z natury rzeczy; gdy jedna zmierza ku niewoli, a druga ku wolności; jedna ku bogactwu, druga ku zaludnieniu; jedna ku pokojowi, druga ku podbojom; wówczas ujrzymy, że prawa słabną niespostrzegalnie, ustrój wypacza się, a państwo nie przestanie ulegać wstrząsom, dopóki nie zniszczeje lub nie przekształci się, i dopóki niezwyciężalna natura nie odzyska panowania 191 ."}]},{"id":"rozdział-xii-podział-praw","number":26,"title":"Rozdział XII. Podział praw","blocks":[{"type":"paragraph","text":"Należy wziąć pod uwagę rozmaite stosunki, by uporządkować całość, czyli nadać możliwie najlepszą formę rzeczypospolitej 192 . Najpierw oddziaływanie całego ciała na samego siebie, to znaczy stosunek całości do całości, czyli zwierzchnika do państwa; a stosunek ten jest proporcją składającą się ze stosunków wyrazów środkowych, jak to w dalszym ciągu zobaczymy 193 ."},{"type":"paragraph","text":"Prawa normujące ten stosunek noszą miano politycznych i nazywają się także prawami fundamentalnymi, nie bez pewnej racji, jeśli te prawa są mądre. Jeśli bowiem dla każdego państwa jeden istnieje tylko dobry sposób urządzenia go, naród, co go znalazł, powinien się go trzymać; jeśli jednak porządek ustanowiony jest zły, dlaczegóż miałoby się uważać za podstawowe prawa, które nie pozwalają mu być dobrym? Zresztą, w każdym stanie rzeczy naród zawsze jest mocen 194 zmienić swoje prawa, nawet najlepsze; jeśli bowiem podoba mu się zrobić źle samemu sobie, któż ma prawo mu w tym przeszkodzić? 195"},{"type":"paragraph","text":"Drugim stosunkiem jest stosunek członków pomiędzy sobą, względnie do całego ciała; a stosunek ten powinien być w pierwszym wypadku tak mały, w drugim zaś tak wielki, jak to tylko możliwe; tak, by każdy obywatel był całkowicie niezależny od wszystkich innych, krańcowo zaś zależny od państwa; co osiąga się zawsze za pomocą tych samych środków; jedynie bowiem siła państwa tworzy wolność jego członków 196 . Z tego drugiego stosunku rodzą się prawa cywilne."},{"type":"paragraph","text":"Można wziąć pod uwagę trzeci rodzaj stosunku pomiędzy człowiekiem a prawem, mianowicie stosunek między nieposłuszeństwem a karą; a ten daje sposobność do ustanowienia praw karnych, które w gruncie rzeczy nie tyle są osobnym rodzajem praw, ile sankcją wszystkich innych."},{"type":"paragraph","text":"Do tych trzech rodzajów praw dołącza się czwarty, najważniejszy ze wszystkich, którego nie ryje się ani na marmurze, ani w spiżu, lecz w sercach obywateli; który tworzy prawdziwą konstytucję państwa; który co dnia w nowe siły wzrasta; który, gdy inne prawa starzeją się lub gasną, ożywia je lub zastępuje, zachowuje w narodzie ducha jego urządzeń i niespostrzeżenie podstawia w miejsce siły władzy — siłę przyzwyczajenia. Mówię o obyczajach, o zwyczajach, przede wszystkim zaś o opinii; dziale nieznanym naszym politykom, od którego zależy jednak powodzenie wszystkich innych, dziale, którym wielki prawodawca zajmuje się tajemnie, podczas gdy pozornie ogranicza się do przepisów szczegółowych. Te są jedynie żebrami sklepienia, którego niewzruszalny zwornik tworzą w końcu powolniej rodzące się obyczaje."},{"type":"paragraph","text":"Z tych różnych rodzajów praw jedynie prawa polityczne, stanowiące formę rządu, mają związek z mym tematem."}]},{"id":"księga-trzecia","number":27,"title":"Księga trzecia","blocks":[{"type":"paragraph","text":"Zanim omówimy różne formy rządu, postarajmy się ustalić ścisłe znaczenie tego słowa, które jeszcze nie zostało należycie wytłumaczone."}]},{"id":"rozdział-i-o-rządzie-w-ogólności","number":28,"title":"Rozdział I. O rządzie w ogólności","blocks":[{"type":"paragraph","text":"Przestrzegam czytelnika, że rozdział niniejszy należy czytać z uwagą i że nie posiadam tej sztuki, bym był zrozumiały dla tego, kto nie chce uważać."},{"type":"paragraph","text":"Dwie są przyczyny każdego wolnego działania, które wspólnie je wywołują: jedna moralna, mianowicie wola postanawiająca akt, druga fizyczna, mianowicie siła wykonująca go. Gdy idę ku jakiemuś przedmiotowi, trzeba naprzód, bym chciał iść ku niemu; po wtóre, by mnie nogi ku niemu niosły. Niechaj paralityk chce biec, niechaj zwinny człowiek biec nie chce, obydwaj pozostaną w miejscu. Te same przyczyny ruchu ma ciało polityczne: tak samo rozróżnia się w nim siłę i wolę; tę pod nazwą władzy prawodawczej, tamtą pod nazwą władzy wykonawczej. Nic się w nim nie dzieje, względnie dziać nie powinno, bez ich współdziałania."},{"type":"paragraph","text":"Widzieliśmy, że władza prawodawcza należy do narodu i że tylko do niego może należeć. Przeciwnie, łatwo jest zauważyć na podstawie poprzednio ustalonych zasad, że władza wykonawcza nie może należeć do powszechności na równi z władzą prawodawczą, czyli zwierzchniczą; władza ta bowiem polega jedynie na aktach szczególnych, niewchodzących w zakres prawa, a zatem także nienależących do zwierzchnika, którego wszystkie akty mogą być jedynie prawami."},{"type":"paragraph","text":"Siła publiczna potrzebuje zatem własnego czynnika, który by skupiał ją i wprawiał w ruch, stosownie do kierownictwa woli powszechnej, który by służył za pośrednika między państwem a zwierzchnikiem, który by grał w pewnej mierze tę rolę w osobie publicznej, jaką odgrywa w człowieku związek duszy z ciałem. Oto jaka jest w państwie racja rządu, niewłaściwie mieszanego ze zwierzchnikiem, którego woli jest jedynie wykonawcą! 197"},{"type":"paragraph","text":"Czymże więc jest rząd? Ciałem pośrednim, ustanowionym między poddanymi a zwierzchnikiem dla ich wzajemnych stosunków, mającym obowiązek wykonywania praw i utrzymywania wolności, zarówno społecznej, jak politycznej 198 ."},{"type":"paragraph","text":"Członkowie tego ciała nazywają się urzędnikami lub królami , tzn. rządzącymi , a ciało całe nosi miano księcia 199 . Ci zatem, co utrzymują, że akt, za pomocą którego naród poddaje się naczelnikom, nie jest umową, mają zupełną słuszność. Bezwarunkowo jest to tylko zlecenie — urząd, na którym naczelnicy, będąc zwyczajnymi urzędnikami zwierzchnika, w jego imieniu sprawują władzę przezeń im powierzoną, a może on ją ograniczyć, zmienić i odebrać, kiedy mu się podoba — skoro odstąpienie samego tego prawa drugiemu nie da się pogodzić z naturą ciała społecznego i sprzeciwia się celowi stowarzyszenia 200 ."},{"type":"paragraph","text":"Nazywam więc rządem lub najwyższym zarządem legalne sprawowanie władzy wykonawczej, księciem zaś lub urzędnikiem człowieka lub ciało, których obarczono tym zarządem."},{"type":"paragraph","text":"W rządzie właśnie znajdują się siły pośrednie, których stosunki tworzą proporcję całości do całości, czyli zwierzchnika do państwa. Ten ostatni stosunek można przedstawić za pomocą stosunku do siebie krańcowych wyrazów proporcji ciągłej, której średnią proporcjonalną tworzy rząd 201 . Rząd otrzymuje od zwierzchnika rozkazy, które następnie daje narodowi, i by państwo miało dobrą równowagę, trzeba, obliczając wszystko, by iloczyn, czyli kwadrat rządu przez siebie samego pomnożonego, równał się iloczynowi, czyli kwadratowi obywateli, którzy są z jednej strony zwierzchnikami, z drugiej zaś poddanymi 202 ."},{"type":"paragraph","text":"Ponadto nie można zmienić żadnego z trzech wyrazów bez natychmiastowego zniszczenia proporcji. Gdy zwierzchnik chce rządzić lub gdy urzędnik chce nadawać prawa, lub gdy poddani odmawiają posłuszeństwa, nieporządek wchodzi w miejsce ładu, siła i wola przestają zgodnie działać, a państwo w rozkładzie popada w despotyzm lub w anarchię. W końcu, tak jak w każdej proporcji jest tylko jedna średnia proporcjonalna, jeden możliwy jest tylko dobry rząd w państwie. Skoro jednak tysiące wypadków mogą zmienić stosunki w narodzie, różne rządy mogą być dobre nie tylko dla różnych narodów, lecz i dla tego samego narodu w różnych czasach."},{"type":"paragraph","text":"Usiłując dać pojęcie o różnych stosunkach mogących zachodzić między tymi dwoma krańcami, wezmę jako przykład liczbę ludności, ponieważ jest stosunkiem łatwiejszym do wyrażenia 203 ."},{"type":"paragraph","text":"Przyjmijmy, że państwo składa się z dziesięciu tysięcy obywateli. Zwierzchnika można brać tylko kolektywnie i w całości; każdego poszczególnego w charakterze poddanego bierze się jako jednostkę: w ten sposób zwierzchnik ma się do poddanego tak, jak się ma dziesięć tysięcy do jednego, to znaczy, że każdy członek państwa ma w udziale tylko dziesięciotysięczną część władzy zwierzchniczej, aczkolwiek cały jej podlega. Jeżeli naród składa się ze stu tysięcy ludzi, stanowisko poddanych nie zmienia się, i każdy na równi dźwiga całe władztwo praw, gdy tymczasem jego głos, sprowadzony do jednej stutysięcznej, ma dziesięć razy mniej wpływu na ich układanie. A więc, gdy poddany zawsze zostaje jednostką, to stosunek zwierzchnika wzrasta w miarę liczby obywateli. Skąd wynika, że w miarę jak państwo wzrasta, wolność maleje."},{"type":"paragraph","text":"Mówiąc, że stosunek wzrasta, rozumiem, że oddala się od równości. Tak więc, im większy jest stosunek w znaczeniu geometrycznym, tym mniej można mówić o stosunku w znaczeniu potocznym: w pierwszym, stosunek rozważany według ilości, mierzy się ilorazem; w drugim, rozważany według tożsamości, ocenia się według podobieństwa 204 ."},{"type":"paragraph","text":"Otóż im mniejszy stosunek 205 zachodzi między wolami poszczególnymi a wolą powszechną, tzn. obyczajami a prawami, tym bardziej powinna wzrastać siła przymusu. Rząd przeto, by być dobry, powinien być stosunkowo silniejszy, w miarę im naród jest liczniejszy."},{"type":"paragraph","text":"Z drugiej strony, skoro powiększenie się państwa dostarcza depozytariuszom władzy publicznej więcej pokus i środków nadużywania władzy, im więcej rząd winien mieć siły do powstrzymywania narodu, tym więcej powinien jej mieć z kolei zwierzchnik dla powstrzymywania rządu. Nie mówię tutaj o sile bezwzględnej, lecz o sile stosunkowej różnych czynników państwa."},{"type":"paragraph","text":"Z tego podwójnego stosunku wynika, że proporcja ciągła między zwierzchnikiem, księciem a narodem nie jest bynajmniej pomysłem dowolnym, lecz że jest koniecznym następstwem natury ciała politycznego. Wynika jeszcze, że skoro jeden z wyrazów krańcowych, mianowicie naród jako podmiot, jest stały i reprezentowany przez jednostkę, ilekroć razy stosunek podwojony wzrasta lub maleje, stosunki pojedyncze podobnie wzrastają lub maleją, w następstwie czego wyraz środkowy ulega zmianie. Z czego widać, że nie ma jakiegoś ustroju rządowego jedynego i bezwzględnego, lecz że tyle może być rządów różnych naturą swoją, ile państw różnych wielkością 206 ."},{"type":"paragraph","text":"Gdyby ktoś, obracając ten system w żarty, powiedział, że według mnie wystarczy, celem wyszukania tej średniej proporcjonalnej i utworzenia ciała rządowego, wyciągnąć pierwiastek drugiego stopnia z liczby ludności, odpowiedziałbym, że biorę tutaj tę liczbę jedynie w formie przykładu; że stosunki, o których mówię, nie mierzą się jedynie liczbą ludzi, lecz w ogólności ilością działania, którą oblicza się przy uwzględnieniu mnóstwa przyczyn; że zresztą, jeżeli na chwilę zapożyczam terminów z geometrii celem krótszego wyrażenia się, pomimo to wiem dobrze, iż ścisłość geometryczna bynajmniej nie zachodzi przy jakościach moralnych."},{"type":"paragraph","text":"Rząd jest w pomniejszeniu tym, czym jest zawierające go ciało polityczne w powiększeniu. Jest osobą moralną, wyposażoną w pewne właściwości, czynną jako zwierzchnik, bierną jako państwo, i która da się rozłożyć na inne podobne stosunki; w następstwie czego rodzi się nowa proporcja, z tej jeszcze inna, według hierarchii urzędów, dopóki się nie dojdzie do niepodzielnego terminu środkowego, tzn. do jedynego naczelnika lub najwyższego urzędnika, którego można sobie przedstawić wśród tej progresji jako jedność w szeregu ułamków i liczb 207 ."},{"type":"paragraph","text":"Nie wdając się w to rozmnażanie terminów, zadowólmy się pojmowaniem rządu jako nowego ciała w państwie, różnego od narodu i zwierzchnika, a pośredniczącego pomiędzy jednym a drugim."},{"type":"paragraph","text":"Pomiędzy tymi dwoma ciałami zachodzi ta istotna różnica, że państwo istnieje samo przez się, rząd zaś istnieje tylko przez zwierzchnika. Przeto panującą u księcia wolą jest, względnie powinna być, jedynie wola powszechna, czyli prawo; siła jego jest jedynie skupioną w nim siłą publiczną: skoro tylko chce wydobyć z samego siebie jakiś akt absolutystyczny i niezależny, związek całości zaczyna się rozluźniać 208 . Gdyby w końcu zdarzyło się, iżby książę miał wolę szczególną, czynniejszą niż wola zwierzchnika, i korzystał dla przeparcia tej woli szczególnej z siły publicznej, będącej w jego rękach, w ten sposób, że miałoby się, że użyję tego wyrażenia, dwóch zwierzchników — jednego prawnego, drugiego faktycznego — natychmiast zniknęłaby jedność społeczna, a ciało polityczne rozpadłoby się."},{"type":"paragraph","text":"Jednakowoż, by ciało rządowe miało byt, życie rzeczywiste, odróżniające je od ciała państwowego, by członkowie jego mogli działać zgodnie i wypełnić cel, dla którego zostało ustanowione, potrzebne mu jest szczególne „ja”, wspólna członkom jego wrażliwość, siła, własna wola, dążąca do jego zachowania. Ten byt szczególny wymaga zgromadzeń, narad, władzy uchwalania, rozstrzygania praw, tytułów, przywilejów należących wyłącznie do księcia i sprawiających, że stanowisko urzędnika jest tym bardziej zaszczytne, im bardziej jest uciążliwe. Trudności polegają na sposobie urządzenia w całości tej niższego rzędu całości tak, by nie psuła ogólnego ustroju, wzmacniając swój ustrój; by zawsze odróżniała swą siłę szczególną, przeznaczoną dla własnego jej zachowania się, od siły publicznej, przeznaczonej dla zachowania bytu państwa; i by, jednym słowem, była zawsze gotowa poświęcić rząd narodowi, nie zaś naród rządowi 209 ."},{"type":"paragraph","text":"Zresztą, ciało rządowe, aczkolwiek sztuczne, jest dziełem innego sztucznego ciała, i aczkolwiek posiada w pewnej mierze jedynie zapożyczone i podporządkowane życie, nie przeszkadza to temu, by nie mogło działać z mniejszą lub większą energią i szybkością, cieszyć się — że się tak wyrażę — mniej lub więcej krzepkim zdrowiem. W końcu, nie oddalając się wprost od celu swego ustanowienia, może odchylić się odeń mniej lub więcej, zależnie od sposobu, w jaki zostało zorganizowane."},{"type":"paragraph","text":"Z tych to wszystkich różnic rodzą się rozmaite stosunki, które rząd winny łączyć z ciałem państwowym, zależnie od przypadkowych i szczególnych stosunków wywołujących w tym samym państwie zmiany; często bowiem rząd, sam w sobie najlepszy, stanie się najbardziej zepsuty, jeśli stosunki w nim popsują się na wzór wad ciała politycznego, do którego należy."}]},{"id":"rozdział-ii-o-zasadzie-tworzącej-różne-formy-rządu","number":29,"title":"Rozdział II. O zasadzie tworzącej różne formy rządu","blocks":[{"type":"paragraph","text":"By wyłożyć ogólną przyczynę tych różnic, należy tu odróżnić księcia i rząd, tak jak poprzednio odróżniłem państwo i zwierzchnika."},{"type":"paragraph","text":"Ciało rządowe może się składać z mniejszej lub większej liczby członków. Powiedzieliśmy, że stosunek zwierzchnika do poddanych jest tym większy, im liczniejszy jest naród, a przez oczywistą analogię to samo możemy powiedzieć o rządzie w stosunku do urzędników 210 ."},{"type":"paragraph","text":"Otóż całkowita siła rządu nie ulega zmianie, będąc zawsze siłą państwa 211 : skąd wynika, że im więcej tej siły zużywa wobec swych własnych członków, tym mniej mu jej zostaje do działania wobec całego narodu 212 ."},{"type":"paragraph","text":"A więc im liczniejsi są urzędnicy, tym słabszy jest rząd. Ponieważ ta zasada jest podstawowa, postarajmy się bliżej ją wyjaśnić."},{"type":"paragraph","text":"W osobie urzędnika możemy odróżnić trzy wole najistotniej odrębne: najpierw własną wolę jednostki, zmierzającą jedynie do jej własnej szczególnej korzyści; po drugie wspólną wolę urzędników, mającą na względzie tylko korzyść księcia, a którą można nazwać wolą grupy — ta jest powszechna w stosunku do rządu, szczególna zaś w stosunku do państwa, którego częścią jest rząd; po trzecie wolę narodu, czyli wolę zwierzchniczą, która jest powszechna tak w stosunku do państwa wziętego jako całość, jak w stosunku do rządu, wziętego jako część całości."},{"type":"paragraph","text":"Przy doskonałym prawodawstwie wola szczególna, czyli indywidualna, nie powinna istnieć; wola grupy, właściwa rządowi, powinna być ściśle podporządkowana; w następstwie czego wola powszechna, czyli zwierzchnicza, powinna zawsze górować i być jedyną regułą wszystkich innych."},{"type":"paragraph","text":"Przeciwnie, w naturalnym porządku te wole odrębne stają się tym czynniejsze, im bardziej się ześrodkowują. Wola powszechna przeto jest zawsze najsłabsza, drugie miejsce ma wola grupy, pierwsze zaś miejsce wola szczególna, tak że w rządzie każdy członek jest naprzód sobą samym, później urzędnikiem, w końcu obywatelem — stopniowanie wprost przeciwne temu, jakiego wymaga porządek społeczny."},{"type":"paragraph","text":"Jeśli się to założenie przyjmie — niechaj cały rząd pozostaje w rękach jednego człowieka, oto wola szczególna i wola grupy są doskonale zespolone, w następstwie czego ta ostatnia osiąga największy stopień natężenia, jaki tylko mieć może. Otóż ponieważ od stopnia woli zależy użycie siły i ponieważ bezwzględna siła rządu nie zmienia się wcale, wynika stąd, że najbardziej czynny z rządów jest rząd jednego."},{"type":"paragraph","text":"Na odwrót, połączmy rząd z władzą prawodawczą, uczyńmy ze zwierzchnika księcia, a z wszystkich obywateli tyluż urzędników: wówczas wola grupy, zmieszana z wolą powszechną, nie będzie miała więcej aktywności niż ta ostatnia i całą siłę pozostawi woli szczególnej. Rząd przeto, mając zawsze tę samą siłę bezwzględną, będzie miał maksimum siły względnej, czyli aktywności 213 ."},{"type":"paragraph","text":"Nie da się zaprzeczyć prawdziwości tych stosunków, a można je potwierdzić za pomocą innych jeszcze rozważań. Widzimy na przykład, że każdy urzędnik jest bardziej czynny w swym ciele zbiorowym niż każdy obywatel w swoim, i że w następstwie tego wola szczególna wywiera o wiele większy wpływ na akty rządowe niż na akty zwierzchnicze; każdy bowiem urzędnik prawie zawsze pełni jakąś funkcję rządową, podczas gdy żaden obywatel osobno nie ma żadnych funkcji zwierzchniczych. Zresztą, im bardziej rozszerza się państwo, tym bardziej wzrasta jego rzeczywista siła, aczkolwiek nie wzrasta w stosunku do jego obszaru; lecz gdy państwo pozostaje takie samo, choćby urzędnicy nie wiem jak się mnożyli, rząd nie nabędzie przez to większej siły rzeczywistej, siła ta bowiem jest siłą państwa, a miara jej jest zawsze równa. Siła względna przeto, czyli aktywność rządu, zmniejsza się, a siła jego bezwzględna, czyli rzeczywista, nie może się zwiększyć."},{"type":"paragraph","text":"Pewną jest jeszcze rzeczą, że załatwianie spraw staje się powolniejsze w miarę, im więcej osób zajmuje się nimi; że poświęcając za wiele rozsądkowi, za mało liczy się ze szczęściem; że wypuszcza się sposobności i że rozprawiając za wiele, często traci się owoce rozpraw 214 ."},{"type":"paragraph","text":"Dowiodłem co dopiero, że rząd rozluźnia się w miarę mnożenia się urzędników, a przedtem udowodniłem, że im naród jest liczniejszy, tym siła przymusu powinna być większa. Z tego wynika, że stosunek urzędników do rządu powinien być odwrotny jak stosunek poddanych do zwierzchnika; to znaczy, że im bardziej państwo się powiększa, tym bardziej rząd powinien się zwężać, tak że liczba naczelników zmniejsza się w stosunku do wzrastania narodu 215 ."},{"type":"paragraph","text":"Mówię tutaj zresztą jedynie o sile względnej rządu, nie zaś o jego prawości: przeciwnie bowiem, im ciało urzędnicze jest liczniejsze, tym bardziej wola grupy zbliża się do woli powszechnej; gdy tymczasem przy jednym urzędniku ta sama wola grupy jest jedynie wolą szczególną, jak już powiedziałem. Traci się więc z jednej strony, co można zyskać z drugiej, i sztuka prawodawcy polega na umiejętności uchwycenia punktu, w którym siła i wola rządu, zawsze pozostające we wzajemnej proporcji, układają się w stosunek najbardziej dla państwa korzystny 216 ."}]},{"id":"rozdział-iii-podział-rządów","number":30,"title":"Rozdział III. Podział rządów","blocks":[{"type":"paragraph","text":"W poprzednim rozdziale pokazano, dlaczego rozróżnia się różne rodzaje, czyli formy rządów 217 według liczby stanowiących je członków: w tym rozdziale pozostaje pokazać, jak się ten podział przeprowadza."},{"type":"paragraph","text":"W pierwszym rzędzie zwierzchnik może powierzyć sprawowanie rządu całemu narodowi lub największej części narodu, w ten sposób, by było więcej obywateli urzędników niż zwyczajnych obywateli osób prywatnych. Daje się tej formie rządu miano demokracji ."},{"type":"paragraph","text":"Albo też zwierzchnik może skupić rząd w rękach małej liczby, w ten sposób, by było więcej zwyczajnych obywateli niż urzędników; ta znów forma nosi nazwę arystokracji ."},{"type":"paragraph","text":"W końcu zwierzchnik może ześrodkować cały rząd w rękach jedynego urzędnika, od którego wszyscy inni otrzymują swą władzę. Ta trzecia forma jest najczęstsza i nazywa się monarchią lub rządem królewskim."},{"type":"paragraph","text":"Należy zauważyć, że wszystkie te formy, a przynajmniej dwie pierwsze, zdolne są przybrać mniejszą lub większą rozciągłość, a nawet mają ją dość znaczną; demokracja bowiem może obejmować cały naród lub skurczyć się aż do połowy narodu. Arystokracja z kolei może z połowy narodu ścieśnić się do jakiejkolwiek najmniejszej liczby. Nawet urząd królewski zdolny jest do pewnych podziałów. Sparta na mocy swej konstytucji miała stale dwóch królów; w cesarstwie rzymskim widziano zaś równocześnie aż do ośmiu cesarzy 218 , a nie można było powiedzieć, by cesarstwo było podzielone. Istnieje przeto punkt, w którym każda forma rządu przechodzi w drugą, i widzi się, że rząd oznaczany trzema jedynie nazwami w rzeczywistości zdolny jest do tylu różnych form, ilu państwo ma obywateli."},{"type":"paragraph","text":"Więcej nawet: skoro ten sam rząd może pod pewnymi względami dzielić się na dalsze części, z których to podziałów jeden może być zarządzany w taki sposób, inny zaś w inny, może wyniknąć z tych trzech form połączonych z sobą mnóstwo form mieszanych, z których znów i każdą można pomnożyć przez wszystkie formy proste 219 ."},{"type":"paragraph","text":"Po wszystkie czasy wiele rozprawiano o najlepszej formie rządu, nie zważając, że każda z nich jest w pewnych wypadkach najlepsza, a w innych najgorsza 220 ."},{"type":"paragraph","text":"Jeżeli w rozmaitych państwach liczba najwyższych urzędników powinna stać w odwrotnym stosunku do liczby obywateli, wynika stąd, że na ogół rząd demokratyczny jest odpowiedni dla małych państw, arystokratyczny dla średnich, monarchiczny dla wielkich. Tę regułę wyprowadza się bezpośrednio z zasady. Lecz jakżeż zliczyć mnóstwo okoliczności, które mogą dostarczyć wyjątków?"}]},{"id":"rozdział-iv-o-demokracji","number":31,"title":"Rozdział IV. O demokracji","blocks":[{"type":"paragraph","text":"Ten, kto stanowi prawo, wie lepiej niż ktokolwiek inny, w jaki sposób powinno być ono wykonywane i tłumaczone. Wydaje się więc, że nie można by mieć lepszej konstytucji od tej, która razem łączy władzę wykonawczą i prawodawczą; lecz to właśnie sprawia, że rząd taki jest pod pewnymi względami niewystarczający, w nim bowiem rzeczy, które powinny być odłączone, nie są odłączone, a książę i zwierzchnik, będąc tą samą osobą, tworzą jedynie — że się tak wyrażę — rząd bez rządu."},{"type":"paragraph","text":"Nie jest rzeczą dobrą, by ten, kto stanowi prawa, wykonywał je, ani by ciało narodu odwracało swą uwagę od praw ogólnych i poświęcało się przedmiotom szczególnym. Nie masz bardziej niebezpiecznej rzeczy nad wpływ prywatnych interesów w sprawach publicznych, a naruszenie praw przez rząd jest niniejszym złem niż zepsucie prawodawcy, nieomylne następstwo szczególnych punktów widzenia. Wówczas państwo psuje się w swej istocie, a wszelka naprawa staje się niemożliwa. Naród, który nigdy nie nadużyłby władzy rządowej, nie nadużywałby także niezależności; naród, który rządziłby zawsze dobrze, nie potrzebowałby rządu 221 ."},{"type":"paragraph","text":"Jeżeli brać ten termin w ścisłym jego znaczeniu, to nigdy nie było prawdziwej demokracji ani nigdy jej nie będzie. Jest rzeczą przeciwną naturalnemu porządkowi, by wielka liczba rządziła, a mała była rządzona. Nie można sobie wyobrazić, by naród ustawicznie się zgromadzał dla zajmowania się sprawami publicznymi, a łatwo spostrzec, że nie mógłby zlecać załatwienia tych spraw, nie zmieniając formy zarządu."},{"type":"paragraph","text":"W istocie sądzę, iż można postawić zasadę, że gdy funkcje rządowe są rozdzielone między kilka ciał, najmniej z nich liczne zdobywają prędzej czy później największą władzę, chociażby z powodu łatwości załatwiania spraw, która w sposób naturalny wiedzie ich ku władzy."},{"type":"paragraph","text":"Zresztą, ileż to rzeczy trudnych do połączenia rząd ten wymaga! Najpierw: bardzo małego państwa, w którym łatwo byłoby zgromadzić naród i w którym każdy obywatel mógłby łatwo znać innych; po drugie, wielkiej prostoty obyczajów, która by zapobiegała mnogości spraw i jałowym dyskusjom; następnie wielkiej równości w stanowiskach i w majątkach, bez czego równość nie mogłaby się długo utrzymać w prawach i we władzy; w końcu niewiele zbytku lub też zupełnego jego braku — zbytek bowiem jest albo skutkiem bogactw, albo rodzi je koniecznie; psuje równocześnie bogatego i ubogiego, jednego przez posiadanie, drugiego przez pożądanie; sprzedaje ojczyznę gnuśności, próżności; odbiera państwu wszystkich obywateli, by oddać jednych pod jarzmo drugich, a wszystkich pod jarzmo opinii."},{"type":"paragraph","text":"Oto dlaczego pewien sławny autor 222 dał cnotę za zasadę republice, wszystkie te bowiem warunki nie mogłyby utrzymać się bez cnoty; ale ponieważ nie przeprowadził koniecznych rozróżnień, pięknemu temu geniuszowi zbywało często na słuszności, niekiedy na jasności, i nie spostrzegł on, że skoro władza zwierzchnicza wszędzie jest ta sama, ta sama zasada 223 musi stosować się do wszystkich dobrze urządzonych państw — prawda, że w stopniu mniejszym lub większym, zależnie od formy rządu."},{"type":"paragraph","text":"Dodajmy, że nie masz rządu tak narażonego na wojny domowe i niepokoje wewnętrzne jak rząd demokratyczny, czyli ludowy, ponieważ żaden tak silnie i ciągle nie zmierza do zmiany formy, ani nie wymaga takiej czujności i odwagi, by się utrzymać przy swojej formie. Przy tym to przede wszystkim ustroju, powinien obywatel uzbroić się w siłę i stałość i każdego dnia swego życia powtarzać w głębi serca to, co mówił pewien cnotliwy wojewoda 224 w Sejmie polskim: Malo periculosam libertatem quam quietum servitium 225 ."},{"type":"paragraph","text":"Gdyby istniał naród bogów, rządziłby się demokratycznie. Rząd tak doskonały nie nadaje się dla ludzi."}]},{"id":"rozdział-v-o-arystokracji","number":32,"title":"Rozdział V. O arystokracji","blocks":[{"type":"paragraph","text":"Mamy tutaj dwie osoby moralne zupełnie różne: mianowicie rząd i zwierzchnika; wskutek tego dwie wole powszechne: jedną w stosunku do wszystkich obywateli, drugą jedynie wobec członków zarządu. Aczkolwiek więc rząd może normować swój wewnętrzny porządek jak mu się podoba, nigdy nie może przemawiać do narodu jak tylko w imieniu zwierzchnika, tzn. w imieniu samego narodu 226 ; o tym nie należy nigdy zapominać."},{"type":"paragraph","text":"Pierwsze społeczeństwa rządziły się arystokratycznie. Naczelnicy rodzin decydowali pomiędzy sobą o sprawach publicznych. Młodzież ustępowała bez trudu przed autorytetem doświadczenia. Stąd nazwy kapłanów , starszych , senatu 227 , gerontów 228 . Dzicy Ameryki Północnej dzisiaj jeszcze w ten sposób się rządzą i są bardzo dobrze rządzeni."},{"type":"paragraph","text":"W miarę jednak jak nierówność wypływająca z urządzeń poczęła brać górę nad nierównością naturalną, zaczęto przenosić bogactwo lub siłę 229 nad wiek i arystokracja stała się obieralna. W końcu przechodzenie władzy wraz z majątkiem z ojca na dzieci, stwarzając patrycjuszowskie 230 rodziny, sprawiło, że rząd stał się dziedziczny i ujrzano dwudziestoletnich senatorów."},{"type":"paragraph","text":"Są więc trzy rodzaje arystokracji: naturalna, obieralna, dziedziczna. Pierwsza jest odpowiednia jedynie dla narodów prostych; trzecia jest najgorszym ze wszystkich rządów, druga jest najlepszym: jest arystokracją we właściwym znaczeniu 231 ."},{"type":"paragraph","text":"Prócz korzyści płynącej z rozróżnienia dwóch władz przedstawia nadto korzyść wyboru swoich członków; przy ludowym bowiem rządzie wszyscy obywatele rodzą się urzędnikami; lecz arystokratyczny rząd ogranicza urzędników do małej liczby, ci zaś stają się nimi jedynie przez wybory 232 ; sposób, przy którym rzetelność, światło, doświadczenie oraz wszystkie inne powody znaczenia i szacunku publicznego stanowią tyleż nowych rękojmi, że będzie się rządzonym mądrze."},{"type":"paragraph","text":"Ponadto łatwiej jest odbyć posiedzenie; sprawy lepiej przedyskutowane załatwiane są porządniej i szybciej; czcigodni senatorowie lepiej podtrzymują znaczenie państwa za granicą niż tłum nieznany lub pogardzany."},{"type":"paragraph","text":"Jednym słowem, jest to porządek najlepszy i najbardziej naturalny, by najmądrzejsi rządzili tłumem, jeżeli się jest pewnym, że będą nim rządzić dla jego, a nie dla swojej korzyści; nie należy niepotrzebnie mnożyć sprężyn ani też robić z dwudziestu tysiącami ludzi to, co stu wybranych ludzi może robić jeszcze lepiej. Trzeba jednak zauważyć, że interes grupy poczyna tutaj kierować siłą publiczną nie tak zupełnie według reguły woli powszechnej i że obca prawom a nieuchronna skłonność odbiera im część władzy wykonawczej."},{"type":"paragraph","text":"Co się tyczy szczególnych warunków, to nie trzeba ani tak małego państwa, ani narodu tak prostego i prawego jak w dobrej demokracji, by wykonanie praw następowało bezpośrednio, stosownie do woli powszechnej. Nie trzeba jednak także narodu tak wielkiego, by naczelnicy, rozrzuceni dla rządzenia nim, mogli przybierać każdy w swoim departamencie pozory zwierzchnika i zaczynać od uniezależnienia się, by w końcu stać się panami."},{"type":"paragraph","text":"Jeżeli jednak arystokracja wymaga nieco mniej cnót niż rząd ludowy, wymaga także innych, sobie właściwych, jak umiarkowanie u bogatych i powściągliwość u ubogich; wydaje się bowiem, że tutaj ścisła równość nie byłaby na miejscu; nawet w Sparcie nie była przestrzegana 233 ."},{"type":"paragraph","text":"Zresztą, jeżeli ta forma dopuszcza pewną nierówność majątków, to dlatego, by na ogół zarząd spraw publicznych powierzano tym, co mogą najlepiej poświęcić mu cały swój czas, a nie dlatego — jak to utrzymuje Arystoteles — by bogaci zawsze mieli pierwszeństwo. Przeciwnie, ważne jest, by wybór odwrotny pouczył niekiedy naród, że zasługa ludzi przedstawia ważniejsze powody oddania pierwszeństwa niż bogactwo."}]},{"id":"rozdział-vi-o-monarchii-234","number":33,"title":"Rozdział VI. O monarchii 234","blocks":[{"type":"paragraph","text":"Dotychczas rozważaliśmy księcia jako osobę moralną i zbiorową, zjednoczoną przez moc praw, i będącą w państwie depozytariuszem władzy wykonawczej. Obecnie mamy rozważyć tę władzę skupioną w rękach osoby fizycznej, człowieka rzeczywistego, mającego jedyne prawo rozrządzania nią według praw. Oto co nazywa się monarchą lub królem."},{"type":"paragraph","text":"W przeciwieństwie do innych zarządów, gdzie istota zbiorowa przedstawia jednostkę, w tym zarządzie jednostka przedstawia istotę zbiorową 235 , tak że tworząca księcia jedność moralna jest równocześnie jednością fizyczną, w której wszystkie właściwości, jakie prawo łączy z takim trudem z tamtą, w tej jedności łączą się naturalnie."},{"type":"paragraph","text":"Tak więc wolę narodu i wolę księcia, i siłę publiczną państwa, i siłę szczególną rządu, wszystko porusza ta sama przyczyna, wszystkie sprężyny machiny znajdują się w tych samych rękach; wszystko pracuje dla tego samego celu; nie ma wcale ruchów sprzecznych, niweczących się wzajemnie, i nie można sobie wyobrazić żadnego rodzaju ustroju, w którym by mniejszy wysiłek wydawał znaczniejszą działalność. Archimedes 236 , siedzący spokojnie na brzegu i bez trudu ciągnący po fali wielki okręt, jest dla mnie wyobrażeniem zręcznego monarchy, rządzącego ze swego gabinetu obszernym państwem i poruszającego wszystko, choć sam wydaje się nieruchomy."},{"type":"paragraph","text":"Chociaż jednak nie ma rządu bardziej energicznego, nie ma także takiego, w którym by wola szczególna bardziej panowała i łatwiej górowała nad innymi; prawda, wszystko zmierza do tego samego celu, lecz celem tym nie jest szczęśliwość publiczna i właśnie siła zarządu ustawicznie obraca się ku szkodzie państwa."},{"type":"paragraph","text":"Królowie chcą być absolutnymi i na próżno tłumaczy się im, że najlepszym środkiem do tego jest wzbudzić miłość narodu. Ta zasada jest bardzo piękna, a nawet pod pewnymi względami bardzo prawdziwa. Na nieszczęście zawsze będą ją przedrwiwać na dworach. Bez wątpienia władza płynąca z miłości narodu jest największa; jest jednak niepewna i warunkowa — nigdy książęta nią się nie zadowolą. Najlepsi królowie chcą, by mogli być źli, jeśli im się spodoba, nie przestając być panami: kaznodzieja polityczny może sobie mówić, że gdy siła narodu jest ich siłą, ich największy interes polega na tym, by naród był kwitnący, liczny, mocny; oni dobrze wiedzą, że to nie jest prawda. W ich osobistym interesie leży najpierw, by naród był słaby, w nędzy i by nigdy nie mógł się im oprzeć. Przyznaję, że gdyby się przyjęło stałą i zupełną uległość poddanych, wówczas w interesie księcia leżałaby potęga narodu, by potęga ta, będąc jego potęgą, uczyniła go strasznym dla sąsiadów; lecz skoro ten interes jest jedynie drugorzędny i podporządkowany i skoro obydwa przypuszczenia nie dadzą się z sobą pogodzić 237 , jest naturalną rzeczą, że książęta zawsze dają pierwszeństwo zasadzie dla siebie najbardziej bezpośrednio korzystnej. To samo Samuel przedstawiał z mocą Hebrajczykom; to samo Makiawel 238 pokazał z oczywistością. Udając, że naucza królów, dał wielką naukę narodom. Książę Makiawela jest książką republikanów 239 ."},{"type":"paragraph","text":"Doszliśmy z ogólnych stosunków 240 , że monarchia odpowiada jedynie wielkim państwom, i dochodzimy do tego samego, badając ją samą w sobie. Im zarząd publiczny jest liczniejszy, tym bardziej stosunek między księciem a poddanymi maleje i zbliża się do równości, tak że stosunek ten w demokracji równa się jedynce, czyli jest zupełną równością. Ten sam stosunek wzrasta, w miarę jak rząd się ścieśnia, a dochodzi do swego maksimum, gdy rząd spoczywa w rękach jednego. Wówczas zachodzi zbyt wielka odległość między księciem a narodem, i państwu brakuje związania. By je utworzyć, potrzeba więc pośrednich stanów; potrzeba książąt, dostojników, szlachty, którzy by je stanowili. Otóż, wszystko to nie jest odpowiednie dla małego państwa, które te wszystkie stopnie rujnują 241 ."},{"type":"paragraph","text":"Jeśli jednak jest rzeczą trudną, by wielkie państwo było dobrze rządzone, o wiele trudniejsze jest, by było dobrze rządzone przez jednego człowieka; a każdy wie, co się dzieje, gdy król przybiera sobie zastępców."},{"type":"paragraph","text":"Jest zasadniczą i nieuniknioną rządu monarchicznego wadą, z powodu której zawsze będzie on stać niżej od republikańskiego, że przy tym ostatnim zawsze prawie głos publiczny wynosi na pierwsze stanowiska ludzi światłych i zdolnych, którzy je sprawują z honorem, gdy przeciwnie, ci, co w monarchii dochodzą do stanowisk, są najczęściej jedynie drobnymi warchołami, łajdakami, intrygantami, których małe talenty, prowadzące na dworach do wysokich miejsc, wystarczają im jedynie do publicznego pokazania własnego głupstwa, skoro tylko się wzniosą. Naród o wiele mniej myli się w swym wyborze niż książę 242 ; i człowiek prawdziwej zasługi prawie tak jest rzadki w ministerstwach, jak głupiec na czele rządu republikańskiego. Toteż gdy szczęśliwym trafem jeden z tych ludzi urodzonych do sądzenia obejmuje ster praw w monarchii, zniszczonej prawie przez bandę tych ślicznych rządców, wszyscy dziwią się środkom, jakie wynajduje, i stanowi to epokę w kraju 243 ."},{"type":"paragraph","text":"By państwo monarchiczne mogło być dobrze rządzone, trzeba, żeby jego wielkość, czyli obszar, przystosowany był do zdolności rządzącego. Łatwiej jest podbijać niż zarządzać. Przy odpowiedniej dźwigni jednym palcem można wstrząsnąć światem; by go podtrzymać jednak, trzeba ramion Herkulesa 244 . Prawie zawsze książę jest zanadto mały, choćby na niezbyt wielkie państwo. Jeśli odwrotnie wydarza się, że państwo jest za małe dla swego naczelnika, co jest bardzo rzadkie, tedy 245 znowu jest źle rządzone; naczelnik bowiem, idąc zawsze za swymi wielkimi zamiarami, zapomina o interesie narodów i nie mniej czyni je nieszczęśliwymi przez nadużywanie swych za wielkich zdolności jak naczelnik ograniczony przez brak zdolności, na których mu zbywa. Trzeba, żeby się tak wyrazić, by królestwo rozszerzało się lub zwężało z każdym panowaniem, stosownie do znaczenia księcia; gdy tymczasem przy senacie, posiadającym bardziej stałą miarę zdolności, państwo może mieć trwałe granice, a zarząd nie być gorzej sprawowany."},{"type":"paragraph","text":"Najbardziej dotkliwą złą stroną rządu jednostki jest brak ciągłości w następstwie, tworzącej w obu pozostałych rządach nieprzerwaną łączność. Gdy król umrze, trzeba innego; elekcje wytwarzają niebezpieczny czas przejściowy, są burzliwe, a o ile obywatele nie mają bezinteresowności, prawości, jakich rząd ten wcale za sobą nie pociąga, wdają się w nie intryga i przekupstwo. Trudną jest rzeczą, by ten, komu państwo się sprzedało, z kolei go nie sprzedawał i na słabych nie odbijał sobie pieniędzy, które mu silni wydarli. Prędzej czy później wszystko staje się przekupne pod takim zarządem, a pokój, jakim się cieszy wówczas pod panowaniem królów, jest gorszy od bezładu bezkrólewia."},{"type":"paragraph","text":"Cóż zrobiono, by temu złu zaradzić? Wprowadzono dziedziczność tronu w pewnych rodzinach i ustanowiono porządek następstwa, zapobiegający wszelkim sporom po śmierci królów; to znaczy, że wprowadzając wady regencji w miejsce wad elekcji, przeniesiono pozorny spokój nad mądry zarząd i że wolano zaryzykować, by naczelnikami były dzieci, potwory, idioci, niżby miano się spierać co do wyboru dobrych królów; nie zważano, że narażając się w ten sposób na ryzyko alternatywy 246 , prawie wszystkie szanse stawia się przeciwko sobie. Bardzo rozsądne były słowa Dionizjusza Młodszego 247 , kiedy ojciec, wyrzucając mu jakiś hańbiący uczynek, mówił: „Taki dałem ci przykład?”. „Ach! — odpowiedział syn — twój ojciec nie był królem!” 248"},{"type":"paragraph","text":"Wszystko pracuje na to, by pozbawić sprawiedliwości i rozumu człowieka wychowanego do rozkazywania innym. Podobno wiele zadają sobie trudu, by nauczyć młodych książąt sztuki rządzenia; nie wygląda na to, by korzystali z tego wychowania. Lepiej byłoby zacząć od nauczenia ich sztuki słuchania. Najwięksi królowie, jakich sławiła historia, nie byli wychowani do rządzenia; jest to wiedza, której się tym mniej posiada, im więcej się jej uczyło, a którą lepiej nabywa się słuchając, niż rozkazując: Nam utilissimus idem ac brevissimus bonarum malarumque rerum delectus, cogitare quid aut nolueris sub alio principe, aut volueris 249 ."},{"type":"paragraph","text":"Następstwem tego braku związku jest niestałość rządu królewskiego, który kierując się raz tym, raz innym planem, zależnie od charakteru panującego księcia albo też ludzi, którzy za niego rządzą, nie może mieć długo jakiegoś stałego celu ani konsekwentnego postępowania: zmienność sprawiająca, że państwo ustawicznie waha się między jedną a drugą zasadą, między takim a innym projektem, co nie zachodzi przy innych rządach, gdzie książę jest zawsze ten sam. Toteż widzimy, że na ogół, o ile więcej jest chytrości na dworach, o tyle jest więcej mądrości w senatach, i że republiki zmierzają do swych celów, wyznając stalsze poglądy i wierniej idąc za nimi; gdy tymczasem każdy przewrót w ministerium 250 wywołuje rewolucję w państwie, ponieważ wspólną zasadą wszystkich ministrów i prawie wszystkich królów jest, by wszystko robić odwrotnie niż poprzednik."},{"type":"paragraph","text":"Ten sam brak spoistości pozwala nadto rozwiązać sofizmat dobrze znany królewskim politykom: oto nie tylko porównuje się rząd państwowy do rządu domowego, księcia zaś do ojca rodziny — błąd już przez nas odparty 251 — lecz nadto przyznaje się hojnie temu urzędnikowi wszystkie cnoty, jakich może potrzebować, i przyjmuje się, że książę jest zawsze tym, czym być powinien; przypuszczenie, przy którym rząd królewski trzeba oczywiście przenosić nad wszystkie inne rządy, ponieważ jest niezaprzeczenie najsilniejszy, i by był także najlepszy, brakuje mu tylko woli grupy bardziej zgodnej z wolą powszechną."},{"type":"paragraph","text":"Lecz jeśli, według Platona 252 , król z powołania jest tak rzadkim zjawiskiem, ileż to razy natura i fortuna zechcą razem współdziałać, by on właśnie otrzymał koronę? A jeżeli królewskie wychowanie z konieczności psuje tych, co je otrzymują, czegóż można spodziewać się od szeregu ludzi wychowanych dla panowania? Znaczy więc dobrowolnie się oszukiwać, jeżeli rząd królewski miesza się z rządem dobrego króla. By zobaczyć, czym jest ten rząd sam w sobie, trzeba nań patrzeć, gdy panują ograniczeni lub źli książęta; takimi bowiem na tron wstąpią lub tron ich takimi zrobi."},{"type":"paragraph","text":"Te trudności nie uszły uwagi naszych autorów; nie zakłopotali się jednak nimi. Mówią oni: lekarstwo polega na tym, by słuchać bez szemrania; Bóg daje w gniewie swym złych królów i trzeba ich cierpieć jako karę niebios. Bez wątpienia, mowa taka jest budująca; nie wiem jednak, czy nie lepiej nadawałaby się na kazalnicę niż do książki o polityce 253 . Cóż powiedzieć o lekarzu, który obiecuje cuda, a którego cała sztuka zasadza się na wzywaniu chorego do cierpliwości? Dobrze wiadomo, że trzeba cierpieć zły rząd, kiedy go się ma: chodziłoby właśnie o znalezienie dobrego 254 ."}]},{"id":"rozdział-vii-o-rządach-mieszanych","number":34,"title":"Rozdział VII. O rządach mieszanych","blocks":[{"type":"paragraph","text":"Ściśle mówiąc nie ma nigdzie rządu prostego. Trzeba, by jedyny naczelnik miał podległych sobie urzędników; trzeba, by rząd ludowy miał naczelnika. W podziale przeto władzy wykonawczej występuje zawsze stopniowanie od wielkiej do mniejszej liczby, a różnica polega na tym, że teraz wielka liczba zależy od małej, to znów mała od wielkiej."},{"type":"paragraph","text":"Czasem podział jest równy, bądź gdy części składowe pozostają we wzajemnej od siebie zależności, jak w rządzie angielskim 255 , bądź gdy władza każdej części jest niezawisła, lecz niepełna, jak w Polsce. Ta ostatnia forma jest zła, nie ma przy niej bowiem jedności w rządzie, a państwu brak związania 256 ."},{"type":"paragraph","text":"Który z tych rządów ma większą wartość, prosty czy mieszany? Zagadnienie, którym bardzo zajmują się politycy, a na które trzeba dać taką samą odpowiedź, jaką dałem co do wszelkich form rządu 257 ."},{"type":"paragraph","text":"Rząd prosty jest sam w sobie najlepszy, przez to samo, że jest prosty. Gdy jednak władza wykonawcza nie jest dostatecznie uzależniona od prawodawczej, to znaczy, gdy stosunek księcia do zwierzchnika jest większy niż stosunek narodu do księcia, trzeba zaradzić temu brakowi proporcji przez podzielenie rządu; wówczas bowiem wszystkie jego części razem nie mają mniejszej władzy wobec poddanych, a podzielenie ich sprawia, że wszystkie razem mają mniej siły wobec zwierzchnika 258 ."},{"type":"paragraph","text":"Zaradza się jeszcze tej samej wadzie przez ustanawianie urzędników pośredniczących, którzy, pozostawiając rząd w jego całości, służą jedynie do zrównoważenia ob
